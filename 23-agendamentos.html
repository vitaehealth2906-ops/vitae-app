<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Agendamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#0A0A0A; border-radius:0 0 20px 20px; z-index:10; }
        .header { position:absolute; top:58px; left:28px; right:28px; display:flex; align-items:center; z-index:5; }
        .back-btn { width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5); }
        .header-title { flex:1; text-align:center; font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#fff; }

        .content { height:100%; overflow-y:auto; padding:110px 28px 40px; }

        .add-btn {
            width:100%; padding:16px; margin-bottom:20px;
            background:linear-gradient(135deg, #00B4D8, #007A9E);
            border:none; border-radius:16px;
            font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
            color:#ffffff; cursor:pointer;
        }

        .agenda-card {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:18px; padding:16px; margin-bottom:12px;
            display:flex; align-items:center; gap:14px;
        }
        .agenda-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
        .agenda-icon.exame { background:rgba(74,217,164,0.08); }
        .agenda-icon.consulta { background:rgba(74,144,226,0.08); }
        .agenda-icon.retorno { background:rgba(0,153,196,0.08); }
        .agenda-info { flex:1; }
        .agenda-title { font-size:14px; font-weight:600; color:#fff; }
        .agenda-meta { font-size:12px; color:rgba(255,255,255,0.3); }
        .agenda-delete { width:32px; height:32px; border-radius:8px; background:rgba(217,68,82,0.1); border:none; color:#D94452; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }

        .empty-state { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.2); font-size:14px; }
        .empty-state .icon { font-size:48px; margin-bottom:16px; }

        /* Modal */
        .modal-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:50; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        .modal-overlay.active { opacity:1; pointer-events:all; }
        .modal { position:absolute; bottom:0; left:0; right:0; background:#1A1A1A; border-radius:24px 24px 0 0; padding:24px; max-height:80%; overflow-y:auto; transform:translateY(100%); transition:transform 0.35s; }
        .modal-overlay.active .modal { transform:translateY(0); }
        .modal-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#fff; margin-bottom:16px; }
        .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
        .field-label { font-size:12px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; }
        .field-input, .field-select {
            width:100%; padding:14px 16px; background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08); border-radius:12px;
            font-family:'Inter',sans-serif; font-size:14px; color:#fff; outline:none;
            appearance:none; color-scheme:dark;
        }
        .field-input::placeholder { color:rgba(255,255,255,0.2); }
        .modal-btn { width:100%; padding:16px; background:linear-gradient(135deg, #00B4D8, #007A9E); border:none; border-radius:16px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; color:#ffffff; cursor:pointer; margin-top:8px; }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="header">
        <div class="back-btn" onclick="window.location.href='08-perfil.html'">‹</div>
        <div class="header-title">Agendamentos</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content">
        <button class="add-btn" onclick="openModal()">+ Novo agendamento</button>
        <div id="agendaList">
            <div class="empty-state" id="emptyState">
                <div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div>Nenhum agendamento.<br>Toque no botão acima para criar.</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title">Novo Agendamento</div>
            <div class="field">
                <div class="field-label">Título</div>
                <input class="field-input" id="tituloInput" placeholder="Ex: Hemograma completo">
            </div>
            <div class="field">
                <div class="field-label">Tipo</div>
                <select class="field-select" id="tipoInput">
                    <option value="EXAME">Exame</option>
                    <option value="CONSULTA">Consulta</option>
                    <option value="RETORNO">Retorno</option>
                </select>
            </div>
            <div class="field">
                <div class="field-label">Data e hora</div>
                <input class="field-input" type="datetime-local" id="dataInput">
            </div>
            <div class="field">
                <div class="field-label">Local (opcional)</div>
                <input class="field-input" id="localInput" placeholder="Ex: Lab Fleury - Paulista">
            </div>
            <div class="field">
                <div class="field-label">Médico (opcional)</div>
                <input class="field-input" id="medicoInput" placeholder="Dr(a). ...">
            </div>
            <button class="modal-btn" onclick="criar()">Criar agendamento</button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

    async function loadAgendamentos() {
        try {
            const data = await vitaeAPI.listarAgendamentos();
            const items = data.agendamentos || [];
            if (items.length === 0) return;

            document.getElementById('emptyState').style.display = 'none';
            const list = document.getElementById('agendaList');
            list.innerHTML = items.map(a => {
                const dt = new Date(a.dataHora);
                const iconClass = a.tipo.toLowerCase();
                const icons = { EXAME:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>', CONSULTA:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>', RETORNO:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>' };
                const isFuture = dt > new Date();
                return `
                <div class="agenda-card" style="${!isFuture ? 'opacity:0.5;' : ''}">
                    <div class="agenda-icon ${iconClass}">${icons[a.tipo] || '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'}</div>
                    <div class="agenda-info">
                        <div class="agenda-title">${a.titulo}</div>
                        <div class="agenda-meta">${dt.toLocaleDateString('pt-BR')} às ${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} ${a.local ? '— ' + a.local : ''}</div>
                    </div>
                    ${isFuture ? `<button class="agenda-delete" onclick="deletar('${a.id}')">✕</button>` : ''}
                </div>`;
            }).join('');
        } catch (e) {
            console.log('Erro:', e.message);
        }
    }

    async function criar() {
        const titulo = document.getElementById('tituloInput').value.trim();
        const tipo = document.getElementById('tipoInput').value;
        const dataHora = document.getElementById('dataInput').value;
        const local = document.getElementById('localInput').value.trim();
        const medico = document.getElementById('medicoInput').value.trim();

        if (!titulo || !dataHora) return alert('Título e data são obrigatórios');

        try {
            await vitaeAPI.criarAgendamento({
                titulo, tipo, dataHora, local: local || undefined, medico: medico || undefined,
            });
            closeModal();
            loadAgendamentos();
        } catch (e) {
            alert(e.message);
        }
    }

    async function deletar(id) {
        if (!confirm('Cancelar este agendamento?')) return;
        try {
            await vitaeAPI.deletarAgendamento(id);
            loadAgendamentos();
        } catch (e) {
            alert(e.message);
        }
    }

    loadAgendamentos();
</script>
</body>
</html>
