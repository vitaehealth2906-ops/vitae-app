<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#F4F6FA;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#F4F6FA;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:#9CA3AF;
            z-index:11;
        }

        .content {
            height:100%; overflow-y:auto;
            padding:80px 28px 40px;
            display:flex; flex-direction:column;
        }

        /* Header */
        .page-header {
            margin-bottom:36px;
        }
        .page-title {
            font-family:'Plus Jakarta Sans', sans-serif;
            font-size:32px; font-weight:700;
            color:#0D0F14; margin-bottom:8px;
        }
        .page-title span { color:#00E5A0; }
        .page-subtitle {
            font-size:14px; color:#4B5563;
        }

        /* Form */
        .form { display:flex; flex-direction:column; gap:16px; flex:1; }

        .field {
            display:flex; flex-direction:column; gap:6px;
        }
        .field-label {
            font-size:12px; font-weight:600;
            color:#4B5563;
            letter-spacing:0.5px; text-transform:uppercase;
        }
        .field-input {
            width:100%; padding:16px 18px;
            background:#FFFFFF;
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1.5px solid rgba(0,0,0,0.07);
            border-top:1.5px solid rgba(0,0,0,0.07);
            border-radius:14px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:15px; font-weight:500;
            color:#0D0F14;
            outline:none;
            transition:all 0.3s ease;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
        }
        .field-input::placeholder {
            color:#9CA3AF;
        }
        .field-input:focus {
            border-color:rgba(0,229,160,0.4);
            background:rgba(0,229,160,0.04);
            box-shadow:0 0 0 3px rgba(0,229,160,0.08), inset 0 1px 0 rgba(0,229,160,0.06);
        }

        /* Phone input with flag */
        .phone-input-wrap {
            display:flex; gap:10px;
        }
        .phone-prefix {
            width:72px; padding:16px 12px;
            background:#FFFFFF;
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1.5px solid rgba(0,0,0,0.07);
            border-top:1.5px solid rgba(0,0,0,0.07);
            border-radius:14px;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
            font-size:14px; font-weight:600;
            color:#4B5563;
            display:flex; align-items:center; justify-content:center;
            gap:4px; flex-shrink:0;
        }
        .phone-input-wrap .field-input { flex:1; }

        /* Password toggle */
        .password-wrap {
            position:relative;
        }
        .password-wrap .field-input {
            padding-right:50px;
        }
        .password-toggle {
            position:absolute; right:16px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer;
            font-size:18px; color:#9CA3AF;
        }

        /* Terms */
        .terms {
            display:flex; align-items:flex-start; gap:12px;
            margin-top:8px;
        }
        .terms-check {
            width:22px; height:22px; border-radius:7px;
            border:1.5px solid rgba(0,0,0,0.07);
            background:#FFFFFF;
            cursor:pointer; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s ease;
            margin-top:2px;
        }
        .terms-check.checked {
            background:#00E5A0;
            border-color:#00E5A0;
        }
        .terms-check.checked::after {
            content:'✓'; color:#0D0F14;
            font-size:13px; font-weight:800;
        }
        .terms-text {
            font-size:12px; color:#9CA3AF;
            line-height:1.5;
        }
        .terms-text a {
            color:#00E5A0; text-decoration:underline;
        }

        /* CTA */
        .btn-primary {
            width:100%; padding:18px;
            background: linear-gradient(120deg, #00E5A0, #00B4D8);
            border:none; border-radius:16px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:16px; font-weight:700;
            color:#0D0F14; cursor:pointer;

            letter-spacing:0.5px;
            transition:all 0.2s ease;
            margin-top:16px;
            opacity:0.5;
        }
        .btn-primary.enabled {
            opacity:1;
        }
        .btn-primary.enabled:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 32px rgba(0,229,160,0.3);
        }

        .login-link {
            text-align:center; margin-top:20px;
            font-size:13px; color:#9CA3AF;
        }
        .login-link a {
            color:#00E5A0; text-decoration:none; font-weight:600;
        }
    @media(max-width:480px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>●●● 🔋</span></div>

    <div class="content">
        <div style="margin-bottom:16px;padding-top:8px;">
            <div onclick="window.location.href='00-escolha.html'" style="width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:rgba(0,0,0,0.4);">‹</div>
        </div>
        <div class="page-header">
            <div class="page-title">Criar <span>conta</span></div>
            <div class="page-subtitle">Comece sua jornada de saúde</div>
        </div>

        <!-- Social login buttons -->
        <div id="socialButtons" style="margin-bottom:24px; display:flex; flex-direction:column; gap:12px;">
            <button onclick="loginWithGoogle()" style="display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:14px; border-radius:14px; border:1px solid rgba(0,0,0,0.08); background:#fff; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:600; color:#1A1E26; cursor:pointer; transition:all 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continuar com Google
            </button>
            <div style="display:flex; align-items:center; gap:12px; margin:4px 0;">
                <div style="flex:1; height:1px; background:rgba(0,0,0,0.08);"></div>
                <span style="font-size:12px; color:rgba(0,0,0,0.3); font-weight:500;">ou</span>
                <div style="flex:1; height:1px; background:rgba(0,0,0,0.08);"></div>
            </div>
        </div>

        <div class="form">
            <div class="field">
                <div class="field-label">Nome completo</div>
                <input class="field-input" type="text" placeholder="Seu nome" oninput="checkForm()">
            </div>

            <div class="field">
                <div class="field-label">Celular</div>
                <div class="phone-input-wrap">
                    <div class="phone-prefix">🇧🇷 +55</div>
                    <input class="field-input" type="tel" placeholder="(11) 99999-9999" oninput="checkForm()">
                </div>
            </div>

            <div class="field">
                <div class="field-label">Email</div>
                <input class="field-input" type="email" placeholder="seu@email.com" oninput="checkForm()">
            </div>

            <div class="field">
                <div class="field-label">Senha</div>
                <div class="password-wrap">
                    <input class="field-input" type="password" id="passInput" placeholder="Mínimo 8 caracteres" oninput="checkForm()">
                    <button class="password-toggle" onclick="togglePass()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>

            <div class="terms">
                <div class="terms-check" id="termsCheck" onclick="toggleTerms()"></div>
                <div class="terms-text">
                    Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>
                </div>
            </div>

            <div id="errorMsg" style="display:none; background:rgba(217,68,82,0.12); border:1px solid rgba(217,68,82,0.3); border-radius:12px; padding:12px 16px; font-size:13px; color:#EF4444; text-align:center;"></div>

            <button class="btn-primary" id="btnCreate" onclick="goToVerification()">Criar conta</button>

            <div id="forgotLink" style="display:none; text-align:center; margin-top:-4px;">
                <a href="14-esqueci-senha.html" style="font-size:13px; color:#9CA3AF; text-decoration:none;">Esqueci minha senha</a>
            </div>

            <div class="login-link">
                Já tem conta? <a href="#">Entrar</a>
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    let termsAccepted = false;
    let isLogin = false;

    const inputs = document.querySelectorAll('.field-input');
    const nomeInput = inputs[0];
    const celularInput = inputs[1];
    const emailInput = inputs[2];
    const senhaInput = document.getElementById('passInput');
    const btn = document.getElementById('btnCreate');

    function toggleTerms() {
        termsAccepted = !termsAccepted;
        document.getElementById('termsCheck').classList.toggle('checked', termsAccepted);
        checkForm();
    }

    function togglePass() {
        const input = document.getElementById('passInput');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function checkForm() {
        let allFilled = true;
        if (isLogin) {
            if (!emailInput.value.trim() || !senhaInput.value.trim()) allFilled = false;
        } else {
            inputs.forEach(i => { if (!i.value.trim()) allFilled = false; });
            if (!senhaInput.value.trim()) allFilled = false;
        }

        if (allFilled && (isLogin || termsAccepted)) {
            btn.classList.add('enabled');
        } else {
            btn.classList.remove('enabled');
        }
    }

    function formatCelular(raw) {
        const digits = raw.replace(/\D/g, '');
        // Remove leading 55 if user typed it
        const num = digits.startsWith('55') ? digits.slice(2) : digits;
        return '+55' + num;
    }

    async function goToVerification() {
        if (!btn.classList.contains('enabled')) {
            const errorMsg = document.getElementById('errorMsg');
            if (isLogin) {
                errorMsg.textContent = 'Preencha email e senha.';
            } else if (!termsAccepted) {
                errorMsg.textContent = 'Aceite os termos para continuar.';
            } else {
                errorMsg.textContent = 'Preencha todos os campos.';
            }
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            return;
        }
        btn.textContent = isLogin ? 'Entrando...' : 'Criando conta...';
        btn.style.pointerEvents = 'none';

        try {
            if (isLogin) {
                const loginResult = await vitaeAPI.login(emailInput.value.trim(), senhaInput.value);
                const u = loginResult.usuario || {};
                if (u.tipo === 'MEDICO') {
                    window.location.href = '20-medico-dashboard.html';
                } else {
                    // Verificar se perfil tem dados — se vazio, vai pro quiz
                    try {
                        const perfilData = await vitaeAPI.getPerfil();
                        const p = perfilData.perfil || {};
                        const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                        window.location.href = vazio ? '05-quiz.html' : '08-perfil.html';
                    } catch(e) {
                        window.location.href = '08-perfil.html';
                    }
                }
            } else {
                const celFormatado = formatCelular(celularInput.value);
                const tipoEscolhido = localStorage.getItem('vitae_tipo_escolhido') || 'PACIENTE';
                const result = await vitaeAPI.cadastro(
                    nomeInput.value.trim(),
                    emailInput.value.trim(),
                    celFormatado,
                    senhaInput.value,
                    tipoEscolhido
                );
                // Cadastro ja retorna tokens — login automatico
                if (result.token) {
                    localStorage.setItem('vitae_token', result.token);
                    if (result.refreshToken) localStorage.setItem('vitae_refresh_token', result.refreshToken);
                    if (result.usuario) localStorage.setItem('vitae_usuario', JSON.stringify(result.usuario));
                }
                if (tipoEscolhido === 'MEDICO') {
                    window.location.href = '20-medico-cadastro.html';
                } else {
                    window.location.href = '05-quiz.html';
                }
            }
        } catch (err) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = err.message || 'Erro ao processar. Tente novamente.';
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
            btn.textContent = isLogin ? 'Entrar' : 'Criar conta';
            btn.style.pointerEvents = 'auto';
        }
    }

    // Toggle entre cadastro e login
    function toggleLogin() {
        isLogin = !isLogin;
        const header = document.querySelector('.page-title');
        const subtitle = document.querySelector('.page-subtitle');
        const loginLink = document.querySelector('.login-link');

        if (isLogin) {
            header.innerHTML = 'Bem-vindo <span>de volta</span>';
            subtitle.textContent = 'Entre na sua conta';
            btn.textContent = 'Entrar';
            loginLink.innerHTML = 'Nao tem conta? <a href="#" onclick="toggleLogin(); return false;">Criar conta</a>';
            nomeInput.closest('.field').style.display = 'none';
            celularInput.closest('.field').style.display = 'none';
            document.querySelector('.terms').style.display = 'none';
            document.getElementById('forgotLink').style.display = 'block';
        } else {
            header.innerHTML = 'Criar <span>conta</span>';
            subtitle.textContent = 'Comece sua jornada de saude';
            btn.textContent = 'Criar conta';
            loginLink.innerHTML = 'Ja tem conta? <a href="#" onclick="toggleLogin(); return false;">Entrar</a>';
            nomeInput.closest('.field').style.display = 'flex';
            celularInput.closest('.field').style.display = 'flex';
            document.querySelector('.terms').style.display = 'flex';
            document.getElementById('forgotLink').style.display = 'none';
        }
        checkForm();
    }

    // Link "Ja tem conta?" -> toggle
    document.querySelector('.login-link a').addEventListener('click', function(e) {
        e.preventDefault();
        toggleLogin();
    });

    // ===== Google Sign-In =====
    const GOOGLE_CLIENT_ID = '797358115254-rdlqi8dta9n7jvcvajeq4ubu20976te5.apps.googleusercontent.com';

    // Load Google Identity Services
    const gsiScript = document.createElement('script');
    gsiScript.src = 'https://accounts.google.com/gsi/client';
    gsiScript.async = true;
    gsiScript.defer = true;
    document.head.appendChild(gsiScript);

    function loginWithGoogle() {
        if (!google || !google.accounts) {
            alert('Google Sign-In está carregando. Tente novamente em 2 segundos.');
            return;
        }
        const client = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'openid email profile',
            callback: async (response) => {
                if (response.error) return;
                try {
                    // Get user info from Google
                    const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: { Authorization: `Bearer ${response.access_token}` }
                    }).then(r => r.json());

                    const tipoEscolhido = localStorage.getItem('vitae_tipo_escolhido') || 'PACIENTE';
                    const result = await vitaeAPI.loginSocial(
                        'google',
                        userInfo.sub,
                        userInfo.name,
                        userInfo.email
                    );

                    if (tipoEscolhido === 'MEDICO' || (result.usuario && result.usuario.tipo === 'MEDICO')) {
                        window.location.href = '20-medico-dashboard.html';
                    } else {
                        try {
                            const perfilData = await vitaeAPI.getPerfil();
                            const p = perfilData.perfil || {};
                            const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                            window.location.href = vazio ? '05-quiz.html' : '08-perfil.html';
                        } catch(e) {
                            window.location.href = '05-quiz.html';
                        }
                    }
                } catch (err) {
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.textContent = err.message || 'Erro ao entrar com Google.';
                    errorMsg.style.display = 'block';
                    setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
                }
            }
        });
        client.requestAccessToken();
    }

    function loginWithApple() {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = 'Login com Apple estará disponível em breve.';
        errorMsg.style.display = 'block';
        setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
    }

    // Se ja esta logado, redirecionar
    if (vitaeAPI.isLoggedIn()) {
        const u = vitaeAPI.getUsuario();
        if (u && u.tipo === 'MEDICO') {
            window.location.href = '20-medico-dashboard.html';
        } else {
            // Verificar se perfil preenchido
            (async () => {
                try {
                    const perfilData = await vitaeAPI.getPerfil();
                    const p = perfilData.perfil || {};
                    const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                    window.location.href = vazio ? '05-quiz.html' : '08-perfil.html';
                } catch(e) {
                    window.location.href = '08-perfil.html';
                }
            })();
        }
    }
</script>
</body>
</html>
