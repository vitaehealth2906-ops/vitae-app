<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Alergias do Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        .page-back-row { display:flex; align-items:center; gap:10px; padding:var(--v-s5) var(--v-s6) var(--v-s3); }
        .page-back-title { flex:1; font-size:17px; font-weight:700; color:var(--v-ink); }
        .allergy-card { display:flex; align-items:center; gap:14px; background:var(--v-surface); border:var(--v-border); border-radius:var(--v-r-md); padding:16px; margin:0 var(--v-s5) var(--v-s2); box-shadow:var(--v-sh); }
        .allergy-icon { width:42px; height:42px; border-radius:12px; background:rgba(239,68,68,0.08); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .allergy-icon svg { width:20px; height:20px; stroke:var(--v-bad); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .allergy-info { flex:1; }
        .allergy-name { font-size:15px; font-weight:700; color:var(--v-ink); }
        .allergy-detail { font-size:12px; color:var(--v-ink3); margin-top:2px; }
        .allergy-badge { padding:4px 10px; border-radius:var(--v-r-pill); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .allergy-badge.grave { background:rgba(239,68,68,0.08); color:var(--v-bad); }
        .allergy-badge.moderada { background:rgba(245,158,11,0.08); color:var(--v-warn); }
        .allergy-badge.leve { background:rgba(0,229,160,0.08); color:var(--v-green); }
        .empty-state { text-align:center; padding:60px 20px; }
        .empty-title { font-size:16px; font-weight:700; color:var(--v-ink3); margin-bottom:6px; }
        .empty-sub { font-size:13px; color:var(--v-ink4); }
        .anim { opacity:0; transform:translateY(20px); animation:fadeUp 0.4s var(--v-ease) forwards; }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="page-back-row anim">
            <div class="btn-back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
            <div class="page-back-title" id="pageTitle">Alergias</div>
        </div>
        <div id="list"></div>
        <div id="loadingState" style="text-align:center;padding:40px;color:var(--v-ink4);font-size:13px;">Carregando alergias...</div>
    </div>
</div>
<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pacienteId = params.get('pacienteId');
const pacienteNome = decodeURIComponent(params.get('nome') || 'Paciente');
document.getElementById('pageTitle').textContent = 'Alergias de ' + pacienteNome;

async function load() {
    if (!pacienteId) { document.getElementById('loadingState').textContent = 'Erro: ID nao fornecido'; return; }
    try {
        const data = await vitaeAPI.getPerfilPacienteMedico(pacienteId);
        const alergias = (data.paciente && data.paciente.alergias) || [];
        document.getElementById('loadingState').style.display = 'none';

        if (alergias.length === 0) {
            document.getElementById('list').innerHTML = '<div class="empty-state anim"><div class="empty-title">Nenhuma alergia</div><div class="empty-sub">Este paciente nao registrou alergias.</div></div>';
            return;
        }

        var html = '';
        alergias.forEach(function(a, i) {
            var grav = (a.gravidade || 'MODERADA').toLowerCase();
            html += '<div class="allergy-card anim" style="animation-delay:' + (0.05 + i * 0.05) + 's;">';
            html += '<div class="allergy-icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>';
            html += '<div class="allergy-info"><div class="allergy-name">' + a.nome + '</div>';
            html += '<div class="allergy-detail">' + (a.tipo || 'Alergia') + '</div></div>';
            html += '<div class="allergy-badge ' + grav + '">' + grav + '</div>';
            html += '</div>';
        });
        document.getElementById('list').innerHTML = html;
    } catch (err) {
        document.getElementById('loadingState').textContent = 'Erro: ' + err.message;
    }
}
load();
</script>
</body>
</html>
