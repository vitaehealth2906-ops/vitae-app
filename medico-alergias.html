<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Alergias do Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        body { background:#F4F6FA; }
        .content { padding: 0 0 32px; }

        /* Patient subheader */
        .patient-subheader {
            display:flex; align-items:center; gap:12px;
            padding: var(--v-s5) var(--v-s5) var(--v-s3);
            position:sticky; top:0; background:#F4F6FA; z-index:5;
        }
        .patient-avatar-sm {
            width:36px; height:36px; border-radius:50%;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            display:flex; align-items:center; justify-content:center;
            color:#0D0F14; font-weight:800; font-size:13px;
            flex-shrink:0; overflow:hidden;
        }
        .patient-avatar-sm img { width:100%; height:100%; object-fit:cover; }
        .patient-subheader-info { flex:1; min-width:0; }
        .patient-subheader-name { font-size:15px; font-weight:700; color:var(--v-ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .patient-subheader-meta { font-size:11px; color:var(--v-ink4); font-weight:500; }
        .patient-subheader-count {
            padding:5px 11px;
            background:rgba(239,68,68,0.10);
            border:1px solid rgba(239,68,68,0.22);
            border-radius:100px;
            font-size:11px; font-weight:700; color:var(--v-bad);
            white-space:nowrap;
        }
        .patient-subheader-count.safe {
            background:rgba(0,229,160,0.10);
            border-color:rgba(0,229,160,0.22);
            color:var(--v-green2);
        }

        /* Tab strip */
        .tab-strip {
            display:flex; gap:6px; padding: 4px var(--v-s5) var(--v-s5);
            overflow-x:auto; scrollbar-width:none;
        }
        .tab-strip::-webkit-scrollbar { display:none; }
        .tab-chip {
            padding:8px 14px; border-radius:100px;
            background:#FFFFFF; border:1px solid rgba(0,0,0,0.06);
            font-size:12px; font-weight:600; color:var(--v-ink3);
            cursor:pointer; white-space:nowrap;
            transition:all 0.15s;
        }
        .tab-chip:hover { background:rgba(0,0,0,0.02); }
        .tab-chip.active {
            background:rgba(0,229,160,0.10);
            border-color:rgba(0,229,160,0.30);
            color:var(--v-green2);
        }

        /* Painel prescricao segura (topo) */
        .panel-presc {
            margin: 0 var(--v-s5) var(--v-s5);
            padding: 18px 18px 16px;
            background: rgba(239,68,68,0.04);
            border: 1px solid rgba(239,68,68,0.14);
            border-radius: 18px;
        }
        .panel-presc.safe {
            background: rgba(0,229,160,0.04);
            border-color: rgba(0,229,160,0.14);
        }
        .panel-presc-title {
            font-size:13px; font-weight:800; color:var(--v-ink);
            text-transform:uppercase; letter-spacing:1px;
            margin-bottom:12px;
            display:flex; align-items:center; gap:8px;
        }
        .panel-presc-title svg { width:16px; height:16px; stroke:var(--v-bad); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
        .panel-presc.safe .panel-presc-title svg { stroke:var(--v-green2); }
        .pill-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
        .pill-allergy {
            padding:7px 13px; border-radius:100px;
            background:#FFFFFF; border:1px solid rgba(0,0,0,0.07);
            font-size:13px; font-weight:600; color:var(--v-ink2);
        }
        .pill-allergy.grave {
            background:var(--v-bad); border-color:var(--v-bad); color:#FFFFFF;
            font-weight:700; font-size:14px; padding:8px 14px;
        }
        .pill-allergy.moderada {
            background:rgba(245,158,11,0.10); border-color:rgba(245,158,11,0.30);
            color:var(--v-warn); font-weight:700;
        }
        .pill-allergy.leve {
            background:transparent; border-color:rgba(0,229,160,0.30);
            color:var(--v-green2);
        }
        .panel-presc-actions { display:flex; gap:8px; }
        .btn-copy {
            flex:1; padding:11px; border-radius:12px;
            background:#FFFFFF; border:1px solid rgba(0,0,0,0.07);
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:12px; font-weight:700; color:var(--v-ink2);
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
        }
        .btn-copy:hover { background:rgba(0,0,0,0.02); }
        .btn-copy svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .btn-copy.copied { background:rgba(0,229,160,0.10); border-color:rgba(0,229,160,0.30); color:var(--v-green2); }

        .section-label {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:1.5px; color:var(--v-ink4);
            padding: var(--v-s4) var(--v-s5) var(--v-s2);
        }

        .insight-card {
            position:relative;
            background:#FFFFFF; border-radius:14px;
            padding:14px 16px 14px 20px;
            margin: 0 var(--v-s5) 10px;
            box-shadow:0 1px 12px rgba(0,0,0,0.04);
        }
        .insight-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0;
            width:4px; background:var(--v-bad);
            border-radius:4px 0 0 4px;
        }
        .insight-card.atencao::before { background:var(--v-warn); }
        .insight-card.leve::before { background:var(--v-green); opacity:0.5; }

        .allergy-detail { display:flex; align-items:flex-start; gap:14px; }
        .allergy-icon {
            width:42px; height:42px; border-radius:12px;
            background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.18);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .allergy-icon svg { width:20px; height:20px; stroke:var(--v-bad); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .insight-card.atencao .allergy-icon { background:rgba(245,158,11,0.10); border-color:rgba(245,158,11,0.18); }
        .insight-card.atencao .allergy-icon svg { stroke:var(--v-warn); }
        .insight-card.leve .allergy-icon { background:rgba(0,229,160,0.10); border-color:rgba(0,229,160,0.18); }
        .insight-card.leve .allergy-icon svg { stroke:var(--v-green2); }

        .allergy-info { flex:1; min-width:0; }
        .allergy-nome { font-size:16px; font-weight:800; color:var(--v-ink); line-height:1.2; }
        .allergy-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
        .tag-pill {
            font-size:10px; font-weight:700; text-transform:uppercase;
            letter-spacing:0.4px; padding:3px 9px; border-radius:100px;
            background:rgba(0,0,0,0.04); color:var(--v-ink3);
        }
        .tag-pill.danger {
            background:rgba(239,68,68,0.12); color:var(--v-bad);
        }
        .allergy-meta { font-size:11px; color:var(--v-ink4); margin-top:8px; font-weight:500; }
        .conflict-box {
            margin-top:10px; padding:9px 11px; border-radius:10px;
            background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.16);
            display:flex; align-items:center; gap:8px;
            font-size:12px; font-weight:700; color:var(--v-bad);
        }
        .conflict-box svg { width:14px; height:14px; stroke:var(--v-bad); fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0; }

        .footer-note {
            font-size:11px; color:var(--v-ink4); font-style:italic;
            text-align:center; padding: 18px var(--v-s6) 8px; line-height:1.5;
        }

        .empty-state { text-align:center; padding: 48px 32px 32px; }
        .empty-icon { width:56px; height:56px; margin:0 auto 14px; opacity:0.35; }
        .empty-icon svg { width:100%; height:100%; stroke:var(--v-ink4); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .empty-title { font-size:15px; font-weight:700; color:var(--v-ink3); margin-bottom:6px; }
        .empty-sub { font-size:13px; color:var(--v-ink4); line-height:1.5; }
        .empty-hint { font-size:12px; color:var(--v-ink4); font-style:italic; margin-top:10px; padding: 0 12px; line-height:1.5; }

        .skel { background:#FFFFFF; border-radius:14px; padding:14px 16px; margin:0 var(--v-s5) 10px; box-shadow:0 1px 12px rgba(0,0,0,0.04); }
        .skel-bar {
            background:linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 100%);
            background-size:200% 100%;
            animation:shimmer 1.5s infinite;
            border-radius:6px; height:14px; margin-bottom:8px;
        }
        .skel-bar.short { width:50%; }
        @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

        .identity-missing { text-align:center; padding: 56px 32px; }
        .identity-missing-avatar {
            width:80px; height:80px; border-radius:50%;
            background:rgba(156,163,175,0.10); border:1px solid rgba(156,163,175,0.20);
            display:flex; align-items:center; justify-content:center;
            margin: 0 auto 18px;
        }
        .identity-missing-avatar svg { width:36px; height:36px; stroke:#9CA3AF; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .identity-missing-title { font-size:17px; font-weight:800; color:var(--v-ink); margin-bottom:8px; letter-spacing:-0.3px; }
        .identity-missing-msg { font-size:13px; color:var(--v-ink3); line-height:1.6; margin-bottom:22px; }
        .identity-missing-btn {
            display:inline-block; padding:14px 24px; border-radius:14px;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            color:#0D0F14; font-weight:700; font-size:14px;
            border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
        }

        .anim { opacity:0; transform:translateY(14px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">

        <div class="patient-subheader anim">
            <div class="btn-back" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div class="patient-avatar-sm" id="avatar">--</div>
            <div class="patient-subheader-info">
                <div class="patient-subheader-name" id="nome">Carregando...</div>
                <div class="patient-subheader-meta" id="meta">&nbsp;</div>
            </div>
            <div class="patient-subheader-count" id="count" style="display:none;">0</div>
        </div>

        <div class="tab-strip anim" style="animation-delay:0.05s;">
            <div class="tab-chip" data-target="medico-exames">Exames</div>
            <div class="tab-chip" data-target="medico-condicoes">Condições</div>
            <div class="tab-chip active" data-target="medico-alergias">Alergias</div>
            <div class="tab-chip" data-target="medico-medicamentos">Medicamentos</div>
        </div>

        <div id="body"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pacienteId = params.get('pacienteId');
const pacienteNome = decodeURIComponent(params.get('nome') || 'Paciente');

function getInitials(n){return (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();}
function calcAge(d){if(!d)return null;let x;if(String(d).includes('/')){const p=String(d).split('/');x=new Date(p[2],p[1]-1,p[0]);}else x=new Date(d);if(isNaN(x.getTime()))return null;return Math.floor((Date.now()-x.getTime())/(365.25*24*60*60*1000));}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setSubheaderLoading() {
    document.getElementById('avatar').textContent = getInitials(pacienteNome);
    document.getElementById('nome').textContent = pacienteNome;
}

function renderSkeleton() {
    document.getElementById('body').innerHTML =
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>' +
        '<div class="section-label">&nbsp;</div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>';
}

function renderIdentityMissing() {
    document.getElementById('count').style.display = 'none';
    document.getElementById('body').innerHTML =
        '<div class="identity-missing anim">' +
        '<div class="identity-missing-avatar"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>' +
        '<div class="identity-missing-title">Paciente sem vínculo</div>' +
        '<div class="identity-missing-msg">Este paciente respondeu uma pré-consulta antes de criar conta no vita id. Sem cadastro, não há dados clínicos para mostrar aqui.</div>' +
        '<button class="identity-missing-btn" onclick="history.back()">Voltar ao painel</button>' +
        '</div>';
}

function renderEmpty() {
    var c = document.getElementById('count');
    c.textContent = '0'; c.classList.add('safe'); c.style.display = 'inline-block';
    document.getElementById('body').innerHTML =
        '<div class="empty-state anim">' +
        '<div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9a9 9 0 019-9 9 9 0 019 9z"/></svg></div>' +
        '<div class="empty-title">Nenhuma alergia registrada</div>' +
        '<div class="empty-sub">Este paciente não declarou alergias medicamentosas, alimentares ou ambientais.</div>' +
        '<div class="empty-hint">Ausência de registro não significa ausência de alergia. Confirme verbalmente antes de prescrever.</div>' +
        '</div>';
}

function gravidadeOrder(g) {
    var v = (g||'').toUpperCase();
    if (v.indexOf('GRAVE') !== -1 || v.indexOf('SEVERA') !== -1 || v.indexOf('ALTA') !== -1) return 0;
    if (v.indexOf('MODERAD') !== -1) return 1;
    return 2;
}
function gravidadeKey(g) {
    var i = gravidadeOrder(g);
    return ['grave','moderada','leve'][i];
}
function gravidadeLabel(g) {
    var i = gravidadeOrder(g);
    return ['Grave','Moderada','Leve'][i];
}

function tipoLabel(t) {
    var v = (t||'').toLowerCase();
    if (v.indexOf('medic') !== -1 || v.indexOf('farmac') !== -1) return 'Medicamento';
    if (v.indexOf('alim') !== -1 || v.indexOf('food') !== -1) return 'Alimento';
    if (v.indexOf('ambient') !== -1 || v.indexOf('contat') !== -1) return 'Ambiental';
    return t || '';
}

function findMedConflicts(alergiaNome, medicamentosAtivos) {
    var lower = (alergiaNome||'').toLowerCase().trim();
    if (!lower) return [];
    return medicamentosAtivos.filter(function(m) {
        var n = (m.nome||'').toLowerCase();
        if (!n) return false;
        return n.indexOf(lower) !== -1 || lower.indexOf(n) !== -1;
    }).map(function(m){ return m.nome; });
}

function renderConteudo(alergias, medicamentos) {
    var medAtivos = (medicamentos||[]).filter(function(m){return m.ativo !== false;});
    var c = document.getElementById('count');

    if (!alergias || alergias.length === 0) { renderEmpty(); return; }

    // Ordena por gravidade
    var ordenadas = alergias.slice().sort(function(a,b){return gravidadeOrder(a.gravidade) - gravidadeOrder(b.gravidade);});
    var temGraves = ordenadas.some(function(a){return gravidadeOrder(a.gravidade) === 0;});

    c.textContent = ordenadas.length + ' ' + (ordenadas.length === 1 ? 'alergia' : 'alergias');
    c.classList.toggle('safe', !temGraves);
    c.style.display = 'inline-block';

    var html = '';

    // Painel "Antes de prescrever"
    var pillsHtml = ordenadas.map(function(a){
        return '<div class="pill-allergy ' + gravidadeKey(a.gravidade) + '">' + escapeHtml(a.nome) + '</div>';
    }).join('');
    html += '<div class="panel-presc anim ' + (temGraves ? '' : 'safe') + '" style="animation-delay:0.05s;">' +
        '<div class="panel-presc-title">' +
            '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
            '<span>Antes de prescrever, revise</span>' +
        '</div>' +
        '<div class="pill-wrap">' + pillsHtml + '</div>' +
        '<div class="panel-presc-actions">' +
            '<button class="btn-copy" id="btnCopy" onclick="copyList()">' +
            '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
            '<span>Copiar lista</span></button>' +
        '</div>' +
        '</div>';

    // Sections por gravidade
    var grupos = { grave:[], moderada:[], leve:[] };
    ordenadas.forEach(function(a){ grupos[gravidadeKey(a.gravidade)].push(a); });
    var sections = [
        { key:'grave',    label:'Graves',    cls:'' },
        { key:'moderada', label:'Moderadas', cls:'atencao' },
        { key:'leve',     label:'Leves',     cls:'leve' },
    ];

    var delay = 0.10;
    sections.forEach(function(sec){
        var lista = grupos[sec.key];
        if (lista.length === 0) return;
        html += '<div class="section-label">' + sec.label + '</div>';
        lista.forEach(function(a){
            var conflitos = findMedConflicts(a.nome, medAtivos);
            html += '<div class="insight-card ' + sec.cls + ' anim" style="animation-delay:' + delay.toFixed(2) + 's;">' +
                '<div class="allergy-detail">' +
                '<div class="allergy-icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>' +
                '<div class="allergy-info">' +
                '<div class="allergy-nome">' + escapeHtml(a.nome) + '</div>' +
                '<div class="allergy-tags">' +
                    '<span class="tag-pill">' + gravidadeLabel(a.gravidade) + '</span>' +
                    (a.tipo ? '<span class="tag-pill">' + escapeHtml(tipoLabel(a.tipo)) + '</span>' : '') +
                    (a.fonte === 'scan' ? '<span class="tag-pill">Escaneado</span>' : '') +
                '</div>' +
                (conflitos.length ? '<div class="conflict-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Presente em ' + escapeHtml(conflitos.join(', ')) + '</span></div>' : '') +
                '</div></div></div>';
            delay += 0.05;
        });
    });

    html += '<div class="footer-note">Dados autodeclarados pelo paciente. Confirme antes de prescrever.</div>';

    document.getElementById('body').innerHTML = html;
}

window.copyList = function() {
    try {
        var nomes = (window._alergias || []).map(function(a){return a.nome;}).join(', ');
        navigator.clipboard.writeText(nomes).then(function(){
            var b = document.getElementById('btnCopy');
            if (!b) return;
            b.classList.add('copied');
            var span = b.querySelector('span'); if (span) span.textContent = 'Copiado!';
            setTimeout(function(){ b.classList.remove('copied'); if (span) span.textContent = 'Copiar lista'; }, 2000);
        });
    } catch(e) {}
};

document.querySelectorAll('.tab-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
        var target = chip.getAttribute('data-target');
        if (!target || chip.classList.contains('active')) return;
        var url = target + '.html?pacienteId=' + encodeURIComponent(pacienteId || '') +
                  '&nome=' + encodeURIComponent(pacienteNome);
        window.location.href = url;
    });
});

async function init() {
    setSubheaderLoading();
    if (!pacienteId) { renderIdentityMissing(); return; }
    renderSkeleton();
    try {
        var data = await vitaeAPI.getPerfilPacienteMedico(pacienteId);
        var p = data.paciente || {};
        var perfil = p.perfilSaude || {};
        var idade = calcAge(perfil.dataNascimento);
        var sangue = perfil.tipoSanguineo || '';
        var sangueFmt = sangue ? sangue.replace('_POS','+').replace('_NEG','-') : '';
        var partes = [];
        if (idade) partes.push(idade + ' anos');
        if (sangueFmt) partes.push(sangueFmt);
        document.getElementById('meta').textContent = partes.join(' · ') || ' ';
        if (p.fotoUrl) {
            document.getElementById('avatar').innerHTML = '<img src="' + p.fotoUrl + '" alt="">';
        }
        window._alergias = p.alergias || [];
        renderConteudo(p.alergias || [], p.medicamentos || []);
    } catch (err) {
        renderIdentityMissing();
    }
}
init();
</script>
</body>
</html>
