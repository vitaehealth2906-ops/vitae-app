[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]

[phases.install]
cmds = ["cd backend && npm install"]

[phases.build]
cmds = ["cd backend && npx prisma generate"]

[start]
cmd = "cd backend && echo '[DEPLOY] running prisma db push...' && npx prisma db push --accept-data-loss --skip-generate && echo '[DEPLOY] db push OK' && node src/index.js"
