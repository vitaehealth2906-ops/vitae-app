[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]

[phases.install]
cmds = ["cd backend && npm install"]

[phases.build]
cmds = ["cd backend && npx prisma db push --accept-data-loss && npx prisma generate"]

[start]
cmd = "cd backend && npx prisma db push --accept-data-loss --skip-generate; node src/index.js"
