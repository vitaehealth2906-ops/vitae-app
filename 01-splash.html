<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Splash</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }

        /* Phone mockup */
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }

        /* Splash content */
        .splash {
            height:100%; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            position:relative; overflow:hidden;
        }

        /* Ambient glow */
        .glow {
            position:absolute; width:300px; height:300px;
            border-radius:50%;
            background: radial-gradient(circle, rgba(197,165,90,0.12) 0%, transparent 70%);
            top:50%; left:50%; transform:translate(-50%,-50%);
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100% { opacity:0.5; transform:translate(-50%,-50%) scale(0.9); }
            50% { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
        }

        /* Logo */
        .logo-container {
            position:relative; z-index:2;
            opacity:0;
            animation: logoFadeIn 1.2s ease forwards 0.3s;
        }
        @keyframes logoFadeIn {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        .logo-text {
            font-family:'Playfair Display', serif;
            font-size:52px; font-weight:700;
            letter-spacing:8px;
            color:#C5A55A;
            text-transform:uppercase;
        }

        .logo-line {
            width:60px; height:1px;
            background: linear-gradient(90deg, transparent, #C5A55A, transparent);
            margin:16px auto;
            opacity:0;
            animation: lineFadeIn 0.8s ease forwards 1s;
        }
        @keyframes lineFadeIn {
            from { opacity:0; width:0; }
            to { opacity:1; width:60px; }
        }

        .tagline {
            font-family:'Inter', sans-serif;
            font-size:12px; font-weight:400;
            letter-spacing:4px;
            color:rgba(197,165,90,0.5);
            text-transform:uppercase;
            opacity:0;
            animation: tagFadeIn 0.8s ease forwards 1.3s;
        }
        @keyframes tagFadeIn {
            from { opacity:0; }
            to { opacity:1; }
        }

        /* Gold particles */
        .particles {
            position:absolute; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:1;
        }
        .particle {
            position:absolute;
            width:2px; height:2px;
            background:#C5A55A;
            border-radius:50%;
            opacity:0;
            animation: particleFloat 4s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% { opacity:0; transform:translateY(0); }
            20% { opacity:0.6; }
            80% { opacity:0.2; }
            100% { opacity:0; transform:translateY(-200px); }
        }

        /* Redirect indicator */
        .redirect {
            position:absolute; bottom:120px;
            opacity:0;
            animation: redirectShow 0.5s ease forwards 2s;
        }
        @keyframes redirectShow {
            to { opacity:1; }
        }
        .loading-dots {
            display:flex; gap:6px;
        }
        .loading-dots span {
            width:6px; height:6px;
            border-radius:50%;
            background:rgba(197,165,90,0.3);
            animation: dotPulse 1.2s ease infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay:0.2s; }
        .loading-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes dotPulse {
            0%,100% { background:rgba(197,165,90,0.2); transform:scale(1); }
            50% { background:rgba(197,165,90,0.7); transform:scale(1.3); }
        }

        /* Exit transition — curtain to black */
        .curtain {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A;
            opacity:0; z-index:30;
            pointer-events:none;
        }
        .curtain.active {
            animation: curtainClose 1.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes curtainClose {
            0% { opacity:0; }
            100% { opacity:1; }
        }

        .splash.exiting .logo-container {
            animation: logoShrink 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        .splash.exiting .glow {
            animation: glowDim 1s ease forwards;
        }
        .splash.exiting .particles,
        .splash.exiting .redirect {
            animation: quickFade 0.5s ease forwards;
        }

        @keyframes logoShrink {
            to { opacity:0; transform:scale(0.85); filter:blur(4px); }
        }
        @keyframes glowDim {
            to { opacity:0; }
        }
        @keyframes quickFade {
            to { opacity:0; }
        }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="splash">
        <div class="glow"></div>

        <div class="particles">
            <div class="particle" style="left:20%;top:80%;animation-delay:0s;"></div>
            <div class="particle" style="left:35%;top:75%;animation-delay:0.8s;"></div>
            <div class="particle" style="left:55%;top:85%;animation-delay:1.5s;"></div>
            <div class="particle" style="left:70%;top:70%;animation-delay:0.4s;"></div>
            <div class="particle" style="left:85%;top:78%;animation-delay:2s;"></div>
            <div class="particle" style="left:15%;top:90%;animation-delay:1.2s;"></div>
            <div class="particle" style="left:45%;top:88%;animation-delay:0.6s;"></div>
            <div class="particle" style="left:65%;top:82%;animation-delay:1.8s;"></div>
        </div>

        <div class="logo-container">
            <div class="logo-text">VITAE</div>
            <div class="logo-line"></div>
            <div class="tagline">Know Your Biology</div>
        </div>

        <div class="redirect">
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
    <div class="curtain" id="curtain"></div>
</div>

<script src="api.js"></script>
<script>
    // Se ja esta logado, pula direto para o perfil
    const destino = vitaeAPI.isLoggedIn() ? '08-perfil.html' : '02-slides.html';

    // At 6.5s: logo shrinks + blur, glow dims, particles fade
    setTimeout(() => {
        document.querySelector('.splash').classList.add('exiting');
    }, 6500);

    // At 7s: black curtain starts closing
    setTimeout(() => {
        document.getElementById('curtain').classList.add('active');
    }, 7000);

    // At 8.2s: navigate (curtain fully black, seamless)
    setTimeout(() => {
        window.location.href = destino;
    }, 8200);
</script>
</body>
</html>
