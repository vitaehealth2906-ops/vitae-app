<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova alergia — vita id</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  .content {
    padding: 60px 0 120px;
  }

  .app-header {
    padding: 14px 20px 8px;
    gap: 12px;
  }
  .app-header h1 {
    flex: 1;
    font-family: var(--font-display);
    font-size: var(--t-2xl);
    font-weight: 500;
    letter-spacing: -0.4px;
  }
  .header-cancel {
    background: transparent;
    border: none;
    color: var(--text-2);
    font-size: var(--t-sm);
    font-weight: 500;
    cursor: pointer;
    padding: 8px 4px;
    font-family: var(--font-ui);
  }
  .header-cancel:hover { color: var(--text); }

  .form-card {
    background: var(--surface);
    border-radius: var(--r-xl);
    margin: 8px 16px;
    padding: 20px 18px;
    border: 1px solid var(--border-2);
    box-shadow: var(--sh-sm);
  }

  .field { margin-bottom: 24px; }
  .field:last-child { margin-bottom: 4px; }

  .field-label {
    display: block;
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -0.1px;
  }

  /* Input grande */
  .input-lg {
    width: 100%;
    height: 56px;
    padding: 0 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: var(--font-ui);
    font-size: var(--t-base);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .input-lg::placeholder { color: var(--text-3); }
  .input-lg:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(10, 79, 74, 0.08);
  }

  /* Chips populares */
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-ui);
  }
  .chip:hover {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary);
  }
  .chip.is-active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--text-inv);
  }

  /* Segmented severity */
  .severity-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .sev-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px 8px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .sev-card:hover { border-color: var(--text-3); }
  .sev-card.is-selected {
    border: 2px solid var(--primary);
    padding: 13px 7px 11px;
    background: var(--primary-soft);
  }
  .sev-name {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text);
    text-transform: uppercase;
  }
  .sev-card .pill {
    padding: 2px 8px;
    font-size: 10px;
  }

  .microcopy {
    font-size: var(--t-xs);
    color: var(--text-2);
    margin-top: 10px;
    line-height: 1.5;
    padding: 0 2px;
  }

  /* Date input */
  .date-input {
    width: 100%;
    height: 52px;
    padding: 0 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .date-input:hover { border-color: var(--text-3); }
  .date-input:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(10, 79, 74, 0.08);
  }
  .date-input svg {
    width: 18px;
    height: 18px;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .date-value {
    flex: 1;
    font-size: var(--t-base);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* Textarea */
  .textarea-lg {
    width: 100%;
    min-height: 92px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: var(--font-ui);
    font-size: var(--t-base);
    color: var(--text);
    resize: vertical;
    line-height: 1.5;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .textarea-lg::placeholder { color: var(--text-3); }
  .textarea-lg:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(10, 79, 74, 0.08);
  }

  /* Rodape fixo */
  .footer-fixed {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 16px 28px;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(20px) saturate(120%);
    -webkit-backdrop-filter: blur(20px) saturate(120%);
    border-top: 1px solid var(--border-2);
    z-index: 50;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <span>100%</span>
  </div>

  <div class="content">

    <header class="app-header">
      <button class="back-btn" aria-label="Voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <h1>Nova alergia</h1>
      <button class="header-cancel">Cancelar</button>
    </header>

    <section class="form-card">

      <!-- Campo 1: Nome -->
      <div class="field">
        <label class="field-label" for="alergia-nome">A que voce tem alergia?</label>
        <input id="alergia-nome" class="input-lg" type="text" placeholder="ex: Penicilina, Dipirona, camarao..." autocomplete="off">
        <div class="chip-row">
          <button class="chip" type="button">Penicilina</button>
          <button class="chip" type="button">Dipirona</button>
          <button class="chip" type="button">AAS</button>
          <button class="chip" type="button">Amendoim</button>
          <button class="chip" type="button">Lactose</button>
        </div>
      </div>

      <!-- Campo 2: Gravidade -->
      <div class="field">
        <label class="field-label">Quao forte e a reacao?</label>
        <div class="severity-grid" role="radiogroup">
          <button class="sev-card" type="button" role="radio" aria-checked="false">
            <span class="pill ok">Leve</span>
            <span class="sev-name">Leve</span>
          </button>
          <button class="sev-card is-selected" type="button" role="radio" aria-checked="true">
            <span class="pill warn">Moderada</span>
            <span class="sev-name">Moderada</span>
          </button>
          <button class="sev-card" type="button" role="radio" aria-checked="false">
            <span class="pill danger">Grave</span>
            <span class="sev-name">Grave</span>
          </button>
        </div>
        <p class="microcopy">Grave = anafilaxia, internacao, risco de morte</p>
      </div>

      <!-- Campo 3: Tipo de reacao -->
      <div class="field">
        <label class="field-label">Que tipo de reacao?</label>
        <div class="chip-row">
          <button class="chip is-active" type="button">Coceira</button>
          <button class="chip" type="button">Urticaria</button>
          <button class="chip is-active" type="button">Inchaco</button>
          <button class="chip" type="button">Falta de ar</button>
          <button class="chip" type="button">Tontura</button>
          <button class="chip" type="button">Outra</button>
        </div>
      </div>

      <!-- Campo 4: Ultima vez -->
      <div class="field">
        <label class="field-label" for="alergia-data">Quando foi a ultima vez?</label>
        <div class="date-input" id="alergia-data" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="date-value">Mar/2024</span>
        </div>
      </div>

      <!-- Campo 5: Observacao -->
      <div class="field">
        <label class="field-label" for="alergia-obs">Quer contar mais detalhes? (opcional)</label>
        <textarea id="alergia-obs" class="textarea-lg" rows="3" placeholder="ex: comecou depois de tomar 2 comprimidos, foi pro PS..."></textarea>
      </div>

    </section>

  </div>

  <div class="footer-fixed">
    <button class="btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Salvar alergia
    </button>
  </div>

</div>

</body>
</html>
