<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vita id — Adicionar medicamento</title>
<link rel="stylesheet" href="_tokens.css" />
<style>
  /* Tela base (lista atrás do sheet) */
  .bg-screen {
    position: absolute;
    inset: 0;
    background: var(--bg);
    overflow: hidden;
  }
  .bg-header {
    padding: 60px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bg-header h1 {
    font-family: var(--font-display);
    font-size: var(--t-2xl);
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .bg-list {
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    filter: blur(2px);
    opacity: 0.55;
  }
  .bg-list .row {
    background: var(--surface);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    border: 1px solid var(--border-2);
    box-shadow: var(--sh-sm);
    height: 64px;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 20, 22, 0.42);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 200;
    animation: fadeIn 0.25s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Bottom sheet */
  .sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 580px;
    background: var(--surface);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    z-index: 201;
    box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.18);
    display: flex;
    flex-direction: column;
    animation: slideUp 0.36s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    overflow: hidden;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  /* Handle drag */
  .sheet-handle {
    width: 38px;
    height: 4px;
    border-radius: 999px;
    background: rgba(10, 79, 74, 0.18);
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* Header do sheet */
  .sheet-head {
    padding: 18px 24px 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .sheet-head .titles h2 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.6px;
    line-height: 1.15;
    color: var(--text);
  }
  .sheet-head .titles p {
    margin-top: 6px;
    font-size: var(--t-sm);
    color: var(--text-2);
    line-height: 1.5;
  }
  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--text-2);
    transition: all 0.15s;
  }
  .close-btn:hover {
    background: var(--bg);
    color: var(--text);
  }
  .close-btn svg { width: 16px; height: 16px; }

  /* Conteúdo cards */
  .sheet-body {
    padding: 16px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    overflow-y: auto;
  }

  .opt-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-xl);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
    font-family: var(--font-ui);
  }
  .opt-card:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
    transform: translateY(-1px);
    box-shadow: var(--sh-md);
  }
  .opt-card:active { transform: scale(0.99); }

  .opt-card .icon-box {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .opt-card.alt .icon-box {
    background: var(--primary-soft);
    color: var(--primary);
    border: 1px solid var(--border);
  }
  .opt-card .icon-box svg { width: 26px; height: 26px; }

  .opt-card .body { flex: 1; min-width: 0; }
  .opt-card .body .label {
    font-family: var(--font-display);
    font-size: var(--t-lg);
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .opt-card .body .desc {
    font-size: var(--t-sm);
    color: var(--text-2);
    line-height: 1.45;
  }

  .opt-card .chev {
    width: 20px;
    height: 20px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .opt-card:hover .chev { color: var(--primary); }

  /* Microcopy */
  .microcopy {
    margin: 16px 20px 0;
    padding: 12px 16px;
    background: var(--surface-2);
    border-radius: var(--r-md);
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-2);
    font-size: var(--t-sm);
    line-height: 1.45;
  }
  .microcopy svg {
    width: 18px;
    height: 18px;
    color: var(--primary);
    flex-shrink: 0;
  }

  /* Footer */
  .sheet-foot {
    padding: 16px 20px 28px;
    flex-shrink: 0;
  }
  .btn.ghost-wide {
    background: transparent;
    color: var(--text-2);
    font-weight: 500;
    border-radius: var(--r-md);
  }
  .btn.ghost-wide:hover {
    background: var(--surface-2);
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <span>100%</span>
    </div>

    <!-- Tela base (medicamentos) atrás -->
    <div class="bg-screen">
      <div class="bg-header">
        <h1>Medicamentos</h1>
      </div>
      <div class="bg-list">
        <div class="row"></div>
        <div class="row"></div>
        <div class="row"></div>
        <div class="row"></div>
        <div class="row"></div>
      </div>
    </div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Bottom Sheet -->
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet-handle"></div>

      <div class="sheet-head">
        <div class="titles">
          <h2 id="sheet-title">Adicionar medicamento</h2>
          <p>Como prefere fazer?</p>
        </div>
        <button class="close-btn" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="sheet-body">
        <!-- Opção 1: Escanear receita -->
        <button class="opt-card">
          <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
          <div class="body">
            <div class="label">Escanear receita</div>
            <div class="desc">Tira foto da receita, leio em segundos</div>
          </div>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- Opção 2: Digitar manualmente -->
        <button class="opt-card alt">
          <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="2" ry="2"/>
              <line x1="6" y1="10" x2="6" y2="10"/>
              <line x1="10" y1="10" x2="10" y2="10"/>
              <line x1="14" y1="10" x2="14" y2="10"/>
              <line x1="18" y1="10" x2="18" y2="10"/>
              <line x1="6" y1="14" x2="6" y2="14"/>
              <line x1="18" y1="14" x2="18" y2="14"/>
              <line x1="10" y1="14" x2="14" y2="14"/>
            </svg>
          </div>
          <div class="body">
            <div class="label">Digitar manualmente</div>
            <div class="desc">Para adicionar item por item</div>
          </div>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- Microcopy -->
        <div class="microcopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          <span>Receita digital também funciona — faça print no celular</span>
        </div>
      </div>

      <div class="sheet-foot">
        <button class="btn ghost-wide">Cancelar</button>
      </div>
    </div>
  </div>
</body>
</html>
