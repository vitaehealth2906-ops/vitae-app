<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pré-consulta — Responder · vita id</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  .content {
    padding: 60px 0 40px;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .pc-header {
    padding: 8px 20px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pc-close {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    flex-shrink: 0;
    margin-left: -4px;
  }
  .pc-close:hover { background: var(--surface-2); }
  .pc-close svg { width: 18px; height: 18px; }

  .pc-counter {
    flex: 1;
    text-align: center;
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--text-2);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.4px;
  }

  .pc-spacer {
    width: 36px;
    flex-shrink: 0;
  }

  /* Progress bar */
  .pc-progress {
    margin: 16px 20px 0;
    height: 4px;
    background: var(--border-2);
    border-radius: var(--r-pill);
    overflow: hidden;
  }
  .pc-progress-fill {
    height: 100%;
    width: 50%;
    background: var(--primary);
    border-radius: var(--r-pill);
    transition: width 0.4s ease;
  }

  /* Hero */
  .pc-hero {
    padding: 36px 24px 28px;
  }
  .pc-question {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    line-height: 1.18;
    letter-spacing: -0.6px;
    color: var(--text);
    margin-bottom: 12px;
  }
  .pc-subtitle {
    font-size: var(--t-base);
    color: var(--text-2);
    line-height: 1.45;
  }

  /* Toggle */
  .pc-toggle {
    margin: 0 24px 28px;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: var(--r-pill);
    padding: 4px;
    display: flex;
    gap: 4px;
  }
  .pc-toggle-btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: var(--r-pill);
    border: none;
    background: transparent;
    font-family: var(--font-ui);
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .pc-toggle-btn svg { width: 14px; height: 14px; }
  .pc-toggle-btn.active {
    background: var(--primary);
    color: var(--text-inv);
    box-shadow: var(--sh-sm);
  }

  /* Recording area */
  .pc-record {
    padding: 12px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pc-mic-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--primary);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s;
    box-shadow: 0 4px 16px rgba(10, 79, 74, 0.08);
  }
  .pc-mic-circle:active { transform: scale(0.96); }
  .pc-mic-circle svg {
    width: 40px;
    height: 40px;
    color: var(--primary);
  }

  .pc-record-hint {
    margin-top: 22px;
    font-size: var(--t-base);
    color: var(--text);
    font-weight: 500;
  }
  .pc-timer {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: var(--t-lg);
    font-weight: 500;
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }

  /* Chips row */
  .pc-chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 0 24px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .pc-chip {
    padding: 9px 16px;
    border-radius: var(--r-pill);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-2);
    font-family: var(--font-ui);
    font-size: var(--t-sm);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pc-chip:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border);
  }

  /* Footer */
  .pc-footer {
    margin-top: auto;
    padding: 20px 24px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    color: var(--text-3);
    border-top: 1px solid var(--border-2);
  }
  .pc-footer svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }
  .pc-footer span {
    font-size: var(--t-xs);
    line-height: 1.4;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <span>vita id</span>
    </div>

    <div class="content">
      <!-- Header -->
      <div class="pc-header">
        <button class="pc-close" aria-label="Sair">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="pc-counter">2 de 4</div>
        <div class="pc-spacer"></div>
      </div>

      <!-- Progress -->
      <div class="pc-progress">
        <div class="pc-progress-fill"></div>
      </div>

      <!-- Hero -->
      <div class="pc-hero">
        <h1 class="pc-question">Quando essa dor começou?</h1>
        <p class="pc-subtitle">Pode ser uma data aproximada ou "faz uns 3 dias" — qualquer coisa ajuda</p>
      </div>

      <!-- Toggle -->
      <div class="pc-toggle">
        <button class="pc-toggle-btn active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
          Gravar áudio
        </button>
        <button class="pc-toggle-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Digitar
        </button>
      </div>

      <!-- Recording area -->
      <div class="pc-record">
        <button class="pc-mic-circle" aria-label="Começar a gravar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <div class="pc-record-hint">Toca pra começar a gravar</div>
        <div class="pc-timer">00:00</div>
      </div>

      <!-- Chips -->
      <div class="pc-chips">
        <button class="pc-chip">Não sei responder</button>
        <button class="pc-chip">Pular essa pergunta</button>
      </div>

      <!-- Footer -->
      <div class="pc-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>Tudo que você gravar fica criptografado. Só a Dra. Helena vai ouvir.</span>
      </div>
    </div>
  </div>
</body>
</html>
