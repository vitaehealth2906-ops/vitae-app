<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartão RG · vita id</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  .content {
    background: linear-gradient(180deg, var(--bg) 0%, var(--surface-2) 100%);
  }

  /* Header */
  .app-header {
    padding: 12px 20px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .app-header .title {
    flex: 1;
    text-align: center;
    font-family: var(--font-display);
    font-size: var(--t-xl);
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .icon-btn svg { width: 16px; height: 16px; color: var(--text); }

  /* Hero card */
  .card-stage {
    padding: 32px 20px 20px;
    display: flex;
    justify-content: center;
    perspective: 1200px;
  }
  .rg-card {
    width: 340px;
    height: 215px;
    border-radius: 16px;
    background: linear-gradient(135deg, #0A4F4A 0%, #1A2E2C 100%);
    color: #FFFFFF;
    padding: 24px;
    position: relative;
    box-shadow:
      0 24px 48px rgba(10, 79, 74, 0.32),
      0 8px 16px rgba(0, 0, 0, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  /* Subtle texture */
  .rg-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 85% 15%, rgba(212, 165, 116, 0.10) 0%, transparent 40%),
      radial-gradient(circle at 10% 90%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .rg-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  .rg-brand {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #FFFFFF;
  }
  .rg-premium {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: var(--r-pill);
    background: linear-gradient(135deg, #D4A574 0%, #B8895A 100%);
    color: #1A2E2C;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .rg-center {
    position: relative;
    z-index: 1;
  }
  .rg-name {
    font-family: var(--font-ui);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #FFFFFF;
    line-height: 1.1;
  }
  .rg-num {
    margin-top: 4px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.62);
    letter-spacing: 0.4px;
    font-variant-numeric: tabular-nums;
  }

  .rg-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .rg-cols {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 16px;
    flex: 1;
  }
  .rg-col-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 3px;
  }
  .rg-col-value {
    font-size: 11px;
    font-weight: 600;
    color: #FFFFFF;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.2px;
  }
  .rg-col-value.blood {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: #FF9B8A;
    letter-spacing: -0.3px;
    line-height: 1;
  }

  .rg-qr {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: #FFFFFF;
    padding: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .rg-qr svg { width: 100%; height: 100%; display: block; }

  /* Instrucao */
  .hint {
    margin: 24px 16px 0;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .hint .ico {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--primary-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    flex-shrink: 0;
  }
  .hint .ico svg { width: 16px; height: 16px; }
  .hint .txt { flex: 1; }
  .hint .ttl {
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .hint .sub {
    font-size: var(--t-xs);
    color: var(--text-2);
    line-height: 1.4;
  }

  /* Acoes */
  .actions-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 20px 16px 8px;
  }
  .act-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 6px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .act-btn:hover {
    background: var(--surface-2);
    border-color: var(--primary);
  }
  .act-btn svg { width: 20px; height: 20px; color: var(--primary); }
  .act-btn .lbl {
    font-size: var(--t-xs);
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.1px;
  }

  /* Rodape */
  .foot {
    padding: 20px 24px 24px;
    text-align: center;
    font-size: var(--t-xs);
    color: var(--text-3);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <span>100%</span>
  </div>

  <div class="content">
    <!-- Header -->
    <div class="app-header">
      <button class="back-btn" aria-label="Voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="title">Cartão RG</div>
      <button class="icon-btn" aria-label="Baixar imagem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>

    <!-- Cartao hero -->
    <div class="card-stage">
      <div class="rg-card animate-up">
        <div class="rg-top">
          <span class="rg-brand">vita id</span>
          <span class="rg-premium">Premium</span>
        </div>

        <div class="rg-center">
          <div class="rg-name">LUCAS BORELLI</div>
          <div class="rg-num">RG da Saúde · #001234567</div>
        </div>

        <div class="rg-bottom">
          <div class="rg-cols">
            <div>
              <div class="rg-col-label">Tipo</div>
              <div class="rg-col-value blood">A+</div>
            </div>
            <div>
              <div class="rg-col-label">Nascimento</div>
              <div class="rg-col-value">12/03/2008</div>
            </div>
            <div>
              <div class="rg-col-label">Emergência</div>
              <div class="rg-col-value">(11) 98765-4321</div>
            </div>
          </div>
          <div class="rg-qr" aria-label="QR Code do cartão">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
              <rect width="40" height="40" fill="#FFFFFF"/>
              <g fill="#0A4F4A">
                <!-- Finder TL -->
                <rect x="2" y="2" width="10" height="10"/>
                <rect x="4" y="4" width="6" height="6" fill="#FFFFFF"/>
                <rect x="6" y="6" width="2" height="2"/>
                <!-- Finder TR -->
                <rect x="28" y="2" width="10" height="10"/>
                <rect x="30" y="4" width="6" height="6" fill="#FFFFFF"/>
                <rect x="32" y="6" width="2" height="2"/>
                <!-- Finder BL -->
                <rect x="2" y="28" width="10" height="10"/>
                <rect x="4" y="30" width="6" height="6" fill="#FFFFFF"/>
                <rect x="6" y="32" width="2" height="2"/>
                <!-- Data modules (decorativo) -->
                <rect x="14" y="4" width="2" height="2"/>
                <rect x="18" y="4" width="2" height="2"/>
                <rect x="22" y="4" width="2" height="2"/>
                <rect x="14" y="8" width="2" height="2"/>
                <rect x="20" y="8" width="2" height="2"/>
                <rect x="24" y="8" width="2" height="2"/>
                <rect x="4" y="14" width="2" height="2"/>
                <rect x="8" y="14" width="2" height="2"/>
                <rect x="14" y="14" width="2" height="2"/>
                <rect x="18" y="14" width="2" height="2"/>
                <rect x="22" y="14" width="2" height="2"/>
                <rect x="28" y="14" width="2" height="2"/>
                <rect x="32" y="14" width="2" height="2"/>
                <rect x="36" y="14" width="2" height="2"/>
                <rect x="6" y="18" width="2" height="2"/>
                <rect x="12" y="18" width="2" height="2"/>
                <rect x="16" y="18" width="2" height="2"/>
                <rect x="20" y="18" width="2" height="2"/>
                <rect x="26" y="18" width="2" height="2"/>
                <rect x="30" y="18" width="2" height="2"/>
                <rect x="34" y="18" width="2" height="2"/>
                <rect x="4" y="22" width="2" height="2"/>
                <rect x="10" y="22" width="2" height="2"/>
                <rect x="14" y="22" width="2" height="2"/>
                <rect x="18" y="22" width="2" height="2"/>
                <rect x="24" y="22" width="2" height="2"/>
                <rect x="28" y="22" width="2" height="2"/>
                <rect x="32" y="22" width="2" height="2"/>
                <rect x="36" y="22" width="2" height="2"/>
                <rect x="14" y="26" width="2" height="2"/>
                <rect x="18" y="26" width="2" height="2"/>
                <rect x="22" y="26" width="2" height="2"/>
                <rect x="26" y="26" width="2" height="2"/>
                <rect x="32" y="26" width="2" height="2"/>
                <rect x="14" y="30" width="2" height="2"/>
                <rect x="20" y="30" width="2" height="2"/>
                <rect x="24" y="30" width="2" height="2"/>
                <rect x="28" y="30" width="2" height="2"/>
                <rect x="34" y="30" width="2" height="2"/>
                <rect x="16" y="34" width="2" height="2"/>
                <rect x="22" y="34" width="2" height="2"/>
                <rect x="26" y="34" width="2" height="2"/>
                <rect x="30" y="34" width="2" height="2"/>
                <rect x="36" y="34" width="2" height="2"/>
              </g>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Hint verso -->
    <div class="hint animate-up" style="animation-delay:.08s">
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11V6a2 2 0 0 1 4 0v4"/>
          <path d="M13 10V4a2 2 0 0 1 4 0v8"/>
          <path d="M17 9a2 2 0 0 1 4 0v6a7 7 0 0 1-7 7h-2a7 7 0 0 1-7-7v-2a2 2 0 0 1 4 0"/>
        </svg>
      </div>
      <div class="txt">
        <div class="ttl">Toca pra ver o verso</div>
        <div class="sub">O verso mostra: alergias, medicamentos e contato de emergência.</div>
      </div>
    </div>

    <!-- Acoes -->
    <div class="actions-row animate-up" style="animation-delay:.12s">
      <button class="act-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>

        <span class="lbl">Salvar imagem</span>

      <button class="act-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="13" rx="2"/>
          <path d="M2 10h20"/>

      <button class="act-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        <span class="lbl">Imprimir</span>
      </button>
    </div>

    <!-- Rodape -->
    <div class="foot">
      Imprima e leve na carteira. Em emergência, paramédico vê tudo.
    </div>
  </div>
</div>
