<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — RG de Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }

        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh;
            background:#F8FAFB; border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(34,197,94,0.15), 0 0 0 3px #e5e7eb, 0 40px 120px rgba(0,0,0,0.45);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#F8FAFB;
            border-radius:0 0 20px 20px; z-index:10;
        }

        /* ── Header ── */
        .header {
            position:absolute; top:58px; left:28px; right:28px;
            display:flex; align-items:center; z-index:5;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(0,0,0,0.06); border:1px solid rgba(0,0,0,0.09);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:22px; color:rgba(17,24,39,0.55);
            line-height:1;
        }
        .header-title {
            flex:1; text-align:center;
            font-family:'Playfair Display',serif; font-size:20px; font-weight:700;
            color:#111827;
        }

        /* ── Content ── */
        .content {
            height:100%; overflow-y:auto; padding:110px 28px 48px;
            display:flex; flex-direction:column; align-items:center;
        }

        /* ── Ambient glow ── */
        .ambient {
            position:absolute; top:60px; left:50%; transform:translateX(-50%);
            width:340px; height:340px; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse at 50% 40%,
                rgba(74,222,128,0.20) 0%,
                rgba(56,189,248,0.12) 45%,
                transparent 75%);
            animation: ambientPulse 4s ease-in-out infinite;
        }
        @keyframes ambientPulse {
            0%,100% { opacity:.7; transform:translateX(-50%) scale(1); }
            50%      { opacity:1;  transform:translateX(-50%) scale(1.06); }
        }

        /* ── QR Stage ── */
        .qr-stage {
            position:relative; z-index:1;
            display:flex; align-items:center; justify-content:center;
            margin-bottom:28px;
        }

        /* Outer pulse ring */
        .qr-pulse-ring {
            position:absolute;
            width:304px; height:304px; border-radius:28px;
            border:2px solid rgba(74,222,128,0.3);
            animation:pulseRing 2.8s ease-out infinite;
            pointer-events:none;
        }
        @keyframes pulseRing {
            0%   { transform:scale(.94); opacity:0; }
            35%  { opacity:.8; }
            100% { transform:scale(1.08); opacity:0; }
        }

        /* Animated gradient border frame */
        @property --grad-angle {
            syntax:'<angle>';
            initial-value:0deg;
            inherits:false;
        }
        .qr-frame {
            width:272px; height:272px; border-radius:24px;
            padding:3px;
            background: conic-gradient(from var(--grad-angle),
                #4ade80 0%,
                #38bdf8 30%,
                #818cf8 55%,
                #38bdf8 75%,
                #4ade80 100%);
            animation: rotateBorder 3.5s linear infinite;
        }
        @keyframes rotateBorder {
            to { --grad-angle:360deg; }
        }

        /* Inner white card */
        .qr-card {
            width:100%; height:100%; border-radius:21px;
            background:#ffffff;
            display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden;
        }

        /* Corner brackets — scanner UI */
        .corner { position:absolute; width:22px; height:22px; }
        .corner-tl { top:11px; left:11px; border-top:3px solid #4ade80; border-left:3px solid #4ade80; border-radius:4px 0 0 0; }
        .corner-tr { top:11px; right:11px; border-top:3px solid #4ade80; border-right:3px solid #4ade80; border-radius:0 4px 0 0; }
        .corner-bl { bottom:11px; left:11px; border-bottom:3px solid #4ade80; border-left:3px solid #4ade80; border-radius:0 0 0 4px; }
        .corner-br { bottom:11px; right:11px; border-bottom:3px solid #4ade80; border-right:3px solid #4ade80; border-radius:0 0 4px 0; }

        /* Scan line */
        .scan-line {
            position:absolute; left:14px; right:14px; height:2px; border-radius:1px;
            background:linear-gradient(90deg,
                transparent 0%,
                rgba(74,222,128,.85) 30%,
                rgba(56,189,248,.85) 70%,
                transparent 100%);
            box-shadow:0 0 14px 2px rgba(74,222,128,.4);
            animation:scanDown 2.2s ease-in-out infinite;
        }
        @keyframes scanDown {
            0%   { top:18px; opacity:0; }
            8%   { opacity:1; }
            92%  { opacity:1; }
            100% { top:calc(100% - 20px); opacity:0; }
        }

        #qrcode { width:208px; height:208px; position:relative; z-index:1; }
        #qrcode img, #qrcode canvas { border-radius:4px; display:block; }

        /* ── Patient badge ── */
        .patient-badge {
            z-index:1; display:flex; flex-direction:column; align-items:center;
            gap:6px; margin-bottom:28px;
        }
        .avatar-wrap { position:relative; margin-bottom:2px; }
        .patient-avatar {
            width:54px; height:54px; border-radius:17px;
            background:linear-gradient(135deg,#4ade80,#38bdf8);
            display:flex; align-items:center; justify-content:center;
            font-family:'Playfair Display',serif; font-size:21px; font-weight:700;
            color:#0f172a; letter-spacing:-0.5px;
            box-shadow:0 6px 20px rgba(74,222,128,.3);
        }
        .verified-dot {
            position:absolute; bottom:-5px; right:-5px;
            width:20px; height:20px; border-radius:50%;
            background:linear-gradient(135deg,#4ade80,#38bdf8);
            border:2.5px solid #F8FAFB;
            display:flex; align-items:center; justify-content:center;
        }
        .verified-dot svg { width:10px; height:10px; }

        .patient-name {
            font-family:'Playfair Display',serif;
            font-size:22px; font-weight:700; color:#111827;
            text-align:center; line-height:1.2;
        }
        .patient-label {
            font-size:11.5px; font-weight:600; color:#16a34a;
            letter-spacing:.1em; text-transform:uppercase;
            display:flex; align-items:center; gap:8px;
        }
        .patient-label::before, .patient-label::after {
            content:''; display:inline-block; width:22px; height:1px;
            background:linear-gradient(90deg,transparent,#4ade80);
        }
        .patient-label::after { background:linear-gradient(90deg,#4ade80,transparent); }

        /* ── Share row (3 pills) ── */
        .share-row {
            display:flex; gap:10px; width:100%; z-index:1;
            margin-bottom:18px;
        }
        .s-pill {
            flex:1; padding:13px 6px 11px;
            border-radius:18px; border:none;
            cursor:pointer; transition:transform .18s, box-shadow .18s;
            display:flex; flex-direction:column; align-items:center; gap:5px;
            font-family:'Inter',sans-serif; font-size:11px; font-weight:600;
            letter-spacing:.01em;
        }
        .s-pill:hover  { transform:translateY(-2px); }
        .s-pill:active { transform:scale(.96); }
        .s-pill svg { width:21px; height:21px; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none; }

        .s-pill.save {
            background:linear-gradient(135deg,#4ade80,#38bdf8);
            color:#0f172a;
            box-shadow:0 4px 18px rgba(74,222,128,.28);
        }
        .s-pill.save svg { stroke:#0f172a; }

        .s-pill.whatsapp {
            background:rgba(37,211,102,.09);
            border:1px solid rgba(37,211,102,.22);
            color:#15803d;
        }
        .s-pill.whatsapp svg { stroke:#22c55e; }

        .s-pill.copy {
            background:rgba(56,189,248,.09);
            border:1px solid rgba(56,189,248,.22);
            color:#0369a1;
        }
        .s-pill.copy svg { stroke:#38bdf8; }

        /* ── Secure note ── */
        .secure-note {
            width:100%; z-index:1;
            padding:13px 16px;
            background:rgba(74,222,128,.05);
            border:1px solid rgba(74,222,128,.16);
            border-radius:16px;
            display:flex; align-items:center; gap:12px;
        }
        .secure-icon {
            width:34px; height:34px; flex-shrink:0; border-radius:10px;
            background:rgba(74,222,128,.12);
            display:flex; align-items:center; justify-content:center;
        }
        .secure-icon svg { width:16px; height:16px; stroke:#16a34a; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none; }
        .secure-text {
            font-size:11.5px; color:rgba(17,24,39,.48);
            line-height:1.55;
        }
        .secure-text strong { color:rgba(17,24,39,.72); font-weight:600; }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="ambient"></div>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='08-perfil.html'">‹</div>
        <div class="header-title">RG de Saúde</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content">
        <!-- QR code stage -->
        <div class="qr-stage">
            <div class="qr-pulse-ring"></div>
            <div class="qr-frame">
                <div class="qr-card">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                    <div class="scan-line"></div>
                    <div id="qrcode"></div>
                </div>
            </div>
        </div>

        <!-- Patient info -->
        <div class="patient-badge">
            <div class="avatar-wrap">
                <div class="patient-avatar" id="patientInitials">—</div>
                <div class="verified-dot">
                    <svg viewBox="0 0 12 12" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="2,6 5,9 10,3"/>
                    </svg>
                </div>
            </div>
            <div class="patient-name" id="qrName">Carregando...</div>
            <div class="patient-label">RG de Saúde · VITAE</div>
        </div>

        <!-- Share pills -->
        <div class="share-row">
            <button class="s-pill save" onclick="downloadQR()">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Salvar
            </button>
            <button class="s-pill whatsapp" onclick="shareWhatsApp()">
                <svg viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                </svg>
                WhatsApp
            </button>
            <button class="s-pill copy" onclick="copyLink()">
                <svg viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                Copiar link
            </button>
        </div>

        <!-- Security note -->
        <div class="secure-note">
            <div class="secure-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <div class="secure-text">
                <strong>Compartilhe com segurança.</strong> Este QR Code contém seus dados de saúde essenciais. Mostre apenas para profissionais de confiança.
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    let qrData = {};

    async function init() {
        try {
            const data = await vitaeAPI.getQrData();
            qrData = data;

            const nome = data.usuario.nome || 'Paciente';
            document.getElementById('qrName').textContent = nome;

            // Avatar initials
            const parts = nome.trim().split(/\s+/);
            const initials = parts.length >= 2
                ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
                : nome.slice(0, 2).toUpperCase();
            document.getElementById('patientInitials').textContent = initials;

            // Build QR content — URL pública que abre o RG da Saúde
            const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
            const qrContent = baseUrl + 'rg-publico.html?id=' + data.usuario.id;

            new QRCode(document.getElementById('qrcode'), {
                text: qrContent,
                width: 208,
                height: 208,
                colorDark: '#0A0A0A',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
            });
        } catch (e) {
            document.getElementById('qrName').textContent = 'Erro ao carregar dados';
        }
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (canvas) {
            const link = document.createElement('a');
            link.download = 'vitae-rg-saude.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    }

    function shareWhatsApp() {
        const nome = qrData.usuario?.nome || 'Paciente';
        const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
        const publicUrl = baseUrl + 'rg-publico.html?id=' + (qrData.usuario?.id || '');
        const msg = encodeURIComponent(`${nome} compartilhou o RG da Saúde VITAE.\n\nVeja aqui: ${publicUrl}`);
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function copyLink() {
        const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
        const publicUrl = baseUrl + 'rg-publico.html?id=' + (qrData.usuario?.id || '');
        navigator.clipboard.writeText(publicUrl).then(() => {
            alert('Link copiado!');
        });
    }

    init();
</script>
</body>
</html>
