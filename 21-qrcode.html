<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — RG de Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }

        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh;
            background:#F8FAFB; border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #e5e7eb, 0 40px 120px rgba(0,0,0,0.45);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#F8FAFB;
            border-radius:0 0 20px 20px; z-index:10;
        }

        /* ── Header ── */
        .header {
            position:absolute; top:58px; left:28px; right:28px;
            display:flex; align-items:center; z-index:5;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(0,0,0,0.06); border:1px solid rgba(0,0,0,0.09);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:22px; color:rgba(17,24,39,0.55);
            line-height:1;
        }
        .header-title {
            flex:1; text-align:center;
            font-family:'Playfair Display',serif; font-size:20px; font-weight:700;
            color:#111827;
        }

        /* ── Content ── */
        .content {
            height:100%; overflow-y:auto; padding:110px 28px 48px;
            display:flex; flex-direction:column; align-items:center;
        }

        /* ── QR Card ── */
        .qr-card-wrap {
            width:100%; max-width:300px;
            background:#ffffff;
            border-radius:20px;
            border:1px solid rgba(0,0,0,0.08);
            padding:28px 24px 24px;
            display:flex; flex-direction:column; align-items:center;
            box-shadow:0 4px 24px rgba(0,0,0,0.06);
            margin-bottom:24px;
        }

        #qrcode { width:240px; height:240px; }
        #qrcode img, #qrcode canvas { border-radius:6px; display:block; width:240px !important; height:240px !important; }

        /* ── Patient info ── */
        .patient-info {
            display:flex; flex-direction:column; align-items:center;
            gap:4px; margin-top:20px; margin-bottom:4px;
        }
        .patient-name {
            font-family:'Playfair Display',serif;
            font-size:20px; font-weight:700; color:#111827;
            text-align:center; line-height:1.2;
        }
        .patient-label {
            font-size:11px; font-weight:600; color:#007A9E;
            letter-spacing:.08em; text-transform:uppercase;
        }

        /* ── Buttons stacked ── */
        .btn-stack {
            width:100%; display:flex; flex-direction:column; gap:10px;
            margin-bottom:20px;
        }
        .share-btn {
            width:100%; padding:14px 20px;
            border-radius:14px; border:none;
            cursor:pointer; transition:transform .15s, box-shadow .15s;
            display:flex; align-items:center; gap:12px;
            font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
        }
        .share-btn:hover { transform:translateY(-1px); }
        .share-btn:active { transform:scale(.98); }
        .share-btn svg { width:20px; height:20px; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none; flex-shrink:0; }

        .share-btn.whatsapp {
            background:#25D366; color:#fff;
            box-shadow:0 4px 16px rgba(37,211,102,.25);
        }
        .share-btn.whatsapp svg { stroke:#fff; }

        .share-btn.save {
            background:rgba(0,0,0,0.06); color:#111827;
            border:1px solid rgba(0,0,0,0.09);
        }
        .share-btn.save svg { stroke:#111827; }

        .share-btn.copy {
            background:rgba(0,0,0,0.06); color:#111827;
            border:1px solid rgba(0,0,0,0.09);
        }
        .share-btn.copy svg { stroke:#111827; }

        /* ── Secure note ── */
        .secure-note {
            width:100%;
            padding:13px 16px;
            background:rgba(0,153,196,.05);
            border:1px solid rgba(0,153,196,.16);
            border-radius:14px;
            display:flex; align-items:center; gap:12px;
        }
        .secure-icon {
            width:34px; height:34px; flex-shrink:0; border-radius:10px;
            background:rgba(0,153,196,.12);
            display:flex; align-items:center; justify-content:center;
        }
        .secure-icon svg { width:16px; height:16px; stroke:#007A9E; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none; }
        .secure-text {
            font-size:11.5px; color:rgba(17,24,39,.48);
            line-height:1.55;
        }
        .secure-text strong { color:rgba(17,24,39,.72); font-weight:600; }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='08-perfil.html'">‹</div>
        <div class="header-title">RG de Saúde</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content">
        <!-- QR code card -->
        <div class="qr-card-wrap">
            <div id="qrcode"></div>
            <div class="patient-info">
                <div class="patient-name" id="qrName">Carregando...</div>
                <div class="patient-label">RG de Saúde · VITAE</div>
            </div>
        </div>

        <!-- Buttons stacked -->
        <div class="btn-stack">
            <button class="share-btn whatsapp" onclick="shareWhatsApp()">
                <svg viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                </svg>
                Compartilhar via WhatsApp
            </button>
            <button class="share-btn save" onclick="downloadQR()">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Salvar imagem
            </button>
            <button class="share-btn copy" onclick="copyLink()">
                <svg viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                Copiar link
            </button>
        </div>

        <!-- Security note -->
        <div class="secure-note">
            <div class="secure-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <div class="secure-text">
                <strong>Compartilhe com segurança.</strong> Este QR Code contém seus dados de saúde essenciais. Mostre apenas para profissionais de confiança.
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    let qrData = {};

    async function init() {
        try {
            const data = await vitaeAPI.getQrData();
            qrData = data;

            const nome = data.usuario.nome || 'Paciente';
            document.getElementById('qrName').textContent = nome;

            // Build QR content — URL pública que abre o RG da Saúde
            const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
            const qrContent = baseUrl + 'rg-publico.html?id=' + data.usuario.id;

            new QRCode(document.getElementById('qrcode'), {
                text: qrContent,
                width: 240,
                height: 240,
                colorDark: '#0A0A0A',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
            });
        } catch (e) {
            document.getElementById('qrName').textContent = 'Erro ao carregar dados';
        }
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (canvas) {
            const link = document.createElement('a');
            link.download = 'vitae-rg-saude.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    }

    function shareWhatsApp() {
        const nome = qrData.usuario?.nome || 'Paciente';
        const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
        const publicUrl = baseUrl + 'rg-publico.html?id=' + (qrData.usuario?.id || '');
        const msg = encodeURIComponent(`${nome} compartilhou o RG da Saúde VITAE.\n\nVeja aqui: ${publicUrl}`);
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function copyLink() {
        const baseUrl = window.location.origin + window.location.pathname.replace('21-qrcode.html', '');
        const publicUrl = baseUrl + 'rg-publico.html?id=' + (qrData.usuario?.id || '');
        navigator.clipboard.writeText(publicUrl).then(() => {
            alert('Link copiado!');
        });
    }

    init();
</script>
</body>
</html>
