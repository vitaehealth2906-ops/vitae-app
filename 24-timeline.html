<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#0099C4; --green:#4AD9A4; --red:#D94452; --blue:#4A90E2; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:var(--bg);
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:var(--bg); border-radius:0 0 20px 20px; z-index:10; }
        .header {
            position:absolute; top:58px; left:20px; right:20px;
            display:flex; align-items:center; z-index:5;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5);
            transition:all 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); }
        .header-title {
            flex:1; text-align:center;
            font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#fff;
        }
        .content { height:100%; overflow-y:auto; padding:110px 20px 100px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        /* Filters */
        .filters { display:flex; gap:8px; margin-bottom:24px; overflow-x:auto; padding-bottom:4px; }
        .filter-btn {
            padding:8px 16px; border-radius:20px; border:none;
            font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
            cursor:pointer; white-space:nowrap; transition:all 0.2s;
            background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
        }
        .filter-btn.active { background:rgba(0,153,196,0.15); border-color:rgba(0,153,196,0.3); color:var(--gold); }

        /* Timeline */
        .timeline { position:relative; padding-left:24px; }
        .timeline::before {
            content:''; position:absolute; left:7px; top:0; bottom:0;
            width:2px; background:rgba(255,255,255,0.06);
        }
        .tl-item {
            position:relative; margin-bottom:20px;
            background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:16px; padding:16px;
            transition:all 0.2s;
        }
        .tl-item:hover { border-color:rgba(255,255,255,0.12); }
        .tl-dot {
            position:absolute; left:-20px; top:20px;
            width:12px; height:12px; border-radius:50%;
            border:2px solid var(--bg);
        }
        .tl-dot.exame { background:var(--gold); }
        .tl-dot.medicamento { background:var(--blue); }
        .tl-dot.agendamento { background:var(--green); }
        .tl-dot.alergia { background:var(--red); }
        .tl-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .tl-item-tipo {
            font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
            padding:3px 8px; border-radius:6px;
        }
        .tl-item-tipo.exame { color:var(--gold); background:rgba(0,153,196,0.1); }
        .tl-item-tipo.medicamento { color:var(--blue); background:rgba(74,144,226,0.1); }
        .tl-item-tipo.agendamento { color:var(--green); background:rgba(74,217,164,0.1); }
        .tl-item-tipo.alergia { color:var(--red); background:rgba(217,68,82,0.1); }
        .tl-item-date { font-size:11px; color:rgba(255,255,255,0.25); }
        .tl-item-title { font-size:15px; font-weight:600; color:#fff; margin-bottom:2px; }
        .tl-item-sub { font-size:12px; color:rgba(255,255,255,0.35); }

        .empty-state {
            text-align:center; padding:60px 20px;
            color:rgba(255,255,255,0.25); font-size:14px;
        }
        .empty-state-icon { font-size:48px; margin-bottom:16px; opacity:0.3; }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:86px; padding:0 24px;
            background:linear-gradient(to top, var(--bg) 60%, transparent);
            display:flex; align-items:center; justify-content:space-around; z-index:20;
        }
        .tab { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 16px; }
        .tab svg { opacity:0.4; transition:opacity 0.2s; }
        .tab-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.3); letter-spacing:0.5px; }
        .tab.active svg { opacity:1; }
        .tab.active .tab-label { color:var(--gold); }
    @media(max-width:430px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="header">
        <div class="back-btn" onclick="window.location.href='08-perfil.html?from=nav'">‹</div>
        <div class="header-title">Timeline</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content">
        <div class="filters">
            <button class="filter-btn active" onclick="filterTimeline('todos')">Todos</button>
            <button class="filter-btn" onclick="filterTimeline('EXAME')">Exames</button>
            <button class="filter-btn" onclick="filterTimeline('MEDICAMENTO')">Medicamentos</button>
            <button class="filter-btn" onclick="filterTimeline('AGENDAMENTO')">Agendamentos</button>
        </div>
        <div id="timelineContainer">
            <div class="empty-state">
                <div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                Carregando sua timeline...
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab" onclick="window.location.href='08-perfil.html?from=nav'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg>
            <div class="tab-label">Meu RG</div>
        </div>
        <div class="tab" onclick="window.location.href='11-exames-lista.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div class="tab-label">Exames</div>
        </div>
        <div class="tab active" onclick="window.location.href='21-qrcode.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0099C4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>
            <div class="tab-label">QR Code</div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (!vitaeAPI.isLoggedIn()) window.location.href = '00-escolha.html';

    let allEvents = [];
    let currentFilter = 'todos';

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
    }

    function getTipoClass(tipo) {
        const map = { 'EXAME':'exame', 'MEDICAMENTO':'medicamento', 'AGENDAMENTO':'agendamento', 'ALERGIA':'alergia' };
        return map[tipo] || 'exame';
    }

    function getTipoLabel(tipo) {
        const map = { 'EXAME':'Exame', 'MEDICAMENTO':'Medicamento', 'AGENDAMENTO':'Agendamento', 'ALERGIA':'Alergia' };
        return map[tipo] || tipo;
    }

    function renderTimeline(events) {
        const container = document.getElementById('timelineContainer');
        if (events.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                    Sua timeline está vazia.<br>Adicione exames, medicamentos ou agendamentos.
                </div>`;
            return;
        }
        const cls = getTipoClass;
        container.innerHTML = '<div class="timeline">' + events.map(e => `
            <div class="tl-item">
                <div class="tl-dot ${cls(e.tipo)}"></div>
                <div class="tl-item-header">
                    <span class="tl-item-tipo ${cls(e.tipo)}">${getTipoLabel(e.tipo)}</span>
                    <span class="tl-item-date">${formatDate(e.data)}</span>
                </div>
                <div class="tl-item-title">${e.titulo || '—'}</div>
                <div class="tl-item-sub">${e.subtitulo || ''}</div>
            </div>
        `).join('') + '</div>';
    }

    function filterTimeline(tipo) {
        currentFilter = tipo;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const filtered = tipo === 'todos' ? allEvents : allEvents.filter(e => e.tipo === tipo);
        renderTimeline(filtered);
    }

    async function loadTimeline() {
        try {
            const data = await vitaeAPI.getTimeline();
            allEvents = data.timeline || [];
            renderTimeline(allEvents);
        } catch (e) {
            document.getElementById('timelineContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(217,68,82,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                    Erro ao carregar timeline
                </div>`;
        }
    }

    loadTimeline();
</script>
</body>
</html>
