[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate"]

[start]
# Schema changes NEVER run automatically in start — risco do incidente 17/04.
# Migracoes de schema devem ser aplicadas manualmente via:
#   railway run npx prisma db push   (sem --accept-data-loss, revisar antes de confirmar)
# OU versionadas com:
#   npx prisma migrate deploy
cmd = "node src/index.js"
