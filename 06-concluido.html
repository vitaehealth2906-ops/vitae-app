<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Concluído</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh;
            background:#0D0F14;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0D0F14;
            border-radius:0 0 20px 20px; z-index:10;
        }


        /* Content */
        .content {
            height:100%;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:80px 36px;
            text-align:center;
            position:relative;
        }

        /* Ambient glow */
        .glow {
            position:absolute;
            width:300px; height:300px; border-radius:50%;
            background:radial-gradient(circle, rgba(0,229,160,0.1) 0%, transparent 70%);
            top:35%; left:50%; transform:translate(-50%,-50%);
            animation:glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100% { opacity:0.4; transform:translate(-50%,-50%) scale(0.9); }
            50% { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
        }

        /* Check circle */
        .check-container {
            position:relative; z-index:2;
            margin-bottom:40px;
        }
        .check-ring-outer {
            width:120px; height:120px; border-radius:50%;
            border:2px solid rgba(0,229,160,0.15);
            display:flex; align-items:center; justify-content:center;
            position:relative;
            animation:ringFadeIn 0.6s ease 0.5s both;
        }
        @keyframes ringFadeIn {
            from { opacity:0; transform:scale(0.8); }
            to { opacity:1; transform:scale(1); }
        }
        .check-ring-inner {
            width:96px; height:96px; border-radius:50%;
            background:rgba(0,229,160,0.08);
            border:2px solid #00E5A0;
            display:flex; align-items:center; justify-content:center;
            animation:checkPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s both;
        }
        @keyframes checkPop {
            from { transform:scale(0); opacity:0; }
            to { transform:scale(1); opacity:1; }
        }
        .check-icon {
            opacity:0;
            animation:checkDraw 0.4s ease 1.2s both;
        }
        @keyframes checkDraw {
            from { opacity:0; transform:scale(0.5); }
            to { opacity:1; transform:scale(1); }
        }
        /* Pulse rings */
        .pulse-ring {
            position:absolute; top:50%; left:50%;
            width:120px; height:120px; border-radius:50%;
            border:1px solid rgba(0,229,160,0.15);
            transform:translate(-50%,-50%);
        }
        .pulse-ring:nth-child(1) { animation:pulseOut 2.5s ease 1.5s infinite; }
        .pulse-ring:nth-child(2) { animation:pulseOut 2.5s ease 2s infinite; }
        .pulse-ring:nth-child(3) { animation:pulseOut 2.5s ease 2.5s infinite; }
        @keyframes pulseOut {
            0% { transform:translate(-50%,-50%) scale(1); opacity:0.4; }
            100% { transform:translate(-50%,-50%) scale(2); opacity:0; }
        }

        /* Text */
        .done-title {
            font-family:'Plus Jakarta Sans', sans-serif;
            font-size:30px; font-weight:700;
            color:#fff; line-height:1.3;
            margin-bottom:12px;
            opacity:0;
            animation:textFadeIn 0.6s ease 1.4s both;
        }
        .done-title span { background:linear-gradient(135deg,#00B4D8,#00B4D8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-style:italic; }
        .done-subtitle {
            font-size:15px; color:rgba(255,255,255,0.35);
            line-height:1.6;
            opacity:0;
            animation:textFadeIn 0.6s ease 1.7s both;
        }
        @keyframes textFadeIn {
            from { opacity:0; transform:translateY(15px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* Stats */
        .stats {
            display:flex; gap:32px;
            margin-top:40px;
            opacity:0;
            animation:textFadeIn 0.6s ease 2s both;
        }
        .stat {
            display:flex; flex-direction:column;
            align-items:center; gap:4px;
        }
        .stat-value {
            font-family:'Plus Jakarta Sans', sans-serif;
            font-size:28px; font-weight:800;
            color:#00E5A0;
        }
        .stat-label {
            font-size:11px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:1px; text-transform:uppercase;
        }

        /* Particles */
        .particles {
            position:absolute; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:1; overflow:hidden;
        }
        .particle {
            position:absolute; border-radius:50%;
            background:#00E5A0;
            opacity:0;
        }
        .particle.gold { background:#00E5A0; }
        .particle.green { background:#00E5A0; }

        /* CTA */
        .btn-primary {
            width:100%; padding:18px;
            background:linear-gradient(135deg,#00B4D8,#00B4D8);
            border:none; border-radius:16px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:16px; font-weight:700;
            color:#fff; cursor:pointer;
            letter-spacing:0.5px;
            transition:all 0.25s ease;
            position:absolute; bottom:56px; left:36px; right:36px;
            z-index:5;
            opacity:0;
            animation:textFadeIn 0.6s ease 2.5s both;
        }
        .btn-primary:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 32px rgba(0,229,160,0.3);
        }
    @media(max-width:480px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>

    <!-- Confetti particles -->
    <div class="particles" id="particles"></div>

    <div class="content">
        <div class="glow"></div>

        <div class="check-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="check-ring-outer">
                <div class="check-ring-inner">
                    <div class="check-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="done-title">Perfil <span>criado</span> com sucesso!</div>
        <div class="done-subtitle">Agora vamos conectar seus dados<br>para personalizar sua experiência</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="statQuestions">0</div>
                <div class="stat-label">Respostas</div>
            </div>
            <div class="stat">
                <div class="stat-value">100%</div>
                <div class="stat-label">Completo</div>
            </div>
        </div>

    </div>

</div>

<script>
    // Animate counter
    function animateCount(el, target, duration) {
        let start = null;
        function step(ts) {
            if (!start) start = ts;
            const p = Math.min((ts - start) / duration, 1);
            el.textContent = Math.round(p * target);
            if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }
    setTimeout(() => {
        animateCount(document.getElementById('statQuestions'), 5, 800);
    }, 2200);

    // Generate confetti particles
    const particlesContainer = document.getElementById('particles');
    function createParticle() {
        const p = document.createElement('div');
        const isGold = Math.random() > 0.4;
        const size = 2 + Math.random() * 4;
        p.className = 'particle ' + (isGold ? 'gold' : 'green');
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = (10 + Math.random() * 80) + '%';
        p.style.top = '-5%';

        const duration = 2000 + Math.random() * 3000;
        const horizontalDrift = -60 + Math.random() * 120;
        const rotation = Math.random() * 360;

        p.animate([
            { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 0 },
            { opacity: 0.8, offset: 0.1 },
            { opacity: 0.6, offset: 0.7 },
            { transform: `translateY(900px) translateX(${horizontalDrift}px) rotate(${rotation}deg)`, opacity: 0 }
        ], { duration: duration, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });

        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), duration);
    }

    // Burst of particles at start
    setTimeout(() => {
        for (let i = 0; i < 30; i++) {
            setTimeout(createParticle, i * 80);
        }
    }, 1000);

    // Continuous light particles
    setTimeout(() => {
        setInterval(createParticle, 400);
    }, 3500);

    // Auto-advance after 5 seconds
    setTimeout(() => {
        window.location.href = '07-wearable.html';
    }, 5000);
</script>
</body>
</html>
