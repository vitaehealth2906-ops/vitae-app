<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Exame Detalhado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#0099C4; --green:#4AD9A4; --red:#D94452; --amber:#C9924A; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; min-height:100vh; background:var(--bg);
            overflow-y:auto; position:relative;
        }
        @media (min-width:394px) {
            .phone {
                height:852px; max-height:100vh; border-radius:52px; overflow:hidden;
                box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
                overflow-y:auto;
            }
        }

        /* Header */
        .header {
            display:flex; align-items:center; padding:52px 20px 16px; gap:12px;
            position:sticky; top:0; z-index:10;
            background:linear-gradient(to bottom, var(--bg) 72%, transparent);
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; color:rgba(255,255,255,0.5); text-decoration:none;
            flex-shrink:0; transition:all .2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); }
        .header-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#fff; }

        /* Content */
        .content { padding:0 20px 52px; }

        /* Hero Card */
        .hero-card {
            background:linear-gradient(145deg,rgba(30,25,18,.98),rgba(16,13,8,.98));
            border:1.5px solid rgba(0,153,196,.25); border-radius:22px;
            padding:22px 20px; margin-bottom:20px; position:relative; overflow:hidden;
            box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(0,153,196,.1);
        }
        .hero-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg,transparent,rgba(0,153,196,.3),transparent);
        }
        .hero-card::after {
            content:''; position:absolute; top:0; right:0; width:200px; height:200px;
            background:radial-gradient(circle,rgba(0,153,196,.06) 0%,transparent 70%);
            pointer-events:none;
        }
        .hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; position:relative; z-index:1; }
        .hero-meta { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.12em; color:rgba(0,153,196,.6); text-transform:uppercase; margin-bottom:4px; }
        .hero-name { font-size:15px; font-weight:600; color:rgba(255,255,255,.85); line-height:1.3; margin-bottom:6px; }
        .hero-score-row { display:flex; align-items:flex-end; gap:3px; justify-content:flex-end; }
        .hero-score { font-family:'Playfair Display',serif; font-size:42px; font-weight:600; color:var(--gold); line-height:.88; }
        .hero-max { font-family:'DM Mono',monospace; font-size:11px; color:rgba(0,153,196,.5); padding-bottom:4px; }
        .hero-status { font-size:11px; color:rgba(255,255,255,.4); margin-top:3px; text-align:right; }
        .hero-bottom { position:relative; z-index:1; margin-top:16px; }
        .pdf-btn {
            display:inline-flex; align-items:center; gap:8px; padding:10px 18px;
            border-radius:12px; background:linear-gradient(135deg,var(--gold),#0099C4);
            color:#0A0A0A; font-size:12px; font-weight:700; text-decoration:none;
            letter-spacing:.04em; text-transform:uppercase;
        }

        /* Status tag */
        .status-tag { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .status-tag.ok { background:rgba(74,217,164,.1); color:var(--green); border:1px solid rgba(74,217,164,.2); }
        .status-tag.warn { background:rgba(0,153,196,.1); color:var(--amber); border:1px solid rgba(0,153,196,.2); }
        .status-tag.crit { background:rgba(217,68,82,.1); color:var(--red); border:1px solid rgba(217,68,82,.2); }

        /* Section title */
        .section-title {
            font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#fff;
            margin:20px 0 10px; display:flex; align-items:center; gap:8px;
        }

        /* Biomarker items */
        .bio-item {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            border-radius:14px; margin-bottom:8px;
            background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
        }
        .bio-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .bio-dot.ok { background:var(--green); }
        .bio-dot.warn { background:var(--amber); }
        .bio-dot.crit { background:var(--red); }
        .bio-name { flex:1; font-size:13px; color:rgba(255,255,255,.75); }
        .bio-val { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,.35); margin-right:6px; }
        .bio-cls { font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; flex-shrink:0; }
        .bio-cls.ok { background:rgba(74,217,164,.1); color:var(--green); }
        .bio-cls.warn { background:rgba(0,153,196,.1); color:var(--amber); }
        .bio-cls.crit { background:rgba(217,68,82,.1); color:var(--red); }

        /* System group label */
        .sys-group { margin-bottom:4px; }
        .sys-group-label {
            font-family:'DM Mono',monospace; font-size:10px; font-weight:600;
            color:rgba(255,255,255,.25); letter-spacing:.1em; text-transform:uppercase;
            margin:14px 0 6px;
        }

        /* AI Insights */
        .insight-card {
            background:rgba(0,153,196,.04); border:1px solid rgba(0,153,196,.12);
            border-radius:16px; padding:14px 16px; margin-bottom:10px;
        }
        .insight-title { font-size:13px; font-weight:600; color:rgba(255,255,255,.85); margin-bottom:4px; }
        .insight-text { font-size:13px; color:rgba(255,255,255,.45); line-height:1.55; }

        /* Alerts */
        .alert-card { display:flex; align-items:flex-start; gap:10px; padding:13px 14px; border-radius:14px; margin-bottom:8px; }
        .alert-card.URGENTE { background:rgba(217,68,82,.08); border:1px solid rgba(217,68,82,.2); }
        .alert-card.ATENCAO { background:rgba(0,153,196,.08); border:1px solid rgba(0,153,196,.2); }
        .alert-card.INFO { background:rgba(74,144,226,.08); border:1px solid rgba(74,144,226,.2); }
        .alert-icon { flex-shrink:0; margin-top:2px; }
        .alert-text { font-size:13px; color:rgba(255,255,255,.55); line-height:1.4; }

        /* Footer */
        .footer-note { text-align:center; padding:24px 0 4px; font-size:11px; color:rgba(255,255,255,.15); line-height:1.6; }
        .footer-note a { color:var(--gold); text-decoration:none; }

        /* Loading/error */
        .loading { text-align:center; padding:80px 20px; color:rgba(255,255,255,.3); font-size:14px; }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(0,153,196,.2); border-top-color:#0099C4; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:430px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
</head>
<body>
<div class="phone">
    <div class="header">
        <a class="back-btn" id="backBtn" href="#">‹</a>
        <div class="header-title">Exame Detalhado</div>
    </div>
    <div class="content" id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            Carregando exame...
        </div>
    </div>
</div>

<script>
    const API_URL = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:'
        ? 'http://localhost:3002'
        : 'https://vitae-app-production.up.railway.app';

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');
    const examId = urlParams.get('exam');

    document.getElementById('backBtn').href = userId ? `rg-publico.html?id=${userId}` : 'javascript:history.back()';

    const clsMap = { NORMAL:'ok', ATENCAO:'warn', CRITICO:'crit' };
    const clsLabel = { NORMAL:'Normal', ATENCAO:'Atenção', CRITICO:'Crítico' };

    async function load() {
        if (!userId || !examId) { showError('Link inválido.'); return; }
        try {
            const res = await fetch(`${API_URL}/autorizacao/exame-publico/${userId}/${examId}`);
            if (!res.ok) throw new Error('Exame não encontrado');
            const { exame } = await res.json();
            render(exame);
        } catch (e) {
            showError(e.message || 'Erro ao carregar exame');
        }
    }

    function showError(msg) {
        document.getElementById('mainContent').innerHTML = `
            <div style="text-align:center;padding:80px 20px;color:rgba(255,255,255,.35);font-size:14px;line-height:1.8;">
                ${msg}<br><br>
                <a href="${userId ? 'rg-publico.html?id=' + userId : 'javascript:history.back()'}"
                   style="color:#0099C4;text-decoration:none;font-weight:600;">← Voltar ao RG</a>
            </div>`;
    }

    function svgIcon(color, d) {
        return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
    }

    function render(e) {
        const params = e.parametros || [];
        const total = params.length;
        const normalCount = params.filter(p => p.classificacao === 'NORMAL').length;
        const critCount  = params.filter(p => p.classificacao === 'CRITICO').length;
        const warnCount  = params.filter(p => p.classificacao === 'ATENCAO').length;
        const score = total > 0 ? (normalCount / total * 10).toFixed(1) : '--';
        const analise = e.analise || {};
        const dt = e.dataExame ? new Date(e.dataExame).toLocaleDateString('pt-BR') : '—';
        const sCls = critCount > 0 ? 'crit' : warnCount > 0 ? 'warn' : 'ok';
        const statusLabel = { ok:'Normal', warn:'Atenção', crit:'Crítico' }[sCls];

        // Group params by sistema, sort problem systems first
        const groups = {};
        params.forEach(p => {
            const sys = p.sistema || 'Geral';
            if (!groups[sys]) groups[sys] = [];
            groups[sys].push(p);
        });
        const sysOrder = Object.keys(groups).sort((a, b) => {
            const rank = g => g.some(p => p.classificacao === 'CRITICO') ? 0
                           : g.some(p => p.classificacao === 'ATENCAO')  ? 1 : 2;
            return rank(groups[a]) - rank(groups[b]);
        });

        let html = '';

        // ── Hero ──
        html += `
            <div class="hero-card">
                <div class="hero-top">
                    <div>
                        <div class="hero-meta">${dt}${e.laboratorio ? ' · ' + e.laboratorio : ''}</div>
                        <div class="hero-name">${e.tipoExame || e.nomeArquivo || 'Exame'}</div>
                        <span class="status-tag ${sCls}">${statusLabel}</span>
                    </div>
                    <div style="text-align:right;flex-shrink:0;">
                        <div class="hero-score-row">
                            <div class="hero-score">${score}</div>
                            <div class="hero-max">/10</div>
                        </div>
                        <div class="hero-status">${normalCount} de ${total} normais</div>
                    </div>
                </div>
                ${e.arquivoUrl ? `
                <div class="hero-bottom">
                    <a class="pdf-btn" href="${e.arquivoUrl}" target="_blank" rel="noopener">
                        ${svgIcon('currentColor','<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/>')}
                        Baixar PDF
                    </a>
                </div>` : ''}
            </div>`;

        // ── Biomarcadores ──
        if (params.length > 0) {
            html += `<div class="section-title">${svgIcon('#4AD9A4','<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>')} Biomarcadores</div>`;
            sysOrder.forEach(sys => {
                html += `<div class="sys-group"><div class="sys-group-label">${sys}</div>`;
                groups[sys].forEach(p => {
                    const cls = clsMap[p.classificacao] || 'ok';
                    const val = [p.valor, p.unidade].filter(Boolean).join(' ');
                    html += `
                        <div class="bio-item">
                            <div class="bio-dot ${cls}"></div>
                            <div class="bio-name">${p.nome}</div>
                            <div class="bio-val">${val}</div>
                            <div class="bio-cls ${cls}">${clsLabel[p.classificacao] || p.classificacao}</div>
                        </div>`;
                });
                html += `</div>`;
            });
        }

        // ── O que fazer (melhoriasIA) ──
        const melhorias = analise.melhoriasIA || [];
        if (melhorias.length > 0) {
            html += `<div class="section-title">${svgIcon('#0099C4','<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>')} O que fazer</div>`;
            melhorias.forEach(m => {
                const titulo = m.titulo || m.parametro || '';
                const texto  = m.acao || m.descricao || m.texto || '';
                html += `
                    <div class="insight-card">
                        ${titulo ? `<div class="insight-title">${titulo}</div>` : ''}
                        <div class="insight-text">${texto}</div>
                    </div>`;
            });
        }

        // ── Alertas ──
        const alertas = analise.alertas || [];
        if (alertas.length > 0) {
            const icons = {
                URGENTE: svgIcon('#D94452','<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'),
                ATENCAO: svgIcon('#F0A050','<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'),
                INFO:    svgIcon('#4A90E2','<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>'),
            };
            html += `<div class="section-title">${svgIcon('#F0A050','<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>')} Alertas Clínicos</div>`;
            alertas.forEach(a => {
                const tipo = a.tipo || 'INFO';
                html += `
                    <div class="alert-card ${tipo}">
                        <div class="alert-icon">${icons[tipo] || icons.INFO}</div>
                        <div class="alert-text">${a.mensagem || a.texto || ''}</div>
                    </div>`;
            });
        }

        html += `
            <div class="footer-note">
                Dados compartilhados via <a href="https://vitaehealth2906-ops.github.io/vitae-app/">VITAE</a><br>
                RG da Saúde Digital
            </div>`;

        document.getElementById('mainContent').innerHTML = html;
    }

    load();
</script>
</body>
</html>
