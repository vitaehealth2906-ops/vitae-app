<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitaID — Exame</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --green:#00E5A0;--gold-l:#38BDF8;--gold-d:#00B4D8;
      --green:#00C47A;--bad:#EF4444;--warn:#F59E0B;
      --ink:#0D0F14;--ink2:rgba(13,15,20,.80);--ink3:rgba(13,15,20,.55);--ink4:rgba(13,15,20,.38);
      --blur:blur(20px);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#F0F4F8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif}
    .phone{width:393px;max-width:100vw;min-height:100vh;background:#F8FAFB;position:relative;overflow:hidden}
    @media(min-width:394px){
      .phone{height:852px;max-height:100vh;border-radius:52px;overflow:hidden;
        box-shadow:0 0 0 1px rgba(0,229,160,.12),0 0 0 3px #e5e7eb,0 30px 80px rgba(0,0,0,.15)}
    }

    /* ── SCREENS ── */
    .screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;background:#F8FAFB;
      transition:transform .42s cubic-bezier(.77,0,.18,1);will-change:transform}
    .screen.active{transform:translateX(0)}
    .screen.left{transform:translateX(-100%)}
    .screen.right{transform:translateX(100%)}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;padding:52px 18px 12px;gap:12px;
      background:linear-gradient(to bottom,#F8FAFB 72%,transparent)}
    .topbar-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:21px;font-weight:700;color:#0D0F14;flex:1}
    .back-btn{width:40px;height:40px;border-radius:12px;flex-shrink:0;
      background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.08);color:rgba(13,15,20,.55);
      font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
    .back-btn:active{background:rgba(0,0,0,.09)}
    .top-action{padding:8px 14px;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;
      color:#00B4D8;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.25);cursor:pointer;transition:all .2s}
    .top-action:active{background:rgba(0,229,160,.15)}
    .sec-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;
      color:rgba(13,15,20,.42);padding:16px 20px 8px}

    /* ── GLASS CARDS ── */
    .gc{position:relative;border-radius:22px;margin:0 18px 12px;
      background:#FFFFFF;border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .gc-s{position:relative;border-radius:18px;margin:0 18px 10px;
      background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.06)}
    .gi{border-radius:21px;padding:18px 20px;position:relative}
    .gi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:none}

    /* ── HERO CARD ── */
    .gc-hero{position:relative;border-radius:22px;margin:0 18px 14px;
      background:#FFFFFF;border:1px solid rgba(0,229,160,.14);box-shadow:0 4px 20px rgba(0,0,0,.06)}
    .gi-dark{border-radius:21px;padding:18px 20px;position:relative;overflow:hidden;background:none}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
    .hero-left{flex:1;min-width:0}
    .hero-meta{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;letter-spacing:.12em;color:rgba(13,15,20,.42);text-transform:uppercase;margin-bottom:4px}
    .hero-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#0D0F14;line-height:1.3}
    .hero-right{flex-shrink:0;text-align:right}
    .hero-score-row{display:flex;align-items:flex-end;gap:3px;justify-content:flex-end}
    .hero-score{font-family:'Plus Jakarta Sans',sans-serif;font-size:42px;font-weight:600;color:#00E5A0;line-height:.88}
    .hero-max{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;color:rgba(13,15,20,.35);padding-bottom:4px;letter-spacing:.06em}
    .hero-status{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:400;color:rgba(13,15,20,.50);margin-top:2px;text-align:right}
    .hero-bottom{position:relative;z-index:1;margin-top:12px}
    .hero-cta{padding:10px 18px;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:.04em;text-transform:uppercase;text-align:center;cursor:pointer;border:none;transition:all .2s;
      display:inline-flex;align-items:center;gap:6px;text-decoration:none}
    .hero-cta.primary{background:linear-gradient(120deg,#00B4D8,#00B4D8);color:#0f172a;box-shadow:0 4px 16px rgba(0,229,160,.25)}
    .hero-cta:active{transform:scale(.96)}

    /* ── NARRATIVE ── */
    .narr-card{margin:0 18px 12px;padding:18px 20px;border-radius:18px;
      background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.12)}
    .narr-txt{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:400;color:rgba(13,15,20,.72);line-height:1.65}
    .narr-txt strong{font-weight:600;color:#0D0F14}

    /* ── STATUS BOXES ── */
    .status-boxes-wrap{margin:0 18px 14px}
    .status-boxes-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;letter-spacing:.15em;color:rgba(13,15,20,.38);text-transform:uppercase;margin-bottom:10px}
    .status-boxes{display:flex;gap:10px}
    .status-box{display:flex;align-items:center;border-radius:14px;cursor:pointer;overflow:hidden;height:48px;
      opacity:0;animation:boxSlide .45s ease both;transition:all .3s}
    .status-box:active{transform:scale(.96)}
    @keyframes boxSlide{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
    .status-box-count{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:600;min-width:42px;
      display:flex;align-items:center;justify-content:center;height:100%;letter-spacing:-.02em}
    .status-box-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;padding:0 16px 0 12px;letter-spacing:.02em}
    .status-box.ok{background:rgba(74,217,164,.08);border:1.5px solid rgba(74,217,164,.2)}
    .status-box.ok .status-box-count{color:var(--green);border-right:1.5px solid rgba(74,217,164,.2)}
    .status-box.ok .status-box-text{color:var(--green)}
    .status-box.warn{background:rgba(0,229,160,.08);border:1.5px solid rgba(0,229,160,.2)}
    .status-box.warn .status-box-count{color:var(--warn);border-right:1.5px solid rgba(0,229,160,.2)}
    .status-box.warn .status-box-text{color:var(--warn)}
    .status-box.crit{background:rgba(217,68,82,.08);border:1.5px solid rgba(217,68,82,.2)}
    .status-box.crit .status-box-count{color:var(--bad);border-right:1.5px solid rgba(217,68,82,.2)}
    .status-box.crit .status-box-text{color:var(--bad)}

    /* ── BIOLIST ── */
    .biolist-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:#0D0F14;
      margin:10px 20px 4px;opacity:0;animation:fadeUp .4s ease .1s both}
    .biolist-sub{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:400;color:rgba(13,15,20,.50);
      margin:0 20px 18px;opacity:0;animation:fadeUp .4s ease .15s both}
    .biolist-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:0 14px 8px;
      border-radius:14px;cursor:pointer;background:#FFFFFF;border:1px solid rgba(0,0,0,.07);
      transition:all .25s;opacity:0;animation:fadeUp .4s ease both}
    .biolist-item:active{transform:scale(.98)}
    .biolist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .biolist-dot.ok{background:var(--green)}
    .biolist-dot.warn{background:var(--warn)}
    .biolist-dot.crit{background:var(--bad)}
    .biolist-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:400;color:#0D0F14;flex:1}
    .biolist-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:rgba(13,15,20,.50)}
    .biolist-arrow{color:rgba(13,15,20,.22);font-size:14px;margin-left:4px}

    /* ── SIST HEADER ── */
    .sist-header{padding:0 22px 6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:500;color:#0D0F14}
    .sist-sub{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:300;color:rgba(13,15,20,.60);padding:0 22px 14px;line-height:1.6}

    /* ── MARKER SCREEN ── */
    .mk-val-row{display:flex;align-items:flex-end;gap:5px;margin-bottom:6px}
    .mk-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:72px;font-weight:600;line-height:.9}
    .mk-val.crit{color:var(--bad)}.mk-val.warn{color:var(--warn)}.mk-val.ok{color:var(--green)}
    .mk-unit{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:rgba(13,15,20,.38);letter-spacing:.08em;padding-bottom:6px}
    .mk-ey{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(13,15,20,.40);margin-bottom:5px}
    .mk-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:300;font-style:italic;color:rgba(13,15,20,.60);margin-bottom:12px}
    .mk-ref-row{display:flex;gap:10px;align-items:center}
    .mk-ref{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;letter-spacing:.09em;color:rgba(13,15,20,.38);text-transform:uppercase}
    .badge{font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.06em;padding:3px 9px;border-radius:20px}
    .badge.crit{background:rgba(239,68,68,.1);color:var(--bad);border:1px solid rgba(239,68,68,.18)}
    .badge.warn{background:rgba(0,229,160,.1);color:var(--warn);border:1px solid rgba(0,229,160,.18)}
    .badge.ok{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.18)}

    /* ── SPECTRUM ── */
    .spec-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-style:italic;font-weight:400;color:rgba(13,15,20,.70);margin-bottom:13px}
    .spec-track{height:8px;border-radius:4px;
      background:linear-gradient(to right,#EF4444 0%,#F59E0B 28%,#00E5A0 52%,#00E5A0 72%,#F59E0B 87%,#EF4444 100%);
      position:relative;margin-bottom:6px;box-shadow:inset 0 1px 3px rgba(28,24,16,.1)}
    .spec-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;
      background:#1e293b;border-radius:50%;border:1.5px solid rgba(0,229,160,.45);
      box-shadow:0 0 0 3px rgba(0,229,160,.15),0 3px 8px rgba(0,0,0,.14);
      transition:left 1.4s cubic-bezier(.77,0,.18,1)}
    .spec-zones{display:flex;justify-content:space-between}
    .sz{font-family:'Plus Jakarta Sans',sans-serif;font-size:7px;color:rgba(13,15,20,.40);letter-spacing:.06em}

    /* ── MEANING ── */
    .mn-ey{font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#00B4D8;margin-bottom:8px}
    .mn-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:500;color:#0D0F14;margin-bottom:8px;line-height:1.3}
    .mn-body{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:300;color:rgba(13,15,20,.62);line-height:1.7}
    .mn-body strong{font-weight:400;color:#0D0F14}

    /* ── OTC ── */
    .otc-gc{position:relative;border-radius:18px;margin:0 18px 8px;
      background:rgba(74,217,164,.03);border:1px solid rgba(74,217,164,.1)}
    .otc-gi{border-radius:17px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
    .otc-iw{width:40px;height:40px;flex-shrink:0;border-radius:12px;background:rgba(74,217,164,.06);
      border:1px solid rgba(74,217,164,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .otc-type{font-family:'Plus Jakarta Sans',sans-serif;font-size:7px;letter-spacing:.08em;color:var(--green)}
    .otc-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:500;color:#0D0F14;margin-bottom:3px}
    .otc-desc{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:300;color:rgba(13,15,20,.58);line-height:1.6}

    /* ── MELHORIAS PRIORITY CARD ── */
    .gc-priority{position:relative;border-radius:22px;margin:6px 18px 16px;
      background:#FFFFFF;border:1.5px solid rgba(0,229,160,.16);box-shadow:0 4px 20px rgba(0,0,0,.06)}
    .gi-priority{border-radius:21px;padding:24px;position:relative;overflow:hidden;
      background:linear-gradient(120deg,rgba(0,229,160,.05),rgba(56,189,248,.04))}
    .gi-priority::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,229,160,.12),transparent)}
    .pc-ey{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:rgba(13,15,20,.38);margin-bottom:10px}
    .pc-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:500;color:#0D0F14;margin-bottom:7px;line-height:1.2}
    .pc-body{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:300;color:rgba(13,15,20,.60);line-height:1.65;margin-bottom:18px}
    .pc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
    .pc-tag{font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.08em;padding:4px 10px;border-radius:20px;
      background:rgba(0,229,160,.08);color:#00B4D8;border:1px solid rgba(0,229,160,.20)}
    .pc-btn{width:100%;padding:16px;border-radius:14px;background:linear-gradient(120deg,#00B4D8,#00B4D8);
      color:#0f172a;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;
      text-transform:uppercase;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,160,.25);transition:all .25s}
    .pc-btn:active{transform:scale(.98)}

    /* ── FORECAST VISUAL ── */
    .fv-label-row{font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:rgba(13,15,20,.35);margin-bottom:8px}
    .fv-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .fv-time{font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:rgba(13,15,20,.30);width:48px;flex-shrink:0;text-align:right}
    .fv-spec{flex:1;position:relative}
    .fv-track{height:6px;border-radius:3px;
      background:linear-gradient(to right,#EF4444 0%,#F59E0B 28%,#00E5A0 52%,#00E5A0 72%,#F59E0B 87%,#EF4444 100%);opacity:.5}
    .fv-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;
      background:#1e293b;border-radius:50%;border:1.5px solid rgba(0,229,160,.35);
      box-shadow:0 0 0 2.5px rgba(0,229,160,.15),0 2px 8px rgba(0,0,0,.2);transition:left 1.4s cubic-bezier(.77,0,.18,1)}
    .fv-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;letter-spacing:.04em;width:60px;flex-shrink:0}
    .fv-val.bad{color:var(--bad)}.fv-val.good{color:var(--green);font-weight:400}

    /* ── REC ITEMS ── */
    .rec-section{padding:0 20px;display:flex;flex-direction:column}
    .rec-item-gc{position:relative;border-radius:20px;margin-bottom:10px;
      background:#FFFFFF;border:1px solid rgba(0,0,0,.07);cursor:pointer;transition:all .2s}
    .rec-item-gc:active{transform:scale(.983)}
    .rec-gi{border-radius:19px;padding:16px 18px}
    .ri-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
    .ri-icon{width:38px;height:38px;border-radius:11px;background:rgba(0,229,160,.06);
      border:1px solid rgba(0,229,160,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ri-text{flex:1}
    .ri-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:500;color:#0D0F14;margin-bottom:3px;line-height:1.2}
    .ri-sub{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:300;color:rgba(13,15,20,.55);line-height:1.55}

    /* ── ACTION INSIGHT CARDS ── */
    .action-list{display:flex;flex-direction:column;gap:10px;padding:0 18px;margin-bottom:12px}
    .action-item{border-radius:20px;overflow:hidden;transition:box-shadow .35s ease;
      background:#FFFFFF;border:1px solid rgba(0,0,0,.07)}
    .action-item.expanded{box-shadow:0 6px 24px rgba(0,0,0,.08)}
    .action-item.crit-item{border-left:3px solid rgba(217,68,82,.4)}
    .action-item.warn-item{border-left:3px solid rgba(0,229,160,.35)}
    .action-item.ok-item{border-left:3px solid rgba(74,217,164,.3)}
    .action-header{display:flex;align-items:center;padding:14px 14px 14px 16px;gap:10px;cursor:pointer}
    .action-main{flex:1}
    .action-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:500;color:#0D0F14;margin-bottom:5px;line-height:1.2}
    .action-chips{display:flex;gap:7px;flex-wrap:wrap}
    .achip{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;letter-spacing:.04em;padding:4px 10px;border-radius:20px;
      background:rgba(0,229,160,.07);color:#00B4D8;border:1px solid rgba(0,229,160,.18)}
    .action-chevron{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
      background:rgba(0,229,160,.07);color:#00B4D8;border:1px solid rgba(0,229,160,.18);
      transition:transform .42s cubic-bezier(.77,0,.18,1),background .25s}
    .action-chevron svg{display:block;flex-shrink:0}
    .action-item.expanded .action-chevron{transform:rotate(90deg);background:rgba(0,229,160,.14)}
    .action-body{max-height:0;overflow:hidden;transition:max-height .52s cubic-bezier(.77,0,.18,1)}
    .action-item.expanded .action-body{max-height:680px}
    .action-body-pad{padding:0 10px 14px;display:flex;flex-direction:column;gap:7px}
    .aec-inner{border-radius:14px;padding:12px 14px;
      background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.06);
      opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease}
    .action-item.expanded .aec-inner:nth-child(1){opacity:1;transform:translateY(0);transition-delay:.07s}
    .action-item.expanded .aec-inner:nth-child(2){opacity:1;transform:translateY(0);transition-delay:.14s}
    .aec-dark{background:linear-gradient(120deg,rgba(0,229,160,.07),rgba(56,189,248,.06))!important;border-color:rgba(0,229,160,.14)!important}
    .aec-timeline{background:linear-gradient(120deg,rgba(56,189,248,.06),rgba(0,229,160,.05))!important;border-color:rgba(56,189,248,.14)!important}
    .aec-val-pill{display:inline-flex;align-items:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:8px;letter-spacing:.07em;border-radius:20px;padding:3px 10px;margin-bottom:10px}
    .aec-val-pill.crit{background:rgba(239,68,68,.1);color:var(--bad);border:1px solid rgba(239,68,68,.2)}
    .aec-val-pill.warn{background:rgba(0,229,160,.1);color:var(--warn);border:1px solid rgba(0,229,160,.2)}
    .aec-val-pill.norm{background:rgba(0,0,0,.05);color:rgba(13,15,20,.72);border:1px solid rgba(0,0,0,.10)}
    .aec-action-lbl{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;letter-spacing:.01em;color:#00B4D8;margin-bottom:10px}
    .aec-action-txt{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:400;color:rgba(13,15,20,.78);line-height:1.55}
    .atl-header{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;letter-spacing:.01em;color:#00B4D8;margin-bottom:16px}
    .atl-track-wrap{position:relative;height:46px;margin-bottom:16px}
    .atl-line-bg{position:absolute;top:50%;left:10px;right:10px;height:3px;background:rgba(0,0,0,.08);border-radius:2px;transform:translateY(-50%)}
    .atl-line-fill{position:absolute;top:50%;left:10px;height:3px;
      background:linear-gradient(to right,#EF4444,#F59E0B,#00E5A0);border-radius:2px;transform:translateY(-50%);
      transition:width .6s cubic-bezier(.77,0,.18,1);box-shadow:0 0 10px rgba(0,229,160,.25)}
    .atl-dots{position:absolute;top:0;left:0;right:0;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 10px}

// API URL

const API_URL = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:'

const urlParams = new URLSearchParams(window.location.search);

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
const stack = ['s-overview'];
let animating = false;

function push(id) {
  if (animating) return;
  animating = true;
  const from = document.getElementById(stack[stack.length - 1]);
  const to   = document.getElementById(id);
  stack.push(id);
  from.className = 'screen left';
  to.className   = 'screen active';
  triggerFades(to);
  setTimeout(() => animating = false, 450);
}

function pop() {
  if (stack.length <= 1 || animating) return;
  animating = true;
  const from = document.getElementById(stack.pop());
  const to   = document.getElementById(stack[stack.length - 1]);
  from.className = 'screen right';
  to.className   = 'screen active';
  triggerFades(to);
  setTimeout(() => animating = false, 450);
}

function triggerFades(el) {
  el.querySelectorAll('.fade').forEach(e => { e.style.animation='none'; e.offsetHeight; e.style.animation=''; });
}

function goBack() {
  if (stack.length > 1) { pop(); return; }
  if (EXAM_USER_ID) window.location.href = 'rg-publico.html?id=' + EXAM_USER_ID;
  else window.history.back();
}

function toNomeAmigavel(nome) {
  if (!nome) return 'Exame de Saúde';
  const n = nome.toLowerCase().trim();
  if (n.includes('multiplo') || n === 'múltiplos' || n === 'multiplos') return 'Painel Completo de Saúde';
  if (n.includes('hemograma')) return 'Exame de Sangue Completo';
  if (n.includes('lipidogram') || (n.includes('lipid') && !n.includes('vitamina'))) return 'Perfil do Coração';
  if (n.includes('glicemia') && n.includes('hba') || n.includes('glicada')) return 'Controle de Açúcar no Sangue';
  if (n.includes('glicemia') || n.includes('glicose')) return 'Nível de Açúcar no Sangue';
  if (n.includes('tsh') || n.includes('tireoide') || n.includes('tirói')) return 'Função da Tireoide';
  if (n.includes('testosterona')) return 'Hormônios Masculinos';
  if (n.includes('hormonal') || n.includes('estradiol') || n.includes('progesterona')) return 'Perfil Hormonal';

  if (n.includes('urina')) return 'Exame de Urina';

  if (n.includes('hepat') || n.includes('figado') || n.includes('tgo') || n.includes('tgp')) return 'Função do Fígado';
  if (n.includes('check') || n.includes('painel') || n.includes('completo')) return 'Painel Completo de Saúde';
  return nome;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateFull(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function calcScore(params) {
  if (!params || !params.length) return '--';
  const normals = params.filter(p => {
    const c = (p.classificacao || '').toUpperCase();
    return c === 'NORMAL' || c === '';
  }).length;
  return (normals / params.length * 10).toFixed(1);
}

function classToNeedle(cl) {
  if (!cl) return 52;
  const c = cl.toUpperCase();
  if (c === 'CRITICO') return 8;
  if (c === 'BAIXO') return 18;
  if (c === 'ALTO') return 84;
  return 52;
}

function apiStatusClass(s) {
  if (!s) return 'ok';
  const u = s.toUpperCase();
  if (u === 'CRITICO') return 'crit';
  if (u === 'ATENCAO') return 'warn';
  return 'ok';
}

const MILESTONES = {};

function toggleItem(id) {
  document.getElementById(id).classList.toggle('expanded');
}

function selectMilestone(id, ms, e) {
  if (e) e.stopPropagation();
  const data = MILESTONES[id];
  if (!data) return;
  document.querySelectorAll('#atl-card-' + id + ' .atl-milestone').forEach((m, i) => {
    m.classList.toggle('ms-active', i === ms);
  });
  document.getElementById('atl-fill-' + id).style.width = data.fillPct[ms];
  const benWrap = document.getElementById('atl-ben-' + id);
  if (!data.benefits[ms]) {
    benWrap.innerHTML = '<span class="atl-start-msg">Primeiro resultado aparece em ~30 dias</span>';
  } else {
    const chips = data.benefits[ms].map(b => `<span class="atl-ben-chip">${b}</span>`).join('');
    const ideal = data.ideal[ms] ? `<span class="atl-ideal-badge">${data.ideal[ms]}</span>` : '';
    benWrap.innerHTML = chips + ideal;
  }
}

function sanitizeId(nome) {
  return (nome || '').replace(/[^a-zA-Z0-9]/g, '');
}

function buildActionCard(param, idx) {
  const tlId   = sanitizeId(param.nome) + idx;
  const cls    = (param.classificacao || '').toUpperCase();
  const isCrit = cls === 'CRITICO';
  const dir    = cls === 'BAIXO' ? 'abaixo' : 'acima';
  const itemCls = isCrit ? 'crit-item' : 'warn-item';
  const pillCls = isCrit ? 'crit' : 'warn';
  const info   = MARKER_INFO[(param.nome || '').toLowerCase()];
  let acaoTxt  = 'Consulte seu médico para avaliar o tratamento adequado.';
  if (info && info.recs && info.recs.length > 0) {
    acaoTxt = `<strong>${info.recs[0].name}:</strong> ${info.recs[0].desc}`;
  }
  const tl      = getTimelineData(param);
  const fillPct = ['0%', '50%', '100%'];
  MILESTONES[tlId] = { fillPct, benefits: tl.benefits, ideal: tl.ideal };
  const defBen   = (tl.benefits[2] || []).map(b => `<span class="atl-ben-chip">${b}</span>`).join('');
  const defIdeal = tl.ideal[2] ? `<span class="atl-ideal-badge">${tl.ideal[2]}</span>` : '';
  const footerChips = (tl.footer || []).map(f => `<span class="atl-foot-chip">${f}</span>`).join('');
  const pillTxt = param.valor
    ? `${cls === 'BAIXO' ? '↓' : '↑'} ${param.valor}${param.unidade ? ' ' + param.unidade : ''}${param.valorReferencia ? ' · ideal ' + param.valorReferencia : ''}`
    : `${dir} do ideal`;

  return `
  <div class="action-item ${itemCls}" id="ac-${tlId}" onclick="toggleItem('ac-${tlId}')">
    <div class="action-header">
      <div class="action-main">
        <div class="action-title">${param.nome} ${dir} do ideal</div>
        <div class="action-chips">
          <span class="achip">${isCrit ? 'Ação necessária' : 'Monitorar'}</span>
          <span class="achip">${isCrit ? 'Urgente' : 'Fácil'}</span>
        </div>
      </div>
      <div class="action-chevron"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="action-body">
      <div class="action-body-pad">
        <div class="aec-inner aec-dark">
          <div class="aec-val-pill ${pillCls}">${pillTxt}</div>
          <div class="aec-action-lbl">O que fazer</div>
          <div class="aec-action-txt">${acaoTxt}</div>
        </div>
        <div class="aec-inner aec-timeline" id="atl-card-${tlId}">
          <div class="atl-header">O que você vai ganhar</div>
          <div class="atl-track-wrap">
            <div class="atl-line-bg"></div>
            <div class="atl-line-fill" id="atl-fill-${tlId}" style="width:100%"></div>
            <div class="atl-dots">
              <div class="atl-milestone" onclick="selectMilestone('${tlId}',0,event)"><div class="atl-dot"></div><div class="atl-ms-time">${tl.labels[0]}</div></div>
              <div class="atl-milestone" onclick="selectMilestone('${tlId}',1,event)"><div class="atl-dot"></div><div class="atl-ms-time">${tl.labels[1]}</div></div>
              <div class="atl-milestone ms-active" onclick="selectMilestone('${tlId}',2,event)"><div class="atl-dot"></div><div class="atl-ms-time">${tl.labels[2]}</div></div>
            </div>
          </div>
          <div class="atl-ben-wrap" id="atl-ben-${tlId}">${defBen}${defIdeal}</div>
          <div class="atl-footer">${footerChips}</div>
        </div>
        <button class="ab-cta" onclick="event.stopPropagation();push('s-melhorias')">Ver protocolo completo →</button>
      </div>
    </div>
  </div>`;
}

      <div class="status-box-text">bom</div>
    </div>
    ${warnParams.length > 0 ? `<div class="status-box warn" style="animation-delay:.4s" onclick="openBiolist('warn')">
      <div class="status-box-count">${warnParams.length}</div>
      <div class="status-box-text">médio</div>
    </div>` : ''}
    ${critParams.length > 0 ? `<div class="status-box crit" style="animation-delay:.5s" onclick="openBiolist('crit')">
      <div class="status-box-count">${critParams.length}</div>
      <div class="status-box-text">ruim</div>
    </div>` : ''}`;

  document.getElementById('sysGrid').innerHTML = `
    <div class="narr-card fade d2">
      <div class="narr-txt">${explanation}</div>
    </div>
    <div class="status-boxes-wrap fade d3">
      <div class="status-boxes-label">Biomarcadores</div>
      <div class="status-boxes">${boxesHtml}</div>
    </div>`;

  // Action insight cards
  const crits   = params.filter(p => (p.classificacao || '').toUpperCase() === 'CRITICO');
  const warns   = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'ALTO' || c === 'BAIXO'; });
  const normals = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'NORMAL' || c === ''; });

  const toResolve = [...crits.slice(0, 2), ...warns.slice(0, 1)];
  let actionItems = '';
  if (toResolve.length === 0 && normals.length > 0) {
    actionItems = `<div class="celebrate-banner">
      <div class="cb-row">
        <div class="cb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg></div>
        <div>
          <div class="cb-title">${normals.length} marcadores saudáveis</div>
          <div class="cb-sub">Seu corpo está em equilíbrio. Continue com os hábitos que te trouxeram até aqui.</div>
        </div>
      </div>
    </div>`;
  } else {
    toResolve.forEach((p, i) => { actionItems += buildActionCard(p, i); });
    if (normals.length > 0) actionItems += buildOkCard(normals.length);
  }

  document.getElementById('insightsWrap').innerHTML =
    `<div class="action-list">${actionItems}</div>`;

  renderMelhorias();
}

// ══════════════════════════════
// BIOLIST SCREEN
// ══════════════════════════════
function openBiolist(status) {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  let filtered, title, sub, dotCls;
  if (status === 'ok') {
    filtered = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; });
    title = 'Biomarcadores bons'; sub = 'Todos dentro da faixa ideal'; dotCls = 'ok';
  } else if (status === 'warn') {
    filtered = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO'; });
    title = 'Biomarcadores médios'; sub = 'Merecem um olhar mais atento'; dotCls = 'warn';
  } else {
    filtered = params.filter(p => (p.classificacao||'').toUpperCase() === 'CRITICO');
    title = 'Biomarcadores ruins'; sub = 'Precisam de atenção'; dotCls = 'crit';
  }

  let html = `<div class="biolist-title">${title}</div>`;
  html += `<div class="biolist-sub">${filtered.length} biomarcador${filtered.length !== 1 ? 'es' : ''} · ${sub}</div>`;
  filtered.forEach((p, i) => {
    html += `
      <div class="biolist-item" style="animation-delay:${0.15 + i * 0.05}s" onclick='openMarker(${escapeJson(p)})'>
        <div class="biolist-dot ${dotCls}"></div>
        <div class="biolist-name">${p.nome || '--'}</div>
        <div class="biolist-val">${p.valor || '--'} ${p.unidade || ''}</div>
        <div class="biolist-arrow">›</div>
      </div>`;
  });

  document.getElementById('biolistContent').innerHTML = html;
  push('s-biolist');
}

// ══════════════════════════════
// MARKER SCREEN
// ══════════════════════════════
function openMarker(paramOrStr) {
  const p = typeof paramOrStr === 'string' ? JSON.parse(paramOrStr) : paramOrStr;
  renderMarker(p);
  push('s-marker');
}

function renderMarker(p) {
  if (!p) return;
  const cl       = (p.classificacao || '').toUpperCase();
  const valCls   = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO' || cl === 'BAIXO') ? 'warn' : 'ok';
  const badgeLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Abaixo do ideal' : cl === 'ALTO' ? 'Acima do ideal' : 'Normal';
  const needlePos  = classToNeedle(cl);
  const sys        = getSystem(p.nome);

  const nome  = (p.nome || '').toLowerCase();
  let meaning = { title: `${p.nome} afeta sua saúde`, body: `Valor encontrado: <strong>${p.valor} ${p.unidade || ''}</strong>. Referência: ${p.valorReferencia || 'ver laudo do laboratório'}.` };
  if (p.explicacao_simples) {
    meaning = { title: p.impacto_pessoal || `${p.nome} afeta sua saúde`, body: p.explicacao_simples };
  } else {
    for (const k in MARKER_INFO) {
      if (nome.includes(k)) { meaning = { title: MARKER_INFO[k].title, body: MARKER_INFO[k].body }; break; }
    }
  }

  let recs = [];
  if (p.dicas) {
    const dicas = Array.isArray(p.dicas) ? p.dicas : [p.dicas];
    recs = dicas.map(d => ({ name: p.nome, desc: d }));
  } else {
    recs = getRecsForParam(nome);
  }

  const recsHtml = recs.map(r => `
    <div class="otc-gc">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <div class="otc-type">Dica</div>
        </div>
        <div>
          <div class="otc-name">${r.name}</div>
          <div class="otc-desc">${r.desc}</div>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('markerContent').innerHTML = `
    <div class="gc fade d1">
      <div class="gi">
        <div class="mk-ey">Sistema ${sys}</div>
        <div class="mk-name">${p.nome}</div>
        <div class="mk-val-row">
          <div class="mk-val ${valCls}">${p.valor || '--'}</div>
          <div class="mk-unit">${p.unidade || ''}</div>
        </div>
        <div class="mk-ref-row">
          <div class="mk-ref">${p.valorReferencia ? 'Ref: ' + p.valorReferencia : ''}</div>
          <div class="badge ${valCls}">${badgeLabel}</div>
        </div>
      </div>
    </div>
    <div class="gc-s fade d2">
      <div class="gi">
        <div class="spec-label">Onde você está na escala</div>
        <div class="spec-track"><div class="spec-needle" style="left:${needlePos}%"></div></div>
        <div class="spec-zones">
          <span class="sz">Crítico</span><span class="sz">Baixo</span><span class="sz">Normal</span><span class="sz">Ótimo</span><span class="sz">Alto</span>
        </div>
      </div>
    </div>
    <div class="gc-s fade d3">
      <div class="gi">
        <div class="mn-ey">O que isso significa</div>
        <div class="mn-title">${meaning.title}</div>
        <div class="mn-body">${meaning.body}</div>
      </div>
    </div>
    ${recsHtml ? `<div class="sec-label fade d4">O que fazer</div>${recsHtml}` : ''}`;
}

// ══════════════════════════════
// MELHORIAS SCREEN
// ══════════════════════════════
function renderMelhorias() {
  if (!currentExam) return;
  const params = currentExam.parametros || [];

  const critParam = params.find(p => (p.classificacao || '').toUpperCase() === 'CRITICO')
    || params.find(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'ALTO' || c === 'BAIXO'; });

  let html = '';

  if (critParam) {
    const cl     = (critParam.classificacao || '').toUpperCase();
    const dir    = cl === 'BAIXO' ? 'abaixo' : cl === 'ALTO' ? 'acima' : '';
    const needle = classToNeedle(cl);
    const tags   = ['Mais energia', 'Melhor saúde', 'Qualidade de vida'].map(t => `<span class="pc-tag">${t}</span>`).join('');
    html += `
      <div class="gc-priority fade d1">
        <div class="gi-priority">
          <div class="pc-ey">Prioridade principal</div>
          <div class="pc-title">Resolver ${critParam.nome}</div>
          <div class="pc-body">Seu ${critParam.nome} está ${dir || 'fora do padrão'}: ${critParam.valor} ${critParam.unidade || ''}. ${critParam.valorReferencia ? 'O ideal é ' + critParam.valorReferencia + '.' : ''} Corrigir isso pode trazer impacto visível na sua energia e bem-estar.</div>
          <div class="pc-tags">${tags}</div>
          <div class="fv-label-row">Trajetória esperada com intervenção</div>
          <div class="fv-row">
            <div class="fv-time">Agora</div>
            <div class="fv-spec"><div class="fv-track"></div><div class="fv-pin" style="left:${needle}%"></div></div>
            <div class="fv-val bad">${critParam.valor} ${critParam.unidade || ''}</div>
          </div>
          <div class="fv-row" style="margin-top:6px">
            <div class="fv-time">30 dias</div>
            <div class="fv-spec"><div class="fv-track"></div><div class="fv-pin" style="left:${Math.min(needle + 20, 55)}%"></div></div>
            <div class="fv-val" style="color:var(--warn);font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;width:60px">Melhorando</div>
          </div>
          <div class="fv-row">
            <div class="fv-time">90 dias</div>
            <div class="fv-spec"><div class="fv-track"></div><div class="fv-pin" style="left:55%"></div></div>
            <div class="fv-val good">Nível ideal ✓</div>
          </div>
          <div style="margin-top:18px"></div>
          <button class="pc-btn" onclick='openMarker(${escapeJson(critParam)})'>Ver como resolver →</button>
        </div>
      </div>`;
  } else {
    html += `
      <div class="gc-priority fade d1">
        <div class="gi-priority">
          <div class="pc-ey">Parabéns</div>
          <div class="pc-title">Todos os marcadores normais</div>
          <div class="pc-body">Seu exame está dentro dos parâmetros ideais. Continue com os hábitos que te trouxeram até aqui.</div>
          <div class="pc-tags"><span class="pc-tag">Saúde ótima</span><span class="pc-tag">Continue assim</span></div>
        </div>
      </div>`;
  }

  const warnParams = params.filter(p => {
    const c = (p.classificacao || '').toUpperCase();
    return (c === 'ALTO' || c === 'BAIXO') && p !== critParam;
  });

  if (warnParams.length > 0) {
    html += '<div class="sec-label fade d2">Outras melhorias</div><div class="rec-section fade d2">';
    warnParams.slice(0, 3).forEach(p => {
      const cl  = (p.classificacao || '').toUpperCase();
      const dir = cl === 'BAIXO' ? 'abaixo' : 'acima';
      html += `
        <div class="rec-item-gc" onclick='openMarker(${escapeJson(p)})'>
          <div class="rec-gi">
            <div class="ri-top">
              <div class="ri-icon">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#00B4D8" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
              </div>
              <div class="ri-text">
                <div class="ri-title">${p.nome} ${dir} do ideal</div>
                <div class="ri-sub">${p.valor} ${p.unidade || ''} — ${p.valorReferencia ? 'Ref: ' + p.valorReferencia : 'Monitorar'}. Clique para ver como melhorar.</div>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  html += `
    <div class="sec-label fade d4">Hábitos gerais de saúde</div>
    <div class="otc-gc fade d4">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
          <div class="otc-type">Grátis</div>
        </div>
        <div>
          <div class="otc-name">Exercício e sono</div>
          <div class="otc-desc">30 min de caminhada por dia + 7-8h de sono melhoram praticamente todos os marcadores de saúde.</div>
        </div>
      </div>
    </div>
    <div class="otc-gc fade d5" style="margin-bottom:20px">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M12 22V12m0 0C12 6 7 4 7 4s0 5 5 8zm0 0c0-6 5-8 5-8s0 5-5 8"/></svg>
          <div class="otc-type">Grátis</div>
        </div>
        <div>
          <div class="otc-name">Hidratação adequada</div>
          <div class="otc-desc">2 litros de água por dia melhoram transporte de nutrientes, função renal e energia celular.</div>
        </div>
      </div>
    </div>`;

  document.getElementById('melhoriaContent').innerHTML = html;
}

// ══════════════════════════════
// INIT — fetch public exam
// ══════════════════════════════
async function init() {
  if (!EXAM_ID || !EXAM_USER_ID) {
    document.getElementById('sysGrid').innerHTML = `
      <div style="padding:40px 20px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:rgba(13,15,20,.45)">
        Parâmetros de exame não encontrados.
      </div>`;
    return;
  }

  renderSkeleton();

  try {
    const res = await fetch(`${API_URL}/autorizacao/exame-publico/${EXAM_USER_ID}/${EXAM_ID}`);
    if (!res.ok) throw new Error('Exame não encontrado');
    const data = await res.json();
    currentExam = data.exame || data;
    renderHeroCard(currentExam);
    renderOverview();
  } catch (err) {
    document.getElementById('sysGrid').innerHTML = `
      <div style="padding:40px 20px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:rgba(13,15,20,.45)">
        Não foi possível carregar o exame. Tente novamente.
      </div>`;
    console.error('[exame-publico] erro:', err.message);
  }
}

init();
</script>
