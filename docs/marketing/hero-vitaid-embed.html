<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Hero embed (devices only)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:transparent;color:#0D0F14}

/* PALCO transparente — só pra centralizar */
.stage{
  position:relative;
  width:100%;
  min-height:620px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  background:transparent;
}

.composite{
  position:relative;
  width:100%;
  max-width:1100px;
  height:560px;
  margin:0 auto;
}

/* ═════════ LAPTOP CENTRAL ═════════ */
.laptop{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:740px;
  z-index:5;
  filter:drop-shadow(0 30px 60px rgba(13,15,20,.18)) drop-shadow(0 12px 24px rgba(13,15,20,.10));
}
.laptop-screen{
  position:relative;
  width:100%;
  background:#0D0F14;
  border-radius:14px 14px 4px 4px;
  padding:14px 14px 18px;
  border:1px solid #1A1E26;
}
.laptop-bezel-top{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:64px;
  height:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.laptop-bezel-top::before{
  content:'';
  width:5px;height:5px;border-radius:50%;
  background:#2A2E36;
}
.laptop-display{
  width:100%;
  aspect-ratio:16/10;
  background:#fff;
  border-radius:4px;
  overflow:hidden;
  position:relative;
}
.laptop-display img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top left;
  display:block;
}
.laptop-base{
  position:relative;
  width:108%;
  margin-left:-4%;
  height:14px;
  background:linear-gradient(180deg, #D7DBE3 0%, #B8BDC8 50%, #9098A5 100%);
  border-radius:0 0 18px 18px;
}
.laptop-base::after{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:120px;
  height:6px;
  background:#7A8090;
  border-radius:0 0 8px 8px;
}

/* ═════════ IPHONES LATERAIS ═════════ */
.phone{
  position:absolute;
  bottom:-30px;
  width:230px;
  height:498px;
  background:#0D0F14;
  border-radius:36px;
  padding:6px;
  border:1px solid #1A1E26;
  box-shadow:
    0 0 0 1.5px rgba(0,229,160,.10),
    0 30px 60px rgba(13,15,20,.22),
    0 10px 24px rgba(13,15,20,.12);
  z-index:6;
}
.phone-screen{
  width:100%;height:100%;
  background:#F4F6FA;
  border-radius:30px;
  overflow:hidden;
  position:relative;
}
.phone-notch{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:74px;
  height:20px;
  background:#0D0F14;
  border-radius:0 0 14px 14px;
  z-index:10;
}
.phone-screen iframe{
  width:393px;
  height:852px;
  border:0;
  transform:scale(0.555);
  transform-origin:top left;
  display:block;
}

.phone.left{ left:0; transform:rotate(-4deg); }
.phone.right{ right:0; transform:rotate(4deg); }
</style>
</head>
<body>

<div class="stage">
  <div class="composite">

    <!-- iPhone esquerda — aba EXAMES do paciente -->
    <div class="phone left">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe src="screens/iphone-exames.html" title="Exames do paciente" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Laptop central — RESUMO 1 MINUTO do médico (capturado do app real em produção) -->
    <div class="laptop">
      <div class="laptop-screen">
        <div class="laptop-bezel-top"></div>
        <div class="laptop-display">
          <img src="screens/thumbs/laptop-real.png" alt="Resumo de 1 minuto do paciente">
        </div>
      </div>
      <div class="laptop-base"></div>
    </div>

    <!-- iPhone direita — PRÉ-CONSULTA respondendo -->
    <div class="phone right">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe src="screens/iphone-preconsulta.html" title="Pré-consulta respondendo" loading="lazy"></iframe>
      </div>
    </div>

  </div>
</div>

</body>
</html>
