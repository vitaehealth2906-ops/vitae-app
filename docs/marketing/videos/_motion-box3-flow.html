<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Box 3 — Dois cliques, paciente confirma (motion)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0D0F14; overflow:hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .stage {
    width: 1280px; height: 720px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 900px 700px at 50% 50%, rgba(92,221,164,0.07), transparent 65%),
      linear-gradient(180deg, #F8FAFE 0%, #EFF3F8 100%);
  }

  /* Pausa todas as animações até body.go ser adicionado */
  .stage *, .stage { animation-play-state: paused !important; }
  body.go .stage *, body.go .stage { animation-play-state: running !important; }

  /* ──────────────────────────────────────────────────────────────
     CURSOR (universal — aparece em várias cenas)
     ────────────────────────────────────────────────────────────── */
  .cursor {
    position: absolute;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
  }
  .cursor svg { width:100%; height:100%; }

  /* ──────────────────────────────────────────────────────────────
     CENA 1 — Botão "Exportar prontuário"
     ────────────────────────────────────────────────────────────── */
  .scene1-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 38px;
    background: rgba(21,101,192,0.08);
    border: 1.5px solid rgba(21,101,192,0.22);
    color: #1565C0;
    font-size: 22px;
    font-weight: 800;
    border-radius: 16px;
    letter-spacing: -0.02em;
    box-shadow: 0 12px 32px -8px rgba(21,101,192,0.25);
    opacity: 0;
    animation: s1-btn 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .scene1-btn svg {
    width: 26px; height: 26px;
    stroke: #1565C0;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  @keyframes s1-btn {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    4%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    13%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    14%  { transform: translate(-50%, -50%) scale(0.96); background: rgba(21,101,192,0.18); }
    16%  { opacity: 1; transform: translate(-50%, -50%) scale(1); background: rgba(21,101,192,0.08); }
    18%  { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
  }
  .scene1-cursor {
    animation: s1-cursor 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes s1-cursor {
    0%   { opacity: 0; left: 920px; top: 540px; }
    4%   { opacity: 1; left: 920px; top: 540px; }
    11%  { opacity: 1; left: 700px; top: 380px; }   /* hover no botão */
    13%  { opacity: 1; left: 700px; top: 380px; }   /* clica */
    16%  { opacity: 1; left: 700px; top: 380px; }
    19%  { opacity: 0; left: 700px; top: 380px; }
    100% { opacity: 0; left: 700px; top: 380px; }
  }

  /* ──────────────────────────────────────────────────────────────
     CENA 2 — Popup iClinic + check verificado
     ────────────────────────────────────────────────────────────── */
  .scene2-popup {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    width: 740px;
    height: auto;
    opacity: 0;
    border-radius: 16px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 6px 18px rgba(0,0,0,0.08);
    animation: s2-popup 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .scene2-popup img { width: 100%; display: block; border-radius: 16px; }
  @keyframes s2-popup {
    0%, 18% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    22%     { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    44%     { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    48%     { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    100%    { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
  }

  /* Check de verificado */
  .scene2-check {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 110px; height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5CDDA4, #2BC58A);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 36px rgba(43,197,138,0.45), 0 0 0 18px rgba(92,221,164,0.18);
    z-index: 50;
    opacity: 0;
    animation: s2-check 9000ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .scene2-check svg {
    width: 56px; height: 56px;
    stroke: #fff;
    stroke-width: 4;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: s2-check-draw 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes s2-check {
    0%, 34% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    38%     { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    40%     { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    44%     { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    48%     { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    100%    { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
  }
  @keyframes s2-check-draw {
    0%, 36% { stroke-dashoffset: 50; }
    42%     { stroke-dashoffset: 0; }
    100%    { stroke-dashoffset: 0; }
  }

  .scene2-cursor {
    animation: s2-cursor 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes s2-cursor {
    0%, 20% { opacity: 0; left: 940px; top: 580px; }
    24%     { opacity: 1; left: 940px; top: 580px; }
    32%     { opacity: 1; left: 530px; top: 530px; }   /* hover botão Copiar */
    34%     { opacity: 1; left: 530px; top: 530px; }
    36%     { opacity: 0; left: 530px; top: 530px; }
    100%    { opacity: 0; left: 530px; top: 530px; }
  }

  /* ──────────────────────────────────────────────────────────────
     CENA 3 — Botão "Marcar retorno" → "Aguardando" → vira iPhone
     ────────────────────────────────────────────────────────────── */
  .scene3-shape {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    height: 68px;
    border-radius: 16px;
    background: #2BC58A;
    box-shadow: 0 14px 36px -8px rgba(43,197,138,0.45);
    opacity: 0;
    overflow: hidden;
    animation: s3-shape 9000ms cubic-bezier(0.83, 0, 0.17, 1) forwards;
  }
  @keyframes s3-shape {
    /* aparece como botão "Marcar retorno" */
    0%, 50%   { opacity: 0; width: 360px; height: 68px; border-radius: 16px; background: #2BC58A; box-shadow: 0 14px 36px -8px rgba(43,197,138,0.45); transform: translate(-50%, -50%) scale(0.94); }
    54%       { opacity: 1; width: 360px; height: 68px; border-radius: 16px; background: #2BC58A; box-shadow: 0 14px 36px -8px rgba(43,197,138,0.45); transform: translate(-50%, -50%) scale(1); }
    60%       { opacity: 1; width: 360px; height: 68px; border-radius: 16px; background: #2BC58A; box-shadow: 0 14px 36px -8px rgba(43,197,138,0.45); transform: translate(-50%, -50%) scale(1); }
    /* clique → encolhe um pouco */
    61%       { width: 360px; height: 68px; transform: translate(-50%, -50%) scale(0.97); background:#249E70; box-shadow: 0 6px 18px -6px rgba(43,197,138,0.5); }
    /* vira "Aguardando paciente confirmar" (mesmo formato, cor mais clara) */
    63%       { opacity: 1; width: 360px; height: 68px; border-radius: 16px; background: #FFFAEB; box-shadow: 0 10px 28px -8px rgba(245,158,11,0.32); transform: translate(-50%, -50%) scale(1); }
    /* permanece (durante o pisca-pisca dentro do shape) */
    78%       { opacity: 1; width: 360px; height: 68px; border-radius: 16px; background: #FFFAEB; box-shadow: 0 10px 28px -8px rgba(245,158,11,0.32); transform: translate(-50%, -50%) scale(1); }
    /* morfa em iPhone */
    86%       { opacity: 1; width: 316px; height: 660px; border-radius: 44px; background: #0D0F14; box-shadow: 0 40px 90px -10px rgba(13,15,20,0.45); transform: translate(-50%, -50%) scale(1); }
    100%      { opacity: 1; width: 316px; height: 660px; border-radius: 44px; background: #0D0F14; box-shadow: 0 40px 90px -10px rgba(13,15,20,0.45); transform: translate(-50%, -50%) scale(1); }
  }

  /* Texto "Marcar retorno" */
  .scene3-text-1 {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: inline-flex; align-items: center; gap: 12px;
    color: #fff;
    font-size: 19px; font-weight: 800;
    letter-spacing: -0.01em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 110;
    animation: s3-text1 9000ms linear forwards;
  }
  .scene3-text-1 svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  @keyframes s3-text1 {
    0%, 53%   { opacity: 0; }
    56%       { opacity: 1; }
    60%       { opacity: 1; }
    62%       { opacity: 0; }
    100%      { opacity: 0; }
  }

  /* Texto "Aguardando paciente confirmar" (pisca 3x) */
  .scene3-text-2 {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: inline-flex; align-items: center; gap: 10px;
    color: #B45309;
    font-size: 16.5px; font-weight: 800;
    letter-spacing: -0.01em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 110;
    animation: s3-text2 9000ms linear forwards;
  }
  .scene3-text-2::before {
    content: '';
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #F59E0B;
    box-shadow: 0 0 0 4px rgba(245,158,11,0.22);
  }
  @keyframes s3-text2 {
    /* aparece em 63% */
    0%, 62%   { opacity: 0; }
    63%       { opacity: 1; }
    /* pisca 3 vezes entre 63% e 84% */
    66%       { opacity: 0.25; }
    69%       { opacity: 1; }
    72%       { opacity: 0.25; }
    75%       { opacity: 1; }
    78%       { opacity: 0.25; }
    81%       { opacity: 1; }
    /* morfa pra iPhone — texto some */
    83%       { opacity: 0; }
    100%      { opacity: 0; }
  }

  /* Tela do iPhone (aparece quando shape virou iPhone) */
  .scene3-iphone-screen {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 296px;
    height: 640px;
    border-radius: 36px;
    overflow: hidden;
    background: #F4F6FA;
    opacity: 0;
    z-index: 105;
    animation: s3-iphone-screen 9000ms linear forwards;
  }
  .scene3-iphone-screen::before {
    content: '';
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 26px;
    background: #0D0F14;
    border-radius: 14px;
    z-index: 20;
  }
  .scene3-iphone-screen img { width: 100%; display: block; }
  @keyframes s3-iphone-screen {
    0%, 84%   { opacity: 0; }
    87%       { opacity: 1; }
    100%      { opacity: 1; }
  }

  .scene3-cursor {
    animation: s3-cursor 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes s3-cursor {
    0%, 51%   { opacity: 0; left: 900px; top: 460px; }
    55%       { opacity: 1; left: 900px; top: 460px; }
    59%       { opacity: 1; left: 660px; top: 380px; }    /* clica em Marcar retorno */
    62%       { opacity: 1; left: 660px; top: 380px; }
    65%       { opacity: 0; left: 660px; top: 380px; }
    100%      { opacity: 0; }
  }

  /* ──────────────────────────────────────────────────────────────
     CENA 4 — Dedo do paciente clica "Confirmar essa data" + flash verde
     ────────────────────────────────────────────────────────────── */
  /* Overlay verde no iPhone quando paciente confirma */
  .scene4-flash {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 296px;
    height: 640px;
    border-radius: 36px;
    background: radial-gradient(circle at center, rgba(92,221,164,0.5), rgba(43,197,138,0.0) 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 110;
    animation: s4-flash 9000ms ease-out forwards;
  }
  @keyframes s4-flash {
    0%, 93%   { opacity: 0; }
    94%       { opacity: 1; }
    100%      { opacity: 0; }
  }
  /* Dedo do paciente — posicionado sobre "Confirmar essa data" */
  .scene4-finger {
    position: absolute;
    top: 50%;
    left: 50%;
    margin-top: -50px;    /* sobre "Confirmar essa data" */
    margin-left: -62px;   /* botão fica na metade esquerda do iPhone */
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(13,15,20,0.22);
    border: 3px solid rgba(13,15,20,0.6);
    opacity: 0;
    z-index: 115;
    transform: translate(-50%, -50%) scale(1.2);
    animation: s4-finger 9000ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes s4-finger {
    0%, 88%   { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
    90%       { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    93%       { opacity: 1; transform: translate(-50%, -50%) scale(0.85); }
    95%       { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
    100%      { opacity: 0; }
  }

  /* ──────────────────────────────────────────────────────────────
     LEGENDA inferior (curta, muda por cena)
     ────────────────────────────────────────────────────────────── */
  .label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 22px;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(10px);
    color: #fff;
    border-radius: 100px;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    z-index: 300;
  }
  .label .l { position: absolute; left:50%; top:50%; transform:translate(-50%,-50%); opacity:0; white-space: nowrap; }
  .lbl-1 { animation: lbl-1 9000ms linear forwards; }
  .lbl-2 { animation: lbl-2 9000ms linear forwards; }
  .lbl-3 { animation: lbl-3 9000ms linear forwards; }
  .lbl-4 { animation: lbl-4 9000ms linear forwards; }
  @keyframes lbl-1 { 0%,3% {opacity:0;} 6%,16% {opacity:1;} 19%,100% {opacity:0;} }
  @keyframes lbl-2 { 0%,21% {opacity:0;} 24%,46% {opacity:1;} 49%,100% {opacity:0;} }
  @keyframes lbl-3 { 0%,52% {opacity:0;} 56%,82% {opacity:1;} 85%,100% {opacity:0;} }
  @keyframes lbl-4 { 0%,85% {opacity:0;} 88%,97% {opacity:1;} 100% {opacity:0;} }
  .label-bg {
    width: 1px; visibility: hidden; /* spacer pra manter altura constante */
  }

  /* Wrapper pra dar tamanho mínimo à pílula */
  .label-host {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 22px;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(10px);
    color: #fff;
    border-radius: 100px;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    z-index: 300;
    min-width: 360px;
    text-align: center;
    opacity: 0;
    animation: lbl-host 9000ms linear forwards;
  }
  @keyframes lbl-host {
    0%,2% { opacity: 0; }
    5% { opacity: 1; }
    97% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="stage">

  <!-- ═══════ CENA 1: Botão Exportar prontuário + cursor ═══════ -->
  <button class="scene1-btn">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Exportar prontuário
  </button>
  <div class="cursor scene1-cursor">
    <svg viewBox="0 0 24 24"><path d="M5 3l14 8-6 2-2 6-6-16z" fill="#fff" stroke="#0D0F14" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </div>

  <!-- ═══════ CENA 2: Popup iClinic + check ═══════ -->
  <div class="scene2-popup">
    <img src="../screens/thumbs/box3-exportar-modal.png" alt="">
  </div>
  <div class="scene2-check">
    <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
  </div>
  <div class="cursor scene2-cursor">
    <svg viewBox="0 0 24 24"><path d="M5 3l14 8-6 2-2 6-6-16z" fill="#fff" stroke="#0D0F14" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </div>

  <!-- ═══════ CENA 3: Marcar retorno → Aguardando → iPhone ═══════ -->
  <div class="scene3-shape"></div>
  <div class="scene3-text-1">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Marcar retorno
  </div>
  <div class="scene3-text-2">Aguardando paciente confirmar</div>
  <div class="scene3-iphone-screen">
    <img src="../screens/thumbs/box3-pac-proxima.png" alt="">
  </div>
  <div class="cursor scene3-cursor">
    <svg viewBox="0 0 24 24"><path d="M5 3l14 8-6 2-2 6-6-16z" fill="#fff" stroke="#0D0F14" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </div>

  <!-- ═══════ CENA 4: paciente confirma ═══════ -->
  <div class="scene4-flash"></div>
  <div class="scene4-finger"></div>

</div>
</body>
</html>
