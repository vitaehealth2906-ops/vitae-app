<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Hero showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#F7F8FB;color:#0D0F14;min-height:100vh}

/* PALCO — degradê suave igual ao da imagem MAIA */
.stage{
  position:relative;
  width:100%;
  min-height:880px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:80px 24px 100px;
  background:
    radial-gradient(ellipse 70% 45% at 50% 100%, rgba(0,229,160,.06), transparent 60%),
    radial-gradient(ellipse 50% 30% at 50% 10%, rgba(0,180,216,.04), transparent 60%),
    #FAFBFC;
  overflow:hidden;
}

/* "CHÃO" — sombra/reflexo dos devices */
.stage::after{
  content:'';
  position:absolute;
  left:50%;
  bottom:40px;
  width:80%;
  height:60px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse 60% 100% at 50% 50%, rgba(13,15,20,.10), transparent 70%);
  z-index:1;
  filter:blur(8px);
}

.composite{
  position:relative;
  width:100%;
  max-width:1100px;
  height:560px;
  margin:0 auto;
  z-index:2;
}

/* ═════════ LAPTOP CENTRAL ═════════ */
.laptop{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:740px;
  z-index:5;
  filter:drop-shadow(0 30px 60px rgba(13,15,20,.18)) drop-shadow(0 12px 24px rgba(13,15,20,.10));
}
.laptop-screen{
  position:relative;
  width:100%;
  background:#0D0F14;
  border-radius:14px 14px 4px 4px;
  padding:14px 14px 18px;
  border:1px solid #1A1E26;
}
.laptop-bezel-top{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:64px;
  height:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.laptop-bezel-top::before{
  content:'';
  width:5px;height:5px;border-radius:50%;
  background:#2A2E36;
}
.laptop-display{
  width:100%;
  aspect-ratio:16/10;
  background:#fff;
  border-radius:4px;
  overflow:hidden;
  position:relative;
}
.laptop-display img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top left;
  display:block;
}
/* Base/hinge do laptop */
.laptop-base{
  position:relative;
  width:108%;
  margin-left:-4%;
  height:14px;
  background:linear-gradient(180deg, #D7DBE3 0%, #B8BDC8 50%, #9098A5 100%);
  border-radius:0 0 18px 18px;
}
.laptop-base::after{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:120px;
  height:6px;
  background:#7A8090;
  border-radius:0 0 8px 8px;
}

/* ═════════ IPHONES LATERAIS ═════════ */
.phone{
  position:absolute;
  bottom:-30px;
  width:230px;
  height:498px;
  background:#0D0F14;
  border-radius:36px;
  padding:6px;
  border:1px solid #1A1E26;
  box-shadow:
    0 0 0 1.5px rgba(0,229,160,.10),
    0 30px 60px rgba(13,15,20,.22),
    0 10px 24px rgba(13,15,20,.12);
  z-index:6;
}
.phone-screen{
  width:100%;height:100%;
  background:#F4F6FA;
  border-radius:30px;
  overflow:hidden;
  position:relative;
}
.phone-notch{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:74px;
  height:20px;
  background:#0D0F14;
  border-radius:0 0 14px 14px;
  z-index:10;
}
.phone-screen iframe{
  width:393px;
  height:852px;
  border:0;
  transform:scale(0.555);
  transform-origin:top left;
  display:block;
}

.phone.left{ left:0; transform:rotate(-4deg); }
.phone.right{ right:0; transform:rotate(4deg); }

/* ═════════ LEGENDA ═════════ */
.headline{
  position:relative;
  z-index:3;
  max-width:780px;
  margin:30px auto 70px;
  text-align:center;
  padding:0 24px;
}
.eyebrow{
  font-size:11px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#00C47A;
  margin-bottom:14px;
}
.headline h1{
  font-size:42px;
  font-weight:900;
  letter-spacing:-1.2px;
  line-height:1.05;
  color:#0D0F14;
  margin-bottom:16px;
}
.headline h1 em{
  font-style:italic;
  background:linear-gradient(120deg,#00E5A0 0%,#00B4D8 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  padding-right:.08em;
}
.headline p{
  font-size:16px;
  color:#6B7280;
  line-height:1.55;
  max-width:560px;
  margin:0 auto;
}

/* ═════════ LOGO TOP ═════════ */
.brand{
  position:absolute;
  top:32px;
  left:50%;
  transform:translateX(-50%);
  display:inline-flex;
  align-items:center;
  gap:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:900;
  font-size:24px;
  letter-spacing:-1px;
  z-index:10;
}
.brand .vita{color:#0D0F14}
.brand .id{
  background:linear-gradient(120deg,#00E5A0,#00B4D8);
  color:#fff;
  padding:3px 10px 4px;
  border-radius:8px;
  margin-left:4px;
}

@media (max-width:1100px){
  .composite{max-width:920px}
  .laptop{width:620px}
  .phone{width:200px;height:434px}
  .laptop-display iframe{transform:scale(.412)}
  .phone-screen iframe{transform:scale(.482)}
}
@media (max-width:880px){
  .composite{max-width:720px;height:480px}
  .laptop{width:500px}
  .phone{width:170px;height:368px;bottom:-20px}
  .laptop-display iframe{transform:scale(.332)}
  .phone-screen iframe{transform:scale(.41)}
  .headline h1{font-size:32px}
}
@media (max-width:720px){
  .stage{padding:60px 16px 40px}
  .composite{height:380px;max-width:560px}
  .laptop{width:380px}
  .phone{width:130px;height:282px;bottom:-10px}
  .laptop-display iframe{transform:scale(.253)}
  .phone-screen iframe{transform:scale(.314)}
  .headline h1{font-size:26px}
  .headline p{font-size:14px}
}
</style>
</head>
<body>

<div class="stage">
  <div class="brand"><span class="vita">vita</span><span class="id">id</span></div>

  <div class="headline">
    <div class="eyebrow">RG digital de saúde</div>
    <h1>O paciente <em>conta</em> uma vez.<br>O médico recebe pronto.</h1>
    <p>Pré-consulta em áudio do paciente vira resumo de 1 minuto pro médico — com exames, alergias e medicamentos sempre acessíveis.</p>
  </div>

  <div class="composite">

    <!-- iPhone esquerda — aba EXAMES do paciente -->
    <div class="phone left">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe src="screens/iphone-exames.html" title="Exames do paciente" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Laptop central — RESUMO 1 MINUTO do médico (capturado do app real em produção) -->
    <div class="laptop">
      <div class="laptop-screen">
        <div class="laptop-bezel-top"></div>
        <div class="laptop-display">
          <img src="screens/thumbs/laptop-real.png" alt="Resumo de 1 minuto do paciente">
        </div>
      </div>
      <div class="laptop-base"></div>
    </div>

    <!-- iPhone direita — PRÉ-CONSULTA respondendo -->
    <div class="phone right">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe src="screens/iphone-preconsulta.html" title="Pré-consulta respondendo" loading="lazy"></iframe>
      </div>
    </div>

  </div>
</div>

</body>
</html>
