<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0">
<title>vita id · Pré-consulta</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#00E5A0; --cyan:#00B4D8; --green-deep:#00C47A; --green-darker:#00734D;
  --gradient:linear-gradient(120deg,#00E5A0 0%,#00B4D8 100%);
  --ink-1:#0D0F14; --ink-2:#4B5563; --ink-3:#6B7280; --ink-4:#9CA3AF; --ink-5:#C4C9D4;
  --bg:#F4F6FA; --card:#FFFFFF;
  --hairline:rgba(13,15,20,0.06); --hairline-strong:rgba(13,15,20,0.10);
  --shadow-card:0 0 0 1px rgba(13,15,20,0.04),0 1px 2px rgba(13,15,20,0.04),0 4px 16px rgba(13,15,20,0.04);
  --ease-spring:cubic-bezier(0.32, 0.72, 0, 1);
  --ease-out:cubic-bezier(0.22, 1, 0.36, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--ink-1);height:100%;overflow:hidden}

.phone{width:393px;height:852px;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column}

/* Notch */
.notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#0D0F14;border-radius:0 0 18px 18px;z-index:15}

/* Status bar fake */
.status-bar{
  position:absolute;top:14px;left:28px;right:28px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;font-weight:700;color:#0D0F14;z-index:20;
}
.status-bar .icons{display:flex;gap:5px;align-items:center}
.status-bar svg{width:14px;height:14px;fill:#0D0F14}

/* SCREEN */
.screen{flex:1;display:flex;flex-direction:column;padding:50px 0 0;overflow-y:auto}

/* HEADER paciente+médico */
.qz-head{display:flex;align-items:center;gap:12px;padding:12px 24px 18px}
.qz-head__avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:800;color:#FFF;background:var(--gradient);box-shadow:inset 0 1px 0 rgba(255,255,255,0.20),0 4px 12px rgba(0,229,160,0.24)}
.qz-head__name{flex:1;min-width:0}
.qz-head__name h2{font-size:13px;font-weight:800;color:var(--ink-1);letter-spacing:-0.01em;line-height:1.2}
.qz-head__name p{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:2px}
.qz-head__tag{font-size:9.5px;font-weight:800;letter-spacing:0.10em;color:var(--green-deep);text-transform:uppercase;padding:5px 9px;background:rgba(0,229,160,0.10);border-radius:100px;border:1px solid rgba(0,229,160,0.16)}

/* PROGRESSO */
.qz-prog{padding:0 24px 16px}
.qz-prog__row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qz-prog__label{font-size:10px;font-weight:800;letter-spacing:0.14em;color:var(--ink-4);text-transform:uppercase}
.qz-prog__pct{font-size:10.5px;font-weight:700;color:var(--green-deep);font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.qz-prog__bar{height:3px;background:rgba(13,15,20,0.06);border-radius:100px;overflow:hidden}
.qz-prog__fill{height:100%;background:var(--gradient);border-radius:100px;box-shadow:0 0 12px rgba(0,229,160,0.50);width:36%}

/* PERGUNTA */
.qz-question{padding:4px 24px 12px;text-align:center}
.qz-question__title{font-size:26px;line-height:1.15;font-weight:900;letter-spacing:-0.04em;color:var(--ink-1);margin-bottom:12px}
.qz-record__textlink{display:block;font-size:12px;font-weight:600;color:var(--ink-3);text-align:center;border-bottom:1px dashed var(--hairline-strong);padding-bottom:2px;margin:14px auto 0;width:fit-content}

/* GRAVANDO */
.qz-record{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px 8px;gap:18px}
.qz-mic-orb{position:relative;width:130px;height:130px;display:grid;place-items:center}
.qz-mic-orb__ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,229,160,0.06);animation:ringPulse 2.4s var(--ease-out) infinite}
.qz-mic-orb__ring--2{animation-delay:0.8s}
.qz-mic-orb__ring--3{animation-delay:1.6s}
@keyframes ringPulse{0%{transform:scale(0.85);opacity:0}20%{opacity:1}100%{transform:scale(1.6);opacity:0}}
.qz-mic-orb__core{position:relative;width:96px;height:96px;border-radius:50%;background:var(--gradient);display:grid;place-items:center;color:#FFF;z-index:2;box-shadow:inset 0 1px 0 rgba(255,255,255,0.30),0 1px 2px rgba(0,229,160,0.40),0 12px 32px rgba(0,229,160,0.32),0 24px 56px rgba(0,180,216,0.20)}
.qz-mic-orb__core svg{width:36px;height:36px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.qz-wave{display:flex;align-items:center;justify-content:center;gap:3px;height:28px}
.qz-wave span{display:block;width:3px;border-radius:100px;background:var(--green-deep);animation:wave 0.9s ease-in-out infinite}
.qz-wave span:nth-child(1){height:8px;animation-delay:0.00s}
.qz-wave span:nth-child(2){height:14px;animation-delay:0.06s}
.qz-wave span:nth-child(3){height:22px;animation-delay:0.12s}
.qz-wave span:nth-child(4){height:16px;animation-delay:0.18s}
.qz-wave span:nth-child(5){height:24px;animation-delay:0.24s}
.qz-wave span:nth-child(6){height:10px;animation-delay:0.30s}
.qz-wave span:nth-child(7){height:18px;animation-delay:0.36s}
.qz-wave span:nth-child(8){height:14px;animation-delay:0.42s}
.qz-wave span:nth-child(9){height:8px;animation-delay:0.48s}
@keyframes wave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}

.qz-feedback{font-size:13px;font-weight:700;color:var(--green-deep);letter-spacing:-0.01em;display:flex;align-items:center;gap:6px;min-height:20px}
.qz-feedback span:first-child{width:6px;height:6px;border-radius:50%;background:currentColor;animation:rec 1.2s ease-in-out infinite}
@keyframes rec{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.2)}}

.qz-timer{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ink-4);letter-spacing:0.04em;font-variant-numeric:tabular-nums;margin-top:-10px}

.qz-record__actions{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px}
.qz-cta{padding:14px 18px;border-radius:14px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-0.01em;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.qz-cta--primary{background:var(--gradient);color:#FFF;box-shadow:inset 0 1px 0 rgba(255,255,255,0.30),0 1px 2px rgba(0,229,160,0.40),0 8px 24px rgba(0,229,160,0.28)}
.qz-cta--secondary{background:var(--card);color:var(--ink-1);border:1.5px solid var(--hairline-strong);box-shadow:var(--shadow-card)}
.qz-cta svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<div class="phone">

  <div class="notch"></div>
  <div class="status-bar">
    <div>9:41</div>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M2 17h2v3H2zm4-3h2v6H6zm4-3h2v9h-2zm4-3h2v12h-2zm4-3h2v15h-2z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M21 16.5v-9a2 2 0 00-2-2h-1v13h1a2 2 0 002-2zM3 7.5v9a2 2 0 002 2h12v-13H5a2 2 0 00-2 2zm15 2.5h2v4h-2z"/></svg>
    </div>
  </div>

  <div class="screen">

    <header class="qz-head">
      <div class="qz-head__avatar">BO</div>
      <div class="qz-head__name">
        <h2>Beatriz Oliveira</h2>
        <p>Dr. Lucas Borelli · Clínica Geral</p>
      </div>
      <span class="qz-head__tag">Pré-consulta</span>
    </header>

    <div class="qz-prog">
      <div class="qz-prog__row">
        <span class="qz-prog__label">Pergunta 04 — 11</span>
        <span class="qz-prog__pct">36%</span>
      </div>
      <div class="qz-prog__bar"><div class="qz-prog__fill"></div></div>
    </div>

    <div class="qz-question">
      <h1 class="qz-question__title">Há quanto tempo você sente essa dor?</h1>
      <a class="qz-record__textlink">ou prefere digitar?</a>
    </div>

    <div class="qz-record">

      <div class="qz-mic-orb">
        <span class="qz-mic-orb__ring"></span>
        <span class="qz-mic-orb__ring qz-mic-orb__ring--2"></span>
        <span class="qz-mic-orb__ring qz-mic-orb__ring--3"></span>
        <div class="qz-mic-orb__core">
          <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v4"/></svg>
        </div>
      </div>

      <div class="qz-wave">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="qz-feedback"><span></span>Estou te ouvindo</div>
      <div class="qz-timer">00:14</div>

      <div class="qz-record__actions">
        <button class="qz-cta qz-cta--primary">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Já falei tudo
        </button>
        <button class="qz-cta qz-cta--secondary">Cancelar</button>
      </div>

    </div>

  </div>

</div>

</body>
</html>
