<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Alergias</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#F4F6FA;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.07), 0 0 0 3px #E5E7EB, 0 40px 120px rgba(0,0,0,0.12);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#F4F6FA;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:#9CA3AF;
            z-index:11;
        }
        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#F4F6FA; opacity:0; z-index:25; pointer-events:none;
            transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; }

        .content {
            height:calc(100% - 80px);
            overflow-y:auto;
            padding:55px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:14px;
            margin-bottom:28px;
            opacity:0; animation:fadeUp 0.4s ease 0.3s both;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:#FFFFFF;
            border:1px solid rgba(0,0,0,0.07);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; flex-shrink:0;
            transition:all 0.2s;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
        }
        .back-btn:hover { background:rgba(0,0,0,0.02); }
        .back-btn:active { transform:scale(0.92); }
        .page-title-wrap { flex:1; }
        .page-title {
            font-family:'Plus Jakarta Sans', sans-serif;
            font-size:26px; font-weight:700; color:#0D0F14;
        }
        .page-title span { color:#00E5A0; font-style:italic; }
        .page-subtitle {
            font-size:13px; color:#9CA3AF; margin-top:2px;
        }

        /* Section label */
        .section-label {
            font-size:11px; font-weight:700;
            color:#9CA3AF;
            letter-spacing:1.5px; text-transform:uppercase;
            margin-bottom:12px; margin-top:8px; padding-left:2px;
        }

        /* ── Add button ── */
        .add-btn-main {
            width:100%; padding:16px;
            background:linear-gradient(120deg, #00E5A0, #00B4D8);
            border:none; border-radius:16px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:15px; font-weight:700; color:#fff;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
            box-shadow:0 4px 20px rgba(0,229,160,0.18);
            transition:all 0.25s; margin-bottom:16px;
            opacity:0; animation:fadeUp 0.4s ease 0.4s both;
        }
        .add-btn-main:hover { transform:translateY(-1px); }
        .add-btn-main:active { transform:scale(0.97); }
        .add-btn-main svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

        /* Quick add */
        .quick-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; opacity:0; animation:fadeUp 0.4s ease 0.45s both; }
        .quick-pill {
            padding:6px 12px; border-radius:10px;
            border:1px dashed rgba(217,68,82,0.2); background:rgba(217,68,82,0.03);
            font-size:11px; font-weight:600; color:rgba(217,68,82,0.5);
            cursor:pointer; transition:all 0.25s;
        }
        .quick-pill:hover { background:rgba(217,68,82,0.08); color:rgba(217,68,82,0.7); }
        .quick-pill:active { transform:scale(0.95); }

        /* Bottom sheet */
        .sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:30;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .sheet-overlay.show{opacity:1;pointer-events:all}
        .sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:20px 24px 32px;z-index:31;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
        .sheet.show{transform:translateY(0)}
        .sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,0.1);margin:0 auto 20px}
        .sheet-title{font-size:18px;font-weight:800;color:#0D0F14;margin-bottom:4px}
        .sheet-sub{font-size:12px;color:#9CA3AF;margin-bottom:20px}
        .sheet-option{display:flex;align-items:center;gap:14px;padding:16px;background:#F4F6FA;border-radius:14px;cursor:pointer;transition:all 0.2s;margin-bottom:10px}
        .sheet-option:hover{background:rgba(0,229,160,0.06)}
        .sheet-option:active{transform:scale(0.98)}
        .sheet-option-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .sheet-option-icon svg{width:20px;height:20px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .sheet-option-title{font-size:14px;font-weight:700;color:#0D0F14}
        .sheet-option-desc{font-size:11px;color:#9CA3AF;margin-top:2px}
        .sheet-manual{text-align:center;padding:12px 0 0;font-size:12px;color:#9CA3AF;cursor:pointer}
        .sheet-manual:hover{color:#00E5A0}

        /* Add section (manual input) */
        .add-section {
            margin-bottom:28px;
            opacity:0; animation:fadeUp 0.4s ease 0.5s both;
        }
        .add-row {
            display:flex; gap:10px;
        }
        .add-input {
            flex:1; padding:14px 16px;
            background:#FFFFFF;
            border:1.5px solid rgba(0,0,0,0.07);
            border-radius:12px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:14px; font-weight:500; color:#0D0F14;
            outline:none; transition:all 0.3s;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
        }
        .add-input::placeholder { color:#9CA3AF; }
        .add-input:focus {
            border-color:rgba(0,229,160,0.4);
            background:rgba(0,229,160,0.04);
            box-shadow:0 0 0 3px rgba(0,229,160,0.08);
        }
        .add-btn {
            padding:14px 22px;
            background:linear-gradient(120deg, #00E5A0, #00B4D8);
            border:none; border-radius:12px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:14px; font-weight:700;
            color:#0D0F14; cursor:pointer;
            transition:all 0.2s; flex-shrink:0;
        }
        .add-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,229,160,0.25); }
        .add-btn:active { transform:scale(0.98); }

        /* Allergy tags (registered) */
        .allergies-grid {
            display:flex; flex-wrap:wrap; gap:8px;
            margin-bottom:8px;
        }
        .allergy-pill {
            display:flex; align-items:center; gap:8px;
            padding:10px 14px;
            background:rgba(217,68,82,0.06);
            border:1px solid rgba(217,68,82,0.12);
            border-radius:12px;
            font-size:13px; font-weight:600;
            color:rgba(217,68,82,0.8);
            transition:all 0.25s;
            animation:fadeUp 0.3s ease both;
        }
        .allergy-pill:hover {
            background:rgba(217,68,82,0.1);
            border-color:rgba(217,68,82,0.2);
        }
        .allergy-remove {
            width:20px; height:20px; border-radius:6px;
            background:rgba(217,68,82,0.1);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; flex-shrink:0;
            transition:all 0.2s;
        }
        .allergy-remove:hover { background:rgba(217,68,82,0.25); }
        .allergy-remove:active { transform:scale(0.85); }

        /* Empty state */
        .empty-state {
            text-align:center; padding:40px 20px;
            opacity:0; animation:fadeUp 0.4s ease 0.5s both;
        }
        .empty-icon {
            width:64px; height:64px; border-radius:20px;
            background:rgba(217,68,82,0.04);
            border:1px solid rgba(217,68,82,0.08);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 16px;
        }
        .empty-text {
            font-size:14px; color:#9CA3AF;
            line-height:1.6;
        }


        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0;
            height:80px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(30px) saturate(1.3);
            -webkit-backdrop-filter:blur(30px) saturate(1.3);
            border-top:1px solid rgba(0,0,0,0.07);
            display:flex; align-items:center; justify-content:space-around;
            padding:0 20px 16px;
            z-index:20;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.04);
        }
        .tab {
            display:flex; flex-direction:column;
            align-items:center; gap:4px;
            cursor:pointer; padding:8px 20px;
            border-radius:12px; transition:all 0.25s;
            border:none; background:none;
            font-family:'Plus Jakarta Sans',sans-serif;
        }
        .tab:active { transform:scale(0.92); }
        .tab-label {
            font-size:10px; font-weight:600;
            letter-spacing:0.3px; color:#9CA3AF;
        }
        .tab.active .tab-label { color:#00E5A0; }
        .tab.active svg { stroke:#00E5A0 !important; }
        .tab-indicator {
            width:4px; height:4px; border-radius:50%;
            background:#00E5A0; margin-top:2px; opacity:0;
        }
        .tab.active .tab-indicator { opacity:1; }

        /* Toast */
        .toast {
            position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px);
            background:rgba(255,255,255,0.95);
            border:1px solid rgba(0,0,0,0.07);
            border-radius:14px; padding:14px 22px;
            display:flex; align-items:center; gap:10px;
            z-index:50;
            opacity:0; pointer-events:none;
            transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:0 12px 40px rgba(0,0,0,0.1);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon {
            width:28px; height:28px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; background:rgba(0,229,160,0.15);
        }
        .toast-text { font-size:13px; font-weight:600; color:#0D0F14; }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }
        .anim { opacity:0; animation:fadeUp 0.4s ease both; }
    @media(max-width:480px){body{padding:0!important;background:#F4F6FA!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>

    <input type="file" accept="image/*,application/pdf" id="galleryInput" style="display:none" onchange="handleFile(event)">

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab" onclick="navigateTo('perfil')">

            </svg>

<script src="api.js"></script>
<script>
    let allergies = [];

    async function addAllergy(name) {
        if (!name) {
            const input = document.getElementById('allergyInput');
            name = input.value.trim();
            if (!name) { input.style.borderColor = '#EF4444'; input.focus(); return; }
            input.value = '';
            input.style.borderColor = '';
        }
        const exists = allergies.some(a => a.name.toLowerCase() === name.toLowerCase());
        if (exists) { showToast(name + ' ja esta na lista'); return; }
        try {
            await vitaeAPI.adicionarAlergia({ nome: name });
            await loadAllergies();
            showToast(name + ' adicionada');
        } catch (e) {
            showToast('Erro: ' + e.message);
        }
    }

    async function removeAllergy(id, name) {
        if (!confirm('Remover "' + name + '" da lista?')) return;
        try {
            await vitaeAPI.removerAlergia(id);
            await loadAllergies();
            showToast(name + ' removida');
        } catch (e) {
            showToast('Erro: ' + e.message);
        }
    }

    function renderAllergies() {
        const container = document.getElementById('allergiesList');
        const countEl = document.getElementById('allergyCount');

        if (allergies.length === 0) {
            countEl.textContent = 'Nenhuma registrada';
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(217,68,82,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                    </div>
                    <div class="empty-text">Nenhuma alergia registrada.<br>Adicione acima usando o campo de texto.</div>
                </div>
            `;
        } else {
            countEl.textContent = allergies.length + ' registrada' + (allergies.length > 1 ? 's' : '');
            container.innerHTML = `<div class="section-label">Registradas</div><div class="allergies-grid">` +
                allergies.map((a, i) => `
                    <div class="allergy-pill" style="animation-delay:${0.4 + i * 0.05}s;cursor:pointer;" onclick="openAllergyDetail('${a.name}')">
                        <span>${a.name}</span>
                        <div class="allergy-remove" onclick="event.stopPropagation();removeAllergy('${a.id}','${a.name}')">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </div>
                    </div>
                `).join('') +
            `</div>`;
        }

    }

    async function loadAllergies() {
        try {
            const data = await vitaeAPI.listarAlergias();
            const raw = data.alergias || data || [];
            allergies = raw.map(a => ({
                id: a.id,
                name: a.nome || a.alergia || a.name
            }));
        } catch (e) {
            console.log('Erro ao carregar alergias:', e.message);
            allergies = [];
        }
        renderAllergies();
    }

    // Toast
    let toastTimer;
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function openAllergyDetail(name) {
        showToast('Detalhes de ' + name);
        // Fase 3: tela de detalhe de alergia integrada
    }

    // Navigation
    function goBack() {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => { window.location.href = '08-perfil.html?from=nav'; }, 500);
    }
    function navigateTo(tab) {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => {
            if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
            else if (tab === 'score') window.location.href = '10-score.html';
            else if (tab === 'exames') window.location.href = '11-exames-lista.html';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
            else if (tab === 'editar') window.location.href = '09-dados-pessoais.html';
        }, 500);
    }

    // Add sheet
    function openAddSheet() {
        document.getElementById('sheetOverlay').classList.add('show');
        document.getElementById('addSheet').classList.add('show');
    }
    function closeSheet() {
        document.getElementById('sheetOverlay').classList.remove('show');
        document.getElementById('addSheet').classList.remove('show');
    }
    function openCamera() {
        closeSheet();
        if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
            document.getElementById('cameraInput').click();
        } else {
            document.getElementById('exitOverlay').classList.add('active');
            setTimeout(() => { window.location.href = '26-scan-receita.html?tipo=alergia&from=alergias'; }, 400);
        }
    }
    function openGallery() {
        closeSheet();
        document.getElementById('galleryInput').click();
    }
    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            sessionStorage.setItem('vitae_scan_file', e.target.result);
            sessionStorage.setItem('vitae_scan_filename', file.name);
            sessionStorage.setItem('vitae_scan_tipo', 'alergia');
            document.getElementById('exitOverlay').classList.add('active');
            setTimeout(() => { window.location.href = '27-processando.html?tipo=alergia&from=alergias'; }, 400);
        };
        reader.readAsDataURL(file);
    }

    // Init
    if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadAllergies();
    } else {
        renderAllergies();
    }
</script>
</body>
</html>
