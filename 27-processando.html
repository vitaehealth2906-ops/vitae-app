<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Processando receita</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .content { padding:64px 28px 28px; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:20px; }
        .spinner-ring {
            width:70px; height:70px; border-radius:50%;
            border:4px solid rgba(0,229,160,0.15);
            border-top-color:#00E5A0;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .t1 { font-size:22px; font-weight:800; color:#0D0F14; letter-spacing:-0.5px; }
        .t1 span { color:#00E5A0; font-style:italic; }
        .t2 { font-size:14px; color:#6B7280; max-width:260px; line-height:1.5; }
        .step-line {
            font-size:12px; font-weight:600; color:#9CA3AF;
            letter-spacing:0.3px; margin-top:12px;
        }
        .step-line .done { color:#00C47A; }
        .err {
            background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.15);
            border-radius:14px; padding:14px 16px; font-size:13px; color:#B91C1C;
            max-width:320px; margin-top:16px;
        }
        .btn-retry {
            padding:14px 20px; border-radius:14px;
            background:linear-gradient(120deg, #00E5A0, #00B4D8); color:#0D0F14;
            border:none; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif;
            cursor:pointer; margin-top:14px;
        }
        @media(max-width:480px){
            html,body{padding:0!important;background:inherit!important;overflow-x:hidden;min-height:100vh;min-height:100dvh;}
            .phone{width:100vw!important;max-width:100vw!important;height:100vh!important;height:100dvh!important;max-height:none!important;border-radius:0!important;box-shadow:none!important;}
            .notch{display:none!important;}
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="spinner-ring" id="spinner"></div>
        <div class="t1" id="title">Analisando sua <span>receita</span></div>
        <div class="t2" id="sub">Estamos lendo os medicamentos da imagem. Isso leva alguns segundos.</div>
        <div class="step-line" id="step">1. Lendo texto da imagem...</div>
        <div class="err" id="err" style="display:none;"></div>
        <button class="btn-retry" id="retry" style="display:none;" onclick="window.location.href='26-scan-receita.html'">Tentar novamente</button>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (!vitaeAPI.requireAuth()) { /* redireciona se nao logado */ }

    // Comprime imagem pra max 1600px largura + 2400px altura + qualidade 0.75 (reduz ~70% do tamanho)
    async function comprimirImagem(file, maxWidth = 1600, maxHeight = 2400, quality = 0.75) {
        if (!file.type.startsWith('image/')) return file; // PDFs passam direto
        return new Promise((resolve) => {
            let settled = false;
            const finish = (result) => { if (!settled) { settled = true; resolve(result); } };
            // Safety net: se algo travar, fallback pro arquivo original em 8s
            setTimeout(() => finish(file), 8000);

            const img = new Image();
            const reader = new FileReader();
            reader.onload = (e) => { img.src = e.target.result; };
            reader.onerror = () => finish(file);
            img.onload = () => {
                let { width, height } = img;
                if (width > maxWidth) {
                    height = Math.round(height * (maxWidth / width));
                    width = maxWidth;
                }
                if (height > maxHeight) {
                    width = Math.round(width * (maxHeight / height));
                    height = maxHeight;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    if (!blob) return finish(file);
                    const compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
                    // Se comprimido ficou maior (PNG pequeno ja otimizado), usa original
                    finish(compressed.size < file.size ? compressed : file);
                }, 'image/jpeg', quality);
            };
            img.onerror = () => finish(file);
            reader.readAsDataURL(file);
        });
    }

    // Mensagem amigavel baseada no erro
    function mensagemErroAmigavel(err) {
        const msg = (err && err.message) || '';
        const lower = msg.toLowerCase();
        if (lower.includes('failed to fetch') || lower.includes('network') || lower.includes('cors')) {
            return { titulo: 'Sem conexao com o servidor', sub: 'Verifique sua internet e tente novamente.' };
        }
        if (lower.includes('413') || lower.includes('too large') || lower.includes('muito grande')) {
            return { titulo: 'Foto muito grande', sub: 'Tente uma foto menor ou mais comprimida.' };
        }
        if (lower.includes('timeout') || lower.includes('504')) {
            return { titulo: 'Processamento demorou demais', sub: 'Tente novamente com uma foto mais simples.' };
        }
        if (lower.includes('503') || lower.includes('indispon') || lower.includes('credit') || lower.includes('quota')) {
            return { titulo: 'Servico temporariamente indisponivel', sub: 'Tente novamente em alguns minutos.' };
        }
        if (lower.includes('401') || lower.includes('unauthoriz')) {
            return { titulo: 'Sessao expirada', sub: 'Faca login novamente.' };
        }
        return { titulo: 'Nao foi possivel processar', sub: 'Tente tirar a foto novamente com mais luz e sem reflexos.' };
    }

    async function processar() {
        // Le o tipo de scan da URL (receita ou alergia)
        const urlParams = new URLSearchParams(window.location.search);
        const tipoScan = urlParams.get('tipo') || 'receita'; // 'receita' | 'alergia'
        const isAlergia = tipoScan === 'alergia';

        const blobUrl = sessionStorage.getItem('vitae_scan_blob');
        const fname = sessionStorage.getItem('vitae_scan_name') || (isAlergia ? 'alergia.jpg' : 'receita.jpg');
        const ftype = sessionStorage.getItem('vitae_scan_type') || 'image/jpeg';

        if (!blobUrl) {
            document.getElementById('err').style.display = 'block';
            document.getElementById('err').textContent = 'Nenhum arquivo encontrado. Volte e tire uma foto.';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('retry').style.display = 'inline-block';
            return;
        }

        // Valida formato antes (HEIC/HEIF do iPhone nao e aceito)
        const tipoLower = (ftype || '').toLowerCase();
        const formatosAceitos = ['image/jpeg','image/jpg','image/png','image/webp','application/pdf'];
        if (tipoLower.includes('heic') || tipoLower.includes('heif')) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Formato nao suportado';
            document.getElementById('sub').textContent = 'iPhone: ao tirar foto, escolha "Mais Compativel" em Ajustes > Camera > Formatos, ou compartilhe como JPEG.';
            document.getElementById('err').style.display = 'block';
            document.getElementById('err').textContent = 'Envie a foto como JPG, PNG ou PDF.';
            document.getElementById('retry').style.display = 'inline-block';
            document.getElementById('step').style.display = 'none';
            return;
        }

        try {
            const resp = await fetch(blobUrl);
            const blob = await resp.blob();
            let file = new File([blob], fname, { type: ftype });

            // Comprime imagem (resolve bug de arquivos grandes do PC)
            if (file.type.startsWith('image/')) {
                document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Preparando imagem...';
                file = await comprimirImagem(file);
            }

            document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Imagem carregada';

            const labelAcao = isAlergia ? 'Identificando alergias...' : 'Identificando medicamentos...';
            setTimeout(() => {
                document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Imagem carregada &middot; 2. ' + labelAcao;
            }, 400);

            // Chama endpoint correto baseado no tipo
            const resultado = isAlergia
                ? await vitaeAPI.scanAlergia(file)
                : await vitaeAPI.scanReceita(file);

            // Guardar resultado e ir para revisao
            sessionStorage.setItem('vitae_scan_result', JSON.stringify(resultado));
            URL.revokeObjectURL(blobUrl);
            sessionStorage.removeItem('vitae_scan_blob');

            const labelOk = isAlergia ? 'Alergias identificadas' : 'Medicamentos identificados';
            document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> ' + labelOk;
            setTimeout(() => {
                window.location.href = '31-revisao-alergias.html';
            }, 600);
        } catch (e) {
            console.error('[SCAN] Erro:', e);
            const msg = mensagemErroAmigavel(e);
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = msg.titulo;
            document.getElementById('sub').textContent = msg.sub;
            // Nao mostra mensagem tecnica crua — apenas um codigo generico pro suporte
            document.getElementById('err').style.display = 'block';
            document.getElementById('err').textContent = 'Se persistir, tente novamente em alguns minutos.';
            document.getElementById('retry').style.display = 'inline-block';
            document.getElementById('step').style.display = 'none';
        }
    }
    processar();
</script>
</body>
</html>
