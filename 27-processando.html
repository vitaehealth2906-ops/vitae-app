<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Processando</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone { width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA; border-radius:52px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(0,229,160,0.15),0 0 0 3px #1A1E26,0 40px 120px rgba(0,0,0,0.9); }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .status { position:absolute; top:14px; left:28px; right:28px; display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:#9CA3AF; z-index:11; }
        .exit-overlay { position:absolute; inset:0; background:#F4F6FA; opacity:0; z-index:25; pointer-events:none; transition:opacity 0.5s ease; }
        .exit-overlay.active { opacity:1; }
        .content { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 32px 40px; text-align:center; }

        /* Spinner */
        .orb { position:relative; width:88px; height:88px; margin-bottom:24px; }
        .orb-ring {
            position:absolute; border-radius:50%;
            border:2.5px solid transparent;
            animation:spin 1.2s linear infinite;
        }
        .orb-ring:nth-child(1) { inset:0; }
        .orb-ring:nth-child(2) { inset:8px; animation-duration:1.8s; animation-direction:reverse; }
        .orb-ring:nth-child(3) { inset:16px; animation-duration:2.4s; }
        .orb-ring.green:nth-child(1) { border-top-color:#00E5A0; }
        .orb-ring.green:nth-child(2) { border-top-color:rgba(0,229,160,0.5); }
        .orb-ring.green:nth-child(3) { border-top-color:rgba(0,229,160,0.25); }
        .orb-ring.red:nth-child(1) { border-top-color:#EF4444; }
        .orb-ring.red:nth-child(2) { border-top-color:rgba(239,68,68,0.5); }
        .orb-ring.red:nth-child(3) { border-top-color:rgba(239,68,68,0.25); }
        @keyframes spin { to{transform:rotate(360deg)} }
        .orb-center {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:42px; height:42px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
        }
        .orb-center.green { background:rgba(0,229,160,0.08); }
        .orb-center.red { background:rgba(239,68,68,0.06); }
        .orb-center svg { width:20px; height:20px; }

        .proc-title { font-size:20px; font-weight:800; color:#0D0F14; margin-bottom:4px; }
        .proc-sub { font-size:12px; color:#9CA3AF; margin-bottom:28px; }

        /* Progress */
        .progress-wrap { width:100%; margin-bottom:28px; }
        .progress-top { display:flex; justify-content:space-between; margin-bottom:6px; }
        .progress-label { font-size:11px; font-weight:600; color:#9CA3AF; }
        .progress-pct { font-size:13px; font-weight:900; }
        .progress-pct.green { color:#00E5A0; }
        .progress-pct.red { color:#EF4444; }
        .progress-bar { width:100%; height:6px; background:rgba(0,0,0,0.05); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; width:0%; border-radius:3px; transition:width 0.4s ease-out; }
        .progress-fill.green { background:linear-gradient(120deg,#00E5A0,#00B4D8); }
        .progress-fill.red { background:linear-gradient(120deg,#EF4444,#F87171); }

        /* Steps */
        .steps { width:100%; text-align:left; }
        .step { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.04); }
        .step:last-child { border:none; }
        .step-icon {
            width:28px; height:28px; border-radius:9px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; background:rgba(0,0,0,0.03);
            transition:all 0.4s ease;
        }
        .step-icon svg { width:13px; height:13px; transition:all 0.3s; }
        .step-icon.done { background:rgba(0,196,122,0.08); }
        .step-icon.done svg { stroke:#00C47A; }
        .step-icon.active { background:rgba(0,229,160,0.1); }
        .step-icon.active svg { stroke:#00E5A0; }
        .step-icon.active.red { background:rgba(239,68,68,0.08); }
        .step-icon.active.red svg { stroke:#EF4444; }

        .step-text { font-size:13px; font-weight:600; color:#C4C9D4; transition:color 0.3s; }
        .step-text.done { color:#6B7280; }
        .step-text.active { color:#0D0F14; }

        .step-time { margin-left:auto; font-size:10px; font-weight:700; color:#00C47A; opacity:0; transition:opacity 0.3s; }
        .step-time.show { opacity:1; }

        /* Complete state */
        .complete-msg {
            display:none; margin-top:20px; padding:16px 24px;
            background:rgba(0,196,122,0.06); border:1px solid rgba(0,196,122,0.15);
            border-radius:16px; width:100%;
        }
        .complete-msg.show { display:block; animation:fadeUp 0.5s ease; }
        .complete-title { font-size:16px; font-weight:800; color:#00C47A; margin-bottom:4px; }
        .complete-text { font-size:12px; color:#6B7280; }

        @keyframes fadeUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
        @media(max-width:480px){body{padding:0!important;background:#F4F6FA!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>&#9679;&#9679;&#9679; &#128267;</span></div>
    <div class="exit-overlay" id="exitOverlay"></div>

    <div class="content">
        <!-- Photo thumbnail -->
        <div id="photoThumb" style="width:80px;height:80px;border-radius:16px;overflow:hidden;margin:0 auto 16px;border:2px solid rgba(0,229,160,0.15);background:#eee;display:none">
            <img id="photoImg" style="width:100%;height:100%;object-fit:cover" alt="">
        </div>

        <div class="orb" id="orbWrap">
            <div class="orb-ring green" id="ring1"></div>
            <div class="orb-ring green" id="ring2"></div>
            <div class="orb-ring green" id="ring3"></div>
            <div class="orb-center green" id="orbCenter">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="orbIcon">
                    <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/>
                </svg>
            </div>
        </div>

        <div class="proc-title" id="mainTitle">Identificando seus medicamentos...</div>
        <div class="proc-sub" id="mainSub">Receita_Dr_Roberto.jpg</div>

        <div class="progress-wrap">
            <div class="progress-top">
                <div class="progress-label">Progresso</div>
                <div class="progress-pct green" id="pctText">0%</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill green" id="progFill"></div>
            </div>
        </div>

        <div class="steps" id="stepsContainer">
            <div class="step" id="step0">
                <div class="step-icon" id="icon0"><svg viewBox="0 0 24 24" fill="none" stroke="#C4C9D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                <div class="step-text" id="text0">Receita reconhecida</div>
                <div class="step-time" id="time0"></div>
            </div>
            <div class="step" id="step1">
                <div class="step-icon" id="icon1"><svg viewBox="0 0 24 24" fill="none" stroke="#C4C9D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
                <div class="step-text" id="text1">Medicamentos encontrados</div>
                <div class="step-time" id="time1"></div>
            </div>
            <div class="step" id="step2">
                <div class="step-icon" id="icon2"><svg viewBox="0 0 24 24" fill="none" stroke="#C4C9D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></div>
                <div class="step-text" id="text2">Organizando dosagens</div>
                <div class="step-time" id="time2"></div>
            </div>
            <div class="step" id="step3">
                <div class="step-icon" id="icon3"><svg viewBox="0 0 24 24" fill="none" stroke="#C4C9D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="step-text" id="text3">Definindo horarios</div>
                <div class="step-time" id="time3"></div>
            </div>
            <div class="step" id="step4">
                <div class="step-icon" id="icon4"><svg viewBox="0 0 24 24" fill="none" stroke="#C4C9D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                <div class="step-text" id="text4">Verificando seguranca</div>
                <div class="step-time" id="time4"></div>
            </div>
        </div>

        <div class="complete-msg" id="completeMsg">
            <div class="complete-title" id="completeTitle">Pronto!</div>
            <div class="complete-text" id="completeText">Abrindo revisao em instantes...</div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo') || 'receita';
    const from = params.get('from') || 'medicamentos';

    // Get file info from sessionStorage
    const fileName = sessionStorage.getItem('vitae_scan_filename') || 'documento.jpg';
    document.getElementById('mainSub').textContent = fileName;

    // Show photo thumbnail
    const fileData = sessionStorage.getItem('vitae_scan_file');
    if (fileData && fileData.startsWith('data:image')) {
        const thumb = document.getElementById('photoThumb');
        document.getElementById('photoImg').src = fileData;
        thumb.style.display = 'block';
        document.getElementById('orbWrap').style.marginTop = '8px';
        document.getElementById('orbWrap').style.width = '64px';
        document.getElementById('orbWrap').style.height = '64px';
    }

    // Allergy mode — change colors and labels
    if (tipo === 'alergia') {
        document.getElementById('mainTitle').textContent = 'Identificando suas alergias...';
        document.getElementById('pctText').className = 'progress-pct red';
        document.getElementById('progFill').className = 'progress-fill red';
        ['ring1','ring2','ring3'].forEach(id => { document.getElementById(id).className = 'orb-ring red'; });
        document.getElementById('orbCenter').className = 'orb-center red';
        document.getElementById('orbIcon').setAttribute('stroke', '#EF4444');

        // Change step labels
        document.getElementById('text0').textContent = 'Documento reconhecido';
        document.getElementById('text1').textContent = 'Tipo de exame identificado';
        document.getElementById('text2').textContent = 'Substancias encontradas';
        document.getElementById('text3').textContent = 'Organizando por categoria';
        document.getElementById('text4').textContent = 'Verificando seguranca';
    }

    // Step animation
    const steps = [
        { pct: 18, time: '0.6s', dur: 1000 },
        { pct: 40, time: '1.1s', dur: 1300 },
        { pct: 65, time: '1.8s', dur: 1600 },
        { pct: 85, time: '1.2s', dur: 1200 },
        { pct: 100, time: '0.9s', dur: 1000 },
    ];

    const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#00C47A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    function animateProgress(from, to, dur) {
        return new Promise(resolve => {
            const fill = document.getElementById('progFill');
            const txt = document.getElementById('pctText');
            const start = performance.now();
            function frame(ts) {
                const p = Math.min((ts - start) / dur, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                const val = Math.floor(from + (to - from) * ease);
                fill.style.width = val + '%';
                txt.textContent = val + '%';
                if (p < 1) requestAnimationFrame(frame);
                else resolve();
            }
            requestAnimationFrame(frame);
        });
    }

    async function runStep(i) {
        if (i >= steps.length) {
            document.getElementById('mainTitle').textContent = 'Pronto!';
            document.getElementById('completeMsg').classList.add('show');

            // Navigate to review after 1.5s
            setTimeout(() => {
                document.getElementById('exitOverlay').classList.add('active');
                setTimeout(() => {
                    if (tipo === 'alergia') {
                        window.location.href = '31-revisao-alergias.html?from=' + from;
                    } else {
                        window.location.href = '28-revisao-receita.html?from=' + from;
                    }
                }, 500);
            }, 1500);
            return;
        }

        // Mark previous as done
        if (i > 0) {
            const prevIcon = document.getElementById('icon' + (i - 1));
            prevIcon.classList.remove('active');
            prevIcon.classList.add('done');
            prevIcon.innerHTML = checkSvg;
            document.getElementById('text' + (i - 1)).classList.remove('active');
            document.getElementById('text' + (i - 1)).classList.add('done');
            const timeEl = document.getElementById('time' + (i - 1));
            timeEl.textContent = steps[i - 1].time;
            timeEl.classList.add('show');
        }

        // Activate current
        const icon = document.getElementById('icon' + i);
        icon.classList.add('active');
        if (tipo === 'alergia') icon.classList.add('red');
        document.getElementById('text' + i).classList.add('active');

        // Animate progress
        const prevPct = i === 0 ? 0 : steps[i - 1].pct;
        await animateProgress(prevPct, steps[i].pct, steps[i].dur);

        // Next step
        setTimeout(() => runStep(i + 1), 300);
    }

    // Try real API scan in parallel with animation
    let apiResult = null;
    let apiError = null;
    let animationDone = false;

    async function callScanAPI() {
      try {
        const fileData = sessionStorage.getItem('vitae_scan_file');
        if (!fileData || typeof vitaeAPI === 'undefined' || !vitaeAPI.isLoggedIn()) return;

        // Convert base64 data URL to File object
        const res = await fetch(fileData);
        const blob = await res.blob();
        const file = new File([blob], fileName, { type: blob.type });

        if (tipo === 'alergia') {
          apiResult = await vitaeAPI.scanAlergia(file);
        } else {
          apiResult = await vitaeAPI.scanReceita(file);
        }

        // Store result for the review screen
        sessionStorage.setItem('vitae_scan_result', JSON.stringify(apiResult));
      } catch (e) {
        apiError = e.message;
        console.log('Scan API error (using demo mode):', e.message);
      }
    }

    // Start API call immediately
    callScanAPI();

    // Start animation after 600ms
    setTimeout(() => runStep(0), 600);
</script>
</body>
</html>
