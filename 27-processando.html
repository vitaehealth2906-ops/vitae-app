<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Processando receita</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .content { padding:64px 28px 28px; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:20px; }
        .spinner-ring {
            width:70px; height:70px; border-radius:50%;
            border:4px solid rgba(0,229,160,0.15);
            border-top-color:#00E5A0;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .t1 { font-size:22px; font-weight:800; color:#0D0F14; letter-spacing:-0.5px; }
        .t1 span { color:#00E5A0; font-style:italic; }
        .t2 { font-size:14px; color:#6B7280; max-width:260px; line-height:1.5; }
        .step-line {
            font-size:12px; font-weight:600; color:#9CA3AF;
            letter-spacing:0.3px; margin-top:12px;
        }
        .step-line .done { color:#00C47A; }
        .err {
            background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.15);
            border-radius:14px; padding:14px 16px; font-size:13px; color:#B91C1C;
            max-width:320px; margin-top:16px;
        }
        .btn-retry {
            padding:14px 20px; border-radius:14px;
            background:linear-gradient(120deg, #00E5A0, #00B4D8); color:#0D0F14;
            border:none; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif;
            cursor:pointer; margin-top:14px;
        }
        @media(max-width:480px){
            html,body{padding:0!important;background:inherit!important;overflow-x:hidden;min-height:100vh;min-height:100dvh;}
            .phone{width:100vw!important;max-width:100vw!important;height:100vh!important;height:100dvh!important;max-height:none!important;border-radius:0!important;box-shadow:none!important;}
            .notch{display:none!important;}
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="spinner-ring" id="spinner"></div>
        <div class="t1" id="title">Analisando sua <span>receita</span></div>
        <div class="t2" id="sub">Estamos lendo os medicamentos da imagem. Isso leva alguns segundos.</div>
        <div class="step-line" id="step">1. Lendo texto da imagem...</div>
        <div class="err" id="err" style="display:none;"></div>
        <button class="btn-retry" id="retry" style="display:none;" onclick="window.location.href='26-scan-receita.html'">Tentar novamente</button>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (!vitaeAPI.requireAuth()) { /* redireciona se nao logado */ }

    async function processar() {
        const blobUrl = sessionStorage.getItem('vitae_scan_blob');
        const fname = sessionStorage.getItem('vitae_scan_name') || 'receita.jpg';
        const ftype = sessionStorage.getItem('vitae_scan_type') || 'image/jpeg';

        if (!blobUrl) {
            document.getElementById('err').style.display = 'block';
            document.getElementById('err').textContent = 'Nenhum arquivo encontrado. Volte e tire uma foto.';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('retry').style.display = 'inline-block';
            return;
        }

        try {
            const resp = await fetch(blobUrl);
            const blob = await resp.blob();
            const file = new File([blob], fname, { type: ftype });

            document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Imagem carregada';

            setTimeout(() => {
                document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Imagem carregada &middot; 2. Identificando medicamentos...';
            }, 400);

            const resultado = await vitaeAPI.scanReceita(file);

            // Guardar resultado e ir para revisao
            sessionStorage.setItem('vitae_scan_result', JSON.stringify(resultado));
            URL.revokeObjectURL(blobUrl);
            sessionStorage.removeItem('vitae_scan_blob');

            document.getElementById('step').innerHTML = '<span class="done">&#10003;</span> Medicamentos identificados';
            setTimeout(() => {
                window.location.href = '31-revisao-alergias.html';
            }, 600);
        } catch (e) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Não foi possível processar';
            document.getElementById('sub').textContent = 'Tente tirar a foto novamente com mais luz e sem reflexos.';
            document.getElementById('err').style.display = 'block';
            document.getElementById('err').textContent = (e && e.message) || 'Erro desconhecido.';
            document.getElementById('retry').style.display = 'inline-block';
            document.getElementById('step').style.display = 'none';
        }
    }
    processar();
</script>
</body>
</html>
