<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vitaid — Acesso Medico</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="desktop-core.css" rel="stylesheet">
<script src="../device-router.js"></script>
<script>vitaeDevice.guardDesktop();</script>
</head>
<body>
<div class="toast-stack" id="toastStack"></div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">vita<span class="ib">id</span></div>
    <div class="login-sub">Acesso exclusivo para medicos</div>

    <div class="login-error" id="loginError"></div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="Digite sua senha">
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>

    <div class="login-footer">
      Ainda nao tem conta? <a href="../03-cadastro.html">Criar conta</a>
    </div>
  </div>
</div>

<script src="../api.js"></script>
<script>
// Se ja esta logado como medico, vai direto pro dashboard
(function() {
  if (vitaeAPI.isLoggedIn()) {
    try {
      var u = JSON.parse(localStorage.getItem('vitae_usuario'));
      if (u && u.tipo === 'MEDICO') {
        window.location.href = 'dashboard.html';
        return;
      }
    } catch(e) {}
  }
})();

async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var senha = document.getElementById('loginSenha').value;
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginError');

  errEl.style.display = 'none';

  if (!email || !senha) {
    errEl.textContent = 'Preencha todos os campos.';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'Entrando...';
  btn.disabled = true;

  try {
    var result = await vitaeAPI.login(email, senha);
    var u = result.usuario || {};
    if (u.tipo !== 'MEDICO') {
      errEl.textContent = 'Esta area e exclusiva para medicos. Use o app mobile para acessar como paciente.';
      errEl.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }
    window.location.href = 'dashboard.html';
  } catch (err) {
    errEl.textContent = err.message || 'Erro ao entrar. Verifique email e senha.';
    errEl.style.display = 'block';
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

document.getElementById('loginSenha').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginSenha').focus();
});

function toast(msg, type) {
  type = type || 'ok';
  var icons = {ok:'✓',warn:'!',err:'✗',info:'i'};
  var stack = document.getElementById('toastStack');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = '<div class="toast-icon">' + (icons[type]||'i') + '</div><span>' + msg + '</span>';
  stack.appendChild(t);
  setTimeout(function() { t.classList.add('out'); setTimeout(function() { t.remove(); }, 300); }, 3000);
}
</script>
</body>
</html>
