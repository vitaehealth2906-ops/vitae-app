<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vitaid · Central Clínica do Paciente</title>
<script>
(function(){
  localStorage.setItem('vitae_token','preview-mock-token');
  localStorage.setItem('vitae_refresh_token','preview-mock-refresh');
  localStorage.setItem('vitae_usuario',JSON.stringify({id:'med-1',nome:'Dra. Helena Souza',email:'helena@vitaid.com',tipo:'MEDICO',especialidade:'Clínica Geral',crm:'123456',uf:'SP'}));
  window.__PREVIEW_MODE=true;
  var _f=window.fetch;
  window.fetch=function(url,opts){
    if(!String(url).includes('railway')&&!String(url).includes('vitae-app-production'))return _f(url,opts);
    return Promise.resolve({ok:true,status:200,json:function(){return Promise.resolve({});},text:function(){return Promise.resolve('');}});
  };
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00E5A0;--cyan:#00B4D8;
  --grad:linear-gradient(120deg,#00E5A0,#00B4D8);
  --dark:#0D0F14;--bg:#F7F8FA;--surf:#fff;--s2:#F2F4F7;--s3:#E8EBF0;
  --border:rgba(0,0,0,.06);--b2:rgba(0,0,0,.10);
  --t1:#111318;--t2:#5A6070;--t3:#9CA3AF;--t4:#D1D5DB;
  --acc:rgba(0,229,160,.08);--accb:rgba(0,229,160,.18);
  --ok:#00C47A;--warn:#F59E0B;--bad:#EF4444;
  --ok-bg:rgba(0,196,122,.08);--warn-bg:rgba(245,158,11,.08);
  --bad-bg:rgba(239,68,68,.08);--info-bg:rgba(59,130,246,.07);
  --font:'Plus Jakarta Sans',sans-serif;--r:12px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:220px;min-width:220px;background:var(--dark);display:flex;flex-direction:column;padding:18px 14px 14px}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:0 2px}
.sb-mark{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--dark);flex-shrink:0}
.sb-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sb-pro{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2);border-radius:4px;padding:2px 6px}
.nb{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2);padding:0 12px;margin:8px 0 4px}
.nl{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;position:relative;margin-bottom:1px;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;text-decoration:none}
.nl:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)}
.nl.on{background:rgba(0,229,160,.10);border-color:rgba(0,229,160,.22);color:#fff}
.nl.on::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--grad);border-radius:0 2px 2px 0}
.nl svg{width:15px;height:15px;flex-shrink:0;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nl.on svg{stroke:var(--green)}
.nl-badge{margin-left:auto;font-size:10px;font-weight:700;background:rgba(0,229,160,.15);color:var(--green);border-radius:10px;padding:1px 7px}
.sb-ft{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
.sb-u{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer}
.sb-u:hover{background:rgba(255,255,255,.04)}
.sb-av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.sb-uname{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:112px}
.sb-ucrm{font-size:10.5px;color:rgba(255,255,255,.28)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px}
.tb-r{font-size:13px;font-weight:600;color:var(--t3);cursor:pointer}
.tb-r:hover{color:var(--t2)}
.tb-sep{color:var(--t4);font-size:11px}
.tb-cur{font-size:13px;font-weight:700;color:var(--t1)}
.tb-time{margin-left:auto;font-size:11.5px;color:var(--t3);font-variant-numeric:tabular-nums}

/* PATIENT HEADER */
.ph{background:var(--surf);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.ph-av{width:56px;height:56px;border-radius:50%;background:var(--acc);border:2px solid var(--accb);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--green);flex-shrink:0;overflow:hidden}
.ph-av img{width:100%;height:100%;object-fit:cover}
.ph-info{flex:1}
.ph-name{font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.ph-meta{display:flex;align-items:center;gap:5px;margin-top:4px}
.ph-m{font-size:13px;color:var(--t3);font-weight:500}
.ph-dot{color:var(--t4);font-size:10px}
.ph-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ph-tag{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid}
.tag-a{background:var(--bad-bg);border-color:rgba(239,68,68,.14);color:var(--bad)}
.tag-c{background:var(--bg);border-color:var(--border);color:var(--t2)}
.ph-acts{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-grad{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:36px;background:var(--grad);color:var(--dark);font-size:13px;font-weight:700;font-family:var(--font);border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-grad:hover{opacity:.88}
.btn-sec{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;background:var(--surf);color:var(--t1);font-size:13px;font-weight:600;font-family:var(--font);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn-sec:hover{background:var(--s2)}
.btn-ico{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--surf);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--t2);transition:background .12s}
.btn-ico:hover{background:var(--s2)}

/* 3-COLUMN BODY */
.body{flex:1;display:grid;grid-template-columns:2fr 1.5fr 1.6fr;overflow:hidden;min-height:0}
.col{overflow-y:auto;padding:20px;border-right:1px solid var(--border)}
.col:last-child{border-right:none}
.col::-webkit-scrollbar{width:4px}
.col::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-lnk{font-size:11.5px;font-weight:700;color:var(--green);background:none;border:none;font-family:var(--font);cursor:pointer;letter-spacing:0;text-transform:none}

/* TIMELINE */
.tl{display:flex;flex-direction:column}
.ti{display:grid;grid-template-columns:40px 1fr;gap:12px;padding-bottom:18px;position:relative}
.ti:last-child{padding-bottom:0}
.ti::after{content:'';position:absolute;left:47px;top:18px;bottom:0;width:1px;background:var(--border)}
.ti:last-child::after{display:none}
.ti-date{display:flex;flex-direction:column;align-items:flex-end;padding-top:1px}
.ti-d{font-size:12px;font-weight:700;color:var(--t2);line-height:1}
.ti-m{font-size:9.5px;color:var(--t3);font-weight:600;letter-spacing:.04em;margin-top:2px}
.ti-dot{position:absolute;left:43px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--surf);border:2px solid var(--t4);z-index:1}
.ti-dot.on{border-color:var(--green);background:var(--green)}
.ti-dot.warn{border-color:var(--warn)}
.ti-body{}
.ti-title{font-size:13.5px;font-weight:700;color:var(--t1);cursor:pointer;line-height:1.3;letter-spacing:-.1px}
.ti-title:hover{color:var(--green)}
.ti-sum{font-size:12.5px;color:var(--t2);line-height:1.55;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ti-tags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.ti-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;border:1px solid}
.tt-g{background:var(--ok-bg);border-color:rgba(0,196,122,.18);color:var(--ok)}
.tt-w{background:var(--warn-bg);border-color:rgba(245,158,11,.18);color:var(--warn)}
.tt-b{background:var(--bad-bg);border-color:rgba(239,68,68,.18);color:var(--bad)}
.tt-n{background:var(--bg);border-color:var(--border);color:var(--t3)}
.tl-empty{padding:6px 0}
.tl-et{font-size:13.5px;font-weight:700;color:var(--t2);margin-bottom:6px}
.tl-es{font-size:12.5px;color:var(--t3);line-height:1.6;max-width:360px;margin-bottom:12px}

/* INSIGHTS */
.ins{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:22px}
.ins-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--s2)}
.ins-hl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.ins-hb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(0,180,216,.07);color:var(--cyan);border:1px solid rgba(0,180,216,.15)}
.ins-b{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.ins-li{display:flex;gap:9px}
.ins-ld{width:4px;height:4px;min-width:4px;border-radius:50%;background:var(--t4);margin-top:8px}
.ins-lt{font-size:12.5px;color:var(--t2);line-height:1.6}
.ins-lt strong{color:var(--t1);font-weight:700}
.ins-ft{padding:9px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ins-fs{font-size:10.5px;color:var(--t3)}
.ins-fl{font-size:12px;font-weight:700;color:var(--cyan);background:none;border:none;font-family:var(--font);cursor:pointer;padding:0}

/* MED CARD — mesmo padrão do app */
.med-card{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:var(--surf);border:1px solid var(--border);margin-bottom:8px;transition:background .12s;cursor:pointer}
.med-card:hover{background:var(--s2)}
.med-card:last-child{margin-bottom:0}
.med-ico{width:40px;height:40px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.med-ico svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.med-info{flex:1;min-width:0}
.med-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}
.med-dose{font-size:11.5px;color:var(--t2);margin-top:2px}
.med-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--ok-bg);color:var(--ok);display:inline-block;margin-top:5px}

/* ALLERGY PILL */
.al-list{display:flex;flex-direction:column;gap:6px}
.al-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--bad-bg);border:1px solid rgba(239,68,68,.12)}
.al-name{font-size:13px;font-weight:700;color:var(--bad);flex:1}
.al-sev{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px}
.al-g{background:rgba(239,68,68,.1);color:var(--bad)}
.al-m{background:rgba(245,158,11,.1);color:var(--warn)}
.al-l{background:rgba(0,196,122,.08);color:var(--ok)}

/* EXAMES COMPONENT — copiado do app real */
.ex-search-wrap{position:relative;margin-bottom:12px}
.ex-search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2}
.ex-search{width:100%;padding:10px 12px 10px 36px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--t1);outline:none;transition:border .15s}
.ex-search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,229,160,.08)}
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-card{border-radius:var(--r);background:var(--surf);box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);padding:10px;cursor:pointer;transition:box-shadow .15s}
.ex-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.10),0 6px 20px rgba(0,0,0,.08)}
.ex-card-inner{display:flex;gap:14px;align-items:stretch}
.ex-thumb{width:80px;min-height:90px;border-radius:8px;background:var(--s2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ex-thumb img{width:100%;height:100%;object-fit:cover}
.ex-thumb-icon{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.ex-thumb-icon svg{width:28px;height:28px;stroke:rgba(13,15,20,.14);fill:none;stroke-width:1.5}
.ex-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:4px 0}
.ex-tipo{font-size:11px;color:var(--t2);font-weight:600;text-transform:capitalize}
.ex-nome{font-size:13.5px;font-weight:700;color:var(--green);line-height:1.3}
.ex-info{font-size:11px;color:var(--t3);margin-top:2px}
.ex-empty{text-align:center;padding:24px 8px;color:var(--t3);font-size:13px}

/* RIGHT COLUMN */
/* Retorno + WhatsApp grid */
.rw-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.rc-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s2)}
.rc-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.rc-body{padding:12px 14px}
.ret-date{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--t1);line-height:1}
.ret-st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:7px;border:1px solid}
.rs-ok{background:var(--ok-bg);color:var(--ok);border-color:rgba(0,196,122,.2)}
.rs-aw{background:var(--warn-bg);color:var(--warn);border-color:rgba(245,158,11,.2)}
.ret-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.ret-meta{font-size:10px;color:var(--t3);margin-top:5px}
.ret-acts{display:flex;gap:5px;margin-top:10px}
.ret-btn{padding:6px 10px;font-size:11.5px;font-weight:600;font-family:var(--font);border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);transition:background .12s}
.ret-btn:hover{background:var(--s2)}
.ret-btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
.ret-btn.primary:hover{opacity:.85}
.ret-empty{padding:12px 14px}
.ret-et{font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:8px}
.ret-cta{width:100%;padding:7px 0;font-size:12.5px;font-weight:700;font-family:var(--font);border-radius:7px;cursor:pointer;background:var(--acc);color:var(--green);border:1px solid var(--accb);transition:background .12s}
.ret-cta:hover{background:rgba(0,229,160,.12)}

/* WHATSAPP TOGGLE CARD */
.wa-body{padding:12px 14px}
.wa-toggle-row{display:flex;align-items:flex-start;gap:10px}
.wa-desc{font-size:12px;color:var(--t2);line-height:1.5;flex:1}
/* Toggle switch */
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0;margin-top:1px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:20px;background:var(--s3);transition:background .2s;cursor:pointer}
.toggle input:checked+.toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:transform .2s}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}
.wa-phone{display:flex;align-items:center;gap:8px;margin-top:10px}
.wa-ph-lbl{font-size:10.5px;font-weight:600;color:var(--t3)}
.wa-ph-val{font-size:13px;font-weight:700;color:var(--t1)}

/* WHATSAPP CONFIG SECTION */
.wa-cfg{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.wa-cfg-h{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.wa-cfg-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.wa-cfg-body{padding:14px}
.cfg-row{margin-bottom:12px}
.cfg-row:last-child{margin-bottom:0}
.cfg-lbl{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:7px}
.days-row{display:flex;gap:5px}
.day-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;font-family:var(--font)}
.day-btn.on{background:var(--green);border-color:var(--green);color:var(--dark)}
.day-btn:hover:not(.on){background:var(--s2);color:var(--t2)}
.time-row{display:flex;align-items:center;gap:8px}
.time-input{border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:var(--font);color:var(--t1);background:var(--surf);outline:none;width:80px;transition:border .15s}
.time-input:focus{border-color:var(--green)}
.time-sep{font-size:12px;color:var(--t3);font-weight:600}
.cfg-note{font-size:10.5px;color:var(--t3);line-height:1.5;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);border-radius:7px;padding:8px 10px;margin-top:4px}

/* DETALHES TABLE */
.dt-block{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dt-h{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s2)}
.dt-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.dt-body{padding:4px 0}
.dt-row{display:grid;grid-template-columns:100px 1fr;gap:8px;align-items:start;padding:9px 14px;border-bottom:1px solid var(--border)}
.dt-row:last-child{border-bottom:none}
.dt-lbl{font-size:11px;font-weight:600;color:var(--t3)}
.dt-val{font-size:13px;color:var(--t1);font-weight:500;word-break:break-word;line-height:1.4}

/* PATIENT LIST */
.list-wrap{padding:22px}
.list-title{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.list-cnt{font-size:12px;font-weight:600;background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:2px 10px;color:var(--t2)}
.ptbl{background:var(--surf);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.ptbl-h{display:grid;grid-template-columns:2fr 1fr 110px 120px 60px;align-items:center;padding:0 18px;height:36px;border-bottom:1px solid var(--border);background:var(--s2)}
.ptbl-hc{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4)}
.ptbl-r{display:grid;grid-template-columns:2fr 1fr 110px 120px 60px;align-items:center;padding:0 18px;height:52px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.ptbl-r:last-child{border-bottom:none}
.ptbl-r:hover{background:var(--s2)}
.ptbl-r:hover .ptbl-open{opacity:1}
.pac-cell{display:flex;align-items:center;gap:10px}
.pac-av{width:32px;height:32px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green);flex-shrink:0}
.pac-name{font-size:13.5px;font-weight:700;color:var(--t1)}
.pac-meta{font-size:11.5px;color:var(--t3)}
.ptbl-c{font-size:12.5px;color:var(--t2)}
.st-pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px}
.sp-on{background:var(--ok-bg);color:var(--ok)}
.sp-al{background:var(--warn-bg);color:var(--warn)}
.sp-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.ptbl-open{font-size:12px;color:var(--t3);opacity:0;transition:opacity .12s;text-align:right;font-weight:600}

@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fu .18s ease}
</style>

  // DETALHES TABLE
  var d=p.det;
  var detRows=[
    ['CPF',d.cpf],['Telefone',d.tel],['E-mail',d.email],
    ['Convênio',d.plano],['Carteirinha',d.cart],['Cidade',d.cidade],
    ['Cadastro',d.cadastro],['Hist. familiar',d.familiar]
  ].map(function(r){return '<div class="dt-row"><span class="dt-lbl">'+r[0]+'</span><span class="dt-val">'+r[1]+'</span></div>';}).join('');
  var detH='<div class="dt-block"><div class="dt-h"><span class="dt-hl">Dados do Paciente</span></div><div class="dt-body">'+detRows+'</div></div>';

  return ph
    +'<div class="body">'
      // LEFT — timeline + insights
      +'<div class="col">'+tlH+insH+'</div>'
      // CENTER — meds + allergies + exams
      +'<div class="col">'+medsH+allgH+examsH+'</div>'
      // RIGHT — retorno + wa + config + details
      +'<div class="col">'
        +'<div class="rw-grid">'+retH+waH+'</div>'
        +waConfig
        +detH
      +'</div>'
    +'</div>';
}

function renderList(){
  var rows=PX.map(function(p){
    var st=p.status==='alert'
      ?'<span class="st-pill sp-al"><span class="sp-dot"></span>Alerta</span>'
      :'<span class="st-pill sp-on"><span class="sp-dot"></span>Ativa</span>';
    var rd=p.retDate?'<span style="font-size:12.5px;color:var(--t2)">'+p.retDate.replace(' 2026','')+'</span>':'<span style="color:var(--t4)">—</span>';
    return '<div class="ptbl-r" onclick="openP(\''+p.id+'\')">'
      +'<div class="pac-cell"><div class="pac-av">'+ini(p.name)+'</div><div><div class="pac-name">'+p.name+'</div><div class="pac-meta">'+p.age+' anos · '+p.sex+'</div></div></div>'
      +'<div class="ptbl-c">'+p.last+'</div><div>'+st+'</div><div>'+rd+'</div>'
      +'<div class="ptbl-open">Abrir →</div>'
    +'</div>';
  }).join('');
  return '<div class="list-wrap"><div class="list-title">Pacientes<span class="list-cnt">'+PX.length+' pacientes</span></div>'
    +'<div class="ptbl"><div class="ptbl-h"><div class="ptbl-hc">Paciente</div><div class="ptbl-hc">Última consulta</div><div class="ptbl-hc">Status</div><div class="ptbl-hc">Retorno</div><div></div></div>'
    +rows+'</div></div>';
}

render();
</script>
</body>
</html>
