<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vitaid · Central Clínica</title>
<script>
(function(){
  localStorage.setItem('vitae_token','preview-mock-token');
  localStorage.setItem('vitae_refresh_token','preview-mock-refresh');
  localStorage.setItem('vitae_usuario',JSON.stringify({
    id:'med-1',nome:'Dra. Helena Souza',email:'helena@vitaid.com',
    tipo:'MEDICO',especialidade:'Clínica Geral',crm:'123456',uf:'SP'
  }));
  window.__PREVIEW_MODE=true;
  var _f=window.fetch;
  window.fetch=function(url,opts){
    if(!String(url).includes('railway')&&!String(url).includes('vitae-app-production'))return _f(url,opts);
    return Promise.resolve({ok:true,status:200,json:function(){return Promise.resolve({});},text:function(){return Promise.resolve('');}});
  };
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --t1:#0d0e12;--t2:#4b5263;--t3:#8c909c;--t4:#c8cad1;
  --bg:#f4f4f2;--surf:#fff;--surf2:#f9f9f8;
  --b:rgba(0,0,0,.08);--b2:rgba(0,0,0,.05);
  --green:#00c47a;--gd:rgba(0,196,122,.09);
  --red:#e53e3e;--rd:rgba(229,62,62,.08);
  --amber:#c47a00;--ad:rgba(196,122,0,.09);
  --cyan:#0099b8;--cd:rgba(0,153,184,.08);
  --side:#0c0d10;
  --f:'Geist',system-ui,sans-serif;
  --fm:'Geist Mono',monospace;
  --r:8px;--rs:5px;
}
html,body{height:100%;background:var(--bg);font-family:var(--f);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:196px;min-width:196px;background:var(--side);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.04)}
.sb-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-mark{width:24px;height:24px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0c0d10;flex-shrink:0;font-family:var(--fm)}
.sb-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.2px}
.sb-pro{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(0,196,122,.12);color:var(--green);border:1px solid rgba(0,196,122,.18);border-radius:3px;padding:2px 5px}
.sb-g{padding:16px 8px 4px 8px}
.sb-gl{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:0 6px}
.sb-nav{padding:2px 8px 8px;display:flex;flex-direction:column;gap:1px}
.sb-a{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.42);font-size:13px;font-weight:500;text-decoration:none;transition:color .12s,background .12s}
.sb-a:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)}
.sb-a.on{background:rgba(0,196,122,.1);color:#fff}
.sb-a.on .si{color:var(--green);opacity:1}
.si{width:14px;height:14px;flex-shrink:0;opacity:.5}
.sb-a.on .si{opacity:1}
.sb-n{margin-left:auto;font-size:10px;font-weight:700;background:rgba(0,196,122,.15);color:var(--green);border-radius:10px;padding:1px 6px}
.sb-ft{margin-top:auto;padding:10px 8px;border-top:1px solid rgba(255,255,255,.05)}
.sb-u{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer}
.sb-u:hover{background:rgba(255,255,255,.04)}
.sb-ua{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.sb-un{font-size:12px;font-weight:500;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.sb-uc{font-size:10px;color:rgba(255,255,255,.28)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:44px;min-height:44px;border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 22px;gap:8px;background:var(--surf)}
.tb-r{color:var(--t3);font-size:12.5px;cursor:pointer;font-weight:500}
.tb-r:hover{color:var(--t2)}
.tb-s{color:var(--t4);font-size:10px}
.tb-c{font-size:12.5px;font-weight:600;color:var(--t1)}
.tb-t{margin-left:auto;font-family:var(--fm);font-size:11px;color:var(--t3);letter-spacing:.02em}

/* CONTENT */
.page{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* PATIENT HEADER */
.ph{padding:16px 22px;background:var(--surf);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:12px}
.ph-av{width:40px;height:40px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0;font-family:var(--fm);letter-spacing:-.5px}
.ph-mid{flex:1;min-width:0}
.ph-name{font-size:16px;font-weight:700;letter-spacing:-.4px;color:var(--t1);line-height:1}
.ph-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.ph-m{font-size:12px;color:var(--t3)}
.ph-sep{font-size:10px;color:var(--t4)}
.ph-tags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid}
.tag-a{background:var(--rd);border-color:rgba(229,62,62,.22);color:var(--red)}
.tag-c{background:var(--bg);border-color:var(--b);color:var(--t2)}
.ph-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-p{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--green);color:#0c0d10;font-size:12px;font-weight:700;font-family:var(--f);border:none;border-radius:var(--rs);cursor:pointer;letter-spacing:-.1px;transition:opacity .15s;white-space:nowrap}
.btn-p:hover{opacity:.85}
.btn-g{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;background:transparent;color:var(--t2);font-size:12px;font-weight:500;font-family:var(--f);border:1px solid var(--b);border-radius:var(--rs);cursor:pointer;transition:background .12s;white-space:nowrap}
.btn-g:hover{background:var(--bg)}
.btn-i{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:transparent;border:1px solid var(--b);border-radius:var(--rs);cursor:pointer;color:var(--t2);transition:background .12s}
.btn-i:hover{background:var(--bg)}

/* METRICS STRIP */
.ms{display:flex;align-items:stretch;border-bottom:1px solid var(--b);background:var(--surf)}
.mi{flex:1;padding:12px 20px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .12s;position:relative}
.mi:hover{background:var(--surf2)}
.mi+.mi::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:1px;background:var(--b2)}
.ml{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3)}
.mv{font-size:17px;font-weight:700;color:var(--t1);font-family:var(--fm);letter-spacing:-.5px;line-height:1.1;margin-top:3px}
.mv.red{color:var(--red)}
.ms-sub{font-size:11px;color:var(--t3);margin-top:2px}

/* TWO COLUMNS */
.cols{flex:1;display:grid;grid-template-columns:1fr 304px;overflow:hidden}
.col-l{overflow-y:auto;padding:24px 22px;display:flex;flex-direction:column;gap:28px;border-right:1px solid var(--b)}
.col-l::-webkit-scrollbar{width:0}
.col-r{overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;background:var(--surf)}
.col-r::-webkit-scrollbar{width:0}

/* SECTION HEADER */
.sh{display:flex;align-items:center;margin-bottom:12px}
.sl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.sa{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--green);background:none;border:none;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:3px;padding:0}
.sa:hover{opacity:.7}

/* TIMELINE */
.tl{display:flex;flex-direction:column}
.ti{display:grid;grid-template-columns:40px 1fr;gap:12px;position:relative;padding-bottom:20px}
.ti:last-child{padding-bottom:0}
.ti::after{content:'';position:absolute;left:47px;top:18px;bottom:0;width:1px;background:var(--b2)}
.ti:last-child::after{display:none}
.td{display:flex;flex-direction:column;align-items:flex-end;padding-top:2px}
.tdd{font-size:11px;font-weight:600;font-family:var(--fm);color:var(--t2);line-height:1}
.tdm{font-size:9.5px;color:var(--t3);font-family:var(--fm);margin-top:2px}
.tdot{position:absolute;left:43px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--surf);border:2px solid var(--t4);z-index:1}
.tdot.on{border-color:var(--green);background:var(--green)}
.tb-wrap{padding-top:0}
.tt{font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;line-height:1.3;letter-spacing:-.1px}
.tt:hover{color:var(--green)}
.ts{font-size:12px;color:var(--t2);line-height:1.55;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tbg{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.bg{font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:3px;border:1px solid;white-space:nowrap}
.bg-g{border-color:rgba(0,196,122,.25);color:var(--green);background:var(--gd)}
.bg-a{border-color:rgba(196,122,0,.25);color:var(--amber);background:var(--ad)}
.bg-r{border-color:rgba(229,62,62,.25);color:var(--red);background:var(--rd)}
.bg-n{border-color:var(--b);color:var(--t3);background:rgba(0,0,0,.02)}

/* TIMELINE EMPTY */
.te{padding:8px 0 4px}
.te-t{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px}
.te-s{font-size:12px;color:var(--t3);line-height:1.6;max-width:380px}
.te-cta{margin-top:10px;font-size:12px;font-weight:600;color:var(--green);background:none;border:none;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:4px;padding:0}

/* INSIGHTS */
.ins{border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.ins-h{padding:10px 14px;border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px}
.ins-hl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t2);flex:1}
.ins-hb{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--cd);color:var(--cyan);border:1px solid rgba(0,153,184,.18)}
.ins-b{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.ins-l{display:flex;align-items:flex-start;gap:8px}
.ins-ld{width:3px;height:3px;border-radius:50%;background:var(--t3);margin-top:8px;flex-shrink:0}
.ins-lt{font-size:12px;color:var(--t2);line-height:1.6}
.ins-lt strong{color:var(--t1);font-weight:600}
.ins-ft{padding:9px 14px;border-top:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between}
.ins-fts{font-size:10.5px;color:var(--t3)}
.ins-ftl{font-size:11.5px;font-weight:600;color:var(--cyan);background:none;border:none;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:3px;padding:0}

/* RETURN BLOCK */
.ret{border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.ret-h{padding:9px 12px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between}
.ret-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.ret-b{padding:12px}
.ret-d{font-size:19px;font-weight:700;font-family:var(--fm);color:var(--t1);letter-spacing:-.8px;line-height:1}
.ret-st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-top:7px}
.st-aw{background:var(--ad);color:var(--amber);border:1px solid rgba(196,122,0,.2)}
.st-ok{background:var(--gd);color:var(--green);border:1px solid rgba(0,196,122,.22)}
.st-ex{background:var(--rd);color:var(--red);border:1px solid rgba(229,62,62,.22)}
.ret-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.ret-acts{display:flex;align-items:center;gap:6px;margin-top:11px}
.ret-p{flex:1;padding:7px 0;font-size:11.5px;font-weight:700;font-family:var(--f);border-radius:var(--rs);cursor:pointer;border:1px solid var(--t1);background:var(--t1);color:#fff;transition:opacity .12s}
.ret-p:hover{opacity:.85}
.ret-s{padding:7px 10px;font-size:11.5px;font-weight:500;font-family:var(--f);border-radius:var(--rs);cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--t2);transition:background .12s}
.ret-s:hover{background:var(--bg)}
.ret-empty{padding:14px 12px}
.ret-et{font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:10px}
.ret-ec{width:100%;padding:7px 0;font-size:12px;font-weight:600;font-family:var(--f);border-radius:var(--rs);cursor:pointer;background:var(--gd);color:var(--green);border:1px solid rgba(0,196,122,.22);transition:background .12s}
.ret-ec:hover{background:rgba(0,196,122,.15)}

/* DOCUMENTS */
.docs{border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.docs-h{padding:9px 12px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between}
.docs-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.docs-add{font-size:11.5px;font-weight:600;color:var(--green);background:none;border:none;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:3px;padding:0}
.docs-add:hover{opacity:.7}
.dr{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--b2);cursor:pointer;transition:background .1s;position:relative}
.dr:last-child{border-bottom:none}
.dr:hover{background:var(--surf2)}
.dr:hover .da{opacity:1}
.dt{width:28px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:700;font-family:var(--fm);letter-spacing:.04em;flex-shrink:0}
.dt-pdf{background:#fff0ee;color:#c53030;border:1px solid #f5c6c6}
.dt-img{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.dt-doc{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.di{flex:1;min-width:0}
.dn{font-size:12.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm{font-size:10px;color:var(--t3);margin-top:2px}
.ds{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ds-ok{background:var(--green)}
.ds-nw{background:var(--amber)}
.da{display:flex;gap:3px;opacity:0;transition:opacity .1s}
.dab{width:24px;height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;border:1px solid var(--b);background:var(--surf);cursor:pointer;color:var(--t3)}
.dab:hover{background:var(--bg);color:var(--t2)}
.docs-empty{padding:16px 12px;text-align:center}
.docs-et{font-size:11.5px;color:var(--t3);line-height:1.6}

/* PATIENT LIST */
.list{padding:22px}
.lh{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.lt{font-size:17px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.lc{font-size:11.5px;font-weight:500;background:var(--surf);border:1px solid var(--b);border-radius:20px;padding:2px 9px;color:var(--t2)}
.ls{margin-left:auto;position:relative}
.li{border:1px solid var(--b);border-radius:var(--rs);padding:6px 10px 6px 30px;font-size:12.5px;font-family:var(--f);color:var(--t1);background:var(--surf);outline:none;width:210px;transition:border .15s}
.li:focus{border-color:var(--green)}
.lsi{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.tbl{background:var(--surf);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.th{display:grid;grid-template-columns:2fr 1fr 100px 110px 64px;align-items:center;padding:0 14px;height:34px;border-bottom:1px solid var(--b);background:var(--surf2)}
.thc{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.tr{display:grid;grid-template-columns:2fr 1fr 100px 110px 64px;align-items:center;padding:0 14px;height:50px;border-bottom:1px solid var(--b2);cursor:pointer;transition:background .1s;text-decoration:none;color:inherit}
.tr:last-child{border-bottom:none}
.tr:hover{background:var(--surf2)}
.tr:hover .tro{opacity:1}
.pc{display:flex;align-items:center;gap:9px}
.pav{width:30px;height:30px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green);flex-shrink:0;font-family:var(--fm)}
.pn{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.1px}
.pm{font-size:11px;color:var(--t3)}
.tc{font-size:12.5px;color:var(--t2)}
.sb-badge2{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid}
.s-on{color:var(--green);background:var(--gd);border-color:rgba(0,196,122,.22)}
.s-al{color:var(--amber);background:var(--ad);border-color:rgba(196,122,0,.22)}
.rdot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.rd-val{font-family:var(--fm);font-size:11.5px;color:var(--t2)}
.tro{font-size:11.5px;color:var(--t3);opacity:0;transition:opacity .1s;text-align:right;font-weight:500}

/* ANIM */
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page-in{animation:up .18s ease}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-logo">
    <div class="sb-mark">v</div>
    <span class="sb-name">vita id</span>
    <span class="sb-pro">PRO</span>
  </div>
  <div class="sb-g"><span class="sb-gl">Núcleo</span></div>
  <div class="sb-nav">
    <a class="sb-a" href="#" onclick="gv('hoje');return false">
      <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="2"/><path d="M5.5 7.5h5M5.5 5h3"/></svg>Hoje
    </a>
    <a class="sb-a" href="#" onclick="gv('pcs');return false">
      <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5h10M3 8h10M3 11.5h5.5"/></svg>
      Pré-Consultas<span class="sb-n">9</span>
    </a>
    <a class="sb-a on" id="nav-p" href="#" onclick="gv('pac');return false">
      <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="5.5" r="2.5"/><path d="M2 13c0-2.2 2-4 4.5-4s4.5 1.8 4.5 4"/><circle cx="12" cy="5.5" r="1.8"/><path d="M14 11.5c0-1.5-1-2.5-2-2.5"/></svg>
      Pacientes<span class="sb-n">3</span>
    </a>
  </div>
  <div class="sb-g"><span class="sb-gl">Workspace</span></div>
  <div class="sb-nav">
    <a class="sb-a" href="#" onclick="return false">
      <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>Templates
    </a>
    <a class="sb-a" href="#" onclick="return false">
      <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="2.5"/><path d="M3.5 13c0-2 2-3.5 4.5-3.5s4.5 1.5 4.5 3.5"/></svg>Meu Perfil
    </a>
  </div>
  <div class="sb-ft">
    <div class="sb-u">
      <div class="sb-ua">HS</div>
      <div><div class="sb-un">Dra. Helena Souza</div><div class="sb-uc">CRM/SP 123456</div></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div id="crumb" style="display:flex;align-items:center;gap:7px"></div>
    <span class="tb-t" id="clk"></span>
  </div>
  <div class="page" id="pg"></div>
</div>

</div>
<script>
var PX=[
  {id:'p1',name:'Álvaro Schocair',age:46,sex:'Masculino',blood:'A+',
   last:'29 abr',status:'active',retDate:'15 jul 2026',retStatus:'awaiting',retMeta:'há 2 horas · via app',
   tags:[{l:'Hipertensão',t:'c'},{l:'Alérgico: Dipirona',t:'a'},{l:'Alérgico: Penicilina',t:'a'}],
   exams:{v:3,s:'últimos 3 meses'},allg:{v:2,s:'1 grave',crit:true},meds:{v:4,s:'em uso agora'},conds:{v:1,s:'hipertensão'},
   tl:[
    {d:'29',m:'ABR',on:true,t:'Cefaleia recorrente e dor abdominal',s:'Paciente relata dor de cabeça intensa há 3 dias, intensidade 8/10. Associada a náuseas e sensibilidade à luz. Dor abdominal pontual na região epigástrica.',bg:[{l:'Alerta farmacológico',c:'r'},{l:'3 exames solicitados',c:'n'},{l:'Retorno marcado',c:'g'}]},
    {d:'15',m:'ABR',on:false,t:'Controle de hipertensão arterial',s:'Pressão aferida: 148/92 mmHg. Boa adesão à Losartana 50mg. Episódios de tontura matinal. Solicitado ajuste de dose.',bg:[{l:'PA elevada',c:'a'},{l:'Medicamento ajustado',c:'n'}]},
    {d:'02',m:'MAR',on:false,t:'Consulta de rotina — check-up anual',s:'Paciente sem queixas ativas. Exames de rotina dentro dos parâmetros normais. Recomendada manutenção do tratamento atual.',bg:[{l:'Sem alertas',c:'g'},{l:'Exames OK',c:'n'}]}
   ],
   docs:[
    {n:'Hemograma completo',tp:'pdf',sz:'128 KB',dt:'29 abr',st:'ok',or:'Lab. Fleury'},
    {n:'ECG de repouso',tp:'img',sz:'2.1 MB',dt:'15 abr',st:'ok',or:'Cardioclínica SP'},
    {n:'Receita — Losartana 50mg',tp:'pdf',sz:'38 KB',dt:'02 mar',st:'ok',or:'Dra. Helena Souza'}
   ],
   ins:[
    {t:'<strong>3 consultas</strong> nos últimos 90 dias — frequência acima da média para hipertensos controlados.'},
    {t:'Padrão de <strong>cefaleia recorrente</strong> detectado nas últimas 2 anamneses. Considerar avaliação neurológica.'},
    {t:'Dipirona prescrita em 02/mar. <strong>Alergia registrada</strong> — conflito farmacológico detectado.'}
   ]},
  {id:'p2',name:'Maria Silva',age:47,sex:'Feminino',blood:'O+',
   last:'10 mai',status:'active',retDate:null,retStatus:null,retMeta:null,
   tags:[{l:'Diabetes tipo 2',t:'c'},{l:'Hipotireoidismo',t:'c'}],
   exams:{v:5,s:'últimos 6 meses'},allg:{v:1,s:'sem graves',crit:false},meds:{v:3,s:'em uso agora'},conds:{v:2,s:'2 crônicas'},
   tl:[
    {d:'10',m:'MAI',on:true,t:'Controle glicêmico — revisão trimestral',s:'HbA1c: 7.2% — levemente acima da meta. Dificuldade em manter dieta. Proposto ajuste na dose de Metformina e encaminhamento nutricional.',bg:[{l:'Glicemia elevada',c:'a'},{l:'Ajuste medicamentoso',c:'n'}]}
   ],
   docs:[{n:'HbA1c — resultado',tp:'pdf',sz:'89 KB',dt:'10 mai',st:'nw',or:'Lab. Sabin'}],
   ins:[
    {t:'HbA1c <strong>7.2%</strong> — acima da meta de 7.0% para diabéticos tipo 2. Monitorar tendência.'},
    {t:'Levotiroxina sem ajuste há <strong>8 meses</strong>. Considerar revisão de TSH na próxima consulta.'}
   ]},
  {id:'p3',name:'Daniel Fernandes',age:17,sex:'Masculino',blood:'B+',
   last:'05 mai',status:'alert',retDate:'20 mai 2026',retStatus:'confirmed',retMeta:'confirmado em 05 mai · 09:32',
   tags:[{l:'Asma leve',t:'c'},{l:'Rinite alérgica',t:'c'}],
   exams:{v:1,s:'último mês'},allg:{v:3,s:'2 graves',crit:true},meds:{v:2,s:'em uso'},conds:{v:2,s:'respiratórias'},
   tl:[
    {d:'05',m:'MAI',on:true,t:'Crise de broncoespasmo noturna',s:'3 episódios de broncoespasmo na última semana, principalmente após 22h. Acordou 2 vezes com sensação de aperto no peito e chiado audível.',bg:[{l:'Urgência respiratória',c:'r'},{l:'Retorno em 15 dias',c:'a'}]}
   ],
   docs:[],
   ins:[
    {t:'<strong>3 crises noturnas</strong> em 7 dias — padrão compatível com asma não controlada. Revisar protocolo.'},
    {t:'Sem uso de corticoide inalatório nos últimos 30 dias. <strong>Adesão comprometida.</strong>'}
   ]}
];

var cur=null;
var clk=document.getElementById('clk');
function tick(){var n=new Date();clk.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}
setInterval(tick,1000);tick();

function ini(nm){return nm.split(' ').slice(0,2).map(function(s){return s[0];}).join('').toUpperCase();}

function sv(n,s){return '<svg width="'+n+'" height="'+n+'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+s+'</svg>';}
var icons={
  send:sv(13,'<path d="M13.5 2.5L9 14L7 9L2 7.5L13.5 2.5Z"/>'),
  wapp:sv(12,'<path d="M8 2a6 6 0 0 1 5.2 9L14 14l-3-.8A6 6 0 1 1 8 2Z"/><path d="M5.5 7.5c.5 1 1.5 2 2.5 2.5"/>'),
  more:sv(14,'<circle cx="4" cy="8" r=".7" fill="currentColor"/><circle cx="8" cy="8" r=".7" fill="currentColor"/><circle cx="12" cy="8" r=".7" fill="currentColor"/>'),
  plus:sv(12,'<path d="M8 3v10M3 8h10"/>'),
  eye:sv(11,'<path d="M2 8C3.5 5 5.5 3.5 8 3.5s4.5 1.5 6 4.5c-1.5 3-3.5 4.5-6 4.5S3.5 11 2 8Z"/><circle cx="8" cy="8" r="1.5"/>'),
  dl:sv(11,'<path d="M8 2v8M5 7l3 3 3-3M3 13h10"/>'),
  trash:sv(11,'<path d="M3 5h10M6 5V3h4v2M5 5l.8 8h4.4L11 5"/>'),
  arr:sv(11,'<path d="M3 8h10M9 4l4 4-4 4"/>'),
  clk:sv(12,'<circle cx="8" cy="8" r="5.5"/><path d="M8 5.5V8.5L10 10"/>'),
  back:sv(13,'<path d="M10 3L5 8l5 5"/>'),
  srch:sv(13,'<circle cx="7" cy="7" r="4.5"/><path d="M11 11l2.5 2.5"/>'),
};

function gv(v){
  cur=null;
  document.querySelectorAll('.sb-a').forEach(function(e){e.classList.remove('on');});
  var idx={hoje:0,pcs:1,pac:2};
  document.querySelectorAll('.sb-a')[idx[v]||2].classList.add('on');
  render();
}

function openP(id){
  cur=PX.find(function(p){return p.id===id;});
  render();
}

function back(){cur=null;render();}

function crumb(){
  var el=document.getElementById('crumb');
  if(cur){
    el.innerHTML='<span class="tb-r" onclick="back()">Pacientes</span><span class="tb-s">›</span><span class="tb-c">'+cur.name+'</span>';
  } else {
    el.innerHTML='<span class="tb-c">Pacientes</span>';
  }
}

function render(){
  crumb();
  var pg=document.getElementById('pg');
  pg.className='page page-in';
  pg.innerHTML=cur?renderDetail(cur):renderList();
}

function renderList(){
  var rows=PX.map(function(p){
    var av='<div class="pav">'+ini(p.name)+'</div>';
    var st=p.status==='alert'
      ?'<span class="sb-badge2 s-al"><span class="rdot"></span>Alerta</span>'
      :'<span class="sb-badge2 s-on"><span class="rdot"></span>Ativa</span>';
    var rd=p.retDate?'<span class="rd-val">'+p.retDate.replace(' 2026','')+'</span>':'<span style="color:var(--t4)">—</span>';
    return '<div class="tr" onclick="openP(\''+p.id+'\')">'
      +'<div class="pc">'+av+'<div><div class="pn">'+p.name+'</div><div class="pm">'+p.age+' anos · '+p.sex+'</div></div></div>'
      +'<div class="tc">'+p.last+'</div><div>'+st+'</div><div>'+rd+'</div>'
      +'<div class="tro">Abrir →</div></div>';
  }).join('');
  return '<div class="list"><div class="lh"><div class="lt">Pacientes</div><div class="lc">'+PX.length+' pacientes</div>'
    +'<div class="ls">'+icons.srch+'<input class="li" placeholder="Buscar..." oninput="fl(this.value)"/></div></div>'
    +'<div class="tbl"><div class="th"><div class="thc">Paciente</div><div class="thc">Última consulta</div><div class="thc">Status</div><div class="thc">Retorno</div><div class="thc"></div></div>'
    +rows+'</div></div>';
}

function fl(q){
  document.querySelectorAll('.tr').forEach(function(r,i){
    r.style.display=PX[i].name.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

function renderDetail(p){
  // Header
  var tags=p.tags.map(function(t){
    return '<span class="tag '+(t.t==='a'?'tag-a':'tag-c')+'">'+t.l+'</span>';
  }).join('');

  var ph='<div class="ph">'
    +'<div class="ph-av">'+ini(p.name)+'</div>'
    +'<div class="ph-mid">'
      +'<div class="ph-name">'+p.name+'</div>'
      +'<div class="ph-meta"><span class="ph-m">'+p.age+' anos</span><span class="ph-sep">·</span><span class="ph-m">'+p.sex+'</span><span class="ph-sep">·</span><span class="ph-m">Sangue '+p.blood+'</span></div>'
      +(tags?'<div class="ph-tags">'+tags+'</div>':'')
    +'</div>'
    +'<div class="ph-acts">'
      +'<button class="btn-p">'+icons.send+'Enviar pré-consulta</button>'
      +'<button class="btn-g">'+icons.wapp+' WhatsApp ↗</button>'
      +'<button class="btn-i">'+icons.more+'</button>'
    +'</div>'
  +'</div>';

  // Metrics
  var ms='<div class="ms">'
    +'<div class="mi"><div class="ml">Exames</div><div class="mv">'+p.exams.v+'</div><div class="ms-sub">'+p.exams.s+'</div></div>'
    +'<div class="mi"><div class="ml">Alergias</div><div class="mv'+(p.allg.crit?' red':'')+'">'+p.allg.v+'</div><div class="ms-sub">'+p.allg.s+'</div></div>'
    +'<div class="mi"><div class="ml">Medicamentos</div><div class="mv">'+p.meds.v+'</div><div class="ms-sub">'+p.meds.s+'</div></div>'
    +'<div class="mi"><div class="ml">Condições</div><div class="mv">'+p.conds.v+'</div><div class="ms-sub">'+p.conds.s+'</div></div>'
  +'</div>';

  // Timeline
  var tlH;
  if(p.tl.length){
    var items=p.tl.map(function(a){
      var bgs=a.bg.map(function(b){var m={g:'bg-g',a:'bg-a',r:'bg-r',n:'bg-n'};return '<span class="bg '+m[b.c]+'">'+b.l+'</span>';}).join('');
      return '<div class="ti">'
        +'<div class="td"><span class="tdd">'+a.d+'</span><span class="tdm">'+a.m+'</span></div>'
        +'<div class="tdot'+(a.on?' on':'')+'"></div>'
        +'<div class="tb-wrap"><div class="tt">'+a.t+'</div><div class="ts">'+a.s+'</div><div class="tbg">'+bgs+'</div></div>'
      +'</div>';
    }).join('');
    tlH='<div><div class="sh"><span class="sl">Histórico Clínico</span>'+(p.tl.length>2?'<button class="sa">Ver tudo '+icons.arr+'</button>':'')+'</div><div class="tl">'+items+'</div></div>';
  } else {
    tlH='<div><div class="sh"><span class="sl">Histórico Clínico</span></div>'
      +'<div class="te"><div class="te-t">Sem pré-consultas ainda</div>'
      +'<div class="te-s">Quando este paciente concluir sua primeira pré-consulta, a evolução clínica aparece aqui.</div>'
      +'<button class="te-cta">'+icons.send+' Enviar pré-consulta agora</button></div></div>';
  }

  // Insights
  var insH='';
  if(p.ins.length>1){
    var lines=p.ins.map(function(i){return '<div class="ins-l"><div class="ins-ld"></div><div class="ins-lt">'+i.t+'</div></div>';}).join('');
    insH='<div><div class="sh"><span class="sl">Análise Clínica</span>'
      +'<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--cd);color:var(--cyan);border:1px solid rgba(0,153,184,.18);">Gerado automaticamente</span></div>'
      +'<div class="ins"><div class="ins-b">'+lines+'</div>'
      +'<div class="ins-ft"><span class="ins-fts">Baseado nas últimas '+p.tl.length+' consultas</span>'
      +'<button class="ins-ftl">Ver completo '+icons.arr+'</button></div></div></div>';
  }

  // Return
  var retH;
  if(p.retDate){
    var stCls=p.retStatus==='confirmed'?'st-ok':'st-aw';
    var stTxt=p.retStatus==='confirmed'?'Confirmado pelo paciente':'Aguardando confirmação';
    retH='<div class="ret"><div class="ret-h"><span class="ret-hl">Próximo Retorno</span>'+icons.clk+'</div>'
      +'<div class="ret-b">'
        +'<div class="ret-d">'+p.retDate+'</div>'
        +'<div class="ret-st '+stCls+'"><span class="ret-dot"></span>'+stTxt+'</div>'
        +(p.retMeta?'<div style="font-size:10.5px;color:var(--t3);margin-top:4px;">'+p.retMeta+'</div>':'')
        +'<div class="ret-acts">'
          +(p.retStatus==='awaiting'?'<button class="ret-p" onclick="alert(\'Confirmar retorno\')">Confirmar</button>':'')
          +'<button class="ret-s" onclick="alert(\'Reagendar\')">Reagendar</button>'
          +(p.retStatus==='awaiting'?'<button class="ret-s" onclick="alert(\'Cancelar\')">Cancelar</button>':'')
        +'</div>'
      +'</div></div>';
  } else {
    retH='<div class="ret"><div class="ret-h"><span class="ret-hl">Próximo Retorno</span>'+icons.clk+'</div>'
      +'<div class="ret-empty"><div class="ret-et">Nenhum retorno agendado para este paciente.</div>'
      +'<button class="ret-ec">+ Marcar retorno</button></div></div>';
  }

  // Documents
  var docsH;
  if(p.docs.length){
    var drows=p.docs.map(function(d){
      return '<div class="dr">'
        +'<div class="dt dt-'+d.tp+'">'+d.tp.toUpperCase()+'</div>'
        +'<div class="di"><div class="dn">'+d.n+'</div><div class="dm">'+d.sz+' · '+d.dt+' · '+d.or+'</div></div>'
        +'<div class="ds ds-'+d.st+'"></div>'
        +'<div class="da"><button class="dab" title="Ver">'+icons.eye+'</button><button class="dab" title="Baixar">'+icons.dl+'</button><button class="dab" title="Excluir">'+icons.trash+'</button></div>'
      +'</div>';
    }).join('');
    docsH='<div class="docs"><div class="docs-h"><span class="docs-hl">Documentos</span><button class="docs-add">'+icons.plus+' Anexar</button></div>'+drows+'</div>';
  } else {
    docsH='<div class="docs"><div class="docs-h"><span class="docs-hl">Documentos</span><button class="docs-add">'+icons.plus+' Anexar</button></div>'
      +'<div class="docs-empty"><div class="docs-et">Nenhum documento ainda.<br>Adicione laudos, receitas ou exames.</div></div></div>';
  }

  // Layout height
  var bodyH='calc(100vh - 44px - 72px - 53px)';

  return ph+ms
    +'<div style="display:grid;grid-template-columns:1fr 304px;height:'+bodyH+';overflow:hidden">'
      +'<div class="col-l">'+tlH+insH+'</div>'
      +'<div class="col-r">'+retH+docsH+'</div>'
    +'</div>';
}

render();
</script>
</body>
</html>
