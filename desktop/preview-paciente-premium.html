<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vitaid · Central Clínica</title>
<script>
(function(){
  localStorage.setItem('vitae_token','preview-mock-token');
  localStorage.setItem('vitae_refresh_token','preview-mock-refresh');
  localStorage.setItem('vitae_usuario',JSON.stringify({id:'med-1',nome:'Dra. Helena Souza',email:'helena@vitaid.com',tipo:'MEDICO',especialidade:'Clínica Geral',crm:'123456',uf:'SP'}));
  window.__PREVIEW_MODE=true;
  var _f=window.fetch;
  window.fetch=function(url,opts){
    if(!String(url).includes('railway')&&!String(url).includes('vitae-app-production'))return _f(url,opts);
    return Promise.resolve({ok:true,status:200,json:function(){return Promise.resolve({});},text:function(){return Promise.resolve('');}});
  };
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00E5A0;--cyan:#00B4D8;
  --grad:linear-gradient(120deg,#00E5A0,#00B4D8);
  --dark:#0D0F14;--bg:#F7F8FA;--surface:#fff;--s2:#F2F4F7;--s3:#E8EBF0;
  --border:rgba(0,0,0,.06);--b2:rgba(0,0,0,.10);
  --t1:#111318;--t2:#5A6070;--t3:#9CA3AF;--t4:#D1D5DB;
  --acc:rgba(0,229,160,.08);--accb:rgba(0,229,160,.18);
  --ok:#00C47A;--warn:#F59E0B;--bad:#EF4444;--info:#3B82F6;
  --ok-bg:rgba(0,196,122,.08);--warn-bg:rgba(245,158,11,.08);
  --bad-bg:rgba(239,68,68,.08);--info-bg:rgba(59,130,246,.07);
  --font:'Plus Jakarta Sans',sans-serif;--r:12px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR — identico ao app real */
.sb{width:220px;min-width:220px;background:var(--dark);display:flex;flex-direction:column;padding:18px 14px 14px;overflow:hidden}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:0 2px}
.sb-mark{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--dark);flex-shrink:0}
.sb-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sb-pro{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2);border-radius:4px;padding:2px 6px}
.sb-sec{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2);padding:0 12px;margin:8px 0 4px}
.nl{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:background .15s,color .15s;border:1px solid transparent;position:relative;margin-bottom:1px;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;text-decoration:none}
.nl:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)}
.nl.on{background:rgba(0,229,160,.10);border-color:rgba(0,229,160,.22);color:#fff}
.nl.on::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--grad);border-radius:0 2px 2px 0}
.nl.on svg{stroke:var(--green)}
.nl svg{width:15px;height:15px;flex-shrink:0;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:rgba(0,229,160,.15);color:var(--green);border-radius:10px;padding:1px 7px}
.sb-ft{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer}
.sb-user:hover{background:rgba(255,255,255,.04)}
.sb-av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.sb-uname{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px}
.sb-ucrm{font-size:10.5px;color:rgba(255,255,255,.28)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px}
.tb-r{font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;transition:color .12s}
.tb-r:hover{color:var(--t2)}
.tb-sep{color:var(--t4);font-size:11px}
.tb-cur{font-size:13px;font-weight:700;color:var(--t1)}
.tb-time{margin-left:auto;font-size:11.5px;color:var(--t3);font-variant-numeric:tabular-nums;letter-spacing:.02em}

/* PAGE */
.pg{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* PATIENT HEADER */
.ph{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:flex-start;gap:14px}
.ph-av{width:46px;height:46px;border-radius:50%;background:var(--acc);border:2px solid var(--accb);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--green);flex-shrink:0;overflow:hidden}
.ph-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ph-info{flex:1;min-width:0}
.ph-name{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--t1);line-height:1.1}
.ph-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.ph-mi{font-size:12.5px;color:var(--t3);font-weight:500}
.ph-dot{font-size:10px;color:var(--t4)}
.ph-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid}
.tag-a{background:var(--bad-bg);border-color:rgba(239,68,68,.12);color:var(--bad)}
.tag-c{background:var(--bg);border-color:var(--border);color:var(--t2)}
.ph-acts{display:flex;align-items:flex-start;gap:7px;flex-shrink:0;padding-top:2px}
.btn-grad{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:34px;background:var(--grad);color:var(--dark);font-size:12.5px;font-weight:700;font-family:var(--font);border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-grad:hover{opacity:.88}
.btn-sec{display:inline-flex;align-items:center;gap:6px;padding:0 13px;height:34px;background:var(--surface);color:var(--t1);font-size:12.5px;font-weight:600;font-family:var(--font);border:1px solid var(--border);border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .12s}
.btn-sec:hover{background:var(--s2)}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--t2);transition:background .12s}
.btn-icon:hover{background:var(--s2)}

/* CLINICAL SUMMARY — 4 expandable blocks */
.cs{background:var(--surface);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr)}
.cs-item{padding:14px 20px;cursor:pointer;transition:background .12s;position:relative;border-right:1px solid var(--border)}
.cs-item:last-child{border-right:none}
.cs-item:hover{background:var(--s2)}
.cs-item.open{background:var(--acc)}
.cs-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.cs-val{font-size:20px;font-weight:800;color:var(--t1);line-height:1;margin:4px 0 3px;letter-spacing:-.5px}
.cs-val.bad{color:var(--bad)}
.cs-sub{font-size:11px;color:var(--t3)}
.cs-chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--t4);transition:transform .2s}
.cs-item.open .cs-chev{transform:translateY(-50%) rotate(180deg);color:var(--green)}

/* EXPANDABLE PANEL */
.exp-panel{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .28s ease;display:none}
.exp-panel.vis{display:block}
.exp-panel.open{max-height:400px}
.exp-inner{padding:16px 24px 18px;display:flex;flex-wrap:wrap;gap:8px}
/* Allergy pills */
.al-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:8px;border:1px solid rgba(239,68,68,.14);background:var(--bad-bg)}
.al-name{font-size:13px;font-weight:700;color:var(--bad)}
.al-sev{font-size:10.5px;font-weight:600;color:rgba(239,68,68,.7);background:rgba(239,68,68,.1);padding:1px 7px;border-radius:10px;margin-left:2px}
/* Med cards */
.med-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:180px;flex:1}
.med-name{font-size:13px;font-weight:700;color:var(--t1)}
.med-dose{font-size:11.5px;color:var(--t2);margin-top:2px}
.med-st{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:6px;display:inline-block}
.med-ok{background:var(--ok-bg);color:var(--ok)}
/* Exam rows */
.ex-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;min-width:200px;flex:1}
.ex-name{font-size:12.5px;font-weight:600;color:var(--t1)}
.ex-dt{font-size:11px;color:var(--t3);margin-top:1px}
.ex-st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.ex-n{background:var(--ok-bg);color:var(--ok)}
.ex-w{background:var(--warn-bg);color:var(--warn)}
.ex-b{background:var(--bad-bg);color:var(--bad)}
/* Cond tags */
.cond-tag{display:inline-flex;align-items:center;padding:5px 12px;background:var(--info-bg);border:1px solid rgba(59,130,246,.15);border-radius:8px;font-size:12.5px;font-weight:600;color:var(--info)}

/* TWO COLUMNS */
.cols{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
.col-l{overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:22px}
.col-l::-webkit-scrollbar{width:4px}
.col-l::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.col-r{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.col-r::-webkit-scrollbar{width:4px}
.col-r::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-lnk{font-size:11.5px;font-weight:600;color:var(--green);background:none;border:none;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:3px;letter-spacing:0;text-transform:none}

/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{display:grid;grid-template-columns:44px 1fr;gap:14px;position:relative;padding-bottom:18px}
.tl-item:last-child{padding-bottom:0}
.tl-item::after{content:'';position:absolute;left:50px;top:20px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::after{display:none}
.tl-date{display:flex;flex-direction:column;align-items:flex-end;padding-top:1px}
.tl-d{font-size:11.5px;font-weight:700;color:var(--t2);line-height:1}
.tl-m{font-size:10px;color:var(--t3);margin-top:2px;font-weight:600;letter-spacing:.04em}
.tl-dot{position:absolute;left:46px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--surface);border:2px solid var(--t4);z-index:1;transition:border-color .15s}
.tl-dot.on{border-color:var(--green);background:var(--green)}
.tl-dot.warn{border-color:var(--warn)}
.tl-body{padding-top:0}
.tl-title{font-size:13.5px;font-weight:700;color:var(--t1);cursor:pointer;line-height:1.3;letter-spacing:-.1px;transition:color .12s}
.tl-title:hover{color:var(--green)}
.tl-sum{font-size:12.5px;color:var(--t2);line-height:1.6;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tl-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;border:1px solid}
.tt-g{background:var(--ok-bg);border-color:rgba(0,196,122,.18);color:var(--ok)}
.tt-w{background:var(--warn-bg);border-color:rgba(245,158,11,.18);color:var(--warn)}
.tt-b{background:var(--bad-bg);border-color:rgba(239,68,68,.18);color:var(--bad)}
.tt-n{background:var(--bg);border-color:var(--border);color:var(--t3)}
/* TL empty */
.tl-empty{padding:8px 0}
.tl-et{font-size:13.5px;font-weight:700;color:var(--t2);margin-bottom:6px}
.tl-es{font-size:12.5px;color:var(--t3);line-height:1.6;max-width:380px}
.tl-ecta{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--dark);background:var(--grad);padding:7px 14px;border-radius:8px;border:none;font-family:var(--font);cursor:pointer;transition:opacity .15s}
.tl-ecta:hover{opacity:.88}

/* INSIGHTS */
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ins-head{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--s2)}
.ins-hl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);flex:1}
.ins-hb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(0,180,216,.07);color:var(--cyan);border:1px solid rgba(0,180,216,.15)}
.ins-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.ins-li{display:flex;align-items:flex-start;gap:9px}
.ins-dot{width:5px;height:5px;min-width:5px;border-radius:50%;background:var(--t4);margin-top:7px}
.ins-txt{font-size:12.5px;color:var(--t2);line-height:1.6}
.ins-txt strong{color:var(--t1);font-weight:700}
.ins-foot{padding:9px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ins-fs{font-size:10.5px;color:var(--t3)}
.ins-fl{font-size:12px;font-weight:700;color:var(--cyan);background:none;border:none;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:3px;padding:0}

/* RIGHT RAIL CARDS */
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.rc-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rc-hl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.rc-add{font-size:12px;font-weight:700;color:var(--green);background:none;border:none;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:4px;padding:0}

/* RETURN */
.ret-body{padding:14px}
.ret-date{font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.6px;line-height:1}
.ret-st{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:8px;border:1px solid}
.rs-aw{background:var(--warn-bg);color:var(--warn);border-color:rgba(245,158,11,.18)}
.rs-ok{background:var(--ok-bg);color:var(--ok);border-color:rgba(0,196,122,.18)}
.rs-ex{background:var(--bad-bg);color:var(--bad);border-color:rgba(239,68,68,.18)}
.ret-meta{font-size:10.5px;color:var(--t3);margin-top:5px}
.ret-st-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.ret-acts{display:flex;gap:6px;margin-top:12px}
.ret-confirm{flex:1;padding:8px 0;font-size:12px;font-weight:700;font-family:var(--font);border-radius:8px;cursor:pointer;border:none;background:var(--dark);color:#fff;transition:opacity .12s;text-align:center}
.ret-confirm:hover{opacity:.85}
.ret-sec{padding:8px 12px;font-size:12px;font-weight:600;font-family:var(--font);border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);transition:background .12s}
.ret-sec:hover{background:var(--s2)}
.ret-empty{padding:14px}
.ret-et{font-size:12.5px;color:var(--t3);line-height:1.5;margin-bottom:10px}
.ret-ecta{width:100%;padding:8px 0;font-size:12.5px;font-weight:700;font-family:var(--font);border-radius:8px;cursor:pointer;background:var(--acc);color:var(--green);border:1px solid var(--accb);transition:background .12s;text-align:center}
.ret-ecta:hover{background:rgba(0,229,160,.12)}

/* DOCUMENTS */
.doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.doc-row:last-child{border-bottom:none}
.doc-row:hover{background:var(--s2)}
.doc-row:hover .doc-acts{opacity:1}
.doc-icon{width:30px;height:36px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:1px solid}
.di-pdf{background:#fff3f3;border-color:#fecaca;color:#dc2626}
.di-img{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.di-doc{background:#eff6ff;border-color:#bfdbfe;color:#2563eb}
.doc-type-lbl{font-size:7.5px;font-weight:800;letter-spacing:.05em}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:12.5px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:10.5px;color:var(--t3);margin-top:2px}
.doc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:1px}
.dd-ok{background:var(--ok)}
.dd-new{background:var(--warn)}
.doc-acts{display:flex;gap:3px;opacity:0;transition:opacity .1s}
.dab{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--t3)}
.dab:hover{background:var(--bg)}
.doc-empty{padding:18px 14px;text-align:center}
.doc-et{font-size:12px;color:var(--t3);line-height:1.6}

/* LIST VIEW */
.list-wrap{padding:22px}
.list-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.list-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.list-cnt{font-size:12px;font-weight:600;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 10px;color:var(--t2)}
.list-search{margin-left:auto;position:relative}
.search-in{border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;font-size:13px;font-family:var(--font);color:var(--t1);background:var(--surface);outline:none;width:200px;transition:border .15s}
.search-in:focus{border-color:var(--green)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;stroke:var(--t3)}
.ptbl{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.ptbl-h{display:grid;grid-template-columns:2fr 1fr 110px 120px 60px;align-items:center;padding:0 18px;height:36px;border-bottom:1px solid var(--border);background:var(--s2)}
.ptbl-hc{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4)}
.ptbl-r{display:grid;grid-template-columns:2fr 1fr 110px 120px 60px;align-items:center;padding:0 18px;height:52px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;text-decoration:none;color:inherit}
.ptbl-r:last-child{border-bottom:none}
.ptbl-r:hover{background:var(--s2)}
.ptbl-r:hover .ptbl-open{opacity:1}
.pac-cell{display:flex;align-items:center;gap:10px}
.pac-av{width:32px;height:32px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green);flex-shrink:0}
.pac-name{font-size:13.5px;font-weight:700;color:var(--t1);letter-spacing:-.1px}
.pac-meta{font-size:11.5px;color:var(--t3)}
.ptbl-c{font-size:13px;color:var(--t2)}

// CLOCK
var clkEl=document.getElementById('clk');
function tick(){var n=new Date();clkEl.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}
setInterval(tick,1000);tick();

// STATE
var cur=null,expOpen=null;
function ini(nm){return nm.split(' ').slice(0,2).map(function(s){return s[0];}).join('').toUpperCase();}

// ICONS
function ic(w,h,d,extra){extra=extra||'';return '<svg class="ico" width="'+w+'" height="'+h+'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" '+extra+'>'+d+'</svg>';}
var I={

  wapp:ic(13,13,'<path d="M8 2a6 6 0 0 1 5.2 9L14 14l-3-.8A6 6 0 1 1 8 2Z"/><path d="M5.5 7.5c.5 1 1.5 2 2.5 2.5"/>'),

};

function gv(v){cur=null;expOpen=null;render();}
function openP(id){cur=PX.find(function(p){return p.id===id;});expOpen=null;render();}
function back(){cur=null;expOpen=null;render();}

function toggleExp(key){
  if(expOpen===key){expOpen=null;}else{expOpen=key;}
  // Update DOM without full re-render
  ['exams','allg','meds','conds'].forEach(function(k){
    var btn=document.querySelector('[data-key="'+k+'"]');
    var panel=document.getElementById('exp-'+k);
    if(!btn||!panel)return;
    if(k===expOpen){
      btn.classList.add('open');
      panel.classList.add('vis');
      setTimeout(function(){if(expOpen===k)panel.classList.add('open');},10);
    } else {
      btn.classList.remove('open');
      panel.classList.remove('open');
      setTimeout(function(){if(expOpen!==k)panel.classList.remove('vis');},280);
    }
  });
}

function crumb(){
  var el=document.getElementById('crumb');
  if(cur){el.innerHTML='<span class="tb-r" onclick="back()">Pacientes</span><span class="tb-sep">›</span><span class="tb-cur">'+cur.name+'</span>';}
  else{el.innerHTML='<span class="tb-cur">Pacientes</span>';}
}

function render(){
  crumb();
  var pg=document.getElementById('pg');
  pg.className='pg anim';
  pg.innerHTML=cur?renderDetail(cur):renderList();
}

// BUILD EXP PANEL HTML
function buildExpPanel(key,p){
  var html='';
  if(key==='allg'){
    html=p.allg.list.map(function(a){
      return '<div class="al-pill"><span class="al-name">'+a.n+'</span><span class="al-sev">'+a.sev+'</span></div>';
    }).join('');
  } else if(key==='meds'){
    html=p.meds.list.map(function(m){
      return '<div class="med-card"><div class="med-name">'+m.n+'</div><div class="med-dose">'+m.dose+'</div><span class="med-st med-ok">Ativo</span></div>';
    }).join('');
  } else if(key==='exams'){
    var stMap={n:'ex-n',w:'ex-w',b:'ex-b'};
    var stLbl={n:'Normal',w:'Atenção',b:'Crítico'};
    html=p.exams.list.map(function(e){
      return '<div class="ex-row"><div><div class="ex-name">'+e.n+'</div><div class="ex-dt">'+e.dt+'</div></div><span class="ex-st '+stMap[e.st]+'">'+stLbl[e.st]+'</span></div>';
    }).join('');
  } else if(key==='conds'){
    html=p.conds.list.map(function(c){
      return '<div class="cond-tag">'+c.n+(c.since?' · desde '+c.since:'')+'</div>';
    }).join('');
  }
  var isOpen=expOpen===key;
  return '<div class="exp-panel'+(isOpen?' vis open':'\"')+'" id="exp-'+key+'"><div class="exp-inner">'+html+'</div></div>';
}

function renderDetail(p){
  var tags=p.tags.map(function(t){return '<span class="tag '+(t.t==='a'?'tag-a':'tag-c')+'">'+t.l+'</span>';}).join('');

  // Patient header
  var phHtml='<div class="ph">'
    +'<div class="ph-av">'+ini(p.name)+'</div>'
    +'<div class="ph-info">'
      +'<div class="ph-name">'+p.name+'</div>'
      +'<div class="ph-meta"><span class="ph-mi">'+p.age+' anos</span><span class="ph-dot">·</span><span class="ph-mi">'+p.sex+'</span><span class="ph-dot">·</span><span class="ph-mi">Sangue '+p.blood+'</span></div>'
      +(tags?'<div class="ph-tags">'+tags+'</div>':'')
    +'</div>'
    +'<div class="ph-acts">'
      +'<button class="btn-grad">'+I.send+'Enviar pré-consulta</button>'

      +'<button class="btn-icon">'+I.more+'</button>'
    +'</div>'
  +'</div>';

  // Clinical summary — 4 expandable
  var csHtml='<div class="cs">'
    +['exams','allg','meds','conds'].map(function(k){
      var cfg={
        exams:{lbl:'Exames',v:p.exams.v,s:p.exams.s,crit:false},
        allg:{lbl:'Alergias',v:p.allg.v,s:p.allg.s,crit:p.allg.crit},
        meds:{lbl:'Medicamentos',v:p.meds.v,s:p.meds.s,crit:false},
        conds:{lbl:'Condições',v:p.conds.v,s:p.conds.s,crit:false}
      }[k];
      var isOpen=expOpen===k;
      return '<div class="cs-item'+(isOpen?' open':'\"')+' data-key="'+k+'" onclick="toggleExp(\''+k+'\')">'
        +'<div class="cs-label">'+cfg.lbl+'</div>'
        +'<div class="cs-val'+(cfg.crit?' bad':'\'')+'">'+cfg.v+'</div>'
        +'<div class="cs-sub">'+cfg.s+'</div>'
        +'<span class="cs-chev">'+I.chev+'</span>'
      +'</div>';
    }).join('')
  +'</div>';

  // Exp panels (all 4, toggled via JS)
  var expPanels=['exams','allg','meds','conds'].map(function(k){return buildExpPanel(k,p);}).join('');

  // Timeline
  var tlHtml;
  if(p.tl.length){
    var items=p.tl.map(function(a){
      var bgs=a.bg.map(function(b){var m={g:'tt-g',w:'tt-w',b:'tt-b',n:'tt-n'};return '<span class="tl-tag '+m[b.c]+'">'+b.l+'</span>';}).join('');
      return '<div class="tl-item">'
        +'<div class="tl-date"><span class="tl-d">'+a.d+'</span><span class="tl-m">'+a.m+'</span></div>'
        +'<div class="tl-dot'+(a.on?' on':'\'')+'"></div>'
        +'<div><div class="tl-title">'+a.t+'</div><div class="tl-sum">'+a.s+'</div><div class="tl-tags">'+bgs+'</div></div>'
      +'</div>';
    }).join('');
    tlHtml='<div><div class="sec-lbl">Histórico Clínico'+(p.tl.length>2?'<button class="sec-lnk">Ver tudo '+I.arr+'</button>':'')+'</div><div class="tl">'+items+'</div></div>';
  } else {
    tlHtml='<div><div class="sec-lbl">Histórico Clínico</div>'
      +'<div class="tl-empty"><div class="tl-et">Sem pré-consultas ainda</div>'
      +'<div class="tl-es">Quando este paciente concluir sua primeira pré-consulta, a evolução clínica aparece aqui automaticamente.</div>'
      +'<button class="tl-ecta">'+I.send+' Enviar pré-consulta agora</button></div></div>';
  }

  // Insights
  var insHtml='';
  if(p.ins.length>1){
    var lines=p.ins.map(function(i){return '<div class="ins-li"><div class="ins-dot"></div><div class="ins-txt">'+i.t+'</div></div>';}).join('');
    insHtml='<div><div class="sec-lbl">Análise Clínica<span class="ins-hb">Automático</span></div>'
      +'<div class="ins-card">'
        +'<div class="ins-body">'+lines+'</div>'
        +'<div class="ins-foot"><span class="ins-fs">Baseado nas últimas '+p.tl.length+' consultas</span>'
        +'<button class="ins-fl">Ver completo '+I.arr+'</button></div>'
      +'</div></div>';
  }

  // Return
  var retHtml;
  if(p.retDate){
    var sc=p.retSt==='confirmed'?'rs-ok':'rs-aw';
    var st=p.retSt==='confirmed'?'Confirmado pelo paciente':'Aguardando confirmação';
    retHtml='<div class="rc"><div class="rc-head"><span class="rc-hl">Próximo Retorno</span>'+I.clk+'</div>'
      +'<div class="ret-body">'
        +'<div class="ret-date">'+p.retDate+'</div>'
        +'<div class="ret-st '+sc+'"><span class="ret-st-dot"></span>'+st+'</div>'
        +(p.retMeta?'<div class="ret-meta">'+p.retMeta+'</div>':'')
        +'<div class="ret-acts">'
          +(p.retSt==='awaiting'?'<button class="ret-confirm">Confirmar</button>':'')
          +'<button class="ret-sec">Reagendar</button>'
          +(p.retSt==='awaiting'?'<button class="ret-sec">Cancelar</button>':'')
        +'</div>'
      +'</div></div>';
  } else {
    retHtml='<div class="rc"><div class="rc-head"><span class="rc-hl">Próximo Retorno</span></div>'
      +'<div class="ret-empty"><div class="ret-et">Nenhum retorno agendado.</div>'
      +'<button class="ret-ecta">+ Marcar retorno</button></div></div>';
  }

  // Documents
  var docsHtml;
  if(p.docs.length){
    var drows=p.docs.map(function(d){
      return '<div class="doc-row">'
        +'<div class="doc-icon di-'+d.tp+'"><span class="doc-type-lbl">'+d.tp.toUpperCase()+'</span></div>'
        +'<div class="doc-info"><div class="doc-name">'+d.n+'</div><div class="doc-meta">'+d.sz+' · '+d.dt+' · '+d.or+'</div></div>'
        +'<div class="doc-dot '+(d.st==='new'?'dd-new':'dd-ok')+'"></div>'
        +'<div class="doc-acts"><button class="dab" title="Ver">'+I.eye+'</button><button class="dab" title="Baixar">'+I.dl+'</button><button class="dab" title="Excluir">'+I.trash+'</button></div>'
      +'</div>';
    }).join('');
    docsHtml='<div class="rc"><div class="rc-head"><span class="rc-hl">Documentos</span><button class="rc-add">'+I.plus+' Anexar</button></div>'+drows+'</div>';
  } else {
    docsHtml='<div class="rc"><div class="rc-head"><span class="rc-hl">Documentos</span><button class="rc-add">'+I.plus+' Anexar</button></div>'
      +'<div class="doc-empty"><div class="doc-et">Nenhum documento ainda.<br>Adicione laudos, receitas ou exames.</div></div></div>';
  }

  var hdrH=function(){
    var hEl=document.querySelector('.ph');
    var mEl=document.querySelector('.cs');
    if(hEl&&mEl)return hEl.offsetHeight+mEl.offsetHeight;
    return 130;
  };

  return phHtml+csHtml+expPanels
    +'<div style="display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 52px - 130px);overflow:hidden" id="twoCol">'
      +'<div class="col-l">'+tlHtml+insHtml+'</div>'
      +'<div class="col-r">'+retHtml+docsHtml+'</div>'
    +'</div>';
}

function renderList(){
  var rows=PX.map(function(p){
    var av='<div class="pac-av">'+ini(p.name)+'</div>';
    var st=p.status==='alert'
      ?'<span class="st-b st-al"><span class="st-dot"></span>Alerta</span>'
      :'<span class="st-b st-on"><span class="st-dot"></span>Ativa</span>';
    var rd=p.retDate?'<span class="ret-val">'+p.retDate.replace(' 2026','')+'</span>':'<span style="color:var(--t4)">—</span>';
    return '<div class="ptbl-r" onclick="openP(\''+p.id+'\')">'
      +'<div class="pac-cell">'+av+'<div><div class="pac-name">'+p.name+'</div><div class="pac-meta">'+p.age+' anos · '+p.sex+'</div></div></div>'
      +'<div class="ptbl-c">'+p.last+'</div><div>'+st+'</div><div>'+rd+'</div>'
      +'<div class="ptbl-open">Abrir →</div></div>';
  }).join('');
  return '<div class="list-wrap">'
    +'<div class="list-head"><div class="list-title">Pacientes</div><div class="list-cnt">'+PX.length+' pacientes</div>'
    +'<div class="list-search"><svg class="search-ico ico" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="#9CA3AF" stroke-width="1.7"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l2.5 2.5"/></svg>'
    +'<input class="search-in" placeholder="Buscar paciente..." oninput="fl(this.value)"/></div></div>'
    +'<div class="ptbl"><div class="ptbl-h"><div class="ptbl-hc">Paciente</div><div class="ptbl-hc">Última consulta</div><div class="ptbl-hc">Status</div><div class="ptbl-hc">Próximo retorno</div><div></div></div>'
    +rows+'</div></div>';
}

function fl(q){
  document.querySelectorAll('.ptbl-r').forEach(function(r,i){
    r.style.display=PX[i].name.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// Fix two-col height after render
function fixHeight(){
  var tc=document.getElementById('twoCol');
  if(!tc)return;
  var top=document.querySelector('.topbar');
  var ph=document.querySelector('.ph');
  var cs=document.querySelector('.cs');
  var exp=document.querySelector('.exp-panel.open');
  if(top&&ph&&cs){
    var used=top.offsetHeight+ph.offsetHeight+cs.offsetHeight+(exp?exp.offsetHeight:0);
    tc.style.height=(window.innerHeight-used)+'px';
  }
}
window.addEventListener('resize',fixHeight);
var origToggleExp=toggleExp;
toggleExp=function(key){
  origToggleExp(key);
  setTimeout(fixHeight,300);
};

render();
setTimeout(fixHeight,50);
</script>
</body>
</html>
