<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview — Paciente (ficha)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --v-green: #00E5A0;
  --v-green-2: #00C47A;
  --v-cyan: #00B4D8;
  --v-grad: linear-gradient(120deg, #00E5A0, #00B4D8);
  --v-grad-90: linear-gradient(90deg, #00E5A0, #00B4D8);
  --bg: #F4F6FA;
  --bg-2: #EEF1F6;
  --surface: #FFFFFF;
  --surface-hover: #F8FAFC;
  --ink: #0D0F14;
  --ink-2: #4B5563;
  --ink-3: #6B7280;
  --ink-4: #9CA3AF;
  --ink-5: #C4C9D4;
  --border: rgba(13,15,20,0.07);
  --border-strong: rgba(13,15,20,0.12);
  --ok: #00C47A;
  --warn: #F59E0B;
  --bad: #EF4444;
  --info: #3B82F6;
  --ok-bg: rgba(0,196,122,0.10);
  --warn-bg: rgba(245,158,11,0.10);
  --bad-bg: rgba(239,68,68,0.10);
  --info-bg: rgba(59,130,246,0.10);
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-pill: 999px;
  --sh-xs: 0 1px 2px rgba(13,15,20,0.04);
  --sh-sm: 0 1px 2px rgba(13,15,20,0.04), 0 2px 6px rgba(13,15,20,0.04);
  --sh-md: 0 2px 4px rgba(13,15,20,0.04), 0 6px 16px rgba(13,15,20,0.05);
  --sh-lg: 0 4px 8px rgba(13,15,20,0.05), 0 12px 32px rgba(13,15,20,0.08);
  --sh-green: 0 6px 20px rgba(0,229,160,0.28);
  --sh-focus: 0 0 0 3px rgba(0,229,160,0.20);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
  --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font); background: var(--bg); color: var(--ink);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

.page { padding: 28px 32px 48px; max-width: 1320px; width: 100%; margin: 0 auto; }

.btn {
  font-family: var(--font); padding: 10px 16px;
  border-radius: var(--r-md); font-weight: 700; font-size: 13px;
  border: 1px solid transparent; cursor: pointer;
  transition: all .15s var(--ease);
  display: inline-flex; align-items: center; gap: 8px;
  letter-spacing: -0.005em; white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--v-grad); color: #0A0D12; box-shadow: var(--sh-green); }
.btn-primary:hover { filter: brightness(1.06); box-shadow: 0 8px 24px rgba(0,229,160,0.38); }
.btn-ghost { background: var(--surface); color: var(--ink); border-color: var(--border); }

/* Summary back bar (used in paciente toolbar) */
.sum-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 9px; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--border);
  font-family: var(--font); font-size: 12.5px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; transition: all .15s var(--ease);
}
.sum-back:hover { border-color: var(--border-strong); color: var(--ink); background: var(--surface-hover); }
.sum-back svg { color: var(--ink-3); }
.sum-iconbtn {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border); color: var(--ink-3);
  display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all .15s var(--ease);
}
.sum-iconbtn:hover { border-color: var(--border-strong); color: var(--ink); }

/* ============================================
   PACIENTE (ficha completa)
   ============================================ */

.pac-toolbar {
  display: flex; align-items: center; gap: 14px;
  padding: 2px 0 18px; margin-bottom: 22px;
  border-bottom: 1px solid var(--border);
}
.pac-seg {
  display: inline-flex; padding: 3px; border-radius: 999px;
  background: var(--bg-2); border: 1px solid var(--border); gap: 2px;
}
.pac-seg-b {
  padding: 6px 14px; border-radius: 999px;
  background: transparent; border: none;
  font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--ink-3);
  cursor: pointer; transition: all .15s var(--ease);
}
.pac-seg-b:hover { color: var(--ink); }
.pac-seg-b.active { background: var(--ink); color: var(--surface); box-shadow: var(--sh-sm); }
.pac-toolbar-right { margin-left: auto; display: flex; gap: 8px; }

.pac-grid { display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 24px; align-items: start; }
.pac-left { display: flex; flex-direction: column; gap: 8px; position: sticky; top: 28px; }

/* Flip card 3D (adaptado de rg-publico.html) */
.rg-flip { perspective: 1200px; cursor: pointer; width: 100%; }
.rg-flipper { width: 100%; height: 200px; position: relative; transform-style: preserve-3d; transition: transform .7s cubic-bezier(0.4,0,0.2,1); }
.rg-flipper.flipped { transform: rotateY(180deg); }
.rg-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(13,15,20,0.22); border: 1px solid rgba(255,255,255,0.06); }
.rg-face.back { transform: rotateY(180deg); }
.rg-front { width: 100%; height: 100%; position: relative; overflow: hidden; background: #0D0F14; }
.rg-bg { position: absolute; inset: 0; }
.rg-content { position: relative; height: 100%; padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between; z-index: 1; color: #fff; }
.rg-top { display: flex; justify-content: space-between; align-items: flex-start; }
.rg-mark { font-size: 14px; font-weight: 900; letter-spacing: -0.04em; color: #fff; display: inline-flex; align-items: baseline; gap: 2px; }
.rg-mark .id { background: var(--v-grad); color: #0A0D12; padding: 1px 5px; border-radius: 4px; font-weight: 900; }
.rg-tag-sm { font-size: 7px; font-weight: 700; letter-spacing: 0.18em; color: rgba(255,255,255,0.38); margin-top: 3px; text-transform: uppercase; }
.rg-flip-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-family: var(--mono); font-size: 9px; font-weight: 600; cursor: pointer; }
.rg-flip-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.rg-mid { display: flex; align-items: center; gap: 10px; }
.rg-av { width: 34px; height: 34px; border-radius: 50%; background: var(--v-grad); color: #0A0D12; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.rg-name { font-size: 13px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.1; text-transform: lowercase; }
.rg-cpf { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.rg-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 9px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; }
.rg-fields .l { font-size: 7px; font-weight: 700; letter-spacing: 0.14em; color: rgba(255,255,255,0.38); text-transform: uppercase; }
.rg-fields .v { font-family: var(--mono); font-size: 9.5px; font-weight: 600; color: #fff; margin-top: 2px; }
.rg-fields .v.accent { font-family: var(--font); background: var(--v-grad-90); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
.rg-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.rg-chip { padding: 3px 8px; border-radius: 999px; font-size: 9px; font-weight: 700; }
.rg-chip.warn { background: rgba(245,158,11,0.15); color: #FBBF24; border: 1px solid rgba(245,158,11,0.3); }
.rg-chip.info { background: rgba(0,229,160,0.12); color: var(--v-green); border: 1px solid rgba(0,229,160,0.25); }

.rg-back { width: 100%; height: 100%; background: #111318; display: flex; flex-direction: column; }
.rg-strip { width: 100%; height: 26px; background: #1A1E26; margin-top: 14px; }
.rg-back-body { padding: 10px 16px 12px; display: flex; flex-direction: column; justify-content: space-between; flex: 1; color: #fff; }
.rg-back-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.rg-back-grid .l { font-size: 7px; font-weight: 700; letter-spacing: 0.14em; color: rgba(255,255,255,0.28); text-transform: uppercase; }
.rg-back-grid .v { font-family: var(--mono); font-size: 9.5px; font-weight: 600; color: rgba(255,255,255,0.85); margin-top: 2px; }
.rg-emerg { border: 1px solid rgba(255,107,107,0.3); background: rgba(255,107,107,0.06); border-radius: 7px; padding: 6px 10px; margin-top: 8px; }
.rg-emerg .l { font-size: 7px; font-weight: 700; letter-spacing: 0.16em; color: #ff6b6b; text-transform: uppercase; }
.rg-emerg .v { font-size: 9.5px; font-weight: 500; color: rgba(255,255,255,0.75); margin-top: 1px; }
.rg-back-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.rg-back-foot .mark { font-size: 10px; font-weight: 800; letter-spacing: -0.04em; color: rgba(255,255,255,0.4); }
.rg-back-foot .mark .id { background: var(--v-grad); color: #0A0D12; padding: 0 3px; border-radius: 3px; font-weight: 900; }
.rg-valid { font-size: 7.5px; color: rgba(255,255,255,0.22); letter-spacing: 0.05em; }
.pac-right { display: flex; flex-direction: column; gap: 20px; min-width: 0; }

.pac-id-card {
  background: linear-gradient(180deg, #0E1118 0%, #090B10 100%);
  border-radius: 18px; padding: 18px;
  color: #fff; position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 50px rgba(13,15,20,0.22);
}
.pac-id-card::before {
  content:''; position:absolute; inset: 0;
  background: radial-gradient(ellipse at 100% 0%, rgba(0,229,160,0.14) 0%, transparent 50%);
  pointer-events:none;
}
.pac-id-head { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.pac-id-mark { font-size: 16px; font-weight: 900; letter-spacing: -0.04em; color: #fff; display: inline-flex; align-items: baseline; gap: 2px; }
.pac-id-mark .id { background: var(--v-grad); color: #0A0D12; padding: 1px 6px; border-radius: 4px; }
.pac-id-flip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 9px; border-radius: 999px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7); font-family: var(--mono); font-size: 10px; font-weight: 600;
  cursor: pointer;
}
.pac-id-flip:hover { background: rgba(255,255,255,0.10); color: #fff; }
.pac-id-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); margin-top: 14px; position: relative; z-index: 1; }
.pac-id-avatar { margin: 18px 0 12px; position: relative; z-index: 1; }
.pac-id-avatar .ring { width: 84px; height: 84px; border-radius: 50%; background: var(--v-grad); padding: 3px; }
.pac-id-avatar .circ {
  width: 100%; height: 100%; border-radius: 50%;
  background: #0A0D12; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; letter-spacing: -0.02em;
}
.pac-id-name { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; color: #fff; position: relative; z-index: 1; text-transform: lowercase; }
.pac-id-cpf { font-family: var(--mono); font-size: 11.5px; color: rgba(255,255,255,0.5); margin-top: 3px; position: relative; z-index: 1; }
.pac-id-meta {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-top: 14px; padding: 12px; border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  position: relative; z-index: 1;
}
.pac-id-m .l { font-size: 8px; font-weight: 700; letter-spacing: 0.16em; color: rgba(255,255,255,0.4); }
.pac-id-m .v { font-family: var(--mono); font-size: 11.5px; font-weight: 600; color: #fff; margin-top: 3px; }
.pac-id-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; position: relative; z-index: 1; }
.pac-id-chip { padding: 3px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 700; }
.pac-id-chip.warn { background: rgba(245,158,11,0.15); color: #FBBF24; border: 1px solid rgba(245,158,11,0.3); }
.pac-id-chip.info { background: rgba(0,229,160,0.12); color: var(--v-green); border: 1px solid rgba(0,229,160,0.25); }

.pac-quick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pac-quick-cell {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 8px; text-align: center;
}
.pac-quick-cell .l { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: var(--ink-4); text-transform: uppercase; }
.pac-quick-cell .v { font-size: 17px; font-weight: 800; color: var(--ink); margin-top: 3px; letter-spacing: -0.02em; }

.pac-contact {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; flex-direction: column; gap: 6px;
}
.pac-contact-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
.pac-contact-row .ic { color: var(--ink-4); display: inline-flex; }
.pac-contact-row .mono { font-family: var(--mono); }

.pac-primary { width: 100%; justify-content: center; }

.pac-header { padding-bottom: 4px; }
.pac-hd-name { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); text-transform: lowercase; }
.pac-hd-name .age { font-size: 15px; font-weight: 500; color: var(--ink-3); letter-spacing: 0; text-transform: none; margin-left: 4px; }
.pac-hd-line { font-size: 12px; color: var(--ink-3); margin-top: 4px; font-weight: 500; }
.pac-hd-line b { color: var(--ink-2); font-weight: 600; }

.pac-health { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }

/* Side-card style (do 1-min summary / pre-consulta) */
.side-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; box-shadow: var(--sh-xs); }
.side-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.side-icon { width: 36px; height: 36px; background: #ECFDF5; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.side-icon svg { width: 18px; height: 18px; stroke: var(--v-green-2); fill: none; stroke-width: 1.8; }
.side-icon.alert { background: rgba(239,68,68,0.08); }
.side-icon.alert svg { stroke: var(--bad); }
.side-icon.purple { background: rgba(139,92,246,0.1); }
.side-icon.purple svg { stroke: #8B5CF6; }
.side-icon.neutral { background: var(--bg-2); }
.side-icon.neutral svg { stroke: var(--ink-3); }
.side-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 100px; font-size: 11px; font-weight: 600; background: #ECFDF5; color: #027A48; }
.side-chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--v-green-2); }
.side-chip.zero { background: var(--bg-2); color: var(--ink-3); }
.side-chip.zero::before { background: var(--ink-4); }
.side-chip.bad { background: var(--bad-bg); color: #B42318; }
.side-chip.bad::before { background: var(--bad); }
.side-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 10px; letter-spacing: -0.01em; }
.side-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.side-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 100px; font-size: 12.5px; font-weight: 600; background: rgba(0,196,122,0.06); color: #027A48; border: 1px solid rgba(0,196,122,0.22); }
.side-pill .dose { font-family: var(--mono); font-weight: 500; color: rgba(2,122,72,0.6); font-size: 11px; }
.side-pill.allergy { background: rgba(239,68,68,0.06); color: #B42318; border-color: rgba(239,68,68,0.22); }
.side-pill.allergy .dose { color: rgba(180,35,24,0.65); }
.side-pill.allergy.grave { background: rgba(239,68,68,0.14); border-color: rgba(239,68,68,0.4); font-weight: 700; }
.side-pill.cond { background: rgba(0,196,122,0.06); color: var(--v-green-2); border-color: rgba(0,196,122,0.22); }
.side-pill.surgery { background: var(--bg-2); color: var(--ink-2); border-color: var(--border); }
.side-pill.surgery .year { font-family: var(--mono); color: var(--ink-4); font-weight: 500; font-size: 11px; }
.side-placeholder { font-size: 13px; color: var(--ink-4); line-height: 1.5; }

/* Exames box (com miniatura real, scroll, busca) */
.exames-box { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; box-shadow: var(--sh-xs); display: flex; flex-direction: column; gap: 12px; }
.exames-title { font-size: 18px; font-weight: 800; background: var(--v-grad-90); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.4px; }
.exame-search { position: relative; }
.exame-search input { width: 100%; padding: 11px 14px 11px 38px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: 13px; color: var(--ink); outline: none; transition: border-color .15s, box-shadow .15s; }
.exame-search input:focus { border-color: var(--v-green); box-shadow: var(--sh-focus); }
.exame-search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--ink-4); fill: none; stroke-width: 2; }
.exames-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
.exames-list::-webkit-scrollbar { width: 6px; }
.exames-list::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 3px; }
.exames-list::-webkit-scrollbar-track { background: var(--bg-2); border-radius: 3px; }
.exame-item { display: flex; gap: 14px; background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04); padding: 10px; cursor: pointer; transition: border-color .15s, transform .12s; }
.exame-item:hover { border-color: rgba(0,229,160,0.3); transform: translateY(-1px); }
.exame-thumb {
  width: 92px; height: 112px; border-radius: 6px; overflow: hidden; flex-shrink: 0;
  background: #fff; border: 1px solid #e5e7eb; position: relative;
  background-image:
    linear-gradient(#fff,#fff),
    repeating-linear-gradient(#d1d5db 0 1px, transparent 1px 6px);
  background-size: 100% 14px, 100% 100%;
  background-position: top, 0 16px;
  background-repeat: no-repeat, repeat;
}
.exame-thumb::before { content: "LAUDO"; position: absolute; top: 4px; left: 7px; right: 7px; font-size: 7px; font-weight: 800; color: #00C47A; letter-spacing: 1px; }
.exame-thumb::after { content: ""; position: absolute; top: 16px; left: 7px; right: 7px; height: 14px; background: linear-gradient(#9ca3af 0 1px, transparent 1px 4px); background-size: 100% 4px; }
.exame-thumb.red::before { color: #EF4444; }
.exame-thumb.blue::before { color: #3B82F6; }
.exame-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
.exame-tipo { font-size: 11px; color: var(--ink-3); text-transform: capitalize; font-weight: 500; }
.exame-nome { font-size: 14.5px; font-weight: 700; color: var(--v-green-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exame-data { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.pac-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  position: relative; box-shadow: var(--sh-xs);
  transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
}
.pac-card:hover { border-color: var(--border-strong); box-shadow: var(--sh-sm); }
.pac-card::before { content:''; position: absolute; top: 0; left: 14px; right: 14px; height: 2px; border-radius: 0 0 2px 2px; }
.pac-card.accent-bad::before { background: var(--bad); }
.pac-card.accent-cyan::before { background: var(--v-cyan); }
.pac-card.accent-purple::before { background: #8B5CF6; }
.pac-card.accent-green::before { background: var(--v-green); }
.pac-card-hd { display: flex; align-items: center; gap: 10px; }
.pac-card-ic { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }

        <div class="meta">${lab} · ${date}</div>

      <span class="go">${Icon('external', 14)}</span>

}
