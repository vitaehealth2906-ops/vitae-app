function renderPacientes(){
  var q=(STATE.search.pac||'').toLowerCase();
  var f=STATE.filters.pac;
  var filtered=PACIENTES.filter(function(p){
    if(q&&p.nome.toLowerCase().indexOf(q)<0)return false;
    if(f==='recentes')return p.ultimaAtividade!=='—';
    if(f==='acomp')return p.anamneses>=2;
    if(f==='alerta')return p.status==='warn';
    if(f==='no-anam')return p.anamneses===0;
    return true;
  });
  if(!filtered.find(function(p){return p.id===STATE.selectedPaciente;}) && filtered.length){
    STATE.selectedPaciente=filtered[0].id; STATE.comparativoLigado=false;
  }

  var html='';
  html+='<div class="pct-header"><div><h1 class="pct-title">Seus <em>pacientes</em></h1><p class="pct-sub">'+PACIENTES.length+' cadastrados · '+PACIENTES.reduce(function(s,p){return s+p.anamneses;},0)+' anamneses gravadas</p></div><button class="btn btn-s" onclick="modalEmBreve(\'Exportar CSV\',\'Em desenvolvimento. Logo você poderá baixar a lista completa dos seus pacientes em CSV pra abrir em Excel ou importar em outros sistemas.\')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar CSV</button></div>';
  html+='<div style="position:relative;margin-bottom:12px"><svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="searchPacInput" type="text" placeholder="Buscar nome, CPF, telefone..." oninput="_onSearch(event,\'pac\',renderPacientes,\'searchPacInput\')" value="'+q+'" style="width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13.5px;color:var(--t1);outline:none"/></div>';
  html+='<div class="pcn-pills">'+
    '<button class="pcn-pill '+(f==='all'?'on':'')+'" onclick="setPacFilter(\'all\')">Todos <span class="pcn-ct">'+PACIENTES.length+'</span></button>'+
    '<button class="pcn-pill '+(f==='recentes'?'on':'')+'" onclick="setPacFilter(\'recentes\')">Recentes (30d) <span class="pcn-ct">'+PACIENTES.filter(function(p){return p.ultimaAtividade!=='—';}).length+'</span></button>'+
    '<button class="pcn-pill '+(f==='acomp'?'on':'')+'" onclick="setPacFilter(\'acomp\')">Em acompanhamento <span class="pcn-ct">'+PACIENTES.filter(function(p){return p.anamneses>=2;}).length+'</span></button>'+
    '<button class="pcn-pill '+(f==='alerta'?'on':'')+'" onclick="setPacFilter(\'alerta\')">Com alerta <span class="pcn-ct">'+PACIENTES.filter(function(p){return p.status==='warn';}).length+'</span></button>'+
    '<button class="pcn-pill '+(f==='no-anam'?'on':'')+'" onclick="setPacFilter(\'no-anam\')">Sem anamnese <span class="pcn-ct">'+PACIENTES.filter(function(p){return p.anamneses===0;}).length+'</span></button>'+
  '</div>';

  html+='<div class="pat-grid">';
  /* Lista esquerda */
  html+='<div class="pat-list">';
  if(!filtered.length){
    html+='<div style="padding:30px 18px;text-align:center;font-size:12px;color:var(--t3)">Nenhum paciente encontrado.</div>';
  }else{
    filtered.forEach(function(p){
      var on=(STATE.selectedPaciente===p.id?'on':'');
      var pulseCls=p.status==='warn'?'warn':(p.status==='gray'?'gray':'');
      var metaTxt;
      if(p.anamneses===0)metaTxt='Cadastrado · sem anamnese';
      else metaTxt=p.anamneses+' anamnese'+(p.anamneses>1?'s':'')+(p.status==='warn'?' · alerta':'');
      html+='<div class="pat-item '+on+'" onclick="STATE.selectedPaciente=\''+p.id+'\';STATE.comparativoLigado=false;renderPacientes()">'+
        '<div class="pat-item-av">'+p.ini+'</div>'+
        '<div class="pat-item-info"><div class="pat-item-name">'+p.nome+'</div><div class="pat-item-meta"><span class="pat-pulse '+pulseCls+'"></span>'+metaTxt+'</div></div>'+
      '</div>';
    });
  }
  html+='</div>';

  /* Detail direita */
  html+='<div class="pat-detail" id="patDetailInline"></div>';
  html+='</div>';

  $('v-pacientes').innerHTML=html;
  if(filtered.length) renderPacienteDetailInline();
}

        html+='<div class="compare-card"><div class="compare-t">⊕ IA Collab</div><div class="compare-b">'+(COMPARE_MOCK[p.id]||'—')+'</div></div>';

  setTimeout(function(){var el=document.getElementById('iaStage');if(el)el.innerHTML='Comparando vocabulário e queixas<span class="ia-dots"><span></span><span></span><span></span></span><small>Cruzando termos técnicos vs leigos</small>';},850);
  setTimeout(function(){var el=document.getElementById('iaStage');if(el)el.innerHTML='Cruzando linha do tempo e padrões<span class="ia-dots"><span></span><span></span><span></span></span><small>Detectando evolução do quadro</small>';},1700);
  setTimeout(function(){STATE.comparativoLoading=false;STATE.comparativoLigado=true;renderPacienteDetailInline();},2700);
}

/* ============================================================
   RENDER: TEMPLATES (componente real do app)
   ============================================================ */
function renderTemplates(){
  var f=STATE.filters.tpl;
  var q=(STATE.search.tpl||'').toLowerCase();
  var arr=TEMPLATES.slice();
  if(q)arr=arr.filter(function(t){return t.nome.toLowerCase().indexOf(q)>=0;});
  if(f==='usados')arr.sort(function(a,b){return b.vezesUsado-a.vezesUsado;});
  if(f==='az')arr.sort(function(a,b){return a.nome.localeCompare(b.nome);});
  if(f==='curtos')arr=arr.filter(function(t){return t.perguntas<5;});
  if(f==='longos')arr=arr.filter(function(t){return t.perguntas>=10;});
  if(f==='naousados')arr=arr.filter(function(t){return t.vezesUsado===0;});
  if(f==='audio')arr=arr.filter(function(t){return t.audio;});

  var html='';
  html+='<div class="ph"><div><h1>Templates</h1><p>Crie formulários personalizados para agilizar suas pré-consultas</p></div><div style="display:flex;gap:9px"><button class="btn btn-s" onclick="modalComoFunciona()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Como funciona?</button><button class="btn btn-p" onclick="modalCriarTemplate()" style="height:38px;padding:0 20px"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Criar template</button></div></div>';
  html+='<div style="position:relative;margin-bottom:12px"><svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="searchTplInput" type="text" placeholder="Buscar template..." oninput="_onSearch(event,\'tpl\',renderTemplates,\'searchTplInput\')" value="'+q+'" style="width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13.5px;color:var(--t1);outline:none"/></div>';
  html+='<div class="tpl-pills">'+
    ['recentes','usados','az','curtos','longos','naousados','audio'].map(function(k){
      var labels={recentes:'Recentes',usados:'Mais usados',az:'A-Z',curtos:'Curtos',longos:'Longos',naousados:'Não usados',audio:'Com áudio'};
      return '<button class="tpl-pill '+(f===k?'active':'')+'" onclick="setTplFilter(\''+k+'\')">'+labels[k]+'</button>';
    }).join('')+
  '</div>';
  if(!arr.length){
    html+='<div class="tpln-empty"><div class="tpln-empty-ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="tpln-empty-t">Nenhum template com esse filtro</div><div class="tpln-empty-d">Limpa o filtro ou cria um template novo.</div></div>';
  }else{
    html+='<div class="tpln-grid">';
    arr.forEach(function(t){
      var flags='';
      if(t.vezesUsado>0)flags+='<span class="tpln-flag popular">'+t.vezesUsado+' usos</span>';
      else flags+='<span class="tpln-flag">Não usado</span>';
      if(t.audio)flags+='<span class="tpln-flag audio">Com áudio</span>';
      html+='<div class="tpln-card" onclick="sheetTemplate(\''+t.id+'\')">'+
        '<div class="tpln-chd">'+
          '<div class="tpln-cic"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg></div>'+
          '<div class="tpln-cbody"><div class="tpln-cname">'+t.nome+(t.padrao?' · padrão':'')+'</div><div class="tpln-cmeta">'+t.perguntas+' perguntas</div></div>'+
          '<button class="tpln-cmenu" onclick="event.stopPropagation();sheetTemplate(\''+t.id+'\')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>'+
        '</div>'+
        '<div class="tpln-flags">'+flags+'</div>'+
      '</div>';
    });
    html+='</div>';
  }
  $('v-templates').innerHTML=html;
}
function setTplFilter(f){STATE.filters.tpl=f;renderTemplates();}
function sheetTemplate(id){ openActions(id); }
function openActions(id){
  var t = TEMPLATES.find(function(x){return x.id===id;});
  if (!t) return;
  var html = '';

// Conexão REAL com Google Calendar via OAuth (Fase 10)
async function conectarCalendarReal(){
  if (!window.BACKEND) { toast('Sistema indisponível, recarregue a página'); return; }
  try {
    var res = await window.BACKEND.api('/agenda/google/auth');
    var data = await res.json().catch(()=>({}));

    if (res.status === 503 && (data.code === 'GCAL_DESATIVADO' || /desativ|desabili/i.test(data.erro||''))) {
      // OAuth não configurado no servidor
      modalCalendarNaoConfigurado();
      return;
    }
    if (!res.ok) {
      modalConfirm && modalConfirm({
        titulo: 'Não foi possível conectar agora',
        msg: (data.erro || data.code || 'Erro desconhecido') + ' (status ' + res.status + ')',
        ok: 'Entendi'
      });
      return;
    }
    var url = (data.data && data.data.url) || data.url;
    if (url) {
      try { sessionStorage.setItem('vitae_calendar_oauth_pending', '1'); } catch(e){}
      window.location.href = url;
    } else {
      modalCalendarNaoConfigurado();
    }
  } catch(e) {
    toast('Sem conexão com o servidor');
  }
}

async function desconectarCalendar(){
  if (!confirm('Desconectar o Google Calendar? Os eventos vão sumir de Hoje, mas suas pré-consultas continuam funcionando.')) return;

  try {

    DR.config.googleCalendarConectado = false;

async function salvarConfigPerfil(campo, valor){

    var body = {}; body[campo] = valor;

    toast('Sem conexão');
  }
}

// Verifica status de conexão Google Calendar no boot
async function verificarStatusGoogleCalendar(){
  // PROTEÇÃO: começa sempre como NÃO conectado até o backend confirmar
  DR.config.googleCalendarConectado = false;
  DR.googleEmail = null;
  if (!window.BACKEND) return;
  try {
    var res = await window.BACKEND.api('/agenda/google/status');
    if (!res.ok) return;
    var d = await res.json().catch(()=>({}));
    var dados = d.data || d;
    // Só considera conectado se TIVER email real do Google (token sozinho não conta)
    var email = (dados && (dados.googleEmail || dados.email)) || null;
    var conectado = !!(email);
    DR.config.googleCalendarConectado = conectado;
    DR.googleEmail = email;
    // Re-renderiza a view atual se for hoje/calendar/perfil
    if (typeof renderHoje === 'function' && STATE.view === 'hoje') renderHoje();
    if (typeof renderCalendar === 'function' && STATE.view === 'calendar') renderCalendar();
    if (typeof renderPerfil === 'function' && STATE.view === 'perfil') renderPerfil();
  } catch(e){}
}

/* ============================================================
   TOAST 4 TIPOS + UNDO
   ============================================================ */
function toastT(msg,tipo,undoFn){
  tipo=tipo||'ok';
  var t=$('toast');
  var dotCls='dot dot-'+tipo;
  var html='<div class="'+dotCls+'"></div><span>'+msg+'</span>';
  if(undoFn){
    html+='<button class="toast-undo-btn" id="undoBtn">Desfazer</button><span class="toast-countdown" id="undoCnt">5s</span>';
  }
  t.innerHTML=html;
  t.className='toast toast-'+tipo;
  t.classList.add('show');
  clearTimeout(window._toastT);
  if(undoFn){
    var sec=5;
    var cntEl=document.getElementById('undoCnt');
    document.getElementById('undoBtn').onclick=function(){clearInterval(window._undoI);t.classList.remove('show');undoFn();toastT('Restaurado','info');};
    window._undoI=setInterval(function(){sec--;if(cntEl)cntEl.textContent=sec+'s';if(sec<=0){clearInterval(window._undoI);t.classList.remove('show');}},1000);
    window._toastT=setTimeout(function(){t.classList.remove('show');},5400);
  }else{
    window._toastT=setTimeout(function(){t.classList.remove('show');},2400);
  }
}

async function salvarEditField(key){
  var val=document.getElementById('editFieldInput').value;
  // Mapeia para campo do backend
  var mapBackend = {
    nome: { campo:'nome', endpoint:'/perfil/conta', method:'PATCH' },
    email: { campo:'email', endpoint:'/perfil/conta', method:'PATCH' },
    telefone: { campo:'telefoneClinica', endpoint:'/medico', method:'PUT' },
    crm: { campo:'crm', endpoint:'/medico', method:'PUT' },
    especialidade: { campo:'especialidade', endpoint:'/medico', method:'PUT' },
    clinica: { campo:'clinica', endpoint:'/medico', method:'PUT' },
    endereco: { campo:'enderecoClinica', endpoint:'/medico', method:'PUT' }
  };
  var cfg = mapBackend[key];
  if (cfg && window.BACKEND) {
    var body = {}; body[cfg.campo] = val;
    try {
      var res = await window.BACKEND.api(cfg.endpoint, { method: cfg.method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) {
        var d = await res.json().catch(function(){return {};});
        toastT('Não foi possível salvar: ' + (d.erro || 'erro ' + res.status), 'warn');
        return;
      }
    } catch(e) {
      toastT('Sem conexão. Tente novamente.', 'warn');
      return;
    }
  }
  // sucesso → atualiza mock + UI
  if(key==='nome'){DR.nome=val; try{var u=JSON.parse(localStorage.getItem('vitae_usuario')||'{}');u.nome=val;localStorage.setItem('vitae_usuario',JSON.stringify(u));}catch(e){}}
  else if(key==='crm')DR.crm=val;
  else if(key==='especialidade')DR.especialidade=val;
  else if(key==='clinica')DR.clinica=val;
  else if(key==='endereco')DR.endereco=val;
  else if(key==='telefone')DR.telefone=val;
  else if(key==='email'){DR.email=val; try{var u2=JSON.parse(localStorage.getItem('vitae_usuario')||'{}');u2.email=val;localStorage.setItem('vitae_usuario',JSON.stringify(u2));}catch(e){}}
  closeModal(); renderPerfil(); toastT('Salvo','ok');
}

/* ============================================================
   TEMPLATES — CRIAR/EDITAR COM PHONE PREVIEW (tela dedicada)
   ============================================================ */
var TPL_CREATE_STATE={step:1,nome:'',perguntas:[],audio:true,foto:false,edit:false,id:null};
function abrirCriarTemplate(){TPL_CREATE_STATE={step:1,nome:'',perguntas:[],audio:true,foto:false,edit:false,id:null};goto('templates-criar');}
/* Carrega perguntas reais de um template base ao clicar em "Geral (11)" etc */
function carregarTemplateBase(tid){
  var t = TEMPLATES.find(function(x){return x.id===tid;});
  var perguntasReais = (PERGUNTAS_TEMPLATE[tid]||[]).map(function(txt){return {texto:txt};});
  if (!perguntasReais.length) {
    perguntasReais = Array(t.perguntas).fill().map(function(_,i){return {texto:'Pergunta '+(i+1)};});
  }
  TPL_CREATE_STATE.perguntas = perguntasReais;
  if (!TPL_CREATE_STATE.nome) TPL_CREATE_STATE.nome = t.nome;
  TPL_CREATE_STATE.audio = t.audio;
  TPL_CREATE_STATE.step = 2;
  renderTemplatesCriar();
}
function abrirEditarTemplate(id){
  var t=TEMPLATES.find(function(x){return x.id===id;});
  var perguntasReais = (PERGUNTAS_TEMPLATE[id]||[]).map(function(txt){return {texto:txt};});
  if (perguntasReais.length === 0) {
    /* template criado pelo médico (sem perguntas reais armazenadas) — fallback genérico */
    perguntasReais = Array(t.perguntas).fill().map(function(_,i){return {texto:'Pergunta '+(i+1)};});
  }
  TPL_CREATE_STATE={step:1,nome:t.nome,perguntas:perguntasReais,audio:t.audio,foto:false,edit:true,id:id};
  goto('templates-criar');
}

function renderTemplatesCriar(){
  var s=TPL_CREATE_STATE;
  var html='<div class="ph"><div><h1>'+(s.edit?'Editar':'Novo')+' <em>template</em></h1><p>3 passos · perguntas, preview e confirmação</p></div><button class="btn btn-s" onclick="goto(\'templates\')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Voltar para lista</button></div>';

  /* steps */
  html+='<div class="cm-steps">'+
    '<div class="cm-step '+(s.step>=1?'active':'')+(s.step>1?' done':'')+'"><div class="cm-step-num">1</div>Perguntas</div><div class="cm-sep"></div>'+
    '<div class="cm-step '+(s.step>=2?'active':'')+(s.step>2?' done':'')+'"><div class="cm-step-num">2</div>Preview</div><div class="cm-sep"></div>'+
    '<div class="cm-step '+(s.step>=3?'active':'')+'"><div class="cm-step-num">3</div>Pronto</div>'+
  '</div>';

var TOUR_STEP=0;
var TOUR_STEPS=[
  {sel:null,t:'Bem-vindo aos Templates',d:'Aqui você cria os formulários que o paciente responde antes da consulta. Templates são reutilizáveis — crie uma vez, use sempre.'},
  {sel:'.tpln-grid',t:'Seus templates',d:'Cada card é um template. Clique pra editar, duplicar ou excluir. O ícone de "padrão" é o que vai por default em pré-consultas novas.'},

];
function iniciarTour(){if(localStorage.getItem('vitae_tour_visto'))return;TOUR_STEP=0;mostrarTour();}
function mostrarTour(){
  if(TOUR_STEP>=TOUR_STEPS.length){fecharTour();return;}
  var s=TOUR_STEPS[TOUR_STEP];
  $('spotBg').classList.add('show');
  var rect={top:'50%',left:'50%',width:0,height:0};
  if(s.sel){var el=document.querySelector(s.sel);if(el){var r=el.getBoundingClientRect();rect={top:r.top,left:r.left,width:r.width,height:r.height};}}
  var card=$('spotCard');
  card.innerHTML='<div class="spot-step">Passo '+(TOUR_STEP+1)+' de '+TOUR_STEPS.length+'</div><div class="spot-t">'+s.t+'</div><div class="spot-d">'+s.d+'</div><div class="spot-acts"><button class="btn btn-ghost btn-sm" onclick="fecharTour()">Pular</button><button class="btn btn-p btn-sm" onclick="proxTour()">'+(TOUR_STEP===TOUR_STEPS.length-1?'Pronto':'Próximo')+'</button></div><div class="spot-progress">'+TOUR_STEPS.map(function(_,i){return '<div class="dot '+(i<=TOUR_STEP?'on':'')+'"></div>';}).join('')+'</div>';
  if(s.sel&&rect.width){card.style.top=Math.min(window.innerHeight-260,rect.top+rect.height+12)+'px';card.style.left=Math.min(window.innerWidth-360,Math.max(20,rect.left))+'px';}
  else{card.style.top='50%';card.style.left='50%';card.style.transform='translate(-50%,-50%)';}
}
function proxTour(){TOUR_STEP++;mostrarTour();}
function fecharTour(){$('spotBg').classList.remove('show');try{localStorage.setItem('vitae_tour_visto','1');}catch(e){}}

   ATALHOS DE TECLADO
   ============================================================ */
var KBD_BUF='';
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Escape'){closeModal();closeSheet();fecharTour();return;}
  if(e.key==='?'){modalAtalhos();return;}
  if(e.key==='/'){e.preventDefault();var i=document.querySelector('.view:not([style*="none"]) input[type="text"], .view:not([style*="none"]) input:not([type])');if(i)i.focus();return;}
  if(e.key==='n'){if(STATE.view==='templates'){abrirCriarTemplate();}else{modalCriarPC();}return;}
  if(e.key==='g'){KBD_BUF='g';setTimeout(function(){KBD_BUF='';},900);return;}
  if(KBD_BUF==='g'){
    if(e.key==='h'){goto('hoje');KBD_BUF='';}
    else if(e.key==='p'){goto('pre-consultas');KBD_BUF='';}
    else if(e.key==='a'){goto('pacientes');KBD_BUF='';}
    else if(e.key==='t'){goto('templates');KBD_BUF='';}
    else if(e.key==='m'){goto('perfil');KBD_BUF='';}
  }
});

}

/* ============================================================
   ===== BACKEND PLUG (Fases 4-11 — substitui mocks por API) =====
   Princípio: não toca em render. Sobrescreve o conteúdo dos mocks
   após carregar do Railway. Em caso de erro, mantém o mock — app não quebra.
   ============================================================ */
window.BACKEND = (function(){
  var API = (location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.protocol==='file:')
    ? 'https://vitae-app-production.up.railway.app'
    : 'https://vitae-app-production.up.railway.app';

  function getToken(){ try{ return localStorage.getItem('vitae_token'); }catch(e){ return null; } }
  function getRefresh(){ try{ return localStorage.getItem('vitae_refresh_token'); }catch(e){ return null; } }
  function setTokens(t, r){
    if (t) localStorage.setItem('vitae_token', t);
    if (r) localStorage.setItem('vitae_refresh_token', r);
  }
  function logoutClient(){
    ['vitae_token','vitae_refresh_token','vitae_usuario'].forEach(function(k){ try{ localStorage.removeItem(k);}catch(e){} });
    window.location.replace('01-login.html');
  }

  async function tryRefresh(){
    var rt = getRefresh();
    if (!rt) return false;
    try {
      var res = await fetch(API + '/auth/refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ refreshToken: rt }) });
      if (!res.ok) return false;
      var d = await res.json();
      setTokens(d.token, d.refreshToken);
      return true;
    } catch(e) { return false; }
  }

  async function api(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization':'Bearer '+(getToken()||'') }, opts.headers||{});
    var res = await fetch(API + path, opts);
    if (res.status === 401) {
      var ok = await tryRefresh();
      if (ok) {
        opts.headers['Authorization'] = 'Bearer ' + getToken();
        res = await fetch(API + path, opts);
      } else {
        logoutClient();
        throw new Error('Sessão expirada');
      }
    }
    return res;
  }

  // ---------- LOADERS (cada um sobrescreve seu mock) ----------

  async function loadDR(){
    try {
      var res = await api('/medico');
      if (!res.ok) return false;
      var d = await res.json();
      var m = d.medico || {};
      var u = m.usuario || {};
      // sobrescreve DR mantendo a estrutura esperada pelo render
      if (typeof DR !== 'object') return false;
      if (u.nome) DR.nome = u.nome;
      if (u.email) DR.email = u.email;
      if (m.crm) DR.crm = m.crm + (m.ufCrm ? '-' + m.ufCrm : '');
      if (m.especialidade) DR.especialidade = m.especialidade;
      if (m.clinica) DR.clinica = m.clinica;
      if (m.enderecoClinica) DR.endereco = m.enderecoClinica;
      if (m.telefoneClinica) DR.telefone = m.telefoneClinica;
      if (m.valorConsulta != null) DR.valorConsulta = Number(m.valorConsulta);
      // marcadores extras vindos do quiz desktop (rascunho local)
      try {
        var rasc = JSON.parse(localStorage.getItem('vitae_medico_rascunho')||'{}');
        if (rasc.bio) DR.bio = rasc.bio;
        if (rasc.subEspecialidades) DR.subEspecialidades = rasc.subEspecialidades;
        if (rasc.tempoMedioConsulta) DR.tempoMedio = rasc.tempoMedioConsulta;
        if (rasc.diasAtendimento) DR.dias = rasc.diasAtendimento;
        if (rasc.turnosAtendimento) DR.turnos = rasc.turnosAtendimento;
        if (rasc.tiposAtendimento) DR.tipos = rasc.tiposAtendimento;
        if (rasc.convenios) DR.convenios = rasc.convenios;
        if (rasc.mensagemWhatsappPadrao) DR.msgWpp = rasc.mensagemWhatsappPadrao;
        if (rasc.fotoBase64) DR.foto = rasc.fotoBase64;
        if (rasc.modo) DR.modo = rasc.modo;
      } catch(e){}
      return true;
    } catch(e) { return false; }
  }

  async function loadPACIENTES(){
    try {
      var res = await api('/medico/pacientes');
      if (!res.ok) return false;
      var d = await res.json();
      var lista = d.pacientes || [];
      if (!Array.isArray(lista) || !lista.length) return false; // mantém mock
      // adapta forma p/ o render existente
      var convertidos = lista.map(function(p, i){
        var nome = p.pacienteNome || 'Paciente';
        var ini = nome.split(' ').filter(Boolean).slice(0,2).map(function(s){return s[0];}).join('').toUpperCase();
        var sexoCode = p.genero === 'FEMININO' || p.genero === 'feminino' || p.genero === 'F' ? 'F' : (p.genero === 'MASCULINO' || p.genero === 'masculino' || p.genero === 'M' ? 'M' : 'O');
        return {
          id: p.pacienteId || ('p'+(i+1)),
          nome: nome,
          nomeVitaId: p.nomeVitaId || nome,
          ini: ini || nome.slice(0,2).toUpperCase(),
          fotoUrl: p.pacienteFotoUrl || null,
          idade: p.dataNascimento ? calcIdadePac(p.dataNascimento) : '—',
          dataNascimento: p.dataNascimento || null,
          sangue: p.tipoSanguineo || '—',
          tipoSanguineo: p.tipoSanguineo || null,
          sexo: sexoCode,
          telefone: p.pacienteTel || '—',
          email: p.pacienteEmail || '',
          anamneses: p.preConsultasCount || 0,
          tem_vinculo: !!p.temVinculo,
          ultimaAt: p.ultimaAtividade || null,
          pcsCount: p.preConsultasCount || 0,
          pcsRespondidas: p.preConsultasRespondidas || 0,
          pcsPendentes: p.preConsultasPendentes || 0,
          alergiasGraves: p.alergiasGraves || [],
          medicamentosAtivos: p.medicamentosAtivos || []
        };
      });
      if (typeof PACIENTES !== 'undefined') PACIENTES.length = 0;
      Array.prototype.push.apply(PACIENTES, convertidos);
      return true;
    } catch(e) { return false; }
  }

  function calcIdadePac(dt){
    if (!dt) return null;
    var d = new Date(dt); var h = new Date();
    var a = h.getFullYear() - d.getFullYear();
    var m = h.getMonth() - d.getMonth();
    if (m<0 || (m===0 && h.getDate()<d.getDate())) a--;
    return a;
  }

  async function loadPCS(){
    try {
      var res = await api('/pre-consulta');
      if (!res.ok) return false;
      var d = await res.json();
      var lista = d.preConsultas || [];
      if (!Array.isArray(lista) || !lista.length) return false; // mantém mock
      // PCS é um Object map por id no preview
      var novo = {};
      lista.forEach(function(p, i){
        var id = p.id || ('pc-'+(i+1));
        var status = String(p.status||'').toLowerCase();
        var statusUI = 'aguardando';
        if (status === 'respondida') statusUI = 'respondida';
        else if (status === 'expirada') statusUI = 'expirada';
        else if (status === 'aberto'||status==='aberta'||status==='pendente') statusUI = 'aguardando';
        var nome = p.pacienteNome || (p.paciente && p.paciente.nome) || 'Paciente';

        var sj = p.summaryJson || {};
        var anam = sj.anamneseEstruturada || null;
        var dataResp = p.respondidaEm ? new Date(p.respondidaEm) : null;

        novo[id] = {
          id: id,
          pacienteId: (p.paciente && p.paciente.id) || p.pacienteId || null,
          pacienteNome: nome,
          paciente: nome,
          ini: iniPC,
          fotoUrl: (p.paciente && p.paciente.fotoUrl) || p.pacienteFotoUrl || null,
          template: (p.template && p.template.nome) || p.templateNome || 'Geral',
          templateNome: (p.template && p.template.nome) || p.templateNome || 'Geral',
          status: statusUI,
          criada: p.criadoEm,
          criadaEm: p.criadoEm,
          recordedAt: recordedAt,
          respondidaEm: p.respondidaEm,
          summaryJson: sj,
          descricao: sj.descricaoBreve || sj.summaryTexto || null,
          summaryTexto: sj.summaryTexto || null,
          textoVoz: sj.textoVoz || null,

          queixaSnippet: sj.queixaPrincipal ? String(sj.queixaPrincipal).slice(0,80) : (statusUI === 'respondida' ? 'Resposta sem queixa estruturada' : 'Aguardando paciente responder'),
          anamnese: anam,
          padroesObservados: sj.padroesObservados_v2 || sj.identificaPadroes || [],
          alertas: sj.alertas || [],

        };
      });

      Object.keys(PCS).forEach(function(k){ delete PCS[k]; });

      var alertas = Object.keys(novo).filter(function(id){ return novo[id].alertaProsodico; });

        ALERTAS_PROSODICOS.length = 0;

  async function loadTEMPLATES(){

        return {

          atualizadoEm: t.atualizadoEm || t.criadoEm
        };
      });

  async function loadAGENDA(){
    try {
      var hoje = new Date(); var ini = new Date(hoje); ini.setHours(0,0,0,0);
      var fim = new Date(hoje); fim.setHours(23,59,59,999);
      var res = await api('/agenda/slots?inicio='+encodeURIComponent(ini.toISOString())+'&fim='+encodeURIComponent(fim.toISOString()));
      if (!res.ok) return false;
      var d = await res.json();
      var slots = (d && (d.data||d.slots)) || [];
      if (!Array.isArray(slots) || !slots.length) return false;
      var conv = slots.filter(function(s){ return !s.cancelado; }).sort(function(a,b){
        return new Date(a.inicio) - new Date(b.inicio);
      }).map(function(s){
        var nome = s.pacienteNome || (s.paciente && s.paciente.nome) || s.pacienteNomeLivre || (String(s.tipo||'').toLowerCase().includes('bloqueio') ? 'Bloqueio' : '—');
        return {
          hora: fmtH(s.inicio),
          paciente: nome,
          motivo: s.motivo || s.observacoes || '',
          status: String(s.tipo||'').toLowerCase().includes('retorno') ? 'retorno' : 'consulta'
        };
      });
      if (typeof AGENDA_HOJE !== 'undefined') AGENDA_HOJE.length = 0;
      Array.prototype.push.apply(AGENDA_HOJE, conv);
      return true;
    } catch(e) { return false; }
  }
  function fmtH(iso){
    if (!iso) return '';
    var d = new Date(iso);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  function formatarRecordedAt(d){
    var h = new Date();
    var diff = (h - d) / 1000;
    if (diff < 60) return 'agora há pouco';
    if (diff < 3600) return 'há ' + Math.floor(diff/60) + ' min';
    if (diff < 86400) return 'há ' + Math.floor(diff/3600) + 'h';
    if (diff < 86400*7) return 'há ' + Math.floor(diff/86400) + ' dias';
    return d.toLocaleDateString('pt-BR');
  }
  window.formatarRecordedAt = formatarRecordedAt;

  async function boot(){

    try {
      var params = new URLSearchParams(location.search);
      var pending = sessionStorage.getItem('vitae_calendar_oauth_pending');
      if (params.get('google') === 'ok' || params.get('calendar') === 'connected' || pending) {
        sessionStorage.removeItem('vitae_calendar_oauth_pending');
        if (typeof window.verificarStatusGoogleCalendar === 'function') {
          await window.verificarStatusGoogleCalendar();
        }
        if (typeof window.toast === 'function') window.toast('Google Calendar conectado');
        // Limpa query string sem recarregar
        if (params.get('google') || params.get('calendar')) {
          history.replaceState({}, '', location.pathname + location.hash);
        }
      }
    } catch(e){}

    // Em paralelo: tudo o que a sidebar precisa pra abrir bem.
    var resultados = await Promise.allSettled([loadDR(), loadPACIENTES(), loadPCS(), loadTEMPLATES(), loadAGENDA()]);
    // Atualiza sidebar com nome/CRM real
    if (typeof window.atualizarSidebarUser === 'function') window.atualizarSidebarUser();
    // Verifica status Calendar em paralelo (não bloqueia)
    if (typeof window.verificarStatusGoogleCalendar === 'function') {
      window.verificarStatusGoogleCalendar();
    }
    var falhas = resultados.filter(function(r){ return r.status==='rejected' || r.value === false; }).length;
    // Tenta reaplicar a view ativa pra refletir dados reais
    var view = (STATE && STATE.view) || 'hoje';
    try {
      if (view === 'hoje') renderHoje();
      else if (view === 'pre-consultas') renderPCsList && renderPCsList();
      else if (view === 'pacientes') renderPacientes && renderPacientes();
      else if (view === 'templates') renderTemplates && renderTemplates();
      else if (view === 'perfil') renderPerfil && renderPerfil();
    } catch(e){}
    return { falhas: falhas, total: resultados.length };
  }

  function downloadFromBlob(blob, nome) {

// --- Templates: excluir ---
window.excluirTemplate = async function(id){
  var t = TEMPLATES.find(function(x){return x.id===id;});
  if (!t) return;
  if (!confirm('Excluir o template "' + (t.nome||'Sem nome') + '"?')) return;
  var ok = await window.BACKEND.excluirTemplate(id);
  if (!ok) { toast('Não foi possível excluir agora. Tente de novo.'); return; }
  TEMPLATES = TEMPLATES.filter(function(x){return x.id!==id;});
  try { renderTemplates(); } catch(e){}
  toast('Template excluído');
};

// --- Templates: duplicar (cria via API) ---
window.duplicarTemplate = async function(id){
  var t = TEMPLATES.find(function(x){return x.id===id;});
  if (!t) return;
  var perg = t.perguntasArr || [];
  if (!perg.length && t.perguntas) {
    // fallback: gera perguntas placeholder (template antigo sem array completo)
    perg = Array(t.perguntas).fill().map(function(_,i){ return 'Pergunta ' + (i+1); });
  }
  var payload = {
    nome: (t.nome || 'Template') + ' (cópia)',
    perguntas: perg.map(function(p, i){ return { id:'q'+(i+1), texto: p, tipo:'text' }; }),
    permitirAudio: t.permitirAudio !== false
  };
  var novo = await window.BACKEND.criarTemplate(payload);
  if (!novo) { toast('Não foi possível duplicar.'); return; }
  TEMPLATES.push({
    id: novo.id, nome: novo.nome, perguntas: (novo.perguntas||[]).length,
    perguntasArr: (novo.perguntas||[]).map(function(p){ return typeof p==='string'?p:(p.texto||''); }),
    permitirAudio: novo.permitirAudio !== false, ativo: true, vezesUsado: 0
  });
  try { renderTemplates(); } catch(e){}
  toast('Template duplicado');
};

// --- Templates: salvar (modal antigo) ---
var _origSalvarTemplate = window.salvarTemplate;
window.salvarTemplate = async function(){
  var d = STATE._tplDraft;
  if (!d) return _origSalvarTemplate && _origSalvarTemplate.apply(this, arguments);
  var perg = (d.perguntas||[]).map(function(p, i){ return { id:'q'+(i+1), texto:(p.texto||'').trim(), tipo:'text' }; }).filter(function(p){return p.texto;});
  if (perg.length < 4) { toast('Adicione pelo menos 4 perguntas.'); return; }
  var payload = { nome: d.nome || 'Sem nome', perguntas: perg, permitirAudio: !!d.audio };
  if (d.edit && d.id) {
    var ok = await window.BACKEND.atualizarTemplate(d.id, payload);
    if (!ok) { toast('Não foi possível salvar agora.'); return; }
    var t = TEMPLATES.find(function(x){return x.id===d.id;});
    if (t) { t.nome = d.nome; t.perguntas = perg.length; t.permitirAudio = !!d.audio; t.perguntasArr = perg.map(function(p){return p.texto;}); }
    toast('Template atualizado');
  } else {
    var novo = await window.BACKEND.criarTemplate(payload);
    if (!novo) { toast('Não foi possível criar agora.'); return; }
    TEMPLATES.push({
      id: novo.id, nome: novo.nome, perguntas: perg.length, perguntasArr: perg.map(function(p){return p.texto;}),
      permitirAudio: novo.permitirAudio !== false, ativo: true, vezesUsado: 0
    });
    toast('Template criado');
  }
  closeModal();
  try { renderTemplates(); } catch(e){}
};

      audioUrl: det.audioUrl || null,

  if (!s.nome) { toast('Informe o nome do paciente.'); return; }
  var payload = {
    pacienteNome: s.nome,
    pacienteTel: s.phone || undefined,
    pacienteEmail: s.email || undefined,
    templateId: s.templateId || undefined
  };
  toast('Gerando link da pré-consulta…');
  var resp = await window.BACKEND.criarPC(payload);
  if (!resp || !resp.preConsulta) { toast('Não foi possível criar agora. Tente novamente.'); return; }
  var pc = resp.preConsulta;
  var id = pc.id;
  var iniNome = (s.nome||'').split(' ').filter(Boolean).slice(0,2).map(function(x){return x[0];}).join('').toUpperCase();
  PCS[id] = {
    id: id, pacienteId: pc.pacienteId || null, pacienteNome: s.nome, paciente: s.nome, ini: iniNome,
    template: ((TEMPLATES.find(function(t){return t.id===s.templateId;})||{}).nome) || 'Geral',
    templateNome: ((TEMPLATES.find(function(t){return t.id===s.templateId;})||{}).nome) || 'Geral',
    status: 'aguardando', cobertura: 'sem', criada: pc.criadoEm, criadaEm: pc.criadoEm,
    recordedAt: 'agora há pouco', queixaSnippet: 'Aguardando paciente responder',
    summaryJson: null, descricao: null, anamnese: null
  };
  // mostra modal de sucesso com o link (preview já tem essa lógica — chama original)
  STATE._linkCriado = resp.link || resp.whatsappLink;
  STATE._criadoId = id;
  if (_origCriarPCFinal) _origCriarPCFinal.apply(this, arguments);
  else { toast('Pré-consulta criada. Link: ' + (resp.link||'')); try { renderPCs(); }catch(e){} }
};

// --- IA Collab: pluga no rota real (Fase 9) ---
var _origIniciarComparativo = window.iniciarComparativo;
window.iniciarComparativo = async function(){
  // mantém animação visual do preview
  STATE.comparativoLoading = true; STATE.comparativoLigado = false;
  if (typeof renderPacienteDetailInline === 'function') renderPacienteDetailInline();
  setTimeout(function(){var el=document.getElementById('iaStage');if(el)el.innerHTML='Comparando vocabulário e queixas<span class="ia-dots"><span></span><span></span><span></span></span><small>Cruzando termos técnicos vs leigos</small>';},850);
  setTimeout(function(){var el=document.getElementById('iaStage');if(el)el.innerHTML='Cruzando linha do tempo e padrões<span class="ia-dots"><span></span><span></span><span></span></span><small>Detectando evolução do quadro</small>';},1700);

  // chama backend real em paralelo
  var pid = STATE && STATE.selectedPaciente;
  // pega PCs reais do paciente em PCS map
  var pcsDoPaciente = Object.values(PCS||{}).filter(function(p){ return p.pacienteId === pid; });
  if (pcsDoPaciente.length < 2) {
    setTimeout(function(){
      STATE.comparativoLoading = false; STATE.comparativoLigado = true;
      if (typeof COMPARE_MOCK !== 'undefined' && pid) COMPARE_MOCK[pid] = 'Mínimo 2 pré-consultas do mesmo paciente para comparar.';
      if (typeof renderPacienteDetailInline === 'function') renderPacienteDetailInline();
    }, 2700);
    return;
  }
  var ids = pcsDoPaciente.map(function(p){return p.id;});
  try {
    var resultado = await window.BACKEND.gerarIaCollab(ids[0], ids.slice(1));
    setTimeout(function(){
      STATE.comparativoLoading = false; STATE.comparativoLigado = true;
      if (typeof COMPARE_MOCK !== 'undefined' && pid) {
        COMPARE_MOCK[pid] = resultado && resultado.narrativa
          ? resultado.narrativa + (resultado.alertas && resultado.alertas.length ? '\n\n⚠️ ' + resultado.alertas.join(' · ') : '')
          : (resultado && resultado.erro) || 'Não foi possível gerar a análise comparativa.';
      }
      if (typeof renderPacienteDetailInline === 'function') renderPacienteDetailInline();
    }, 2700);
  } catch(e) {
    setTimeout(function(){
      STATE.comparativoLoading = false; STATE.comparativoLigado = true;
      if (typeof COMPARE_MOCK !== 'undefined' && pid) COMPARE_MOCK[pid] = 'Sem conexão com o servidor.';
      if (typeof renderPacienteDetailInline === 'function') renderPacienteDetailInline();
    }, 2700);
  }
};

// --- Disparar lembretes em massa (Fase 10) ---
var _origDispararSubmit = window.dispararSubmit || window.confirmarDisparar;
window.confirmarDisparar = async function(){
  var s = (typeof DISPARAR_STATE !== 'undefined') ? DISPARAR_STATE : null;
  if (!s) return _origDispararSubmit && _origDispararSubmit.apply(this, arguments);
  if (!s.selecionados || !s.selecionados.length) { toast('Selecione pelo menos 1 paciente.'); return; }
  // Monta destinatários a partir de PACIENTES reais
  var destinatarios = s.selecionados.map(function(pid){
    var p = (PACIENTES||[]).find(function(x){return x.id===pid;}) || {};
    return {
      pacienteId: pid,
      telefone: p.telefone,
      nome: p.nome,
      data: new Date().toISOString(),
      link: 'https://vitae-app.vercel.app/pre-consulta.html?paciente=' + encodeURIComponent(pid)
    };
  });
  var payload = {
    destinatarios: destinatarios,
    mensagem: s.mensagem || null,
    agendadoPara: (s.quando === 'depois' && s.dataAgendada) ? new Date(s.dataAgendada).toISOString() : null
  };
  toast('Disparando lembretes…');
  var resp = await window.BACKEND.dispararLembretes(payload);
  if (!resp.ok) { toast('Erro: ' + (resp.erro || 'falha no disparo')); return; }
  toast(resp.enviados + ' lembrete(s) enviado(s)' + (resp.modo==='simulacao'?' (modo simulação)':''));
  if (typeof goto === 'function') goto('hoje');
};

// --- LGPD / iClinic / Excluir conta (Fase 11) ---
window.exportarDadosLGPD = async function(formato){
  toast('Preparando export…');
  var ok = await window.BACKEND.exportarLGPD(formato || 'json');
  toast(ok ? 'Download iniciado' : 'Falha no export. Tente em alguns segundos.');
};
window.exportarParaIClinic = async function(periodoDias){
  toast('Gerando arquivo iClinic…');
  var ok = await window.BACKEND.exportarIClinic(periodoDias || 90);
  toast(ok ? 'Download iniciado' : 'Falha no export.');
};
window.confirmarExclusaoConta = async function(){
  var c = prompt('Para confirmar a exclusão da sua conta, digite EXCLUIR (em maiúsculas):');
  if (c !== 'EXCLUIR') { toast('Cancelado.'); return; }
  if (!confirm('Tem certeza? Esta ação inicia janela de 30 dias para arrependimento.')) return;
  var resp = await window.BACKEND.excluirContaSoft();
  if (resp && resp.ok) {
    alert('Conta marcada para exclusão. Você tem 30 dias para reativar fazendo login novamente.');
    if (typeof doLogout === 'function') doLogout();
  } else {
    toast(resp && resp.erro || 'Não foi possível excluir agora.');
  }
};

// --- Templates: salvar (tela dedicada) ---
var _origSalvarTemplateNovo = window.salvarTemplateNovo;
window.salvarTemplateNovo = async function(){
  var s = TPL_CREATE_STATE;
  if (!s) return _origSalvarTemplateNovo && _origSalvarTemplateNovo.apply(this, arguments);
  var perg = (s.perguntas||[]).map(function(p, i){ return { id:'q'+(i+1), texto:(p.texto||'').trim(), tipo:'text' }; }).filter(function(p){return p.texto;});
  if (perg.length < 4) { toast('Adicione pelo menos 4 perguntas.'); return; }
  var payload = { nome: s.nome || 'Sem nome', perguntas: perg, permitirAudio: !!s.audio };
  if (s.edit && s.id) {
    var ok = await window.BACKEND.atualizarTemplate(s.id, payload);
    if (!ok) { toast('Não foi possível salvar agora.'); return; }
    var t = TEMPLATES.find(function(x){return x.id===s.id;});
    if (t) { t.nome = s.nome; t.perguntas = perg.length; t.permitirAudio = !!s.audio; t.perguntasArr = perg.map(function(p){return p.texto;}); }
  } else {
    var novo = await window.BACKEND.criarTemplate(payload);
    if (!novo) { toast('Não foi possível criar agora.'); return; }
    TEMPLATES.push({
      id: novo.id, nome: novo.nome, perguntas: perg.length, perguntasArr: perg.map(function(p){return p.texto;}),
      permitirAudio: novo.permitirAudio !== false, ativo: true, vezesUsado: 0
    });
  }
  TPL_CREATE_STATE.step = 3;
  try { renderTemplatesCriar(); } catch(e){}
};

</script>
