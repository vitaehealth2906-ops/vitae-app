// ============================================================
// CALENDAR — 5 telas (Sessão 21 revamp)
// State: STATE.calendar.step (1, 2, 2.5, 3 — onboarding) ou null (estado padrão)
// Estados especiais: 'em-breve' (OAuth desabilitado), 'expirado' (token revogado)
// ============================================================
if (!STATE.calendar) STATE.calendar = { step: null, modoSilencio: null, oauthDisponivel: null };

function abrirCalendar(stepInicial){
  // Se já conectado, vai pra tela 4 direto. Se não, começa no passo 1.
  STATE.calendar.step = stepInicial || (DR.config.googleCalendarConectado ? null : 1);
  goto('calendar');
}

// Heurística pra pré-config por especialidade
function preConfigCalendarPorEspecialidade(){
  var esp = (DR.especialidade || '').toLowerCase();
  var palavras = ['consulta', 'paciente', 'retorno', 'atendimento'];
  var horario = '8h-18h-segsex';
  if (/cardio/.test(esp)) palavras = palavras.concat(['ECG','MAPA','holter','arritmia']);
  else if (/derma/.test(esp)) palavras = palavras.concat(['dermato','pele','procedimento']);
  else if (/psiqui|psico/.test(esp)) palavras = ['sessão','consulta','retorno','crise'];
  else if (/pediat/.test(esp)) palavras = palavras.concat(['vacina','puericultura','criança']);
  else if (/ortope/.test(esp)) palavras = palavras.concat(['ortop','fisioterapia']);
  else if (/gineco|obstet/.test(esp)) palavras = palavras.concat(['preventivo','gestante','prenatal']);
  return { palavras: palavras, horario: horario };
}

function renderCalendar(){
  var conectado = DR.config.googleCalendarConectado;
  var emEspera = STATE.calendar.oauthDisponivel === false; // servidor sem OAuth configurado
  var step = STATE.calendar.step;
  var html = '';

  // Botão voltar comum:
  // - se está em sub-step (historico/selecionar-agendas) volta pra home Calendar
  // - se está na home Calendar volta pra view de origem (perfil normalmente)
  var voltarHandler;
  if (step === 'historico' || step === 'selecionar-agendas') {
    voltarHandler = "STATE.calendar.step=null;renderCalendar()";
  } else {
    var origem = STATE._fromCalendar || 'perfil';
    voltarHandler = "goto('"+origem+"')";
  }
  html += '<button class="pt-detail-back" onclick="'+voltarHandler+'"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Voltar</button>';

  // ===== ESTADO: EM BREVE (OAuth desabilitado no servidor) =====
  if (emEspera && !conectado) {
    html += renderCalendarEmBreve();
    $('v-calendar').innerHTML = html;
    return;
  }

  // ===== TELA NOVA: SELECIONAR AGENDAS (após OAuth + antes do home) =====
  if (conectado && step === 'selecionar-agendas') {
    html += renderCalendarSelecionarAgendas();
    $('v-calendar').innerHTML = html;
    return;
  }

  // ===== TELA NOVA: HISTÓRICO PCs =====
  if (conectado && step === 'historico') {
    html += renderCalendarHistorico();
    $('v-calendar').innerHTML = html;
    return;
  }

  // ===== ESTADO CONECTADO (Tela 4 home reformulada) =====
  if (conectado) {
    html += renderCalendarConectado();
    $('v-calendar').innerHTML = html;
    // Ao mostrar home, dispara fetch dos dados frescos em paralelo
    setTimeout(function(){ fetchCalendarHomeData(); }, 50);
    return;
  }

  // ===== ONBOARDING (Tela 1, 2, 2.5, 3) =====
  if (step === 2) html += renderCalendarTela2();
  else if (step === 2.5) html += renderCalendarTela25();
  else if (step === 3) html += renderCalendarTela3();
  else html += renderCalendarTela1(); // default = 1

  $('v-calendar').innerHTML = html;
}

// ---------- BUSCA dados frescos do backend pra home ----------
// Estratégia balanceada: dados do banco SEMPRE vem rapido (UI nao trava).
// Sync com Google so dispara se nunca sync ou se faz +60s da ultima.
// Evita lentidao desnecessaria — medico abre/fecha Calendar varias vezes.
async function fetchCalendarHomeData(forceSync){
  if (!window.BACKEND) return;
  // Sempre busca status+historico do banco (rapido)
  buscarStatusEHistorico();
  // Decide se vale forçar sync com Google (caro)
  try {
    var st = (STATE.calendar && STATE.calendar.statusReal) || {};
    var ultSync = st.sincronizadoEm ? new Date(st.sincronizadoEm).getTime() : 0;
    var idade = Date.now() - ultSync;
    var precisaSync = forceSync === true || !ultSync || idade > 60000;
    if (precisaSync) {
      window.BACKEND.api('/agenda/google/sync-now', { method: 'POST' })
        .then(function(r){ return r.json().catch(function(){ return {}; }); })
        .then(function(){ buscarStatusEHistorico(); })
        .catch(function(){ /* offline — banner cuida */ });
    }
  } catch(e) { /* silencioso */ }
}

async function buscarStatusEHistorico(){
  try {
    var statusRes = await window.BACKEND.api('/agenda/google/status');
    var statusData = await statusRes.json().catch(function(){ return {}; });
    var st = (statusData && statusData.data) || {};
    if (!STATE.calendar) STATE.calendar = {};
    STATE.calendar.statusReal = st;

    var histRes = await window.BACKEND.api('/agenda/pcs-historico?limit=10');
    var histData = await histRes.json().catch(function(){ return {}; });
    STATE.calendar.historicoData = (histData && histData.data) || { proximos: [], historico: [] };

    // Re-renderiza apenas se ainda estiver na tela
    if (STATE.view === 'calendar' && (DR.config.googleCalendarConectado) && (STATE.calendar.step !== 'historico') && (STATE.calendar.step !== 'selecionar-agendas')) {
      renderCalendar();
    }
  } catch(e) { /* silencioso */ }
}

// ---------- TELA SELECIONAR AGENDAS ----------
function renderCalendarSelecionarAgendas(){
  var lista = (STATE.calendar && STATE.calendar.calendarsList) || null;

  var html = '<div class="ph"><div><h1>Suas <em>agendas</em></h1><p>Encontramos as agendas da sua conta Google. Marque quais o VITAE deve verificar para detectar consultas.</p></div></div>';

  if (lista === null) {
    html += '<div class="cal-loading"><div class="spinner"></div><p>Buscando suas agendas no Google...</p></div>';
    setTimeout(carregarCalendarsLista, 50);
    return html;
  }

  if (lista === 'erro') {
    html += '<div class="cal-empty-feedback">Não conseguimos buscar suas agendas agora. <button class="btn btn-ghost btn-sm" onclick="STATE.calendar.calendarsList=null;renderCalendar()">Tentar de novo</button></div>';
    return html;
  }

  if (lista.length === 0) {
    html += '<div class="cal-empty-feedback">Sua conta Google não tem nenhuma agenda. Crie uma em <a href="https://calendar.google.com" target="_blank" rel="noopener">calendar.google.com</a> e tente novamente.</div>';
    return html;
  }

  // Agrupa por categoria
  var grupos = {
    principal: { titulo: 'Agenda principal', items: [] },
    criada_por_voce: { titulo: 'Suas agendas', items: [] },
    compartilhada: { titulo: 'Compartilhadas com você', items: [] },
    google_automatica: { titulo: 'Agendas automáticas do Google', items: [] },
    outras: { titulo: 'Outras', items: [] },
  };
  lista.forEach(function(c){
    if (grupos[c.categoria]) grupos[c.categoria].items.push(c);
    else grupos.outras.items.push(c);
  });

  // Selecionados em estado
  if (!STATE.calendar.selecaoTemp) {
    var statusIds = (STATE.calendar.statusReal && STATE.calendar.statusReal.calendarIds) || [];
    if (statusIds.length > 0) {
      STATE.calendar.selecaoTemp = statusIds.slice();
    } else {
      // Defaults inteligentes
      STATE.calendar.selecaoTemp = lista.filter(function(c){ return c.recomendado; }).map(function(c){ return c.id; });
    }
  }

  Object.keys(grupos).forEach(function(k){
    var grp = grupos[k];
    if (grp.items.length === 0) return;
    html += '<div class="cal-section-h">'+escapeHtml(grp.titulo)+'</div>';
    html += '<div class="cal-cals-list">';
    grp.items.forEach(function(c){
      var marcado = STATE.calendar.selecaoTemp.indexOf(c.id) >= 0;
      var color = c.backgroundColor || '#4285F4';
      html += '<label class="cal-cal-item'+(marcado?' on':'')+'">';
      html += '<span class="cal-cal-dot" style="background:'+escapeHtml(color)+'"></span>';
      html += '<span class="cal-cal-info"><span class="cal-cal-name">'+escapeHtml(c.summary||'(sem nome)')+'</span><span class="cal-cal-meta">'+(c.eventCount||0)+' evento'+(c.eventCount===1?'':'s')+' nos próximos 90 dias</span></span>';
      html += '<input type="checkbox" '+(marcado?'checked':'')+' onchange="toggleCalendarSelecao(\''+escapeHtml(c.id)+'\', this.checked)"/>';
      html += '</label>';
    });
    html += '</div>';
  });

  // Resumo + ação
  var totalEventos = 0;
  STATE.calendar.selecaoTemp.forEach(function(id){
    var c = lista.find(function(x){ return x.id === id; });
    if (c) totalEventos += c.eventCount || 0;
  });
  html += '<div class="cal-resumo">↓ '+totalEventos+' evento'+(totalEventos===1?'':'s')+' detectado'+(totalEventos===1?'':'s')+' nos próximos 90 dias</div>';
  html += '<div class="cal-step-actions"><button class="btn btn-ghost btn-sm" onclick="STATE.calendar.step=null;STATE.calendar.selecaoTemp=null;renderCalendar()">Voltar</button><button class="btn btn-p btn-lg" onclick="salvarCalendarSelecao()">Salvar e continuar</button></div>';

  return html;
}

// ---------- HELPER: pill button reutilizavel ----------
function pillBtn(val, label, atual){
  var on = (val === atual);
  return '<button class="pcn-pill'+(on?' on':'')+'" onclick="setQuandoDispararPc(\''+val+'\')">'+escapeHtml(label)+'</button>';
}

// ---------- HELPER: tempo relativo ----------
function formatarTempoRelativo(iso){
  if (!iso) return null;
  var d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return 'há '+Math.floor(diff/60)+' min';
  if (diff < 86400) return 'há '+Math.floor(diff/3600)+'h';
  return 'há '+Math.floor(diff/86400)+' dias';
}

// ---------- AÇÕES da home Calendar ----------
async function carregarCalendarsLista(){
  if (!window.BACKEND) return;
  try {
    var res = await window.BACKEND.api('/agenda/google/calendars');
    if (res.status === 401) {
      // Token revogado
      DR.config.googleCalendarConectado = false;
      STATE.calendar.step = null;
      toast('Sua conexão Google expirou. Reconecte.');
      renderCalendar();
      return;
    }
    if (!res.ok) {
      STATE.calendar.calendarsList = 'erro';
      renderCalendar();
      return;
    }
    var d = await res.json().catch(function(){ return {}; });
    STATE.calendar.calendarsList = (d && d.data) || [];
    renderCalendar();
  } catch(e) {
    STATE.calendar.calendarsList = 'erro';
    renderCalendar();
  }
}

function toggleCalendarSelecao(id, marcado){
  if (!STATE.calendar.selecaoTemp) STATE.calendar.selecaoTemp = [];
  var idx = STATE.calendar.selecaoTemp.indexOf(id);
  if (marcado && idx < 0) STATE.calendar.selecaoTemp.push(id);
  if (!marcado && idx >= 0) STATE.calendar.selecaoTemp.splice(idx, 1);
  renderCalendar();
}

async function salvarCalendarSelecao(){
  if (!window.BACKEND) { toast('Sistema indisponível'); return; }
  var ids = (STATE.calendar.selecaoTemp || []);
  try {
    var res = await window.BACKEND.api('/agenda/google/calendars-selected', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids })
    });
    if (!res.ok) { toast('Não foi possível salvar agora'); return; }
    toast('Agendas atualizadas — sincronizando...');
    STATE.calendar.step = null;
    STATE.calendar.selecaoTemp = null;
    STATE.calendar.calendarsList = null;
    // Refetch status + historico
    fetchCalendarHomeData();
    renderCalendar();
  } catch(e) {
    toast('Sem conexão');
  }
}

async function resyncCalendarAgora(){
  if (!window.BACKEND) return;
  toast('Sincronizando...');
  try {
    var res = await window.BACKEND.api('/agenda/google/sync-now', { method: 'POST' });
    if (res.status === 401) {
      DR.config.googleCalendarConectado = false;
      toast('Conexão expirou. Reconecte.');
      STATE.calendar.step = null;
      renderCalendar();
      return;
    }
    if (!res.ok) { toast('Falhou. Tente daqui a alguns minutos.'); return; }
    toast('Sincronizado');
    fetchCalendarHomeData();
  } catch(e) { toast('Sem conexão'); }
}

async function pausarDisparos(dias){
  if (!window.BACKEND) return;
  try {
    var res = await window.BACKEND.api('/agenda/pausar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dias: parseInt(dias,10) })

async function reativarSlot(slotId){
  if (!window.BACKEND) return;
  try {
    var res = await window.BACKEND.api('/agenda/slots/'+encodeURIComponent(slotId)+'/ignorar', { method: 'DELETE' });
    if (!res.ok) { toast('Não foi possível reativar agora'); return; }
    toast('Reativado · vai virar PC');
    fetchCalendarHomeData();
  } catch(e) { toast('Sem conexão'); }
}

function setQuandoDispararPc(val){
  if (DR.config) DR.config.quandoDispararPc = val;
  // Salva no backend
  if (window.BACKEND && typeof window.salvarConfigPerfil === 'function') {
    window.salvarConfigPerfil('quandoDispararPc', val);
  }
  renderCalendar();
}

function tplOnbShow(){TPL_ONB_STEP=0;tplOnbRender();$('tpl-onbOverlay').classList.add('show');}
function tplOnbClose(){$('tpl-onbOverlay').classList.remove('show');try{localStorage.setItem('vitae_tour_visto','1');}catch(e){}}
function tplOnbSkip(){tplOnbClose();}
function tplOnbNext(){
  if(TPL_ONB_STEP<TPL_ONB_SLIDES.length-1){TPL_ONB_STEP++;tplOnbRender();}
  else{tplOnbClose();setTimeout(abrirCriarTemplate,200);}
}
function tplOnbRender(){
  var s=TPL_ONB_STEP, slide=TPL_ONB_SLIDES[s];
  /* dots */
  var dots=$('tpl-onbDots');
  dots.innerHTML='';
  TPL_ONB_SLIDES.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='onb-dot'+(i===s?' active':(i<s?' done':''));
    dots.appendChild(d);
  });
  /* content */
  var c=$('tpl-onbContent');
  c.innerHTML='<div class="onb-icon"><svg viewBox="0 0 24 24">'+slide.ic+'</svg></div><div class="onb-title">'+slide.t+'</div><div class="onb-desc">'+slide.d+'</div>';
  /* botão final */
  var btn=$('tpl-onbBtn');
  btn.textContent = (s===TPL_ONB_SLIDES.length-1) ? 'Criar meu primeiro template' : 'Próximo';
}

/* ============================================================
   ===== BACKEND PLUG (Fases 4-11 — substitui mocks por API) =====
   Princípio: não toca em render. Sobrescreve o conteúdo dos mocks
   após carregar do Railway. Em caso de erro, mantém o mock — app não quebra.
   ============================================================ */
window.BACKEND = (function(){
  var API = (location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.protocol==='file:')
    ? 'https://vitae-app-production.up.railway.app'
    : 'https://vitae-app-production.up.railway.app';

  function getToken(){ try{ return localStorage.getItem('vitae_token'); }catch(e){ return null; } }
  function getRefresh(){ try{ return localStorage.getItem('vitae_refresh_token'); }catch(e){ return null; } }
  function setTokens(t, r){
    if (t) localStorage.setItem('vitae_token', t);
    if (r) localStorage.setItem('vitae_refresh_token', r);
  }
  function logoutClient(){
    ['vitae_token','vitae_refresh_token','vitae_usuario'].forEach(function(k){ try{ localStorage.removeItem(k);}catch(e){} });
    window.location.replace('01-login.html');
  }

  async function tryRefresh(){
    var rt = getRefresh();
    if (!rt) return false;
    try {
      var res = await fetch(API + '/auth/refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ refreshToken: rt }) });
      if (!res.ok) return false;
      var d = await res.json();
      setTokens(d.token, d.refreshToken);
      return true;
    } catch(e) { return false; }
  }

  async function api(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization':'Bearer '+(getToken()||'') }, opts.headers||{});
    var res = await fetch(API + path, opts);
    if (res.status === 401) {
      var ok = await tryRefresh();
      if (ok) {
        opts.headers['Authorization'] = 'Bearer ' + getToken();
        res = await fetch(API + path, opts);
      } else {
        logoutClient();
        throw new Error('Sessão expirada');
      }
    }
    return res;
  }

      var conv = slots.filter(function(s){ return !s.cancelado && !s.ignorado; }).sort(function(a,b){
        return new Date(a.inicio) - new Date(b.inicio);

        var nome = (s.paciente && s.paciente.nome)

  function fmtH(iso){

  function formatarRecordedAt(d){
    var h = new Date();
    var diff = (h - d) / 1000;
    if (diff < 60) return 'agora há pouco';
    if (diff < 3600) return 'há ' + Math.floor(diff/60) + ' min';
    if (diff < 86400) return 'há ' + Math.floor(diff/3600) + 'h';
    if (diff < 86400*7) return 'há ' + Math.floor(diff/86400) + ' dias';
    return d.toLocaleDateString('pt-BR');
  }

  // ---------- BOOT autônomo ----------
  async function boot(){
    // Detecta callback OAuth Google Calendar (volta com ?gcal_ok=1&gcal_email=xxx)
    try {
      var params = new URLSearchParams(location.search);
      var pending = sessionStorage.getItem('vitae_calendar_oauth_pending');
      var gcalOk = params.get('gcal_ok') === '1' || params.get('google') === 'ok' || params.get('calendar') === 'connected';
      if (gcalOk || pending) {
        sessionStorage.removeItem('vitae_calendar_oauth_pending');
        if (typeof window.verificarStatusGoogleCalendar === 'function') {
          await window.verificarStatusGoogleCalendar();
        }
        var emailConectado = params.get('gcal_email') || '';
        if (typeof window.toast === 'function') {
          window.toast(emailConectado
            ? 'Google Calendar conectado: ' + decodeURIComponent(emailConectado)
            : 'Google Calendar conectado');
        }
        // Limpa query string sem recarregar
        history.replaceState({}, '', location.pathname + (location.hash || '#perfil'));
        // Logo apos OAuth: leva pra tela "Selecionar agendas" (NOVO fluxo).
        // Medico ve as agendas reais da conta dele, marca quais usar, valida.
        if (gcalOk) {
          setTimeout(function(){
            try {
              if (!STATE.calendar) STATE.calendar = {};
              STATE.calendar.step = 'selecionar-agendas';
              STATE.calendar.calendarsList = null; // forca buscar lista nova
              STATE.calendar.selecaoTemp = null;
              if (typeof window.goto === 'function') window.goto('calendar');
              else if (typeof window.renderCalendar === 'function') window.renderCalendar();
            } catch(e){}
          }, 100);
        }
      }
    } catch(e){}

    // ============================================================
    // CACHE LOCAL (hidratacao instantanea pra UI nao ficar em branco)
    // ============================================================
    // Antes de chamar API: hidrata DR/PACIENTES/PCS/TEMPLATES com cache
    // do localStorage se disponivel (TTL 24h). Render imediato.
    try {
      var CACHE_TTL = 24 * 60 * 60 * 1000; // 24h
      function _hidratar(key, target){
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return false;
          var pkg = JSON.parse(raw);
          if (!pkg || (Date.now() - pkg.ts) > CACHE_TTL) return false;
          if (Array.isArray(pkg.data) && Array.isArray(target)) {
            target.length = 0;
            Array.prototype.push.apply(target, pkg.data);
            return true;
          }
          if (typeof pkg.data === 'object' && typeof target === 'object') {
            Object.assign(target, pkg.data);
            return true;
          }
        } catch(_e){}
        return false;
      }
      if (typeof DR === 'object') _hidratar('vitae_cache_dr', DR);
      if (typeof PACIENTES !== 'undefined') _hidratar('vitae_cache_pacientes', PACIENTES);
      if (typeof PCS !== 'undefined') _hidratar('vitae_cache_pcs', PCS);
      if (typeof TEMPLATES !== 'undefined') _hidratar('vitae_cache_templates', TEMPLATES);
      // Render imediato com cache se houver
      if (typeof window.atualizarSidebarUser === 'function') window.atualizarSidebarUser();
      if (typeof updateSidebarPips === 'function') updateSidebarPips();
      var viewCached = (STATE && STATE.view) || 'hoje';
      if (viewCached === 'hoje' && typeof renderHoje === 'function') renderHoje();
      else if (viewCached === 'pre-consultas' && typeof renderPCsList === 'function') renderPCsList();
      else if (viewCached === 'pacientes' && typeof renderPacientes === 'function') renderPacientes();
      else if (viewCached === 'templates' && typeof renderTemplates === 'function') renderTemplates();
      else if (viewCached === 'perfil' && typeof renderPerfil === 'function') renderPerfil();
    } catch(_e){}

    // ============================================================
    // FETCH em paralelo (NAO espera — renderiza a medida que chega)
    // ============================================================
    var promiseMap = {
      DR: loadDR().then(function(ok){
        if (ok) try { localStorage.setItem('vitae_cache_dr', JSON.stringify({ts:Date.now(), data: DR})); } catch(_e){}
        return ok;
      }),
      PAC: loadPACIENTES().then(function(ok){
        if (ok) try { localStorage.setItem('vitae_cache_pacientes', JSON.stringify({ts:Date.now(), data: PACIENTES})); } catch(_e){}
        return ok;
      }),
      PCS: loadPCS().then(function(ok){
        if (ok) try { localStorage.setItem('vitae_cache_pcs', JSON.stringify({ts:Date.now(), data: PCS})); } catch(_e){}
        return ok;
      }),
      TPL: loadTEMPLATES().then(function(ok){
        if (ok) try { localStorage.setItem('vitae_cache_templates', JSON.stringify({ts:Date.now(), data: TEMPLATES})); } catch(_e){}
        return ok;
      }),
      AGD: loadAGENDA(),
    };
    // Cada promise re-renderiza a view ATIVA quando volta (UI fica viva)
    Object.keys(promiseMap).forEach(function(k){
      promiseMap[k].then(function(){
        try {
          if (typeof window.atualizarSidebarUser === 'function') window.atualizarSidebarUser();
          if (typeof updateSidebarPips === 'function') updateSidebarPips();
          var view = (STATE && STATE.view) || 'hoje';
          if (view === 'hoje' && typeof renderHoje === 'function') renderHoje();
          else if (view === 'pre-consultas' && typeof renderPCsList === 'function') renderPCsList();
          else if (view === 'pacientes' && typeof renderPacientes === 'function') renderPacientes();
          else if (view === 'templates' && typeof renderTemplates === 'function') renderTemplates();
          else if (view === 'perfil' && typeof renderPerfil === 'function') renderPerfil();
        } catch(_e){}
      });
    });
    // Verifica status Calendar (non-blocking)
    if (typeof window.verificarStatusGoogleCalendar === 'function') {
      window.verificarStatusGoogleCalendar();
    }
    return { ok: true, modo: 'cache+stream' };
  }

  async function gerarIaCollab(pcId, outrosIds) {

  // ---------- FASE 11: Exports + Excluir ----------
  function downloadFromBlob(blob, nome) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = nome; document.body.appendChild(a); a.click();

    });
    return await res.json().catch(()=>({}));
  }

  return {
    api: api,
    loadDR: loadDR,
    loadPACIENTES: loadPACIENTES,
    loadPCS: loadPCS,
    loadTEMPLATES: loadTEMPLATES,
    loadAGENDA: loadAGENDA,
    loadPacienteDetalhe: loadPacienteDetalhe,
    salvarPerfilCampo: salvarPerfilCampo,
    criarTemplate: criarTemplate,

    excluirTemplate: excluirTemplate,

    criarPC: criarPC,
    abrirSummaryPC: abrirSummaryPC,
    gerarIaCollab: gerarIaCollab,
    gerarAnaliseProsodica: gerarAnaliseProsodica,
    abrirAuditoriaProsodica: abrirAuditoriaProsodica,
    exportarLGPD: exportarLGPD,
    exportarIClinic: exportarIClinic,
    excluirContaSoft: excluirContaSoft,
    boot: boot
  };
})();

window.duplicarTemplate = async function(id){
  var t = TEMPLATES.find(function(x){return x.id===id;});
  if (!t) return;
  var perg = t.perguntasArr || [];
  if (!perg.length && t.perguntas) {
    // fallback: gera perguntas placeholder (template antigo sem array completo)
    perg = Array(t.perguntas).fill().map(function(_,i){ return 'Pergunta ' + (i+1); });
  }
  var payload = {
    nome: (t.nome || 'Template') + ' (cópia)',
    perguntas: perg.map(function(p, i){ return { id:'q'+(i+1), texto: p, tipo:'text' }; }),
    permitirAudio: t.permitirAudio !== false
  };
  var novo = await window.BACKEND.criarTemplate(payload);
  if (!novo) { toast('Não foi possível duplicar.'); return; }
  TEMPLATES.push({
    id: novo.id, nome: novo.nome, perguntas: (novo.perguntas||[]).length,
    perguntasArr: (novo.perguntas||[]).map(function(p){ return typeof p==='string'?p:(p.texto||''); }),
    permitirAudio: novo.permitirAudio !== false, ativo: true, vezesUsado: 0
  });

  toast('Template duplicado');
};

window.iniciarComparativo = async function(){

  if (typeof renderPacienteDetailInline === 'function') renderPacienteDetailInline();

  // chama backend real em paralelo

  var pcsDoPaciente = Object.values(PCS||{}).filter(function(p){ return p.pacienteId === pid; });
  if (pcsDoPaciente.length < 2) {
    setTimeout(function(){
      STATE.comparativoLoading = false; STATE.comparativoLigado = true;

          else if (/Mínimo 2|minimo 2/i.test(msg)) msg = 'Esse paciente só tem 1 pré-consulta. Crie outra pra comparar a evolução.';
          else if (/desativada/i.test(msg)) msg = 'IA Collab está desativada. Ative em Meu Perfil → Voz & IA.';

        }

      if (typeof COMPARE_MOCK !== 'undefined' && pid) COMPARE_MOCK[pid] = 'Sem conexão com o servidor. Verifique sua internet e tente de novo.';

  var resp = await window.BACKEND.excluirContaSoft();
  if (resp && resp.ok) {
    alert('Conta marcada para exclusão. Você tem 30 dias para reativar fazendo login novamente.');
    if (typeof doLogout === 'function') doLogout();
  } else {
    toast(resp && resp.erro || 'Não foi possível excluir agora.');
  }
};

// --- Templates: salvar (tela dedicada) ---
var _origSalvarTemplateNovo = window.salvarTemplateNovo;
window.salvarTemplateNovo = async function(){
  var s = TPL_CREATE_STATE;
  if (!s) return _origSalvarTemplateNovo && _origSalvarTemplateNovo.apply(this, arguments);
  var perg = (s.perguntas||[]).map(function(p, i){ return { id:'q'+(i+1), texto:(p.texto||'').trim(), tipo:'text' }; }).filter(function(p){return p.texto;});
  if (perg.length < 4) { toast('Adicione pelo menos 4 perguntas.'); return; }
  var payload = { nome: s.nome || 'Sem nome', perguntas: perg, permitirAudio: !!s.audio };
  if (s.edit && s.id) {
    var ok = await window.BACKEND.atualizarTemplate(s.id, payload);
    if (!ok) { toast('Não foi possível salvar agora.'); return; }
    var t = TEMPLATES.find(function(x){return x.id===s.id;});
    if (t) { t.nome = s.nome; t.perguntas = perg.length; t.permitirAudio = !!s.audio; t.perguntasArr = perg.map(function(p){return p.texto;}); }
  } else {
    var novo = await window.BACKEND.criarTemplate(payload);
    if (!novo) { toast('Não foi possível criar agora.'); return; }
    TEMPLATES.push({
      id: novo.id, nome: novo.nome, perguntas: perg.length, perguntasArr: perg.map(function(p){return p.texto;}),
      permitirAudio: novo.permitirAudio !== false, ativo: true, vezesUsado: 0
    });
  }
  TPL_CREATE_STATE.step = 3;
  try { renderTemplatesCriar(); } catch(e){}
};

</script>
