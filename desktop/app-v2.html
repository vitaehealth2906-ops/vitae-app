    mensagemLembrete:'Olá {nome}, sou da equipe do Dr. {medico}. Sua consulta é {data} às {hora}. Antes do atendimento, gravei essa pré-consulta de 4 minutos pra entender melhor o que você está sentindo: {link}',
    mensagemReenvio:'Oi {nome}, passando pra lembrar — sua consulta com Dr. {medico} é {data} às {hora}. Se ainda não conseguiu gravar a pré-consulta, o link tá aqui: {link}'
  }
};

// PACIENTES — populado por BACKEND.loadPACIENTES() via GET /medico/pacientes
var PACIENTES = [];

function mkAnam(o){ var f=function(v,fn){return {v:v,fonte:fn||'audio'};}; return Object.assign({queixaPrincipal:f('—','pulado'),tempoEvolucao:f('—','pulado'),intensidade:f('—','pulado'),fatoresAgravantes:f('—','pulado'),fatoresAtenuantes:f('—','pulado'),sintomasAssociados:f('—','pulado'),tratamentoPrevio:f('—','pulado'),antecedentesPessoais:f('—','pulado'),antecedentesFamiliares:f('—','pulado'),habitos:f('—','pulado'),sono:f('—','pulado')},o||{}); }

// PCS — populado por BACKEND.loadPCS() via GET /pre-consulta
var PCS = {};

// AGENDA_HOJE — populada por BACKEND.loadAGENDA() via GET /agenda/slots?inicio&fim
var AGENDA_HOJE = [];

// TEMPLATES — populado por BACKEND.loadTEMPLATES() via GET /templates
var TEMPLATES = [];

/* Perguntas reais por especialidade — escritas em PT-BR amigável pra paciente leigo */
var PERGUNTAS_TEMPLATE = {
  t1: [
    'O que está te incomodando hoje?',
    'Há quanto tempo você sente isso?',
    'De 0 a 10, qual a intensidade do que você sente?',
    'O que faz piorar?',
    'O que faz melhorar?',

    'Já tomou algum remédio ou fez tratamento pra isso?',

    'Como tem sido seu sono nas últimas semanas?'
  ],
  t2: [

    'Você sente dor no peito?',
    'Se sente, em que região exatamente?',
    'A dor é em aperto, queimação, pontada ou peso?',
    'A dor irradia para o braço, pescoço, mandíbula ou costas?',
    'Quanto tempo dura a dor em média?',
    'O que melhora ou piora a dor?',
    'Você sente falta de ar em situações de esforço ou repouso?',
    'Sente palpitações ou batimentos descompassados?',
    'Tem inchaço nas pernas ou nos pés no fim do dia?',
    'Alguém da sua família tem doença do coração?',
    'Toma algum remédio para pressão, colesterol ou coração?',
    'Faz exercício físico? Com que frequência?'
  ],
  t3: [
    'O que está te incomodando na sua pele?',
    'Em que região do corpo apareceu?',
    'Há quanto tempo você notou?',
    'Coça, dói, arde ou descama?',
    'Você passou algum produto, creme ou remédio na pele?',
    'Tem alguma alergia conhecida (medicamento, alimento, contato)?',
    'Você se expõe muito ao sol? Usa protetor solar?',
    'Alguém da sua família tem problema de pele parecido?',
    'Tem fotos da lesão que queira anexar pra eu ver antes da consulta?'
  ],
  t4: [
    'Como você está em relação à última consulta?',
    'Os sintomas melhoraram, pioraram ou continuam iguais?',
    'Você está conseguindo seguir o tratamento prescrito?',
    'Sentiu algum efeito colateral do remédio?',
    'Surgiu algum sintoma novo desde a última consulta?',
    'Tem alguma dúvida que ficou da última consulta?'
  ]
};

// ALERTAS_PROSODICOS — populado por BACKEND.loadPCS() (derivado de summaryJson.alertaProsodico)
var ALERTAS_PROSODICOS = [];
var STATE = {
  view:'hoje', alertaIdx:0, selectedPaciente:null,
  search:{pc:'',pac:'',tpl:''},
  filters:{pc:'all',pac:'all',tpl:'recentes'},
  perfilTab:'dados', impactoTab:'semana',
  comparativoLigado:false, transOpen:false, _fromView:'pre-consultas'
};

/* HELPERS */
function $(id){return document.getElementById(id);}
/* Preserva foco + cursor após re-render destrutivo (bug fix BUG-A) */
function _keepFocus(id, caret){
  setTimeout(function(){
    var el = document.getElementById(id);
    if (el) {
      try { el.focus({ preventScroll: true }); } catch(e) { el.focus(); }
      try { el.setSelectionRange(caret, caret); } catch(e) {}
    }
  }, 0);
}
function _onSearch(e, key, renderFn, id){
  var caret = e.target.selectionStart;
  STATE.search[key] = e.target.value;
  renderFn();
  _keepFocus(id, caret);
}
function fmtBRL(n){return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtMin(min){var h=Math.floor(min/60),m=min%60;return h>0?(h+'h'+(m?(m+'min'):'')):(m+'min');}
function toast(msg){if(!msg)return;$('toastMsg').textContent=msg;var t=$('toast');t.classList.add('show');clearTimeout(window._toastT);window._toastT=setTimeout(function(){t.classList.remove('show');},2400);}
function openModal(html,big){var m=$('modalCard');m.className='modal'+(big?' lg':'');m.innerHTML=html;$('modalBg').classList.add('show');}
function closeModal(){$('modalBg').classList.remove('show');}
$('modalBg').addEventListener('click',function(e){if(e.target===$('modalBg'))closeModal();});
function openSheet(html){$('sheetCard').innerHTML='<div class="sheet-handle"></div>'+html;$('sheetBg').classList.add('show');}
function closeSheet(){$('sheetBg').classList.remove('show');}
$('sheetBg').addEventListener('click',function(e){if(e.target===$('sheetBg'))closeSheet();});

/* CLOCK */
function tick(){var d=new Date();$('tbClock').textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(tick,1000);tick();

/* ROUTING */
var TITLES={hoje:['Hoje','Cockpit do dia'],'pre-consultas':['Pré-Consultas','Suas pré-consultas'],pacientes:['Pacientes','Seus pacientes'],'pacientes-detail':['Pacientes','Histórico de anamneses'],templates:['Templates','Formulários'],'templates-criar':['Templates','Novo template'],perfil:['Meu Perfil','Configurações'],summary:['Pré-consulta','Resumo de 1 minuto'],calendar:['Google Calendar','Integração'],'criar-pc':['Pré-Consultas','Nova pré-consulta']};
function goto(view){
  // Fecha overlay de onboarding de Templates se estiver aberto e o medico
  // sair pra outra view. Sem isso, o overlay continua interceptando pointer
  // events em qualquer tela e o medico fica preso sem entender por quê.
  if (view !== 'templates') {
    var tplOnb = document.getElementById('tpl-onbOverlay');
    if (tplOnb && tplOnb.classList.contains('show')) {
      try { tplOnbClose(); } catch(e) { tplOnb.classList.remove('show'); }
    }
  }
  // Registra de onde veio o medico antes de entrar em Calendar
  // (pra botao Voltar saber pra onde voltar — ex: Perfil → Calendar → Voltar = Perfil)
  if (view === 'calendar' && STATE.view !== 'calendar') {
    STATE._fromCalendar = STATE.view || 'perfil';
  }
  STATE.view=view;
  ['hoje','pre-consultas','pacientes','pacientes-detail','templates','templates-criar','perfil','summary','calendar','criar-pc'].forEach(function(v){var el=$('v-'+v);if(el)el.style.display=(v===view?'block':'none');});
  document.querySelectorAll('.nl').forEach(function(n){n.classList.remove('on');});
  var sidebarKey = (view==='pacientes-detail') ? 'pacientes' : (view==='summary' ? STATE._fromView : view);
  var nav=document.querySelector('[data-view="'+sidebarKey+'"]');if(nav)nav.classList.add('on');
  if(TITLES[view]){$('tbT').textContent=TITLES[view][0];$('tbS').textContent=TITLES[view][1];}
  document.querySelector('.content').scrollTop=0;
  if(view==='hoje')renderHoje();
  if(view==='pre-consultas')renderPC();
  if(view==='pacientes')renderPacientes();
  if(view==='pacientes-detail')renderPacienteDetail();
  if(view==='templates')renderTemplates();
  if(view==='perfil')renderPerfil();
  if(view==='calendar')renderCalendar();
  if(view==='criar-pc')renderCriarPC();
  updateSidebarPips();
}

/* ============================================
   MÉTRICAS HONESTAS (Sessao 22 — 2026-05-09)
   ============================================
   Calculadas no backend (GET /medico/metricas?periodo=...) com base em:
     1. Pré-consultas REALMENTE respondidas no período (fato)
     2. Completude individual (cálculo do summaryJson)
     3. 5 inputs declarativos do médico (medico.metricasConfig)
   Sem multiplicador 5x/21x. Sem 70% hardcoded. Soma real do período.
*/

// Cache local de métricas por período (preenchido pelo backend)
if (!STATE.metricas) STATE.metricas = {};

// Estado de loading por período pra evitar fetch duplicado
var _metricasLoading = {};

async function carregarMetricas(periodo){
  if (_metricasLoading[periodo]) return STATE.metricas[periodo] || null;
  if (!window.BACKEND) return null;
  _metricasLoading[periodo] = true;
  try {
    var res = await window.BACKEND.api('/medico/metricas?periodo='+encodeURIComponent(periodo));
    if (!res.ok) return null;
    var data = await res.json();
    STATE.metricas[periodo] = data;
    // Após carregar 30dias: dispara setup wizard automatico OU calibracao
    if (periodo === '30dias') {
      if (data.setupConcluido === false) {
        // Trigger automatico do setup wizard (com supressao 24h se medico dispensar)
        try { dispararSetupAutomatico(); } catch(e) {}
      } else if (data.setupConcluido && typeof verificarCalibracaoPendente === 'function') {
        try { verificarCalibracaoPendente(); } catch(e) {}
      }
    }
    return data;
  } catch(e) {
    return null;
  } finally {
    _metricasLoading[periodo] = false;
  }
}

// Dispara modalSetupMetricas automaticamente se setup incompleto.
// Suprimido por 24h se medico clicar "Configurar depois".
function dispararSetupAutomatico(){
  // Nao dispara se ja tem modal aberto
  if ($('modalBg') && $('modalBg').classList.contains('show')) return;
  // Nao dispara se medico dispensou nas ultimas 24h
  var dispensadoAte = parseInt(localStorage.getItem('vitae_setup_dispensado_ate') || '0', 10);
  if (Date.now() < dispensadoAte) return;
  // Nao dispara fora da view 'hoje' (evita interromper outras telas)
  if (STATE.view !== 'hoje') return;
  // Espera 1.5s pra o medico ver o dashboard primeiro
  setTimeout(function(){
    if (STATE.view !== 'hoje') return;
    if ($('modalBg') && $('modalBg').classList.contains('show')) return;
    if (typeof modalSetupMetricas === 'function') modalSetupMetricas();
  }, 1500);
}
window.dispararSetupAutomatico = dispararSetupAutomatico;
window.carregarMetricas = carregarMetricas;

// Retorna métricas do cache. Se ausente, dispara fetch async e re-renderiza
// quando voltar. Mantém renderHoje síncrono (não muda assinatura).
function calcImpacto(periodo){
  var m = STATE.metricas[periodo];
  if (!m) {
    // Dispara fetch e marca placeholder
    carregarMetricas(periodo).then(function(data){
      if (data && STATE.view === 'hoje' && STATE.impactoTab === periodo) {
        renderHoje();
      }
    });
    return {
      _loading: true,
      tempoMin: 0, pacExtras: 0, receita: 0,
      precisao: 0, consultasMedidas: 0,
      setupConcluido: true, alerta: null,
    };
  }
  return {
    tempoMin: m.tempoEconomizadoMin || 0,
    pacExtras: m.atendimentosEquivalentes || 0,
    receita: m.receitaPossivel || 0,
    precisao: m.precisao || 0,
    consultasMedidas: m.consultasMedidas || 0,
    setupConcluido: m.setupConcluido !== false,
    alerta: m.alerta || null,
    detalhe: m.detalhe || null,
    _loading: false,
  };
}

  STATE.metricas = {};
  if (STATE.view === 'hoje') renderHoje();
}
window.invalidarCacheMetricas = invalidarCacheMetricas;

/* Sessao 22 — Disparar / Excluir slot vindo do Calendar */
function dispararSlot(slotId){
  var s = AGENDA_HOJE.find(function(x){return x.id===slotId;});
  if (!s) { toast('Slot não encontrado'); return; }
  // Autopreenche dataConsulta + horaConsulta a partir do slot
  var dt = s.inicio ? new Date(s.inicio) : null;
  var dataStr = '', horaStr = s.hora || '';
  if (dt) {
    var yyyy = dt.getFullYear(), mm = String(dt.getMonth()+1).padStart(2,'0'), dd = String(dt.getDate()).padStart(2,'0');
    dataStr = yyyy+'-'+mm+'-'+dd;
    if (!horaStr) horaStr = String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
  }
  var pac = s.pacienteId ? PACIENTES.find(function(p){return p.id===s.pacienteId;}) : null;
  abrirCriarPC({
    pacienteId: s.pacienteId || null,
    nome: pac ? pac.nome : (s.paciente || ''),
    telefone: pac ? (pac.telefone||'') : '',
    email: pac ? (pac.email||'') : '',
    dataConsulta: dataStr,
    horaConsulta: horaStr,
    slotId: slotId
  });
}
async function excluirSlot(slotId){
  var idx = AGENDA_HOJE.findIndex(function(x){return x.id===slotId;});
  if (idx < 0) return;
  if (!confirm('Excluir este paciente da lista? Sua agenda no Google Calendar não vai ser tocada.')) return;
  var backup = AGENDA_HOJE[idx];
  // Otimista: remove local primeiro
  AGENDA_HOJE.splice(idx, 1);
  if (STATE.view==='hoje') renderHoje();
  if (STATE.view==='pre-consultas') renderPC();
  // Persiste no backend (marca como ignorado — rota /agenda/slots/:id/ignorar)
  try {
    if (window.BACKEND && window.BACKEND.api) {
      var res = await window.BACKEND.api('/agenda/slots/'+encodeURIComponent(slotId)+'/ignorar', { method:'POST' });
      if (!res.ok && res.status !== 404) throw new Error('HTTP '+res.status);
    }
    if (typeof toastT === 'function') {
      toastT('Removido da lista','ok',function(){
        // Desfazer: re-insere local + chama DELETE
        AGENDA_HOJE.splice(idx, 0, backup);
        if (window.BACKEND && window.BACKEND.api) {
          window.BACKEND.api('/agenda/slots/'+encodeURIComponent(slotId)+'/ignorar', { method:'DELETE' }).catch(function(){});
        }
        if (STATE.view==='hoje') renderHoje();
        if (STATE.view==='pre-consultas') renderPC();
      });
    } else {

function renderPC(){
  var f=STATE.filters.pc, q=(STATE.search.pc||'').toLowerCase();
  var allPCs=Object.keys(PCS).map(function(id){return Object.assign({id:id},PCS[id]);});

  /* Sessao 22 — slots Calendar sem PC entram na lista como "Pra disparar" */
  var slotsParaDisparar = (Array.isArray(AGENDA_HOJE) ? AGENDA_HOJE : []).filter(function(s){
    return !s.pcId && !s.ignorado;
  });

  /* Combina PCs + slots em items unificados, ordenados por data da consulta */
  function _dataItem(item){
    if (item.kind === 'slot') return new Date(item.inicio).getTime();
    return item.dataConsulta ? new Date(item.dataConsulta).getTime() : new Date(item.criadaEm).getTime();
  }
  var items = [];
  allPCs.forEach(function(p){ items.push(Object.assign({kind:'pc'}, p)); });
  slotsParaDisparar.forEach(function(s){ items.push(Object.assign({kind:'slot'}, s)); });

  var counts = {
    all: items.length,
    PRA_DISPARAR: slotsParaDisparar.length,
    PENDENTE: allPCs.filter(function(p){return p.status==='PENDENTE'||p.status==='ABERTO'||p.status==='aguardando';}).length,
    RESPONDIDA: allPCs.filter(function(p){return p.status==='RESPONDIDA'||p.status==='respondida'||p.cobertura==='pronta'||p.cobertura==='parcial';}).length,
    FINALIZADA: allPCs.filter(function(p){return p.status==='FINALIZADA';}).length,
    EXPIRADA: allPCs.filter(function(p){return p.status==='EXPIRADA'||p.status==='expirada';}).length
  };

  var filtered = items.filter(function(it){
    var nome = it.kind==='slot' ? (it.paciente||'') : (it.paciente||it.pacienteNome||'');
    if (q && nome.toLowerCase().indexOf(q) < 0) return false;
    if (f === 'PRA_DISPARAR') return it.kind === 'slot';
    if (f === 'PENDENTE') return it.kind==='pc' && (it.status==='PENDENTE'||it.status==='ABERTO'||it.status==='aguardando');
    if (f === 'RESPONDIDA') return it.kind==='pc' && (it.status==='RESPONDIDA'||it.status==='respondida'||it.cobertura==='pronta'||it.cobertura==='parcial');
    if (f === 'FINALIZADA') return it.kind==='pc' && it.status==='FINALIZADA';
    if (f === 'EXPIRADA') return it.kind==='pc' && (it.status==='EXPIRADA'||it.status==='expirada');
    return true;
  }).sort(function(a,b){
    return _dataItem(a) - _dataItem(b);
  });

  function _fmtDataConsulta(iso){
    if (!iso) return '—';
    var d = new Date(iso);
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    var dStart = new Date(d); dStart.setHours(0,0,0,0);
    var diff = Math.round((dStart.getTime() - hoje.getTime()) / (24*3600*1000));
    var hora = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    if (diff === 0) return 'Hoje · '+hora;
    if (diff === 1) return 'Amanhã · '+hora;
    if (diff === -1) return 'Ontem · '+hora;
    if (diff > 1 && diff < 7) return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()] + ' · ' + hora;
    return d.toLocaleDateString('pt-BR') + ' · ' + hora;
  }

  var html='';
  html+='<div class="pcn-header"><div><h1 class="pcn-title">Suas <em>pré-consultas</em></h1><p class="pcn-sub">Lista organizada por data da consulta. Mais próximas em cima.</p></div><button class="btn btn-p" onclick="abrirCriarPC()" style="height:40px;padding:0 18px"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Pré-Consulta</button></div>';
  html+='<div style="position:relative;margin-bottom:12px"><svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="searchPCInput" type="text" placeholder="Buscar paciente..." oninput="_onSearch(event,\'pc\',renderPC,\'searchPCInput\')" value="'+q+'" style="width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13.5px;color:var(--t1);outline:none"/></div>';
  html+='<div class="pcn-pills">'+
    '<button class="pcn-pill '+(f==='all'?'on':'')+'" onclick="setPCFilter(\'all\')">Todas <span class="pcn-ct">'+counts.all+'</span></button>'+
    '<button class="pcn-pill '+(f==='PRA_DISPARAR'?'on':'')+'" onclick="setPCFilter(\'PRA_DISPARAR\')">Pra disparar <span class="pcn-ct">'+counts.PRA_DISPARAR+'</span></button>'+
    '<button class="pcn-pill '+(f==='PENDENTE'?'on':'')+'" onclick="setPCFilter(\'PENDENTE\')">Aguardando <span class="pcn-ct">'+counts.PENDENTE+'</span></button>'+
    '<button class="pcn-pill '+(f==='RESPONDIDA'?'on':'')+'" onclick="setPCFilter(\'RESPONDIDA\')">Respondidas <span class="pcn-ct">'+counts.RESPONDIDA+'</span></button>'+
    '<button class="pcn-pill '+(f==='EXPIRADA'?'on':'')+'" onclick="setPCFilter(\'EXPIRADA\')">Expiradas <span class="pcn-ct">'+counts.EXPIRADA+'</span></button>'+
  '</div>';
  html+='<div class="pcn-card"><div class="pcn-thead"><div>Paciente</div><div>Origem</div><div>Status</div><div>Consulta</div><div></div></div><div>';
  if(!filtered.length){
    html+='<div class="pcn-empty"><div class="pcn-empty-ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="pcn-empty-t">Nenhuma pré-consulta encontrada</div><div class="pcn-empty-d">Tenta limpar o filtro ou criar uma nova pré-consulta.</div><button class="btn btn-p" onclick="abrirCriarPC()" style="margin-top:10px">Criar pré-consulta</button></div>';
  }else{
    filtered.forEach(function(it){
      if (it.kind === 'slot') {
        /* Sessao 22 — linha de slot Calendar (ainda sem PC) */
        var iniLetras = (it.paciente||'??').split(' ').filter(Boolean).slice(0,2).map(function(x){return x[0];}).join('').toUpperCase();
        var origemTxt = '<span style="display:inline-flex;align-items:center;gap:5px;color:#0E7490;font-weight:600;font-size:11.5px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Google Calendar</span>';
        var dataTxt = _fmtDataConsulta(it.inicio);
        var botoesSlot =
          '<button class="pcn-tr-disparar" onclick="event.stopPropagation();dispararSlot(\''+it.id+'\')"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Disparar</button>'+
          '<button class="pcn-tr-btn del" title="Excluir" onclick="event.stopPropagation();excluirSlot(\''+it.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
        html+='<div class="pcn-trow" onclick="dispararSlot(\''+it.id+'\')">'+
          '<div class="pcn-tr-pat"><div class="pcn-tr-av" style="background:rgba(0,180,216,.18);color:#0E7490">'+iniLetras+'</div><div style="min-width:0"><div class="pcn-tr-name">'+escapeHtml(it.paciente||'Sem nome')+'</div></div></div>'+
          '<div class="pcn-tr-tpl">'+origemTxt+'</div>'+
          '<div><span class="pcn-tr-badge" style="background:rgba(0,180,216,.10);color:#0E7490"><span class="dot" style="background:#0E7490"></span>Pra disparar</span></div>'+
          '<div class="pcn-tr-date" style="font-weight:700;color:var(--t1)">'+dataTxt+'</div>'+
          '<div class="pcn-tr-act" style="display:flex;align-items:center;gap:6px">'+botoesSlot+'</div>'+
        '</div>';
        return;
      }

      var p = it;
      var bcls, btxt;
      var jaRespondida = (p.status === 'RESPONDIDA' || p.status === 'respondida' || p.status === 'FINALIZADA' ||
                         p.cobertura === 'pronta' || p.cobertura === 'parcial');
      var ehPendente = !jaRespondida;
      var enviadaEm = p.criadaEm ? new Date(p.criadaEm).getTime() : 0;
      var horasDesdeEnvio = enviadaEm ? (Date.now() - enviadaEm) / (1000 * 60 * 60) : 0;
      var ehAtrasado = ehPendente && horasDesdeEnvio > 24;

      if (p.status === 'FINALIZADA') { bcls='ok'; btxt='Finalizado'; }
      else if (jaRespondida) { bcls='ok'; btxt='Respondido'; }
      else if (p.status === 'EXPIRADA' || p.status === 'expirada') { bcls='bad'; btxt='Expirado'; }
      else if (ehAtrasado) {
        var diasAtraso = Math.floor(horasDesdeEnvio / 24);
        bcls='bad';
        btxt = 'Atrasado · ' + diasAtraso + 'd';
      }
      else { bcls='warn'; btxt='Enviado'; }

      var click;
      if (jaRespondida) {
        click = 'openSummary(\''+p.id+'\')';
      } else {
        click = 'reenviarPeloWhats(\''+p.id+'\')';
      }
      var botoesAcao = '';
      if (!jaRespondida) {
        botoesAcao += '<button class="pcn-tr-btn" title="Reenviar pelo WhatsApp" onclick="event.stopPropagation();reenviarPeloWhats(\''+p.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>';
        botoesAcao += '<button class="pcn-tr-btn" title="Copiar link" onclick="event.stopPropagation();copiarLinkPC(\''+p.id+'\')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
      }
      botoesAcao += '<button class="pcn-tr-btn del" title="Excluir" onclick="event.stopPropagation();excluirPCConfirma(\''+p.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
      var origemPc = '<span style="font-size:11.5px;color:var(--t3);font-weight:600">'+(p.templateNome||'Geral')+'</span>';
      var dataConsultaTxt = p.dataConsulta ? _fmtDataConsulta(p.dataConsulta) : (p.recordedAt||'—');
      html+='<div class="pcn-trow" onclick="'+click+'">'+
        '<div class="pcn-tr-pat"><div class="pcn-tr-av">'+p.ini+'</div><div style="min-width:0"><div class="pcn-tr-name">'+p.paciente+'</div></div></div>'+
        '<div class="pcn-tr-tpl">'+origemPc+'</div>'+
        '<div><span class="pcn-tr-badge '+bcls+'"><span class="dot"></span>'+btxt+'</span></div>'+
        '<div class="pcn-tr-date" style="font-weight:700;color:var(--t1)">'+dataConsultaTxt+'</div>'+
        '<div class="pcn-tr-act">'+botoesAcao+'</div>'+
      '</div>';
    });
  }
  html+='</div></div>';
  $('v-pre-consultas').innerHTML=html;
}

// ---------- Acoes inline da lista de Pre-Consultas ----------
async function copiarLinkPC(pcId){
  var pc = PCS[pcId];
  if (!pc) { toast('Pré-consulta não encontrada'); return; }
  // Tenta pegar token salvo na PC; senao monta URL com id
  var token = pc.linkToken || pc.token || pc.id;
  var url = 'https://vitae-app.vercel.app/pre-consulta.html?token=' + encodeURIComponent(token);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
      toast('Link copiado · pronto pra colar');
    } else {
      // Fallback: cria textarea temporario
      var ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Link copiado');
    }
  } catch(e) { toast('Não consegui copiar — tenta de novo'); }
}

/* Reenviar pelo WhatsApp — substituiu o disparo em massa em 2026-05-10.
   Médico clica, WhatsApp Web (ou app) abre numa aba nova com a mensagem
   de lembrete pronta + link da PC. Se telefone do paciente não estiver
   cadastrado, abre o WhatsApp sem destinatário pra médico colar manual. */
function reenviarPeloWhats(pcId){
  var pc = PCS[pcId];
  if (!pc) { toast('Pré-consulta não encontrada'); return; }
  var token = pc.linkToken || pc.token || pc.id;
  var link = 'https://vitae-app.vercel.app/pre-consulta.html?token=' + encodeURIComponent(token);

  // Procura telefone em várias fontes (PC e Paciente vinculado)
  var tel = pc.tel || pc.telefone || pc.pacienteTel || '';
  if (!tel && pc.pacienteId) {
    var pac = (PACIENTES||[]).find(function(x){return x.id===pc.pacienteId;});
    if (pac) tel = pac.telefone || pac.tel || '';
  }
  var telDigitos = String(tel||'').replace(/\D/g,'');
  if (telDigitos.indexOf('55') === 0 && telDigitos.length >= 12) telDigitos = telDigitos.slice(2);

  // Monta mensagem com placeholders
  var nome = ((pc.paciente || pc.pacienteNome || '').split(' ')[0]) || 'paciente';
  var medico = (DR.primeiroNome || (DR.nome||'').split(' ')[0]) || 'seu médico';
  var dt = pc.dataConsulta ? new Date(pc.dataConsulta) : null;
  var dataFmt = dt ? dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'}) : '—';
  var horaFmt = dt ? dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';

  var template = (DR.config && DR.config.mensagemReenvio) ||
                 'Oi {nome}, passando pra lembrar — sua consulta com Dr. {medico} é {data} às {hora}. Se ainda não conseguiu gravar a pré-consulta, o link tá aqui: {link}';
  var msg = template
    .replace(/\{nome\}/g, nome)
    .replace(/\{medico\}/g, medico)
    .replace(/\{data\}/g, dataFmt)
    .replace(/\{hora\}/g, horaFmt)
    .replace(/\{link\}/g, link);

  var waUrl = (telDigitos && telDigitos.length === 11)
    ? 'https://wa.me/55' + telDigitos + '?text=' + encodeURIComponent(msg)
    : 'https://wa.me/?text=' + encodeURIComponent(msg);

  try {
    var w = window.open(waUrl, '_blank');
    if (w) toast('WhatsApp aberto — confira antes de enviar');
    else toast('Bloqueio de popup — habilite no navegador');
  } catch(e) {
    toast('Não consegui abrir o WhatsApp');
  }
}

function excluirPCConfirma(pcId){
  var pc = PCS[pcId];
  if (!pc) { toast('Pré-consulta não encontrada'); return; }
  var nome = pc.paciente || pc.pacienteNome || 'esta pré-consulta';
  var html = '<div class="modal-h"><div><div class="modal-step">CONFIRMAR</div><div class="modal-t">Excluir pré-consulta?</div></div><button class="modal-x" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
  html += '<div class="modal-body"><p style="font-size:13.5px;line-height:1.5;color:var(--t1)">Tem certeza que quer excluir a pré-consulta de <strong>'+escapeHtml(nome)+'</strong>?</p><p style="font-size:12px;color:var(--t3);margin-top:8px">Esta ação não pode ser desfeita. Áudio e respostas serão removidos permanentemente.</p></div>';
  html += '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger-x" onclick="excluirPCExecutar(\''+pcId+'\')">Excluir definitivamente</button></div>';
  openModal(html, true);
}

async function excluirPCExecutar(pcId){
  closeModal();
  if (!window.BACKEND) { toast('Sistema indisponível'); return; }
  try {
    var res = await window.BACKEND.api('/pre-consulta/'+encodeURIComponent(pcId), { method: 'DELETE' });
    if (!res.ok) {
      var d = await res.json().catch(()=>({}));
      toast('Não foi possível excluir: ' + (d.erro || res.status));
      return;
    }
    delete PCS[pcId];
    if (typeof window.renderPC === 'function' && STATE.view === 'pre-consultas') window.renderPC();
    toast('Pré-consulta excluída');
  } catch(e) { toast('Sem conexão'); }
}

} catch(_e){}

// COMPARE_MOCK — populado por BACKEND.gerarIaCollab() (texto narrativo do Claude)
var COMPARE_MOCK = {};

function renderPacienteDetail(){
  var p=PACIENTES.find(function(x){return x.id===STATE.selectedPaciente;});
  if(!p){goto('pacientes');return;}

  var eventos=EVENTOS_MOCK[p.id]||[];
  var meds=window.MEDS_MOCK&&MEDS_MOCK[p.id]||[];
  var alergias=window.ALERG_MOCK&&ALERG_MOCK[p.id]||[];
  var exames=window.EXAMES_MOCK&&EXAMES_MOCK[p.id]||[];

      var ag=await prCarregarRetornos(pd.id);

  html+='<div style="display:flex;gap:8px;flex-shrink:0">';
  html+='<button class="btn btn-p" onclick="modalCriarPC(\''+p.id+'\')" style="height:38px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Enviar pré-consulta</button>';

function pdFilterExames(q,pid){
  q=q.toLowerCase();
  var el=document.getElementById('pd-exames-list-'+pid);
  if(!el)return;
  el.querySelectorAll('.exame-item').forEach(function(c){c.style.display=c.getAttribute('data-nome').includes(q)?'':'none';});
}
function pdToggleWa(){
  if(!DR.config)DR.config={};
  DR.config.whatsappHabilitado=!DR.config.whatsappHabilitado;
  var el=document.querySelector('.toggle-sw[onclick="pdToggleWa()"]');
  var desc=document.getElementById('wa-det-desc');
  if(el)el.classList.toggle('on',DR.config.whatsappHabilitado);
  if(desc)desc.textContent=DR.config.whatsappHabilitado?'Seu número visível para o paciente.':'Paciente não pode iniciar contato.';
}
function pdToggleWaDia(i){
  if(!DR.config)DR.config={};
  if(!DR.config.whatsappDias)DR.config.whatsappDias=[1,2,3,4,5];
  var idx=DR.config.whatsappDias.indexOf(i);
  if(idx>-1)DR.config.whatsappDias.splice(idx,1);else DR.config.whatsappDias.push(i);
  document.querySelectorAll('#wa-det-days .wa-day').forEach(function(b,j){b.classList.toggle('on',DR.config.whatsappDias.indexOf(j)>-1);});
}
function pdSaveWaConfig(){
  if(!DR.config)DR.config={};
  var h0=document.getElementById('wa-h0'),h1=document.getElementById('wa-h1');
  if(h0)DR.config.whatsappHoraInicio=h0.value;
  if(h1)DR.config.whatsappHoraFim=h1.value;
  showToast('Configurações salvas.','ok');
}

/* ============================================================
   PRÓXIMO RETORNO — Feature 1 (médico propõe -> paciente confirma)
   Rotas usadas:
     POST   /agendamento/propor-retorno
     POST   /agendamento/:id/confirmar
     POST   /agendamento/:id/recusar  (lado paciente)
     POST   /agendamento/:id/remarcar (lado paciente)
     POST   /agendamento/:id/cancelar
     GET    /agendamento/paciente/:id/retornos
   ============================================================ */

function _prMinDateAttr(){
  var d=new Date(Date.now()+1000*60*60*24); // amanha
  return d.toISOString().slice(0,10);
}
function _prDefaultDate(){
  var d=new Date(Date.now()+1000*60*60*24*30); // ~30 dias
  return d.toISOString().slice(0,10);
}
function _prFmt(d){
  try{ return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }catch(_e){ return d; }
}

function prAbrirMarcarRetorno(pacienteId){
  if(!pacienteId){ toast('Paciente sem ID — recarregue a tela'); return; }
  var html=''
    +'<div class="modal-h"><div style="font-size:18px;font-weight:900;letter-spacing:-.4px">Marcar retorno</div>'
      +'<button class="btn btn-ghost btn-sm" onclick="closeModal()">Fechar</button></div>'
    +'<div class="modal-b">'
      +'<div style="font-size:12.5px;color:var(--t3);line-height:1.55;margin-bottom:16px">O paciente recebe um aviso e pode confirmar, recusar ou propor outra data.</div>'

async function prProporRetorno(pacienteId){
  if(!window.BACKEND||!window.BACKEND.api){ toast('Sistema indisponível'); return; }
  var dateInp=document.getElementById('prDateInp');
  var localInp=document.getElementById('prLocalInp');
  var obsInp=document.getElementById('prObsInp');
  var btn=document.getElementById('prSubmitBtn');
  if(!dateInp||!dateInp.value){ toast('Escolha uma data'); return; }
  var dataHora=new Date(dateInp.value+'T09:00:00');
  if(dataHora<=new Date()){ toast('Data deve ser no futuro'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Enviando…'; }
  try{
    var res=await window.BACKEND.api('/agendamento/propor-retorno',{
      method:'POST',
      body:{
        pacienteId:pacienteId,
        dataHora:dataHora.toISOString(),
        local:(localInp&&localInp.value)||undefined,
        observacoes:(obsInp&&obsInp.value)||undefined
      }
    });
    if(res&&res.agendamento){
      closeModal();
      toast('Retorno proposto. Paciente foi avisado.');
      // Atualiza pd.proximoAgendamento na tela
      try{
        var pd=(STATE&&STATE.pacienteDetalheCache)||{};
        if(pd[pacienteId])pd[pacienteId].proximoAgendamento=res.agendamento;
      }catch(_e){}
      if(typeof renderPacienteDetail==='function') renderPacienteDetail();
    }else{
      toast((res&&res.erro)||'Erro ao propor retorno');
      if(btn){ btn.disabled=false; btn.textContent='Enviar proposta'; }
    }
  }catch(err){
    toast('Falha de rede — tente novamente');
    if(btn){ btn.disabled=false; btn.textContent='Enviar proposta'; }
  }
}

async function prRemarcarMedico(agendamentoId){
  // Médico reagendando = cancela atual + propõe novo (paciente precisa confirmar de novo)
  if(!window.BACKEND||!window.BACKEND.api){ toast('Sistema indisponível'); return; }
  var dateInp=document.getElementById('prRemarcaDateInp');
  var motivoInp=document.getElementById('prRemarcaMotivoInp');
  var btn=document.getElementById('prRemarcaBtn');
  if(!dateInp||!dateInp.value){ toast('Escolha uma nova data'); return; }
  var novaDataHora=new Date(dateInp.value+'T09:00:00');
  if(novaDataHora<=new Date()){ toast('Data deve ser no futuro'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Enviando…'; }
  try{
    // Estratégia: cancela atual + propõe novo. Backend mantém histórico via dataAnterior.
    // Como remarcar pelo médico não tem rota dedicada ainda, faz cancelar + propor.
    var pdAg=null;
    try{
      var pd=(STATE&&STATE.pacienteDetalheCache)||{};
      Object.keys(pd).forEach(function(k){ if(pd[k]&&pd[k].proximoAgendamento&&pd[k].proximoAgendamento.id===agendamentoId) pdAg=pd[k]; });
    }catch(_e){}
    var pacienteId=pdAg&&pdAg.id;
    // 1. Cancela atual silenciosamente
    await window.BACKEND.api('/agendamento/'+encodeURIComponent(agendamentoId)+'/cancelar',{
      method:'POST',
      body:{ motivo: (motivoInp&&motivoInp.value)||'Reagendado pelo médico' }
    });
    // 2. Propoe novo
    if(pacienteId){
      var res=await window.BACKEND.api('/agendamento/propor-retorno',{
        method:'POST',
        body:{ pacienteId:pacienteId, dataHora:novaDataHora.toISOString() }
      });
      if(res&&res.agendamento){
        closeModal();
        toast('Nova data enviada ao paciente.');
        try{ if(pdAg)pdAg.proximoAgendamento=res.agendamento; }catch(_e){}
        if(typeof renderPacienteDetail==='function') renderPacienteDetail();
        return;
      }
    }
    closeModal();
    toast('Retorno cancelado. Crie um novo manualmente.');
    if(typeof renderPacienteDetail==='function') renderPacienteDetail();
  }catch(err){
    toast('Falha de rede — tente novamente');
    if(btn){ btn.disabled=false; btn.textContent='Enviar nova data'; }
  }
}

async function prConfirmarMedico(agendamentoId){
  if(!window.BACKEND||!window.BACKEND.api){ toast('Sistema indisponível'); return; }
  try{
    var res=await window.BACKEND.api('/agendamento/'+encodeURIComponent(agendamentoId)+'/confirmar',{ method:'POST' });
    if(res&&res.agendamento){

      }catch(_e){}
      if(typeof renderPacienteDetail==='function') renderPacienteDetail();
    }else{
      toast((res&&res.erro)||'Erro ao confirmar');
    }
  }catch(_e){ toast('Falha de rede — tente novamente'); }
}

async function prCancelarRetorno(agendamentoId){
  if(!agendamentoId)return;
  if(!confirm('Cancelar este retorno? O paciente será avisado.'))return;
  if(!window.BACKEND||!window.BACKEND.api){ toast('Sistema indisponível'); return; }
  try{
    var res=await window.BACKEND.api('/agendamento/'+encodeURIComponent(agendamentoId)+'/cancelar',{
      method:'POST',
      body:{ motivo:'' }
    });
    if(res&&res.agendamento){
      toast('Retorno cancelado.');
      try{
        var pd=(STATE&&STATE.pacienteDetalheCache)||{};
        Object.keys(pd).forEach(function(k){ if(pd[k]&&pd[k].proximoAgendamento&&pd[k].proximoAgendamento.id===agendamentoId) pd[k].proximoAgendamento=res.agendamento; });
      }catch(_e){}
      if(typeof renderPacienteDetail==='function') renderPacienteDetail();
    }else{
      toast((res&&res.erro)||'Erro ao cancelar');
    }
  }catch(_e){ toast('Falha de rede — tente novamente'); }
}

async function prCarregarRetornos(pacienteId){
  if(!pacienteId||!window.BACKEND||!window.BACKEND.api) return null;
  try{
    var res=await window.BACKEND.api('/agendamento/paciente/'+encodeURIComponent(pacienteId)+'/retornos');
    if(res&&res.retornos&&res.retornos.length){
      // Retorna o primeiro nao-final (AGUARDANDO_PACIENTE | AGUARDANDO_MEDICO | CONFIRMADO)
      var ativo=res.retornos.find(function(r){ return ['AGUARDANDO_PACIENTE','AGUARDANDO_MEDICO','CONFIRMADO'].indexOf(r.statusProposta)>-1; });
      return ativo||res.retornos[0];
    }
  }catch(_e){}
  return null;
}

function renderTemplates(){

// HELPERS basicos
function escHtml(x){ return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(x){ return String(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getInitials(n){
  if(!n) return '--';
  var p = n.replace(/^(Dr\.?\s*|Dra\.?\s*)/i,'').trim().split(/\s+/);
  return p.length>=2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : (p[0]?p[0].substring(0,2).toUpperCase():'--');
}
function pickFoto(o){
  if(!o) return '';

}
function pcCalcAge(dateStr){
  if(!dateStr) return null;
  var d;
  if(String(dateStr).includes('/')){ var p = dateStr.split('/'); d = new Date(p[2], p[1]-1, p[0]); }
  else d = new Date(dateStr);
  if(isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / (365.25*24*60*60*1000));
}
function pcDaysSince(dateStr){
  if(!dateStr) return 999;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}
function pcFmtDateLong(dateStr){
  if(!dateStr) return '--';
  try { return new Date(dateStr).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){ return '--'; }
}
function pcFmtDateTime(dateStr){
  if(!dateStr) return '--';
  try {
    var d = new Date(dateStr);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
           d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  } catch(e){ return '--'; }
}
function pcNormNome(s){
  return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
}
function pcCalcNivel(pc, summary){
  if(typeof pc.nivelBriefing === 'number') return pc.nivelBriefing;
  var r = pc.respostas || {};
  var temAudio = !!pc.audioUrl;
  var temTransc = !!(pc.transcricao && pc.transcricao.trim().length >= 15 && pc.transcricao !== '(áudio sem transcrição)');
  var summaryText = (summary && (summary.textoVoz || summary.summaryTexto)) || pc.summaryIA;
  var temResumo = !!summaryText;
  var temTTS = !!pc.audioSummaryUrl;
  var temTexto = !!(r && Object.keys(r).length > 1);
  if(pc.status !== 'RESPONDIDA') return 0;
  if(temAudio && temTransc && temResumo && temTTS) return 5;
  if(temAudio && temTransc && temResumo) return 4;
  if(temAudio && temTransc) return 3;
  if(temAudio) return 2;
  if(temTexto) return 1;
  return 0;
}
function pcStatusLabel(s){
  var map = { PENDENTE: 'Enviado', ABERTO: 'Enviado', RESPONDIDA: 'Respondido', FINALIZADA: 'Finalizado', EXPIRADA: 'Expirado' };
  return map[s] || s || 'Enviado';
}
function pcFormatTime(s){
  var m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'') + sec;
}
function pcFilterExames(q){

// PLAYER DE AUDIO (canvas waveform + Web Audio API)
if(typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(typeof r === 'number') r = [r,r,r,r];
    var rad = r[0] || 0;
    this.moveTo(x+rad,y); this.lineTo(x+w-rad,y); this.quadraticCurveTo(x+w,y,x+w,y+rad);
    this.lineTo(x+w,y+h-rad); this.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
    this.lineTo(x+rad,y+h); this.quadraticCurveTo(x,y+h,x,y+h-rad);
    this.lineTo(x,y+rad); this.quadraticCurveTo(x,y,x+rad,y); this.closePath();
  };
}
function pcInitAudioContext(){
  if(pcState.audioCtx) return;
  pcState.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  pcState.analyser = pcState.audioCtx.createAnalyser();
  pcState.analyser.fftSize = 128;
  pcState.analyser.smoothingTimeConstant = 0.8;
}
function pcConnectAudioToAnalyser(el){
  if(pcState.audioSource){ try{ pcState.audioSource.disconnect(); }catch(e){} }
  pcState.audioSource = pcState.audioCtx.createMediaElementSource(el);
  pcState.audioSource.connect(pcState.analyser);
  pcState.analyser.connect(pcState.audioCtx.destination);
}
function pcDrawWaveform(){
  if(!pcState.canvasEl || !pcState.canvasCtx || !pcState.analyser) return;
  var dpr = window.devicePixelRatio || 1;
  var W = pcState.canvasEl.width / dpr, H = pcState.canvasEl.height / dpr;
  var bufLen = pcState.analyser.frequencyBinCount;
  var dataArr = new Uint8Array(bufLen);
  function draw(){
    pcState.animFrameId = requestAnimationFrame(draw);
    pcState.analyser.getByteFrequencyData(dataArr);
    pcState.canvasCtx.clearRect(0,0,W,H);
    var barCount = 40, gap = 3, barW = (W - (barCount-1)*gap)/barCount;
    var step = Math.floor(bufLen/barCount);
    for(var i=0;i<barCount;i++){
      var val = dataArr[i*step]/255;
      var barH = Math.max(3, val*H*0.9);
      var x = i*(barW+gap), y = (H-barH)/2;
      var ratio = i/barCount;
      var g = Math.round(229 - ratio*40), b = Math.round(160 + ratio*56);
      pcState.canvasCtx.fillStyle = 'rgba(0,'+g+','+b+','+(0.5+val*0.5)+')';
      pcState.canvasCtx.beginPath(); pcState.canvasCtx.roundRect(x,y,barW,barH,barW/2); pcState.canvasCtx.fill();
    }
  }
  draw();
}
function pcDrawIdleWaveform(){
  if(!pcState.canvasEl || !pcState.canvasCtx) return;
  var dpr = window.devicePixelRatio || 1;
  var W = pcState.canvasEl.width / dpr, H = pcState.canvasEl.height / dpr;
  pcState.canvasCtx.clearRect(0,0,W,H);
  var barCount = 56, gap = 3, barW = (W - (barCount-1)*gap)/barCount;
  var seed = [0.35,0.55,0.75,0.45,0.85,0.6,0.9,0.5,0.7,0.4,0.95,0.55,0.8,0.65,0.35,0.5,0.75,0.6,0.45,0.7,
              0.85,0.55,0.4,0.6,0.75,0.5,0.65,0.45,0.3,0.55,0.7,0.9,0.6,0.4,0.75,0.55,0.85,0.5,0.65,0.45,
              0.6,0.8,0.55,0.4,0.7,0.5,0.65,0.35,0.55,0.75,0.5,0.45,0.7,0.55,0.4,0.6];
  for(var i=0;i<barCount;i++){
    var val = seed[i] || 0.5;
    var barH = Math.max(4, val*H*0.85);
    var x = i*(barW+gap), y = (H-barH)/2;
    var ratio = i/barCount;
    var g = Math.round(229 - ratio*40), b = Math.round(160 + ratio*56);
    pcState.canvasCtx.fillStyle = 'rgba(0,'+g+','+b+',0.55)';
    pcState.canvasCtx.beginPath(); pcState.canvasCtx.roundRect(x,y,barW,barH,barW/2); pcState.canvasCtx.fill();
  }
}
function pcToggleAudio(){
  var player = document.getElementById('pc-audioPlayer');
  if(!player) return;
  if(pcState.ttsPlaying){
    if(pcState.ttsAudio) pcState.ttsAudio.pause();
    pcState.ttsPlaying = false;
    player.classList.remove('playing'); player.classList.add('idle');
    if(pcState.animFrameId){ cancelAnimationFrame(pcState.animFrameId); pcState.animFrameId = null; }
    pcDrawIdleWaveform();
    return;
  }
  var cachedUrl = player.dataset.audioUrl;
  if(cachedUrl){ pcPlayAudioUrl(cachedUrl); return; }
  var pcId = pcState.currentPC && pcState.currentPC.id;
  var token = null;
  try{ token = localStorage.getItem('vitae_token'); }catch(e){}
  if(pcId && token){
    var apiBase = (typeof API_URL !== 'undefined') ? API_URL : 'https://vitae-app-production.up.railway.app';
    fetch(apiBase + '/pre-consulta/' + pcId + '/tts', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(function(r){
      if(!r.ok) return r.json().then(function(j){ throw new Error(j.erro || 'TTS '+r.status); });
      return r.blob();
    }).then(function(blob){
      var url = URL.createObjectURL(blob);
      player.dataset.audioUrl = url;
      pcPlayAudioUrl(url);
    }).catch(function(){ pcFallbackBrowserTTS(); });
    return;
  }
  pcFallbackBrowserTTS();
}
function pcPlayAudioUrl(url){
  var player = document.getElementById('pc-audioPlayer');
  pcInitAudioContext();
  if(pcState.audioCtx.state === 'suspended') pcState.audioCtx.resume();
  if(!pcState.ttsAudio || pcState.ttsAudio.src !== url){
    pcState.ttsAudio = new Audio(url);
    pcState.ttsAudio.crossOrigin = 'anonymous';
    try{ pcConnectAudioToAnalyser(pcState.ttsAudio); }catch(e){}
  }
  if(pcState.audioPlaybackRate) pcState.ttsAudio.playbackRate = pcState.audioPlaybackRate;
  pcState.ttsAudio.play().then(function(){
    pcState.ttsPlaying = true;
    player.classList.add('playing'); player.classList.remove('idle');
    pcDrawWaveform();
  }).catch(function(){ pcFallbackBrowserTTS(); });
  pcState.ttsAudio.onloadedmetadata = function(){
    var tot = document.getElementById('pc-audioTimerTotal');
    if(tot && pcState.ttsAudio.duration) tot.textContent = '-' + pcFormatTime(pcState.ttsAudio.duration);
    var dur = document.getElementById('pc-audioDur');
    if(dur && pcState.ttsAudio.duration) dur.textContent = pcFormatTime(pcState.ttsAudio.duration);
  };
  pcState.ttsAudio.ontimeupdate = function(){
    var pct = pcState.ttsAudio.duration ? (pcState.ttsAudio.currentTime / pcState.ttsAudio.duration * 100) : 0;
    var fill = document.getElementById('pc-progressFill');
    if(fill) fill.style.width = pct + '%';
    var cur = document.getElementById('pc-audioTimerCurrent');
    var tot = document.getElementById('pc-audioTimerTotal');
    if(cur) cur.textContent = pcFormatTime(pcState.ttsAudio.currentTime);
    if(tot && pcState.ttsAudio.duration){
      var remain = Math.max(0, pcState.ttsAudio.duration - pcState.ttsAudio.currentTime);
      tot.textContent = '-' + pcFormatTime(remain);
    }
    pcAtualizarKaraoke(pcState.ttsAudio.currentTime);
  };
  pcState.ttsAudio.onended = function(){
    pcState.ttsPlaying = false;
    player.classList.remove('playing'); player.classList.add('idle');
    if(pcState.animFrameId){ cancelAnimationFrame(pcState.animFrameId); pcState.animFrameId = null; }
    pcDrawIdleWaveform();
    var fill = document.getElementById('pc-progressFill');
    if(fill) fill.style.width = '0%';
    pcState.lastKaraokeIdx = null;
    document.querySelectorAll('.tw-word').forEach(function(s){ s.classList.remove('current'); s.classList.add('spoken'); });
  };
}
function pcSeekAudio(e){
  if(!pcState.ttsAudio || !pcState.ttsAudio.duration) return;
  var rect = e.currentTarget.getBoundingClientRect();
  pcState.ttsAudio.currentTime = ((e.clientX - rect.left)/rect.width) * pcState.ttsAudio.duration;
}
function pcSkipAudio(delta){
  if(!pcState.ttsAudio) return;
  pcState.ttsAudio.currentTime = Math.max(0, Math.min(pcState.ttsAudio.duration || 0, (pcState.ttsAudio.currentTime || 0) + delta));
  var btn = delta > 0 ? document.getElementById('pc-skipFwd5') : document.getElementById('pc-skipBack5');
  if(btn){ btn.classList.add('flash'); setTimeout(function(){ btn.classList.remove('flash'); }, 200); }
}
var PC_SPEED_CYCLE = [1, 1.5, 2];
function pcCicloVelocidade(){
  var atual = pcState.audioPlaybackRate || 1;
  var idx = PC_SPEED_CYCLE.indexOf(atual);
  var prox = PC_SPEED_CYCLE[(idx + 1) % PC_SPEED_CYCLE.length];
  if(pcState.ttsAudio) pcState.ttsAudio.playbackRate = prox;
  pcState.audioPlaybackRate = prox;
  var btn = document.getElementById('pc-speedCycle');
  if(btn){ btn.textContent = prox + 'x'; btn.classList.toggle('boosted', prox !== 1); }
}
function pcFallbackBrowserTTS(){
  var player = document.getElementById('pc-audioPlayer');
  var text = player ? player.dataset.summaryText : '';
  if(!text || !window.speechSynthesis) return;
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'pt-BR'; utt.rate = 0.95;
  utt.onstart = function(){ pcState.ttsPlaying = true; if(player){ player.classList.add('playing'); player.classList.remove('idle'); } };
  utt.onend = function(){ pcState.ttsPlaying = false; if(player){ player.classList.remove('playing'); player.classList.add('idle'); } };
  speechSynthesis.speak(utt);
}
function pcStopAudio(){
  if(pcState.ttsAudio){ try{ pcState.ttsAudio.pause(); }catch(e){} pcState.ttsAudio = null; }
  pcState.ttsPlaying = false;
  if(pcState.animFrameId){ cancelAnimationFrame(pcState.animFrameId); pcState.animFrameId = null; }
  pcState.transcricaoPalavras = [];
  pcState.lastKaraokeIdx = null;
  if(typeof speechSynthesis !== 'undefined') try{ speechSynthesis.cancel(); }catch(e){}
}

function pcToggleTranscricao(){
  var t = document.getElementById('pc-transToggle');
  var box = document.getElementById('pc-transBox');
  var lbl = document.getElementById('pc-transToggleLabel');
  if(!t || !box) return;
  var aberto = box.classList.toggle('open');
  t.classList.toggle('open', aberto);
  if(lbl) lbl.textContent = aberto ? 'Ocultar transcricao' : 'Ver transcricao';
  if(aberto) pcSetupTransScrollListener();
}
function pcSeekToWord(idx){
  if(!pcState.transcricaoPalavras.length) return;
  var inner = document.getElementById('pc-transInner');
  if(inner){
    var spans = inner.querySelectorAll('.tw-word');
    if(spans[idx]){ spans[idx].classList.remove('pulse'); void spans[idx].offsetWidth; spans[idx].classList.add('pulse'); }
  }
  var player = document.getElementById('pc-audioPlayer');
  var cachedUrl = player && player.dataset.audioUrl;
  if(!pcState.ttsAudio && cachedUrl){
    pcPlayAudioUrl(cachedUrl);
    var tryNav = function(){
      if(pcState.ttsAudio && pcState.ttsAudio.duration){ pcState.ttsAudio.currentTime = idx * (pcState.ttsAudio.duration / pcState.transcricaoPalavras.length); }
      else setTimeout(tryNav, 100);
    };
    tryNav();
    return;
  }
  if(pcState.ttsAudio && pcState.ttsAudio.duration){
    pcState.ttsAudio.currentTime = idx * (pcState.ttsAudio.duration / pcState.transcricaoPalavras.length);
  }
}
function pcSetupTransScrollListener(){
  var box = document.getElementById('pc-transBox');
  if(!box || box._scrollBound) return;
  box._scrollBound = true;
  box.addEventListener('scroll', function(){
    if(window._programmaticScroll) return;
    pcState.autoFollowPausedUntil = Date.now() + 4000;
  });
}
function pcAtualizarKaraoke(currentTime){
  if(!pcState.transcricaoPalavras.length || !pcState.ttsAudio || !pcState.ttsAudio.duration) return;
  var inner = document.getElementById('pc-transInner');
  if(!inner) return;
  var tpp = pcState.ttsAudio.duration / pcState.transcricaoPalavras.length;
  var idxAtual = Math.floor((currentTime + 0.2) / tpp);
  if(idxAtual >= pcState.transcricaoPalavras.length) idxAtual = pcState.transcricaoPalavras.length - 1;
  if(idxAtual < 0) idxAtual = -1;
  if(pcState.lastKaraokeIdx === idxAtual) return;
  pcState.lastKaraokeIdx = idxAtual;
  var spans = inner.querySelectorAll('.tw-word');
  spans.forEach(function(s, i){
    s.classList.remove('current','spoken');
    if(i < idxAtual) s.classList.add('spoken');
    else if(i === idxAtual) s.classList.add('current');
  });
  if(Date.now() < pcState.autoFollowPausedUntil) return;
  var box = document.getElementById('pc-transBox');
  if(box && box.classList.contains('open') && idxAtual >= 0 && spans[idxAtual]){
    var boxRect = box.getBoundingClientRect();
    var curRect = spans[idxAtual].getBoundingClientRect();
    var targetY = boxRect.top + 72;
    if(curRect.top < boxRect.top + 10 || curRect.top > targetY + 30){
      window._programmaticScroll = true;
      box.scrollTop += (curRect.top - targetY);
      setTimeout(function(){ window._programmaticScroll = false; }, 50);
    }
  }
}

var CRIAR_PC_STATE={pacienteId:null,nome:'',phone:'',email:'',templateId:'',obs:'',dataConsulta:'',horaConsulta:'',origemSlotId:null};
function abrirCriarPC(pacienteIdOuOpts){
  // Aceita: abrirCriarPC('p1') OU abrirCriarPC({pacienteId, nome, telefone, dataConsulta, horaConsulta, slotId})
  var primeiroTplReal = (TEMPLATES && TEMPLATES.length > 0) ? TEMPLATES[0].id : '';
  var opts = {};
  if (typeof pacienteIdOuOpts === 'string') opts.pacienteId = pacienteIdOuOpts;
  else if (pacienteIdOuOpts && typeof pacienteIdOuOpts === 'object') opts = pacienteIdOuOpts;
  CRIAR_PC_STATE={
    pacienteId:opts.pacienteId||null,
    nome:opts.nome||'', phone:opts.telefone||'', email:opts.email||'',
    templateId:primeiroTplReal, obs:'',
    dataConsulta:opts.dataConsulta||'', horaConsulta:opts.horaConsulta||'',
    origemSlotId:opts.slotId||null
  };
  if(opts.pacienteId && !CRIAR_PC_STATE.nome){
    var p=PACIENTES.find(function(x){return x.id===opts.pacienteId;});
    if(p){CRIAR_PC_STATE.nome=p.nome;CRIAR_PC_STATE.phone=p.telefone||'';CRIAR_PC_STATE.email=p.email||'';}

}

// Atualiza o botao "Gerar link" dinamicamente conforme medico digita o nome
// (sem re-render, sem perder foco do input).
function cpcAtualizarBotao(){
  var btn = document.getElementById('cpcGerarBtn');
  if (!btn) return;
  var nomeOk = (CRIAR_PC_STATE.nome||'').trim().length >= 2;
  var dataOk = !!(CRIAR_PC_STATE.dataConsulta && CRIAR_PC_STATE.horaConsulta);
  var formOk = nomeOk && dataOk;
  if (formOk) {
    btn.removeAttribute('disabled');
    btn.style.opacity = '';
    btn.style.cursor = '';
    btn.style.boxShadow = '0 6px 20px rgba(0,229,160,.28)';
  } else {
    btn.setAttribute('disabled','disabled');
    btn.style.opacity = '.5';
    btn.style.cursor = 'not-allowed';
    btn.style.boxShadow = '';
  }
}
window.cpcAtualizarBotao = cpcAtualizarBotao;

// Helper: extrai só dígitos de um texto
function _soDigitos(s){ return String(s||'').replace(/\D/g,''); }

// Máscara de telefone (XX) XXXXX-XXXX — aplicada conforme médico digita
function mascararTelefone(input){
  var d = _soDigitos(input.value).slice(0, 11);
  var out = '';
  if (d.length > 0) out = '(' + d.slice(0,2);
  if (d.length >= 3) out += ') ' + d.slice(2,7);
  if (d.length >= 8) out += '-' + d.slice(7,11);
  input.value = out;
  return d; // retorna só os dígitos pra salvar no STATE
}
window.mascararTelefone = mascararTelefone;

async function cpcGerarEEnviar(){
  var s = CRIAR_PC_STATE;
  if (!s.nome || !s.nome.trim() || s.nome.trim().length < 2) {
    toast('Preencha o nome do paciente');
    var i = document.getElementById('cpcNome'); if (i) i.focus();
    return;
  }
  /* Sessao 22 — data e hora da consulta obrigatorias */
  if (!s.dataConsulta || !s.horaConsulta) {
    toast('Preencha data e hora da consulta');
    var inpD = document.getElementById('cpcData'); if (inpD && !s.dataConsulta) { inpD.focus(); return; }
    var inpH = document.getElementById('cpcHora'); if (inpH && !s.horaConsulta) { inpH.focus(); return; }
    return;
  }

  // Telefone (se preenchido) precisa estar completo (11 dígitos)
  var telefoneDigitos = _soDigitos(s.phone);
  if (telefoneDigitos && telefoneDigitos.length !== 11) {
    toast('Telefone incompleto — precisa de DDD + 9 dígitos');
    var t = document.getElementById('cpcPhone'); if (t) t.focus();
    return;
  }

  // 1) ABRE WHATSAPP IMEDIATAMENTE no clique (user-initiated, sem bloqueio popup)
  // Janela vazia agora; URL final preenchida quando link voltar do backend
  var waWindow = null;
  if (telefoneDigitos) {
    try { waWindow = window.open('about:blank', '_blank'); } catch(_e){}
  }

  // 2) Tela de loading na propria view (mantem layout da tela criar-pc)
  var htmlLoading = '<div style="max-width:560px;margin:80px auto;text-align:center;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:20px"><div class="ia-orb" style="margin:0 auto 20px"></div><div style="font-size:18px;font-weight:900;letter-spacing:-.3px;margin-bottom:6px" id="cpcStg">Gerando link único da pré-consulta</div><div style="font-size:13px;color:var(--t3);margin-bottom:18px"><span class="ia-dots"><span></span><span></span><span></span></span></div><div class="ia-bar" style="max-width:280px;margin:0 auto"><div class="ia-bar-fill" style="animation-duration:2s"></div></div></div>';
  $('v-criar-pc').innerHTML = htmlLoading;

  setTimeout(function(){var e=document.getElementById('cpcStg');if(e)e.textContent='Personalizando template para '+s.nome.split(' ')[0];}, 700);

  // 3) Cria pré-consulta no backend
  // IMPORTANTE: backend rejeita campos opcionais como null (Zod).
  // Estrategia: monta payload incluindo SO os campos preenchidos.
  // E so envia templateId se for UUID real (nao 't1' do mock antigo).
  var pcCriada = null;
  var erroBackend = null;
  var payload = { pacienteNome: s.nome.trim() };
  if (telefoneDigitos) payload.pacienteTel = '+55' + telefoneDigitos;
  var emailLimpo = (s.email || '').trim();
  if (emailLimpo) payload.pacienteEmail = emailLimpo;
  /* Sessao 22 — manda dataConsulta como ISO 8601 (YYYY-MM-DDTHH:mm:00) */
  payload.dataConsulta = s.dataConsulta + 'T' + s.horaConsulta + ':00';
  // Valida templateId: deve ser UUID (8-4-4-4-12 chars hex). 't1', 't2'... do mock nao passam.
  var tplId = (s.templateId || '').trim();
  if (tplId && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(tplId)) {
    payload.templateId = tplId;
  }
  var obsLimpo = (s.obs || '').trim();
  if (obsLimpo) payload.observacoes = obsLimpo;

  try {
    if (window.BACKEND && typeof window.BACKEND.criarPC === 'function') {
      pcCriada = await window.BACKEND.criarPC(payload);
    } else {
      erroBackend = 'BACKEND.criarPC nao disponivel';
    }
  } catch(e){ pcCriada = null; erroBackend = e && e.message; }

  // Pega token REAL do backend. SE NAO TIVER, e bug — NAO inventar mock
  // (mock-XXX gera link que paciente abre e ve "Link nao encontrado", porque
  // esse token nunca foi salvo no banco). Mostra erro claro pro medico.
  var pc = (pcCriada && (pcCriada.preConsulta || pcCriada)) || null;
  var tokenReal = pc && (pc.linkToken || pc.token);

  if (!tokenReal) {
    // Fecha janela WhatsApp aberta (estava em about:blank)
    if (waWindow) { try { waWindow.close(); } catch(_e){} }
    var motivo = erroBackend || 'Servidor nao retornou o token. Pode ser sessao expirada — faca login de novo.';
    var htmlErro = '<div style="max-width:560px;margin:80px auto;text-align:center;padding:40px;background:#FEF3F2;border:1px solid #FECDCA;border-radius:20px">'+
      '<div style="width:56px;height:56px;border-radius:50%;background:#FEE4E2;display:flex;align-items:center;justify-content:center;margin:0 auto 18px"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#B42318" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>'+
      '<div style="font-size:18px;font-weight:900;color:#0D0F14;margin-bottom:10px">Nao foi possivel criar a pre-consulta</div>'+
      '<div style="font-size:13.5px;color:#4B5563;line-height:1.5;margin-bottom:22px">'+escapeHtml(motivo)+'</div>'+
      '<button class="btn btn-p" onclick="renderCriarPC()" style="width:100%;height:48px">Tentar de novo</button>'+
      '<button class="btn btn-ghost" onclick="goto(\'pre-consultas\')" style="width:100%;height:44px;margin-top:8px">Voltar pra Pre-Consultas</button>'+
      '</div>';
    $('v-criar-pc').innerHTML = htmlErro;
    return;
  }

  var link = 'https://vitae-app.vercel.app/pre-consulta.html?token=' + encodeURIComponent(tokenReal);
  var token = tokenReal;

  // 4) Se telefone preenchido, redireciona janela WhatsApp pra URL final com mensagem pronta
  if (telefoneDigitos && waWindow) {
    var nomeMedico = (DR && DR.nome) ? DR.nome.split(' ')[0] : 'seu médico';
    var primNome = s.nome.split(' ')[0];
    /* Sessao 22 — mensagem agora inclui data e hora da consulta */
    var dtConsulta = new Date(s.dataConsulta + 'T' + s.horaConsulta + ':00');
    var dataFmt = dtConsulta.toLocaleDateString('pt-BR', { day:'2-digit', month:'long' });
    var msg = 'Olá ' + primNome + ', sou da equipe do Dr. ' + nomeMedico + '. Sua consulta é ' + dataFmt + ' às ' + s.horaConsulta + '. Antes do atendimento, gravei essa pré-consulta de 4 minutos pra entender melhor o que você está sentindo: ' + link;
    var waUrl = 'https://wa.me/55' + telefoneDigitos + '?text=' + encodeURIComponent(msg);
    try { waWindow.location.href = waUrl; } catch(_e){
      try { waWindow.close(); } catch(_e2){}
    }
  }

  // 5) Atualiza STATE com link gerado e re-renderiza tela (formulário desabilitado + link embaixo)
  CRIAR_PC_STATE.linkGerado = link;
  CRIAR_PC_STATE.whatsappAberto = !!(telefoneDigitos && waWindow);
  CRIAR_PC_STATE.tokenGerado = token;
  setTimeout(function(){ renderCriarPC(); }, 500);

  // 6) Atualiza lista PCS local com a nova pré-consulta (pra aparecer na tela Pré-Consultas)
  if (pc) {
    var nomePac = pc.pacienteNome || s.nome;
    PCS[pc.id || token] = {
      id: pc.id || token,
      pacienteId: (pc.paciente && pc.paciente.id) || pc.pacienteId || null,
      pacienteNome: nomePac,
      paciente: nomePac,
      ini: nomePac.split(' ').filter(Boolean).slice(0,2).map(function(x){return x[0];}).join('').toUpperCase(),
      status: 'aguardando',
      linkToken: token,
      criada: pc.criadoEm || new Date().toISOString(),
      criadaEm: pc.criadoEm || new Date().toISOString(),
      dataConsulta: pc.dataConsulta || (s.dataConsulta + 'T' + s.horaConsulta + ':00'),
      recordedAt: 'agora há pouco',
      templateNome: (TEMPLATES.find(function(t){return t.id===s.templateId;})||{nome:'Geral'}).nome,
      cobertura: 'sem',
      queixaSnippet: 'Aguardando paciente responder'
    };
  }
  /* Sessao 22 — se veio de slot Calendar, vincula */
  if (pc && s.origemSlotId) {
    var slotVinc = AGENDA_HOJE.find(function(x){return x.id === s.origemSlotId;});
    if (slotVinc) slotVinc.pcId = pc.id || token;
  }
}

// Conexão REAL com Google Calendar via OAuth (Fase 10)
async function conectarCalendarReal(){
  if (!window.BACKEND) { toast('Sistema indisponível, recarregue a página'); return; }
  try {
    var res = await window.BACKEND.api('/agenda/google/auth');
    var data = await res.json().catch(function(){ return {}; });

    if (res.status === 503 && (data.code === 'GCAL_DESATIVADO' || /desativ|desabili/i.test(data.erro||''))) {
      // OAuth não configurado no servidor — sinaliza estado "Em breve" institucional
      STATE.calendar.oauthDisponivel = false;
      goto('calendar');
      return;
    }
    if (!res.ok) {
      toast('Não foi possível conectar agora. Tente em alguns segundos.');
      return;
    }
    var url = (data.data && data.data.url) || data.url;
    if (url) {
      try { sessionStorage.setItem('vitae_calendar_oauth_pending', '1'); } catch(e){}
      window.location.href = url;
    } else {
      // Sem URL — provavelmente OAuth ainda não configurado
      STATE.calendar.oauthDisponivel = false;
      goto('calendar');
    }
  } catch(e) {
    toast('Sem conexão com o servidor');
  }
}

async function desconectarCalendar(){

  if (!window.BACKEND) { toast('Sistema indisponível'); return; }
  try {
    var res = await window.BACKEND.api('/agenda/google/desconectar', { method: 'DELETE' });

    if (typeof renderPerfil === 'function' && STATE.view === 'perfil') renderPerfil();
    toast('Calendar desconectado');
  } catch(e) {
    toast('Sem conexão');
  }
}

/* ============================================
   CALIBRAÇÃO MENSAL — banner check-in
   ============================================
   Após 30 dias do setup (ou 30 dias da última calibração), mostra banner
   discreto perguntando se os números fazem sentido. Se médico discordar,
   sugere ajuste do percentualEconomiaAnamnese (input mais fácil de calibrar).
*/

function verificarCalibracaoPendente(){
  // Pega métricas do período mais longo (30dias) pra ter dados representativos
  var imp = STATE.metricas['30dias'] || STATE.metricas['mes'];
  if (!imp || imp.setupConcluido === false) return;
  if (imp.consultasMedidas < 10) return; // precisa de volume mínimo

  var d = imp.detalhe || {};
  var calibradoEm = d.calibradoEm;
  var setupConfigDate = null;

  // Considera "precisa calibrar" se:
  //   - nunca calibrou E setup tem >30 dias de uso (>=10 consultas medidas é proxy)
  //   - OU última calibração foi >30 dias
  var precisaCalibrar = false;
  if (!calibradoEm) {
    precisaCalibrar = imp.consultasMedidas >= 10;
  } else {
    var diasDesdeCalib = (Date.now() - new Date(calibradoEm).getTime()) / (1000*60*60*24);
    precisaCalibrar = diasDesdeCalib >= 30;
  }
  if (!precisaCalibrar) return;

  // Verifica se médico dispensou nas últimas 24h
  var dispensadoAte = parseInt(localStorage.getItem('vitae_calibracao_dispensada_ate') || '0', 10);
  if (Date.now() < dispensadoAte) return;

  showBanner('calibracao', 'info',
    'Suas métricas estão calibradas com '+imp.consultasMedidas+' pré-consultas. Faz sentido o que você está vendo?',
    [
      { t: 'Confirmar', fn: 'calibracaoResponder(\'ok\')' },
      { t: 'Ajustar', fn: 'modalCalibracaoAjuste()' },
      { t: 'Depois', fn: 'calibracaoLembrarDepois()' },
    ]
  );
}
window.verificarCalibracaoPendente = verificarCalibracaoPendente;

async function calibracaoResponder(resposta, ajustes){
  if (!window.BACKEND) { toast('Sistema indisponível'); return; }
  try {
    var body = { resposta: resposta };
    if (ajustes) body.ajustes = ajustes;
    var res = await window.BACKEND.api('/medico/metricas/calibracao', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) { toast('Não foi possível salvar'); return; }
    closeBanner('calibracao');
    closeModal();
    toastT('Obrigado pelo retorno','ok');
    invalidarCacheMetricas();
    if (STATE.view === 'hoje') renderHoje();
  } catch(e) {
    toast('Sem conexão');
  }
}
window.calibracaoResponder = calibracaoResponder;

/* ============================================================
   TOAST 4 TIPOS + UNDO
   ============================================================ */
function toastT(msg,tipo,undoFn){
  tipo=tipo||'ok';
  var t=$('toast');
  var dotCls='dot dot-'+tipo;
  var html='<div class="'+dotCls+'"></div><span>'+msg+'</span>';
  if(undoFn){
    html+='<button class="toast-undo-btn" id="undoBtn">Desfazer</button><span class="toast-countdown" id="undoCnt">5s</span>';
  }
  t.innerHTML=html;
  t.className='toast toast-'+tipo;
  t.classList.add('show');
  clearTimeout(window._toastT);
  if(undoFn){
    var sec=5;
    var cntEl=document.getElementById('undoCnt');
    document.getElementById('undoBtn').onclick=function(){clearInterval(window._undoI);t.classList.remove('show');undoFn();toastT('Restaurado','info');};
    window._undoI=setInterval(function(){sec--;if(cntEl)cntEl.textContent=sec+'s';if(sec<=0){clearInterval(window._undoI);t.classList.remove('show');}},1000);
    window._toastT=setTimeout(function(){t.classList.remove('show');},5400);
  }else{
    window._toastT=setTimeout(function(){t.classList.remove('show');},2400);
  }
}

async function salvarEditField(key){
  var val=document.getElementById('editFieldInput').value;
  // Mapeia para campo do backend
  var mapBackend = {
    nome: { campo:'nome', endpoint:'/perfil/conta', method:'PATCH' },
    email: { campo:'email', endpoint:'/perfil/conta', method:'PATCH' },
    telefone: { campo:'telefoneClinica', endpoint:'/medico', method:'PUT' },
    crm: { campo:'crm', endpoint:'/medico', method:'PUT' },
    especialidade: { campo:'especialidade', endpoint:'/medico', method:'PUT' },
    clinica: { campo:'clinica', endpoint:'/medico', method:'PUT' },
    endereco: { campo:'enderecoClinica', endpoint:'/medico', method:'PUT' }
  };
  var cfg = mapBackend[key];
  if (cfg && window.BACKEND) {
    var body = {}; body[cfg.campo] = val;
    try {
      var res = await window.BACKEND.api(cfg.endpoint, { method: cfg.method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) {
        var d = await res.json().catch(function(){return {};});
        toastT('Não foi possível salvar: ' + (d.erro || 'erro ' + res.status), 'warn');
        return;
      }
    } catch(e) {
      toastT('Sem conexão. Tente novamente.', 'warn');
      return;
    }
  }
  // sucesso → atualiza mock + UI
  if(key==='nome'){DR.nome=val; try{var u=JSON.parse(localStorage.getItem('vitae_usuario')||'{}');u.nome=val;localStorage.setItem('vitae_usuario',JSON.stringify(u));}catch(e){}}
  else if(key==='crm')DR.crm=val;
  else if(key==='especialidade')DR.especialidade=val;
  else if(key==='clinica')DR.clinica=val;
  else if(key==='endereco')DR.endereco=val;
  else if(key==='telefone')DR.telefone=val;
  else if(key==='email'){DR.email=val; try{var u2=JSON.parse(localStorage.getItem('vitae_usuario')||'{}');u2.email=val;localStorage.setItem('vitae_usuario',JSON.stringify(u2));}catch(e){}}
  closeModal(); renderPerfil(); toastT('Salvo','ok');
}

function abrirCriarTemplate(){TPL_CREATE_STATE={step:1,nome:'',perguntas:[],audio:true,foto:false,edit:false,id:null};goto('templates-criar');}
/* Carrega perguntas reais de um template base ao clicar em "Geral (11)" etc */
function carregarTemplateBase(tid){
  var t = TEMPLATES.find(function(x){return x.id===tid;});
  var perguntasReais = (PERGUNTAS_TEMPLATE[tid]||[]).map(function(txt){return {texto:txt};});
  if (!perguntasReais.length) {
    perguntasReais = Array(t.perguntas).fill().map(function(_,i){return {texto:'Pergunta '+(i+1)};});
  }
  TPL_CREATE_STATE.perguntas = perguntasReais;
  if (!TPL_CREATE_STATE.nome) TPL_CREATE_STATE.nome = t.nome;
  TPL_CREATE_STATE.audio = t.audio;
  TPL_CREATE_STATE.step = 2;
  renderTemplatesCriar();
}
function abrirEditarTemplate(id){
  var t=TEMPLATES.find(function(x){return x.id===id;});
  var perguntasReais = (PERGUNTAS_TEMPLATE[id]||[]).map(function(txt){return {texto:txt};});
  if (perguntasReais.length === 0) {
    /* template criado pelo médico (sem perguntas reais armazenadas) — fallback genérico */
    perguntasReais = Array(t.perguntas).fill().map(function(_,i){return {texto:'Pergunta '+(i+1)};});
  }
  TPL_CREATE_STATE={step:1,nome:t.nome,perguntas:perguntasReais,audio:t.audio,foto:false,edit:true,id:id};
  goto('templates-criar');
}

  {sel:null,t:'Bem-vindo aos Templates',d:'Aqui você cria os formulários que o paciente responde antes da consulta. Templates são reutilizáveis — crie uma vez, use sempre.'},
  {sel:'.tpln-grid',t:'Seus templates',d:'Cada card é um template. Clique pra editar, duplicar ou excluir. O ícone de "padrão" é o que vai por default em pré-consultas novas.'},

];
function iniciarTour(){if(localStorage.getItem('vitae_tour_visto'))return;TOUR_STEP=0;mostrarTour();}
function mostrarTour(){
  if(TOUR_STEP>=TOUR_STEPS.length){fecharTour();return;}
  var s=TOUR_STEPS[TOUR_STEP];
  $('spotBg').classList.add('show');
  var rect={top:'50%',left:'50%',width:0,height:0};
  if(s.sel){var el=document.querySelector(s.sel);if(el){var r=el.getBoundingClientRect();rect={top:r.top,left:r.left,width:r.width,height:r.height};}}
  var card=$('spotCard');
  card.innerHTML='<div class="spot-step">Passo '+(TOUR_STEP+1)+' de '+TOUR_STEPS.length+'</div><div class="spot-t">'+s.t+'</div><div class="spot-d">'+s.d+'</div><div class="spot-acts"><button class="btn btn-ghost btn-sm" onclick="fecharTour()">Pular</button><button class="btn btn-p btn-sm" onclick="proxTour()">'+(TOUR_STEP===TOUR_STEPS.length-1?'Pronto':'Próximo')+'</button></div><div class="spot-progress">'+TOUR_STEPS.map(function(_,i){return '<div class="dot '+(i<=TOUR_STEP?'on':'')+'"></div>';}).join('')+'</div>';
  if(s.sel&&rect.width){card.style.top=Math.min(window.innerHeight-260,rect.top+rect.height+12)+'px';card.style.left=Math.min(window.innerWidth-360,Math.max(20,rect.left))+'px';}
  else{card.style.top='50%';card.style.left='50%';card.style.transform='translate(-50%,-50%)';}
}
function proxTour(){TOUR_STEP++;mostrarTour();}
function fecharTour(){$('spotBg').classList.remove('show');try{localStorage.setItem('vitae_tour_visto','1');}catch(e){}}

/* ============================================================
   ATALHOS DE TECLADO
   ============================================================ */
var KBD_BUF='';
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Escape'){closeModal();closeSheet();fecharTour();return;}
  if(e.key==='?'){modalAtalhos();return;}
  if(e.key==='/'){e.preventDefault();var i=document.querySelector('.view:not([style*="none"]) input[type="text"], .view:not([style*="none"]) input:not([type])');if(i)i.focus();return;}
  if(e.key==='n'){if(STATE.view==='templates'){abrirCriarTemplate();}else{modalCriarPC();}return;}
  if(e.key==='g'){KBD_BUF='g';setTimeout(function(){KBD_BUF='';},900);return;}
  if(KBD_BUF==='g'){
    if(e.key==='h'){goto('hoje');KBD_BUF='';}
    else if(e.key==='p'){goto('pre-consultas');KBD_BUF='';}
    else if(e.key==='a'){goto('pacientes');KBD_BUF='';}
    else if(e.key==='t'){goto('templates');KBD_BUF='';}
    else if(e.key==='m'){goto('perfil');KBD_BUF='';}
  }
});

function confeteFire(){

  for(var i=0;i<32;i++){var p=document.createElement('div');p.className='confete-piece';p.style.left=Math.random()*100+'%';p.style.background=cores[i%cores.length];p.style.animationDelay=(Math.random()*.5)+'s';p.style.animationDuration=(2+Math.random()*1.2)+'s';w.appendChild(p);}
  setTimeout(function(){w.innerHTML='';},3500);
}
