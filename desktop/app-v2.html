<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vitaid · Plataforma Médica</title>
<script>
// ===== AUTH GATE (Fase 3) =====
(function(){
  try {
    var token = localStorage.getItem('vitae_token');
    var raw = localStorage.getItem('vitae_usuario');
    var u = raw ? JSON.parse(raw) : null;
    if (!token || !u || u.tipo !== 'MEDICO') {
      window.location.replace('01-login.html');
    }
  } catch(e) { window.location.replace('01-login.html'); }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="desktop-core.css" rel="stylesheet">
<style>
/* ============================================================
   OVERRIDES E COMPONENTES NOVOS DO REDESIGN
   (CSS base vem do desktop-core.css)
   ============================================================ */

/* HOJE — Painel impacto */
.imp-panel{background:linear-gradient(135deg,rgba(0,229,160,.05),rgba(0,180,216,.03));border:1px solid rgba(0,229,160,.18);border-radius:14px;padding:22px;margin-bottom:18px}
.imp-tabs{display:inline-flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:3px;margin-bottom:18px}
.imp-tab{padding:7px 14px;border-radius:100px;border:0;background:transparent;color:var(--t2);font-family:var(--font);font-size:11.5px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.imp-tab.on{background:var(--grad);color:var(--dark)}
.imp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.imp-num{font-size:30px;font-weight:900;letter-spacing:-1.2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.imp-lbl{font-size:11px;color:var(--t2);margin-top:6px;font-weight:600;letter-spacing:.04em}
.imp-help{font-size:10.5px;color:var(--t3);margin-top:14px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border-bottom:1px dashed var(--t4);padding-bottom:1px}
.imp-help:hover{color:var(--t2)}

/* HOJE — Stat cards 4 colunas */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:.15s}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.05)}
.stat-num{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.stat-num.green{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-num.warn{color:var(--warn)}
.stat-num.bad{color:var(--bad)}
.stat-lbl{font-size:11.5px;color:var(--t3);margin-top:6px;font-weight:600;line-height:1.4}

/* HOJE — Grid principal */
.hoje-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
@media(max-width:1100px){.hoje-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}.imp-row{grid-template-columns:1fr}}

/* HOJE — Card genérico de seção */
.h-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.h-card-h{padding:18px 22px 6px}
.h-card-t{font-size:14px;font-weight:800;letter-spacing:-.2px}
.h-card-s{font-size:11.5px;color:var(--t3);margin-top:3px}

/* AGENDA DO DIA */
.ag-row{display:grid;grid-template-columns:64px 1fr auto;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .12s}
.ag-row:hover{background:var(--bg)}
.ag-row:last-child{border-bottom:0}
.ag-time{font-size:12px;font-weight:800;color:var(--t2);letter-spacing:.04em;font-variant-numeric:tabular-nums}
.ag-name{font-size:14px;font-weight:700;color:var(--t1)}
.ag-q{font-size:11.5px;color:var(--t3);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ag-st{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:100px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px}
.ag-st .dot{width:5px;height:5px;border-radius:50%}
.ag-st.ready{background:rgba(0,196,122,.10);color:#00C47A}.ag-st.ready .dot{background:#00C47A}
.ag-st.partial{background:rgba(59,130,246,.10);color:var(--info)}.ag-st.partial .dot{background:var(--info)}
.ag-st.alert{background:rgba(245,158,11,.10);color:#B45309}.ag-st.alert .dot{background:var(--warn)}
.ag-st.miss{background:rgba(239,68,68,.10);color:var(--bad)}.ag-st.miss .dot{background:var(--bad)}

/* ANÁLISE PROSÓDICA */
.alert-prosodica{background:linear-gradient(135deg,rgba(245,158,11,.10),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:18px;margin-bottom:14px}
.ap-h{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--warn);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-ico{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:1px solid currentColor;font-size:9px;font-weight:900;cursor:help;position:relative}
.info-ico:hover .info-tip{visibility:visible;opacity:1}
.info-tip{visibility:hidden;opacity:0;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:280px;background:var(--dark);color:#fff;padding:12px 14px;border-radius:10px;font-size:11.5px;font-weight:500;line-height:1.5;letter-spacing:0;text-transform:none;z-index:50;transition:.15s;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.info-tip strong{color:var(--green);font-weight:700}
.info-tip::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--dark);border-top:0}
.ap-b{font-size:12.5px;color:var(--t1);line-height:1.55}
.ap-b strong{font-weight:800}
.ap-feat{font-size:11px;color:var(--t3);margin-top:8px;font-family:monospace;line-height:1.6}
.ap-nav{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed rgba(245,158,11,.20)}
.ap-arrow{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid rgba(245,158,11,.25);color:var(--warn);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:16px;font-weight:800;transition:.15s}
.ap-arrow:hover:not(:disabled){background:rgba(245,158,11,.10)}
.ap-arrow:disabled{opacity:.30;cursor:not-allowed}
.ap-pos{font-size:11px;color:var(--warn);font-weight:700;font-variant-numeric:tabular-nums;padding:0 6px}

/* AUTOMAÇÕES */
.auto-stack{display:flex;flex-direction:column;gap:8px;padding:6px 18px 18px}
.auto-card{background:var(--bg);border:1px dashed var(--b2);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;transition:.15s}
.auto-card:hover{background:var(--s2)}
.auto-ico{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--info)}
.auto-ico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.auto-t{font-size:12.5px;font-weight:700;color:var(--t1)}
.auto-d{font-size:11.5px;color:var(--t3);margin-top:3px;line-height:1.45}
.auto-btn{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--t2);padding:6px 12px;border-radius:7px;font-family:var(--font);font-size:10.5px;font-weight:700;cursor:pointer;flex-shrink:0}
.auto-btn:hover{background:var(--surface);color:var(--t1);border-color:rgba(0,229,160,.3)}

/* PRA DISPARAR — bloco "consultas das próximas 36h" (substituiu Automações na aba Hoje) */
.pd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.pd-h{padding:18px 22px 12px;border-bottom:1px solid var(--border)}
.pd-t{font-size:14px;font-weight:800;letter-spacing:-.2px;color:var(--t1)}
.pd-s{font-size:11.5px;color:var(--t3);margin-top:3px;font-weight:600}
.pd-empty{padding:22px;color:var(--t3);font-size:12.5px;line-height:1.55;text-align:center}
.pd-row{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);transition:background .12s}
.pd-row:hover{background:var(--bg)}
.pd-row:last-child{border-bottom:0}
.pd-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;letter-spacing:-.5px}
.pd-info{flex:1;min-width:0}
.pd-name{font-size:13.5px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pd-when{font-size:11.5px;color:var(--t3);margin-top:3px;font-variant-numeric:tabular-nums}
.pd-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pd-btn{font-family:var(--font);cursor:pointer;font-weight:700;border-radius:8px;transition:.12s}
.pd-btn-p{background:var(--grad);border:0;color:var(--dark);padding:8px 14px;font-size:11.5px;letter-spacing:.01em;box-shadow:0 1px 4px rgba(0,229,160,.18)}
.pd-btn-p:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,229,160,.28)}
.pd-btn-x{background:transparent;border:1px solid var(--border);color:var(--t3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;font-weight:600}
.pd-btn-x:hover{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.30);color:var(--bad)}

/* Botoes da tabela Pre-Consultas: sempre visiveis + coluna de acoes mais larga */
/* IMPORTANTE: alinhar header (.pcn-thead) e linhas (.pcn-trow) com grid identico */
.pcn-thead{grid-template-columns:1.6fr 1.2fr 150px 150px 200px !important}
.pcn-trow{grid-template-columns:1.6fr 1.2fr 150px 150px 200px !important}
.pcn-tr-act{opacity:1 !important;display:flex;align-items:center;justify-content:flex-end;gap:6px}
.pcn-tr-badge{white-space:nowrap}
.pcn-tr-date{display:flex;align-items:center;font-variant-numeric:tabular-nums}
.pcn-tr-disparar{background:var(--grad);border:0;color:var(--dark);padding:7px 14px;font-size:11.5px;font-weight:700;border-radius:8px;cursor:pointer;font-family:var(--font);letter-spacing:.01em;white-space:nowrap;line-height:1;height:30px;display:inline-flex;align-items:center;gap:5px;box-shadow:0 1px 4px rgba(0,229,160,.18);transition:.12s}
.pcn-tr-disparar:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,229,160,.28)}

/* GREETING */
.greet{background:var(--dark);border-radius:14px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.greet::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--green),var(--cyan),transparent)}
.greet-av{width:42px;height:42px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--dark);flex-shrink:0}
.greet-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.greet-spec{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.greet-r{margin-left:auto;font-size:11px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;text-align:right}

/* PACIENTE — TIMELINE DETAIL (custom) */
.pt-detail-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:8px;background:none;border:none;font-family:var(--font);margin-bottom:16px}
.pt-detail-back:hover{background:var(--s2)}
.pt-detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt-head{display:flex;align-items:center;gap:14px;padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px}
.pt-av-big{width:60px;height:60px;border-radius:50%;background:var(--grad);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;overflow:hidden}
.pt-av-big img{width:100%;height:100%;object-fit:cover}
.pt-name-big{font-size:21px;font-weight:900;letter-spacing:-.4px}
.pt-meta-big{font-size:12px;color:var(--t3);margin-top:3px}

.tl-strip{position:relative;padding-left:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 24px 24px 46px}
.tl-strip::before{content:'';position:absolute;left:29px;top:30px;bottom:30px;width:2px;background:var(--border)}
.tl-evt{position:relative;margin-bottom:18px}
.tl-evt:last-child{margin-bottom:0}
.tl-evt::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--green)}
.tl-evt.warn::before{border-color:var(--warn)}
.tl-evt-d{font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tl-evt-t{font-size:13.5px;font-weight:800;color:var(--t1);margin-top:3px;cursor:pointer}
.tl-evt-t:hover{color:#00C47A}
.tl-evt-b{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-top:9px;font-size:12.5px;line-height:1.55;color:var(--t2)}

.compare-cta{margin-top:14px;padding:18px;background:var(--surface);border:1px dashed var(--b2);border-radius:12px;text-align:center}
.compare-cta-t{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:5px}
.compare-cta-d{font-size:11.5px;color:var(--t3);margin-bottom:12px;line-height:1.5}
.compare-card{background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.18);border-radius:14px;padding:18px;margin-top:14px}
.compare-t{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:#00C47A;margin-bottom:8px}
.compare-b{font-size:12.5px;line-height:1.6;color:var(--t1)}
.compare-b strong{font-weight:800}
.compare-b em{color:#00C47A;font-style:normal;font-weight:600}

/* PACIENTE DETALHE — layout 3 colunas */
.pac-det-wrap{padding:20px 24px;max-width:1320px;margin:0 auto}
.pac-det-grid{display:grid;grid-template-columns:2fr 1.35fr 1.5fr;gap:18px;align-items:start;margin-top:16px}
@media(max-width:1100px){.pac-det-grid{grid-template-columns:1fr}}
.pdc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.pdc:last-child{margin-bottom:0}
.pdc-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.pdc-hl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.pdc-b{padding:16px 18px}
.pdc-b .section-lbl{margin-top:0;margin-bottom:10px}
/* Med rows no detalhe */
.pac-med-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.pac-med-row:last-child{border-bottom:none}
.pac-med-ico{width:36px;height:36px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pac-med-ico svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pac-med-nm{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}
.pac-med-dose{font-size:11.5px;color:var(--t2);margin-top:2px}
.pac-med-active{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--ok-bg);color:var(--ok);margin-top:4px;display:inline-block}
/* Alergia rows */
.pac-al-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.1);margin-bottom:7px}
.pac-al-row:last-child{margin-bottom:0}
.pac-al-nm{font-size:13px;font-weight:700;color:var(--bad);flex:1}
.pac-al-sev{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.pas-g{background:rgba(239,68,68,.1);color:var(--bad)}
.pas-m{background:rgba(245,158,11,.1);color:var(--warn)}
.pas-l{background:rgba(0,196,122,.08);color:var(--ok)}
/* Tabela de dados */
.det-row{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;line-height:1.3}
.det-val{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;word-break:break-word}
/* WhatsApp config */
.wa-days{display:flex;gap:5px;flex-wrap:wrap}
.wa-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--t3);transition:all .15s;font-family:var(--font)}
.wa-day:hover{background:var(--s2);color:var(--t2)}
.wa-day.on{background:var(--green);border-color:var(--green);color:var(--dark)}
.wa-toggle-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.wa-desc{font-size:12.5px;color:var(--t2);line-height:1.5;flex:1}
.wa-cfg-note{font-size:11px;color:var(--t3);line-height:1.5;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:8px 10px;margin-top:10px}
.wa-time-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.wa-time-inp{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--font);color:var(--t1);background:var(--surface);outline:none;width:90px;transition:border .15s}
.wa-time-inp:focus{border-color:var(--green)}
.wa-time-sep{font-size:12px;color:var(--t3);font-weight:600}

/* PACIENTES — 2 colunas (lista + detail timeline) */
.pat-grid{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
@media(max-width:1024px){.pat-grid{grid-template-columns:1fr}}
.pat-list{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px;max-height:780px;overflow-y:auto}
.pat-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:.12s}
.pat-item:hover{background:var(--bg)}
.pat-item.on{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.30)}
.pat-item-av{width:36px;height:36px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.pat-item-av img{width:100%;height:100%;object-fit:cover}
.pat-item-info{flex:1;min-width:0}
.pat-item-name{font-size:13.5px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-item-meta{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:6px;align-items:center}
.pat-pulse{width:6px;height:6px;border-radius:50%;background:#00C47A;flex-shrink:0}
.pat-pulse.warn{background:var(--warn)}
.pat-pulse.gray{background:var(--t4)}
.pat-detail{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px}
.pat-empty-detail{padding:60px 30px;text-align:center;color:var(--t3)}

/* PACIENTES tabela antiga — não usado mais, mantido por segurança */
.pct-thead, .pct-trow{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 0.6fr 0.4fr;gap:14px;align-items:center;padding:12px 22px}
.pct-thead{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);background:#FAFBFC;border-bottom:1px solid var(--border)}
.pct-trow{padding:14px 22px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.pct-trow:last-child{border-bottom:none}
.pct-trow:hover{background:var(--s2)}
.pct-pat{display:flex;align-items:center;gap:12px;min-width:0}
.pct-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.pct-av img{width:100%;height:100%;object-fit:cover}
.pct-name{font-size:13.5px;font-weight:700;color:var(--t1);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct-sub{font-size:11.5px;color:var(--t4);margin-top:2px;font-weight:500}
.pct-cell{font-size:12.5px;color:var(--t2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct-cell.muted{color:var(--t3)}
.pct-pcs{font-size:13px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;text-align:center}
.pct-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.pct-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pct-pill{padding:7px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;font-family:var(--font)}
.pct-pill:hover{border-color:var(--b2);color:var(--t1)}
.pct-pill.on{background:rgba(0,229,160,.10);color:#00C47A;border-color:rgba(0,229,160,.30)}
.pct-ct{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:999px;background:var(--s2);color:var(--t3);font-variant-numeric:tabular-nums;min-width:18px;text-align:center}
.pct-pill.on .pct-ct{background:rgba(0,229,160,.18);color:#00C47A}
.pct-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.pct-title{font-size:26px;font-weight:800;letter-spacing:-.025em;color:var(--t1);margin:0}
.pct-title em{font-style:italic;color:#00C47A;font-weight:800}
.pct-sub{font-size:13px;color:var(--t3);margin-top:4px;font-weight:500}

/* RESUMO 1 MIN */
.sum-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;align-items:start}
@media(max-width:1024px){.sum-grid{grid-template-columns:1fr}}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;align-items:center;gap:16px;margin-bottom:14px}
.hero-photo{width:60px;height:60px;border-radius:50%;background:var(--grad);padding:2px;flex-shrink:0;overflow:hidden}
.hero-photo-i{width:100%;height:100%;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#00C47A;overflow:hidden}
.hero-photo-i img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-name{font-size:18px;font-weight:900;letter-spacing:-.3px}
.hero-meta{font-size:12px;color:var(--t3);margin-top:2px}
.hero-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.hero-chip{padding:3px 9px;background:var(--s2);border-radius:100px;font-size:10.5px;font-weight:700;color:var(--t2)}
.hero-chip.warn{background:rgba(239,68,68,.10);color:#B91C1C;display:inline-flex;align-items:center}
.hero-chip.warn::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--bad);margin-right:5px}

.player{background:#1c1c1e;border-radius:14px;padding:18px 20px;margin-bottom:14px;color:#fff}
.pl-h{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pl-rec{width:10px;height:10px;border-radius:50%;background:#00E5A0;box-shadow:0 0 10px rgba(0,229,160,.6);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pl-t{font-size:13px;font-weight:600}
.pl-d{font-size:11px;color:#8e8e93;margin-top:2px}
.pl-ctrl{display:flex;align-items:center;gap:14px;justify-content:center}
.pl-skip{width:30px;height:30px;border-radius:50%;background:transparent;border:none;color:#8e8e93;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pl-skip:hover{color:#fff}
.pl-skip svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pl-play{width:46px;height:46px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pl-play svg{width:18px;height:18px;fill:#000}
.pl-bar{height:4px;background:rgba(255,255,255,.10);border-radius:2px;margin:14px 0 10px;overflow:hidden}
.pl-fill{height:100%;width:32%;background:linear-gradient(90deg,#00E5A0,#00B4D8);border-radius:2px}
.pl-times{display:flex;justify-content:space-between;font-size:11px;color:#8e8e93;font-variant-numeric:tabular-nums;font-weight:600}
.pl-speed{margin-left:auto;padding:4px 10px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:rgba(255,255,255,.7);font-family:var(--font);font-size:10.5px;font-weight:700;cursor:pointer}

.trans-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;font-size:11.5px;font-weight:700;color:var(--green);cursor:pointer;margin-bottom:14px}
.trans-toggle svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .2s}
.trans-toggle.open svg{transform:rotate(180deg)}
.trans-box{background:#0D0F14;border-radius:14px;max-height:0;overflow:hidden;transition:max-height .3s;margin-bottom:14px}
.trans-box.open{max-height:200px;overflow-y:auto}
.trans-inner{padding:16px 18px;font-size:13.5px;line-height:1.7;color:rgba(255,255,255,.78);font-weight:500}

.ins-card{display:flex;gap:12px;padding:14px 16px 14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;position:relative;overflow:hidden}
.ins-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.ins-card.warn::before{background:var(--warn)}
.ins-card.info::before{background:var(--info)}
.ins-card.bad::before{background:var(--bad)}
.ins-card.ok::before{background:#00C47A}
.ins-t{font-size:13px;font-weight:800;color:var(--t1);margin-bottom:4px}
.ins-d{font-size:12px;color:var(--t2);line-height:1.5}

.anamnese-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px}
.anam-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.anam-grid > .anam-field:first-child{grid-column:span 2}
.anam-field{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.anam-lbl{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.anam-src{font-size:8.5px;padding:2px 6px;border-radius:100px;font-weight:800;letter-spacing:.04em}
.anam-src.audio{background:rgba(0,196,122,.10);color:#00C47A}
.anam-src.formulario{background:rgba(59,130,246,.10);color:var(--info)}
.anam-src.pulado{background:rgba(245,158,11,.10);color:var(--warn)}
.anam-src.desconhecer{background:var(--s2);color:var(--t3)}
.anam-val{font-size:13px;font-weight:600;color:var(--t1);line-height:1.4}
.anam-val.empty{color:var(--t4);font-weight:500;font-style:italic}

.section-lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.section-lbl .pill{font-size:10px;padding:3px 8px;border-radius:100px;background:var(--s2);color:var(--t2);letter-spacing:.04em;font-weight:700}

.pv2-block{margin-bottom:14px}
.pv2-block-t{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pv2-block-t .b-dot{width:6px;height:6px;border-radius:50%}
.pv2-block.crit .pv2-block-t{color:var(--bad)}.pv2-block.crit .pv2-block-t .b-dot{background:var(--bad)}
.pv2-block.diff .pv2-block-t{color:#7C3AED}.pv2-block.diff .pv2-block-t .b-dot{background:#7C3AED}
.pv2-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;overflow:hidden}
.pv2-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.pv2-card.crit::before{background:var(--bad)}.pv2-card.diff::before{background:#7C3AED}
.pv2-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.pv2-title{font-size:13px;font-weight:800;color:var(--t1)}
.pv2-cid{font-size:10.5px;padding:2px 7px;border-radius:5px;background:var(--s2);color:var(--t2);font-weight:700;font-variant-numeric:tabular-nums}
.pv2-score{font-size:10.5px;font-weight:800;color:#00C47A;margin-left:auto;font-variant-numeric:tabular-nums}
.pv2-prev{font-size:10.5px;color:var(--t3);margin-bottom:8px}
.pv2-sec{margin-top:8px;font-size:11.5px;line-height:1.45}
.pv2-sec-t{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.pv2-sec ul{list-style:none;padding:0}
.pv2-sec li{padding:2px 0;color:var(--t2)}
.pv2-sec li::before{content:'· ';color:var(--t4)}
.pv2-foot{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:10.5px;color:var(--t3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.pv2-discl{margin-top:10px;font-size:10px;color:var(--t3);font-style:italic;line-height:1.4}

/* MODAIS */
.modal-bg{position:fixed;inset:0;background:rgba(13,15,20,.45);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex;animation:fadeM .2s}
@keyframes fadeM{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal.lg{max-width:760px}
.modal-h{padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-t{font-size:17px;font-weight:900;letter-spacing:-.3px}
.modal-step{font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.modal-x{margin-left:auto;width:32px;height:32px;border-radius:8px;background:transparent;border:0;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--s2);color:var(--t1)}
.modal-x svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.modal-body{padding:22px 26px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg)}
.modal-stepbar{display:flex;gap:4px;margin-bottom:18px}
.modal-stepbar .dot{flex:1;height:3px;border-radius:2px;background:var(--s3)}
.modal-stepbar .dot.on{background:var(--green)}

.field-block{margin-bottom:16px}
.field-block label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field-block label small{font-size:10px;font-weight:500;color:var(--t3);text-transform:none;letter-spacing:0;margin-left:6px}
.field-block input,.field-block textarea,.field-block select{width:100%;padding:9px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none;transition:.15s}
.field-block input:focus,.field-block textarea:focus,.field-block select:focus{border-color:rgba(0,229,160,.45);box-shadow:0 0 0 3px rgba(0,229,160,.12)}
.field-block textarea{min-height:100px;resize:vertical;line-height:1.5;font-family:inherit}
.placeholder-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.placeholder-pill{font-size:10.5px;padding:3px 8px;border-radius:100px;background:var(--s2);color:var(--t2);font-weight:700;cursor:pointer;border:1px solid var(--border)}
.placeholder-pill:hover{background:rgba(0,229,160,.10);color:#00C47A;border-color:rgba(0,229,160,.30)}

/* PERFIL — extra para tab tempo&receita */
.pfn-finrow{display:grid;grid-template-columns:200px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);align-items:center}
.pfn-finrow:last-child{border-bottom:0}
.pfn-finrow input{padding:9px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none;max-width:140px}
.pfn-finrow input:focus{border-color:rgba(0,229,160,.45);box-shadow:0 0 0 3px rgba(0,229,160,.12)}
.pfn-fin-t{font-size:11.5px;color:var(--t2);font-weight:700}
.pfn-fin-s{font-size:10.5px;color:var(--t3);margin-top:2px;font-weight:500}

.pfn-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#F9FAFB;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;gap:14px}
.toggle-sw{position:relative;width:42px;height:24px;background:var(--s3);border-radius:100px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle-sw.on::after{left:20px}

/* ONBOARDING */
.onb-bg{position:fixed;inset:0;background:#0D0F14;z-index:300;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.onb-bg.show{display:flex}
.onb{background:var(--surface);border-radius:20px;width:100%;max-width:560px;padding:42px 44px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.onb h2{font-size:28px;font-weight:900;letter-spacing:-.6px;line-height:1.15;margin-bottom:8px}
.onb h2 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.onb p{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.onb-step{font-size:10.5px;color:var(--green);font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.onb-step::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%}
.onb-progress{display:flex;gap:4px;margin-top:30px}
.onb-progress .dot{flex:1;height:3px;border-radius:2px;background:var(--s3)}
.onb-progress .dot.on{background:var(--green)}
.onb-progress .dot.done{background:var(--green);opacity:.45}
.onb-acts{display:flex;gap:8px;margin-top:24px;justify-content:flex-end}
.onb-acts .btn{height:40px;padding:0 20px;font-size:13.5px}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.25);z-index:400;opacity:0;transition:.25s;display:none;align-items:center;gap:10px;pointer-events:none}
.toast.show{display:flex;transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.toast .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(13,15,20,.45);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.show{display:flex;animation:fadeM .2s}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:22px 24px 30px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--s3);border-radius:100px;margin:0 auto 18px}
.sheet-row{display:flex;align-items:center;gap:14px;padding:14px 4px;cursor:pointer;border-bottom:1px solid var(--border)}
.sheet-row:last-child{border-bottom:0}
.sheet-ico{width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.sheet-ico svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.sheet-row.danger .sheet-ico{color:var(--bad);background:rgba(239,68,68,.08)}
.sheet-row.danger .sheet-t{color:var(--bad)}
.sheet-t{font-size:13.5px;font-weight:700;color:var(--t1)}
.sheet-d{font-size:11px;color:var(--t3);margin-top:2px}

/* TEMPLATES NOVO (prefix .tpln-*) — espelha o app real */
.tpln-grid{display:grid !important;grid-template-columns:repeat(3,1fr) !important;gap:14px !important}
@media(max-width:1024px){.tpln-grid{grid-template-columns:repeat(2,1fr) !important}}
@media(max-width:680px){.tpln-grid{grid-template-columns:1fr !important}}
.tpln-card{background:var(--surface) !important;border:1px solid var(--border) !important;border-radius:16px !important;padding:18px !important;cursor:pointer !important;transition:.2s !important;display:flex !important;flex-direction:column !important;gap:12px !important;min-height:160px !important;position:relative !important;box-shadow:0 1px 3px rgba(13,15,20,.04) !important}
.tpln-card:hover{border-color:rgba(0,229,160,.35) !important;transform:translateY(-1px) !important;box-shadow:0 4px 12px rgba(13,15,20,.06) !important}
.tpln-chd{display:flex !important;align-items:flex-start !important;gap:12px !important}
.tpln-cic{width:42px !important;height:42px !important;border-radius:12px !important;background:linear-gradient(135deg,rgba(0,229,160,.14),rgba(0,180,216,.14)) !important;border:1px solid rgba(0,229,160,.22) !important;display:flex !important;align-items:center !important;justify-content:center !important;color:#00C47A !important;flex-shrink:0 !important}
.tpln-cic svg{width:20px !important;height:20px !important;stroke:currentColor !important;fill:none !important;stroke-width:2 !important;stroke-linecap:round !important;stroke-linejoin:round !important}
.tpln-cbody{flex:1 !important;min-width:0 !important}
.tpln-cname{font-size:14.5px !important;font-weight:800 !important;color:var(--t1) !important;letter-spacing:-.01em !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important}
.tpln-cmeta{font-size:11.5px !important;color:var(--t4) !important;margin-top:2px !important;font-weight:500 !important}
.tpln-cmenu{width:28px !important;height:28px !important;border-radius:7px !important;border:none !important;background:transparent !important;color:var(--t4) !important;cursor:pointer !important;display:flex !important;align-items:center !important;justify-content:center !important;flex-shrink:0 !important;padding:0 !important}
.tpln-cmenu:hover{background:var(--s2) !important;color:var(--t1) !important}
.tpln-cmenu svg{width:16px !important;height:16px !important;stroke:currentColor !important;fill:none !important;stroke-width:2 !important}
.tpln-flags{display:flex !important;gap:6px !important;margin-top:auto !important;flex-wrap:wrap !important}
.tpln-flag{font-size:10.5px !important;font-weight:700 !important;padding:3px 8px !important;border-radius:999px !important;background:var(--s2) !important;color:var(--t3) !important}
.tpln-flag.audio{background:rgba(59,130,246,.10) !important;color:var(--info) !important}
.tpln-flag.popular{background:rgba(0,196,122,.10) !important;color:#00C47A !important}
.tpln-empty{background:var(--surface) !important;border:1px solid var(--border) !important;border-radius:16px !important;padding:48px 32px !important;text-align:center !important;display:flex !important;flex-direction:column !important;align-items:center !important;gap:12px !important;margin-bottom:14px !important}
.tpln-empty-ic{width:72px !important;height:72px !important;border-radius:20px !important;background:linear-gradient(135deg,rgba(0,229,160,.10),rgba(0,180,216,.08)) !important;border:1px solid rgba(0,229,160,.18) !important;display:flex !important;align-items:center !important;justify-content:center !important;color:#00C47A !important;margin-bottom:4px !important}
.tpln-empty-ic svg{width:32px !important;height:32px !important;stroke:currentColor !important;fill:none !important;stroke-width:2 !important}
.tpln-empty-t{font-size:18px !important;font-weight:800 !important;color:var(--t1) !important}
.tpln-empty-d{font-size:13px !important;color:var(--t3) !important;max-width:420px !important;line-height:1.55 !important}

/* IA LOADING ANIMATION (Compare button) */
.ia-load{background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.25);border-radius:14px;padding:24px;margin-top:14px;position:relative;overflow:hidden}
.ia-load::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(0,229,160,.10),rgba(0,180,216,.08));animation:iaProgress 2.6s cubic-bezier(.4,0,.2,1) forwards}
@keyframes iaProgress{0%{width:0}100%{width:100%}}
.ia-orb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#5AFFBA,#00B4D8);margin:0 auto 14px;position:relative;animation:iaOrb 1.6s ease-in-out infinite}
.ia-orb::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,160,.30),transparent 70%);animation:iaOrbPulse 1.6s ease-in-out infinite}
.ia-orb::after{content:'';position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 60% 30%,rgba(255,255,255,.85),transparent 60%);filter:blur(2px)}
@keyframes iaOrb{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes iaOrbPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.9;transform:scale(1.18)}}
.ia-stages{position:relative;text-align:center}
.ia-stage{font-size:13px;font-weight:700;color:var(--t1);min-height:18px;letter-spacing:-.1px;animation:iaStageIn .35s ease-out}
.ia-stage small{display:block;font-size:11.5px;color:var(--t3);font-weight:500;margin-top:4px;letter-spacing:0}
@keyframes iaStageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ia-bar{margin-top:14px;height:3px;background:rgba(0,0,0,.06);border-radius:100px;overflow:hidden}
.ia-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#00E5A0,#00B4D8);border-radius:100px;animation:iaBar 2.6s cubic-bezier(.4,0,.2,1) forwards;box-shadow:0 0 12px rgba(0,229,160,.55)}
@keyframes iaBar{0%{width:0}100%{width:100%}}
.ia-dots{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}
.ia-dots span{width:4px;height:4px;border-radius:50%;background:#00C47A;animation:iaDot 1.2s ease-in-out infinite}
.ia-dots span:nth-child(2){animation-delay:.15s}
.ia-dots span:nth-child(3){animation-delay:.3s}
@keyframes iaDot{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* TEMPLATES (overrides explícitos antigos — também mantidos) */
.tpl-pills{display:flex !important;gap:8px !important;flex-wrap:wrap !important;margin-bottom:16px !important;padding:0 !important;list-style:none !important}
.tpl-pill{display:inline-flex !important;align-items:center !important;padding:8px 16px !important;border-radius:22px !important;font-size:13px !important;font-weight:600 !important;border:1px solid var(--border) !important;background:var(--surface) !important;color:var(--t2) !important;cursor:pointer !important;font-family:var(--font) !important;white-space:nowrap !important;flex-shrink:0 !important;transition:all .15s !important;line-height:1 !important}
.tpl-pill:hover{background:var(--s2) !important}
.tpl-pill.active{background:rgba(0,229,160,.10) !important;border-color:rgba(0,229,160,.30) !important;color:#00C47A !important}
.tpl-grid{display:grid !important;grid-template-columns:repeat(3,1fr) !important;gap:12px !important;margin-bottom:24px !important}
@media(max-width:1024px){.tpl-grid{grid-template-columns:repeat(2,1fr) !important}}
@media(max-width:680px){.tpl-grid{grid-template-columns:1fr !important}}
.tpl-card{background:var(--surface) !important;border:1px solid var(--border) !important;border-radius:14px !important;padding:18px !important;cursor:pointer !important;transition:.18s !important;position:relative !important;display:flex !important;align-items:center !important;gap:14px !important}
.tpl-card:hover{transform:translateY(-2px) !important;box-shadow:0 4px 16px rgba(0,0,0,.06) !important}
.tpl-card-icon{width:42px !important;height:42px !important;border-radius:10px !important;background:rgba(0,229,160,.08) !important;border:1px solid rgba(0,229,160,.18) !important;display:flex !important;align-items:center !important;justify-content:center !important;flex-shrink:0 !important}
.tpl-card-icon svg{width:20px;height:20px;stroke:#00C47A;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tpl-card-body{flex:1;min-width:0}
.tpl-card-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-card-meta{font-size:11.5px;color:var(--t3);display:flex;gap:4px;align-items:center}
.tpl-card-menu{width:32px !important;height:32px !important;border-radius:8px !important;border:none !important;background:transparent !important;cursor:pointer !important;display:flex !important;align-items:center !important;justify-content:center !important;flex-shrink:0 !important;padding:0 !important}
.tpl-card-menu:hover{background:rgba(0,0,0,.05) !important}
.tpl-card-menu svg{width:14px;height:14px}
.tpl-empty{text-align:center !important;padding:60px 20px !important;color:var(--t3) !important;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.tpl-empty-icon{width:64px !important;height:64px !important;border-radius:16px !important;background:rgba(0,229,160,.08) !important;border:1px solid rgba(0,229,160,.18) !important;display:flex !important;align-items:center !important;justify-content:center !important;margin:0 auto 16px !important}
.tpl-empty-icon svg{width:28px !important;height:28px !important;stroke:#00C47A;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tpl-empty-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:6px}
.tpl-empty-desc{font-size:13px;color:var(--t3);line-height:1.6;max-width:340px;margin:0 auto}

/* CHIP */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.btn-sm{height:30px;font-size:11.5px;padding:0 12px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-ghost:hover{background:var(--s2);color:var(--t1)}
.btn-danger-x{background:rgba(239,68,68,.08);color:var(--bad);border:1px solid rgba(239,68,68,.2)}

/* === ACTIONS POPUP (3 pontinhos do template) — cópia do app real === */
.actions-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:1100;display:none;align-items:center;justify-content:center;padding:20px}
.actions-overlay.show{display:flex;animation:fadeM .2s}
.actions-card{background:var(--surface);border-radius:16px;padding:8px;width:280px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease both}
.actions-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;cursor:pointer;transition:background .13s;font-size:13px;font-weight:600;color:var(--t1)}
.actions-item:hover{background:var(--bg)}
.actions-item svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.actions-item.danger{color:var(--bad)}
.actions-item.danger svg{stroke:var(--bad)}
.actions-sep{height:1px;background:var(--border);margin:4px 8px}

/* === ONBOARDING TEMPLATES POPUP (cópia do app real) === */
.onb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:1100;display:none;align-items:center;justify-content:center;padding:20px}
.onb-overlay.show{display:flex;animation:fadeM .25s}
.onb-card{background:var(--surface);border-radius:20px;padding:32px;width:440px;max-width:calc(100vw - 32px);box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease both;position:relative}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.onb-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:transparent;border:0;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:.15s}
.onb-close:hover{background:var(--s2);color:var(--t1)}
.onb-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.onb-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.onb-dot{width:8px;height:8px;border-radius:50%;background:var(--s3);transition:.25s}
.onb-dot.active{width:28px;border-radius:100px;background:var(--grad)}
.onb-dot.done{background:#00C47A;opacity:.55}
#tpl-onbContent{text-align:center;margin-bottom:22px}
.onb-icon{width:84px;height:84px;border-radius:22px;background:linear-gradient(135deg,rgba(0,229,160,.14),rgba(0,180,216,.10));border:1px solid rgba(0,229,160,.22);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
.onb-icon svg{width:36px;height:36px;stroke:#00C47A;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.onb-title{font-size:24px;font-weight:900;letter-spacing:-.5px;line-height:1.15;margin-bottom:10px;color:var(--t1)}
.onb-title em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.onb-desc{font-size:14px;color:var(--t2);line-height:1.55}
.onb-btn-primary{width:100%;height:46px;border-radius:14px;border:0;background:var(--grad);color:var(--dark);font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,229,160,.28);transition:.18s;letter-spacing:.01em}
.onb-btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,.36)}
.onb-skip{width:100%;background:transparent;border:0;color:var(--t3);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;margin-top:14px;padding:6px}
.onb-skip:hover{color:var(--t1)}

/* === BANNERS GLOBAIS === */
.banner-wrap{position:fixed;top:0;left:0;right:0;z-index:150;display:flex;flex-direction:column;gap:1px;pointer-events:none}
.banner{padding:10px 24px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px;pointer-events:auto;animation:bannerIn .3s ease-out}
@keyframes bannerIn{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.banner-warn{background:#FEF3C7;color:#92400E;border-bottom:1px solid #FDE68A}
.banner-err{background:#FEE2E2;color:#991B1B;border-bottom:1px solid #FECACA}
.banner-info{background:#DBEAFE;color:#1E40AF;border-bottom:1px solid #BFDBFE}
.banner svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.banner-act{margin-left:auto;display:flex;gap:6px}
.banner-btn{background:rgba(0,0,0,.08);border:0;padding:5px 10px;border-radius:6px;font-family:var(--font);font-size:11.5px;font-weight:700;color:inherit;cursor:pointer}
.banner-btn:hover{background:rgba(0,0,0,.14)}
.banner-x{background:transparent;border:0;color:inherit;cursor:pointer;opacity:.5;padding:2px 6px}
.banner-x:hover{opacity:1}

/* === 4 TOASTS COLORIDOS === */
.toast.toast-ok{background:linear-gradient(135deg,#0D0F14,#0F2A1F);border-left:3px solid #00C47A}
.toast.toast-err{background:linear-gradient(135deg,#0D0F14,#2A0F0F);border-left:3px solid var(--bad)}
.toast.toast-info{background:linear-gradient(135deg,#0D0F14,#0F1A2A);border-left:3px solid var(--info)}
.toast.toast-warn{background:linear-gradient(135deg,#0D0F14,#2A1F0F);border-left:3px solid var(--warn)}
.toast .dot.dot-ok{background:#00C47A}
.toast .dot.dot-err{background:var(--bad)}
.toast .dot.dot-info{background:var(--info)}
.toast .dot.dot-warn{background:var(--warn)}
.toast-undo-btn{margin-left:14px;background:rgba(0,229,160,.18);border:1px solid rgba(0,229,160,.30);color:#5AFFBA;padding:4px 10px;border-radius:6px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer}
.toast-countdown{margin-left:8px;font-size:11px;color:rgba(255,255,255,.45);font-variant-numeric:tabular-nums}

/* === SPOTLIGHT TOUR === */
.spot-bg{position:fixed;inset:0;z-index:280;pointer-events:auto;display:none}
.spot-bg.show{display:block}
.spot-mask{position:absolute;inset:0;background:rgba(13,15,20,.78);transition:.3s;pointer-events:auto}
.spot-card{position:absolute;background:var(--surface);border-radius:14px;padding:22px 24px;width:340px;box-shadow:0 24px 60px rgba(0,0,0,.4);z-index:281}
.spot-step{font-size:10.5px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.spot-t{font-size:18px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px}
.spot-d{font-size:13px;color:var(--t2);line-height:1.55;margin-bottom:14px}
.spot-acts{display:flex;gap:6px;justify-content:flex-end}
.spot-progress{display:flex;gap:3px;margin-top:12px}
.spot-progress .dot{flex:1;height:3px;border-radius:2px;background:var(--s3)}
.spot-progress .dot.on{background:var(--green)}

/* === PRÉ-CONSULTA REAL DO PACIENTE (cópia do pre-consulta.html) === */
/* Escopado dentro de .phone-frame pra fit em 280px */
.phone-frame .qz-screen{padding:50px 0 0;display:flex;flex-direction:column;height:100%}
.phone-frame .qz-head{display:flex;align-items:center;gap:8px;padding:8px 16px 12px}
.phone-frame .qz-head__avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:10px;font-weight:800;color:#FFF;background:var(--grad);box-shadow:inset 0 1px 0 rgba(255,255,255,.20),0 3px 8px rgba(0,229,160,.24)}
.phone-frame .qz-head__name{flex:1;min-width:0}
.phone-frame .qz-head__name h2{font-size:11px;font-weight:800;color:var(--t1);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
.phone-frame .qz-head__name p{font-size:9.5px;color:var(--t3);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phone-frame .qz-head__tag{font-size:7.5px;font-weight:800;letter-spacing:.10em;color:#00C47A;text-transform:uppercase;padding:3px 6px;background:rgba(0,229,160,.10);border-radius:100px;flex-shrink:0;border:1px solid rgba(0,229,160,.16)}
.phone-frame .qz-prog{padding:0 16px 12px}
.phone-frame .qz-prog__row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.phone-frame .qz-prog__label{font-size:8px;font-weight:800;letter-spacing:.14em;color:var(--t3);text-transform:uppercase}
.phone-frame .qz-prog__pct{font-size:8.5px;font-weight:700;color:#00C47A;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.phone-frame .qz-prog__bar{height:2px;background:rgba(13,15,20,.06);border-radius:100px;overflow:hidden}
.phone-frame .qz-prog__fill{height:100%;background:var(--grad);border-radius:100px;box-shadow:0 0 8px rgba(0,229,160,.50)}
.phone-frame .qz-question{padding:2px 16px 10px}
.phone-frame .qz-question__title{font-size:18px;line-height:1.15;font-weight:900;letter-spacing:-.04em;color:var(--t1);margin:0 0 8px}
.phone-frame .qz-question__instr{font-size:9.5px;line-height:1.5;color:var(--t3);font-weight:500;margin-top:6px;padding:6px 8px;background:rgba(0,229,160,.05);border-left:2px solid var(--green);border-radius:5px}
.phone-frame .qz-question__help{display:inline-flex;align-items:center;gap:4px;margin-top:10px;padding:4px 9px 4px 7px;border:1px solid var(--border);border-radius:100px;background:var(--surface);font-size:9px;font-weight:600;color:var(--t3);cursor:pointer}
.phone-frame .qz-question__help svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
.phone-frame .qz-inputs{padding:10px 16px 8px;display:flex;flex-direction:column;gap:8px}
.phone-frame .qz-textarea{width:100%;min-height:60px;padding:9px 11px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:10.5px;font-weight:500;color:var(--t1);resize:none;outline:none;line-height:1.5;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.phone-frame .qz-textarea::placeholder{color:var(--t4);font-weight:500}
.phone-frame .qz-divider{display:flex;align-items:center;gap:8px;padding:1px 0}
.phone-frame .qz-divider::before,.phone-frame .qz-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--b2),transparent)}
.phone-frame .qz-divider span{font-size:8px;font-weight:700;letter-spacing:.16em;color:var(--t3);text-transform:uppercase}
.phone-frame .qz-mic-btn{width:100%;padding:11px 14px;background:var(--grad);border:none;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-size:11px;font-weight:700;color:#FFF;cursor:pointer;letter-spacing:-.01em;box-shadow:inset 0 1px 0 rgba(255,255,255,.30),0 1px 2px rgba(0,229,160,.40),0 6px 16px rgba(0,229,160,.28),0 12px 32px rgba(0,180,216,.16);position:relative;overflow:hidden}
.phone-frame .qz-mic-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 50%);pointer-events:none}
.phone-frame .qz-mic-btn svg{width:14px;height:14px;flex-shrink:0;position:relative;z-index:1;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.phone-frame .qz-mic-btn span{position:relative;z-index:1}
.phone-frame .qz-foot{margin-top:auto;border-top:1px solid var(--border);padding:8px 10px;display:flex;justify-content:space-around;background:rgba(255,255,255,.4)}
.phone-frame .qz-foot button{display:inline-flex;align-items:center;gap:4px;padding:6px 9px;background:transparent;border:none;font-family:inherit;font-size:9px;font-weight:600;color:var(--t3);cursor:pointer;border-radius:6px}
.phone-frame .qz-foot button svg{width:10px;height:10px;opacity:.8;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.phone-frame .qz-empty{padding:30px 14px;text-align:center;color:var(--t4);font-size:10px;font-style:italic}

/* phone-content reset quando carrega o quiz (zero padding pra ocupar tela toda) */
.phone-content.qz-mode{padding:0;display:flex;flex-direction:column;height:100%}
.phone-content.qz-mode .qz-screen{height:100%}

/* === PHONE FRAME (template editor preview) === */
.phone-frame{width:280px;height:570px;border:8px solid #0D0F14;border-radius:36px;background:#fff;overflow:hidden;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.18);margin:0 auto}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:22px;background:#0D0F14;border-radius:0 0 14px 14px;z-index:2}
.phone-content{padding:36px 16px 20px;height:100%;overflow-y:auto;background:linear-gradient(180deg,#FAFBFC,#fff)}
.phone-tpl-q{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start}
.phone-tpl-q-num{width:22px;height:22px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.phone-tpl-q-text{font-size:11px;font-weight:600;color:var(--t1);line-height:1.4}

/* === CM STEPS (multi-step indicator) === */
.cm-steps{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.cm-step{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:12.5px;font-weight:600}
.cm-step.active{color:var(--t1)}
.cm-step.done{color:#00C47A}
.cm-step-num{width:24px;height:24px;border-radius:50%;background:var(--s2);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:1.5px solid var(--border)}
.cm-step.active .cm-step-num{background:var(--grad);color:var(--dark);border-color:transparent}
.cm-step.done .cm-step-num{background:rgba(0,196,122,.14);color:#00C47A;border-color:rgba(0,196,122,.28)}
.cm-sep{flex:1;height:1px;background:var(--border)}
.cm-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:28px;align-items:start}
@media(max-width:1024px){.cm-grid{grid-template-columns:1fr}}
.cm-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.cm-card h3{font-size:15px;font-weight:800;margin-bottom:14px;letter-spacing:-.2px}
.cm-q-row{display:flex;gap:10px;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.cm-q-row input{flex:1;border:0;background:transparent;font-family:var(--font);font-size:13px;color:var(--t1);outline:none;padding:4px 0}
.cm-q-num{width:22px;height:22px;border-radius:50%;background:var(--s2);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;flex-shrink:0}
.cm-q-del{background:transparent;border:0;color:var(--t3);cursor:pointer;font-size:18px;padding:2px 6px}
.cm-q-del:hover{color:var(--bad)}
.cm-tog-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:11px;margin-bottom:10px}
.cm-tog-l{font-size:13px;font-weight:700;color:var(--t1)}
.cm-tog-d{font-size:11.5px;color:var(--t3);margin-top:2px}
.phone-side-l{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;text-align:center}
.phone-side-d{font-size:11.5px;color:var(--t4);text-align:center;font-style:italic;margin-bottom:14px}

/* === KEYBOARD KEYS === */
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;background:var(--surface);font-family:var(--font);font-size:11px;font-weight:700;color:var(--t2);box-shadow:0 1px 0 rgba(0,0,0,.04)}
.kbd-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--t1)}
.kbd-row:last-child{border-bottom:0}
.kbd-keys{display:flex;gap:4px;align-items:center}
.kbd-plus{font-size:10px;color:var(--t4)}

/* === IA LOADING VARIANTS === */
.ia-load-mini{padding:14px 18px;background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.25);border-radius:12px;display:flex;align-items:center;gap:12px}
.ia-load-mini .ia-orb{width:24px;height:24px;margin:0;flex-shrink:0}
.ia-load-mini .ia-orb::before{inset:-3px}
.ia-load-mini-t{font-size:12.5px;font-weight:700;color:var(--t1)}
.ia-load-mini-d{font-size:11px;color:var(--t3);margin-top:2px}
.ia-skeleton{display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg);border-radius:10px}
.ia-skeleton .ia-orb{width:20px;height:20px;margin:0}
.ia-skeleton .ia-orb::before{inset:-2px}

/* === CONTENT SHORT BADGE === */
.short-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:100px;background:rgba(245,158,11,.12);color:#92400E;font-size:9.5px;font-weight:800;letter-spacing:.04em;margin-left:6px}
.short-badge::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--warn)}

/* === CROSS-LINK ALERT (medicamento + alergia) === */
.cross-alert{padding:12px 14px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.22);border-radius:10px;display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.cross-alert-ico{width:24px;height:24px;border-radius:50%;background:rgba(239,68,68,.14);display:flex;align-items:center;justify-content:center;color:var(--bad);flex-shrink:0;font-weight:900;font-size:13px}
.cross-alert-t{font-size:12.5px;font-weight:800;color:var(--bad);margin-bottom:3px}
.cross-alert-d{font-size:11.5px;color:var(--t2);line-height:1.5}

/* === PAGINATION === */
.pag-row{display:flex;justify-content:center;align-items:center;gap:6px;padding:18px 0}
.pag-btn{min-width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600}
.pag-btn:hover{background:var(--s2);color:var(--t1)}
.pag-btn.on{background:var(--grad);color:var(--dark);border-color:transparent}
.pag-btn:disabled{opacity:.4;cursor:not-allowed}

/* === GRAPH SPARKLINE (prosódica detail) === */
.spark{position:relative;height:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;overflow:hidden}
.spark-line{position:absolute;left:8px;right:8px;bottom:8px;top:8px}
.spark-bar{position:absolute;bottom:0;width:6%;background:linear-gradient(180deg,var(--green),var(--cyan));border-radius:2px 2px 0 0}
.spark-threshold{position:absolute;left:0;right:0;border-top:1px dashed var(--bad);font-size:9px;color:var(--bad)}

/* === LOG VINCULO ESTADO === */
.no-vinculo-banner{padding:18px 22px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:1px solid #FCD34D;border-radius:12px;margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.no-vinculo-banner svg{width:22px;height:22px;stroke:#92400E;fill:none;stroke-width:2;flex-shrink:0}
.no-vinculo-t{font-size:13.5px;font-weight:800;color:#92400E;margin-bottom:4px}
.no-vinculo-d{font-size:12px;color:#78350F;line-height:1.55}

/* === PULSE FAB / DOT === */
@keyframes pulseFab{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.5)}50%{box-shadow:0 0 0 12px rgba(0,229,160,0)}}
.pulse-fab{animation:pulseFab 2s infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
.pulse-dot{animation:pulseDot 1.4s infinite}

/* === MODE TOGGLES (personas) === */
.mode-toggle{padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.mode-toggle-l{flex:1}
.mode-toggle-t{font-size:13px;font-weight:800;color:var(--t1)}
.mode-toggle-d{font-size:11.5px;color:var(--t3);margin-top:3px;line-height:1.45}
.mode-toggle-tag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:100px;background:var(--acc);color:#00C47A;margin-left:6px;letter-spacing:.04em;text-transform:uppercase}

/* === STAT CARD WITH BADGE === */
.stat-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:100px;background:rgba(245,158,11,.14);color:var(--warn);letter-spacing:.04em}

/* === MOBILE === */
@media(max-width:780px){
  .sidebar{width:0;overflow:hidden;transition:width .25s}
  .sidebar.open{width:240px}
  .topbar{position:relative}
  .stat-row{grid-template-columns:1fr 1fr}
  .imp-row{grid-template-columns:1fr}
  .pat-grid{grid-template-columns:1fr}
  .sum-grid{grid-template-columns:1fr}
  .cm-grid{grid-template-columns:1fr}
  .modal{max-width:100%;height:100vh;max-height:100vh;border-radius:0}
  .pcn-thead{display:none}
  .pcn-trow{grid-template-columns:1fr;gap:8px;padding:14px 18px}
}

/* === HAMBURGER (visible só mobile) === */
.hamb{display:none;width:36px;height:36px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--t1);cursor:pointer;align-items:center;justify-content:center}
.hamb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
@media(max-width:780px){.hamb{display:inline-flex}}

/* === CONFETE === */
.confete-wrap{position:fixed;top:0;left:0;right:0;height:60px;pointer-events:none;z-index:500;overflow:hidden}
.confete-piece{position:absolute;top:-20px;width:8px;height:14px;border-radius:2px;animation:confeteFall 2.4s linear forwards}
@keyframes confeteFall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(80vh) rotate(720deg)}}

/* ============================================================
   LAYOUT GLOBAL (Sessao 22): centraliza todas as views como no app antigo
   Largura maxima 1320px com margem automatica nos lados.
   Sem isso, conteudo estica ate as bordas em monitores largos.
   ============================================================ */
.view{max-width:1320px;margin-left:auto;margin-right:auto}
/* Excecao Calendar: grid mensal precisa de mais espaco */
#v-calendar{max-width:1440px}

/* ============================================================
   BRIEFING DO PACIENTE — CSS copiado 1:1 do app antigo (Sessao 22)
   Sobrescreve qualquer classe parcial que existia no app-v2.
   ============================================================ */
.no-data{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px}
.resumo-wrap{max-width:1320px;margin:0 auto;padding:0 24px}
.resumo-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.resumo-top .top-actions{display:flex;align-items:center;gap:10px}
.resumo-top .timestamp{font-size:11.5px;color:var(--t3);font-weight:600;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-variant-numeric:tabular-nums}
.resumo-head{margin-bottom:24px}
.resumo-head h1{font-size:26px;font-weight:900;letter-spacing:-.6px;color:var(--t1);line-height:1.1}
.resumo-head h1 em{font-style:italic;font-weight:900;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.resumo-head .sub{font-size:13px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.resumo-head .sub .dot{width:3px;height:3px;border-radius:50%;background:var(--t4,#C4C9D4)}
.detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:28px;align-items:start}
@media(max-width:1024px){.detail-grid{grid-template-columns:1fr}}
.pac-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03)}
.pac-head{padding:22px 22px 18px;display:flex;gap:14px;align-items:flex-start;border-bottom:1px solid var(--border)}
.pac-avatar{width:52px;height:52px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,229,160,.25);overflow:hidden}
.pac-avatar img{width:100%;height:100%;object-fit:cover}
.pac-info{flex:1;min-width:0}
.pac-name{font-size:18px;font-weight:800;letter-spacing:-.3px;color:var(--t1)}
.pac-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pac-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#F4F6FA;border-radius:100px;font-size:11px;font-weight:700;color:var(--t3)}
.pac-chip.ok{background:#ECFDF5;color:#027A48}
.pac-chip.ok::before{content:"";width:5px;height:5px;border-radius:50%;background:#00C47A}
.pac-quote{padding:18px 22px 22px;font-size:14.5px;color:var(--t2);line-height:1.55;font-style:italic;position:relative}
.meds-chips{display:flex;flex-wrap:wrap;gap:6px}
.med-chip{padding:6px 11px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:100px;font-size:11.5px;font-weight:700;color:#027A48;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.med-chip:hover{background:#D1FAE5;transform:translateY(-1px)}
.med-chip .dose{color:#065F46;font-weight:600;opacity:.75}
.aler-chip{padding:6px 11px;background:#FEF2F2;border:1px solid #FECACA;border-radius:100px;font-size:11.5px;font-weight:700;color:#B91C1C;display:inline-flex;align-items:center;gap:6px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:8px;transition:background .13s;margin-bottom:14px;border:none;background:none;font-family:var(--font)}
.back-btn:hover{background:var(--s2,#F4F6FA)}
.back-btn svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stale-warn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);font-size:12px;color:#92400E;font-weight:600;margin-bottom:16px}
.stale-warn svg{width:15px;height:15px;stroke:#92400E;fill:none;stroke-width:2;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}

/* Player dark (Apple Podcasts style) */
.dk-player{background:#1c1c1e;border-radius:16px;padding:18px 20px;margin-bottom:16px;position:relative}
.dk-player.playing{box-shadow:0 4px 24px rgba(0,0,0,.15),0 0 40px rgba(0,229,160,.1)}
.dk-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.dk-rec{width:10px;height:10px;border-radius:50%;background:#00E5A0;box-shadow:0 0 10px rgba(0,229,160,.6);opacity:.5;transition:.3s;flex-shrink:0}
.dk-player.playing .dk-rec{opacity:1;animation:dkPulse 1.5s ease-in-out infinite}
@keyframes dkPulse{0%,100%{opacity:1}50%{opacity:.4}}
.dk-meta{flex:1;min-width:0}
.dk-title{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dk-date{font-size:11px;color:#8e8e93;margin-top:2px}
.dk-foot{display:flex;align-items:center;gap:14px;margin-top:10px}
.dk-t{font-size:11px;color:#8e8e93;font-weight:600;font-variant-numeric:tabular-nums;min-width:38px;flex-shrink:0}
.dk-t.right{text-align:right}
.dk-ctrl-wrap{display:flex;align-items:center;justify-content:center;gap:14px;flex:1}
.dk-play{width:42px;height:42px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .15s}
.dk-play:hover{transform:scale(1.06)}
.dk-play:active{transform:scale(.92)}
.dk-play svg{width:16px;height:16px;fill:#000;stroke:none}
.dk-play .ic-pause{display:none}
.dk-player.playing .dk-play .ic-play{display:none}
.dk-player.playing .dk-play .ic-pause{display:block}
.dk-skip{width:30px;height:30px;border-radius:50%;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#8e8e93;transition:color .15s,transform .15s}
.dk-skip:hover{color:#fff}
.dk-skip:active{transform:scale(.9)}
.dk-skip svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dk-skip.flash{color:#00E5A0}
.dk-waveform{width:100%;height:44px;border-radius:8px;cursor:pointer}
.dk-speed{padding:4px 10px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-family:var(--font);font-size:11px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;flex-shrink:0}
.dk-speed:hover{background:rgba(0,229,160,.12);border-color:rgba(0,229,160,.3);color:#5AFFBA}
.dk-speed.boosted{background:rgba(0,229,160,.18);border-color:rgba(0,229,160,.45);color:#5AFFBA}

/* Transcricao karaoke */
.trans-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:700;color:#00C47A;cursor:pointer;user-select:none;margin:-8px 0 12px}
.trans-toggle:hover{text-shadow:0 0 8px rgba(0,229,160,.3)}
.trans-toggle svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .2s}
.trans-toggle.open svg{transform:rotate(180deg)}
.trans-box{max-height:0;overflow:hidden;background:#0D0F14;border-radius:14px;transition:max-height .35s cubic-bezier(.4,0,.2,1);margin-bottom:16px;position:relative}
.trans-box.open{max-height:220px;overflow-y:auto}
.trans-inner{padding:16px 18px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.22);font-weight:500}
@keyframes wordPulse{0%{background:rgba(0,229,160,.3)}100%{background:transparent}}
.tw-word.pulse{animation:wordPulse .2s ease;border-radius:3px;padding:0 2px;margin:0 -2px}
.tw-word{transition:color .15s;color:rgba(255,255,255,.22);cursor:pointer}
.tw-word:hover{color:rgba(0,229,160,.7)}
.tw-word.spoken{color:#00E5A0}
.tw-word.current{color:#5AFFBA;font-weight:700;text-shadow:0 0 14px rgba(0,229,160,.55)}
.trans-box::-webkit-scrollbar{width:2px}.trans-box::-webkit-scrollbar-track{background:transparent}.trans-box::-webkit-scrollbar-thumb{background:rgba(0,229,160,.25);border-radius:3px}

/* Anamnese estruturada (11 campos) */
.anamnese-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:18px 18px 14px;margin:16px 0 12px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03)}
.anamnese-head{display:flex;align-items:center;gap:12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid rgba(0,0,0,.05)}
.anamnese-head-icon{width:32px;height:32px;border-radius:10px;background:rgba(0,196,122,.10);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.anamnese-head-icon svg{width:16px;height:16px;fill:none;stroke:#00C47A;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.anamnese-head-title{flex:1;min-width:0}
.anamnese-head-title h3{font-size:14px;font-weight:800;color:#0D0F14;letter-spacing:-.2px;margin:0}
.anamnese-head-title p{font-size:11.5px;color:#6B7280;margin:2px 0 0 0;line-height:1.4}
.anamnese-head-pill{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.04);color:#6B7280;white-space:nowrap}
.anamnese-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.anamnese-grid.full{grid-template-columns:1fr}
.anamnese-field{background:rgba(0,0,0,.025);border:1px solid transparent;border-radius:10px;padding:12px 14px;transition:background .15s,border-color .15s}
.anamnese-field:hover{background:#fff;border-color:rgba(0,0,0,.08)}
.anamnese-field-lbl{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px;line-height:1.3}
.anamnese-field-lbl-text{flex:1;min-width:0}
.anamnese-field-src{font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;text-transform:none;white-space:nowrap;font-family:ui-monospace,'SF Mono',monospace}
.anamnese-field-src.audio{background:rgba(0,196,122,.12);color:#008F5A}
.anamnese-field-src.formulario{background:rgba(59,130,246,.10);color:#1E40AF}
.anamnese-field-src.pulado{background:rgba(245,158,11,.12);color:#92400E}
.anamnese-field-src.desconhecer{background:rgba(107,114,128,.12);color:#374151}
.anamnese-field-val{font-size:13px;color:#0D0F14;line-height:1.5;font-weight:500}
.anamnese-field-val.empty{color:#9CA3AF;font-style:italic;font-weight:400}
.anamnese-empty-block{padding:14px 16px;background:rgba(0,0,0,.02);border:1.5px dashed rgba(0,0,0,.08);border-radius:10px;font-size:12.5px;color:#6B7280;line-height:1.55;font-style:italic}
.anamnese-empty-block strong{color:#4B5563;font-style:normal;font-weight:700}
@media (max-width:880px){.anamnese-grid{grid-template-columns:1fr}}

/* Padroes observados V2 */
.section-lbl{font-size:13px;font-weight:800;color:#0D0F14;margin-bottom:10px;letter-spacing:-.2px}
.padroes-sec-lbl{display:flex;flex-direction:column;gap:2px}
.padroes-sec-sub{font-size:12px;color:#6B7280;font-weight:500;font-style:italic;letter-spacing:normal;text-transform:none}
.padroes-card-v2{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;margin-bottom:8px;background:rgba(139,92,246,.04);border:1px solid rgba(139,92,246,.15);border-radius:14px}
.padroes-card-v2-icon{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.padroes-card-v2-icon svg{width:14px;height:14px;fill:none;stroke:#8B5CF6;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.padroes-card-v2-content{flex:1;min-width:0}
.padroes-card-v2-hipotese{font-size:14px;font-weight:700;color:#0D0F14;line-height:1.4;margin-bottom:3px}
.padroes-card-v2-evidencia{font-size:12.5px;color:#6B7280;line-height:1.55;font-weight:400}
.padroes-disclaimer-v2{font-size:11.5px;color:#9CA3AF;padding:10px 12px;margin-top:4px;margin-bottom:16px;background:rgba(0,0,0,.02);border-left:2px solid rgba(0,0,0,.08);border-radius:6px;line-height:1.55}
.honest-empty-v2{background:rgba(0,0,0,.02);border:1.5px dashed rgba(0,0,0,.08);border-radius:14px;padding:16px 18px;margin-bottom:10px;font-size:13px;color:#6B7280;font-style:italic;line-height:1.55}

<script>
/* ============================================================
   STATE + DATA
   ============================================================ */
// DR — estrutura base, populada por BACKEND.loadDR() no boot a partir de localStorage + GET /medico
var DR = {
  nome:'—', primeiroNome:'', crm:'', uf:'',
  especialidade:'', email:'', telefone:'',
  clinica:'', endereco:'',
  config:{
    tempoMedioConsulta:30, tempoAnamneseAtual:7, valorConsulta:0,
