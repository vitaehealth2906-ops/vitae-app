<style>
/* ── CSS adicional copiado de app-v2.html ─────────────────── */
.pt-detail-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:8px;background:none;border:none;font-family:var(--font);margin-bottom:16px}
.pt-detail-back:hover{background:var(--s2)}
.pt-detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt-head{display:flex;align-items:center;gap:14px;padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px}
.pt-av-big{width:60px;height:60px;border-radius:50%;background:var(--grad);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;overflow:hidden}
.pt-name-big{font-size:21px;font-weight:900;letter-spacing:-.4px}
.pt-meta-big{font-size:12px;color:var(--t3);margin-top:3px}
.tl-strip{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 24px 24px 46px}
.tl-strip::before{content:'';position:absolute;left:29px;top:30px;bottom:30px;width:2px;background:var(--border)}
.tl-evt{position:relative;margin-bottom:18px}
.tl-evt:last-child{margin-bottom:0}
.tl-evt::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--green)}
.tl-evt.warn::before{border-color:var(--warn)}
.tl-evt.on::before{background:var(--green)}
.tl-evt-d{font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tl-evt-t{font-size:13.5px;font-weight:800;color:var(--t1);margin-top:3px;cursor:pointer}
.tl-evt-t:hover{color:#00C47A}
.tl-evt-b{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-top:9px;font-size:12.5px;line-height:1.55;color:var(--t2)}
.compare-cta{margin-top:14px;padding:18px;background:var(--surface);border:1px dashed var(--b2);border-radius:12px;text-align:center}
.compare-cta-t{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:5px}
.compare-cta-d{font-size:11.5px;color:var(--t3);margin-bottom:12px;line-height:1.5}
.compare-card{background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.18);border-radius:14px;padding:18px;margin-top:14px}
.compare-t{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:#00C47A;margin-bottom:8px}
.compare-b{font-size:12.5px;line-height:1.6;color:var(--t1)}
.compare-b strong{font-weight:800}
.compare-b em{color:#00C47A;font-style:normal;font-weight:600}
.toggle-sw{position:relative;width:42px;height:24px;background:var(--s3);border-radius:100px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle-sw.on::after{left:20px}
.section-lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
/* Pacientes inline list */
.pat-list{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px}
.pat-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:.12s}
.pat-item:hover{background:var(--bg)}
.pat-item.on{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.30)}
.pat-item-av{width:36px;height:36px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pat-item-name{font-size:13.5px;font-weight:700;color:var(--t1)}
.pat-item-meta{font-size:11px;color:var(--t3);margin-top:2px}
.pat-pulse{width:6px;height:6px;border-radius:50%;background:#00C47A;flex-shrink:0;display:inline-block;margin-right:4px}
.pat-pulse.warn{background:var(--warn)}
/* Tabela de pacientes */
.pct-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.pct-thead{display:grid;grid-template-columns:2fr 1fr 1fr 0.8fr;gap:14px;align-items:center;padding:12px 22px;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);background:#FAFBFC;border-bottom:1px solid var(--border)}
.pct-trow{display:grid;grid-template-columns:2fr 1fr 1fr 0.8fr;gap:14px;align-items:center;padding:14px 22px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.pct-trow:last-child{border-bottom:none}
.pct-trow:hover{background:var(--s2)}
.pct-pat{display:flex;align-items:center;gap:12px;min-width:0}
.pct-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pct-name{font-size:13.5px;font-weight:700;color:var(--t1);line-height:1.3}
.pct-sub{font-size:11.5px;color:var(--t3)}
.pct-cell{font-size:12.5px;color:var(--t2);font-weight:500}
/* 3-col layout */
.pac-det-grid{display:grid;grid-template-columns:2fr 1.35fr 1.5fr;gap:18px;align-items:start;margin-top:16px}
.pdc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.pdc:last-child{margin-bottom:0}
.pdc-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.pdc-hl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.pdc-b{padding:16px 18px}
/* Med rows */
.pac-med-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.pac-med-row:last-child{border-bottom:none}
.pac-med-ico{width:36px;height:36px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pac-med-ico svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pac-med-nm{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}
.pac-med-dose{font-size:11.5px;color:var(--t2);margin-top:2px}
.pac-med-ok{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--ok-bg);color:var(--ok);display:inline-block;margin-top:4px}
/* Alergia rows */
.pac-al-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.1);margin-bottom:7px}
.pac-al-row:last-child{margin-bottom:0}
.pac-al-nm{font-size:13px;font-weight:700;color:var(--bad);flex:1}
.pac-al-sev{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.pas-g{background:rgba(239,68,68,.1);color:var(--bad)}
.pas-m{background:rgba(245,158,11,.1);color:var(--warn)}
.pas-l{background:rgba(0,196,122,.08);color:var(--ok)}
/* Exames */
.ex-card{border-radius:12px;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);padding:10px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.ex-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1),0 6px 24px rgba(0,0,0,.07)}
.ex-inner{display:flex;gap:12px;align-items:stretch}
.ex-thumb{width:80px;min-height:80px;border-radius:8px;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ex-thumb svg{width:26px;height:26px;stroke:rgba(13,15,20,.14);fill:none;stroke-width:1.5}
.ex-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:4px 0}
.ex-tipo{font-size:11px;color:var(--t2);font-weight:600;text-transform:capitalize}
.ex-nome{font-size:13.5px;font-weight:700;color:var(--green);line-height:1.3}
.ex-meta{font-size:11px;color:var(--t3);margin-top:2px}
/* Det table */
.det-row{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;line-height:1.3;margin-top:1px}
.det-val{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;word-break:break-word}
/* WA */
.wa-days{display:flex;gap:5px;flex-wrap:wrap}
.wa-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--t3);transition:all .15s;font-family:var(--font)}
.wa-day:hover{background:var(--s2)}
.wa-day.on{background:var(--green);border-color:var(--green);color:var(--dark)}
.wa-time-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.wa-time-inp{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--font);color:var(--t1);background:var(--surface);outline:none;width:90px;transition:border .15s}
.wa-time-inp:focus{border-color:var(--green)}
.wa-note{font-size:11px;color:var(--t3);line-height:1.5;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:8px 10px;margin-top:10px}
/* Badge alergias no header */
.al-badge-hd{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);font-size:11.5px;font-weight:700;color:var(--bad)}
.al-badge-hd::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--bad);flex-shrink:0}
</style>
</head>

var cur=null,waOn=true,waDias=[1,2,3,4,5];
var DIAS=['D','S','T','Q','Q','S','S'];

// Clock
var ck=document.getElementById('clk');
function tick(){var n=new Date();ck.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();

function e(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setCrumb(t){
  document.getElementById('crumb').innerHTML=t;
}

function openP(id){
  cur=PX.find(function(p){return p.id===id;});
  render();
}
function back(){cur=null;render();}
function toggleWa(){
  waOn=!waOn;
  var sw=document.getElementById('wa-sw');
  var desc=document.getElementById('wa-desc');
  if(sw){sw.className='toggle-sw'+(waOn?' on':'');}
  if(desc){desc.textContent=waOn?'Seu número aparece para o paciente no app dele.':'Paciente não consegue iniciar contato.';}
}
function toggleDia(i){
  var idx=waDias.indexOf(i);
  if(idx>-1)waDias.splice(idx,1);else waDias.push(i);
  document.querySelectorAll('.wa-day').forEach(function(b,j){b.classList.toggle('on',waDias.indexOf(j)>-1);});
}

function render(){
  var pg=document.getElementById('pg');
  if(cur){
    setCrumb('<span onclick="back()" style="color:var(--t3);cursor:pointer;font-weight:500">Pacientes</span> <span style="color:var(--t4);margin:0 4px">›</span> <span>'+e(cur.nome)+'</span>');
    pg.innerHTML=renderDetail(cur);
  }else{
    setCrumb('Pacientes');
    pg.innerHTML=renderList();
  }
}

function renderList(){
  var rows=PX.map(function(p){
    var badges=p.alGraves.slice(0,2).map(function(a){return '<span style="font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.18);color:var(--bad);margin-left:5px">'+e(a)+'</span>';}).join('');
    return '<div class="pct-trow" onclick="openP(\''+p.id+'\')"><div class="pct-pat"><div class="pct-av">'+p.ini+'</div><div><div class="pct-name">'+e(p.nome)+badges+'</div><div class="pct-sub">'+p.idade+' anos · '+(p.sexo==='M'?'masculino':'feminino')+' · sangue '+e(p.sangue)+'</div></div></div><div class="pct-cell">'+e(p.plano)+'</div><div class="pct-cell">'+(p.tl[0]?p.tl[0].d.split('·')[0].trim():'—')+'</div><div class="pct-cell">'+(p.retDate?'<span style="color:var(--ok);font-weight:700">'+p.retDate+'</span>':'<span style="color:var(--t3)">—</span>')+'</div></div>';
  }).join('');
  return '<div class="ph"><div><h1>Seus <em>pacientes</em></h1><p>'+PX.length+' que já responderam</p></div></div>'
    +'<div class="pct-card"><div class="pct-thead"><div>Paciente</div><div>Convênio</div><div>Última consulta</div><div>Próximo retorno</div></div>'+rows+'</div>';
}

function renderDetail(p){
  // HEADER
  var alBadges=p.alGraves.map(function(a){return '<span class="al-badge-hd">'+e(a)+'</span>';}).join('');
  var h='<button class="pt-detail-back" onclick="back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Pacientes</button>';
  h+='<div class="pt-head"><div class="pt-av-big">'+p.ini+'</div><div style="flex:1;min-width:0"><div class="pt-name-big">'+e(p.nome)+'</div><div class="pt-meta-big">'+p.idade+' anos · '+(p.sexo==='M'?'masculino':'feminino')+' · sangue '+e(p.sangue)+(alBadges?'<span style="margin-left:4px">'+alBadges+'</span>':'')+'</div></div><div style="display:flex;gap:8px;flex-shrink:0"><button class="btn btn-p" style="height:38px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Enviar pré-consulta</button>'+(p.tel?'<button class="btn btn-s" style="height:38px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>WhatsApp</button>':'')+'</div></div>';

  // 3 COLUNAS
  h+='<div class="pac-det-grid">';

  // COL 1 — Timeline + IA Collab
  h+='<div>';
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Histórico Clínico</span>'+(p.tl.length>2?'<button class="btn btn-ghost btn-sm">Ver tudo</button>':'')+'</div><div class="pdc-b" style="padding:0">';
  if(!p.tl.length){
    h+='<div style="padding:28px;text-align:center"><div style="font-size:13.5px;font-weight:700;color:var(--t2);margin-bottom:6px">Sem pré-consultas ainda</div><div style="font-size:12.5px;color:var(--t3);line-height:1.6;margin-bottom:12px">Quando o paciente concluir a primeira pré-consulta, a evolução clínica aparece aqui.</div><button class="btn btn-p btn-sm">Enviar pré-consulta</button></div>';
  }else{
    h+='<div class="tl-strip" style="border:none;border-radius:0;background:transparent;margin:0">';
    p.tl.forEach(function(ev){h+='<div class="tl-evt'+(ev.warn?' warn':'')+(ev.on?' on':'')+'"><div class="tl-evt-d">'+e(ev.d)+'</div><div class="tl-evt-t">'+e(ev.t)+'</div><div class="tl-evt-b">'+e(ev.b)+'</div></div>';});
    h+='</div>';
  }
  h+='</div></div>';
  // IA Collab
  if(p.tl.length>=2){
    if(p.cmp){h+='<div class="compare-card"><div class="compare-t">⊕ IA Collab</div><div class="compare-b">'+p.cmp+'</div></div>';}
    else{h+='<div class="compare-cta"><div class="compare-cta-t">IA Collab</div><div class="compare-cta-d">Compara automaticamente as anamneses do paciente. Mostra evolução de queixa, vocabulário e intensidade.</div><button class="btn btn-s btn-sm">⊕ Comparar anamneses</button></div>';}
  }
  h+='</div>';

  // COL 2 — Meds + Alergias + Exames
  h+='<div>';
  // Medicamentos
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Medicamentos em uso</span><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--ok-bg);color:var(--ok)">'+p.meds.length+' ativos</span></div><div class="pdc-b" style="padding:8px 18px">';
  p.meds.forEach(function(m){h+='<div class="pac-med-row"><div class="pac-med-ico"><svg viewBox="0 0 24 24"><path d="M10.5 20.5a3.5 3.5 0 01-5-5L15 6a3.5 3.5 0 015 5l-4.5 4.5"/><line x1="9" y1="15" x2="15" y2="9"/></svg></div><div><div class="pac-med-nm">'+e(m.n)+'</div><div class="pac-med-dose">'+e(m.f)+'</div><span class="pac-med-ok">Ativo</span></div></div>';});
  h+='</div></div>';
  // Alergias
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Alergias</span><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bad-bg);color:var(--bad)">'+p.algs.length+' registradas</span></div><div class="pdc-b" style="padding:10px 18px">';
  p.algs.forEach(function(a){h+='<div class="pac-al-row"><span class="pac-al-nm">'+e(a.n)+'</span><span class="pac-al-sev '+a.c+'">'+e(a.g.charAt(0).toUpperCase()+a.g.slice(1))+'</span></div>';});
  h+='</div></div>';
  // Exames
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Exames de '+e(p.nome.split(' ')[0])+'</span></div><div class="pdc-b">';
  h+='<div style="position:relative;margin-bottom:12px"><svg viewBox="0 0 24 24" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Buscar exame..." oninput="filtEx(this.value)" style="width:100%;padding:9px 12px 9px 32px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none"/></div>';
  h+='<div id="ex-list">';
  p.exs.forEach(function(x,i){h+='<div class="ex-card" data-nm="'+x.n.toLowerCase()+'"><div class="ex-inner"><div class="ex-thumb"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div class="ex-info"><div class="ex-tipo">'+e(x.n)+'</div><div class="ex-nome">'+e(x.t)+'</div><div class="ex-meta">'+e(x.d)+(x.l?' · '+e(x.l):'')+'</div></div></div></div>';});
  h+='</div></div></div>';
  h+='</div>';

  // COL 3 — Retorno + WA + Config + Dados
  h+='<div>';
  // Grid retorno + WA
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';
  // Retorno
  h+='<div class="pdc">';
  h+='<div class="pdc-h"><span class="pdc-hl">Próximo Retorno</span></div>';
  if(p.retDate){
    var sc=p.retSt==='confirmed'?'confirmed':'awaiting';
    var st=p.retSt==='confirmed'?'Confirmado pelo paciente':'Aguardando confirmação';
    h+='<div class="pdc-b"><div style="font-size:18px;font-weight:900;letter-spacing:-.4px;color:var(--t1);line-height:1">'+e(p.retDate)+'</div>';
    h+='<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:7px;background:'+(sc==='confirmed'?'var(--ok-bg)':'rgba(245,158,11,.1)')+';color:'+(sc==='confirmed'?'var(--ok)':'var(--warn)')+'"><span style="width:5px;height:5px;border-radius:50%;background:currentColor"></span>'+st+'</div>';
    h+='<div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-s btn-sm">Reagendar</button></div></div>';
  }else{
    h+='<div class="pdc-b"><div style="font-size:12.5px;color:var(--t3);line-height:1.5;margin-bottom:10px">Nenhum retorno agendado.</div><button class="btn btn-p btn-sm" style="width:100%;justify-content:center;height:34px">+ Marcar retorno</button></div>';
  }
  h+='</div>';
  // WhatsApp toggle
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Contato Direto</span></div>';
  h+='<div class="pdc-b"><div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px"><span id="wa-desc" style="font-size:12.5px;color:var(--t2);line-height:1.5;flex:1">'+(waOn?'Seu número aparece para o paciente no app dele.':'Paciente não consegue iniciar contato.')+'</span><div id="wa-sw" class="toggle-sw'+(waOn?' on':'')+'" onclick="toggleWa()"></div></div>';
  if(waOn)h+='<div style="font-size:11.5px;color:var(--t2);font-weight:600">+55 11 9 8765-4321</div>';
  h+='</div></div>';
  h+='</div>'; // ret+wa grid

  // Config WA
  h+='<div class="pdc" style="margin-bottom:14px"><div class="pdc-h"><span class="pdc-hl">Configurações de Contato</span><button class="btn btn-ghost btn-sm">Salvar</button></div><div class="pdc-b">';
  h+='<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px">Dias disponíveis</div>';
  h+='<div class="wa-days">';
  DIAS.forEach(function(l,i){h+='<button class="wa-day'+(waDias.indexOf(i)>-1?' on':'')+'" onclick="toggleDia('+i+')">'+l+'</button>';});
  h+='</div>';
  h+='<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 7px">Horário</div>';
  h+='<div class="wa-time-row"><input class="wa-time-inp" type="time" value="08:00"/><span style="font-size:12px;color:var(--t3);font-weight:600">até</span><input class="wa-time-inp" type="time" value="19:00"/></div>';
  h+='<div class="wa-note">Fora deste horário o paciente vê quando você estará disponível.</div>';
  h+='</div></div>';

  // Dados do paciente
  h+='<div class="pdc"><div class="pdc-h"><span class="pdc-hl">Dados do Paciente</span></div><div class="pdc-b" style="padding:4px 18px">';
  var det=[['CPF',p.cpf],['Telefone',p.tel],['E-mail',p.email],['Convênio',p.plano],['Carteirinha',p.cart],['Cidade',p.cidade],['Cadastro',p.cadastro],['Hist. familiar',p.familiar]];
  det.forEach(function(r){h+='<div class="det-row"><span class="det-lbl">'+r[0]+'</span><span class="det-val">'+e(r[1])+'</span></div>';});
  h+='</div></div>';

  h+='</div>'; // col 3
  h+='</div>'; // pac-det-grid
  return h;
}

function filtEx(q){
  q=q.toLowerCase();
  document.querySelectorAll('#ex-list .ex-card').forEach(function(c){c.style.display=(c.getAttribute('data-nm')||'').includes(q)?'':'none';});
}

render();
</script>
</body>
</html>
