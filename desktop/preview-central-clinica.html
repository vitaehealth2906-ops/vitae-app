<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vitaid · Central Clínica</title>
<link href="desktop-core.css" rel="stylesheet">
<style>
/* ── copiado de app-v2.html (exato) ──────────────────────── */
.pt-detail-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:8px;background:none;border:none;font-family:var(--font);margin-bottom:16px}
.pt-detail-back:hover{background:var(--s2)}
.pt-detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt-head{display:flex;align-items:center;gap:14px;padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:18px}
.pt-av-big{width:60px;height:60px;border-radius:50%;background:var(--grad);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;overflow:hidden}
.pt-av-big img{width:100%;height:100%;object-fit:cover}
.pt-name-big{font-size:21px;font-weight:900;letter-spacing:-.4px}
.pt-meta-big{font-size:12px;color:var(--t3);margin-top:3px}
/* Timeline */
.tl-strip{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 24px 24px 46px}
.tl-strip::before{content:'';position:absolute;left:29px;top:30px;bottom:30px;width:2px;background:var(--border)}
.tl-evt{position:relative;margin-bottom:18px}
.tl-evt:last-child{margin-bottom:0}
.tl-evt::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--green)}
.tl-evt.warn::before{border-color:var(--warn)}
.tl-evt.on::before{background:var(--green)}
.tl-evt-d{font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tl-evt-t{font-size:13.5px;font-weight:800;color:var(--t1);margin-top:3px;cursor:pointer}
.tl-evt-t:hover{color:#00C47A}
.tl-evt-b{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-top:9px;font-size:12.5px;line-height:1.55;color:var(--t2)}
/* IA Collab */
.compare-cta{margin-top:14px;padding:18px;background:var(--surface);border:1px dashed var(--b2);border-radius:12px;text-align:center}
.compare-cta-t{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:5px}
.compare-cta-d{font-size:11.5px;color:var(--t3);margin-bottom:12px;line-height:1.5}
.compare-card{background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.18);border-radius:14px;padding:18px;margin-top:14px}
.compare-t{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:#00C47A;margin-bottom:8px}
.compare-b{font-size:12.5px;line-height:1.6;color:var(--t1)}
.compare-b strong{font-weight:800}
.compare-b em{color:#00C47A;font-style:normal;font-weight:600}
/* Meds chips — exato do app */
.meds-chips{display:flex;flex-wrap:wrap;gap:6px}
.med-chip{padding:6px 11px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:100px;font-size:11.5px;font-weight:700;color:#027A48;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.med-chip:hover{background:#D1FAE5;transform:translateY(-1px)}
.med-chip .dose{color:#065F46;font-weight:600;opacity:.75}
/* Alergias */
.aler-chip{padding:6px 11px;background:#FEF2F2;border:1px solid #FECACA;border-radius:100px;font-size:11.5px;font-weight:700;color:#B91C1C;display:inline-flex;align-items:center;gap:6px}
.aler-chips{display:flex;flex-wrap:wrap;gap:6px}
/* Exames — exato do app */
.exame-item{border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);padding:10px;margin-bottom:10px;transition:box-shadow .15s}
.exame-item[onclick]{cursor:pointer}
.exame-item:hover{box-shadow:0 4px 8px rgba(0,0,0,.12),0 8px 24px rgba(0,0,0,.08)}
/* Toggle */
.toggle-sw{position:relative;width:42px;height:24px;background:var(--s3);border-radius:100px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle-sw.on::after{left:20px}
/* Section label */
.section-lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin:20px 0 10px;display:flex;align-items:center;gap:10px}
/* Nova grid 2 colunas */
.pd-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:22px;align-items:start}
/* Cards da coluna direita */
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.r-card:last-child{margin-bottom:0}
.r-card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.r-card-hl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.r-card-b{padding:14px 18px}
/* Det table */
.det-row{display:grid;grid-template-columns:82px 1fr;gap:8px;align-items:start;padding:7px 0;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;line-height:1.3;margin-top:1px}
.det-val{font-size:12.5px;color:var(--t1);font-weight:500;line-height:1.4;word-break:break-word}
/* Retorno + WA mini */
.rw-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;margin-bottom:14px}
.rw-mini{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.rw-mini-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
/* WA config */
.wa-days{display:flex;gap:5px;flex-wrap:wrap}
.wa-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--t3);transition:all .15s;font-family:var(--font)}
.wa-day:hover{background:var(--s2)}
.wa-day.on{background:var(--green);border-color:var(--green);color:var(--dark)}
.wa-time-inp{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;font-family:var(--font);color:var(--t1);background:var(--surface);outline:none;width:84px;transition:border .15s}
.wa-time-inp:focus{border-color:var(--green)}
/* Pacientes lista */
.pat-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:.12s}
.pat-item:hover{background:var(--bg)}
.pat-item.on{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.30)}
.pat-item-av{width:36px;height:36px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pat-item-name{font-size:13.5px;font-weight:700;color:var(--t1)}
.pat-item-meta{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:5px}
.pat-pulse{width:6px;height:6px;border-radius:50%;background:#00C47A;flex-shrink:0}
.pat-pulse.warn{background:var(--warn)}
.pct-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.pct-thead{display:grid;grid-template-columns:2fr 1fr 1fr 0.9fr;gap:14px;align-items:center;padding:12px 22px;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);background:#FAFBFC;border-bottom:1px solid var(--border)}
.pct-trow{display:grid;grid-template-columns:2fr 1fr 1fr 0.9fr;gap:14px;align-items:center;padding:14px 22px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.pct-trow:last-child{border-bottom:none}
.pct-trow:hover{background:var(--s2)}
.pct-pat{display:flex;align-items:center;gap:12px;min-width:0}
.pct-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pct-name{font-size:13.5px;font-weight:700;color:var(--t1);line-height:1.3}
.pct-sub{font-size:11.5px;color:var(--t3)}
.pct-cell{font-size:12.5px;color:var(--t2);font-weight:500}
</style>
</head>

var ck=document.getElementById('clk');
function tick(){var n=new Date();ck.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setCrumb(h){document.getElementById('crumb').innerHTML=h;}
function openP(id){cur=PX.find(function(p){return p.id===id;});cmpLigado=false;render();}
function back(){cur=null;render();}
function toggleWa(){
  waOn=!waOn;
  var sw=document.getElementById('wa-sw');if(sw)sw.className='toggle-sw'+(waOn?' on':'');
  var desc=document.getElementById('wa-desc');if(desc)desc.textContent=waOn?'Número visível para o paciente.':'Paciente não consegue iniciar contato.';
}
function toggleDia(i){
  var idx=waDias.indexOf(i);if(idx>-1)waDias.splice(idx,1);else waDias.push(i);
  document.querySelectorAll('.wa-day').forEach(function(b,j){b.classList.toggle('on',waDias.indexOf(j)>-1);});
}
function ativarCollab(){cmpLigado=true;render();}
function filtEx(q){
  q=(q||'').toLowerCase();
  document.querySelectorAll('#ex-list .exame-item').forEach(function(c){
    c.style.display=(c.getAttribute('data-nm')||'').includes(q)?'':'none';
  });
}

function render(){
  var pg=document.getElementById('pg');
  if(cur){
    setCrumb('<span onclick="back()" style="color:var(--t3);cursor:pointer;font-weight:500">Pacientes</span> <span style="color:var(--t4);margin:0 5px">›</span>'+esc(cur.nome));
    pg.innerHTML=renderDetail(cur);
  }else{
    setCrumb('Pacientes');
    pg.innerHTML=renderList();
  }

    var ret=p.retDate?'<span style="color:var(--ok);font-weight:600;font-size:12.5px">'+esc(p.retDate)+'</span>':'<span style="color:var(--t3)">—</span>';
    return '<div class="pct-trow" onclick="openP(\''+p.id+'\')">'

      +'<div class="pct-cell">'+(p.tl[0]?esc(p.tl[0].d.split('·')[0].trim()):'—')+'</div>'
      +'<div>'+ret+'</div>'

    +'<div class="pct-card"><div class="pct-thead"><div>Paciente</div><div>Convênio</div><div>Última consulta</div><div>Próximo retorno</div></div>'+rows+'</div>';
}

      +'<div class="pt-meta-big">'+p.idade+' anos · '+(p.sexo==='M'?'masculino':'feminino')+' · sangue '+esc(p.sangue)+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;flex-shrink:0">'
      +'<button class="btn btn-p" style="height:38px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Enviar pré-consulta</button>'
      +(p.tel?'<button class="btn btn-s" style="height:38px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</button>':'')
    +'</div>'
  +'</div>';

  // 2 COLUNAS
  h+='<div class="pd-grid">';

  // ── COL ESQUERDA ─────────────────────────────────────────────
  h+='<div>';

  // Timeline
  h+='<div class="section-lbl" style="margin-top:0">Linha do tempo de anamneses</div>';
  if(!p.tl.length){
    h+='<div style="padding:28px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:14px"><div style="font-size:13.5px;font-weight:700;color:var(--t2);margin-bottom:6px">Sem pré-consultas ainda</div><div style="font-size:12.5px;color:var(--t3);line-height:1.6;margin-bottom:12px">Quando o paciente concluir a primeira pré-consulta, a evolução clínica aparece aqui.</div><button class="btn btn-p btn-sm">Enviar pré-consulta</button></div>';
  }else{
    h+='<div class="tl-strip">';
    p.tl.forEach(function(ev){h+='<div class="tl-evt'+(ev.warn?' warn':'')+(ev.on?' on':'')+'"><div class="tl-evt-d">'+esc(ev.d)+'</div><div class="tl-evt-t">'+esc(ev.t)+'</div><div class="tl-evt-b">'+esc(ev.b)+'</div></div>';});
    h+='</div>';
  }

  // IA Collab — exato como no app
  if(p.tl.length>=2){
    if(cmpLigado&&p.cmp){
      h+='<div class="compare-card"><div class="compare-t">⊕ IA Collab</div><div class="compare-b">'+p.cmp+'</div></div>';
    }else if(cmpLigado){
      h+='<div class="compare-card"><div class="compare-t">⊕ IA Collab</div><div class="compare-b">Análise em andamento — aguarde a próxima pré-consulta.</div></div>';
    }else{
      h+='<div class="compare-cta"><div class="compare-cta-t">IA Collab</div><div class="compare-cta-d">Compara automaticamente esta anamnese com as anteriores deste paciente. Mostra evolução de queixa, vocabulário e intensidade.</div><button class="btn btn-s btn-sm" onclick="ativarCollab()">⊕ Comparar com anamneses anteriores</button></div>';
    }
  }else{
    h+='<div class="compare-cta" style="opacity:.8"><div class="compare-cta-t">IA Collab</div><div class="compare-cta-d">Esse paciente tem só '+p.tl.length+' pré-consulta. A IA Collab compara a evolução entre 2 ou mais consultas. Quando tiver outra, o botão aparece aqui.</div></div>';
  }

  // Próximo Retorno + Contato Direto (lado a lado)
  h+='<div class="rw-grid">';
  // Retorno
  h+='<div class="rw-mini"><div class="rw-mini-lbl">Próximo Retorno</div>';
  if(p.retDate){
    var sc=p.retSt==='confirmed';
    h+='<div style="font-size:17px;font-weight:900;letter-spacing:-.4px;color:var(--t1);line-height:1">'+esc(p.retDate)+'</div>';
    h+='<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:7px;background:'+(sc?'var(--ok-bg)':'rgba(245,158,11,.1)')+';color:'+(sc?'var(--ok)':'var(--warn)')+'"><span style="width:5px;height:5px;border-radius:50%;background:currentColor"></span>'+(sc?'Confirmado':'Aguardando')+'</div>';
    h+='<div style="margin-top:10px"><button class="btn btn-s btn-sm">Reagendar</button></div>';
  }else{
    h+='<div style="font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:10px">Nenhum retorno agendado.</div><button class="btn btn-p btn-sm" style="width:100%;justify-content:center;height:32px">+ Marcar retorno</button>';
  }
  h+='</div>';
  // Contato Direto
  h+='<div class="rw-mini"><div class="rw-mini-lbl">Contato Direto</div>';
  h+='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px"><span id="wa-desc" style="font-size:12px;color:var(--t2);line-height:1.5;flex:1">'+(waOn?'Número visível para o paciente.':'Paciente não consegue iniciar contato.')+'</span><div id="wa-sw" class="toggle-sw'+(waOn?' on':'')+'" onclick="toggleWa()"></div></div>';
  if(waOn)h+='<div style="font-size:11.5px;color:var(--t2);font-weight:600">+55 11 9 8765-4321</div>';
  h+='</div>';
  h+='</div>'; // rw-grid

  // Configurações de Contato
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)"><span style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)">Configurações de Contato</span><button class="btn btn-ghost btn-sm">Salvar</button></div>';
  h+='<div style="padding:14px 18px">';
  h+='<div style="font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px">Dias disponíveis</div>';
  h+='<div class="wa-days">';
  DIAS.forEach(function(l,i){h+='<button class="wa-day'+(waDias.indexOf(i)>-1?' on':'')+'" onclick="toggleDia('+i+')">'+l+'</button>';});
  h+='</div>';
  h+='<div style="font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:10px 0 6px">Horário</div>';
  h+='<div style="display:flex;align-items:center;gap:8px"><input class="wa-time-inp" type="time" value="08:00"/><span style="font-size:12px;color:var(--t3);font-weight:600">até</span><input class="wa-time-inp" type="time" value="19:00"/></div>';
  h+='<div style="font-size:11px;color:var(--t3);line-height:1.5;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:8px 10px;margin-top:10px">Fora deste horário, o paciente vê quando você estará disponível.</div>';
  h+='</div></div>';
  h+='</div>'; // col esquerda

  // ── COL DIREITA ──────────────────────────────────────────────
  h+='<div>';

  // Medicamentos — chips exatos do app
  h+='<div class="r-card">';
  h+='<div class="r-card-h"><span class="r-card-hl">Medicamentos</span><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#ECFDF5;color:#027A48">'+p.meds.length+' ativo'+(p.meds.length!==1?'s':'')+'</span></div>';
  h+='<div class="r-card-b" style="padding:12px 18px"><div class="meds-chips">';
  p.meds.forEach(function(m){h+='<span class="med-chip">'+esc(m.n)+(m.d?' <span class="dose">'+esc(m.d)+'</span>':'')+'</span>';});
  h+='</div></div></div>';

  // Alergias — chips
  h+='<div class="r-card">';
  h+='<div class="r-card-h"><span class="r-card-hl">Alergias</span><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+(p.alGraves.length?'#FEF2F2':'#ECFDF5')+';color:'+(p.alGraves.length?'#B91C1C':'#027A48')+'">'+p.algs.length+' registrada'+(p.algs.length!==1?'s':'')+'</span></div>';
  h+='<div class="r-card-b" style="padding:12px 18px"><div class="aler-chips">';
  p.algs.forEach(function(a){h+='<span class="aler-chip">'+esc(a.n)+'<span style="font-size:10px;opacity:.7">'+esc(a.g.toLowerCase())+'</span></span>';});
  h+='</div></div></div>';

  // Exames — exato como no app (exame-item + busca)
  h+='<div class="r-card">';
  h+='<div class="r-card-h"><span style="font-size:14px;font-weight:800;color:var(--green);letter-spacing:-.3px">Exames de '+esc(p.nome.split(' ')[0])+'</span></div>';
  h+='<div class="r-card-b">';
  h+='<div style="position:relative;margin-bottom:12px"><svg viewBox="0 0 24 24" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Buscar exame..." oninput="filtEx(this.value)" style="width:100%;padding:10px 12px 10px 36px;background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:12px;font-family:var(--font);font-size:13px;color:var(--t1);outline:none"/></div>';
  h+='<div id="ex-list">';
  if(p.exs.length){
    p.exs.forEach(function(x){
      var clk=x.url?'onclick="window.open(\''+x.url+'\',\'_blank\',\'noopener\')"':'';
      h+='<div class="exame-item" data-nm="'+(x.tipo+' '+x.nome).toLowerCase()+'" '+clk+'><div style="display:flex;gap:14px;align-items:stretch">'
        +'<div style="width:90px;min-height:100px;border-radius:8px;background:#f0f2f5;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(13,15,20,.12)" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>'
        +'<div style="flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:4px 0">'
          +'<div style="font-size:11px;color:#5A6070;text-transform:capitalize;font-weight:600">'+esc(x.tipo)+'</div>'
          +'<div style="font-size:14px;font-weight:700;color:var(--green);line-height:1.35">'+esc(x.nome)+'</div>'
          +'<div style="font-size:11px;color:#6B7280;margin-top:2px">'+esc(x.data)+(x.lab?' · '+esc(x.lab):'')+'</div>'
        +'</div>'
      +'</div></div>';
    });
  }else{
    h+='<div style="text-align:center;padding:30px 10px;color:var(--t3);font-size:13px">Nenhum exame registrado</div>';
  }
  h+='</div></div></div>';

  // Dados do Paciente
  h+='<div class="r-card">';
  h+='<div class="r-card-h"><span class="r-card-hl">Dados do Paciente</span></div>';
  h+='<div class="r-card-b" style="padding:4px 18px">';
  [['CPF',p.cpf],['Telefone',p.tel],['E-mail',p.email],['Convênio',p.plano],['Carteirinha',p.cart],['Cidade',p.cidade],['Cadastro',p.cadastro],['Hist. familiar',p.familiar]].forEach(function(r){
    h+='<div class="det-row"><span class="det-lbl">'+r[0]+'</span><span class="det-val">'+esc(r[1])+'</span></div>';
  });
  h+='</div></div>';

  h+='</div>'; // col direita
  h+='</div>'; // pd-grid
  return h;
}

render();
</script>
</body>
</html>
