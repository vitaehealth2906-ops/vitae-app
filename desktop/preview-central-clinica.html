<style>
/* ── CSS EXTRA COPIADO DE app-v2.html (linhas 130–550) ── */

/* PACIENTE — TIMELINE DETAIL */
.pt-detail-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:8px;background:none;border:none;font-family:var(--font);margin-bottom:16px}
.pt-detail-back:hover{background:var(--s2)}
.pt-detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt-head{display:flex;align-items:center;gap:14px;padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px}
.pt-av-big{width:60px;height:60px;border-radius:50%;background:var(--grad);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;overflow:hidden}
.pt-av-big img{width:100%;height:100%;object-fit:cover}
.pt-name-big{font-size:21px;font-weight:900;letter-spacing:-.4px}
.pt-meta-big{font-size:12px;color:var(--t3);margin-top:3px}

/* TIMELINE */
.tl-strip{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 24px 24px 46px}
.tl-strip::before{content:'';position:absolute;left:29px;top:30px;bottom:30px;width:2px;background:var(--border)}
.tl-evt{position:relative;margin-bottom:18px}
.tl-evt:last-child{margin-bottom:0}
.tl-evt::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--green)}
.tl-evt.warn::before{border-color:var(--warn)}
.tl-evt.on::before{background:var(--green)}
.tl-evt-d{font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tl-evt-t{font-size:13.5px;font-weight:800;color:var(--t1);margin-top:3px;cursor:pointer}
.tl-evt-t:hover{color:#00C47A}
.tl-evt-b{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-top:9px;font-size:12.5px;line-height:1.55;color:var(--t2)}

/* COMPARE */
.compare-cta{margin-top:14px;padding:18px;background:var(--surface);border:1px dashed var(--b2);border-radius:12px;text-align:center}
.compare-cta-t{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:5px}
.compare-cta-d{font-size:11.5px;color:var(--t3);margin-bottom:12px;line-height:1.5}
.compare-card{background:linear-gradient(135deg,rgba(0,229,160,.06),rgba(0,180,216,.04));border:1px solid rgba(0,229,160,.18);border-radius:14px;padding:18px;margin-top:14px}
.compare-t{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:#00C47A;margin-bottom:8px}
.compare-b{font-size:12.5px;line-height:1.6;color:var(--t1)}
.compare-b strong{font-weight:800}
.compare-b em{color:#00C47A;font-style:normal;font-weight:600}

/* PACIENTE DETALHE — layout 3 colunas */
.pac-det-wrap{padding:20px 24px;max-width:1320px;margin:0 auto}
.pac-det-grid{display:grid;grid-template-columns:2fr 1.35fr 1.5fr;gap:18px;align-items:start;margin-top:16px}
@media(max-width:1100px){.pac-det-grid{grid-template-columns:1fr}}
.pdc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.pdc:last-child{margin-bottom:0}
.pdc-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.pdc-hl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.pdc-b{padding:16px 18px}
.pdc-b .section-lbl{margin-top:0;margin-bottom:10px}

/* Med rows */
.pac-med-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.pac-med-row:last-child{border-bottom:none}
.pac-med-ico{width:36px;height:36px;border-radius:9px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pac-med-ico svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pac-med-nm{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2}
.pac-med-dose{font-size:11.5px;color:var(--t2);margin-top:2px}
.pac-med-active{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--ok-bg);color:var(--ok);margin-top:4px;display:inline-block}

/* Alergia rows */
.pac-al-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.1);margin-bottom:7px}
.pac-al-row:last-child{margin-bottom:0}
.pac-al-nm{font-size:13px;font-weight:700;color:var(--bad);flex:1}
.pac-al-sev{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.pas-g{background:rgba(239,68,68,.1);color:var(--bad)}
.pas-m{background:rgba(245,158,11,.1);color:var(--warn)}
.pas-l{background:rgba(0,196,122,.08);color:var(--ok)}

/* Tabela de dados */
.det-row{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;line-height:1.3}
.det-val{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;word-break:break-word}

/* WhatsApp config */
.wa-days{display:flex;gap:5px;flex-wrap:wrap}
.wa-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--t3);transition:all .15s;font-family:var(--font)}
.wa-day:hover{background:var(--s2);color:var(--t2)}
.wa-day.on{background:var(--green);border-color:var(--green);color:var(--dark)}
.wa-toggle-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.wa-desc{font-size:12.5px;color:var(--t2);line-height:1.5;flex:1}
.wa-cfg-note{font-size:11px;color:var(--t3);line-height:1.5;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);border-radius:8px;padding:8px 10px;margin-top:10px}
.wa-time-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.wa-time-inp{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--font);color:var(--t1);background:var(--surface);outline:none;width:90px;transition:border .15s}
.wa-time-inp:focus{border-color:var(--green)}
.wa-time-sep{font-size:12px;color:var(--t3);font-weight:600}

/* Lista de pacientes */
.pat-list{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px;max-height:780px;overflow-y:auto}
.pat-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:.12s}
.pat-item:hover{background:var(--bg)}
.pat-item.on{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.30)}
.pat-item-av{width:36px;height:36px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pat-item-name{font-size:13.5px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-item-meta{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:6px;align-items:center}
.pat-pulse{width:6px;height:6px;border-radius:50%;background:#00C47A;flex-shrink:0}
.pat-pulse.warn{background:var(--warn)}
.pat-pulse.gray{background:var(--t4)}

/* Tabela pacientes (header) */
.pct-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(13,15,20,.04)}
.pct-thead,.pct-trow{display:grid;grid-template-columns:2.2fr 1.2fr 1fr 0.9fr 0.7fr;gap:14px;align-items:center;padding:12px 22px}
.pct-thead{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);background:#FAFBFC;border-bottom:1px solid var(--border)}
.pct-trow{padding:14px 22px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.pct-trow:last-child{border-bottom:none}
.pct-trow:hover{background:var(--s2)}
.pct-trow.on{background:rgba(0,229,160,.04)}
.pct-pat{display:flex;align-items:center;gap:12px;min-width:0}
.pct-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:var(--dark);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pct-name{font-size:13.5px;font-weight:700;color:var(--t1);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct-sub{font-size:11.5px;color:var(--t4);margin-top:2px;font-weight:500}
.pct-cell{font-size:12.5px;color:var(--t2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pct-cell.muted{color:var(--t3)}
.pct-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pct-pill{padding:7px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;font-family:var(--font)}
.pct-pill:hover{border-color:var(--b2);color:var(--t1)}
.pct-pill.on{background:rgba(0,229,160,.10);color:#00C47A;border-color:rgba(0,229,160,.30)}
.pct-ct{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:999px;background:var(--s2);color:var(--t3);min-width:18px;text-align:center}
.pct-pill.on .pct-ct{background:rgba(0,229,160,.18);color:#00C47A}
.pct-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.pct-title{font-size:26px;font-weight:800;letter-spacing:-.025em;color:var(--t1);margin:0}
.pct-title em{font-style:italic;color:#00C47A;font-weight:800}

/* section-lbl */
.section-lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.section-lbl .pill{font-size:10px;padding:3px 8px;border-radius:100px;background:var(--s2);color:var(--t2);letter-spacing:.04em;font-weight:700}
.pcn-empty{text-align:center;padding:30px 20px;color:var(--t3);font-size:12.5px}

/* toggle-sw */
.toggle-sw{position:relative;width:42px;height:24px;background:var(--s3);border-radius:100px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle-sw.on::after{left:20px}
.pfn-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#F9FAFB;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;gap:14px}

/* Exames cards no detalhe */
.exam-search{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12.5px;color:var(--t1);outline:none;margin-bottom:10px;transition:border .15s}
.exam-search:focus{border-color:rgba(0,229,160,.45);box-shadow:0 0 0 3px rgba(0,229,160,.12)}
.exam-card{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.exam-card:last-child{border-bottom:none}
.exam-thumb{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,rgba(0,229,160,.12),rgba(0,180,216,.10));border:1px solid rgba(0,229,160,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exam-thumb svg{width:16px;height:16px;stroke:#00C47A;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.exam-nm{font-size:13px;font-weight:700;color:#00C47A;line-height:1.2}
.exam-meta{font-size:11px;color:var(--t3);margin-top:2px}

/* retorno card */
.ret-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ret-mini{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.ret-mini-lbl{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.ret-mini-val{font-size:14px;font-weight:800;color:var(--t1)}
.ret-mini-sub{font-size:11px;color:var(--t3);margin-top:3px}
.ret-badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:700;margin-top:6px}
.ret-badge.awaiting{background:rgba(245,158,11,.10);color:var(--warn)}
.ret-badge.confirmed{background:rgba(0,196,122,.10);color:#00C47A}
.ret-badge.none{background:var(--s2);color:var(--t3)}

/* alerta grave no header */
.alg-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);font-size:10.5px;font-weight:700;color:var(--bad);margin-left:6px}
.alg-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--bad)}
</style>
</head>

      {nome:'Salbutamol spray', freq:'Conforme necessário'},
      {nome:'Montelucaste 10mg', freq:'1x ao dia — noite'}
    ],
    algs:[
      {nome:'Látex', grav:'grave'},
      {nome:'Ibuprofeno', grav:'grave'},
      {nome:'Amendoim', grav:'moderada'}
    ],
    exames:[{nome:'Espirometria', tipo:'PDF', data:'05 mai 2026', lab:'Pneumoclínica SP'}],
    tl:[{d:'05 MAI 2026 · 15:31', t:'Crise de broncoespasmo noturna', b:'3 episódios de broncoespasmo na última semana após 22h. Acordou 2 vezes com aperto no peito e chiado audível.', warn:true, on:true}],
    compare:null
  }
];

/* ── ESTADO ── */
var cur = null;
var waOn = true;
var waDias = [1,2,3,4,5];

/* ── RELÓGIO ── */
function tick(){
  var d = new Date();
  var h = String(d.getHours()).padStart(2,'0');
  var m = String(d.getMinutes()).padStart(2,'0');
  var el = document.getElementById('tb-clock');
  if(el) el.textContent = h + ':' + m;
}
tick(); setInterval(tick, 10000);

/* ── HELPERS ── */
function sevClass(g){
  if(g==='grave') return 'pas-g';
  if(g==='moderada') return 'pas-m';
  return 'pas-l';
}
function sevLabel(g){
  if(g==='grave') return 'Grave';
  if(g==='moderada') return 'Moderada';
  return 'Leve';
}
function retLabel(st){
  if(st==='awaiting') return 'Aguardando confirmação';
  if(st==='confirmed') return 'Confirmado';
  return '—';
}
function retClass(st){
  if(st==='awaiting') return 'awaiting';
  if(st==='confirmed') return 'confirmed';
  return 'none';
}
var DIAS_LABELS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

/* ── OPEN / BACK ── */
function openPac(id){
  cur = PX.find(function(p){return p.id===id;});
  render();
}
function back(){
  cur = null;
  render();
}
function toggleWa(){
  waOn = !waOn;
  var t = document.getElementById('wa-toggle');
  if(t){ if(waOn) t.classList.add('on'); else t.classList.remove('on'); }
  var note = document.getElementById('wa-note');
  if(note) note.style.display = waOn ? '' : 'none';
}
function toggleDia(i){
  var idx = waDias.indexOf(i);
  if(idx===-1){ waDias.push(i); } else { waDias.splice(idx,1); }
  document.querySelectorAll('.wa-day').forEach(function(el){
    var d = parseInt(el.dataset.d);
    if(waDias.indexOf(d)!==-1) el.classList.add('on'); else el.classList.remove('on');
  });
}

/* ══════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════ */
function render(){
  var el = document.getElementById('app-content');
  var bc = document.getElementById('tb-breadcrumb');
  if(cur){
    bc.innerHTML = '<span style="color:var(--t3);cursor:pointer" onclick="back()">Pacientes</span>'
      +' <svg width="12" height="12" viewBox="0 0 12 12" style="stroke:var(--t3);fill:none;stroke-width:1.8;vertical-align:middle;margin:0 2px"><path d="M4 2l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +' <span>'+cur.nome+'</span>';
    el.innerHTML = renderDetalhe(cur);
    bindWaToggle();
    bindWaDias();
  } else {
    bc.textContent = 'Pacientes';
    el.innerHTML = renderLista();
  }
}

/* ══════════════════════════════════
   TELA LISTA
══════════════════════════════════ */
function renderLista(){
  var rows = PX.map(function(p){
    var haWarn = p.alergiasGraves.length > 0;
    var pulseClass = p.tl[0].warn ? 'warn' : 'gray';
    var lastConsulta = p.tl[0].d.split(' · ')[0];
    return '<div class="pct-trow'+(haWarn?' ':'')+(p===cur?' on':'')+'" onclick="openPac(\''+p.id+'\')">'
      // coluna 1: paciente
      +'<div class="pct-pat">'
        +'<div class="pct-av">'+p.ini+'</div>'
        +'<div>'
          +'<div class="pct-name">'+p.nome+'</div>'
          +'<div class="pct-sub">'+p.idade+' anos · '+p.sexo+' · '+p.sangue+'</div>'
        +'</div>'
      +'</div>'
      // coluna 2: plano
      +'<div class="pct-cell">'+p.plano.split(' · ')[0]+'</div>'
      // coluna 3: última consulta
      +'<div class="pct-cell">'+lastConsulta+'</div>'
      // coluna 4: alertas
      +'<div class="pct-cell">'
        +(haWarn
          ? '<span style="color:var(--bad);font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--bad);display:inline-block"></span>'+p.alergiasGraves.length+' alerg. grave'+(p.alergiasGraves.length>1?'s':'')+'</span>'
          : '<span class="pct-cell muted">—</span>')
      +'</div>'
      // coluna 5: seta
      +'<div style="display:flex;justify-content:flex-end">'
        +'<svg width="16" height="16" viewBox="0 0 16 16" style="stroke:var(--t4);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M5 3l6 5-6 5"/></svg>'
      +'</div>'
    +'</div>';
  }).join('');

  return '<div style="padding:20px 24px;max-width:1240px;margin:0 auto">'
    +'<div class="pct-header">'
      +'<div>'
        +'<h1 class="pct-title">Pacientes <em>ativos</em></h1>'
        +'<div class="pct-sub" style="font-size:13px;color:var(--t3);margin-top:4px;font-weight:500">'+PX.length+' pacientes cadastrados · clique para ver o histórico completo</div>'
      +'</div>'
      +'<button class="btn btn-primary" style="height:40px;padding:0 18px;font-size:13px">'
        +'<svg width="14" height="14" viewBox="0 0 14 14" style="stroke:currentColor;fill:none;stroke-width:2;margin-right:6px;vertical-align:middle"><path d="M7 1v12M1 7h12" stroke-linecap="round"/></svg>'
        +'Novo paciente'
      +'</button>'
    +'</div>'

    +'<div class="pct-pills">'
      +'<button class="pct-pill on" onclick="return false">Todos <span class="pct-ct">'+PX.length+'</span></button>'
      +'<button class="pct-pill" onclick="return false">Com retorno</button>'
      +'<button class="pct-pill" onclick="return false">Alerta ativo</button>'
    +'</div>'

    +'<div class="pct-card">'
      +'<div class="pct-thead">'
        +'<div>Paciente</div>'
        +'<div>Convênio</div>'
        +'<div>Última consulta</div>'
        +'<div>Alertas</div>'
        +'<div></div>'
      +'</div>'
      +rows
    +'</div>'
  +'</div>';
}

/* ══════════════════════════════════
   TELA DETALHE — 3 COLUNAS
══════════════════════════════════ */
function renderDetalhe(p){
  return '<div class="pac-det-wrap">'
    // back + header
    +'<button class="pt-detail-back" onclick="back()">'
      +'<svg viewBox="0 0 14 14"><path d="M9 2L4 7l5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +'Voltar para pacientes'
    +'</button>'
    +renderPtHead(p)
    +'<div class="pac-det-grid">'
      +renderCol1(p)
      +renderCol2(p)
      +renderCol3(p)
    +'</div>'
  +'</div>';
}

function renderPtHead(p){
  var gravBadges = p.alergiasGraves.map(function(a){
    return '<span class="alg-badge">'+a+'</span>';
  }).join('');
  return '<div class="pt-head">'
    +'<div class="pt-av-big">'+p.ini+'</div>'
    +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">'
        +'<span class="pt-name-big">'+p.nome+'</span>'
        +gravBadges
      +'</div>'
      +'<div class="pt-meta-big">'+p.idade+' anos · '+p.sexo+' · Tipo sanguíneo '+p.sangue+' · '+p.plano+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-left:auto">'
      +'<button class="btn btn-ghost btn-sm">'
        +'<svg width="13" height="13" viewBox="0 0 13 13" style="stroke:currentColor;fill:none;stroke-width:1.8;margin-right:5px;vertical-align:middle"><rect x="1" y="1" width="11" height="11" rx="2"/><path d="M4 5h5M4 7.5h3" stroke-linecap="round"/></svg>'
        +'Nova consulta'
      +'</button>'
      +'<button class="btn btn-primary btn-sm">'
        +'<svg width="13" height="13" viewBox="0 0 13 13" style="stroke:currentColor;fill:none;stroke-width:1.8;margin-right:5px;vertical-align:middle"><path d="M1 6.5 a5.5 5.5 0 1 0 11 0 a5.5 5.5 0 1 0 -11 0" stroke-linecap="round"/><path d="M6.5 4v2.5l1.5 1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        +'Pré-consulta'
      +'</button>'
    +'</div>'
  +'</div>';
}

/* COLUNA 1 — Timeline + IA Collab */
function renderCol1(p){
  var tlItems = p.tl.map(function(ev){
    return '<div class="tl-evt'+(ev.warn?' warn':'')+(ev.on?' on':'')+'">'
      +'<div class="tl-evt-d">'+ev.d+'</div>'
      +'<div class="tl-evt-t">'+ev.t+'</div>'
      +(ev.on ? '<div class="tl-evt-b">'+ev.b+'</div>' : '')
    +'</div>';
  }).join('');

  var compareHtml = '';
  if(p.compare){
    compareHtml = '<div class="compare-card">'
      +'<div class="compare-t">Cruzamento de consultas</div>'
      +'<div class="compare-b">'+p.compare+'</div>'
    +'</div>';
  } else {
    compareHtml = '<div class="compare-cta">'
      +'<div class="compare-cta-t">Cruzamento de consultas</div>'
      +'<div class="compare-cta-d">Compare os padrões clínicos entre as consultas deste paciente para detectar tendências e alertas.</div>'
      +'<button class="btn btn-ghost btn-sm" style="margin:0 auto;display:block">Gerar análise</button>'
    +'</div>';
  }

  return '<div>'
    +'<div class="pdc">'
      +'<div class="pdc-h"><span class="pdc-hl">Histórico Clínico</span>'
        +'<span style="font-size:11px;color:var(--t3);font-weight:600">'+p.tl.length+' consulta'+(p.tl.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<div class="pdc-b" style="padding:0">'
        +'<div class="tl-strip">'+tlItems+'</div>'
      +'</div>'
    +'</div>'
    +compareHtml
  +'</div>';
}

/* COLUNA 2 — Meds + Alergias + Exames */
function renderCol2(p){
  var medsHtml = p.meds.map(function(m){
    return '<div class="pac-med-row">'
      +'<div class="pac-med-ico">'
        +'<svg viewBox="0 0 16 16"><rect x="4" y="1" width="8" height="14" rx="3" stroke="var(--green)" stroke-width="1.6" fill="none"/><path d="M6 6h4M8 4v4" stroke="var(--green)" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>'
      +'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div class="pac-med-nm">'+m.nome+'</div>'
        +'<div class="pac-med-dose">'+m.freq+'</div>'
        +'<span class="pac-med-active">Em uso</span>'
      +'</div>'
    +'</div>';
  }).join('');

  var algsHtml = p.algs.map(function(a){
    return '<div class="pac-al-row">'
      +'<svg width="14" height="14" viewBox="0 0 14 14" style="stroke:var(--bad);fill:none;stroke-width:1.8;flex-shrink:0"><path d="M7 1L1 12h12L7 1z" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 5v3M7 10v.5" stroke-linecap="round"/></svg>'
      +'<span class="pac-al-nm">'+a.nome+'</span>'
      +'<span class="pac-al-sev '+sevClass(a.grav)+'">'+sevLabel(a.grav)+'</span>'
    +'</div>';
  }).join('');

  var examsHtml = p.exames.map(function(e){
    return '<div class="exam-card">'
      +'<div class="exam-thumb">'
        +(e.tipo==='IMG'
          ? '<svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="12" rx="2" stroke="#00C47A" stroke-width="1.6" fill="none"/><circle cx="5.5" cy="5.5" r="1.5" stroke="#00C47A" stroke-width="1.4" fill="none"/><path d="M1 10l4-3 3 3 2-2 5 4" stroke="#00C47A" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
          : '<svg viewBox="0 0 16 16"><path d="M3 1h7l3 3v11H3V1z" stroke="#00C47A" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M10 1v3h3M6 7h4M6 9.5h4M6 12h2" stroke="#00C47A" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>')
      +'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div class="exam-nm">'+e.nome+'</div>'
        +'<div class="exam-meta">'+e.data+' · '+e.lab+'</div>'
      +'</div>'
      +'<button style="background:none;border:none;cursor:pointer;color:var(--t3);padding:4px">'
        +'<svg width="14" height="14" viewBox="0 0 14 14" style="stroke:currentColor;fill:none;stroke-width:1.8"><path d="M2 7h10M8 4l4 3-4 3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +'</button>'
    +'</div>';
  }).join('');

  return '<div>'
    // Medicamentos
    +'<div class="pdc">'
      +'<div class="pdc-h"><span class="pdc-hl">Medicamentos em uso</span>'
        +'<span style="font-size:11px;color:var(--t3);font-weight:600">'+p.meds.length+' ativos</span>'
      +'</div>'
      +'<div class="pdc-b">'+medsHtml+'</div>'
    +'</div>'
    // Alergias
    +'<div class="pdc">'
      +'<div class="pdc-h"><span class="pdc-hl">Alergias</span>'
        +'<span style="font-size:11px;color:'+(p.algs.some(function(a){return a.grav==='grave';}) ? 'var(--bad)':'var(--t3)')+';font-weight:700">'+p.algs.length+' registrada'+(p.algs.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<div class="pdc-b">'+(p.algs.length ? algsHtml : '<div class="pcn-empty">Nenhuma alergia registrada</div>')+'</div>'
    +'</div>'
    // Exames
    +'<div class="pdc">'
      +'<div class="pdc-h"><span class="pdc-hl">Exames de '+p.nome.split(' ')[0]+'</span>'
        +'<span style="font-size:11px;color:var(--t3);font-weight:600">'+p.exames.length+' arquivo'+(p.exames.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<div class="pdc-b">'
        +'<input class="exam-search" type="text" placeholder="Buscar exame...">'
        +examsHtml
      +'</div>'
    +'</div>'
  +'</div>';
}

/* COLUNA 3 — Retorno + WA + Config + Dados */
function renderCol3(p){
  var retHtml = '<div class="ret-grid">'
    // PRÓXIMO RETORNO
    +'<div class="ret-mini">'
      +'<div class="ret-mini-lbl">Próximo retorno</div>'
      +(p.retDate
        ? '<div class="ret-mini-val">'+p.retDate+'</div>'
          +'<div class="ret-mini-sub">'+retLabel(p.retSt)+'</div>'
          +'<span class="ret-badge '+retClass(p.retSt)+'">'+retLabel(p.retSt)+'</span>'
        : '<div class="ret-mini-val" style="color:var(--t3)">—</div>'
          +'<div class="ret-mini-sub">Não agendado</div>'
          +'<span class="ret-badge none">Sem retorno</span>')
    +'</div>'
    // CONTATO DIRETO
    +'<div class="ret-mini">'
      +'<div class="ret-mini-lbl">Contato direto</div>'
      +'<div style="margin-top:4px">'
        +'<div style="font-size:12px;color:var(--t2);margin-bottom:8px">WhatsApp ativo</div>'
        +'<div id="wa-toggle" class="toggle-sw'+(waOn?' on':'')+'" onclick="toggleWa()"></div>'
      +'</div>'
    +'</div>'
  +'</div>';

  // Configurações de contato
  var diasHtml = DIAS_LABELS.map(function(lbl,i){
    return '<button class="wa-day'+(waDias.indexOf(i)!==-1?' on':'')+'" data-d="'+i+'" onclick="toggleDia('+i+')">'+lbl+'</button>';
  }).join('');

  var cfgHtml = '<div class="pdc">'
    +'<div class="pdc-h"><span class="pdc-hl">Configurações de contato</span></div>'
    +'<div class="pdc-b">'
      +'<div class="wa-toggle-row">'
        +'<div class="wa-desc">Avisos automáticos via WhatsApp para lembretes de retorno e pré-consulta.</div>'
      +'</div>'
      +'<div class="section-lbl" style="margin:10px 0 8px">Dias disponíveis</div>'
      +'<div class="wa-days">'+diasHtml+'</div>'
      +'<div class="section-lbl" style="margin:12px 0 8px">Horário de envio</div>'
      +'<div class="wa-time-row">'
        +'<input class="wa-time-inp" type="time" value="08:00">'
        +'<span class="wa-time-sep">até</span>'
        +'<input class="wa-time-inp" type="time" value="18:00">'
      +'</div>'
      +'<div class="wa-cfg-note" id="wa-note" style="'+(waOn?'':'display:none')+'">'
        +'Os avisos são enviados somente nos dias e horários configurados acima. O paciente pode cancelar a qualquer momento.'
      +'</div>'
    +'</div>'
  +'</div>';

  // Dados do paciente
  var dadosHtml = '<div class="pdc">'
    +'<div class="pdc-h"><span class="pdc-hl">Dados do paciente</span>'
      +'<button style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:11.5px;font-weight:600;font-family:var(--font)">Editar</button>'
    +'</div>'
    +'<div class="pdc-b">'
      +detRow('CPF', p.cpf)
      +detRow('Telefone', p.tel)
      +detRow('E-mail', p.email)
      +detRow('Convênio', p.plano)
      +detRow('Carteirinha', p.cart)
      +detRow('Cidade', p.cidade)
      +detRow('Cadastro', p.cadastro)
      +detRow('Hist. familiar', p.familiar)
    +'</div>'
  +'</div>';

  return '<div>'
    +retHtml
    +cfgHtml
    +dadosHtml
  +'</div>';
}

function detRow(lbl, val){
  return '<div class="det-row">'
    +'<div class="det-lbl">'+lbl+'</div>'
    +'<div class="det-val">'+val+'</div>'
  +'</div>';
}

/* ── BIND WA toggle após render ── */
function bindWaToggle(){
  // já usamos onclick inline, nada a fazer
}
function bindWaDias(){
  // dias já renderizados com onclick inline
}

/* ── INIT ── */
render();
</script>
