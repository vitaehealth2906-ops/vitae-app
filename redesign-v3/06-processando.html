<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · Lendo seu exame</title>
<link rel="stylesheet" href="_core.css">
<style>
  /* Container vertical centralizado */
  .proc {
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 28px 40px;
    text-align:center;
  }

  /* Círculo grande pulsando */
  .proc-orb {
    width:180px;height:180px;border-radius:50%;
    border:2px solid var(--green);
    background:var(--acc);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
    animation:orbPulse 2s ease-in-out infinite;
    position:relative;
  }
  .proc-orb::after {
    content:'';
    position:absolute;inset:-2px;
    border-radius:50%;
    border:2px solid rgba(0,229,160,0.2);
    animation:orbRing 2s ease-out infinite;
  }
  .proc-orb svg {
    width:64px;height:64px;
    stroke:var(--green);fill:none;
    stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  }
  @keyframes orbPulse {
    0%,100% {transform:scale(1)}
    50% {transform:scale(1.05)}
  }
  @keyframes orbRing {
    0% {transform:scale(1);opacity:0.6}
    100% {transform:scale(1.18);opacity:0}
  }

  .proc h1 {
    font-size:24px;font-weight:800;letter-spacing:-0.5px;color:var(--t1);
    margin-bottom:6px;
  }
  .proc-sub {
    font-size:13px;color:var(--t3);font-weight:500;
    margin-bottom:32px;
  }

  /* Lista de etapas */
  .steps {
    width:100%;max-width:300px;
    display:flex;flex-direction:column;gap:14px;
    text-align:left;
  }
  .step {
    display:flex;align-items:center;gap:12px;
    font-size:14px;font-weight:600;
    color:var(--t1);
  }
  .step .step-ic {
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .step .step-ic svg {
    width:14px;height:14px;
    fill:none;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round;
  }
  /* Concluído */
  .step.done .step-ic {background:var(--green);color:var(--dark)}
  .step.done .step-ic svg {stroke:var(--dark)}
  /* Em andamento */
  .step.doing {color:var(--t1);font-weight:700}
  .step.doing .step-ic {background:var(--acc);color:var(--green)}
  .step.doing .step-ic svg {stroke:var(--green)}
  /* Aguardando */
  .step.wait {color:var(--t3);font-weight:500;opacity:0.6}
  .step.wait .step-ic {
    background:transparent;
    border:1.5px solid var(--t4);
  }

  /* Rodapé */
  .proc-foot {
    flex-shrink:0;
    padding:0 22px 36px;
    text-align:center;
  }
  .proc-foot .mc {margin-bottom:10px}

  /* Modo focus: sem tab bar nem padding extra */
  .app-focus {padding-top:54px}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <div class="right-icons">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M.5 5.5C2 2.5 5 1 7 1s5 1.5 6.5 4.5M3 7c1-1.5 2.5-2 4-2s3 .5 4 2M5.5 8.5c.5-.5 1-.7 1.5-.7s1 .2 1.5.7" stroke="#111318" stroke-width="1.4" stroke-linecap="round"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="1" y="1" width="18" height="8" rx="2" stroke="#111318" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="#111318"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#111318"/></svg>
    </div>
  </div>

  <div class="app app-focus">

    <!-- Conteúdo central -->
    <div class="proc fadeup">
      <!-- Orb com documento -->
      <div class="proc-orb">
        <svg viewBox="0 0 24 24">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/>
          <path d="M14 3v5h5"/>
          <path d="M8 12h8M8 16h8M8 8h2"/>
        </svg>
      </div>

      <h1>Lendo seu exame</h1>
      <div class="proc-sub">Isso leva poucos segundos</div>

      <!-- Lista de etapas -->
      <div class="steps">
        <div class="step done">
          <span class="step-ic">
            <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
          </span>
          <span>Imagem recebida</span>
        </div>
        <div class="step done">
          <span class="step-ic">
            <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
          </span>
          <span>Texto identificado</span>
        </div>
        <div class="step doing">
          <span class="step-ic">
            <svg class="spin" viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 1 1-6.3-8.57" stroke="currentColor"/>
            </svg>
          </span>
          <span>Organizando parâmetros</span>
        </div>
        <div class="step wait">
          <span class="step-ic"></span>
          <span>Cruzando com seu histórico</span>
        </div>
      </div>
    </div>

    <!-- Rodapé -->
    <div class="proc-foot">
      <div class="mc">Você pode sair agora — avisamos quando terminar.</div>
      <a href="01-home.html" class="btn btn-ghost">Sair e avisar quando terminar</a>
    </div>

  </div>
</div>

</body>
</html>
