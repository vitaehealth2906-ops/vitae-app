<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · QR</title>
<link rel="stylesheet" href="_core.css">
<style>
  .phone{background:#fff !important}
  .notch{background:#000}
  .status{display:none}
  .app{padding-top:0;background:#fff;height:100%}

  .qr-top{
    position:absolute;top:54px;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;z-index:10;
  }
  .qr-logo{
    font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--t1);
  }
  .qr-logo .it{
    font-style:italic;
    background:var(--grad);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .qr-close{
    width:40px;height:40px;border-radius:12px;
    background:var(--s2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--t1);text-decoration:none;
  }
  .qr-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}

  .qr-stage{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 24px;
  }
  .qr-big{
    background:#fff;padding:18px;
    border:1px solid var(--border);border-radius:18px;
    box-shadow:0 8px 32px rgba(13,15,20,0.06);
  }
  .qr-big svg{display:block}
  .qr-name{
    font-size:20px;font-weight:800;color:var(--t1);
    letter-spacing:-0.4px;margin-top:22px;
  }
  .qr-meta{
    font-size:12.5px;color:var(--t3);font-weight:600;
    font-variant-numeric:tabular-nums;margin-top:4px;
    letter-spacing:0.02em;
  }

  .qr-foot{
    position:absolute;bottom:32px;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .qr-foot .mc{font-size:11.5px;color:var(--t3);font-weight:500}
  .dots{display:flex;gap:6px}
  .dots span{
    width:6px;height:6px;border-radius:50%;background:var(--t4);
    animation:dotPulse 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2){animation-delay:0.2s}
  .dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dotPulse{
    0%,100%{opacity:0.3;transform:scale(0.85)}
    50%{opacity:1;transform:scale(1);background:var(--green)}
  }

  .qr-center-v{
    fill:url(#qrGrad);font-family:var(--font);font-weight:800;
    font-style:italic;font-size:5px;
  }
</style>
</head>
