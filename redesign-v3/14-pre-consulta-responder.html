<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · Pré-consulta</title>
<link rel="stylesheet" href="_core.css">
<style>
  .pc-hd{padding:8px 22px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
  .pc-hd .step{font-size:13px;font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:0.02em}
  .pc-prog{height:4px;background:var(--s3);margin:0 22px;border-radius:2px;overflow:hidden;flex-shrink:0}
  .pc-prog-bar{height:100%;width:50%;background:var(--grad);border-radius:2px;transition:width 0.3s}

  .pc-hero{padding:32px 22px 24px;flex-shrink:0}
  .pc-q{font-size:26px;font-weight:700;letter-spacing:-0.5px;line-height:1.25;color:var(--t1);margin-bottom:10px}
  .pc-sub{font-size:13.5px;color:var(--t2);line-height:1.55;font-weight:500}

  .pc-toggle{display:flex;gap:8px;padding:0 22px 28px;flex-shrink:0}
  .pc-chip{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 14px;border-radius:10px;font-size:13px;font-weight:700;
    background:var(--surface);border:1px solid var(--border);color:var(--t2);
    cursor:pointer;text-decoration:none;transition:all 0.15s;
  }
  .pc-chip svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pc-chip.on{background:var(--acc);border-color:var(--accb);color:var(--green)}

  .pc-rec{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 22px 24px;text-align:center}
  .pc-mic{
    width:140px;height:140px;border-radius:50%;
    border:3px solid var(--green);
    background:var(--acc);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    position:relative;
    transition:transform 0.15s;
    box-shadow:0 8px 28px rgba(0,229,160,0.18);
  }
  .pc-mic:active{transform:scale(0.96)}
  .pc-mic svg{width:40px;height:40px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pc-mic::after{
    content:'';position:absolute;inset:-10px;border-radius:50%;
    border:1px solid rgba(0,229,160,0.18);
    animation:pulse 2.2s ease-in-out infinite;
  }
  .pc-tip{margin-top:22px;font-size:14px;color:var(--t2);font-weight:600}
  .pc-timer{margin-top:6px;font-size:14px;color:var(--t3);font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:0.02em}

  .pc-ghosts{display:flex;gap:8px;padding:0 22px 22px;flex-shrink:0;justify-content:center}
  .pc-ghost{
    padding:8px 14px;border-radius:20px;background:transparent;border:1px solid var(--border);
    font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;text-decoration:none;
    transition:background 0.15s;
  }
  .pc-ghost:hover{background:var(--s2)}

  .pc-foot{
    padding:14px 22px 22px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:9px;flex-shrink:0;background:var(--surface);
  }
  .pc-foot svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .pc-foot p{font-size:11.5px;color:var(--t3);font-weight:500;line-height:1.5}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <div class="right-icons">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M.5 5.5C2 2.5 5 1 7 1s5 1.5 6.5 4.5M3 7c1-1.5 2.5-2 4-2s3 .5 4 2M5.5 8.5c.5-.5 1-.7 1.5-.7s1 .2 1.5.7" stroke="#111318" stroke-width="1.4" stroke-linecap="round"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="1" y="1" width="18" height="8" rx="2" stroke="#111318" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="#111318"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#111318"/></svg>
    </div>
  </div>

  <div class="app">
    <!-- HEADER -->
    <div class="pc-hd">
      <a href="13-consulta-detalhe.html" class="back" aria-label="Fechar">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </a>
      <span class="step">2 de 4</span>
      <span style="width:38px;height:38px;flex-shrink:0"></span>
    </div>

    <!-- PROGRESS -->
    <div class="pc-prog"><div class="pc-prog-bar"></div></div>

    <!-- HERO -->
    <div class="pc-hero">
      <h1 class="pc-q">Quando essa dor começou?</h1>
      <p class="pc-sub">Pode ser uma data aproximada ou "faz uns 3 dias" — qualquer coisa ajuda</p>
    </div>

    <!-- TOGGLE -->
    <div class="pc-toggle">
      <a href="#" class="pc-chip on">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3"/></svg>
        Gravar áudio
      </a>
      <a href="#" class="pc-chip">
        <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h10M4 17h16"/></svg>
        Digitar
      </a>
    </div>

    <!-- REC AREA -->
    <div class="pc-rec">
      <button class="pc-mic" aria-label="Começar gravação">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3"/></svg>
      </button>
      <p class="pc-tip">Toca pra começar a gravar</p>
      <p class="pc-timer">00:00</p>
    </div>

    <!-- GHOSTS -->
    <div class="pc-ghosts">
      <a href="#" class="pc-ghost">Não sei responder</a>
      <a href="#" class="pc-ghost">Pular essa pergunta</a>
    </div>

    <!-- FOOT -->
    <div class="pc-foot">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/><path d="M9 12v-2a3 3 0 0 1 6 0v2M8 12h8v5H8z"/></svg>
      <p>Tudo que você gravar fica criptografado. Só a Dra. Helena vai ouvir.</p>
    </div>
  </div>
</div>

</body>
</html>
