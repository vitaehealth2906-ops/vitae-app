<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · Nova alergia</title>
<link rel="stylesheet" href="_core.css">
<style>
  .scr{padding-bottom:110px}

  .pop-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;margin-bottom:4px}
  .pop-chips .chip{padding:6px 12px;font-size:11.5px}

  .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .seg-c{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:10px;padding:14px 8px;
    cursor:pointer;
    transition:all 0.15s;
  }
  .seg-c .seg-l{
    font-size:11.5px;font-weight:800;letter-spacing:0.08em;
    color:var(--t2);
  }
  .seg-c.ok{color:var(--ok)}
  .seg-c.warn{color:var(--warn)}
  .seg-c.bad{color:var(--bad)}
  .seg-c.ok .seg-l{color:var(--ok)}
  .seg-c.warn .seg-l{color:var(--warn)}
  .seg-c.bad .seg-l{color:var(--bad)}
  .seg-c.on{
    border-color:var(--green);border-width:2px;
    background:var(--acc);
  }
  .seg-c.on .seg-l{color:var(--green)}
  .seg-mc{
    font-size:11.5px;color:var(--t3);font-weight:500;
    margin-top:8px;line-height:1.4;
  }

  .mchips{display:flex;gap:6px;flex-wrap:wrap}
  .mchip{
    padding:7px 13px;border-radius:20px;
    font-size:12px;font-weight:700;
    border:1px solid var(--border);background:var(--surface);
    color:var(--t2);cursor:pointer;
    transition:all 0.15s;
    user-select:none;
  }
  .mchip.on{background:var(--acc);border-color:var(--accb);color:var(--green)}
  .mchip:hover:not(.on){background:var(--s2)}

  .date-wrap{position:relative}
  .date-wrap input{padding-left:38px}
  .date-wrap svg{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--t3);fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
    pointer-events:none;
  }

  .scr-hd .btn-ghost{height:34px;padding:0 12px;font-size:12.5px}

  .ftr{
    position:absolute;bottom:0;left:0;right:0;
    padding:14px 22px 22px;
    background:linear-gradient(180deg,rgba(247,248,250,0) 0%,var(--bg) 35%);
    z-index:60;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <div class="right-icons">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M.5 5.5C2 2.5 5 1 7 1s5 1.5 6.5 4.5M3 7c1-1.5 2.5-2 4-2s3 .5 4 2M5.5 8.5c.5-.5 1-.7 1.5-.7s1 .2 1.5.7" stroke="#111318" stroke-width="1.4" stroke-linecap="round"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="1" y="1" width="18" height="8" rx="2" stroke="#111318" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="#111318"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#111318"/></svg>
    </div>
  </div>

  <div class="app">
    <div class="scr-hd">
      <div class="scr-hd-l">
        <a href="10-alergias-condicoes.html" class="back" aria-label="Voltar">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1>Nova alergia</h1>
      </div>
      <a href="10-alergias-condicoes.html" class="btn btn-ghost">Cancelar</a>
    </div>

    <div class="scr">

      <div class="card fadeup">

        <div class="field">
          <label>A QUE VOCÊ TEM ALERGIA?</label>
          <input type="text" placeholder="Penicilina, Dipirona, camarão...">
          <div class="pop-chips">
            <span class="chip">Penicilina</span>
            <span class="chip">Dipirona</span>
            <span class="chip">AAS</span>
            <span class="chip">Amendoim</span>
            <span class="chip">Lactose</span>
          </div>
        </div>

        <div class="field">
          <label>QUÃO FORTE É A REAÇÃO?</label>
          <div class="seg">
            <div class="seg-c ok">
              <span class="seg-l">LEVE</span>
            </div>
            <div class="seg-c warn on">
              <span class="seg-l">MODERADA</span>
            </div>
            <div class="seg-c bad">
              <span class="seg-l">GRAVE</span>
            </div>
          </div>
          <div class="seg-mc">Grave = anafilaxia, internação, risco de morte</div>
        </div>

        <div class="field">
          <label>QUE TIPO DE REAÇÃO?</label>
          <div class="mchips">
            <span class="mchip on">Coceira</span>
            <span class="mchip on">Urticária</span>
            <span class="mchip">Inchaço</span>
            <span class="mchip">Falta de ar</span>
            <span class="mchip">Tontura</span>
            <span class="mchip">Outra</span>
          </div>
        </div>

        <div class="field">
          <label>QUANDO FOI A ÚLTIMA VEZ?</label>
          <div class="date-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <input type="text" value="Mar/2024" placeholder="Mês/ano">
          </div>
        </div>

        <div class="field" style="margin-bottom:0">
          <label>QUER CONTAR MAIS? (OPCIONAL)</label>
          <textarea placeholder="Detalhes da reação, contexto, o que ajudou..."></textarea>
        </div>

      </div>

    </div>

    <div class="ftr">
      <a href="10-alergias-condicoes.html" class="btn btn-p full">Salvar alergia</a>
    </div>
  </div>
</div>

</body>
</html>
