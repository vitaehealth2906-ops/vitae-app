<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · Adicionar medicamento</title>
<link rel="stylesheet" href="_core.css">
<style>
  .sheet{height:auto;padding-bottom:28px}
  .sh-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sh-hd h1{font-size:20px;font-weight:800;letter-spacing:-0.3px;color:var(--t1)}
  .sh-sub{font-size:13px;color:var(--t2);margin-bottom:18px;font-weight:500}

  .opt{
    display:flex;align-items:center;gap:14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:18px 16px;margin-bottom:10px;
    text-decoration:none;color:inherit;
    transition:background 0.15s,border-color 0.15s,transform 0.1s;
  }
  .opt:hover{background:var(--s2);border-color:var(--b2)}
  .opt:active{transform:scale(0.99)}
  .opt-ic{
    width:52px;height:52px;border-radius:14px;
    background:var(--acc);
    display:flex;align-items:center;justify-content:center;
    color:var(--green);flex-shrink:0;
  }
  .opt-ic svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .opt-info{flex:1;min-width:0}
  .opt-ttl{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:3px;letter-spacing:-0.1px}
  .opt-sub{font-size:12px;color:var(--t3);font-weight:500;line-height:1.4}
  .opt .chev{width:16px;height:16px;stroke:var(--t3);stroke-width:2}

  .micro{
    font-size:12px;color:var(--t3);font-weight:500;
    text-align:center;line-height:1.5;
    margin:16px 4px 14px;
  }

  .btn-ghost.full{height:46px}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <div class="right-icons">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M.5 5.5C2 2.5 5 1 7 1s5 1.5 6.5 4.5M3 7c1-1.5 2.5-2 4-2s3 .5 4 2M5.5 8.5c.5-.5 1-.7 1.5-.7s1 .2 1.5.7" stroke="#111318" stroke-width="1.4" stroke-linecap="round"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="1" y="1" width="18" height="8" rx="2" stroke="#111318" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="#111318"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#111318"/></svg>
    </div>
  </div>

  <div class="sheet-overlay"></div>

  <div class="sheet fadeup">
    <div class="sheet-handle"></div>

    <div class="sh-hd">
      <h1>Adicionar medicamento</h1>
      <a href="07-meds-lista.html" class="ibtn" aria-label="Fechar">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </a>
    </div>
    <div class="sh-sub">Como prefere fazer?</div>

    <a href="06-processando.html" class="opt">
      <div class="opt-ic">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <div class="opt-info">
        <div class="opt-ttl">Escanear receita</div>
        <div class="opt-sub">Tira foto da receita, leio em segundos</div>
      </div>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <a href="07-meds-lista.html" class="opt">
      <div class="opt-ic">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h.01M18 14h.01M9 14h6"/></svg>
      </div>
      <div class="opt-info">
        <div class="opt-ttl">Digitar manualmente</div>
        <div class="opt-sub">Adicionar item por item</div>
      </div>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <div class="micro">Receita digital também funciona — faça print no celular</div>

    <a href="07-meds-lista.html" class="btn btn-ghost full">Cancelar</a>
  </div>
</div>

</body>
</html>
