<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>vita id · Adicionar exame</title>
<link rel="stylesheet" href="_core.css">
<style>
  /* Sheet específico desta tela */
  .sheet-ex {
    padding:14px 22px 28px;
    height:auto;
    max-height:none;
  }
  .sheet-hd {
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:6px;
  }
  .sheet-hd h1 {
    font-size:20px;font-weight:800;letter-spacing:-0.4px;color:var(--t1);
  }
  .sheet-sub {
    font-size:13px;color:var(--t3);font-weight:500;margin-bottom:18px;
  }

  /* Opções de adicionar */
  .opt {
    display:flex;align-items:center;gap:14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:16px;
    margin-bottom:10px;
    text-decoration:none;color:inherit;
    cursor:pointer;
    transition:background 0.15s,border-color 0.15s;
  }
  .opt:hover {background:var(--s2);border-color:var(--b2)}
  .opt.disabled {cursor:default;opacity:0.78}
  .opt.disabled:hover {background:var(--surface);border-color:var(--border)}

  .opt-ic {
    width:54px;height:54px;border-radius:14px;
    background:var(--acc);
    color:var(--green);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .opt-ic svg {
    width:28px;height:28px;
    stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  }
  .opt-info {flex:1;min-width:0}
  .opt-ttl {font-size:14.5px;font-weight:700;color:var(--t1);margin-bottom:3px;letter-spacing:-0.1px}
  .opt-sub {font-size:12px;color:var(--t3);font-weight:500;line-height:1.4}
  .opt-r {display:flex;align-items:center;gap:8px;flex-shrink:0}

  /* Microcopy de privacidade */
  .privacy {
    display:flex;align-items:center;justify-content:center;gap:7px;
    margin:18px 4px 14px;
    color:var(--t3);
    font-size:11.5px;font-weight:500;
    line-height:1.4;
    text-align:center;
  }
  .privacy svg {
    width:14px;height:14px;
    stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
    flex-shrink:0;
  }

  .cancel-row {margin-top:4px}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span>9:41</span>
    <div class="right-icons">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M.5 5.5C2 2.5 5 1 7 1s5 1.5 6.5 4.5M3 7c1-1.5 2.5-2 4-2s3 .5 4 2M5.5 8.5c.5-.5 1-.7 1.5-.7s1 .2 1.5.7" stroke="#111318" stroke-width="1.4" stroke-linecap="round"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="1" y="1" width="18" height="8" rx="2" stroke="#111318" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="#111318"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#111318"/></svg>
    </div>
  </div>

  <!-- Overlay escuro -->
  <div class="sheet-overlay"></div>

  <!-- Bottom sheet -->
  <div class="sheet sheet-ex fadeup">
    <div class="sheet-handle"></div>

    <div class="sheet-hd">
      <h1>Adicionar exame</h1>
      <a href="03-exames-lista.html" class="ibtn" aria-label="Fechar">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </a>
    </div>
    <div class="sheet-sub">Como você quer adicionar?</div>

    <!-- Opção 1: Câmera -->
    <a href="06-processando.html" class="opt">
      <div class="opt-ic">
        <svg viewBox="0 0 24 24">
          <path d="M3 7a2 2 0 0 1 2-2h2.5l1.5-2h6l1.5 2H19a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="opt-info">
        <div class="opt-ttl">Tirar foto</div>
        <div class="opt-sub">Use a câmera pra fotografar o exame</div>
      </div>
      <div class="opt-r">
        <svg class="chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

    <!-- Opção 2: Galeria -->
    <a href="06-processando.html" class="opt">
      <div class="opt-ic">
        <svg viewBox="0 0 24 24">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/>
          <path d="M14 3v5h5"/>
          <path d="M12 18v-6m-3 3l3-3 3 3"/>
        </svg>
      </div>
      <div class="opt-info">
        <div class="opt-ttl">Escolher do celular</div>
        <div class="opt-sub">PDF ou imagem da galeria</div>
      </div>
      <div class="opt-r">
        <svg class="chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

    <!-- Opção 3: Conectar laboratório (em breve) -->
    <div class="opt disabled">
      <div class="opt-ic">
        <svg viewBox="0 0 24 24">
          <path d="M10 14a4.5 4.5 0 0 0 6.36 0l2.83-2.83a4.5 4.5 0 0 0-6.36-6.36l-1.06 1.06"/>
          <path d="M14 10a4.5 4.5 0 0 0-6.36 0l-2.83 2.83a4.5 4.5 0 0 0 6.36 6.36l1.06-1.06"/>
        </svg>
      </div>
      <div class="opt-info">
        <div class="opt-ttl">Conectar laboratório</div>
        <div class="opt-sub">Fleury, Sabin, Hermes Pardini, DASA</div>
      </div>
      <div class="opt-r">
        <span class="badge b-warn"><span class="dot"></span>EM BREVE</span>
      </div>
    </div>

    <!-- Microcopy privacidade -->
    <div class="privacy">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Seus dados ficam só com você. Ninguém vê sem sua autorização.</span>
    </div>

    <!-- Cancelar -->
    <div class="cancel-row">
      <a href="03-exames-lista.html" class="btn btn-ghost full">Cancelar</a>
    </div>
  </div>
</div>

</body>
</html>
