<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VITAE — Exames</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--bg2:#111111;
  --surface:rgba(255,255,255,.04);--surface-s:rgba(255,255,255,.06);
  --inv:#fff;--ink:#fff;--ink2:rgba(255,255,255,.8);--ink3:rgba(255,255,255,.45);--ink4:rgba(255,255,255,.3);
  --gold:#0099C4;--gold-l:#0099C4;--gold-d:#0099C4;
  --green:#4AD9A4;--amber:#C9924A;--red:#D94452;
  --border:rgba(0,153,196,.15);
  --blur:blur(20px) saturate(120%);
}
html,body{height:100%;overflow:hidden;background:#000}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0}
.phone{width:393px;height:852px;max-height:100vh;background:var(--bg);border-radius:52px;overflow:hidden;position:relative;
  box-shadow:0 0 0 1px rgba(0,153,196,.15),0 0 0 3px #1a1a1a,0 40px 120px rgba(0,0,0,.9)}
@media(max-width:480px){body{padding:0;background:var(--bg)}.phone{width:100vw;height:100svh;max-width:100vw;border-radius:0;box-shadow:none}}

/* SCREENS */
.screen{position:absolute;top:0;left:0;right:0;bottom:86px;overflow-y:auto;overflow-x:hidden;
  background:transparent;transition:transform .42s cubic-bezier(.77,0,.18,1),opacity .38s ease;z-index:1;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.screen.right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

/* BOTTOM NAV — dark, consistent with 08-perfil */
.bnav{position:absolute;bottom:0;left:0;right:0;height:86px;z-index:50;
  background:rgba(10,10,10,.85);backdrop-filter:blur(30px) saturate(150%);
  -webkit-backdrop-filter:blur(30px) saturate(150%);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  background:none;border:none;padding:0 12px;transition:transform .2s}
.bn:active{transform:scale(.9)}
.bn-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.bn-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .25s}
.bn.off .bn-icon svg{stroke:rgba(255,255,255,.3)}.bn.off .bn-label{color:rgba(255,255,255,.3)}
.bn.on .bn-icon svg{stroke:var(--gold)}.bn.on .bn-label{color:var(--gold)}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:1px;opacity:0;transition:opacity .25s}
.bn.on .bn-dot{opacity:1}

/* TOPBAR */
.topbar{padding:62px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.topbar-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);letter-spacing:.01em}
.back-btn{width:40px;height:40px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Inter',sans-serif}
.back-btn:hover{background:rgba(255,255,255,.08)}
.back-btn:active{transform:scale(.92)}
.top-action{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold);background:rgba(0,153,196,.08);border:1px solid rgba(0,153,196,.2);
  padding:8px 14px;border-radius:20px;cursor:pointer;backdrop-filter:blur(10px)}
.sec-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--ink4);
  text-transform:uppercase;padding:16px 20px 10px}

/* ── GLASS CARD ── */
.gc{position:relative;border-radius:20px;margin:0 18px 12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(0,153,196,.12);
  transition:transform .2s,box-shadow .2s;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.gc:active{transform:scale(.983)}
.gi{border-radius:19px;padding:18px 20px;position:relative;overflow:hidden}
.gi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,153,196,.15),transparent)}
@keyframes shimmer{0%{left:-55%}100%{left:160%}}

/* STATIC BORDER CARD */
.gc-s{position:relative;border-radius:20px;margin:0 18px 12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transition:transform .2s;cursor:default}
.gc-s .gi{border-radius:19px}

/* HERO DARK CARD */
.gc-hero{position:relative;border-radius:22px;margin:0 18px 14px;
  background:linear-gradient(145deg,rgba(30,25,18,.95),rgba(20,16,10,.95));
  border:1.5px solid rgba(0,153,196,.25);
  box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(0,153,196,.1)}
.gi-dark{border-radius:21px;padding:22px 20px;position:relative;overflow:hidden}
.gi-dark::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,153,196,.3),transparent)}
.gi-dark::after{content:'';position:absolute;top:0;right:0;width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,153,196,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HERO SCORE — compact horizontal */
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
.hero-left{flex:1;min-width:0}
.hero-meta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:rgba(0,153,196,.6);text-transform:uppercase;margin-bottom:4px}
.hero-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:rgba(255,255,255,.8);line-height:1.3}
.hero-right{flex-shrink:0;text-align:right}
.hero-score-row{display:flex;align-items:flex-end;gap:3px;justify-content:flex-end}
.hero-score{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;color:var(--gold);line-height:.88;text-shadow:0 0 40px rgba(0,153,196,.2)}
.hero-max{font-family:'DM Mono',monospace;font-size:11px;color:rgba(0,153,196,.5);padding-bottom:4px;letter-spacing:.06em}
.hero-status{font-family:'Inter',sans-serif;font-size:11px;font-weight:400;color:rgba(255,255,255,.5);margin-top:2px;text-align:right}
.hero-bottom{position:relative;z-index:1;margin-top:12px}
.hero-cta{padding:10px 18px;border-radius:12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;text-align:center;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.hero-cta.primary{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#0A0A0A;box-shadow:0 4px 16px rgba(0,153,196,.2)}
.hero-cta.secondary{background:rgba(255,255,255,.04);color:rgba(0,153,196,.7);border:1px solid rgba(0,153,196,.2)}
.hero-cta:active{transform:scale(.96)}

/* STATUS BOXES (bom / médio / ruim) */
.status-boxes-wrap{margin:0 18px 14px}
.status-boxes-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--ink4);text-transform:uppercase;margin-bottom:10px}
.status-boxes{display:flex;gap:10px}
.status-box{display:flex;align-items:center;border-radius:14px;cursor:pointer;overflow:hidden;
  height:48px;position:relative;
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transition:all .3s cubic-bezier(.25,.46,.45,.94);
  opacity:0;animation:boxSlide .45s ease both}
.status-box:hover{transform:translateY(-2px)}
.status-box:active{transform:scale(.96)}
@keyframes boxSlide{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.status-box-count{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;
  min-width:42px;display:flex;align-items:center;justify-content:center;
  height:100%;letter-spacing:-.02em}
.status-box-text{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  padding:0 16px 0 12px;letter-spacing:.02em}
.status-box.ok{background:rgba(74,217,164,.08);border:1.5px solid rgba(74,217,164,.2)}
.status-box.ok .status-box-count{color:var(--green);border-right:1.5px solid rgba(74,217,164,.2)}
.status-box.ok .status-box-text{color:var(--green)}
.status-box.warn{background:rgba(0,153,196,.08);border:1.5px solid rgba(0,153,196,.2)}
.status-box.warn .status-box-count{color:var(--amber);border-right:1.5px solid rgba(0,153,196,.2)}
.status-box.warn .status-box-text{color:var(--amber)}
.status-box.crit{background:rgba(217,68,82,.08);border:1.5px solid rgba(217,68,82,.2)}
.status-box.crit .status-box-count{color:var(--red);border-right:1.5px solid rgba(217,68,82,.2)}
.status-box.crit .status-box-text{color:var(--red)}

/* BIOLIST SCREEN (lista de biomarcadores filtrada) */
.biolist-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);
  margin:10px 20px 4px;opacity:0;animation:fadeUp .4s ease .1s both}
.biolist-sub{font-family:'Inter',sans-serif;font-size:13px;font-weight:400;color:var(--ink3);
  margin:0 20px 18px;opacity:0;animation:fadeUp .4s ease .15s both}
.biolist-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:0 14px 8px;
  border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,.03);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.06);
  transition:all .25s ease;opacity:0;animation:fadeUp .4s ease both}
.biolist-item:hover{border-color:rgba(0,153,196,.15)}
.biolist-item:active{transform:scale(.98)}
.biolist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.biolist-dot.ok{background:var(--green)}
.biolist-dot.warn{background:var(--gold)}
.biolist-dot.crit{background:var(--red)}
.biolist-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:400;color:var(--ink);flex:1}
.biolist-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3)}
.biolist-arrow{color:var(--ink4);font-size:14px;margin-left:4px}

/* SYSTEM GRID — Option B: narrative + horizontal scroll */
.sys-grid{display:block;margin-bottom:4px}

/* NARRATIVE CARD */
.narr-card{margin:0 18px 12px;padding:18px 20px;border-radius:18px;
  background:rgba(0,153,196,.04);
  border:1px solid rgba(0,153,196,.15)}
.narr-txt{font-family:'Inter',sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,.7);line-height:1.65;position:relative;z-index:1}
.narr-txt strong{font-weight:600;color:rgba(255,255,255,.9)}

/* HORIZONTAL SCROLL */
.sys-h-scroll{display:flex;gap:10px;padding:0 18px 4px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.sys-h-scroll::-webkit-scrollbar{display:none}

/* SYSTEM CARDS — wider landscape */
.sys-card{min-width:272px;flex-shrink:0;border-radius:18px;cursor:pointer;
  background:rgba(255,255,255,.03);border:1px solid rgba(0,153,196,.12);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transition:transform .2s}
.sys-card:active{transform:scale(.97)}

.sys-card-in{border-radius:17px;
  padding:16px 18px;display:flex;flex-direction:column;gap:10px}

/* Top row: category label (small emoji + name) + status pill */
.sys-card-top-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sys-card-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:5px}
.sys-card-label-emoji{font-size:12px;line-height:1}
.sys-card-status{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.06em;padding:3px 9px;border-radius:20px;flex-shrink:0}
.sys-card-status.ok{background:rgba(74,217,164,.08);color:var(--green);border:1px solid rgba(74,217,164,.18)}
.sys-card-status.warn{background:rgba(0,153,196,.08);color:var(--amber);border:1px solid rgba(0,153,196,.18)}
.sys-card-status.crit{background:rgba(217,68,82,.08);color:var(--red);border:1px solid rgba(217,68,82,.18)}

/* System name + desc */
.sys-card-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1;letter-spacing:.01em}
.sys-card-desc{font-family:'Inter',sans-serif;font-size:11.5px;font-weight:300;color:var(--ink3);line-height:1.45;margin-top:-2px}

/* Bar + footer */
.sys-card-bar{height:2.5px;background:rgba(0,153,196,.14);border-radius:3px;overflow:hidden}
.sys-card-fill{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.77,0,.18,1)}
.sys-card-fill.ok{background:var(--green)}.sys-card-fill.warn{background:var(--amber)}.sys-card-fill.crit{background:var(--red)}
.sys-card-footer{display:flex;align-items:center;justify-content:space-between}
.sys-card-val{font-family:'Inter',sans-serif;font-size:11px;font-weight:300;color:var(--ink4)}
.sys-card-pct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--ink4)}

/* gpulse kept for other elements */
@keyframes gpulse{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(2);opacity:.1}}

/* SISTEMA SCREEN */
.sist-header{padding:0 22px 6px;font-family:'Playfair Display',serif;font-size:30px;font-weight:500;color:var(--ink);letter-spacing:.01em}
.sist-sub{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;color:var(--ink3);padding:0 22px 14px;line-height:1.6}

/* INSIGHT SCROLL */
.is-wrap{padding:0 18px;margin-bottom:4px}
.ic-gc{min-width:215px;flex-shrink:0;border-radius:18px;cursor:pointer;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transition:transform .2s}
.ic-gc.al{border-color:rgba(217,68,82,.15)}
.ic-gc.gd{border-color:rgba(74,217,164,.15)}
.ic-gc:active{transform:scale(.96)}
.ic-gi{border-radius:17px;padding:15px}
.ic-ey{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px}
.ic-ey.al{color:var(--red)}.ic-ey.gd{color:var(--green)}.ic-ey.lk{color:var(--gold-d)}
.ic-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px;line-height:1.3}
.ic-body{font-family:'Inter',sans-serif;font-size:11px;font-weight:300;color:var(--ink3);line-height:1.65;margin-bottom:9px}
.ic-cta{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.13em;text-transform:uppercase}
.ic-cta.al{color:var(--red)}.ic-cta.gd{color:var(--green)}.ic-cta.lk{color:var(--gold-d)}

/* MARKER SCREEN */
.mk-val-row{display:flex;align-items:flex-end;gap:5px;margin-bottom:6px}
.mk-val{font-family:'Playfair Display',serif;font-size:72px;font-weight:600;line-height:.9;text-shadow:0 0 30px rgba(184,92,74,.2)}
.mk-val.crit{color:var(--red)}.mk-val.warn{color:var(--amber)}.mk-val.ok{color:var(--green)}
.mk-unit{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink4);letter-spacing:.08em;padding-bottom:6px}
.mk-ey{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.mk-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:300;font-style:italic;color:var(--ink3);margin-bottom:12px}
.mk-ref-row{display:flex;gap:10px;align-items:center}
.mk-ref{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.09em;color:var(--ink4);text-transform:uppercase}
.badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;padding:3px 9px;border-radius:20px}
.badge.crit{background:rgba(184,92,74,.1);color:var(--red);border:1px solid rgba(184,92,74,.18)}
.badge.warn{background:rgba(0,153,196,.1);color:var(--amber);border:1px solid rgba(0,153,196,.18)}
.badge.ok{background:rgba(125,158,122,.1);color:var(--green);border:1px solid rgba(125,158,122,.18)}

/* SPECTRUM */
.spec-label{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;font-weight:400;color:var(--ink2);margin-bottom:13px}
.spec-track{height:8px;border-radius:4px;
  background:linear-gradient(to right,#B85C4A 0%,#C9924A 28%,#7D9E7A 52%,#7D9E7A 72%,#C9924A 87%,#B85C4A 100%);
  position:relative;margin-bottom:6px;box-shadow:inset 0 1px 3px rgba(28,24,16,.15)}
.spec-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;
  background:rgba(255,255,255,.9);border-radius:50%;border:1.5px solid rgba(0,153,196,.3);
  box-shadow:0 0 0 3px rgba(0,153,196,.3),0 0 12px rgba(0,153,196,.2),0 3px 8px rgba(0,0,0,.4);
  transition:left 1.4s cubic-bezier(.77,0,.18,1)}
.spec-zones{display:flex;justify-content:space-between}
.sz{font-family:'DM Mono',monospace;font-size:7px;color:var(--ink4);letter-spacing:.06em}
.spec-compare{margin-top:13px;padding-top:13px;border-top:1px solid rgba(0,153,196,.11);
  display:flex;align-items:center;justify-content:space-between}
.sc-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.sc-val{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;background:rgba(184,92,74,.09);color:var(--red);border:1px solid rgba(184,92,74,.15)}

/* MEANING */
.mn-ey{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.mn-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:8px;line-height:1.3}
.mn-body{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;color:var(--ink3);line-height:1.7}
.mn-body strong{font-weight:400;color:var(--ink2)}

/* EVOLUTION */
.evo-card{padding:18px 20px}
.evo-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:4px}
.evo-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink4);margin-bottom:18px}
.evo-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.evo-time{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink4);width:60px;flex-shrink:0;text-align:right}
.evo-spec{flex:1;position:relative}
.evo-track{height:6px;border-radius:3px;
  background:linear-gradient(to right,#B85C4A 0%,#C9924A 28%,#7D9E7A 52%,#7D9E7A 72%,#C9924A 87%,#B85C4A 100%)}
.evo-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;
  background:rgba(255,255,255,.85);border-radius:50%;border:1.5px solid rgba(0,153,196,.3);
  box-shadow:0 0 0 2px rgba(0,153,196,.3),0 2px 6px rgba(0,0,0,.4);transition:left 1.2s cubic-bezier(.77,0,.18,1)}
.evo-val{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;width:56px;text-align:left;font-weight:400;flex-shrink:0}
.evo-val.worse{color:var(--red)}.evo-val.better{color:var(--green)}.evo-val.warn{color:var(--amber)}
.evo-insight{background:rgba(0,153,196,.04);border:1px solid rgba(0,153,196,.1);border-radius:12px;padding:13px 15px;margin-top:4px}
.ei-body{font-family:'Inter',sans-serif;font-size:12px;font-weight:300;color:var(--ink3);line-height:1.7}
.ei-body strong{font-weight:400;color:var(--ink2)}

/* COMPARAÇÃO TABS */
.ctabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid rgba(0,153,196,.12);
  overflow-x:auto;scrollbar-width:none;margin-bottom:16px}
.ctabs::-webkit-scrollbar{display:none}
.ctab{padding:10px 15px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  background:none;border:none;border-bottom:2px solid transparent;color:var(--ink4);cursor:pointer;

// ══════════════════════════════
// NAVIGATION STACK
// ══════════════════════════════
const stack = ['s-lista'];
let animating = false;

function push(id) {
  if (animating) return;
  animating = true;
  const from = document.getElementById(stack[stack.length - 1]);
  const to = document.getElementById(id);
  stack.push(id);
  from.className = 'screen left';
  to.className = 'screen active';
  triggerFades(to);
  onScreenEnter(id);
  setTimeout(() => animating = false, 450);
}

function pop() {
  if (stack.length <= 1 || animating) return;
  animating = true;
  const from = document.getElementById(stack.pop());
  const to = document.getElementById(stack[stack.length - 1]);
  from.className = 'screen right';
  to.className = 'screen active';
  triggerFades(to);
  setTimeout(() => animating = false, 450);
}

function triggerFades(el) {
  el.querySelectorAll('.fade').forEach(e => { e.style.animation = 'none'; e.offsetHeight; e.style.animation = ''; });
}

function navPage(tab) {
  if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
}

// ══════════════════════════════
// FRIENDLY EXAM NAMES
// ══════════════════════════════
function toNomeAmigavel(nome) {
  if (!nome) return 'Exame de Saúde';
  const n = nome.toLowerCase().trim();
  if (n.includes('multiplo') || n === 'múltiplos' || n === 'multiplos') return 'Painel Completo de Saúde';
  if (n.includes('hemograma')) return 'Exame de Sangue Completo';
  if (n.includes('lipidogram') || (n.includes('lipid') && !n.includes('vitamina'))) return 'Perfil do Coração';
  if (n.includes('glicemia') && n.includes('hba') || n.includes('glicada')) return 'Controle de Açúcar no Sangue';
  if (n.includes('glicemia') || n.includes('glicose')) return 'Nível de Açúcar no Sangue';
  if (n.includes('tsh') || n.includes('tireoide') || n.includes('tirói')) return 'Função da Tireoide';
  if (n.includes('testosterona')) return 'Hormônios Masculinos';
  if (n.includes('hormonal') || n.includes('estradiol') || n.includes('progesterona')) return 'Perfil Hormonal';
  if (n.includes('vitamina')) return 'Vitaminas e Minerais';
  if (n.includes('urina') || n.includes('urinalise') || n.includes('urinálise')) return 'Exame de Urina';
  if (n.includes('fezes') || n.includes('parasitolog')) return 'Exame de Fezes';
  if (n.includes('renal') || n.includes('rim')) return 'Função dos Rins';
  if (n.includes('hepat') || n.includes('figado') || n.includes('fígado') || n.includes('tgo') || n.includes('tgp')) return 'Função do Fígado';
  if (n.includes('check') || n.includes('painel') || n.includes('completo')) return 'Painel Completo de Saúde';
  if (n.includes('bioquimica') || n.includes('bioquímica')) return 'Bioquímica Geral';
  return nome;
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function classToStatus(cl) {
  if (!cl) return 'ok';
  const c = cl.toUpperCase();
  if (c === 'CRITICO') return 'crit';
  if (c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO') return 'warn';
  return 'ok';
}

function classToNeedle(cl) {
  if (!cl) return 52;
  const c = cl.toUpperCase();
  if (c === 'CRITICO') return 8;
  if (c === 'BAIXO') return 18;
  if (c === 'ALTO') return 84;
  return 52;
}

function calcScore(params) {
  if (!params || !params.length) return '--';
  const normals = params.filter(p => {
    const c = (p.classificacao || '').toUpperCase();
    return c === 'NORMAL' || c === '';
  }).length;
  return (normals / params.length * 10).toFixed(1);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateFull(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function apiStatusClass(s) {
  if (!s) return 'ok';
  const u = s.toUpperCase();
  if (u === 'CRITICO') return 'crit';
  if (u === 'ATENCAO') return 'warn';
  if (u === 'PROCESSANDO') return 'proc';
  return 'ok';
}

let toastTimer;
function showToast(txt) {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = txt;
  clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════
// POLLING CONTROL
// ══════════════════════════════
let pollInterval = null;

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(async () => {
    const prevProcessing = processingExams.length;
    await loadExams();
    // Se terminou de processar, para o polling
    if (processingExams.length === 0) stopPolling();
  }, 8000);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// ══════════════════════════════
// LOAD EXAMS LIST
// ══════════════════════════════
let processingExams = []; // exames ainda em análise

async function loadExams() {
  try {
    const data = await vitaeAPI.listarExames();
    const raw = data.exames || data || [];

    // Exames em processando há mais de 5 min → trata como erro no frontend
    const TIMEOUT_MS = 5 * 60 * 1000;
    const agora = Date.now();
    processingExams = raw.filter(e =>
      ['ENVIADO', 'PROCESSANDO'].includes(e.status) &&
      (agora - new Date(e.criadoEm).getTime()) < TIMEOUT_MS
    );
    const timedOut = raw.filter(e =>
      ['ENVIADO', 'PROCESSANDO'].includes(e.status) &&
      (agora - new Date(e.criadoEm).getTime()) >= TIMEOUT_MS
    );
    const errorExams = [...raw.filter(e => e.status === 'ERRO'), ...timedOut];

    // Só exibe na lista exames 100% prontos com parâmetros reais
    allExams = raw
      .filter(e => e.status === 'CONCLUIDO' && (e.totalParametros || 0) > 0)
      .map(e => ({
        id: e.id,
        name: toNomeAmigavel(e.tipoExame) || 'Exame',
        tipoExame: e.tipoExame || '',
        date: formatDate(e.dataExame || e.criadoEm),
        dateFull: formatDateFull(e.dataExame || e.criadoEm),
        lab: e.laboratorio || '',
        arquivoUrl: e.arquivoUrl || null,
        statusRaw: e.statusGeral || 'NORMAL',
        statusCls: apiStatusClass(e.statusGeral),
        totalParams: e.totalParametros || 0,
        normalCount: e.normalCount || 0,
        atencaoCount: e.atencaoCount || 0,
        criticoCount: e.criticoCount || 0,
      }));

    renderLista(processingExams.length, errorExams);

    // Inicia polling se há exames processando
    if (processingExams.length > 0) startPolling();
    else stopPolling();

  } catch (err) {
    console.log('Erro ao carregar exames:', err.message);
    renderLista(0, []);
  }
}

async function openExam(index) {
  currentExamBasic = allExams[index];
  if (!currentExamBasic) return;

  if (['PROCESSANDO', 'ENVIADO'].includes(currentExamBasic.statusRaw)) {
    showToast('Este exame ainda está sendo analisado. Aguarde alguns instantes.');
    return;
  }

  // Render skeleton while loading
  renderHeroSkeleton(currentExamBasic);
  renderSysGridSkeleton();
  push('s-overview');

  // Load full data
  if (currentExamBasic.id) {
    try {
      const data = await vitaeAPI.getExame(currentExamBasic.id);
      currentExam = data.exame || data;
    } catch (err) {
      // Fallback to basic data
      currentExam = {
        tipoExame: currentExamBasic.name,
        dataExame: currentExamBasic.dateFull,
        status: currentExamBasic.statusRaw,
        analise: currentExamBasic.analise,
        parametros: currentExamBasic.params,
      };
    }
  } else {
    currentExam = {
      tipoExame: currentExamBasic.name,
      status: currentExamBasic.statusRaw,
      analise: currentExamBasic.analise,
      parametros: currentExamBasic.params,
    };
  }

  renderOverview();
}

function selectMilestoneN(id, ms, e) {
  if (e) e.stopPropagation();
  const data = MILESTONES_N[id];
  if (!data) return;
  document.querySelectorAll('#atln-card-' + id + ' .atl-milestone').forEach((m, i) => {
    m.classList.toggle('ms-active', i === ms);
  });
  document.getElementById('atln-fill-' + id).style.width = data.fillPct[ms];
  const benWrap = document.getElementById('atln-ben-' + id);
  const chips = data.benefits[ms].map(b => `<span class="atl-ben-chip">${b}</span>`).join('');
  benWrap.innerHTML = chips + `<span class="atl-ideal-badge">${data.badge[ms]}</span>`;
}

function buildActionCard(param, idx) {
  const tlId = sanitizeId(param.nome) + idx;
  const cardId = 'ac-' + tlId;
  const cls = (param.classificacao || '').toUpperCase();
  const isCrit = cls === 'CRITICO';
  const dir = cls === 'BAIXO' ? 'abaixo' : 'acima';
  const itemCls = isCrit ? 'crit-item' : 'warn-item';
  const pillCls = isCrit ? 'crit' : 'warn';
  const info = MARKER_INFO[(param.nome || '').toLowerCase()];
  const acaoTxt = info && info.recs && info.recs.length > 0
    ? `<strong>${info.recs[0].name}:</strong> ${info.recs[0].desc}`
    : 'Consulte seu médico para avaliar o tratamento adequado.';
  const tl = getTimelineData(param);
  const fillPct = ['0%', '50%', '100%'];
  MILESTONES[tlId] = { fillPct, benefits: tl.benefits, ideal: tl.ideal };
  const defBen = (tl.benefits[2] || []).map(b => `<span class="atl-ben-chip">${b}</span>`).join('');
  const defIdeal = tl.ideal[2] ? `<span class="atl-ideal-badge">${tl.ideal[2]}</span>` : '';
  const footerChips = (tl.footer || []).map(f => `<span class="atl-foot-chip">${f}</span>`).join('');
  const pillTxt = param.valor
    ? `${cls === 'BAIXO' ? '↓' : '↑'} ${param.valor}${param.unidade ? ' ' + param.unidade : ''}${param.valorReferencia ? ' · ideal ' + param.valorReferencia : ''}`
    : `${dir} do ideal`;
  return `
  <div class="action-item ${itemCls}" id="${cardId}" onclick="toggleItem('${cardId}')">
    <div class="action-header">
      <div class="action-main">
        <div class="action-title">${param.nome} ${dir} do ideal</div>
        <div class="action-chips">
          <span class="achip">${isCrit ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Ação necessária' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Monitorar'}</span>
          <span class="achip">${isCrit ? 'Urgente' : 'Fácil'}</span>
        </div>
      </div>
      <div class="action-chevron"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5L3.5 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="action-body">
      <div class="action-body-pad">
        <div class="aec-inner aec-dark">
          <div class="aec-val-pill ${pillCls}">${pillTxt}</div>
          <div class="aec-action-lbl">O que fazer</div>
          <div class="aec-action-txt">${acaoTxt}</div>
        </div>
        <div class="aec-inner aec-timeline" id="atl-card-${tlId}">
          <div class="atl-header">O que você vai ganhar</div>
          <div class="atl-track-wrap">
            <div class="atl-line-bg"></div>
            <div class="atl-line-fill" id="atl-fill-${tlId}" style="width:100%"></div>
            <div class="atl-dots">
              <div class="atl-milestone" onclick="selectMilestone('${tlId}',0,event)"><div class="atl-dot"></div><div class="atl-ms-time">${tl.labels[0]}</div></div>
              <div class="atl-milestone" onclick="selectMilestone('${tlId}',1,event)"><div class="atl-dot"></div><div class="atl-ms-time">${tl.labels[1]}</div></div>

function buildOkCard(count) {

function renderOverview() {
  if (!currentExam) return;
  const params = currentExam.parametros || [];

  // Group by system (still needed for other screens)
  const systems = {};
  params.forEach(p => {
    const sys = getSystem(p.nome);
    if (!systems[sys]) systems[sys] = [];
    systems[sys].push(p);
  });

  const sysList = Object.entries(systems).sort((a, b) => {
    const score = s => s[1].some(p => (p.classificacao||'').toUpperCase() === 'CRITICO') ? 0
      : s[1].some(p => ['ALTO','BAIXO','ATENCAO'].includes((p.classificacao||'').toUpperCase())) ? 1 : 2;
    return score(a) - score(b);
  });

  if (sysList.length === 0 && params.length > 0) sysList.push(['Geral', params]);

  // Build educational explanation text
  const allNormal = params.every(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; });
  const critSys = sysList.find(([,ps]) => ps.some(p => (p.classificacao||'').toUpperCase() === 'CRITICO'));
  const warnSys = sysList.find(([,ps]) => ps.some(p => ['ALTO','BAIXO','ATENCAO'].includes((p.classificacao||'').toUpperCase())));

  // Use resumoIA from backend if available, otherwise build an educational explanation
  let explanation = '';
  if (currentExam.resumoIA) {
    explanation = currentExam.resumoIA;
  } else {
    const examName = (currentExam.tipoExame || currentExamBasic?.name || '').toLowerCase();
    if (allNormal) {
      explanation = `Esse exame avaliou <strong>${params.length} marcadores do seu corpo</strong> e todos estão dentro da faixa ideal. Isso significa que os sistemas analisados estão funcionando bem e seus hábitos estão no caminho certo.`;
    } else if (critSys) {
      const area = SYSTEM_FRIENDLY_PT[critSys[0]] || critSys[0];
      explanation = `Esse exame analisou <strong>${params.length} marcadores</strong>. A maioria está bem, mas alguns relacionados ao seu <strong>${area}</strong> precisam de atenção. Toque nos marcadores abaixo para entender cada um.`;
    } else if (warnSys) {
      const area = SYSTEM_FRIENDLY_PT[warnSys[0]] || warnSys[0];
      explanation = `Esse exame analisou <strong>${params.length} marcadores</strong>. Quase tudo está dentro do esperado, mas alguns valores ligados ao <strong>${area}</strong> merecem um olhar mais cuidadoso. Nada grave — pequenos ajustes no dia a dia podem ajudar.`;
    } else {
      explanation = `Esse exame avaliou <strong>${params.length} marcadores</strong> do seu corpo. Toque nos biomarcadores abaixo para entender o que cada um significa.`;
    }
  }

  // Count biomarkers by status
  const okParams = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; });
  const warnParams = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO'; });
  const critParams = params.filter(p => (p.classificacao||'').toUpperCase() === 'CRITICO');

  const boxesHtml = `
    <div class="status-box ok" style="animation-delay:.3s" onclick="openBiolist('ok')">
      <div class="status-box-count">${okParams.length}</div>
      <div class="status-box-text">bom</div>
    </div>
    ${warnParams.length > 0 ? `<div class="status-box warn" style="animation-delay:.4s" onclick="openBiolist('warn')">
      <div class="status-box-count">${warnParams.length}</div>
      <div class="status-box-text">médio</div>
    </div>` : ''}
    ${critParams.length > 0 ? `<div class="status-box crit" style="animation-delay:.5s" onclick="openBiolist('crit')">
      <div class="status-box-count">${critParams.length}</div>
      <div class="status-box-text">ruim</div>
    </div>` : ''}`;

  document.getElementById('sysGrid').innerHTML = `
    <div class="narr-card">
      <div class="narr-txt">${explanation}</div>
    </div>
    <div class="status-boxes-wrap">
      <div class="status-boxes-label">Biomarcadores</div>
      <div class="status-boxes">${boxesHtml}</div>
    </div>`;

  // Build insights — expandable action cards
  const crits = params.filter(p => (p.classificacao || '').toUpperCase() === 'CRITICO');
  const warns = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'ALTO' || c === 'BAIXO'; });
  const normals = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'NORMAL' || c === ''; });

  const toResolve = [...crits.slice(0, 2), ...warns.slice(0, 1)];
  let actionItems = '';
  if (toResolve.length === 0 && normals.length > 0) {
    actionItems = buildNormalCards(normals.length);
  } else {
    toResolve.forEach((p, i) => { actionItems += buildActionCard(p, i); });
    if (normals.length > 0) actionItems += buildOkCard(normals.length);
  }
  if (!actionItems && currentExam.resumoIA) {
    actionItems = `<div class="ok-action-item"><div class="ok-action-title">Análise da IA</div><div class="ok-action-sub">${currentExam.resumoIA.substring(0,120)}${currentExam.resumoIA.length>120?'...':''}</div></div>`;
  }
  if (!actionItems) actionItems = buildOkCard(params.length || 0);

  // Insights section removed

  // Update hero score with real params
  const realScore = calcScore(params);
  const scoreEl = document.querySelector('#heroCard .hero-score');
  if (scoreEl && params.length > 0) scoreEl.textContent = realScore;

  // Also render other screens
  renderCompare();
  renderMelhorias();
}

  'potassio':       { title:'Potássio é essencial para o coração e músculos', body:'Níveis baixos causam <strong>fraqueza muscular, câimbras e arritmias</strong>. Alto pode ser perigoso para o coração.', recs:[{name:'Banana, batata e abacate',desc:'Fontes ricas em potássio. Uma banana por dia já contribui significativamente.'}] },
};

function getMeaningShort(nomeLower) {
  for (const k in MARKER_INFO) {
    if (nomeLower.includes(k)) return MARKER_INFO[k].body;
  }
  return null;
}

function getRecsForParam(nomeLower) {
  for (const k in MARKER_INFO) {
    if (nomeLower.includes(k) && MARKER_INFO[k].recs.length > 0) return MARKER_INFO[k].recs;
  }
  return [];
}

// SISTEMA SCREEN

function openSistema(sysName) {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  const sysParams = params.filter(p => getSystem(p.nome) === sysName);
  if (!sysParams.length) return;
  renderSistema(sysName, sysParams);
  push('s-sistema');
}

function renderSistema(sysName, sysParams) {
  const emoji = SYSTEM_EMOJI[sysName] || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  const label = SYSTEM_LABEL[sysName] || sysName;

  const normals = sysParams.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; }).length;
  const total = sysParams.length;
  const abnormal = sysParams.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c !== 'NORMAL' && c !== ''; });

  let html = `<div class="sist-header fade d1">${emoji} ${label}</div>`;

  const statusText = normals === total
    ? `Todos os ${total} marcadores estão dentro do ideal`
    : `${normals} de ${total} marcador${total !== 1 ? 'es' : ''} no ideal`;
  html += `<div class="sist-sub fade d1">${statusText}</div>`;

  // Parameter cards
  sysParams.forEach((p, i) => {
    const cl = (p.classificacao||'').toUpperCase();
    const valCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO'||cl === 'BAIXO'||cl === 'ATENCAO') ? 'warn' : 'ok';
    const badgeLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Abaixo do ideal' : cl === 'ALTO' ? 'Acima do ideal' : cl === 'ATENCAO' ? 'Atenção' : 'Normal';
    const nome = (p.nome||'').toLowerCase();
    const meaningShort = p.explicacao_simples || getMeaningShort(nome);
    const pJson = JSON.stringify(p).replace(/"/g, '&quot;');
    html += `
      <div class="gc-s fade" style="animation-delay:${0.05 + i * 0.06}s;cursor:pointer" onclick="openMarker(${pJson})">
        <div class="gi" style="padding:16px 18px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:${meaningShort ? 10 : 0}px">
            <div>
              <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:3px">${p.nome}</div>
              <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--ink4)">${p.valor} ${p.unidade||''}${p.valorReferencia ? ' · Ref: ' + p.valorReferencia : ''}</div>
            </div>
            <div class="badge ${valCls}" style="flex-shrink:0;margin-top:3px">${badgeLabel}</div>
          </div>
          ${meaningShort ? `<div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:300;color:var(--ink3);line-height:1.65">${meaningShort}</div>` : ''}
        </div>
      </div>`;
  });

  // Recommendations for abnormal params
  if (abnormal.length > 0) {
    const allRecs = [];
    abnormal.forEach(p => {
      const nome = (p.nome||'').toLowerCase();
      const recs = getRecsForParam(nome);
      recs.forEach(r => { if (!allRecs.find(x => x.name === r.name)) allRecs.push(r); });
      // AI-provided dicas fallback
      if (recs.length === 0 && p.dicas) {
        const dicas = Array.isArray(p.dicas) ? p.dicas : [p.dicas];
        dicas.forEach(d => allRecs.push({ name: p.nome, desc: d }));
      }
    });
    if (allRecs.length > 0) {
      html += `<div class="sec-label fade d3">O que você pode fazer</div>`;
      allRecs.slice(0, 4).forEach((r, i) => {
        html += `
          <div class="otc-gc fade d3" style="animation-delay:${0.1 + i * 0.06}s">
            <div class="otc-gi">
              <div class="otc-iw">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <div class="otc-type">Dica</div>
              </div>
              <div>
                <div class="otc-name">${r.name}</div>
                <div class="otc-desc">${r.desc}</div>
              </div>
            </div>
          </div>`;
      });
    }
  }

  document.getElementById('sistemaContent').innerHTML = html;
}

function openMarker(paramOrStr) {

}

function openMarkerObj(jsonStr) {

    openMarker(p);
  } catch(e) {}
}

function openMarkerByName(name) {

}

// BIOLIST SCREEN (filtered by status)
// ══════════════════════════════
function openBiolist(status) {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  let filtered, title, sub, dotCls;
  if (status === 'ok') {
    filtered = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; });
    title = 'Biomarcadores bons';
    sub = 'Todos dentro da faixa ideal';
    dotCls = 'ok';
  } else if (status === 'warn') {
    filtered = params.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO'; });
    title = 'Biomarcadores médios';
    sub = 'Merecem um olhar mais atento';
    dotCls = 'warn';
  } else {
    filtered = params.filter(p => (p.classificacao||'').toUpperCase() === 'CRITICO');
    title = 'Biomarcadores ruins';
    sub = 'Precisam de atenção';
    dotCls = 'crit';
  }

  let html = `<div class="biolist-title">${title}</div>`;
  html += `<div class="biolist-sub">${filtered.length} biomarcador${filtered.length !== 1 ? 'es' : ''} · ${sub}</div>`;

  filtered.forEach((p, i) => {
    const pJson = JSON.stringify(p).replace(/"/g, '&quot;');
    html += `
      <div class="biolist-item" style="animation-delay:${0.15 + i * 0.05}s" onclick="openMarker(${pJson})">
        <div class="biolist-dot ${dotCls}"></div>
        <div class="biolist-name">${p.nome || '--'}</div>
        <div class="biolist-val">${p.valor || '--'} ${p.unidade || ''}</div>
        <div class="biolist-arrow">›</div>
      </div>`;
  });

  document.getElementById('biolistContent').innerHTML = html;
  push('s-biolist');
}

function renderMarker(p) {
  if (!p) return;
  const cl = (p.classificacao || '').toUpperCase();
  const valCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO' || cl === 'BAIXO') ? 'warn' : 'ok';
  const badgeCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO' || cl === 'BAIXO') ? 'warn' : 'ok';
  const badgeLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Abaixo do ideal' : cl === 'ALTO' ? 'Acima do ideal' : 'Normal';
  const needlePos = classToNeedle(cl);
  const sys = getSystem(p.nome);

  // Build historical evolution from allExams for this parameter
  const history = buildParamHistory(p.nome);
  const historyHtml = history.length > 1 ? buildEvoHtml(history) : '';

  // Meaning text — use AI data if available, otherwise MARKER_INFO
  const nome = (p.nome || '').toLowerCase();
  let meaning = { title: `${p.nome} afeta sua saúde`, body: `Valor encontrado: <strong>${p.valor} ${p.unidade || ''}</strong>. Referência: ${p.valorReferencia || 'ver laudo do laboratório'}.` };
  if (p.explicacao_simples) {
    meaning = { title: p.impacto_pessoal || `${p.nome} afeta sua saúde`, body: p.explicacao_simples };
  } else {
    for (const k in MARKER_INFO) { if (nome.includes(k)) { meaning = { title: MARKER_INFO[k].title, body: MARKER_INFO[k].body }; break; } }
  }

  // Recommendations — use AI dicas if available, otherwise MARKER_INFO.recs
  let recs = [];
  if (p.dicas) {
    const dicas = Array.isArray(p.dicas) ? p.dicas : [p.dicas];
    recs = dicas.map(d => ({ name: p.nome, desc: d }));
  } else {
    recs = getRecsForParam(nome);
  }

  let recsHtml = recs.map(r => `
    <div class="otc-gc">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <div class="otc-type">Dica</div>
        </div>
        <div>
          <div class="otc-name">${r.name}</div>
          <div class="otc-desc">${r.desc}</div>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('markerContent').innerHTML = `
    <div class="gc fade d1">
      <div class="gi">
        <div class="mk-ey">Sistema ${sys}</div>
        <div class="mk-name">${p.nome}</div>
        <div class="mk-val-row">
          <div class="mk-val ${valCls}">${p.valor}</div>
          <div class="mk-unit">${p.unidade || ''}</div>
        </div>
        <div class="mk-ref-row">
          <div class="mk-ref">${p.valorReferencia ? 'Ref: ' + p.valorReferencia : ''}</div>
          <div class="badge ${badgeCls}">${badgeLabel}</div>
        </div>
      </div>
    </div>
    <div class="gc-s fade d2">
      <div class="gi">
        <div class="spec-label">Onde você está na escala</div>
        <div class="spec-track"><div class="spec-needle" id="sNeedle" style="left:${needlePos}%"></div></div>
        <div class="spec-zones">
          <span class="sz">Crítico</span><span class="sz">Baixo</span><span class="sz">Normal</span><span class="sz">Ótimo</span><span class="sz">Alto</span>
        </div>
        ${history.length > 1 ? `<div class="spec-compare"><div class="sc-lbl">vs. exame anterior</div><div class="sc-val">${getParamTrend(p.nome, p.valor)}</div></div>` : ''}
      </div>
    </div>
    <div class="gc-s fade d3">
      <div class="gi">
        <div class="mn-ey">O que isso significa</div>
        <div class="mn-title">${meaning.title}</div>
        <div class="mn-body">${meaning.body}</div>
      </div>
    </div>
    ${historyHtml}
    ${recsHtml ? `<div class="sec-label fade d5">O que fazer</div>${recsHtml}` : ''}`;
}

function buildParamHistory(paramName) {
  const history = [];
  allExams.forEach(exam => {
    const found = (exam.params || []).find(p => p.nome && p.nome.toLowerCase() === paramName.toLowerCase());
    if (found) {
      history.push({ date: exam.date, value: found.valor, unit: found.unidade, cl: found.classificacao });
    }
  });
  return history;
}

function getParamTrend(paramName, currentVal) {
  const history = buildParamHistory(paramName);
  if (history.length < 2) return 'Primeiro resultado';
  const prev = parseFloat(history[1].value);
  const curr = parseFloat(currentVal);
  if (isNaN(prev) || isNaN(curr)) return 'Ver histórico';
  const diff = curr - prev;
  const pct = Math.abs(Math.round(diff / prev * 100));
  if (Math.abs(diff) < 0.01) return 'Estável';
  return diff > 0 ? `↑ ${pct}% — Subiu` : `↓ ${pct}% — Caiu`;
}

function buildEvoHtml(history) {
  const rows = history.slice(0, 3).map(h => {
    const cl = (h.cl || '').toUpperCase();
    const evoCls = cl === 'CRITICO' || cl === 'BAIXO' ? 'worse' : cl === 'ALTO' ? 'warn' : 'better';
    const needlePos = classToNeedle(cl);
    return `
      <div class="evo-row">
        <div class="evo-time">${h.date}</div>
        <div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${needlePos}%"></div></div>
        <div class="evo-val ${evoCls}">${h.value} ${h.unit || ''}</div>
      </div>`;
  }).join(`<div style="padding-left:76px"><div style="width:1px;height:14px;background:rgba(0,153,196,.2);margin-left:30%"></div></div>`);

  return `
    <div class="gc-s fade d4">
      <div class="gi evo-card">
        <div class="evo-title">Evolução histórica</div>
        <div class="evo-sub">Trajetória dos seus resultados</div>
        ${rows}
      </div>
    </div>`;
}

function renderCompare() {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  if (params.length === 0) {
    document.getElementById('compareContent').innerHTML = '<div style="padding:30px 22px;font-family:\'Jost\',sans-serif;font-size:13px;color:var(--ink3)">Nenhum parâmetro disponível para comparar.</div>';
    return;
  }

  // Build tabs from parameters
  const tabParams = params.slice(0, 5);
  let tabsHtml = '<div class="ctabs fade d1">';
  tabParams.forEach((p, i) => {
    const shortName = p.nome.length > 12 ? p.nome.substring(0, 12) + '…' : p.nome;
    tabsHtml += `<button class="ctab${i === 0 ? ' active' : ''}" onclick="switchCmpTab(this,'${i}')">${shortName}</button>`;
  });
  tabsHtml += '</div>';

  // First param evolution card
  const firstP = tabParams[0];
  const firstHistory = buildParamHistory(firstP.nome);

  let html = tabsHtml + `<div id="cmpCard" class="gc-s fade d2" style="cursor:default"><div class="gi"><div class="evo-title" id="cmpTitle">${firstP.nome}</div><div class="evo-sub">Trajetória dos seus resultados</div><div id="cmpRows">${buildCmpRows(firstHistory, firstP)}</div><div class="evo-insight"><div class="ei-body" id="cmpInsight">${buildCmpInsight(firstP, firstHistory)}</div></div></div></div>`;

  // All markers list
  html += `<div class="sec-label fade d3">Todos os marcadores</div><div class="cr-rows fade d3">`;
  params.forEach(p => {
    const cl = (p.classificacao || '').toUpperCase();
    const deltaCls = cl === 'CRITICO' || cl === 'BAIXO' || cl === 'ALTO' ? 'dn' : 'fl';
    const deltaLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Baixo' : cl === 'ALTO' ? 'Alto' : 'Normal';
    html += `
      <div class="cr-item" onclick="openMarker(${escapeJson(p)})"
        <div class="cr-info">
          <div class="cr-name">${p.nome}</div>
          <div class="cr-val">${p.valor} ${p.unidade || ''} · ${deltaLabel.toLowerCase()}</div>
        </div>
        <div class="delta ${deltaCls === 'dn' ? 'dn' : 'fl'}">${deltaLabel}</div>
        <div class="cr-arr">›</div>
      </div>`;
  });
  html += '</div>';

  document.getElementById('compareContent').innerHTML = html;
  window._cmpParams = tabParams;
}

function buildCmpRows(history, p) {
  if (history.length === 0) return `<div class="evo-row"><div class="evo-time">${currentExamBasic?.date || ''}</div><div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${classToNeedle(p.classificacao)}%"></div></div><div class="evo-val">${p.valor} ${p.unidade || ''}</div></div>`;
  return history.slice(0, 3).map((h, i) => {
    const cls = (h.cl || '').toUpperCase();
    const evoCls = cls === 'CRITICO' || cls === 'BAIXO' ? 'worse' : cls === 'ALTO' ? 'warn' : 'better';
    const needle = classToNeedle(cls);
    const conn = i < history.slice(0, 3).length - 1 ? `<div style="padding-left:76px"><div style="width:1px;height:14px;background:rgba(0,153,196,.18);margin-left:${needle/2}%"></div></div>` : '';
    return `<div class="evo-row"><div class="evo-time">${h.date}</div><div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${needle}%"></div></div><div class="evo-val ${evoCls}">${h.value} ${h.unit || ''}</div></div>${conn}`;
  }).join('');
}

function buildCmpInsight(p, history) {
  const cl = (p.classificacao || '').toUpperCase();
  if (cl === 'NORMAL' || cl === '') return `${p.nome} está <strong>dentro da faixa ideal</strong>. Continue monitorando.`;
  if (cl === 'CRITICO') return `${p.nome} em nível crítico — ${p.valor} ${p.unidade || ''}. Requer atenção imediata.`;
  if (cl === 'BAIXO') return `${p.nome} <strong>abaixo do ideal</strong> (${p.valor} ${p.unidade || ''}). Ref: ${p.valorReferencia || 'ver laudo'}.`;
  if (cl === 'ALTO') return `${p.nome} <strong>acima do ideal</strong> (${p.valor} ${p.unidade || ''}). Ref: ${p.valorReferencia || 'ver laudo'}.`;
  return `${p.nome}: ${p.valor} ${p.unidade || ''}.`;
}

function switchCmpTab(btn, idx) {
  document.querySelectorAll('.ctab').forEach(t => t.className = 'ctab');
  btn.className = 'ctab active';
  const p = window._cmpParams[parseInt(idx)];
  if (!p) return;
  const history = buildParamHistory(p.nome);
  document.getElementById('cmpTitle').textContent = p.nome;
  document.getElementById('cmpRows').innerHTML = buildCmpRows(history, p);
  document.getElementById('cmpInsight').innerHTML = buildCmpInsight(p, history);
}

          <div class="pc-ey">Parabéns</div>
          <div class="pc-title">Todos os marcadores normais</div>
          <div class="pc-body">Seu exame está dentro dos parâmetros ideais. Continue com os hábitos que te trouxeram até aqui.</div>
          <div class="pc-tags"><span class="pc-tag">Saúde ótima</span><span class="pc-tag">Continue assim</span></div>
        </div>
      </div>`;
  }

  // Other recommendations based on attention params
  const warnParams = params.filter(p => {
    const c = (p.classificacao || '').toUpperCase();
    return (c === 'ALTO' || c === 'BAIXO') && p !== critParam;
  });

  if (warnParams.length > 0) {
    html += '<div class="sec-label fade d2">Outras melhorias</div><div class="rec-section fade d2">';
    warnParams.slice(0, 3).forEach(p => {
      const cl = (p.classificacao || '').toUpperCase();
      const dir = cl === 'BAIXO' ? 'abaixo' : 'acima';
      html += `
        <div class="rec-item-gc" onclick="openMarker(${escapeJson(p)})"
          <div class="rec-gi">
            <div class="ri-top">
              <div class="ri-icon">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--gold-d)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
              </div>
              <div class="ri-text">
                <div class="ri-title">${p.nome} ${dir} do ideal</div>
                <div class="ri-sub">${p.valor} ${p.unidade || ''} — ${p.valorReferencia ? 'Ref: ' + p.valorReferencia : 'Monitorar'}. Clique para ver como melhorar.</div>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  // General OTC recommendations
  html += `
    <div class="sec-label fade d4">Hábitos gerais de saúde</div>
    <div class="otc-gc fade d4">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
          <div class="otc-type">Grátis</div>
        </div>
        <div>
          <div class="otc-name">Exercício e sono</div>
          <div class="otc-desc">30 min de caminhada por dia + 7-8h de sono melhoram praticamente todos os marcadores de saúde.</div>
        </div>
      </div>
    </div>
    <div class="otc-gc fade d5" style="margin-bottom:20px">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M12 22V12m0 0C12 6 7 4 7 4s0 5 5 8zm0 0c0-6 5-8 5-8s0 5-5 8"/></svg>
          <div class="otc-type">Grátis</div>
        </div>
        <div>
          <div class="otc-name">Hidratação adequada</div>
          <div class="otc-desc">2 litros de água por dia melhoram transporte de nutrientes, função renal e energia celular.</div>
        </div>
      </div>
    </div>`;

  document.getElementById('melhoriaContent').innerHTML = html;
}

// ══════════════════════════════
// SCREEN ENTER EFFECTS
// ══════════════════════════════
function onScreenEnter(id) {
  if (id === 's-overview') {
    setTimeout(() => {
      document.querySelectorAll('#s-overview [data-w]').forEach(el => el.style.width = el.dataset.w);
    }, 280);
  }
}

// ══════════════════════════════
// UPLOAD
// ══════════════════════════════
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'image/*,.pdf';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

fileInput.addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  showUploadLoading();
  try {
    if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
      await vitaeAPI.uploadExame(file);
      // Exame enviado — recarrega a lista (aparece o banner "em análise")
      // Não abre o exame ainda — ele só aparece quando a IA terminar
      await loadExams();
      resetUploadArea();
      showToast('Exame enviado! A IA está analisando — você será avisado quando estiver pronto.');
    } else {
      // Demo: just show overview after animation
      setTimeout(() => {
        currentExamBasic = { name: 'Exame Demo', date: 'Hoje', params: [], statusRaw: 'NORMAL', statusCls: 'ok' };
        currentExam = { tipoExame: 'Exame Demo', parametros: [], analise: 'Análise de demonstração.' };
        renderHeroSkeleton(currentExamBasic);
        document.getElementById('sysGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;font-family:\'Jost\',sans-serif;font-size:13px;color:var(--ink3)">Parâmetros carregando...</div>';
        // Insights section removed
        push('s-overview');
      }, 2400);
    }
  } catch (err) {
    showToast('Erro ao enviar: ' + (err.message || 'tente novamente'));
    resetUploadArea();
  }
  fileInput.value = '';
});

function triggerUpload() {
  fileInput.click();
}

function showUploadLoading() {
  const area = document.getElementById('uploadArea');
  area.style.animation = 'none';
  area.innerHTML = `
    <div style="border-radius:20px;background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(0,153,196,.15);padding:30px 20px;display:flex;flex-direction:column;align-items:center;gap:13px">
      <div style="position:relative;width:48px;height:48px">
        <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--gold);animation:spinRing 1s linear infinite"></div>
        <div style="position:absolute;inset:8px;border-radius:50%;border:1.5px solid transparent;border-top-color:rgba(0,153,196,.3);animation:spinRing 1.7s linear infinite reverse"></div>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:#fff">Analisando exame...</div>
      <div id="uploadSteps" style="display:flex;flex-direction:column;gap:7px;width:185px">
        <div id="us1" style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;color:var(--green);display:flex;gap:7px;align-items:center"><span>✓</span>Extraindo dados</div>
        <div id="us2" style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.35);display:flex;gap:7px;align-items:center"><span style="opacity:.3">○</span>Comparando histórico</div>
        <div id="us3" style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.35);display:flex;gap:7px;align-items:center"><span style="opacity:.3">○</span>Gerando insights</div>
      </div>
    </div>`;
  setTimeout(() => { const e = document.getElementById('us2'); if(e){e.style.color='var(--green)';e.querySelector('span').textContent='✓';e.querySelector('span').style.opacity='1'} }, 800);
  setTimeout(() => { const e = document.getElementById('us3'); if(e){e.style.color='var(--green)';e.querySelector('span').textContent='✓';e.querySelector('span').style.opacity='1'} }, 1800);
}

function resetUploadArea() {
  const area = document.getElementById('uploadArea');
  area.style.animation = '';
  area.className = 'upload-gc';
  area.innerHTML = `
    <div class="upload-inner" onclick="triggerUpload()">
      <div class="upload-iw"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(0,153,196,.8)" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <div class="upload-title">Adicionar resultado</div>
      <div class="upload-sub">PDF, foto ou imagem do laboratório</div>
      <button class="upload-action-btn">Escolher arquivo</button>
    </div>`;
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
  loadExams().then(() => {
    const params = new URLSearchParams(window.location.search);
    const openIdx = params.get('openExam');
    if (openIdx !== null && allExams[Number(openIdx)]) {
      openExam(Number(openIdx));
    }
  });
} else {
  renderLista(); // show empty state
}
</script>
</body>
</html>
