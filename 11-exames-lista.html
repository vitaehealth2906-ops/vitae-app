<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VITAE — Exames</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F2EAD8;--bg2:#EDE3D2;
  --surface:rgba(253,250,245,.65);--surface-s:rgba(253,250,245,.88);
  --inv:#1C1810;--ink:#1C1810;--ink2:#2C2418;--ink3:#6B5E48;--ink4:#9C8E7A;
  --gold:#C9A96E;--gold-l:#E2C99A;--gold-d:#A07840;
  --green:#7D9E7A;--amber:#C9924A;--red:#B85C4A;
  --border:rgba(201,169,110,.18);
  --blur:blur(22px) saturate(175%) brightness(107%);
}
html,body{height:100%;overflow:hidden;background:#2A2520}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0}
.phone{width:390px;height:820px;background:var(--bg);border-radius:50px;overflow:hidden;position:relative;
  box-shadow:0 0 0 10px rgba(20,16,10,.85),0 50px 100px rgba(0,0,0,.6)}
@media(max-width:430px){body{padding:0}.phone{width:100vw;height:100svh;border-radius:0;box-shadow:none}}

/* ORBS */
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(65px);z-index:0}
.orb1{width:320px;height:320px;background:rgba(201,169,110,.2);top:-80px;right:-60px;animation:drift 9s ease-in-out infinite alternate}
.orb2{width:220px;height:220px;background:rgba(125,158,122,.13);bottom:160px;left:-70px;animation:drift 12s ease-in-out infinite alternate-reverse}
.orb3{width:180px;height:180px;background:rgba(184,92,74,.07);bottom:80px;right:0;animation:drift 7s ease-in-out infinite alternate}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(28px)}}

/* SCREENS */
.screen{position:absolute;top:0;left:0;right:0;bottom:80px;overflow-y:auto;overflow-x:hidden;
  background:transparent;transition:transform .42s cubic-bezier(.77,0,.18,1),opacity .38s ease;z-index:1}
.screen::-webkit-scrollbar{display:none}
.screen.right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;height:80px;z-index:50;
  background:rgba(242,234,216,.85);backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid rgba(201,169,110,.15);
  display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px}
.bn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  background:none;border:none;padding:0 12px;transition:transform .2s}
.bn:active{transform:scale(.9)}
.bn-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.bn-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;transition:color .25s}
.bn.off .bn-icon svg{stroke:var(--ink4)}.bn.off .bn-label{color:var(--ink4)}
.bn.on .bn-icon svg{stroke:var(--gold-d)}.bn.on .bn-label{color:var(--gold-d)}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:1px;opacity:0;transition:opacity .25s}
.bn.on .bn-dot{opacity:1}

/* TOPBAR */
.topbar{padding:52px 22px 12px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--ink);letter-spacing:.01em}
.back-btn{width:38px;height:38px;border-radius:13px;cursor:pointer;background:rgba(253,250,245,.7);
  backdrop-filter:blur(14px);border:1px solid var(--border);color:var(--ink3);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(28,24,16,.08),inset 0 1px 0 rgba(255,255,255,.6);transition:all .2s;font-family:'Jost',sans-serif}
.back-btn:active{transform:scale(.92)}
.top-action{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold-d);background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.22);
  padding:6px 13px;border-radius:20px;cursor:pointer;backdrop-filter:blur(10px)}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--ink4);
  text-transform:uppercase;padding:16px 22px 10px}

/* ── GLASS CARD ANIMATED ── */
.gc{position:relative;border-radius:22px;padding:1.5px;margin:0 18px 12px;
  background:conic-gradient(from var(--a),rgba(201,169,110,.06) 0%,rgba(201,169,110,.5) 22%,rgba(230,210,170,.72) 32%,rgba(201,169,110,.5) 42%,rgba(201,169,110,.06) 62%);
  animation:bspin 5s linear infinite;transition:transform .2s,box-shadow .2s}
@keyframes bspin{to{--a:360deg}}
.gc:nth-child(2){animation-delay:-.9s}.gc:nth-child(3){animation-delay:-1.8s}.gc:nth-child(4){animation-delay:-2.7s}
.gc:active{transform:scale(.983)}
.gi{border-radius:21px;background:var(--surface);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);padding:18px 20px;
  box-shadow:0 4px 20px rgba(28,24,16,.07),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -1px 0 rgba(201,169,110,.06);
  position:relative;overflow:hidden}
.gi::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);animation:shimmer 4.5s ease-in-out infinite}
@keyframes shimmer{0%{left:-55%}100%{left:160%}}

/* STATIC BORDER CARD */
.gc-s{position:relative;border-radius:22px;padding:1.5px;margin:0 18px 12px;
  background:linear-gradient(135deg,rgba(201,169,110,.28) 0%,rgba(201,169,110,.07) 50%,rgba(201,169,110,.22) 100%);
  transition:transform .2s;cursor:default}
.gc-s .gi{border-radius:21px}

/* HERO DARK CARD */
.gc-hero{position:relative;border-radius:26px;padding:1.5px;margin:0 18px 14px;
  background:rgba(201,169,110,.28);
  box-shadow:0 22px 60px rgba(28,24,16,.32),0 0 50px rgba(201,169,110,.07)}
.gi-dark{border-radius:25px;background:linear-gradient(145deg,rgba(28,24,16,.97) 0%,rgba(44,36,24,.97) 100%);
  backdrop-filter:blur(28px);padding:26px 24px;position:relative;overflow:hidden}
.gi-dark::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,.6),transparent);animation:shimmer 3s ease-in-out infinite}
.gi-dark::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,.07) 40%,rgba(255,255,255,.18) 50%,rgba(255,255,255,.07) 60%,transparent 80%);
  transform:skewX(-18deg);animation:heroShimmer 4s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes heroShimmer{0%{left:-120%}55%,100%{left:160%}}

/* HERO SCORE — compact horizontal */
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
.hero-left{flex:1;min-width:0}
.hero-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;color:rgba(201,169,110,.72);text-transform:uppercase;margin-bottom:3px}
.hero-name{font-family:'Jost',sans-serif;font-size:13px;font-weight:400;color:rgba(253,250,245,.85);line-height:1.3}
.hero-right{flex-shrink:0;text-align:right}
.hero-score-row{display:flex;align-items:flex-end;gap:3px;justify-content:flex-end}
.hero-score{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:#e8ca80;line-height:.88;text-shadow:0 0 50px rgba(201,169,110,.35)}
.hero-max{font-family:'DM Mono',monospace;font-size:11px;color:rgba(201,169,110,.6);padding-bottom:4px;letter-spacing:.06em}
.hero-status{font-family:'Jost',sans-serif;font-size:10px;font-weight:300;color:rgba(253,250,245,.7);margin-top:2px;text-align:right}
.hero-bottom{position:relative;z-index:1;margin-top:12px}
.hero-cta{padding:9px 16px;border-radius:12px;font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:.12em;text-transform:uppercase;text-align:center;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.hero-cta.primary{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--inv);box-shadow:0 4px 16px rgba(160,120,64,.3)}
.hero-cta.secondary{background:rgba(255,255,255,.07);color:rgba(201,169,110,.7);border:1px solid rgba(201,169,110,.2)}
.hero-cta:active{transform:scale(.96)}

/* BIO CHIPS GRID */
.bio-grid-wrap{margin:0 18px 14px}
.bio-grid-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--ink4);text-transform:uppercase;margin-bottom:10px}
.bio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bio-chip{border-radius:16px;padding:12px 8px 10px;text-align:center;cursor:pointer;position:relative;overflow:hidden;
  background:rgba(253,250,245,.55);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
  border:1px solid rgba(201,169,110,.18);border-top:1px solid rgba(255,255,255,.7);
  box-shadow:0 2px 12px rgba(28,24,16,.05),inset 0 1px 0 rgba(255,255,255,.6);
  transition:all .3s cubic-bezier(.25,.46,.45,.94)}
.bio-chip::before{content:'';position:absolute;inset:0;border-radius:16px;
  background:radial-gradient(circle at 50% 0%,rgba(201,169,110,.08) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.bio-chip:hover::before{opacity:1}
.bio-chip:hover{border-color:rgba(201,169,110,.35);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,169,110,.1)}
.bio-chip:active{transform:scale(.95)}
.bio-chip.warn{border-color:rgba(201,169,110,.35);background:rgba(201,169,110,.08)}
.bio-chip.crit{border-color:rgba(184,92,74,.25);background:rgba(184,92,74,.06)}
.bio-chip-icon{width:18px;height:18px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.bio-chip.ok .bio-chip-icon{background:rgba(125,158,122,.15)}
.bio-chip.warn .bio-chip-icon{background:rgba(201,169,110,.15)}
.bio-chip.crit .bio-chip-icon{background:rgba(184,92,74,.12)}
.bio-chip-name{font-family:'Jost',sans-serif;font-size:10px;font-weight:400;color:var(--ink3);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bio-chip-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:400;color:var(--ink);line-height:1}
.bio-chip.warn .bio-chip-value{color:var(--gold-d)}
.bio-chip.crit .bio-chip-value{color:var(--red)}
.bio-chip-unit{font-family:'DM Mono',monospace;font-size:7px;color:var(--ink4);margin-top:2px}
.bio-chip{opacity:0;animation:chipPop .4s ease both}
@keyframes chipPop{0%{opacity:0;transform:scale(.85) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* SYSTEM GRID — Option B: narrative + horizontal scroll */
.sys-grid{display:block;margin-bottom:4px}

/* NARRATIVE CARD */
.narr-card{margin:0 18px 12px;padding:16px 18px;border-radius:18px;
  background:rgba(201,169,110,.07);border:1px solid rgba(201,169,110,.13)}
.narr-txt{font-family:'Jost',sans-serif;font-size:14px;font-weight:300;color:var(--ink2);line-height:1.65}
.narr-txt strong{font-weight:400;color:var(--ink)}

/* HORIZONTAL SCROLL */
.sys-h-scroll{display:flex;gap:10px;padding:0 18px 4px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.sys-h-scroll::-webkit-scrollbar{display:none}

/* SYSTEM CARDS — wider landscape, solid core so border effect stays at edge */
.sys-card{min-width:272px;flex-shrink:0;border-radius:18px;padding:1.5px;cursor:pointer;
  background:conic-gradient(from var(--a),rgba(201,169,110,.05) 0%,rgba(201,169,110,.72) 26%,rgba(238,218,165,.95) 33%,rgba(201,169,110,.72) 40%,rgba(201,169,110,.05) 58%);
  animation:bspin 4s linear infinite;transition:transform .2s}
.sys-card:nth-child(2){animation-delay:-.9s}.sys-card:nth-child(3){animation-delay:-1.8s}.sys-card:nth-child(4){animation-delay:-2.7s}.sys-card:nth-child(5){animation-delay:-3.6s}
.sys-card:active{transform:scale(.97)}

/* Solid enough to block gold from bleeding through center — glass effect comes from backdrop-filter vs the PAGE background */
.sys-card-in{border-radius:17px;
  background:rgba(245,239,226,.92);
  backdrop-filter:blur(20px) saturate(155%) brightness(103%);
  -webkit-backdrop-filter:blur(20px) saturate(155%) brightness(103%);
  padding:16px 18px;display:flex;flex-direction:column;gap:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.82)}

/* Top row: category label (small emoji + name) + status pill */
.sys-card-top-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sys-card-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:5px}
.sys-card-label-emoji{font-size:12px;line-height:1}
.sys-card-status{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.06em;padding:3px 9px;border-radius:20px;flex-shrink:0}
.sys-card-status.ok{background:rgba(125,158,122,.1);color:var(--green);border:1px solid rgba(125,158,122,.22)}
.sys-card-status.warn{background:rgba(201,146,74,.1);color:var(--amber);border:1px solid rgba(201,146,74,.22)}
.sys-card-status.crit{background:rgba(184,92,74,.1);color:var(--red);border:1px solid rgba(184,92,74,.22)}

/* System name + desc */
.sys-card-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1;letter-spacing:.01em}
.sys-card-desc{font-family:'Jost',sans-serif;font-size:11.5px;font-weight:300;color:var(--ink3);line-height:1.45;margin-top:-2px}

/* Bar + footer */
.sys-card-bar{height:2.5px;background:rgba(201,169,110,.14);border-radius:3px;overflow:hidden}
.sys-card-fill{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.77,0,.18,1)}
.sys-card-fill.ok{background:var(--green)}.sys-card-fill.warn{background:var(--amber)}.sys-card-fill.crit{background:var(--red)}
.sys-card-footer{display:flex;align-items:center;justify-content:space-between}
.sys-card-val{font-family:'Jost',sans-serif;font-size:11px;font-weight:300;color:var(--ink4)}
.sys-card-pct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--ink4)}

/* gpulse kept for other elements */
@keyframes gpulse{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(2);opacity:.1}}

/* SISTEMA SCREEN */
.sist-header{padding:0 22px 6px;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;color:var(--ink);letter-spacing:.01em}
.sist-sub{font-family:'Jost',sans-serif;font-size:13px;font-weight:300;color:var(--ink3);padding:0 22px 14px;line-height:1.6}

/* INSIGHT SCROLL */
.is-wrap{padding:0 18px;margin-bottom:4px}
.ic-gc{min-width:215px;flex-shrink:0;border-radius:18px;padding:1.5px;cursor:pointer;
  background:conic-gradient(from var(--a),rgba(201,169,110,.04) 0%,rgba(201,169,110,.38) 30%,rgba(201,169,110,.04) 60%);
  animation:bspin 5.5s linear infinite;transition:transform .2s}
.ic-gc.al{background:conic-gradient(from var(--a),rgba(184,92,74,.04) 0%,rgba(184,92,74,.45) 30%,rgba(184,92,74,.04) 55%)}
.ic-gc.gd{background:conic-gradient(from var(--a),rgba(125,158,122,.04) 0%,rgba(125,158,122,.45) 30%,rgba(125,158,122,.04) 55%)}
.ic-gc:nth-child(2){animation-delay:-1.1s}.ic-gc:nth-child(3){animation-delay:-2.2s}
.ic-gc:active{transform:scale(.96)}
.ic-gi{border-radius:17px;background:var(--surface-s);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);padding:15px;
  box-shadow:0 3px 16px rgba(28,24,16,.07),inset 0 1px 0 rgba(255,255,255,.65)}
.ic-ey{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px}
.ic-ey.al{color:var(--red)}.ic-ey.gd{color:var(--green)}.ic-ey.lk{color:var(--gold-d)}
.ic-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px;line-height:1.3}
.ic-body{font-family:'Jost',sans-serif;font-size:11px;font-weight:300;color:var(--ink3);line-height:1.65;margin-bottom:9px}
.ic-cta{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.13em;text-transform:uppercase}
.ic-cta.al{color:var(--red)}.ic-cta.gd{color:var(--green)}.ic-cta.lk{color:var(--gold-d)}

/* MARKER SCREEN */
.mk-val-row{display:flex;align-items:flex-end;gap:5px;margin-bottom:6px}
.mk-val{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:600;line-height:.9;text-shadow:0 0 30px rgba(184,92,74,.2)}
.mk-val.crit{color:var(--red)}.mk-val.warn{color:var(--amber)}.mk-val.ok{color:var(--green)}
.mk-unit{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink4);letter-spacing:.08em;padding-bottom:6px}
.mk-ey{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.mk-name{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;font-style:italic;color:var(--ink3);margin-bottom:12px}
.mk-ref-row{display:flex;gap:10px;align-items:center}
.mk-ref{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.09em;color:var(--ink4);text-transform:uppercase}
.badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;padding:3px 9px;border-radius:20px}
.badge.crit{background:rgba(184,92,74,.1);color:var(--red);border:1px solid rgba(184,92,74,.18)}
.badge.warn{background:rgba(201,146,74,.1);color:var(--amber);border:1px solid rgba(201,146,74,.18)}
.badge.ok{background:rgba(125,158,122,.1);color:var(--green);border:1px solid rgba(125,158,122,.18)}

/* SPECTRUM */
.spec-label{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;font-weight:400;color:var(--ink2);margin-bottom:13px}
.spec-track{height:8px;border-radius:4px;
  background:linear-gradient(to right,#B85C4A 0%,#C9924A 28%,#7D9E7A 52%,#7D9E7A 72%,#C9924A 87%,#B85C4A 100%);
  position:relative;margin-bottom:6px;box-shadow:inset 0 1px 3px rgba(28,24,16,.15)}
.spec-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;
  background:rgba(253,250,245,.95);border-radius:50%;border:1.5px solid rgba(201,169,110,.3);
  box-shadow:0 0 0 3px rgba(201,169,110,.4),0 0 12px rgba(201,169,110,.25),0 3px 8px rgba(28,24,16,.3);
  transition:left 1.4s cubic-bezier(.77,0,.18,1)}
.spec-zones{display:flex;justify-content:space-between}
.sz{font-family:'DM Mono',monospace;font-size:7px;color:var(--ink4);letter-spacing:.06em}
.spec-compare{margin-top:13px;padding-top:13px;border-top:1px solid rgba(201,169,110,.11);
  display:flex;align-items:center;justify-content:space-between}
.sc-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.sc-val{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;background:rgba(184,92,74,.09);color:var(--red);border:1px solid rgba(184,92,74,.15)}

/* MEANING */
.mn-ey{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.mn-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:8px;line-height:1.3}
.mn-body{font-family:'Jost',sans-serif;font-size:13px;font-weight:300;color:var(--ink3);line-height:1.7}
.mn-body strong{font-weight:400;color:var(--ink2)}

/* EVOLUTION */
.evo-card{padding:18px 20px}
.evo-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--ink);margin-bottom:4px}
.evo-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink4);margin-bottom:18px}
.evo-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}

.action-list{display:flex;flex-direction:column;gap:10px}

  <!-- BOTTOM NAV -->
  <div class="bnav">

      <div class="bn-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>

      <div class="bn-label">Início</div>

<script src="api.js"></script>
<script>
// ══════════════════════════════
// NAVIGATION STACK
// ══════════════════════════════
const stack = ['s-lista'];
let animating = false;

function push(id) {
  if (animating) return;
  animating = true;
  const from = document.getElementById(stack[stack.length - 1]);
  const to = document.getElementById(id);
  stack.push(id);
  from.className = 'screen left';
  to.className = 'screen active';
  triggerFades(to);
  onScreenEnter(id);
  setTimeout(() => animating = false, 450);
}

function pop() {
  if (stack.length <= 1 || animating) return;
  animating = true;
  const from = document.getElementById(stack.pop());
  const to = document.getElementById(stack[stack.length - 1]);
  from.className = 'screen right';
  to.className = 'screen active';
  triggerFades(to);
  setTimeout(() => animating = false, 450);
}

function triggerFades(el) {
  el.querySelectorAll('.fade').forEach(e => { e.style.animation = 'none'; e.offsetHeight; e.style.animation = ''; });
}

function navPage(tab) {
  if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
  else if (tab === 'melhorias') window.location.href = '12-melhorias.html';
}

// ══════════════════════════════
// FRIENDLY EXAM NAMES
// ══════════════════════════════
function toNomeAmigavel(nome) {
  if (!nome) return 'Exame de Saúde';
  const n = nome.toLowerCase().trim();
  if (n.includes('multiplo') || n === 'múltiplos' || n === 'multiplos') return 'Painel Completo de Saúde';
  if (n.includes('hemograma')) return 'Exame de Sangue Completo';
  if (n.includes('lipidogram') || (n.includes('lipid') && !n.includes('vitamina'))) return 'Perfil do Coração';
  if (n.includes('glicemia') && n.includes('hba') || n.includes('glicada')) return 'Controle de Açúcar no Sangue';
  if (n.includes('glicemia') || n.includes('glicose')) return 'Nível de Açúcar no Sangue';
  if (n.includes('tsh') || n.includes('tireoide') || n.includes('tirói')) return 'Função da Tireoide';
  if (n.includes('testosterona')) return 'Hormônios Masculinos';
  if (n.includes('hormonal') || n.includes('estradiol') || n.includes('progesterona')) return 'Perfil Hormonal';
  if (n.includes('vitamina')) return 'Vitaminas e Minerais';
  if (n.includes('urina') || n.includes('urinalise') || n.includes('urinálise')) return 'Exame de Urina';
  if (n.includes('fezes') || n.includes('parasitolog')) return 'Exame de Fezes';
  if (n.includes('renal') || n.includes('rim')) return 'Função dos Rins';
  if (n.includes('hepat') || n.includes('figado') || n.includes('fígado') || n.includes('tgo') || n.includes('tgp')) return 'Função do Fígado';
  if (n.includes('check') || n.includes('painel') || n.includes('completo')) return 'Painel Completo de Saúde';
  if (n.includes('bioquimica') || n.includes('bioquímica')) return 'Bioquímica Geral';
  return nome;
}

// ══════════════════════════════
// STATE
// ══════════════════════════════
let allExams = [];         // lista completa do backend
let currentExam = null;   // exame atual completo (getExame)
let currentParam = null;  // parametro atual (s-marker)
let currentExamBasic = null; // dados basicos da lista

// ══════════════════════════════
// SYSTEM MAPPING
// ══════════════════════════════
const SYSTEM_MAP = {
  'hemoglobina':'Cardio','hematocrito':'Cardio','eritrocitos':'Cardio','leucocitos':'Imunidade',
  'plaquetas':'Imunidade','neutrofilos':'Imunidade','linfocitos':'Imunidade',
  'colesterol':'Cardio','ldl':'Cardio','hdl':'Cardio','triglicerides':'Cardio',
  'frequencia cardiaca':'Cardio','pressao arterial':'Cardio',
  'vitamina d':'Nutricional','vitamina b12':'Nutricional','vitamina c':'Nutricional',
  'ferritina':'Nutricional','ferro':'Nutricional','calcio':'Nutricional',
  'magnesio':'Nutricional','zinco':'Nutricional','fosforo':'Nutricional',
  'potassio':'Nutricional','sodio':'Nutricional',
  'glicose':'Metabolico','glicemia':'Metabolico','hemoglobina glicada':'Metabolico',
  'insulina':'Metabolico','ureia':'Metabolico','creatinina':'Metabolico',
  'acido urico':'Metabolico','alt':'Metabolico','ast':'Metabolico','tgo':'Metabolico','tgp':'Metabolico',
  'tsh':'Hormonal','t3':'Hormonal','t4':'Hormonal','testosterona':'Hormonal',
  'estradiol':'Hormonal','cortisol':'Hormonal','progesterona':'Hormonal',
  'dhea':'Hormonal','fsh':'Hormonal','lh':'Hormonal',
};

const SYSTEM_ICONS = {
  'Cardio': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>',
  'Nutricional': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
  'Metabolico': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
  'Hormonal': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-linecap="round"><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/><circle cx="12" cy="12" r="10"/></svg>',
  'Imunidade': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  'Geral': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold-d)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
};

function getSystem(paramName) {
  if (!paramName) return 'Geral';
  const key = paramName.toLowerCase().trim();
  for (const k in SYSTEM_MAP) { if (key.includes(k)) return SYSTEM_MAP[k]; }
  return 'Geral';
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function classToStatus(cl) {
  if (!cl) return 'ok';
  const c = cl.toUpperCase();
  if (c === 'CRITICO') return 'crit';
  if (c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO') return 'warn';
  return 'ok';
}

function classToNeedle(cl) {
  if (!cl) return 52;
  const c = cl.toUpperCase();
  if (c === 'CRITICO') return 8;
  if (c === 'BAIXO') return 18;
  if (c === 'ALTO') return 84;
  return 52;
}

function calcScore(params) {
  if (!params || !params.length) return '--';
  const normals = params.filter(p => {
    const c = (p.classificacao || '').toUpperCase();
    return c === 'NORMAL' || c === '';
  }).length;
  return (normals / params.length * 10).toFixed(1);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateFull(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function apiStatusClass(s) {
  if (!s) return 'ok';
  const u = s.toUpperCase();
  if (u === 'CRITICO') return 'crit';
  if (u === 'ATENCAO') return 'warn';
  if (u === 'PROCESSANDO') return 'proc';
  return 'ok';
}

let toastTimer;
function showToast(txt) {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = txt;
  clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════
// POLLING CONTROL
// ══════════════════════════════
let pollInterval = null;

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(async () => {
    const prevProcessing = processingExams.length;
    await loadExams();
    // Se terminou de processar, para o polling
    if (processingExams.length === 0) stopPolling();
  }, 8000);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// ══════════════════════════════
// LOAD EXAMS LIST
// ══════════════════════════════
let processingExams = []; // exames ainda em análise

async function loadExams() {
  try {
    const data = await vitaeAPI.listarExames();
    const raw = data.exames || data || [];

    // Exames em processando há mais de 5 min → trata como erro no frontend
    const TIMEOUT_MS = 5 * 60 * 1000;
    const agora = Date.now();
    processingExams = raw.filter(e =>
      ['ENVIADO', 'PROCESSANDO'].includes(e.status) &&
      (agora - new Date(e.criadoEm).getTime()) < TIMEOUT_MS
    );
    const timedOut = raw.filter(e =>
      ['ENVIADO', 'PROCESSANDO'].includes(e.status) &&
      (agora - new Date(e.criadoEm).getTime()) >= TIMEOUT_MS
    );
    const errorExams = [...raw.filter(e => e.status === 'ERRO'), ...timedOut];

    // Só exibe na lista exames 100% prontos com parâmetros reais
    allExams = raw
      .filter(e => e.status === 'CONCLUIDO' && (e.totalParametros || 0) > 0)
      .map(e => ({
        id: e.id,
        name: toNomeAmigavel(e.tipoExame) || 'Exame',
        date: formatDate(e.dataExame || e.criadoEm),
        dateFull: formatDateFull(e.dataExame || e.criadoEm),
        lab: e.laboratorio || '',
        arquivoUrl: e.arquivoUrl || null,
        statusRaw: e.statusGeral || 'NORMAL',
        statusCls: apiStatusClass(e.statusGeral),
        totalParams: e.totalParametros || 0,
        normalCount: e.normalCount || 0,
        atencaoCount: e.atencaoCount || 0,
        criticoCount: e.criticoCount || 0,
      }));

    renderLista(processingExams.length, errorExams);

    // Inicia polling se há exames processando
    if (processingExams.length > 0) startPolling();
    else stopPolling();

  } catch (err) {
    console.log('Erro ao carregar exames:', err.message);
    renderLista(0, []);
  }
}

// ══════════════════════════════
// RENDER LISTA
// ══════════════════════════════
function renderLista(processingCount = 0, errorExams = []) {
  const container = document.getElementById('listaContent');
  // Upload area vira loading ou volta ao normal
  if (processingCount > 0) {
    showUploadLoading();
  } else {
    resetUploadArea();
  }

  let html = '';

  // Exames com erro — não exibir na lista

  // Nenhum exame pronto ainda
  if (allExams.length === 0 && processingCount === 0 && errorExams.length === 0) {
    container.innerHTML = html + `
      <div class="empty-state fade">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(160,120,64,.6)" stroke-width="1.5" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <div class="empty-title">Nenhum exame ainda</div>
        <div class="empty-sub">Envie seu primeiro resultado de laboratório.<br>A IA analisa e estrutura tudo automaticamente.</div>
      </div>`;
    return;
  }

  if (allExams.length === 0) {
    container.innerHTML = html;
    return;
  }

  const total = allExams.length;
  const normals = allExams.filter(e => e.statusCls === 'ok').length;
  const crits = allExams.filter(e => e.statusCls === 'crit').length;

  html += `<div class="sec-label fade d2">${total} resultado${total > 1 ? 's' : ''} · ${normals} normais${crits > 0 ? ' · ' + crits + ' críticos' : ''}</div>`;

  allExams.forEach((e, i) => {
    const score = e.totalParams > 0 ? (e.normalCount / e.totalParams * 10).toFixed(1) : '--';
    const sCls = e.statusCls;

    const tags = [
      e.normalCount > 0 ? `<span class="tag ok">${e.normalCount} ótimo${e.normalCount > 1 ? 's' : ''}</span>` : '',
      e.atencaoCount > 0 ? `<span class="tag warn">${e.atencaoCount} atenção</span>` : '',
      e.criticoCount > 0 ? `<span class="tag crit">${e.criticoCount} crítico${e.criticoCount > 1 ? 's' : ''}</span>` : '',
    ].filter(Boolean).join('') || '<span class="tag ok">Analisado</span>';

    const meta = [e.date, e.lab].filter(Boolean).join(' · ');

    html += `
      <div class="exam-gc fade" style="animation-delay:${0.06 + i * 0.07}s" onclick="openExam(${i})">
        <div class="exam-gi">
          <div class="e-info">
            <div class="e-meta">${meta}</div>
            <div class="e-name">${e.name}</div>
            <div class="tag-row">${tags}</div>
          </div>
          <div class="e-score">
            <div class="e-num ${sCls}">${score}</div>
            <div class="e-den">/ 10</div>
          </div>
          <div class="e-arr">›</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// ══════════════════════════════
// OPEN EXAM → load full data
// ══════════════════════════════
async function openExam(index) {
  currentExamBasic = allExams[index];
  if (!currentExamBasic) return;

  if (['PROCESSANDO', 'ENVIADO'].includes(currentExamBasic.statusRaw)) {
    showToast('Este exame ainda está sendo analisado. Aguarde alguns instantes.');
    return;
  }

  // Render skeleton while loading
  renderHeroSkeleton(currentExamBasic);
  renderSysGridSkeleton();
  renderInsightsSkeleton();
  push('s-overview');

function renderOverview() {
  if (!currentExam) return;
  const params = currentExam.parametros || [];

  // Group by system (still needed for other screens)
  const systems = {};
  params.forEach(p => {
    const sys = getSystem(p.nome);
    if (!systems[sys]) systems[sys] = [];
    systems[sys].push(p);
  });

  const sysList = Object.entries(systems).sort((a, b) => {
    const score = s => s[1].some(p => (p.classificacao||'').toUpperCase() === 'CRITICO') ? 0
      : s[1].some(p => ['ALTO','BAIXO','ATENCAO'].includes((p.classificacao||'').toUpperCase())) ? 1 : 2;
    return score(a) - score(b);
  });

  if (sysList.length === 0 && params.length > 0) sysList.push(['Geral', params]);

  // Build educational explanation text
  const allNormal = params.every(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; });
  const critSys = sysList.find(([,ps]) => ps.some(p => (p.classificacao||'').toUpperCase() === 'CRITICO'));
  const warnSys = sysList.find(([,ps]) => ps.some(p => ['ALTO','BAIXO','ATENCAO'].includes((p.classificacao||'').toUpperCase())));

  // Use resumoIA from backend if available, otherwise build an educational explanation
  let explanation = '';
  if (currentExam.resumoIA) {
    explanation = currentExam.resumoIA;
  } else {
    const examName = (currentExam.tipoExame || currentExamBasic?.name || '').toLowerCase();
    if (allNormal) {
      explanation = `Esse exame avaliou <strong>${params.length} marcadores do seu corpo</strong> e todos estão dentro da faixa ideal. Isso significa que os sistemas analisados estão funcionando bem e seus hábitos estão no caminho certo.`;
    } else if (critSys) {
      const area = SYSTEM_FRIENDLY_PT[critSys[0]] || critSys[0];
      explanation = `Esse exame analisou <strong>${params.length} marcadores</strong>. A maioria está bem, mas alguns relacionados ao seu <strong>${area}</strong> precisam de atenção. Toque nos marcadores abaixo para entender cada um.`;
    } else if (warnSys) {
      const area = SYSTEM_FRIENDLY_PT[warnSys[0]] || warnSys[0];
      explanation = `Esse exame analisou <strong>${params.length} marcadores</strong>. Quase tudo está dentro do esperado, mas alguns valores ligados ao <strong>${area}</strong> merecem um olhar mais cuidadoso. Nada grave — pequenos ajustes no dia a dia podem ajudar.`;
    } else {
      explanation = `Esse exame avaliou <strong>${params.length} marcadores</strong> do seu corpo. Toque nos biomarcadores abaixo para entender o que cada um significa.`;
    }
  }

  // Build bio-chips for each parameter
  const chipsHtml = params.map((p, i) => {
    const c = (p.classificacao || '').toUpperCase();
    const cls = c === 'CRITICO' ? 'crit' : (c === 'ALTO' || c === 'BAIXO' || c === 'ATENCAO') ? 'warn' : 'ok';
    const icon = cls === 'ok'
      ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : cls === 'crit'
      ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--gold-d)" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    let val = String(p.valor || '--');
    if (val.length > 7) val = val.substring(0, 7);
    const pName = (p.nome || '').length > 14 ? p.nome.substring(0, 13) + '…' : (p.nome || '--');
    return `
      <div class="bio-chip ${cls}" style="animation-delay:${0.3 + i * 0.06}s" onclick="openMarkerByName('${(p.nome||'').replace(/'/g,"\\'")}')">
        <div class="bio-chip-icon">${icon}</div>
        <div class="bio-chip-name">${pName}</div>
        <div class="bio-chip-value">${val}</div>
        <div class="bio-chip-unit">${p.unidade || ''}</div>
      </div>`;
  }).join('');

  document.getElementById('sysGrid').innerHTML = `
    <div class="narr-card">
      <div class="narr-txt">${explanation}</div>
    </div>
    <div class="bio-grid-wrap">
      <div class="bio-grid-label">Biomarcadores</div>
      <div class="bio-grid">${chipsHtml || '<div style="font-family:\'Jost\',sans-serif;font-size:13px;color:var(--ink3);padding:14px;grid-column:1/-1">Parâmetros carregando...</div>'}</div>
    </div>`;

  // Build insights — expandable action cards
  const crits = params.filter(p => (p.classificacao || '').toUpperCase() === 'CRITICO');
  const warns = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'ALTO' || c === 'BAIXO'; });
  const normals = params.filter(p => { const c = (p.classificacao || '').toUpperCase(); return c === 'NORMAL' || c === ''; });

  const toResolve = [...crits.slice(0, 2), ...warns.slice(0, 1)];
  let actionItems = '';
  if (toResolve.length === 0 && normals.length > 0) {
    actionItems = buildNormalCards(normals.length);
  } else {
    toResolve.forEach((p, i) => { actionItems += buildActionCard(p, i); });
    if (normals.length > 0) actionItems += buildOkCard(normals.length);
  }
  if (!actionItems && currentExam.resumoIA) {
    actionItems = `<div class="ok-action-item"><div class="ok-action-title">Análise da IA</div><div class="ok-action-sub">${currentExam.resumoIA.substring(0,120)}${currentExam.resumoIA.length>120?'...':''}</div></div>`;
  }
  if (!actionItems) actionItems = buildOkCard(params.length || 0);

  document.getElementById('insightsWrap').innerHTML = `<div class="action-list">${actionItems}</div>`;

  // Update hero score with real params
  const realScore = calcScore(params);
  const scoreEl = document.querySelector('#heroCard .hero-score');
  if (scoreEl && params.length > 0) scoreEl.textContent = realScore;

  // Also render other screens
  renderCompare();
  renderMelhorias();
}

function getMeaningShort(nomeLower) {
  for (const k in MARKER_INFO) {
    if (nomeLower.includes(k)) return MARKER_INFO[k].body;
  }
  return null;
}

function getRecsForParam(nomeLower) {
  for (const k in MARKER_INFO) {
    if (nomeLower.includes(k) && MARKER_INFO[k].recs.length > 0) return MARKER_INFO[k].recs;
  }
  return [];
}

// SISTEMA SCREEN
// ══════════════════════════════
function openSistema(sysName) {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  const sysParams = params.filter(p => getSystem(p.nome) === sysName);
  if (!sysParams.length) return;
  renderSistema(sysName, sysParams);
  push('s-sistema');
}

function renderSistema(sysName, sysParams) {
  const emoji = SYSTEM_EMOJI[sysName] || '✨';
  const label = SYSTEM_LABEL[sysName] || sysName;

  const normals = sysParams.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c === 'NORMAL' || c === ''; }).length;
  const total = sysParams.length;
  const abnormal = sysParams.filter(p => { const c = (p.classificacao||'').toUpperCase(); return c !== 'NORMAL' && c !== ''; });

  let html = `<div class="sist-header fade d1">${emoji} ${label}</div>`;

  const statusText = normals === total
    ? `Todos os ${total} marcadores estão dentro do ideal`
    : `${normals} de ${total} marcador${total !== 1 ? 'es' : ''} no ideal`;
  html += `<div class="sist-sub fade d1">${statusText}</div>`;

  // Parameter cards
  sysParams.forEach((p, i) => {
    const cl = (p.classificacao||'').toUpperCase();
    const valCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO'||cl === 'BAIXO'||cl === 'ATENCAO') ? 'warn' : 'ok';
    const badgeLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Abaixo do ideal' : cl === 'ALTO' ? 'Acima do ideal' : cl === 'ATENCAO' ? 'Atenção' : 'Normal';
    const nome = (p.nome||'').toLowerCase();
    const meaningShort = p.explicacao_simples || getMeaningShort(nome);
    const pJson = JSON.stringify(p).replace(/"/g, '&quot;');
    html += `
      <div class="gc-s fade" style="animation-delay:${0.05 + i * 0.06}s;cursor:pointer" onclick="openMarker(${pJson})">
        <div class="gi" style="padding:16px 18px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:${meaningShort ? 10 : 0}px">
            <div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:3px">${p.nome}</div>
              <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--ink4)">${p.valor} ${p.unidade||''}${p.valorReferencia ? ' · Ref: ' + p.valorReferencia : ''}</div>
            </div>
            <div class="badge ${valCls}" style="flex-shrink:0;margin-top:3px">${badgeLabel}</div>
          </div>
          ${meaningShort ? `<div style="font-family:'Jost',sans-serif;font-size:12px;font-weight:300;color:var(--ink3);line-height:1.65">${meaningShort}</div>` : ''}
        </div>
      </div>`;
  });

  // Recommendations for abnormal params
  if (abnormal.length > 0) {
    const allRecs = [];
    abnormal.forEach(p => {
      const nome = (p.nome||'').toLowerCase();
      const recs = getRecsForParam(nome);
      recs.forEach(r => { if (!allRecs.find(x => x.name === r.name)) allRecs.push(r); });
      // AI-provided dicas fallback
      if (recs.length === 0 && p.dicas) {
        const dicas = Array.isArray(p.dicas) ? p.dicas : [p.dicas];
        dicas.forEach(d => allRecs.push({ name: p.nome, desc: d }));
      }
    });
    if (allRecs.length > 0) {
      html += `<div class="sec-label fade d3">O que você pode fazer</div>`;
      allRecs.slice(0, 4).forEach((r, i) => {
        html += `
          <div class="otc-gc fade d3" style="animation-delay:${0.1 + i * 0.06}s">
            <div class="otc-gi">
              <div class="otc-iw">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <div class="otc-type">Dica</div>
              </div>
              <div>
                <div class="otc-name">${r.name}</div>
                <div class="otc-desc">${r.desc}</div>
              </div>
            </div>
          </div>`;
      });
    }
  }

  document.getElementById('sistemaContent').innerHTML = html;
}

function openMarker(paramOrStr) {
  const p = typeof paramOrStr === 'string' ? JSON.parse(paramOrStr) : paramOrStr;
  currentParam = p;
  renderMarker(p);
  push('s-marker');
}

function openMarkerObj(jsonStr) {
  try {
    const p = JSON.parse(jsonStr);
    openMarker(p);
  } catch(e) {}
}

function openMarkerByName(name) {
  if (!currentExam || !currentExam.parametros) return;
  const p = currentExam.parametros.find(x => x.nome === name);
  if (p) openMarker(p);
}

function renderMarker(p) {
  if (!p) return;
  const cl = (p.classificacao || '').toUpperCase();
  const valCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO' || cl === 'BAIXO') ? 'warn' : 'ok';
  const badgeCls = cl === 'CRITICO' ? 'crit' : (cl === 'ALTO' || cl === 'BAIXO') ? 'warn' : 'ok';
  const badgeLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Abaixo do ideal' : cl === 'ALTO' ? 'Acima do ideal' : 'Normal';
  const needlePos = classToNeedle(cl);
  const sys = getSystem(p.nome);

  // Build historical evolution from allExams for this parameter
  const history = buildParamHistory(p.nome);
  const historyHtml = history.length > 1 ? buildEvoHtml(history) : '';

  // Meaning text — use AI data if available, otherwise MARKER_INFO
  const nome = (p.nome || '').toLowerCase();
  let meaning = { title: `${p.nome} afeta sua saúde`, body: `Valor encontrado: <strong>${p.valor} ${p.unidade || ''}</strong>. Referência: ${p.valorReferencia || 'ver laudo do laboratório'}.` };
  if (p.explicacao_simples) {
    meaning = { title: p.impacto_pessoal || `${p.nome} afeta sua saúde`, body: p.explicacao_simples };
  } else {
    for (const k in MARKER_INFO) { if (nome.includes(k)) { meaning = { title: MARKER_INFO[k].title, body: MARKER_INFO[k].body }; break; } }
  }

  // Recommendations — use AI dicas if available, otherwise MARKER_INFO.recs
  let recs = [];
  if (p.dicas) {
    const dicas = Array.isArray(p.dicas) ? p.dicas : [p.dicas];
    recs = dicas.map(d => ({ name: p.nome, desc: d }));
  } else {
    recs = getRecsForParam(nome);
  }

  let recsHtml = recs.map(r => `
    <div class="otc-gc">
      <div class="otc-gi">
        <div class="otc-iw">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <div class="otc-type">Dica</div>
        </div>
        <div>
          <div class="otc-name">${r.name}</div>
          <div class="otc-desc">${r.desc}</div>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('markerContent').innerHTML = `
    <div class="gc fade d1">
      <div class="gi">
        <div class="mk-ey">Sistema ${sys}</div>
        <div class="mk-name">${p.nome}</div>
        <div class="mk-val-row">
          <div class="mk-val ${valCls}">${p.valor}</div>
          <div class="mk-unit">${p.unidade || ''}</div>
        </div>
        <div class="mk-ref-row">
          <div class="mk-ref">${p.valorReferencia ? 'Ref: ' + p.valorReferencia : ''}</div>
          <div class="badge ${badgeCls}">${badgeLabel}</div>
        </div>
      </div>
    </div>
    <div class="gc-s fade d2">
      <div class="gi">
        <div class="spec-label">Onde você está na escala</div>
        <div class="spec-track"><div class="spec-needle" id="sNeedle" style="left:${needlePos}%"></div></div>
        <div class="spec-zones">
          <span class="sz">Crítico</span><span class="sz">Baixo</span><span class="sz">Normal</span><span class="sz">Ótimo</span><span class="sz">Alto</span>
        </div>
        ${history.length > 1 ? `<div class="spec-compare"><div class="sc-lbl">vs. exame anterior</div><div class="sc-val">${getParamTrend(p.nome, p.valor)}</div></div>` : ''}
      </div>
    </div>
    <div class="gc-s fade d3">
      <div class="gi">
        <div class="mn-ey">O que isso significa</div>
        <div class="mn-title">${meaning.title}</div>
        <div class="mn-body">${meaning.body}</div>
      </div>
    </div>
    ${historyHtml}
    ${recsHtml ? `<div class="sec-label fade d5">O que fazer</div>${recsHtml}` : ''}`;
}

function buildParamHistory(paramName) {
  const history = [];
  allExams.forEach(exam => {
    const found = (exam.params || []).find(p => p.nome && p.nome.toLowerCase() === paramName.toLowerCase());
    if (found) {
      history.push({ date: exam.date, value: found.valor, unit: found.unidade, cl: found.classificacao });
    }
  });
  return history;
}

function getParamTrend(paramName, currentVal) {
  const history = buildParamHistory(paramName);
  if (history.length < 2) return 'Primeiro resultado';
  const prev = parseFloat(history[1].value);
  const curr = parseFloat(currentVal);
  if (isNaN(prev) || isNaN(curr)) return 'Ver histórico';
  const diff = curr - prev;
  const pct = Math.abs(Math.round(diff / prev * 100));
  if (Math.abs(diff) < 0.01) return 'Estável';
  return diff > 0 ? `↑ ${pct}% — Subiu` : `↓ ${pct}% — Caiu`;
}

function buildEvoHtml(history) {
  const rows = history.slice(0, 3).map(h => {
    const cl = (h.cl || '').toUpperCase();
    const evoCls = cl === 'CRITICO' || cl === 'BAIXO' ? 'worse' : cl === 'ALTO' ? 'warn' : 'better';
    const needlePos = classToNeedle(cl);
    return `
      <div class="evo-row">
        <div class="evo-time">${h.date}</div>
        <div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${needlePos}%"></div></div>
        <div class="evo-val ${evoCls}">${h.value} ${h.unit || ''}</div>
      </div>`;
  }).join(`<div style="padding-left:76px"><div style="width:1px;height:14px;background:rgba(201,169,110,.2);margin-left:30%"></div></div>`);

  return `
    <div class="gc-s fade d4">
      <div class="gi evo-card">
        <div class="evo-title">Evolução histórica</div>
        <div class="evo-sub">Trajetória dos seus resultados</div>
        ${rows}
      </div>
    </div>`;
}

// COMPARE SCREEN

function renderCompare() {
  if (!currentExam) return;
  const params = currentExam.parametros || [];
  if (params.length === 0) {
    document.getElementById('compareContent').innerHTML = '<div style="padding:30px 22px;font-family:\'Jost\',sans-serif;font-size:13px;color:var(--ink3)">Nenhum parâmetro disponível para comparar.</div>';
    return;
  }

  // Build tabs from parameters
  const tabParams = params.slice(0, 5);
  let tabsHtml = '<div class="ctabs fade d1">';
  tabParams.forEach((p, i) => {
    const shortName = p.nome.length > 12 ? p.nome.substring(0, 12) + '…' : p.nome;
    tabsHtml += `<button class="ctab${i === 0 ? ' active' : ''}" onclick="switchCmpTab(this,'${i}')">${shortName}</button>`;
  });
  tabsHtml += '</div>';

  // First param evolution card
  const firstP = tabParams[0];
  const firstHistory = buildParamHistory(firstP.nome);

  let html = tabsHtml + `<div id="cmpCard" class="gc-s fade d2" style="cursor:default"><div class="gi"><div class="evo-title" id="cmpTitle">${firstP.nome}</div><div class="evo-sub">Trajetória dos seus resultados</div><div id="cmpRows">${buildCmpRows(firstHistory, firstP)}</div><div class="evo-insight"><div class="ei-body" id="cmpInsight">${buildCmpInsight(firstP, firstHistory)}</div></div></div></div>`;

  // All markers list
  html += `<div class="sec-label fade d3">Todos os marcadores</div><div class="cr-rows fade d3">`;
  params.forEach(p => {
    const cl = (p.classificacao || '').toUpperCase();
    const deltaCls = cl === 'CRITICO' || cl === 'BAIXO' || cl === 'ALTO' ? 'dn' : 'fl';
    const deltaLabel = cl === 'CRITICO' ? 'Crítico' : cl === 'BAIXO' ? 'Baixo' : cl === 'ALTO' ? 'Alto' : 'Normal';
    html += `
      <div class="cr-item" onclick="openMarker(${escapeJson(p)})"
        <div class="cr-info">
          <div class="cr-name">${p.nome}</div>
          <div class="cr-val">${p.valor} ${p.unidade || ''} · ${deltaLabel.toLowerCase()}</div>
        </div>
        <div class="delta ${deltaCls === 'dn' ? 'dn' : 'fl'}">${deltaLabel}</div>
        <div class="cr-arr">›</div>
      </div>`;
  });
  html += '</div>';

  document.getElementById('compareContent').innerHTML = html;
  window._cmpParams = tabParams;
}

function buildCmpRows(history, p) {
  if (history.length === 0) return `<div class="evo-row"><div class="evo-time">${currentExamBasic?.date || ''}</div><div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${classToNeedle(p.classificacao)}%"></div></div><div class="evo-val">${p.valor} ${p.unidade || ''}</div></div>`;
  return history.slice(0, 3).map((h, i) => {
    const cls = (h.cl || '').toUpperCase();
    const evoCls = cls === 'CRITICO' || cls === 'BAIXO' ? 'worse' : cls === 'ALTO' ? 'warn' : 'better';
    const needle = classToNeedle(cls);
    const conn = i < history.slice(0, 3).length - 1 ? `<div style="padding-left:76px"><div style="width:1px;height:14px;background:rgba(201,169,110,.18);margin-left:${needle/2}%"></div></div>` : '';
    return `<div class="evo-row"><div class="evo-time">${h.date}</div><div class="evo-spec"><div class="evo-track"></div><div class="evo-pin" style="left:${needle}%"></div></div><div class="evo-val ${evoCls}">${h.value} ${h.unit || ''}</div></div>${conn}`;
  }).join('');
}

function buildCmpInsight(p, history) {
  const cl = (p.classificacao || '').toUpperCase();
  if (cl === 'NORMAL' || cl === '') return `${p.nome} está <strong>dentro da faixa ideal</strong>. Continue monitorando.`;
  if (cl === 'CRITICO') return `${p.nome} em nível crítico — ${p.valor} ${p.unidade || ''}. Requer atenção imediata.`;
  if (cl === 'BAIXO') return `${p.nome} <strong>abaixo do ideal</strong> (${p.valor} ${p.unidade || ''}). Ref: ${p.valorReferencia || 'ver laudo'}.`;
  if (cl === 'ALTO') return `${p.nome} <strong>acima do ideal</strong> (${p.valor} ${p.unidade || ''}). Ref: ${p.valorReferencia || 'ver laudo'}.`;
  return `${p.nome}: ${p.valor} ${p.unidade || ''}.`;
}

function switchCmpTab(btn, idx) {
  document.querySelectorAll('.ctab').forEach(t => t.className = 'ctab');
  btn.className = 'ctab active';
  const p = window._cmpParams[parseInt(idx)];
  if (!p) return;
  const history = buildParamHistory(p.nome);
  document.getElementById('cmpTitle').textContent = p.nome;
  document.getElementById('cmpRows').innerHTML = buildCmpRows(history, p);
  document.getElementById('cmpInsight').innerHTML = buildCmpInsight(p, history);
}

const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'image/*,.pdf';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

fileInput.addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  showUploadLoading();
  try {
    if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
      await vitaeAPI.uploadExame(file);
      // Exame enviado — recarrega a lista (aparece o banner "em análise")
      // Não abre o exame ainda — ele só aparece quando a IA terminar
      await loadExams();
      resetUploadArea();
      showToast('Exame enviado! A IA está analisando — você será avisado quando estiver pronto.');
    } else {
      // Demo: just show overview after animation
      setTimeout(() => {
        currentExamBasic = { name: 'Exame Demo', date: 'Hoje', params: [], statusRaw: 'NORMAL', statusCls: 'ok' };
        currentExam = { tipoExame: 'Exame Demo', parametros: [], analise: 'Análise de demonstração.' };
        renderHeroSkeleton(currentExamBasic);
        document.getElementById('sysGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;font-family:\'Jost\',sans-serif;font-size:13px;color:var(--ink3)">Parâmetros carregando...</div>';
        document.getElementById('insightsWrap').innerHTML = '';
        push('s-overview');
      }, 2400);
    }
  } catch (err) {
    showToast('Erro ao enviar: ' + (err.message || 'tente novamente'));
    resetUploadArea();
  }
  fileInput.value = '';
});

function triggerUpload() {
  fileInput.click();
}
