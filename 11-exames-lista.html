<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Exames</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        /* Entrance */
        .entrance-curtain {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
            animation: curtainOpen 0.6s ease 0.1s forwards;
        }
        @keyframes curtainOpen { 0%{opacity:1} 100%{opacity:0} }

        /* Exit overlay */
        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; opacity:0; z-index:25; pointer-events:none;
            transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; }

        .content {
            height:calc(100% - 80px);
            overflow-y:auto;
            padding:55px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:14px;
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.4s ease 0.3s both;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; flex-shrink:0;
            transition:all 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); }
        .back-btn:active { transform:scale(0.92); }
        .page-title-wrap { flex:1; }
        .page-title {
            font-family:'Playfair Display', serif;
            font-size:26px; font-weight:700;
            color:#fff;
        }
        .page-title span { color:#C5A55A; font-style:italic; }
        .page-subtitle {
            font-size:13px; color:rgba(255,255,255,0.3);
            margin-top:2px;
        }

        /* Upload CTA */
        .upload-btn {
            width:100%; padding:18px;
            background:rgba(197,165,90,0.06);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border:1.5px dashed rgba(197,165,90,0.25);
            border-top:1px solid rgba(197,165,90,0.15);
            border-radius:16px;
            display:flex; align-items:center; justify-content:center; gap:12px;
            cursor:pointer;
            font-family:'Inter',sans-serif;
            font-size:14px; font-weight:600;
            color:#C5A55A;
            transition:all 0.25s;
            margin-bottom:28px;
            opacity:0; animation:fadeUp 0.4s ease 0.45s both;
            box-shadow:0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .upload-btn:hover {
            background:rgba(197,165,90,0.1);
            border-color:rgba(197,165,90,0.4);
        }
        .upload-btn:active { transform:scale(0.98); }
        .upload-icon {
            width:36px; height:36px; border-radius:10px;
            background:rgba(197,165,90,0.1);
            display:flex; align-items:center; justify-content:center;
        }

        /* Month group */
        .month-label {
            font-size:11px; font-weight:700;
            color:rgba(255,255,255,0.2);
            letter-spacing:1.5px; text-transform:uppercase;
            margin-bottom:10px; margin-top:4px;
            padding-left:2px;
        }
        .month-group { margin-bottom:20px; }

        /* Exam card */
        .exam-card {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            margin-bottom:8px;
            cursor:pointer;
            transition:all 0.25s;
            box-shadow:0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .exam-card:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
        .exam-card:active { transform:scale(0.98); }
        .exam-type-icon {
            width:42px; height:42px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .exam-type-icon.blood { background:rgba(217,68,82,0.08); border:1px solid rgba(217,68,82,0.12); }
        .exam-type-icon.cardio { background:rgba(74,159,217,0.08); border:1px solid rgba(74,159,217,0.12); }
        .exam-type-icon.hormone { background:rgba(180,130,255,0.08); border:1px solid rgba(180,130,255,0.12); }
        .exam-type-icon.general { background:rgba(74,217,164,0.08); border:1px solid rgba(74,217,164,0.12); }
        .exam-info { flex:1; }
        .exam-name {
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.8);
            margin-bottom:2px;
        }
        .exam-date {
            font-size:12px; color:rgba(255,255,255,0.25);
        }
        .exam-status {
            padding:5px 10px; border-radius:8px;
            font-size:11px; font-weight:600;
            flex-shrink:0;
        }
        .exam-status.normal { background:rgba(74,217,164,0.08); color:rgba(74,217,164,0.8); }
        .exam-status.attention { background:rgba(197,165,90,0.08); color:rgba(197,165,90,0.8); }
        .exam-status.critical { background:rgba(217,68,82,0.08); color:rgba(217,68,82,0.8); }
        .exam-arrow {
            color:rgba(255,255,255,0.1);
            flex-shrink:0;
        }
        .exam-card:hover .exam-arrow { color:rgba(255,255,255,0.3); }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0;
            height:80px;
            background:rgba(10,10,10,0.75);
            backdrop-filter:blur(30px) saturate(1.3);
            -webkit-backdrop-filter:blur(30px) saturate(1.3);
            border-top:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:space-around;
            padding:0 20px 16px;
            z-index:20;
            box-shadow:0 -4px 24px rgba(0,0,0,0.3);
        }
        .tab {
            display:flex; flex-direction:column;
            align-items:center; gap:4px;
            cursor:pointer;
            padding:8px 20px;
            border-radius:12px;
            transition:all 0.25s;
            border:none; background:none;
            font-family:'Inter',sans-serif;
        }
        .tab:active { transform:scale(0.92); }
        .tab-label {
            font-size:10px; font-weight:600;
            letter-spacing:0.3px;
            color:rgba(255,255,255,0.25);
        }
        .tab.active .tab-label { color:#C5A55A; }
        .tab.active svg { color:#C5A55A !important; stroke:#C5A55A !important; }
        .tab-indicator {
            width:4px; height:4px; border-radius:50%;
            background:#C5A55A;
            margin-top:2px;
            opacity:0;
        }
        .tab.active .tab-indicator { opacity:1; }

        /* Toast */
        .toast {
            position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px);
            background:rgba(20,20,20,0.8);
            backdrop-filter:blur(24px) saturate(1.2);
            -webkit-backdrop-filter:blur(24px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.1);
            border-top:1px solid rgba(255,255,255,0.14);
            border-radius:14px; padding:14px 22px;
            display:flex; align-items:center; gap:10px;
            z-index:50;
            opacity:0; pointer-events:none;
            transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon {
            width:28px; height:28px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .toast-icon.gold { background:rgba(197,165,90,0.15); }
        .toast-icon.success { background:rgba(74,217,164,0.15); }
        .toast-text { font-size:13px; font-weight:600; color:rgba(255,255,255,0.8); }

        /* Modal */
        .modal-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(8px);
            z-index:35;
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .modal-overlay.show { opacity:1; pointer-events:all; }
        .modal-sheet {
            width:100%;
            background:#1A1A1A;
            border-radius:24px 24px 0 0;
            padding:20px 24px 40px;
            transform:translateY(100%);
            transition:transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height:80%;
            overflow-y:auto;
        }
        .modal-overlay.show .modal-sheet { transform:translateY(0); }
        .modal-handle {
            width:40px; height:4px; border-radius:2px;
            background:rgba(255,255,255,0.15);
            margin:0 auto 20px;
        }
        .modal-title {
            font-family:'Playfair Display', serif;
            font-size:22px; font-weight:700; color:#fff;
            margin-bottom:6px;
        }
        .modal-title span { color:#C5A55A; font-style:italic; }
        .modal-subtitle {
            font-size:13px; color:rgba(255,255,255,0.3);
            margin-bottom:20px;
        }
        .modal-btn-close {
            width:100%; padding:16px;
            background:rgba(255,255,255,0.06);
            border:none; border-radius:14px;
            font-family:'Inter',sans-serif;
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.5);
            cursor:pointer; margin-top:12px;
            transition:all 0.2s;
        }
        .modal-btn-close:hover { background:rgba(255,255,255,0.1); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }
        .anim { opacity:0; animation:fadeUp 0.4s ease both; }
    </style>
    <link rel="stylesheet" href="/vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>&#9679;&#9679;&#9679; &#128267;</span></div>
    <div class="entrance-curtain"></div>
    <div class="exit-overlay" id="exitOverlay"></div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-icon gold">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C5A55A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </div>
        <span class="toast-text" id="toastText"></span>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-handle"></div>
            <div id="modalContent"></div>
        </div>
    </div>

    <div class="content">
        <!-- Header -->
        <div class="page-header">
            <div class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </div>
            <div class="page-title-wrap">
                <div class="page-title">Seus <span>exames</span></div>
                <div class="page-subtitle" id="examCount">8 resultados</div>
            </div>
        </div>

        <!-- Upload CTA -->
        <div class="upload-btn" onclick="uploadExam()">
            <div class="upload-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C5A55A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div>
                <div style="font-size:14px;font-weight:700;">Enviar novo exame</div>
                <div style="font-size:11px;font-weight:400;color:rgba(197,165,90,0.6);margin-top:2px;">Foto ou PDF — IA analisa em segundos</div>
            </div>
        </div>

        <!-- Exam list rendered by JS -->
        <div id="examsList"></div>

    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab" onclick="navigateTo('perfil')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="tab-label">Perfil</span>
            <div class="tab-indicator"></div>
        </button>
        <button class="tab active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span class="tab-label">Exames</span>
            <div class="tab-indicator"></div>
        </button>
        <button class="tab" onclick="navigateTo('bioage')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span class="tab-label">Bio Age</span>
            <div class="tab-indicator"></div>
        </button>
    </div>
</div>

<script src="api.js"></script>
<script>
    // ============ EXAM DATA (loaded from API) ============
    let exams = [];

    async function loadExams() {
        try {
            const data = await vitaeAPI.listarExames();
            const raw = data.exames || data || [];
            exams = raw.map(e => {
                const d = e.dataExame ? new Date(e.dataExame) : new Date(e.criadoEm);
                const months = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
                const monthShort = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                return {
                    id: e.id,
                    name: e.tipoExame || 'Exame',
                    date: d.getDate().toString().padStart(2,'0') + ' ' + monthShort[d.getMonth()] + ', ' + d.getFullYear(),
                    month: months[d.getMonth()] + ' ' + d.getFullYear(),
                    type: 'blood',
                    status: e.status === 'ATENCAO' ? 'attention' : e.status === 'CRITICO' ? 'critical' : 'normal',
                    statusLabel: e.status === 'ATENCAO' ? 'Atencao' : e.status === 'CRITICO' ? 'Critico' : e.status === 'PROCESSANDO' ? 'Processando...' : 'Normal'
                };
            });
            renderExams();
        } catch (e) {
            console.log('Erro ao carregar exames:', e.message);
            renderExams();
        }
    }

    if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadExams();
    }

    // ============ RENDER EXAMS ============
    function renderExams() {
        const container = document.getElementById('examsList');
        if (exams.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.2);font-size:14px;">Nenhum exame enviado ainda.<br>Use o botao acima para enviar seu primeiro exame.</div>';
            document.getElementById('examCount').textContent = '0 resultados';
            return;
        }
        const icons = {
            blood: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D94452" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>',
            cardio: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A9FD9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
            hormone: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B482FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>',
            general: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4AD9A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
        };

        // Group by month
        const groups = [];
        let currentMonth = '';
        exams.forEach((e, i) => {
            if (e.month !== currentMonth) {
                currentMonth = e.month;
                groups.push({ month: e.month, exams: [] });
            }
            groups[groups.length - 1].exams.push({ ...e, index: i });
        });

        let delay = 0.55;
        let html = '';
        groups.forEach(g => {
            html += `<div class="month-group anim" style="animation-delay:${delay}s">`;
            html += `<div class="month-label">${g.month}</div>`;
            g.exams.forEach(e => {
                html += `
                    <div class="exam-card" onclick="openExamDetail(${e.index})">
                        <div class="exam-type-icon ${e.type}">${icons[e.type]}</div>
                        <div class="exam-info">
                            <div class="exam-name">${e.name}</div>
                            <div class="exam-date">${e.date}</div>
                        </div>
                        <span class="exam-status ${e.status}">${e.statusLabel}</span>
                        <svg class="exam-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </div>`;
            });
            html += '</div>';
            delay += 0.1;
        });

        container.innerHTML = html;
        document.getElementById('examCount').textContent = exams.length + ' resultados';
    }
    renderExams();

    // ============ EXAM DETAIL ============
    function openExamDetail(index) {
        const exam = exams[index];
        if (!exam) return;
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (exam.id) {
                window.location.href = '13-exame-detalhe.html?id=' + exam.id + '&from=lista';
            } else {
                window.location.href = '13-exame-detalhe.html?exam=' + encodeURIComponent(exam.name) + '&from=lista';
            }
        }, 500);
    }

    // ============ MODAL ============
    function openModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').classList.remove('show');
    }
    function closeModalForce() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    // ============ TOAST ============
    let toastTimer;
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ============ ACTIONS ============
    // File input for upload
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,.pdf';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    fileInput.addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        showToast('Enviando exame... IA analisando');
        try {
            await vitaeAPI.uploadExame(file);
            showToast('Exame enviado! Processando com IA...');
            setTimeout(() => loadExams(), 2000);
        } catch (err) {
            showToast('Erro ao enviar: ' + (err.message || 'tente novamente'));
        }
        fileInput.value = '';
    });

    function uploadExam() {
        fileInput.click();
    }

    function goBack() {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            window.location.href = '08-perfil.html?from=nav';
        }, 500);
    }

    function navigateTo(tab) {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
        }, 500);
    }
