<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Medicamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }
        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; opacity:0; z-index:25; pointer-events:none;
            transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; }

        .content {
            height:100%;
            overflow-y:auto;
            padding:55px 24px 40px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:14px;
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.4s ease 0.3s both;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; flex-shrink:0;
            transition:all 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); }
        .back-btn:active { transform:scale(0.92); }
        .page-title-wrap { flex:1; }
        .page-title {
            font-family:'Inter', sans-serif;
            font-size:26px; font-weight:700; color:#fff;
        }
        .page-title span { color:#0099C4; font-style:italic; }
        .page-subtitle {
            font-size:13px; color:rgba(255,255,255,0.3); margin-top:2px;
        }

        /* Hero card — Liquid Glass FORTE */
        .hero-card {
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(24px) saturate(1.2);
            -webkit-backdrop-filter:blur(24px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.08);
            border-top:1px solid rgba(255,255,255,0.12);
            box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            border-radius:20px;
            padding:24px;
            margin-bottom:20px;
            text-align:center;
            opacity:0; animation:fadeUp 0.5s ease 0.4s both;
        }
        .hero-icon {
            width:64px; height:64px; border-radius:18px;
            background:linear-gradient(135deg, rgba(0,153,196,0.15), rgba(0,153,196,0.05));
            border:1px solid rgba(0,153,196,0.2);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 16px;
            font-size:28px;
        }
        .hero-name {
            font-family:'Inter', sans-serif;
            font-size:24px; font-weight:700; color:#fff;
            margin-bottom:4px;
        }
        .hero-category {
            font-size:12px; font-weight:600; letter-spacing:2px;
            text-transform:uppercase;
            color:#0099C4; margin-bottom:14px;
        }
        .hero-desc {
            font-size:13px; color:rgba(255,255,255,0.5); line-height:1.7;
        }

        /* Section label */
        .section-label {
            font-size:11px; font-weight:700;
            letter-spacing:2px; text-transform:uppercase;
            color:rgba(0,153,196,0.5);
            margin:24px 0 12px 4px;
            opacity:0; animation:fadeUp 0.4s ease both;
        }

        /* Info cards — Liquid Glass MEDIO */
        .info-card {
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(16px) saturate(1.1);
            -webkit-backdrop-filter:blur(16px) saturate(1.1);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.09);
            box-shadow:0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03);
            border-radius:16px;
            padding:16px;
            margin-bottom:10px;
            display:flex; gap:14px; align-items:flex-start;
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .info-card-icon {
            width:40px; height:40px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0;
            background:rgba(0,153,196,0.08);
            border:1px solid rgba(0,153,196,0.12);
        }
        .info-card-content { flex:1; }
        .info-card-title {
            font-size:14px; font-weight:600; color:#fff; margin-bottom:4px;
        }
        .info-card-text {
            font-size:12px; color:rgba(255,255,255,0.45); line-height:1.6;
        }

        /* How it works — Liquid Glass FORTE */
        .mechanism-card {
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(24px) saturate(1.2);
            -webkit-backdrop-filter:blur(24px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.08);
            border-top:1px solid rgba(255,255,255,0.12);
            box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            border-radius:16px;
            padding:20px;
            margin-bottom:10px;
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .mechanism-card .mech-label {
            font-size:11px; font-weight:700; letter-spacing:2px;
            text-transform:uppercase; color:rgba(0,153,196,0.6);
            margin-bottom:10px;
        }
        .mechanism-card p {
            font-size:13px; color:rgba(255,255,255,0.55); line-height:1.7;
        }

        /* Side effects — pills */
        .side-effects {
            display:flex; flex-wrap:wrap; gap:8px;
            margin-bottom:10px;
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .side-effect-pill {
            padding:8px 14px;
            border-radius:20px;
            font-size:12px; font-weight:500;
            display:flex; align-items:center; gap:6px;
        }
        .side-effect-pill.leve {
            background:rgba(74,217,164,0.08);
            border:1px solid rgba(74,217,164,0.15);
            color:rgba(74,217,164,0.8);
        }
        .side-effect-pill.moderado {
            background:rgba(255,193,7,0.08);
            border:1px solid rgba(255,193,7,0.15);
            color:rgba(255,193,7,0.8);
        }
        .side-effect-pill.grave {
            background:rgba(217,68,82,0.08);
            border:1px solid rgba(217,68,82,0.15);
            color:rgba(217,68,82,0.8);
        }
        .freq-dot {
            width:5px; height:5px; border-radius:50%;
        }
        .side-effect-pill.leve .freq-dot { background:rgba(74,217,164,0.5); }
        .side-effect-pill.moderado .freq-dot { background:rgba(255,193,7,0.5); }
        .side-effect-pill.grave .freq-dot { background:rgba(217,68,82,0.5); }

        /* Interactions — Liquid Glass LEVE */
        .interaction-list {
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .interaction-item {
            background:rgba(255,255,255,0.02);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:12px;
            padding:12px 16px;
            margin-bottom:8px;
            font-size:13px; color:rgba(255,255,255,0.5);
            display:flex; align-items:center; gap:10px;
        }
        .interaction-dot {
            width:6px; height:6px; border-radius:50%;
            background:rgba(255,193,7,0.5); flex-shrink:0;
        }

        /* Curiosity card */
        .curiosity-card {
            background:linear-gradient(135deg, rgba(0,153,196,0.08), rgba(0,153,196,0.02));
            border:1px solid rgba(0,153,196,0.15);
            border-radius:16px;
            padding:18px 20px;
            margin:20px 0 10px;
            display:flex; gap:14px; align-items:flex-start;
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .curiosity-icon {
            font-size:22px; flex-shrink:0; margin-top:2px;
        }
        .curiosity-text {
            font-size:13px; color:rgba(0,153,196,0.7); line-height:1.6;
            font-style:italic;
        }

        /* Disclaimer */
        .disclaimer {
            text-align:center;
            font-size:11px; color:rgba(255,255,255,0.15);
            padding:20px 10px 40px;
            line-height:1.5;
            opacity:0; animation:fadeUp 0.4s ease 1s both;
        }

        /* Loading state */
        .loading-container {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:80px 0;
            opacity:0; animation:fadeUp 0.4s ease 0.3s both;
        }
        .loading-spinner {
            width:40px; height:40px;
            border:2px solid rgba(0,153,196,0.2);
            border-top-color:#0099C4;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
            margin-bottom:16px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-text {
            font-size:13px; color:rgba(255,255,255,0.3);
        }
        .loading-sub {
            font-size:11px; color:rgba(255,255,255,0.15); margin-top:6px;
        }

        /* Error state */
        .error-container {
            text-align:center; padding:60px 20px;
        }
        .error-icon { font-size:40px; margin-bottom:16px; opacity:0.5; }
        .error-text { font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:20px; }
        .retry-btn {
            padding:12px 28px; border-radius:12px;
            background:rgba(0,153,196,0.12); border:1px solid rgba(0,153,196,0.2);
            color:#0099C4; font-size:13px; font-weight:600;
            cursor:pointer; transition:all 0.2s;
        }
        .retry-btn:hover { background:rgba(0,153,196,0.2); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px); }
            to { opacity:1; transform:translateY(0); }
        }
    @media(max-width:480px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>

    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>VITAE</span></div>
    <div class="exit-overlay" id="exitOverlay"></div>

    <div class="content">
        <div class="page-header">
            <div class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0099C4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
            <div class="page-title-wrap">
                <div class="page-title">Sobre o <span>medicamento</span></div>
                <div class="page-subtitle">Informacoes geradas por IA</div>
            </div>
        </div>

        <div id="mainContent">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">Analisando medicamento...</div>
                <div class="loading-sub">VITAE AI esta gerando informacoes</div>
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (typeof vitaeAPI !== 'undefined') vitaeAPI.requireAuth();

    const params = new URLSearchParams(window.location.search);
    const medName = params.get('nome') || 'Medicamento';
    const fromPage = params.get('from') || 'perfil';

    function goBack() {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => {
            if (fromPage === 'meds') window.location.href = '16-medicamentos.html';
            else window.location.href = '08-perfil.html?from=nav';
        }, 400);
    }

    function renderContent(info) {
        const container = document.getElementById('mainContent');
        let delay = 0.4;
        const d = () => { delay += 0.08; return delay.toFixed(2); };

        // Category icon mapping
        const svgPill = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.5 1.5H8C4.68 1.5 2 4.18 2 7.5S4.68 13.5 8 13.5h8c3.32 0 6-2.68 6-6s-2.68-6-6-6h-2.5"/><line x1="12" y1="1.5" x2="12" y2="13.5"/></svg>';
        const svgCircle = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>';
        const catIcons = {
            'Suplemento': svgPill, 'Anti-inflamatorio': svgCircle, 'Analgesico': svgCircle,
            'Vitamina': svgCircle, 'Hormonio': svgCircle, 'Proteina': svgCircle,
            'Aminoacido': svgCircle, 'Mineral': svgCircle
        };
        const icon = catIcons[info.categoria] || svgPill;

        let html = `
            <div class="hero-card" style="animation-delay:${d()}s">
                <div class="hero-icon">${icon}</div>
                <div class="hero-name">${info.nome || medName}</div>
                <div class="hero-category">${info.categoria || 'Medicamento'}</div>
                <div class="hero-desc">${info.descricao || ''}</div>
            </div>
        `;

        // Benefits
        if (info.beneficios && info.beneficios.length > 0) {
            html += `<div class="section-label" style="animation-delay:${d()}s">Beneficios</div>`;
            info.beneficios.forEach(b => {
                html += `
                    <div class="info-card" style="animation-delay:${d()}s">
                        <div class="info-card-icon">${b.icone || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'}</div>
                        <div class="info-card-content">
                            <div class="info-card-title">${b.titulo}</div>
                            <div class="info-card-text">${b.texto}</div>
                        </div>
                    </div>
                `;
            });
        }

        // How it works
        if (info.como_funciona) {
            html += `
                <div class="mechanism-card" style="animation-delay:${d()}s">
                    <div class="mech-label">Como funciona</div>
                    <p>${info.como_funciona}</p>
                </div>
            `;
        }

        // Side effects
        if (info.efeitos_colaterais && info.efeitos_colaterais.length > 0) {
            html += `<div class="section-label" style="animation-delay:${d()}s">Efeitos colaterais</div>`;
            html += `<div class="side-effects" style="animation-delay:${d()}s">`;
            info.efeitos_colaterais.forEach(e => {
                const grav = (e.gravidade || 'leve').toLowerCase();
                html += `
                    <div class="side-effect-pill ${grav}">
                        <span class="freq-dot"></span>
                        ${e.nome}
                        <span style="font-size:10px;opacity:0.6;">${e.frequencia || ''}</span>
                    </div>
                `;
            });
            html += `</div>`;
        }

        // Interactions
        if (info.interacoes && info.interacoes.length > 0) {
            html += `<div class="section-label" style="animation-delay:${d()}s">Interacoes</div>`;
            html += `<div class="interaction-list" style="animation-delay:${d()}s">`;
            info.interacoes.forEach(i => {
                html += `
                    <div class="interaction-item">
                        <span class="interaction-dot"></span>
                        ${i}
                    </div>
                `;
            });
            html += `</div>`;
        }

        // Tips
        if (info.dicas && info.dicas.length > 0) {
            html += `<div class="section-label" style="animation-delay:${d()}s">Dicas de uso</div>`;
            info.dicas.forEach(tip => {
                html += `
                    <div class="info-card" style="animation-delay:${d()}s">
                        <div class="info-card-icon" style="background:rgba(74,217,164,0.08);border-color:rgba(74,217,164,0.12);">${tip.icone || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 014 12.7V17H8v-2.3A7 7 0 0112 2z"/></svg>'}</div>
                        <div class="info-card-content">
                            <div class="info-card-title">${tip.titulo}</div>
                            <div class="info-card-text">${tip.texto}</div>
                        </div>
                    </div>
                `;
            });
        }

        // Curiosity
        if (info.curiosidade) {
            html += `
                <div class="curiosity-card" style="animation-delay:${d()}s">
                    <div class="curiosity-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="6 3 18 3 22 9 12 22 2 9"/></svg></div>
                    <div class="curiosity-text">${info.curiosidade}</div>
                </div>
            `;
        }

        html += `<div class="disclaimer">As informacoes sao educacionais e geradas por IA.<br>Consulte sempre um profissional de saude.</div>`;

        container.innerHTML = html;
    }

    function renderError(msg) {
        document.getElementById('mainContent').innerHTML = `
            <div class="error-container">
                <div class="error-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <div class="error-text">${msg || 'Nao foi possivel carregar as informacoes.'}</div>
                <button class="retry-btn" onclick="loadInfo()">Tentar novamente</button>
            </div>
        `;
    }

    // Cache info in sessionStorage
    async function loadInfo() {
        const cacheKey = 'vitae_med_info_' + medName;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
            try {
                renderContent(JSON.parse(cached));
                return;
            } catch {}
        }

        document.getElementById('mainContent').innerHTML = `
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">Analisando ${medName}...</div>
                <div class="loading-sub">VITAE AI esta gerando informacoes</div>
            </div>
        `;

        try {
            const data = await vitaeAPI.infoMedicamento(medName);
            if (data && data.info) {
                sessionStorage.setItem(cacheKey, JSON.stringify(data.info));
                renderContent(data.info);
            } else {
                renderError();
            }
        } catch (e) {
            console.error('Erro ao carregar info:', e);
            renderError(e.message);
        }
    }

    loadInfo();
</script>
</body>
</html>
