<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Meus Lembretes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone { width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA; border-radius:52px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(0,229,160,0.15),0 0 0 3px #1A1E26,0 40px 120px rgba(0,0,0,0.9); }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .status { position:absolute; top:14px; left:28px; right:28px; display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:#9CA3AF; z-index:11; }
        .exit-overlay { position:absolute; inset:0; background:#F4F6FA; opacity:0; z-index:25; pointer-events:none; transition:opacity 0.5s ease; }
        .exit-overlay.active { opacity:1; }
        .content { height:calc(100% - 80px); overflow-y:auto; padding:55px 24px 24px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        .hdr { display:flex; align-items:center; gap:14px; margin-bottom:20px; opacity:0; animation:fadeUp 0.4s ease 0.2s both; }
        .back-btn { width:40px; height:40px; border-radius:12px; background:#fff; border:1px solid rgba(0,0,0,0.07); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
        .back-btn:active { transform:scale(0.92); }
        .page-title { font-size:26px; font-weight:700; color:#0D0F14; }
        .page-title span { color:#00E5A0; font-style:italic; }
        .page-subtitle { font-size:13px; color:#9CA3AF; margin-top:2px; }

        /* Progress ring card */
        .ring-card {
            display:flex; align-items:center; gap:14px;
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            border-radius:16px; padding:14px;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.4s ease 0.3s both;
        }
        .ring-wrap { width:56px; height:56px; position:relative; flex-shrink:0; }
        .ring-val { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:14px; font-weight:900; color:#00E5A0; }
        .ring-info-title { font-size:15px; font-weight:800; color:#0D0F14; }
        .ring-info-sub { font-size:11px; color:#9CA3AF; margin-top:2px; }

        /* Section labels */
        .cat-label {
            display:flex; align-items:center; gap:6px;
            margin:16px 0 8px; padding-left:4px;
        }
        .cat-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .cat-text { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; }

        /* Time slot */
        .time-slot {
            display:flex; align-items:center; gap:12px;
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            border-radius:14px; padding:12px 14px;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
            margin-bottom:8px; cursor:pointer; transition:all 0.25s;
        }
        .time-slot:active { transform:scale(0.98); background:rgba(0,0,0,0.01); }
        .time-slot.done { opacity:0.5; }
        .ts-time { min-width:44px; text-align:center; }
        .ts-hour { font-size:20px; font-weight:900; color:#00E5A0; }
        .ts-period { font-size:8px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:0.5px; }
        .ts-info { flex:1; }
        .ts-name { font-size:13px; font-weight:700; color:#0D0F14; }
        .ts-detail { font-size:11px; color:#9CA3AF; margin-top:1px; }
        .ts-check {
            width:28px; height:28px; border-radius:50%;
            border:2px solid rgba(0,0,0,0.1);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:all 0.3s;
        }
        .ts-check.done { background:rgba(0,196,122,0.08); border-color:#00C47A; }
        .ts-check.done svg { width:14px; height:14px; stroke:#00C47A; }

        /* Toast */
        .toast { position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px); background:rgba(255,255,255,0.95); backdrop-filter:blur(24px); border:1px solid rgba(0,0,0,0.07); border-radius:14px; padding:14px 22px; display:flex; align-items:center; gap:10px; z-index:50; opacity:0; pointer-events:none; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(0,229,160,0.15); }
        .toast-text { font-size:13px; font-weight:600; color:#0D0F14; }

        /* Tab bar */
        .tab-bar { position:absolute; bottom:0; left:0; right:0; height:80px; padding:10px 0 0; background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid rgba(0,0,0,0.07); display:flex; align-items:flex-start; justify-content:space-around; z-index:20; }
        .tab { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:2px 12px; border:none; background:none; font-family:'Plus Jakarta Sans',sans-serif; }
        .tab-label { font-size:10px; font-weight:500; color:#9CA3AF; }
        .tab.active svg { stroke:#00E5A0 !important; }
        .tab.active .tab-label { color:#00E5A0; font-weight:700; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:480px){body{padding:0!important;background:#F4F6FA!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>&#9679;&#9679;&#9679; &#128267;</span></div>
    <div class="exit-overlay" id="exitOverlay"></div>

    <div class="toast" id="toast">
        <div class="toast-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="toast-text" id="toastText"></span>
    </div>

    <div class="content">
        <div class="hdr">
            <div class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div>
                <div class="page-title">Meus <span>lembretes</span></div>
                <div class="page-subtitle" id="dateSub">Hoje · 0 de 0 tomados</div>
            </div>
        </div>

        <!-- Progress ring -->
        <div class="ring-card">
            <div class="ring-wrap">
                <svg width="56" height="56">
                    <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="4"/>
                    <circle cx="28" cy="28" r="22" fill="none" stroke="#00E5A0" stroke-width="4"
                        stroke-dasharray="138" stroke-dashoffset="138" stroke-linecap="round"
                        transform="rotate(-90 28 28)" id="progressRing"/>
                </svg>
                <div class="ring-val" id="ringPct">0%</div>
            </div>
            <div>
                <div class="ring-info-title" id="ringTitle">0 de 0 doses hoje</div>
                <div class="ring-info-sub" id="ringNext">Carregando...</div>
            </div>
        </div>

        <div id="slotsContainer"></div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <div class="tab active" onclick="nav('perfil')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg><span class="tab-label">Meu RG</span></div>
        <div class="tab" onclick="nav('score')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span class="tab-label">Score</span></div>
        <div class="tab" onclick="nav('exames')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="tab-label">Exames</span></div>
        <div class="tab" onclick="nav('qrcode')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg><span class="tab-label">QR Code</span></div>
        <div class="tab" onclick="nav('editar')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span class="tab-label">Editar</span></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // Build schedule from medications
    let schedule = [];
    let takenIds = JSON.parse(localStorage.getItem('vitae_taken_today') || '[]');

    // Check if taken list is from today
    const todayKey = new Date().toISOString().split('T')[0];
    if (localStorage.getItem('vitae_taken_date') !== todayKey) {
        takenIds = [];
        localStorage.setItem('vitae_taken_today', '[]');
        localStorage.setItem('vitae_taken_date', todayKey);
    }

    async function loadSchedule() {
        try {
            const data = await vitaeAPI.listarMedicamentos();
            const meds = data.medicamentos || [];

            schedule = meds.map(m => {
                const hour = (m.horario || '08:00').split(':')[0];
                const period = parseInt(hour) < 12 ? 'Manha' : parseInt(hour) < 18 ? 'Tarde' : 'Noite';
                return {
                    id: m.id,
                    hour: m.horario || '08:00',
                    hourLabel: (m.horario || '08:00').replace(':', 'h').substring(0, 3) + 'h',
                    period: period,
                    name: m.nome,
                    detail: (m.dosagem || '') + (m.frequencia ? ' — ' + m.frequencia : ''),
                    taken: takenIds.includes(m.id)
                };
            });

            // Sort by hour
            schedule.sort((a, b) => a.hour.localeCompare(b.hour));
        } catch (e) {
            // Fallback schedule for demo
            schedule = [
                { id:'1', hourLabel:'07h', period:'Manha', name:'Omeprazol 20mg', detail:'Em jejum', taken:true },
                { id:'2', hourLabel:'08h', period:'Manha', name:'Loratadina 10mg', detail:'1 comprimido', taken:true },
                { id:'3', hourLabel:'08h', period:'Manha', name:'Prednisolona 20mg', detail:'Dia 3 de 5', taken:true },
                { id:'4', hourLabel:'14h', period:'Tarde', name:'Soro Fisiologico', detail:'Aplicacao nasal', taken:false },
                { id:'5', hourLabel:'22h', period:'Noite', name:'Rivotril 0.5mg', detail:'1 comprimido', taken:false },
            ];
        }
        render();
    }

    function render() {
        const total = schedule.length;
        const taken = schedule.filter(s => s.taken).length;
        const pct = total > 0 ? Math.round((taken / total) * 100) : 0;

        // Update header
        const today = new Date();
        const dateStr = today.toLocaleDateString('pt-BR', { day:'numeric', month:'long' });
        document.getElementById('dateSub').textContent = 'Hoje, ' + dateStr + ' · ' + taken + ' de ' + total + ' tomados';

        // Update ring
        document.getElementById('ringPct').textContent = pct + '%';
        document.getElementById('ringTitle').textContent = taken + ' de ' + total + ' doses hoje';
        const ring = document.getElementById('progressRing');
        const offset = 138 - (138 * pct) / 100;
        ring.style.strokeDashoffset = offset;

        // Next pending
        const nextPending = schedule.find(s => !s.taken);
        document.getElementById('ringNext').textContent = nextPending
            ? 'Proximo: ' + nextPending.name + ' as ' + nextPending.hourLabel
            : 'Todas as doses de hoje foram tomadas';

        // Render slots
        const container = document.getElementById('slotsContainer');
        const takenSlots = schedule.filter(s => s.taken);
        const pendingSlots = schedule.filter(s => !s.taken);

        let html = '';

        if (takenSlots.length > 0) {
            html += `<div class="cat-label"><div class="cat-dot" style="background:#00C47A"></div><div class="cat-text" style="color:#00C47A">Ja tomados</div></div>`;
            takenSlots.forEach((s, i) => {
                html += `
                    <div class="time-slot done" style="opacity:0;animation:fadeUp 0.4s ease ${0.4 + i * 0.05}s both" onclick="untakeDose('${s.id}')">
                        <div class="ts-time"><div class="ts-hour">${s.hourLabel}</div><div class="ts-period">${s.period}</div></div>
                        <div class="ts-info"><div class="ts-name">${s.name}</div><div class="ts-detail">${s.detail}</div></div>
                        <div class="ts-check done"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                    </div>`;
            });
        }

        if (pendingSlots.length > 0) {
            html += `<div class="cat-label"><div class="cat-dot" style="background:#00E5A0"></div><div class="cat-text" style="color:#00E5A0">Pendentes</div></div>`;
            pendingSlots.forEach((s, i) => {
                const delay = 0.4 + (takenSlots.length + i) * 0.05;
                html += `
                    <div class="time-slot" style="opacity:0;animation:fadeUp 0.4s ease ${delay}s both" onclick="takeDose('${s.id}')">
                        <div class="ts-time"><div class="ts-hour">${s.hourLabel}</div><div class="ts-period">${s.period}</div></div>
                        <div class="ts-info"><div class="ts-name">${s.name}</div><div class="ts-detail">${s.detail}</div></div>
                        <div class="ts-check"></div>
                    </div>`;
            });
        }

        if (total === 0) {
            html = `
                <div style="text-align:center;padding:40px 20px;">
                    <div style="width:64px;height:64px;border-radius:20px;background:rgba(0,229,160,0.06);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(0,229,160,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div style="font-size:14px;color:#9CA3AF;line-height:1.6">Nenhum lembrete configurado.<br>Adicione medicamentos para criar lembretes.</div>
                </div>`;
        }

        container.innerHTML = html;
    }

    function takeDose(id) {
        const s = schedule.find(s => s.id === id);
        if (!s) return;
        s.taken = true;
        takenIds.push(id);
        localStorage.setItem('vitae_taken_today', JSON.stringify(takenIds));
        showToast(s.name + ' marcado como tomado');
        render();
    }

    function untakeDose(id) {
        const s = schedule.find(s => s.id === id);
        if (!s) return;
        s.taken = false;
        takenIds = takenIds.filter(t => t !== id);
        localStorage.setItem('vitae_taken_today', JSON.stringify(takenIds));
        showToast(s.name + ' desmarcado');
        render();
    }

    // Toast
    let toastTimer;
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Navigation
    function goBack() {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => { window.location.href = '08-perfil.html?from=nav'; }, 400);
    }
    function nav(tab) {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => {
            const routes = { perfil:'08-perfil.html', score:'10-score.html', exames:'11-exames-lista.html', qrcode:'21-qrcode.html', editar:'09-dados-pessoais.html' };
            window.location.href = routes[tab] || '08-perfil.html';
        }, 400);
    }

    // Init
    if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadSchedule();
    } else {
        // Demo mode
        schedule = [
            { id:'1', hourLabel:'07h', period:'Manha', name:'Omeprazol 20mg', detail:'Em jejum', taken:true },
            { id:'2', hourLabel:'08h', period:'Manha', name:'Loratadina 10mg', detail:'1 comprimido', taken:true },
            { id:'3', hourLabel:'08h', period:'Manha', name:'Prednisolona 20mg', detail:'Dia 3 de 5', taken:true },
            { id:'4', hourLabel:'14h', period:'Tarde', name:'Soro Fisiologico', detail:'Aplicacao nasal', taken:false },
            { id:'5', hourLabel:'22h', period:'Noite', name:'Rivotril 0.5mg', detail:'1 comprimido', taken:false },
        ];
        render();
    }
</script>
</body>
</html>
