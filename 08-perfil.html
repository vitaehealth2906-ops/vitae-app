<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        /* Entrance curtain — split reveal (first entry only) */
        .curtain-left, .curtain-right {
            position:absolute; top:0; width:50%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
            display:none;
        }
        .first-entry .curtain-left { display:block; left:0; animation:curtainSlideLeft 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        .first-entry .curtain-right { display:block; right:0; animation:curtainSlideRight 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        @keyframes curtainSlideLeft { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }
        @keyframes curtainSlideRight { 0%{transform:translateX(0)} 100%{transform:translateX(100%)} }

        /* Gold line reveal (first entry only) */
        .reveal-line {
            position:absolute; top:0; left:50%; width:2px; height:100%;
            background:linear-gradient(to bottom, transparent, #C5A55A, transparent);
            z-index:31; pointer-events:none;
            transform:translateX(-50%);
            display:none;
        }
        .first-entry .reveal-line {
            display:block;
            animation:revealLine 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
            opacity:0.8;
        }
        @keyframes revealLine {
            0% { opacity:0.8; transform:translateX(-50%) scaleY(0); }
            30% { opacity:1; transform:translateX(-50%) scaleY(1); }
            100% { opacity:0; transform:translateX(-50%) scaleY(1); }
        }

        /* Soft return — golden glow fade (coming back from other pages) */
        .return-splash {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
            display:flex; align-items:center; justify-content:center;
            animation:returnSplashOut 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
        }
        .return-splash-glow {
            position:absolute; width:250px; height:250px; border-radius:50%;
            background:radial-gradient(circle, rgba(197,165,90,0.15) 0%, transparent 70%);
            animation:returnGlowPulse 0.8s ease-out forwards;
        }
        .return-splash-text {
            font-family:'Playfair Display', serif;
            font-size:36px; font-weight:700; letter-spacing:6px;
            color:#C5A55A; text-transform:uppercase;
            opacity:0;
            animation:returnTextIn 0.5s ease 0.05s forwards;
        }
        .return-splash-line {
            position:absolute; bottom:calc(50% - 30px);
            width:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(197,165,90,0.5), transparent);
            animation:returnLineIn 0.4s ease 0.2s forwards;
        }
        @keyframes returnGlowPulse {
            0% { opacity:0; transform:scale(0.5); }
            50% { opacity:1; transform:scale(1); }
            100% { opacity:0.6; transform:scale(1.1); }
        }
        @keyframes returnTextIn {
            0% { opacity:0; transform:scale(0.9); }
            100% { opacity:1; transform:scale(1); }
        }
        @keyframes returnLineIn {
            0% { width:0; opacity:0; }
            100% { width:50px; opacity:1; }
        }
        @keyframes returnSplashOut {
            0% { opacity:1; }
            100% { opacity:0; pointer-events:none; }
        }
        /* When returning, content appears after splash */
        .returning .content {
            opacity:0;
            animation:contentSlideIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.6s both;
        }
        @keyframes contentSlideIn {
            0% { opacity:0; transform:translateY(20px); }
            100% { opacity:1; transform:translateY(0); }
        }
        /* Speed up inner animations on return */
        .returning .anim { animation-delay:0.65s !important; animation-duration:0.3s !important; }
        .returning .profile-header { animation-delay:0.6s !important; animation-duration:0.3s !important; }

        /* Exit curtain */
        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:40; pointer-events:none;
            opacity:0; transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; pointer-events:all; }

        /* Scrollable content */
        .content {
            height:calc(100% - 80px);
            overflow-y:auto; overflow-x:hidden;
            padding:70px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Profile header */
        .profile-header {
            display:flex; align-items:center; gap:16px;
            margin-bottom:28px;
            opacity:0; animation:fadeUp 0.6s ease 0.6s both;
        }
        .avatar {
            width:64px; height:64px; border-radius:50%;
            background:linear-gradient(135deg, rgba(197,165,90,0.2), rgba(197,165,90,0.05));
            border:2px solid rgba(197,165,90,0.3);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
            cursor:pointer; transition:all 0.3s;
        }
        .avatar:hover { border-color:rgba(197,165,90,0.6); transform:scale(1.05); }
        .avatar:active { transform:scale(0.95); }
        .avatar-initials {
            font-family:'Playfair Display', serif;
            font-size:22px; font-weight:700;
            color:#C5A55A;
        }
        .profile-info { flex:1; }
        .profile-name {
            font-size:20px; font-weight:700; color:#fff;
            margin-bottom:2px;
        }
        .profile-age {
            font-size:13px; color:rgba(255,255,255,0.35);
        }

        /* Health chart — Liquid Glass FORTE */
        .health-chart {
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(24px) saturate(1.2);
            -webkit-backdrop-filter:blur(24px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.08);
            border-top:1px solid rgba(255,255,255,0.12);
            border-radius:18px;
            padding:20px 20px 16px;
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.5s ease 0.75s both;
            cursor:pointer;
            transition:border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            position:relative;
            overflow:hidden;
        }
        .health-chart::before {
            content:'';
            position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }
        .health-chart:active {
            border-color:rgba(197,165,90,0.25);
            box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(197,165,90,0.1);
        }
        .chart-legend {
            display:flex; align-items:center; gap:16px;
            margin-bottom:10px;
            font-size:10px; font-weight:500;
            color:rgba(255,255,255,0.3);
        }
        .chart-legend-item {
            display:flex; align-items:center; gap:5px;
        }
        .chart-legend-line {
            width:16px; height:2px; border-radius:1px;
        }
        .chart-legend-line.gold { background:#C5A55A; }
        .chart-legend-line.green { background:#4AD9A4; border-style:dashed; height:0; border-top:2px dashed #4AD9A4; }
        .chart-tap-hint {
            font-size:10px; font-weight:500;
            color:rgba(74,217,164,0.4);
            text-align:center;
            margin-top:6px;
            letter-spacing:0.2px;
        }
        .chart-header {
            display:flex; justify-content:space-between; align-items:flex-start;
            margin-bottom:16px;
        }
        .chart-title {
            font-size:14px; font-weight:700;
            color:rgba(255,255,255,0.6);
            letter-spacing:0.3px;
        }
        .chart-title span {
            font-family:'Playfair Display', serif;
            color:#C5A55A; font-style:italic;
        }
        .chart-score {
            text-align:right;
        }
        .chart-score-value {
            font-family:'Playfair Display', serif;
            font-size:28px; font-weight:700;
            color:#C5A55A;
            line-height:1;
        }
        .chart-score-label {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.2);
            letter-spacing:0.3px;
            text-transform:uppercase;
        }
        .chart-svg-container {
            width:100%; height:120px;
            margin-bottom:12px;
        }
        .chart-pillars {
            display:grid; grid-template-columns:1fr 1fr 1fr 1fr;
            gap:8px;
        }
        /* Pillar — Liquid Glass MEDIO */
        .pillar {
            text-align:center;
            padding:10px 4px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.09);
            box-shadow:0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
            transition:all 0.25s;
        }
        .pillar:hover {
            border-color:rgba(197,165,90,0.15);
            box-shadow:0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(197,165,90,0.08);
        }
        .pillar-value {
            font-family:'Playfair Display', serif;
            font-size:18px; font-weight:700;
            line-height:1; margin-bottom:4px;
        }
        .pillar-label {
            font-size:9px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:0.3px;
            text-transform:uppercase;
        }
        .pillar-dot {
            width:5px; height:5px; border-radius:50%;
            display:inline-block; margin-right:2px;
            vertical-align:middle;
            position:relative; top:-1px;
        }

        /* Section */
        .section { margin-bottom:20px; }
        .section.anim { opacity:0; animation:fadeUp 0.5s ease both; }

        .section-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:12px;
        }
        .section-title {
            font-size:14px; font-weight:700;
            color:rgba(255,255,255,0.6);
            letter-spacing:0.3px;
        }
        .section-action {
            font-size:12px; font-weight:600;
            color:#C5A55A; cursor:pointer;
            border:none; background:none;
            font-family:'Inter',sans-serif;
            transition:all 0.2s;
            padding:4px 8px; border-radius:6px;
        }
        .section-action:hover { background:rgba(197,165,90,0.1); }
        .section-action:active { transform:scale(0.95); }

        /* Clickable row base */
        .clickable-row {
            cursor:pointer; transition:all 0.25s;
        }
        .clickable-row:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
        .clickable-row:active { transform:scale(0.98); }

        /* Info row — Liquid Glass LEVE */
        .info-row {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            margin-bottom:8px;
            box-shadow:0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .info-icon {
            width:38px; height:38px; border-radius:11px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .info-icon.red { background:rgba(217,68,82,0.08); border:1px solid rgba(217,68,82,0.12); }
        .info-icon.blue { background:rgba(74,159,217,0.08); border:1px solid rgba(74,159,217,0.12); }
        .info-icon.green { background:rgba(74,217,164,0.08); border:1px solid rgba(74,217,164,0.12); }
        .info-icon.gold { background:rgba(197,165,90,0.08); border:1px solid rgba(197,165,90,0.12); }
        .info-icon.purple { background:rgba(180,130,255,0.08); border:1px solid rgba(180,130,255,0.12); }

        .info-content { flex:1; }
        .info-label {
            font-size:11px; color:rgba(255,255,255,0.25);
            margin-bottom:2px; font-weight:500;
        }
        .info-value {
            font-size:14px; color:rgba(255,255,255,0.8);
            font-weight:600;
        }
        .info-arrow {
            color:rgba(255,255,255,0.1);
            flex-shrink:0;
            transition:color 0.2s;
        }
        .clickable-row:hover .info-arrow { color:rgba(255,255,255,0.3); }

        /* Medications — Liquid Glass LEVE */
        .med-card {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            margin-bottom:8px;
            box-shadow:0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.03);
            transition:all 0.25s;
        }
        .med-dot {
            width:8px; height:8px; border-radius:50%;
            flex-shrink:0;
        }
        .med-dot.active { background:#4AD9A4; box-shadow:0 0 8px rgba(74,217,164,0.4); }
        .med-info { flex:1; }
        .med-name {
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.8);
            margin-bottom:2px;
        }
        .med-dosage {
            font-size:12px; color:rgba(255,255,255,0.3);
        }
        .med-time {
            font-size:11px; font-weight:600;
            color:rgba(74,217,164,0.6);
            background:rgba(74,217,164,0.08);
            padding:4px 10px; border-radius:8px;
        }

        /* Perfil Exam Cards */
        .pf-exam-card {
            display:flex; align-items:center; gap:10px;
            padding:16px 14px; margin-bottom:8px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.08);
            border-radius:16px; cursor:pointer;
            box-shadow:0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.03);
            transition:all 0.25s;
        }
        .pf-exam-card:hover { background:rgba(255,255,255,0.05); }
        .pf-exam-card:active { transform:scale(0.98); }
        .pf-exam-info { flex:1; min-width:0; }
        .pf-exam-meta {
            font-size:9px; font-weight:500; letter-spacing:0.12em;
            text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:4px;
        }
        .pf-exam-name {
            font-family:'Playfair Display',serif; font-size:16px; font-weight:500;
            color:rgba(255,255,255,0.85); margin-bottom:6px;
        }
        .pf-exam-tags { display:flex; gap:6px; flex-wrap:wrap; }
        .pf-tag {
            font-size:10px; font-weight:500; padding:3px 8px;
            border-radius:10px; letter-spacing:0.02em;
        }
        .pf-tag.ok { background:rgba(74,217,164,0.1); color:rgba(74,217,164,0.7); }
        .pf-tag.warn { background:rgba(197,165,90,0.1); color:rgba(197,165,90,0.7); }
        .pf-tag.crit { background:rgba(217,68,82,0.1); color:rgba(217,68,82,0.7); }
        .pf-exam-score { text-align:right; flex-shrink:0; }
        .pf-exam-num {
            font-family:'Playfair Display',serif; font-size:24px; font-weight:700;
            line-height:1;
        }
        .pf-exam-num.ok { color:#C5A55A; }
        .pf-exam-num.warn { color:#C5A55A; }
        .pf-exam-num.crit { color:#D94452; }
        .pf-exam-den { font-size:10px; color:rgba(255,255,255,0.2); }
        .pf-exam-arr { color:rgba(255,255,255,0.15); font-size:20px; margin-left:4px; }

        /* Allergies */
        .allergy-tags {
            display:flex; flex-wrap:wrap; gap:8px;
        }
        .allergy-tag {
            padding:8px 14px;
            background:rgba(217,68,82,0.06);
            border:1px solid rgba(217,68,82,0.12);
            border-radius:10px;
            font-size:13px; font-weight:500;
            color:rgba(217,68,82,0.8);
            cursor:pointer; transition:all 0.25s;
        }
        .allergy-tag:hover { background:rgba(217,68,82,0.12); border-color:rgba(217,68,82,0.25); }
        .allergy-tag:active { transform:scale(0.94); }

        /* Recent exams — Liquid Glass LEVE */
        .exam-card {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-top:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            margin-bottom:8px;
            box-shadow:0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.03);
            transition:all 0.25s;
        }
        .exam-type-icon {
            width:42px; height:42px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .exam-type-icon.blood { background:rgba(217,68,82,0.08); border:1px solid rgba(217,68,82,0.12); }
        .exam-type-icon.cardio { background:rgba(74,159,217,0.08); border:1px solid rgba(74,159,217,0.12); }
        .exam-info { flex:1; }
        .exam-name {
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.8);
            margin-bottom:2px;
        }
        .exam-date {
            font-size:12px; color:rgba(255,255,255,0.25);
        }
        .exam-status {
            padding:5px 10px; border-radius:8px;
            font-size:11px; font-weight:600;
        }
        .exam-status.normal {
            background:rgba(74,217,164,0.08);
            color:rgba(74,217,164,0.8);
        }
        .exam-status.attention {
            background:rgba(197,165,90,0.08);
            color:rgba(197,165,90,0.8);
        }

        /* Share button */
        .btn-share {
            width:100%; padding:16px;
            background:rgba(255,255,255,0.04);
            border:1.5px solid rgba(255,255,255,0.08);
            border-radius:14px;
            font-family:'Inter',sans-serif;
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.5);
            cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:10px;
            transition:all 0.3s;
            margin-bottom:20px;
        }
        .btn-share:hover {
            background:rgba(197,165,90,0.08);
            border-color:rgba(197,165,90,0.2);
            color:#C5A55A;
        }
        .btn-share:hover svg { stroke:#C5A55A; }
        .btn-share:active { transform:scale(0.98); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* Bottom tab bar — Liquid Glass */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0;
            height:80px;
            background:rgba(10,10,10,0.75);
            backdrop-filter:blur(30px) saturate(1.3);
            -webkit-backdrop-filter:blur(30px) saturate(1.3);
            border-top:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:space-around;
            padding:0 20px 16px;
            z-index:20;
            box-shadow:0 -4px 24px rgba(0,0,0,0.3);
        }
        .tab {
            display:flex; flex-direction:column;
            align-items:center; gap:4px;
            cursor:pointer;
            padding:8px 20px;
            border-radius:12px;
            transition:all 0.25s;
            border:none; background:none;
            font-family:'Inter',sans-serif;
        }
        .tab:active { transform:scale(0.92); }
        .tab svg { transition:all 0.2s; }
        .tab-label {
            font-size:10px; font-weight:600;
            letter-spacing:0.3px;
            transition:color 0.2s;
            color:rgba(255,255,255,0.25);
        }
        .tab.active .tab-label { color:#C5A55A; }
        .tab.active svg { color:#C5A55A !important; stroke:#C5A55A !important; }
        .tab:not(.active):hover .tab-label { color:rgba(255,255,255,0.4); }
        .tab-indicator {
            width:4px; height:4px; border-radius:50%;
            background:#C5A55A;
            margin-top:2px;
            opacity:0; transition:opacity 0.2s;
        }
        .tab.active .tab-indicator { opacity:1; }

        /* Toast notification */
        .toast {
            position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px);
            background:rgba(30,30,30,0.95);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:14px; padding:14px 22px;
            display:flex; align-items:center; gap:10px;
            z-index:50;
            opacity:0; pointer-events:none;
            transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:0 12px 40px rgba(0,0,0,0.5);
        }
        .toast.show {
            opacity:1; transform:translateX(-50%) translateY(0);
        }
        .toast-icon {
            width:28px; height:28px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .toast-icon.success { background:rgba(74,217,164,0.15); }
        .toast-icon.info { background:rgba(74,159,217,0.15); }
        .toast-icon.gold { background:rgba(197,165,90,0.15); }
        .toast-text {
            font-size:13px; font-weight:600;
            color:rgba(255,255,255,0.8);
        }

        /* Modal overlay */
        .modal-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(8px);
            z-index:35;
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .modal-overlay.show { opacity:1; pointer-events:all; }
        .modal-sheet {
            width:100%;
            background:#1A1A1A;
            border-radius:24px 24px 0 0;
            padding:20px 24px 40px;
            transform:translateY(100%);
            transition:transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-sheet {
            transform:translateY(0);
        }
        .modal-handle {
            width:40px; height:4px; border-radius:2px;
            background:rgba(255,255,255,0.15);
            margin:0 auto 20px;
        }
        .modal-title {
            font-family:'Playfair Display', serif;
            font-size:22px; font-weight:700; color:#fff;
            margin-bottom:6px;
        }
        .modal-title span { color:#C5A55A; font-style:italic; }
        .modal-subtitle {
            font-size:13px; color:rgba(255,255,255,0.3);
            margin-bottom:20px;
        }
        .modal-item {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:14px;

            width:38px; height:38px; border-radius:11px;

        .modal-btn-close {
            width:100%; padding:16px;

            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.5);
            cursor:pointer; margin-top:12px;
            transition:all 0.2s;
        }
        .modal-btn-close:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); }
        .modal-btn-close:active { transform:scale(0.98); }

        /* Modal input fields */
        .modal-input {
            width:100%; padding:14px 16px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:12px;

            -webkit-appearance:none;
            margin-bottom:8px;
            cursor:pointer;
        }
        .modal-select option { background:#1A1A1A; color:#fff; }
        .modal-btn-primary {
            width:100%; padding:16px;
            background:linear-gradient(135deg, #C5A55A, #D4B96A);

        .modal-field-label {

        @keyframes cardSlideIn {
            from { opacity:0; transform:translateY(-10px); max-height:0; margin-bottom:0; padding:0 16px; }
            to { opacity:1; transform:translateY(0); max-height:80px; margin-bottom:8px; padding:14px 16px; }

        .med-card.entering { animation:cardSlideIn 0.35s ease both; }
        .med-card.removing { animation:cardFadeOut 0.3s ease both; }
        .allergy-tag.entering { animation:fadeUp 0.3s ease both; }

<script>
    // Detect if returning from another page or first entry
    (function() {
        const params = new URLSearchParams(window.location.search);
        const isReturning = params.get('from') === 'nav';
        const phone = document.querySelector('.phone');
        if (isReturning) {
            phone.classList.add('returning');
            const splash = document.getElementById('returnSplash');
            splash.style.display = 'flex';
            splash.addEventListener('animationend', function(e) {
                if (e.animationName === 'returnSplashOut') splash.remove();
            });
        } else {
            phone.classList.add('first-entry');
        }
    })();

    // Verificar login
    if (typeof vitaeAPI !== 'undefined' && !vitaeAPI.isLoggedIn()) {
        window.location.href = '03-cadastro.html';
    }

    // ============ LOAD PROFILE DATA FROM API ============
    async function loadProfileData() {
        try {
            const perfil = await vitaeAPI.getPerfil();
            const u = perfil.usuario || perfil;
            const ps = u.perfilSaude || perfil.perfilSaude || {};

            // Nome e idade
            if (u.nome) {
                document.querySelector('.profile-name').textContent = u.nome;
                const parts = u.nome.trim().split(/\s+/);
                const initials = parts.length >= 2
                    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
                    : parts[0].substring(0,2).toUpperCase();
                document.querySelector('.avatar-initials').textContent = initials;
            }
            if (ps.dataNascimento) {
                const birth = new Date(ps.dataNascimento);
                const age = Math.floor((Date.now() - birth.getTime()) / (365.25*24*60*60*1000));
                const genero = ps.genero || '';
                document.querySelector('.profile-age').textContent = age + ' anos' + (genero ? ', ' + genero : '');
            } else {
                document.querySelector('.profile-age').textContent = '';
            }
        } catch (e) {
            console.log('Erro ao carregar perfil:', e.message);
        }
    }

    function toNomeAmigavel(nome) {
        if (!nome) return 'Exame de Saúde';
        const n = nome.toLowerCase().trim();
        if (n.includes('multiplo') || n === 'múltiplos' || n === 'multiplos') return 'Painel Completo de Saúde';
        if (n.includes('hemograma')) return 'Exame de Sangue Completo';
        if (n.includes('lipidogram') || (n.includes('lipid') && !n.includes('vitamina'))) return 'Perfil do Coração';
        if (n.includes('glicemia') && n.includes('hba') || n.includes('glicada')) return 'Controle de Açúcar no Sangue';
        if (n.includes('glicemia') || n.includes('glicose')) return 'Nível de Açúcar no Sangue';
        if (n.includes('tsh') || n.includes('tireoide') || n.includes('tirói')) return 'Função da Tireoide';
        if (n.includes('testosterona')) return 'Hormônios Masculinos';
        if (n.includes('hormonal') || n.includes('estradiol') || n.includes('progesterona')) return 'Perfil Hormonal';
        if (n.includes('vitamina')) return 'Vitaminas e Minerais';
        if (n.includes('urina') || n.includes('urinalise') || n.includes('urinálise')) return 'Exame de Urina';
        if (n.includes('fezes') || n.includes('parasitolog')) return 'Exame de Fezes';
        if (n.includes('renal') || n.includes('rim')) return 'Função dos Rins';
        if (n.includes('hepat') || n.includes('figado') || n.includes('fígado') || n.includes('tgo') || n.includes('tgp')) return 'Função do Fígado';
        if (n.includes('check') || n.includes('painel') || n.includes('completo')) return 'Painel Completo de Saúde';
        if (n.includes('bioquimica') || n.includes('bioquímica')) return 'Bioquímica Geral';
        return nome;
    }

    async function loadMedicationsFromAPI() {
        try {
            const data = await vitaeAPI.listarMedicamentos();
            medications = (data.medicamentos || data || []).map(m => ({
                id: m.id,
                name: m.nome,
                dosage: m.dosagem || '',
                frequency: m.frequencia || '',
                time: m.horario || ''
            }));
            renderMedications();
        } catch (e) {
            console.log('Erro ao carregar medicamentos:', e.message);
        }
    }

    async function loadPerfilExams() {
        try {
            const data = await vitaeAPI.listarExames();
            const raw = data.exames || data || [];
            const exams = raw
                .filter(e => e.status === 'CONCLUIDO' && (e.totalParametros || 0) > 0)
                .map(e => ({
                    id: e.id,
                    name: toNomeAmigavel(e.tipoExame),
                    date: e.dataExame ? new Date(e.dataExame).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'}) : '',
                    lab: e.laboratorio || '',
                    statusGeral: e.statusGeral || 'NORMAL',
                    totalParams: e.totalParametros || 0,
                    normalCount: e.normalCount || 0,
                    atencaoCount: e.atencaoCount || 0,
                    criticoCount: e.criticoCount || 0,
                }));
            renderPerfilExams(exams);
        } catch (e) {

    // ============ HEALTH CHART ANIMATION ============
    (function() {
        // Mock data: health scores over months, 0-100
        const scores = [58, 62, 60, 68, 74, 78, 82];           // Sep-Mar (actual)
        const projScores = [82, 87, 91, 93];                     // Mar-Jun (projection)
        const totalMonths = scores.length + projScores.length - 1; // 9 months total (Mar shared)
        const w = 380, h = 100;
        const stepX = w / (totalMonths - 1);
        const minS = 40, maxS = 100;

        function yPos(val) {
            return h - ((val - minS) / (maxS - minS)) * h;
        }

        // Build actual points (Sep-Mar)
        const pts = scores.map((s, i) => ({ x: i * stepX, y: yPos(s) }));
        // Build projection points (Mar-Jun), starting from last actual point
        const projPts = projScores.map((s, i) => ({ x: (scores.length - 1 + i) * stepX, y: yPos(s) }));

        // Smooth curve using cubic bezier (Catmull-Rom)
        function smoothPath(points) {
            if (points.length < 2) return '';
            let d = 'M' + points[0].x + ',' + points[0].y;
            for (let i = 0; i < points.length - 1; i++) {
                const p0 = points[Math.max(0, i - 1)];
                const p1 = points[i];
                const p2 = points[i + 1];
                const p3 = points[Math.min(points.length - 1, i + 2)];
                const cp1x = p1.x + (p2.x - p0.x) / 6;
                const cp1y = p1.y + (p2.y - p0.y) / 6;
                const cp2x = p2.x - (p3.x - p1.x) / 6;
                const cp2y = p2.y - (p3.y - p1.y) / 6;
                d += ' C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2.x + ',' + p2.y;
            }
            return d;
        }

        // Gold line paths
        const linePath = smoothPath(pts);
        const areaPath = linePath + ' L' + pts[pts.length-1].x + ',' + h + ' L' + pts[0].x + ',' + h + ' Z';

        // Projection line path
        const projLinePath = smoothPath(projPts);
        // Projection area: between gold line end and projection line, closed downward
        const projAreaPath = projLinePath + ' L' + projPts[projPts.length-1].x + ',' + h + ' L' + projPts[0].x + ',' + h + ' Z';

        const lineEl = document.getElementById('chartLine');
        const areaEl = document.getElementById('chartArea');
        const dotsEl = document.getElementById('chartDots');
        const projLineEl = document.getElementById('projLine');
        const projAreaEl = document.getElementById('projArea');
        const projDotsEl = document.getElementById('projDots');
        const projScoreLbl = document.getElementById('projScoreLabel');

        lineEl.setAttribute('d', linePath);
        areaEl.setAttribute('d', areaPath);
        projLineEl.setAttribute('d', projLinePath);
        projAreaEl.setAttribute('d', projAreaPath);

        // Position the "93" label near the last projection point
        const lastProj = projPts[projPts.length - 1];
        projScoreLbl.setAttribute('x', lastProj.x - 8);
        projScoreLbl.setAttribute('y', lastProj.y - 8);

        // Create gold dots
        pts.forEach((p, i) => {
            const isLast = i === pts.length - 1;
            if (isLast) {
                const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                glow.setAttribute('cx', p.x); glow.setAttribute('cy', p.y);
                glow.setAttribute('r', '8'); glow.setAttribute('fill', 'rgba(197,165,90,0.15)');
                glow.setAttribute('opacity', '0');
                dotsEl.appendChild(glow);
            }
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
            dot.setAttribute('r', isLast ? '4' : '2.5');
            dot.setAttribute('fill', isLast ? '#C5A55A' : 'rgba(197,165,90,0.5)');
            dot.setAttribute('opacity', '0');
            dotsEl.appendChild(dot);
        });

        // Create green projection dots (skip first since it overlaps gold last)
        projPts.forEach((p, i) => {
            if (i === 0) return; // shared with gold line
            const isLast = i === projPts.length - 1;
            if (isLast) {
                const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                glow.setAttribute('cx', p.x); glow.setAttribute('cy', p.y);
                glow.setAttribute('r', '8'); glow.setAttribute('fill', 'rgba(74,217,164,0.15)');
                glow.setAttribute('opacity', '0');
                projDotsEl.appendChild(glow);
            }
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
            dot.setAttribute('r', isLast ? '4' : '2.5');
            dot.setAttribute('fill', isLast ? '#4AD9A4' : 'rgba(74,217,164,0.5)');
            dot.setAttribute('opacity', '0');
            projDotsEl.appendChild(dot);
        });

        // Animate in after curtain
        setTimeout(() => {
            // === GOLD LINE draw animation ===
            const lineLen = lineEl.getTotalLength();
            lineEl.style.strokeDasharray = lineLen;
            lineEl.style.strokeDashoffset = lineLen;
            lineEl.style.opacity = '1';

            let start = null;
            const duration = 1200;
            function drawLine(ts) {
                if (!start) start = ts;
                const progress = Math.min((ts - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                lineEl.style.strokeDashoffset = lineLen * (1 - ease);
                if (progress < 1) requestAnimationFrame(drawLine);
            }
            requestAnimationFrame(drawLine);

            // Gold area fade in
            setTimeout(() => {
                areaEl.style.transition = 'opacity 0.8s ease';
                areaEl.style.opacity = '0.6';
            }, 600);

            // Gold dots pop in sequentially
            const allDots = dotsEl.querySelectorAll('circle');
            allDots.forEach((d, i) => {
                setTimeout(() => {
                    d.style.transition = 'opacity 0.3s ease';
                    d.setAttribute('opacity', '1');
                }, 400 + i * 80);
            });

            // === PROJECTION LINE draw animation (starts after gold finishes) ===
            setTimeout(() => {
                const projLen = projLineEl.getTotalLength();
                // Save the dash pattern and use a large gap for the draw animation
                projLineEl.style.strokeDasharray = projLen;
                projLineEl.style.strokeDashoffset = projLen;
                projLineEl.style.opacity = '1';

                let pStart = null;
                const pDuration = 800;
                function drawProj(ts) {
                    if (!pStart) pStart = ts;
                    const progress = Math.min((ts - pStart) / pDuration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    projLineEl.style.strokeDashoffset = projLen * (1 - ease);
                    if (progress < 1) {
                        requestAnimationFrame(drawProj);
                    } else {
                        // Restore the dashed pattern after draw completes
                        projLineEl.style.strokeDasharray = '6 4';
                        projLineEl.style.strokeDashoffset = '0';
                    }
                }
                requestAnimationFrame(drawProj);

                // Projection area fade in
                setTimeout(() => {
                    projAreaEl.style.transition = 'opacity 0.8s ease';
                    projAreaEl.style.opacity = '0.6';
                }, 300);

                // Projection dots pop in
                const pDots = projDotsEl.querySelectorAll('circle');
                pDots.forEach((d, i) => {
                    setTimeout(() => {
                        d.style.transition = 'opacity 0.3s ease';
                        d.setAttribute('opacity', '1');
                    }, 300 + i * 100);
                });

                // Score label pop in
                setTimeout(() => {
                    projScoreLbl.style.transition = 'opacity 0.4s ease';
                    projScoreLbl.setAttribute('opacity', '1');
                }, 700);
            }, 1300); // 1300ms after the gold animation started
        }, 1100);
    })();

                <input class="modal-input" id="newAllergyInput" type="text" placeholder="Nova alergia..." onkeydown="if(event.key==='Enter')addAllergyFromInput()">

    async function removeAllergy(name) {
        const allergy = allergies.find(a => (typeof a === 'string' ? a : a.name) === name);
        try {
            if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn() && allergy && allergy.id) {
                await vitaeAPI.removerAlergia(allergy.id);
                await loadAllergiesFromAPI();
            } else {
                allergies = allergies.filter(a => (typeof a === 'string' ? a : a.name) !== name);
                renderAllergies();
            }
        } catch (e) {
            allergies = allergies.filter(a => (typeof a === 'string' ? a : a.name) !== name);
            renderAllergies();
        }
        openEditAllergies();
        setTimeout(() => showToast(name + ' removida', 'success'), 100);
    }

    async function addAllergyFromInput() {
        const input = document.getElementById('newAllergyInput');
        const name = input.value.trim();
        if (!name) { input.style.borderColor = '#D94452'; input.focus(); return; }
        const exists = allergies.some(a => (typeof a === 'string' ? a : a.name) === name);
        if (exists) { showToast(name + ' ja esta na lista', 'info'); return; }
        try {
            if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
                await vitaeAPI.adicionarAlergia({ nome: name });
                await loadAllergiesFromAPI();
            } else {
                allergies.push(name);
                renderAllergies();
            }
        } catch (e) {
            allergies.push(name);
            renderAllergies();
        }
        openEditAllergies();
        setTimeout(() => showToast(name + ' adicionada', 'success'), 100);
    }
