<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Medicamentos adicionados</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone { width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA; border-radius:52px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(0,229,160,0.15),0 0 0 3px #1A1E26,0 40px 120px rgba(0,0,0,0.9); }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .status { position:absolute; top:14px; left:28px; right:28px; display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:#9CA3AF; z-index:11; }
        .exit-overlay { position:absolute; inset:0; background:#F4F6FA; opacity:0; z-index:25; pointer-events:none; transition:opacity 0.5s ease; }
        .exit-overlay.active { opacity:1; }
        .content { height:100%; overflow-y:auto; padding:55px 24px 120px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        /* Success */
        .success-section { text-align:center; margin-bottom:24px; opacity:0; animation:fadeUp 0.5s ease 0.3s both; }
        .success-ring {
            width:72px; height:72px; border-radius:50%;
            background:rgba(0,196,122,0.06); border:2px solid rgba(0,196,122,0.15);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 16px;
        }
        .success-ring svg { width:32px; height:32px; stroke:#00C47A; }
        .success-title { font-size:22px; font-weight:800; color:#00C47A; margin-bottom:4px; }
        .success-sub { font-size:13px; color:#9CA3AF; }

        /* Summary card */
        .sum-card {
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            border-radius:16px; padding:16px; margin-bottom:12px;
            box-shadow:0 1px 12px rgba(0,0,0,0.07);
            opacity:0; animation:fadeUp 0.4s ease 0.5s both;
        }
        .sum-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .sum-icon { width:32px; height:32px; border-radius:10px; background:rgba(0,229,160,0.08); display:flex; align-items:center; justify-content:center; }
        .sum-icon svg { width:16px; height:16px; stroke:#00E5A0; }
        .sum-title { font-size:14px; font-weight:800; color:#0D0F14; }
        .sum-count { margin-left:auto; font-size:11px; font-weight:700; padding:3px 8px; border-radius:8px; background:rgba(0,196,122,0.08); color:#00C47A; }
        .sum-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.04); }
        .sum-item:last-child { border:none; }
        .sum-item-name { font-size:13px; font-weight:600; color:#0D0F14; }
        .sum-item-freq { font-size:11px; font-weight:600; color:#00E5A0; }

        /* Reminder card */
        .rem-card {
            background:rgba(0,229,160,0.04); border:1px solid rgba(0,229,160,0.1);
            border-radius:16px; padding:16px; margin-bottom:12px;
            opacity:0; animation:fadeUp 0.4s ease 0.6s both;
        }
        .rem-head { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
        .rem-head svg { width:16px; height:16px; stroke:#00E5A0; }
        .rem-title { font-size:13px; font-weight:700; color:#00E5A0; }
        .rem-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:rgba(255,255,255,0.5); border-radius:10px; margin-bottom:6px; }
        .rem-time { font-size:16px; font-weight:900; color:#00E5A0; min-width:40px; }
        .rem-med { font-size:12px; font-weight:600; color:#0D0F14; }
        .rem-dose { font-size:10px; color:#9CA3AF; }

        /* CTAs */
        .cta-primary {
            width:100%; padding:16px;
            background:linear-gradient(120deg,#00C47A,#00E5A0);
            border:none; border-radius:14px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:15px; font-weight:700; color:#fff;
            cursor:pointer; margin-top:8px;
            box-shadow:0 4px 20px rgba(0,196,122,0.2);
            transition:all 0.2s;
            opacity:0; animation:fadeUp 0.4s ease 0.7s both;
        }
        .cta-primary:active { transform:scale(0.97); }
        .cta-secondary {
            width:100%; padding:14px;
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            border-radius:14px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:14px; font-weight:600; color:#00E5A0;
            cursor:pointer; margin-top:8px; transition:all 0.2s;
            opacity:0; animation:fadeUp 0.4s ease 0.75s both;
        }
        .cta-secondary:active { transform:scale(0.97); }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:480px){body{padding:0!important;background:#F4F6FA!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}
    </style>
    <link rel="stylesheet" href="vitae-core.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>&#9679;&#9679;&#9679; &#128267;</span></div>
    <div class="exit-overlay" id="exitOverlay"></div>

    <div class="content">
        <div class="success-section">
            <div class="success-ring">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="success-title" id="successTitle">Pronto. 4 medicamentos adicionados</div>
            <div class="success-sub">Seu perfil de saude ja esta atualizado</div>
        </div>

        <div class="sum-card">
            <div class="sum-head">
                <div class="sum-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg></div>
                <div class="sum-title">Medicamentos novos</div>
                <div class="sum-count" id="addedCount">+4</div>
            </div>
            <div id="medsSummary"></div>
        </div>

        <div class="rem-card">
            <div class="rem-head">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <div class="rem-title">Seus lembretes ja estao prontos</div>
            </div>
            <div id="reminders"></div>
        </div>

        <button class="cta-primary" onclick="goToReminders()">Ver meus lembretes</button>
        <button class="cta-secondary" onclick="goToProfile()">Voltar ao Meu RG</button>
    </div>
</div>

<script>
    // Get data from sessionStorage
    const addedCount = parseInt(sessionStorage.getItem('vitae_added_count') || '4');
    const addedMeds = JSON.parse(sessionStorage.getItem('vitae_added_meds') || '[]');

    document.getElementById('successTitle').textContent = 'Pronto. ' + addedCount + (addedCount === 1 ? ' medicamento adicionado' : ' medicamentos adicionados');
    document.getElementById('addedCount').textContent = '+' + addedCount;

    // Render summary
    const summaryEl = document.getElementById('medsSummary');
    if (addedMeds.length > 0) {
        summaryEl.innerHTML = addedMeds.slice(0, 4).map(m => `
            <div class="sum-item">
                <div class="sum-item-name">${m.nome}</div>
                <div class="sum-item-freq">${m.frequencia || m.nota || ''}</div>
            </div>
        `).join('') + (addedMeds.length > 4 ? '<div style="font-size:11px;color:#9CA3AF;text-align:center;padding:4px">+' + (addedMeds.length - 4) + ' mais</div>' : '');
    } else {
        summaryEl.innerHTML = `
            <div class="sum-item"><div class="sum-item-name">Loratadina 10mg</div><div class="sum-item-freq">1x ao dia</div></div>
            <div class="sum-item"><div class="sum-item-name">Prednisolona 20mg</div><div class="sum-item-freq">5 dias</div></div>
            <div class="sum-item"><div class="sum-item-name">Soro Fisiologico</div><div class="sum-item-freq">3x ao dia</div></div>
            <div class="sum-item"><div class="sum-item-name">Cetirizina 10mg</div><div class="sum-item-freq">1x ao dia</div></div>
        `;
    }

    // Render reminders (simulated)
    const remEl = document.getElementById('reminders');
    const defaultReminders = [
        { time: '08h', name: 'Loratadina 10mg', dose: '1 comprimido · manha' },
        { time: '12h', name: 'Soro Fisiologico', dose: 'Aplicacao nasal' },
        { time: '22h', name: 'Rivotril 0.5mg', dose: '1 comprimido · noite' },
    ];
    remEl.innerHTML = defaultReminders.map(r => `
        <div class="rem-item">
            <div class="rem-time">${r.time}</div>
            <div>
                <div class="rem-med">${r.name}</div>
                <div class="rem-dose">${r.dose}</div>
            </div>
        </div>
    `).join('');

    function goToReminders() {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => { window.location.href = '30-lembretes.html'; }, 400);
    }
    function goToProfile() {
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => { window.location.href = '08-perfil.html?from=nav'; }, 400);
    }

    // Clear scan data
    sessionStorage.removeItem('vitae_scan_file');
    sessionStorage.removeItem('vitae_scan_filename');
    sessionStorage.removeItem('vitae_scan_tipo');
    sessionStorage.removeItem('vitae_scan_mode');
</script>
</body>
</html>
