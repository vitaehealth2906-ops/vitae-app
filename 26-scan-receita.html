<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Escanear receita</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .content { padding:64px 28px 28px; height:100%; display:flex; flex-direction:column; overflow-y:auto; }
        .back-btn { width:40px; height:40px; border-radius:12px; background:#FFFFFF; border:1px solid rgba(0,0,0,0.07); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; margin-bottom:18px; flex-shrink:0; }
        .page-title { font-size:26px; font-weight:900; letter-spacing:-0.8px; color:#0D0F14; line-height:1.15; margin-bottom:6px; }
        .page-title span { color:#00E5A0; font-style:italic; }
        .page-sub { font-size:13px; color:#9CA3AF; margin-bottom:22px; }
        .shot {
            flex:1; min-height:280px;
            background:#FFFFFF; border:1.5px dashed rgba(0,229,160,0.35);
            border-radius:22px; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:14px;
            color:#9CA3AF; cursor:pointer;
            transition:all 0.25s;
        }
        .shot:hover { border-color:#00E5A0; background:rgba(0,229,160,0.03); }
        .shot svg { width:56px; height:56px; color:#00E5A0; }
        .shot .t { font-size:15px; font-weight:700; color:#0D0F14; }
        .shot .s { font-size:12px; color:#9CA3AF; max-width:240px; text-align:center; }
        .actions { display:flex; flex-direction:column; gap:12px; margin-top:18px; flex-shrink:0; }
        .btn {
            width:100%; padding:16px; border:none; border-radius:14px;
            font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-primary { background:linear-gradient(120deg, #00E5A0, #00B4D8); color:#0D0F14; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,229,160,0.3); }
        .btn-secondary { background:#FFFFFF; color:#0D0F14; border:1px solid rgba(0,0,0,0.07); }
        .btn-secondary:hover { background:rgba(0,0,0,0.02); }
        @media(max-width:480px){
            html,body{padding:0!important;background:inherit!important;overflow-x:hidden;min-height:100vh;min-height:100dvh;}
            .phone{width:100vw!important;max-width:100vw!important;height:100vh!important;height:100dvh!important;max-height:none!important;border-radius:0!important;box-shadow:none!important;}
            .notch{display:none!important;}
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="back-btn" onclick="history.back()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18L9 12L15 6"/></svg>
        </div>
        <div class="page-title">Escanear <span>receita</span></div>
        <div class="page-sub">Fotografe a receita para adicionar os medicamentos automaticamente</div>

        <label class="shot" for="fileInput" id="dropArea">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
            <div class="t">Toque para tirar foto</div>
            <div class="s">Ou selecione uma imagem da galeria. Aceita JPG, PNG e PDF.</div>
        </label>
        <input type="file" id="fileInput" accept="image/*,application/pdf" capture="environment" style="display:none;" onchange="enviarArquivo(this)">

        <div class="actions">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Tirar foto da receita</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').removeAttribute('capture');document.getElementById('fileInput').click();">Escolher da galeria</button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (!vitaeAPI.requireAuth()) { /* redireciona se nao logado */ }

    async function enviarArquivo(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];

        // Vai pra tela de processamento — ela vai buscar o arquivo pelo Blob URL
        const blobUrl = URL.createObjectURL(file);
        sessionStorage.setItem('vitae_scan_blob', blobUrl);
        sessionStorage.setItem('vitae_scan_name', file.name);
        sessionStorage.setItem('vitae_scan_type', file.type);
        window.location.href = '27-processando.html';
    }
</script>
</body>
</html>
