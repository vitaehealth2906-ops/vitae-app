<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Tirar foto</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#000;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;height:100vh;height:100dvh}

        /* Fullscreen camera */
        .camera-page{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#000}
        video{width:100%;height:100%;object-fit:cover;display:block}
        canvas{display:none}

        /* Top bar */
        .cam-top{position:absolute;top:0;left:0;right:0;padding:52px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);z-index:10}
        .cam-back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1)}
        .cam-back:active{transform:scale(0.9)}
        .cam-back svg{width:20px;height:20px;stroke:#fff}

        /* Status indicator */
        .cam-status{position:absolute;top:110px;left:0;right:0;text-align:center;z-index:10;transition:all 0.3s}
        .cam-status-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all 0.3s}
        .cam-status-pill.searching{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
        .cam-status-pill.detected{background:rgba(0,229,160,0.15);color:#00E5A0;border:1px solid rgba(0,229,160,0.2)}
        .cam-status-dot{width:6px;height:6px;border-radius:50%;transition:all 0.3s}
        .searching .cam-status-dot{background:rgba(255,255,255,0.4);animation:pulse 1.5s ease infinite}
        .detected .cam-status-dot{background:#00E5A0}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

        /* Document outline overlay */
        .doc-outline{position:absolute;inset:0;z-index:5;pointer-events:none}
        .doc-border{position:absolute;top:15%;left:8%;right:8%;bottom:30%;border:2px solid rgba(255,255,255,0.15);border-radius:12px;transition:all 0.4s ease}
        .doc-border.detected{border-color:rgba(0,229,160,0.6);box-shadow:0 0 30px rgba(0,229,160,0.1)}

        /* Bottom controls */
        .cam-bottom{position:absolute;bottom:0;left:0;right:0;padding:20px 24px 40px;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px}
        .cam-hint{font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);text-align:center;transition:all 0.3s}
        .cam-hint.detected{color:#00E5A0}

        .cam-controls{display:flex;align-items:center;justify-content:center;gap:28px}
        .cam-gallery{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1)}
        .cam-gallery:active{transform:scale(0.9)}
        .cam-gallery svg{width:20px;height:20px;stroke:#fff}

        .shutter{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s}
        .shutter.disabled{opacity:0.3;cursor:default}
        .shutter.ready{border-color:#00E5A0}
        .shutter:active:not(.disabled){transform:scale(0.85)}
        .shutter-inner{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s}
        .shutter.ready .shutter-inner{background:rgba(0,229,160,0.2)}

        .cam-flip{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1)}
        .cam-flip:active{transform:scale(0.9)}
        .cam-flip svg{width:20px;height:20px;stroke:#fff}

        /* Gallery link */
        .cam-gallery-link{font-size:11px;color:rgba(255,255,255,0.4);cursor:pointer}
        .cam-gallery-link:hover{color:rgba(255,255,255,0.6)}

        /* Flash overlay */
        .flash{position:absolute;inset:0;background:#fff;z-index:20;opacity:0;pointer-events:none;transition:opacity 0.15s}
        .flash.active{opacity:0.6}

        /* Hidden inputs */
        .hidden-input{display:none}
    </style>
    <link rel="stylesheet" href="vitae-core.css">
</head>
<body>
<div class="camera-page">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="flash" id="flash"></div>

    <!-- Top -->
    <div class="cam-top">
        <div class="cam-back" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
    </div>

    <!-- Status -->
    <div class="cam-status">
        <div class="cam-status-pill searching" id="statusPill">
            <div class="cam-status-dot"></div>
            <span id="statusText">Aponte para a receita ou embalagem</span>
        </div>
    </div>

    <!-- Document outline -->
    <div class="doc-outline">
        <div class="doc-border" id="docBorder"></div>
    </div>

    <!-- Bottom -->
    <div class="cam-bottom">
        <div class="cam-hint" id="camHint">Posicione o documento na frente da camera</div>
        <div class="cam-controls">
            <div class="cam-gallery" onclick="document.getElementById('galleryPick').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
            <div class="shutter disabled" id="shutterBtn" onclick="capture()">
                <div class="shutter-inner"></div>
            </div>
            <div class="cam-flip" onclick="flipCamera()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>
            </div>
        </div>
        <div class="cam-gallery-link" onclick="document.getElementById('galleryPick').click()">Ja tem a foto salva? Escolha da galeria</div>
    </div>

    <input type="file" accept="image/*,application/pdf" class="hidden-input" id="galleryPick" onchange="handleGallery(event)">
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo') || 'receita';
    const from = params.get('from') || 'medicamentos';

    let stream = null;
    let facing = 'environment';
    let documentDetected = false;
    let stableFrames = 0;
    let detectionInterval = null;

    // Start camera
    async function startCamera() {
        try {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            document.getElementById('video').srcObject = stream;
            startDetection();
        } catch (e) {
            // Camera not available — show gallery option only
            document.getElementById('statusText').textContent = 'Camera nao disponivel';
            document.getElementById('camHint').textContent = 'Use o botao abaixo para escolher uma foto';
            document.getElementById('shutterBtn').style.display = 'none';
        }
    }

    function flipCamera() {
        facing = facing === 'environment' ? 'user' : 'environment';
        startCamera();
    }

    // Simple document detection: analyze frame for edges and contrast
    function startDetection() {
        if (detectionInterval) clearInterval(detectionInterval);
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        detectionInterval = setInterval(() => {
            if (video.readyState < 2) return;

            // Sample a small area for performance
            canvas.width = 160;
            canvas.height = 90;
            ctx.drawImage(video, 0, 0, 160, 90);
            const data = ctx.getImageData(0, 0, 160, 90).data;

            // Detect high contrast edges (documents have sharp text edges)
            let edgeCount = 0;
            const threshold = 40;
            for (let y = 10; y < 80; y += 2) {
                for (let x = 10; x < 150; x += 2) {
                    const i = (y * 160 + x) * 4;
                    const r = data[i], g = data[i+4], b = data[i+8];
                    const r2 = data[i + 160*4], g2 = data[i + 160*4 + 4];
                    const diffH = Math.abs(r - data[i+4]) + Math.abs(g - data[i+8]);
                    const diffV = Math.abs(r - r2) + Math.abs(g - g2);
                    if (diffH > threshold || diffV > threshold) edgeCount++;
                }
            }

            // Also check brightness variance (documents are usually brighter than surroundings)
            let sum = 0, sumSq = 0, count = 0;
            for (let i = 0; i < data.length; i += 16) {
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                sum += brightness;
                sumSq += brightness * brightness;
                count++;
            }
            const mean = sum / count;
            const variance = (sumSq / count) - (mean * mean);

            // Document detected if: enough edges AND good contrast AND bright enough
            const isDocument = edgeCount > 200 && variance > 800 && mean > 60;

            if (isDocument) {
                stableFrames++;
                if (stableFrames >= 3 && !documentDetected) {
                    setDetected(true);
                }
            } else {
                stableFrames = 0;
                if (documentDetected) setDetected(false);
            }
        }, 200); // Check 5 times per second
    }

    function setDetected(detected) {
        documentDetected = detected;
        const pill = document.getElementById('statusPill');
        const text = document.getElementById('statusText');
        const hint = document.getElementById('camHint');
        const border = document.getElementById('docBorder');
        const shutter = document.getElementById('shutterBtn');

        if (detected) {
            pill.className = 'cam-status-pill detected';
            text.textContent = 'Documento detectado';
            hint.textContent = 'Toque para capturar ou aguarde';
            hint.className = 'cam-hint detected';
            border.className = 'doc-border detected';
            shutter.className = 'shutter ready';

            // Auto-capture after 1.5s of stable detection
            setTimeout(() => {
                if (documentDetected && stableFrames >= 5) {
                    capture();
                }
            }, 1500);
        } else {
            pill.className = 'cam-status-pill searching';
            text.textContent = 'Aponte para a receita ou embalagem';
            hint.textContent = 'Posicione o documento na frente da camera';
            hint.className = 'cam-hint';
            border.className = 'doc-border';
            shutter.className = 'shutter disabled';
        }
    }

    // Capture photo
    function capture() {
        if (!documentDetected && !stream) return;

        // Flash effect
        const flash = document.getElementById('flash');
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 200);

        // Stop detection
        if (detectionInterval) clearInterval(detectionInterval);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(function(blob) {
            if (blob) processFile(blob, 'foto_receita.jpg');
        }, 'image/jpeg', 0.9);
    }

    function handleGallery(event) {
        const file = event.target.files[0];
        if (!file) return;
        processFile(file, file.name);
    }

    function processFile(file, fileName) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (detectionInterval) clearInterval(detectionInterval);

        const reader = new FileReader();
        reader.onload = function(e) {
            sessionStorage.setItem('vitae_scan_file', e.target.result);
            sessionStorage.setItem('vitae_scan_filename', fileName);
            sessionStorage.setItem('vitae_scan_tipo', tipo);
            window.location.href = '27-processando.html?tipo=' + tipo + '&from=' + from;
        };
        reader.readAsDataURL(file);
    }

    function goBack() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (detectionInterval) clearInterval(detectionInterval);
        if (from === 'alergias' || tipo === 'alergia') {
            window.location.href = '17-alergias.html';
        } else {
            window.location.href = '16-medicamentos.html';
        }
    }

    // Init
    startCamera();
</script>
</body>
</html>
