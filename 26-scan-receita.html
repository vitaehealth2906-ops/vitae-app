<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Escanear Receita</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#F4F6FA; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone { width:393px; max-width:100vw; height:852px; max-height:100vh; background:#F4F6FA; border-radius:52px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(0,229,160,0.15),0 0 0 3px #1A1E26,0 40px 120px rgba(0,0,0,0.9); }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#F4F6FA; border-radius:0 0 20px 20px; z-index:10; }
        .status { position:absolute; top:14px; left:28px; right:28px; display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:#9CA3AF; z-index:11; }
        .exit-overlay { position:absolute; inset:0; background:#F4F6FA; opacity:0; z-index:25; pointer-events:none; transition:opacity 0.5s ease; }
        .exit-overlay.active { opacity:1; }
        .content { height:100%; overflow-y:auto; padding:55px 24px 24px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .hdr { display:flex; align-items:center; gap:14px; margin-bottom:20px; opacity:0; animation:fadeUp 0.4s ease 0.3s both; }
        .back-btn { width:40px; height:40px; border-radius:12px; background:#fff; border:1px solid rgba(0,0,0,0.07); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all 0.2s; }
        .back-btn:active { transform:scale(0.92); }
        .page-title { font-size:26px; font-weight:700; color:#0D0F14; }
        .page-title span { color:#00E5A0; font-style:italic; }
        .page-subtitle { font-size:13px; color:#9CA3AF; margin-top:2px; }

        /* Camera viewfinder */
        .camera-wrap {
            position:relative; width:100%; height:340px;
            background:#0D0F14; border-radius:20px;
            overflow:hidden; margin-bottom:16px;
            opacity:0; animation:fadeUp 0.4s ease 0.4s both;
        }
        .camera-feed {
            width:100%; height:100%; object-fit:cover;
            display:block;
        }
        .camera-placeholder {
            position:absolute; inset:0;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:rgba(255,255,255,0.4); font-size:13px; font-weight:500; gap:10px;
        }
        .camera-placeholder svg { width:32px; height:32px; stroke:rgba(0,229,160,0.4); }
        .camera-mode {
            position:absolute; top:12px; left:0; right:0;
            text-align:center; font-size:10px; font-weight:700;
            color:rgba(0,229,160,0.6); z-index:5;
            display:flex; align-items:center; justify-content:center; gap:5px;
        }
        .camera-mode svg { width:12px; height:12px; stroke:rgba(0,229,160,0.6); }

        /* Scan frame overlay */
        .scan-overlay {
            position:absolute; inset:0;
            display:flex; align-items:center; justify-content:center;
            pointer-events:none; z-index:4;
        }
        .scan-frame {
            width:260px; height:180px;
            border:1.5px solid rgba(0,229,160,0.3);
            border-radius:16px; position:relative;
        }
        .scan-frame::before {
            content:''; position:absolute; top:-1px; left:20px; right:20px;
            height:2px; background:linear-gradient(90deg,transparent,#00E5A0,transparent);
            border-radius:1px; animation:scanLine 2.5s ease-in-out infinite;
        }
        @keyframes scanLine { 0%{top:-1px;opacity:1} 50%{top:calc(100% - 1px);opacity:0.4} 100%{top:-1px;opacity:1} }
        .corner { position:absolute; width:16px; height:16px; border-style:solid; border-color:#00E5A0; border-width:0; }
        .corner.tl { top:-1px;left:-1px;border-top-width:3px;border-left-width:3px;border-radius:6px 0 0 0; }
        .corner.tr { top:-1px;right:-1px;border-top-width:3px;border-right-width:3px;border-radius:0 6px 0 0; }
        .corner.bl { bottom:-1px;left:-1px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 6px; }
        .corner.br { bottom:-1px;right:-1px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 6px 0; }

        .camera-hint {
            position:absolute; bottom:14px; left:0; right:0;
            text-align:center; font-size:11px; font-weight:500;
            color:rgba(255,255,255,0.45); z-index:5;
        }

        /* Shutter button */
        .shutter-row {
            display:flex; align-items:center; justify-content:center; gap:24px;
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.4s ease 0.5s both;
        }
        .shutter {
            width:64px; height:64px; border-radius:50%;
            border:3px solid rgba(0,0,0,0.1); background:#fff;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 2px 16px rgba(0,0,0,0.08);
            transition:all 0.15s;
        }
        .shutter:active { transform:scale(0.9); }
        .shutter-inner { width:52px; height:52px; border-radius:50%; background:rgba(0,229,160,0.08); transition:all 0.15s; }
        .shutter:active .shutter-inner { background:rgba(0,229,160,0.2); }
        .shutter-side {
            width:44px; height:44px; border-radius:50%;
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s;
        }
        .shutter-side:active { transform:scale(0.9); }
        .shutter-side svg { width:20px; height:20px; stroke:#9CA3AF; }

        /* Mode switcher */
        .mode-switch {
            display:flex; justify-content:center; gap:6px;
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.4s ease 0.55s both;
        }
        .mode-btn {
            padding:8px 18px; border-radius:12px;
            background:#fff; border:1px solid rgba(0,0,0,0.07);
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:12px; font-weight:600; color:#9CA3AF;
            cursor:pointer; transition:all 0.25s;
            display:flex; align-items:center; gap:6px;
        }
        .mode-btn svg { width:14px; height:14px; stroke:#9CA3AF; }
        .mode-btn.active {
            background:rgba(0,229,160,0.06); border-color:rgba(0,229,160,0.2);
            color:#00E5A0;
        }
        .mode-btn.active svg { stroke:#00E5A0; }
        .mode-btn:active { transform:scale(0.96); }

        /* Upload alternative */
        .upload-alt {
            background:#fff; border:1.5px dashed rgba(0,0,0,0.1);
            border-radius:16px; padding:18px; text-align:center;
            cursor:pointer; transition:all 0.25s;
            opacity:0; animation:fadeUp 0.4s ease 0.6s both;
        }
        .upload-alt:hover { border-color:rgba(0,229,160,0.3); background:rgba(0,229,160,0.02); }
        .upload-alt:active { transform:scale(0.98); }
        .upload-alt-title { font-size:13px; font-weight:700; color:#0D0F14; margin-bottom:2px; }
        .upload-alt-sub { font-size:11px; color:#9CA3AF; }

        /* Toast */
        .toast { position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-20px); background:rgba(255,255,255,0.95); backdrop-filter:blur(24px); border:1px solid rgba(0,0,0,0.07); border-radius:14px; padding:14px 22px; display:flex; align-items:center; gap:10px; z-index:50; opacity:0; pointer-events:none; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(0,229,160,0.15); }
        .toast-text { font-size:13px; font-weight:600; color:#0D0F14; }

        /* Hidden file input */
        .file-input { display:none; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:480px){body{padding:0!important;background:#F4F6FA!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>&#9679;&#9679;&#9679; &#128267;</span></div>
    <div class="exit-overlay" id="exitOverlay"></div>
    <input type="file" accept="image/*,application/pdf" class="file-input" id="fileInput" onchange="handleFileSelect(event)">
    <input type="file" accept="image/*" capture="environment" class="file-input" id="cameraInput" onchange="handleFileSelect(event)">

    <div class="toast" id="toast">
        <div class="toast-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="toast-text" id="toastText"></span>
    </div>

    <div class="content">
        <div class="hdr">
            <div class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div>
                <div class="page-title">Escanear <span id="modeTitle">receita</span></div>
                <div class="page-subtitle">Enquadre o documento</div>
            </div>
        </div>

        <!-- Camera viewfinder -->
        <div class="camera-wrap" id="cameraWrap">
            <video class="camera-feed" id="cameraFeed" autoplay playsinline muted style="display:none"></video>
            <canvas id="cameraCanvas" style="display:none"></canvas>
            <div class="camera-placeholder" id="cameraPlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                <span>Toque para ativar a camera</span>
            </div>
            <div class="camera-mode" id="cameraModeLabel">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Receita medica
            </div>
            <div class="scan-overlay">
                <div class="scan-frame">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                </div>
            </div>
            <div class="camera-hint">Posicione o documento dentro da area</div>
        </div>

        <!-- Shutter + gallery -->
        <div class="shutter-row">
            <div class="shutter-side" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
            <div class="shutter" id="shutterBtn" onclick="capturePhoto()">
                <div class="shutter-inner"></div>
            </div>
            <div class="shutter-side" onclick="toggleCameraFacing()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>
            </div>
        </div>

        <!-- Mode switcher -->
        <div class="mode-switch">
            <div class="mode-btn active" id="modeReceita" onclick="setMode('receita')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Receita
            </div>
            <div class="mode-btn" id="modeCaixa" onclick="setMode('caixa')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                Embalagem
            </div>
            <div class="mode-btn" id="modeArquivo" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Arquivo
            </div>
        </div>

        <!-- Upload from gallery -->
        <div class="upload-alt" onclick="document.getElementById('fileInput').click()">
            <div class="upload-alt-title">Ja tem a foto ou PDF salvo?</div>
            <div class="upload-alt-sub">Toque aqui para selecionar da galeria</div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // Get tipo from URL params
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo') || 'receita'; // receita, caixa, alergia
    const from = params.get('from') || 'medicamentos';

    let currentMode = tipo === 'caixa' ? 'caixa' : 'receita';
    let cameraStream = null;
    let facingMode = 'environment';

    // Update UI based on tipo
    if (tipo === 'alergia') {
        document.getElementById('modeTitle').textContent = 'resultado';
        document.getElementById('cameraModeLabel').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Resultado de exame';
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if (mode === 'receita') {
            document.getElementById('modeReceita').classList.add('active');
            document.getElementById('modeTitle').textContent = tipo === 'alergia' ? 'resultado' : 'receita';
            document.getElementById('cameraModeLabel').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ' + (tipo === 'alergia' ? 'Resultado de exame' : 'Receita medica');
        } else if (mode === 'caixa') {
            document.getElementById('modeCaixa').classList.add('active');
            document.getElementById('modeTitle').textContent = 'embalagem';
            document.getElementById('cameraModeLabel').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg> Embalagem';
        }
    }

    // Camera
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            cameraStream = stream;
            const video = document.getElementById('cameraFeed');
            video.srcObject = stream;
            video.style.display = 'block';
            document.getElementById('cameraPlaceholder').style.display = 'none';
        } catch (e) {
            console.log('Camera nao disponivel:', e.message);
            // Fallback: show file input instead
            document.getElementById('cameraPlaceholder').innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,229,160,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                <span>Camera nao disponivel</span>
                <span style="font-size:11px;color:rgba(255,255,255,0.3)">Use o botao abaixo para selecionar uma foto</span>
            `;
        }
    }

    function toggleCameraFacing() {
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }
        startCamera();
    }

    function capturePhoto() {
        const video = document.getElementById('cameraFeed');
        if (!video.srcObject) {
            // No camera — open file picker instead
            document.getElementById('cameraInput').click();
            return;
        }
        const canvas = document.getElementById('cameraCanvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(function(blob) {
            if (blob) {
                processFile(blob, 'captura_camera.jpg');
            }
        }, 'image/jpeg', 0.85);
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        processFile(file, file.name);
    }

    function processFile(file, fileName) {
        // Stop camera
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }

        // Store file in sessionStorage as base64 for the processing screen
        const reader = new FileReader();
        reader.onload = function(e) {
            sessionStorage.setItem('vitae_scan_file', e.target.result);
            sessionStorage.setItem('vitae_scan_filename', fileName);
            sessionStorage.setItem('vitae_scan_tipo', tipo);
            sessionStorage.setItem('vitae_scan_mode', currentMode);

            // Navigate to processing screen
            document.getElementById('exitOverlay').classList.add('active');
            setTimeout(() => {
                window.location.href = '27-processando.html?tipo=' + tipo + '&from=' + from;
            }, 400);
        };
        reader.readAsDataURL(file);
    }

    // Toast
    let toastTimer;
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Navigation
    function goBack() {
        if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
        document.getElementById('exitOverlay').classList.add('active');
        setTimeout(() => {
            if (from === 'alergias' || tipo === 'alergia') window.location.href = '17-alergias.html';
            else window.location.href = '16-medicamentos.html';
        }, 400);
    }

    // Init
    if (tipo === 'caixa') setMode('caixa');

    // Try to start camera on tap
    document.getElementById('cameraWrap').addEventListener('click', function() {
        if (!cameraStream) startCamera();
    });

    // Auto-start camera on mobile
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
        setTimeout(startCamera, 500);
    }
</script>
</body>
</html>
