<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Verificação</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        .content {
            height:100%;
            padding:80px 28px 40px;
            display:flex; flex-direction:column;
            align-items:center;
        }

        /* Back button */
        .back-btn {
            position:absolute; top:60px; left:28px;
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5);
            z-index:5;
            transition:all 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); }

        /* Header */
        .verify-header {
            text-align:center;
            margin-top:40px;
            margin-bottom:16px;
        }
        .verify-icon {
            width:80px; height:80px; border-radius:24px;
            background:rgba(0,153,196,0.08);
            border:1px solid rgba(0,153,196,0.15);
            display:flex; align-items:center; justify-content:center;
            font-size:36px; margin:0 auto 24px;
        }
        .verify-title {
            font-family:'Playfair Display', serif;
            font-size:28px; font-weight:700;
            color:#fff; margin-bottom:8px;
        }
        .verify-sub {
            font-size:14px; color:rgba(255,255,255,0.35);
            line-height:1.5;
        }
        .verify-phone {
            font-weight:700; color:#0099C4;
        }

        /* Code input */
        .code-wrap {
            display:flex; gap:10px;
            margin:36px 0;
        }
        .code-digit {
            width:50px; height:62px;
            background:rgba(255,255,255,0.04);
            border:1.5px solid rgba(255,255,255,0.1);
            border-radius:14px;
            font-family:'Inter',sans-serif;
            font-size:24px; font-weight:800;
            color:#fff; text-align:center;
            outline:none;
            transition:all 0.3s ease;
            caret-color:#0099C4;
        }
        .code-digit:focus {
            border-color:#0099C4;
            background:rgba(0,153,196,0.04);
            box-shadow:0 0 0 3px rgba(0,153,196,0.1);
        }
        .code-digit.filled {
            border-color:rgba(0,153,196,0.3);
            background:rgba(0,153,196,0.06);
        }
        .code-digit.success {
            border-color:#0099C4;
            background:rgba(0,153,196,0.06);
            color:#0099C4;
        }

        /* iOS autofill simulation */
        .autofill-banner {
            display:none;
            width:100%;
            padding:14px 18px;
            background:rgba(0,153,196,0.08);
            border:1px solid rgba(0,153,196,0.2);
            border-radius:14px;
            margin-bottom:24px;
            cursor:pointer;
            transition:all 0.2s;
            animation: bannerSlide 0.4s ease;
        }
        .autofill-banner.show { display:flex; align-items:center; gap:14px; }
        .autofill-banner:hover { background:rgba(0,153,196,0.12); }
        @keyframes bannerSlide {
            from { transform:translateY(-10px); opacity:0; }
            to { transform:translateY(0); opacity:1; }
        }
        .autofill-icon {
            width:36px; height:36px; border-radius:10px;
            background:rgba(0,153,196,0.15);
            display:flex; align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0;
        }
        .autofill-info { flex:1; }
        .autofill-label {
            font-size:11px; font-weight:600;
            color:rgba(0,153,196,0.6);
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .autofill-code {
            font-size:18px; font-weight:800;
            color:#0099C4; letter-spacing:4px;
        }
        .autofill-action {
            font-size:11px; font-weight:600;
            color:#0099C4;
        }

        /* Resend */
        .resend {
            text-align:center;
            margin-bottom:32px;
        }
        .resend-text {
            font-size:13px; color:rgba(255,255,255,0.3);
        }
        .resend-timer {
            font-weight:700; color:#0099C4;
        }
        .resend-btn {
            display:none;
            background:none; border:none;
            font-family:'Inter',sans-serif;
            font-size:14px; font-weight:600;
            color:#0099C4; cursor:pointer;
            text-decoration:underline;
        }

        /* CTA */
        .btn-primary {
            width:100%; padding:18px;
            background: linear-gradient(135deg, #00B4D8, #007A9E);
            border:none; border-radius:16px;
            font-family:'Inter',sans-serif;
            font-size:16px; font-weight:700;
            color:#ffffff; cursor:pointer;
            letter-spacing:0.5px;
            transition:all 0.2s ease;
            opacity:0.4;
            margin-top:auto;
        }
        .btn-primary.enabled {
            opacity:1;
        }
        .btn-primary.enabled:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 32px rgba(0,153,196,0.3);
        }

        /* Success state */
        .success-overlay {
            display:none;
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(10,10,10,0.95);
            z-index:20;
            flex-direction:column;
            align-items:center; justify-content:center;
        }
        .success-overlay.show {
            display:flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .success-check {
            width:80px; height:80px; border-radius:50%;
            background:rgba(0,153,196,0.1);
            border:2px solid #0099C4;
            display:flex; align-items:center; justify-content:center;
            font-size:36px; margin-bottom:24px;
            animation: checkPop 0.5s ease 0.2s both;
        }
        @keyframes checkPop {
            from { transform:scale(0); }
            to { transform:scale(1); }
        }
        .success-text {
            font-size:18px; font-weight:700;
            color:#fff;
        }
    @media(max-width:430px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>●●● 🔋</span></div>

    <div class="back-btn" onclick="history.back()">←</div>

    <div class="content">
        <div class="verify-header">
            <div class="verify-icon">💬</div>
            <div class="verify-title">Verificação</div>
            <div class="verify-sub">
                Enviamos um código de 6 dígitos para<br>
                <span class="verify-phone">(11) 99999-9999</span>
            </div>
        </div>

        <!-- iOS-style autofill banner -->
        <div class="autofill-banner" id="autofillBanner" onclick="autofillCode()">
            <div class="autofill-icon">📩</div>
            <div class="autofill-info">
                <div class="autofill-label">Mensagens</div>
                <div class="autofill-code" id="autofillCodeText">847291</div>
            </div>
            <div class="autofill-action">Inserir ↗</div>
        </div>

        <!-- Code digits -->
        <div class="code-wrap">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d0" oninput="onDigit(0)" onkeydown="onKey(event,0)" autofocus>
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d1" oninput="onDigit(1)" onkeydown="onKey(event,1)">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d2" oninput="onDigit(2)" onkeydown="onKey(event,2)">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d3" oninput="onDigit(3)" onkeydown="onKey(event,3)">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d4" oninput="onDigit(4)" onkeydown="onKey(event,4)">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric" id="d5" oninput="onDigit(5)" onkeydown="onKey(event,5)">
        </div>

        <div class="resend">
            <div class="resend-text" id="resendText">
                Reenviar código em <span class="resend-timer" id="timer">60s</span>
            </div>
            <button class="resend-btn" id="resendBtn" onclick="resendCode()">Reenviar código</button>
        </div>

        <button class="btn-primary" id="btnVerify" onclick="verify()">Verificar</button>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-check">✓</div>
        <div class="success-text">Conta verificada!</div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const celular = localStorage.getItem('vitae_celular_verificacao') || '+5511999999999';
    const digits = [0,1,2,3,4,5].map(i => document.getElementById('d'+i));

    // Mostrar numero real do usuario
    const phoneDisplay = document.querySelector('.verify-phone');
    if (phoneDisplay && celular) {
        const num = celular.replace('+55', '');
        const ddd = num.slice(0,2);
        const parte1 = num.slice(2,7);
        const parte2 = num.slice(7);
        phoneDisplay.textContent = `(${ddd}) ${parte1}-${parte2}`;
    }

    // DEV: Mostrar banner com codigo do console (o backend loga no console)
    // Em dev mode, o codigo aparece no console do backend
    setTimeout(() => {
        document.getElementById('autofillBanner').classList.add('show');
        document.getElementById('autofillCodeText').textContent = 'Ver console';
    }, 1500);

    function autofillCode() {
        document.getElementById('autofillBanner').classList.remove('show');
        // Em dev, o usuario precisa digitar o codigo que aparece no console do backend
        digits[0].focus();
    }

    function onDigit(i) {
        const val = digits[i].value.replace(/\D/g, '');
        digits[i].value = val;
        if (val) {
            digits[i].classList.add('filled');
            if (i < 5) digits[i+1].focus();
        }
        checkComplete();
    }

    function onKey(e, i) {
        if (e.key === 'Backspace' && !digits[i].value && i > 0) {
            digits[i-1].focus();
            digits[i-1].value = '';
            digits[i-1].classList.remove('filled');
        }
    }

    function checkComplete() {
        const full = digits.every(d => d.value.length === 1);
        document.getElementById('btnVerify').classList.toggle('enabled', full);
    }

    async function verify() {
        const entered = digits.map(d => d.value).join('');
        if (entered.length !== 6) return;

        const btnVerify = document.getElementById('btnVerify');
        btnVerify.textContent = 'Verificando...';
        btnVerify.style.pointerEvents = 'none';

        try {
            await vitaeAPI.verificarSms(celular, entered);
            digits.forEach(d => d.classList.add('success'));
            setTimeout(() => {
                document.getElementById('successOverlay').classList.add('show');
                setTimeout(() => {
                    window.location.href = '05-quiz.html';
                }, 1200);
            }, 500);
        } catch (err) {
            digits.forEach(d => {
                d.value = '';
                d.classList.remove('filled', 'success');
            });
            digits[0].focus();
            btnVerify.textContent = 'Verificar';
            btnVerify.style.pointerEvents = 'auto';
            alert(err.message || 'Codigo incorreto. Tente novamente.');
        }
    }

    // Timer countdown
    let seconds = 60;
    const timerEl = document.getElementById('timer');
    const resendText = document.getElementById('resendText');
    const resendBtn = document.getElementById('resendBtn');

    const interval = setInterval(() => {
        seconds--;
        timerEl.textContent = seconds + 's';
        if (seconds <= 0) {
            clearInterval(interval);
            resendText.style.display = 'none';
            resendBtn.style.display = 'inline';
        }
    }, 1000);

    function resendCode() {
        resendBtn.style.display = 'none';
        resendText.style.display = 'block';
        seconds = 60;
        timerEl.textContent = '60s';
        // TODO: chamar endpoint de reenvio quando implementado
        const interval2 = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds + 's';
            if (seconds <= 0) {
                clearInterval(interval2);
                resendText.style.display = 'none';
                resendBtn.style.display = 'inline';
            }
        }, 1000);
    }
</script>
</body>
</html>
