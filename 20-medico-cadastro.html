<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Cadastro Médico</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0D0F14;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#0D0F14; border-radius:0 0 20px 20px; z-index:10; }

        .content { height:100%; overflow-y:auto; padding:70px 28px 40px; }

        .page-title {
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:28px; font-weight:700; color:#fff;
            margin-bottom:4px;
        }
        .page-title span { color:#00E5A0; font-style:italic; }
        .page-sub { font-size:14px; color:rgba(255,255,255,0.3); margin-bottom:32px; }

        .field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
        .field-label { font-size:12px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px; }
        .field-input {
            width:100%; padding:16px 18px;
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:500;
            color:#fff; outline:none; transition:all 0.3s;
        }
        .field-input::placeholder { color:rgba(255,255,255,0.2); }
        .field-input:focus { border-color:rgba(0,229,160,0.3); }
        .field-row { display:flex; gap:12px; }
        .field-row .field { flex:1; }

        select.field-input {
            appearance:none;
            background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23666' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat:no-repeat;
            background-position:right 16px center;
            color-scheme:dark;
        }

        .btn-primary {
            width:100%; padding:18px;
            background:linear-gradient(120deg, #00E5A0, #00B4D8);
            border:none; border-radius:16px;
            font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; font-weight:700;
            color:#ffffff; cursor:pointer; margin-top:16px;
            transition:all 0.25s;
        }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,229,160,0.3); }

        .error-msg {
            display:none; background:rgba(217,68,82,0.12);
            border:1px solid rgba(217,68,82,0.3); border-radius:12px;
            padding:12px 16px; font-size:13px; color:#EF4444; text-align:center;
            margin-top:12px;
        }
    @media(max-width:480px){body{padding:0!important;background:#FFFFFF!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="page-title">Cadastro <span>Médico</span></div>
        <div class="page-sub">Complete seu perfil profissional para usar o Pré-Consulta</div>

        <div class="field-row">
            <div class="field">
                <div class="field-label">CRM</div>
                <input class="field-input" type="text" id="crmInput" placeholder="123456">
            </div>
            <div class="field" style="max-width:100px;">
                <div class="field-label">UF</div>
                <select class="field-input" id="ufInput">
                    <option value="">UF</option>
                    <option>AC</option><option>AL</option><option>AM</option><option>AP</option>
                    <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                    <option>GO</option><option>MA</option><option>MG</option><option>MS</option>
                    <option>MT</option><option>PA</option><option>PB</option><option>PE</option>
                    <option>PI</option><option>PR</option><option>RJ</option><option>RN</option>
                    <option>RO</option><option>RR</option><option>RS</option><option>SC</option>
                    <option>SE</option><option selected>SP</option><option>TO</option>
                </select>
            </div>
        </div>

        <div class="field">
            <div class="field-label">Especialidade</div>
            <select class="field-input" id="espInput">
                <option value="">Selecione...</option>
                <option>Clínica Geral</option><option>Cardiologia</option><option>Dermatologia</option>
                <option>Endocrinologia</option><option>Gastroenterologia</option><option>Ginecologia</option>
                <option>Neurologia</option><option>Oftalmologia</option><option>Ortopedia</option>
                <option>Otorrinolaringologia</option><option>Pediatria</option><option>Psiquiatria</option>
                <option>Urologia</option><option>Outra</option>
            </select>
        </div>

        <div class="field">
            <div class="field-label">Nome da Clínica (opcional)</div>
            <input class="field-input" type="text" id="clinicaInput" placeholder="Ex: Clínica São Lucas">
        </div>

        <div class="field">
            <div class="field-label">Endereço da Clínica (opcional)</div>
            <input class="field-input" type="text" id="enderecoInput" placeholder="Rua, número, bairro">
        </div>

        <div class="field">
            <div class="field-label">Telefone da Clínica (opcional)</div>
            <input class="field-input" type="tel" id="telInput" placeholder="(11) 3333-4444">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <button class="btn-primary" onclick="cadastrar()">Criar perfil médico</button>
    </div>
</div>

<script src="api.js"></script>
<script>
    async function cadastrar() {
        const crm = document.getElementById('crmInput').value.trim();
        const ufCrm = document.getElementById('ufInput').value;
        const especialidade = document.getElementById('espInput').value;
        const clinica = document.getElementById('clinicaInput').value.trim();
        const enderecoClinica = document.getElementById('enderecoInput').value.trim();
        const telefoneClinica = document.getElementById('telInput').value.trim();

        if (!crm || !ufCrm || !especialidade) {
            const err = document.getElementById('errorMsg');
            err.textContent = 'Preencha CRM, UF e especialidade.';
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
            return;
        }

        try {
            await vitaeAPI.cadastroMedico({
                crm, ufCrm, especialidade, clinica, enderecoClinica, telefoneClinica,
            });
            // Update local user data
            const u = vitaeAPI.getUsuario();
            if (u) { u.tipo = 'MEDICO'; vitaeAPI.setUsuario(u); }
            window.location.href = '20-medico-dashboard.html';
        } catch (e) {
            const err = document.getElementById('errorMsg');
            err.textContent = e.message;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 5000);
        }
    }
</script>
</body>
</html>
