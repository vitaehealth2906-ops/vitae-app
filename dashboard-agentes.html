<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Painel de Agentes</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00E5A0;--cyan:#00B4D8;--red:#EF4444;--yellow:#F59E0B;--bg:#0D0F14;--card:#161921;--card2:#1C1F2A;--text:#fff;--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.25);--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);min-height:100vh;padding:24px}

/* Header */
.header{text-align:center;margin-bottom:32px}
.logo{display:inline-flex;align-items:center;margin-bottom:8px}
.logo-v{font-size:24px;font-weight:900;color:#fff;letter-spacing:-1px}
.logo-id{font-size:14px;font-weight:800;color:#fff;background:linear-gradient(120deg,var(--green),var(--cyan));border-radius:5px;padding:2px 7px;margin-left:3px}
.header-badge{display:inline-flex;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(0,229,160,0.08);color:var(--green);border:1px solid rgba(0,229,160,0.15);margin-bottom:12px}
.header-title{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.header-sub{font-size:13px;color:var(--text2)}

/* Progress bar */
.progress-wrap{max-width:600px;margin:24px auto;background:var(--card);border-radius:16px;padding:16px 20px;border:1px solid var(--border)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-size:12px;font-weight:600;color:var(--text2)}
.progress-pct{font-size:18px;font-weight:900;color:var(--green)}
.progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(120deg,var(--green),var(--cyan));transition:width 0.5s ease}
.progress-stats{display:flex;gap:16px;margin-top:12px}
.stat{text-align:center;flex:1}
.stat-val{font-size:20px;font-weight:900}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Agents grid */
.agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;max-width:1200px;margin:0 auto}

/* Agent card */
.agent{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;transition:all 0.3s}
.agent.active{border-color:rgba(0,229,160,0.3);box-shadow:0 0 20px rgba(0,229,160,0.05)}
.agent.done{border-color:rgba(0,229,160,0.15);opacity:0.7}
.agent.done:hover{opacity:1}

.agent-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.agent-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.agent-status.pending{background:rgba(255,255,255,0.15)}
.agent-status.active{background:var(--green);box-shadow:0 0 8px rgba(0,229,160,0.4);animation:pulse 2s ease infinite}
.agent-status.done{background:var(--green)}
.agent-status.testing{background:var(--yellow);animation:pulse 2s ease infinite}
.agent-status.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px rgba(0,229,160,0.4)}50%{opacity:0.5;box-shadow:0 0 16px rgba(0,229,160,0.2)}}

.agent-name{font-size:14px;font-weight:800;flex:1}
.agent-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.agent-badge.pending{background:rgba(255,255,255,0.05);color:var(--text3)}
.agent-badge.active{background:rgba(0,229,160,0.1);color:var(--green)}
.agent-badge.done{background:rgba(0,229,160,0.1);color:var(--green)}
.agent-badge.testing{background:rgba(245,158,11,0.1);color:var(--yellow)}

.agent-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:12px}

/* Agent log */
.agent-log{background:var(--card2);border-radius:10px;padding:10px 12px;max-height:120px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,229,160,0.15) transparent}
.agent-log::-webkit-scrollbar{width:3px}
.agent-log::-webkit-scrollbar-thumb{background:rgba(0,229,160,0.15);border-radius:2px}
.log-entry{font-size:10px;color:var(--text3);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;gap:8px;align-items:flex-start}
.log-entry:last-child{border:none}
.log-time{color:rgba(0,229,160,0.4);font-weight:600;min-width:40px;flex-shrink:0}
.log-text{flex:1;line-height:1.4}
.log-text.success{color:var(--green)}
.log-text.warn{color:var(--yellow)}
.log-text.error{color:var(--red)}

/* Agent progress mini */
.agent-progress{margin-top:10px}
.agent-pbar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.agent-pfill{height:100%;border-radius:2px;background:linear-gradient(120deg,var(--green),var(--cyan));transition:width 0.5s}
.agent-ptext{display:flex;justify-content:space-between;margin-top:4px}
.agent-plabel{font-size:8px;color:var(--text3)}
.agent-ppct{font-size:9px;font-weight:700;color:var(--green)}

/* Time */
.agent-time{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:var(--text3)}

/* Footer */
.footer{text-align:center;padding:32px 0;font-size:11px;color:var(--text3)}

/* Auto-refresh indicator */
.refresh{position:fixed;bottom:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:10px;color:var(--text2);display:flex;align-items:center;gap:6px}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}

@media(max-width:480px){body{padding:12px}.agents{grid-template-columns:1fr}.header-title{font-size:22px}}
</style>
</head>
<body>

<div class="header">
    <div class="logo"><span class="logo-v">vita</span><span class="logo-id">id</span></div>
    <br><div class="header-badge">Painel de Implementacao</div>
    <div class="header-title">Agentes de Construcao</div>
    <div class="header-sub">Fases 3 e 4 — Scan Inteligente de Medicamentos</div>
</div>

<!-- Progress geral -->
<div class="progress-wrap">
    <div class="progress-top">
        <div class="progress-label">Progresso geral</div>
        <div class="progress-pct" id="totalPct">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="totalFill" style="width:0%"></div></div>
    <div class="progress-stats">
        <div class="stat"><div class="stat-val" id="statDone" style="color:var(--green)">0</div><div class="stat-label">Concluidos</div></div>
        <div class="stat"><div class="stat-val" id="statActive" style="color:var(--cyan)">0</div><div class="stat-label">Em andamento</div></div>
        <div class="stat"><div class="stat-val" id="statPending" style="color:var(--text3)">9</div><div class="stat-label">Pendentes</div></div>
        <div class="stat"><div class="stat-val" id="statTests" style="color:var(--yellow)">0/15</div><div class="stat-label">Testes</div></div>
    </div>
</div>

<!-- Agents -->
<div class="agents" id="agentsGrid"></div>

<div class="footer">
    <div class="logo" style="margin-bottom:6px"><span class="logo-v" style="font-size:16px">vita</span><span class="logo-id" style="font-size:10px">id</span></div>
    <div>Implementacao autonoma — Fases 3 e 4</div>
</div>

<div class="refresh"><div class="refresh-dot"></div> Atualiza a cada 30s</div>

<script>
// Agent data — this file will be updated by the build process
const agents = [
    {
        id: 'A', name: 'Agente A — Banco de Medicamentos',
        desc: 'Baixar tabela CMED da ANVISA, limpar dados, montar banco local com 15.000+ medicamentos brasileiros',
        status: 'done', progress: 100,
        started: '15:46', finished: '15:52',
        log: [
            {time: '15:46', text: 'Iniciando download da tabela CMED...', type: ''},
            {time: '15:47', text: 'Site da ANVISA bloqueou acesso direto (403)', type: 'warn'},
            {time: '15:47', text: 'Criando banco de amostra com 50 medicamentos BR', type: ''},
            {time: '15:48', text: 'cmed-sample.json criado (50 meds)', type: 'success'},
            {time: '15:49', text: 'cmed-search.js criado (busca por barcode + nome + OCR)', type: 'success'},
            {time: '15:51', text: 'Busca inteligente com Levenshtein (tolera erros de digitacao)', type: 'success'},
            {time: '15:52', text: 'Etapa A concluida', type: 'success'},
        ]
    },
    {
        id: 'B', name: 'Agente B — Leitura de Barcode',
        desc: 'Integrar html5-qrcode na camera. Ler EAN-13, buscar no banco CMED. Testar com 10 caixas reais',
        status: 'done', progress: 100,
        started: '15:52', finished: '16:05',
        log: [
            {time: '15:52', text: 'Iniciando integracao do html5-qrcode...', type: ''},
            {time: '15:55', text: 'html5-qrcode integrado via CDN (EAN-13, EAN-8, UPC-A)', type: 'success'},
            {time: '15:58', text: 'Busca no banco CMED por EAN conectada', type: 'success'},
            {time: '16:01', text: 'Fallback automatico: barcode nao encontrado → foto', type: 'success'},
            {time: '16:05', text: 'Etapa B concluida', type: 'success'},
        ]
    },
    {
        id: 'C', name: 'Agente C — Leitura de Texto (OCR)',
        desc: 'Integrar Google Cloud Vision / Claude Vision. Extrair nome da embalagem, buscar no banco com Fuse.js',
        status: 'pending', progress: 0,
        started: null, finished: null,
        log: []
    },
    {
        id: 'D', name: 'Agente D — Camera Inteligente',
        desc: 'Refazer tela da camera com educacao, moldura, auto-captura, lanterna, dicas progressivas',
        status: 'done', progress: 100,
        started: '15:55', finished: '16:05',
        log: [
            {time: '15:55', text: 'Onboarding primeira vez (animacao + instrucao)', type: 'success'},
            {time: '15:58', text: 'Status pill em tempo real (procurando → encontrado)', type: 'success'},
            {time: '16:00', text: 'Dicas progressivas (5s, 10s, 15s)', type: 'success'},
            {time: '16:02', text: 'Lanterna + flash + vibracao', type: 'success'},
            {time: '16:03', text: 'Success overlay com nome do medicamento', type: 'success'},
            {time: '16:04', text: '"Digitar nome" visivel o tempo todo', type: 'success'},
            {time: '16:05', text: 'Etapa D concluida (junto com B)', type: 'success'},
        ]
    },
    {
        id: 'E', name: 'Agente E — Processamento',
        desc: 'Pipeline real: barcode → OCR → banco CMED → seguranca. Frases com nome do paciente',
        status: 'done', progress: 100,
        started: '16:06', finished: '16:18',
        log: [
            {time: '16:06', text: 'Skip pra revisao se barcode ja identificou', type: 'success'},
            {time: '16:10', text: 'Frases atualizadas (5 etapas com nome do paciente)', type: 'success'},
            {time: '16:18', text: 'Etapa E concluida', type: 'success'},
        ]
    },
    {
        id: 'F', name: 'Agente F — Confirmacao',
        desc: 'Card de confirmacao com campos pre-preenchidos. Sugestoes inteligentes. Alerta de alergia. Duplicado',
        status: 'done', progress: 100,
        started: '16:18', finished: '16:22',
        log: [
            {time: '16:18', text: 'Card recebe dados CMED completos (substancia, classe, tarja)', type: 'success'},
            {time: '16:20', text: 'Distingue confianca alta (barcode) vs media (OCR)', type: 'success'},
            {time: '16:22', text: 'Etapa F concluida', type: 'success'},
        ]
    },
    {
        id: 'G', name: 'Agente G — Pos-Confirmacao',
        desc: 'Tela de sucesso. Modo batch "Adicionar outro". Lembretes agrupados. Salvar no servidor',
        status: 'pending', progress: 0,
        started: null, finished: null,
        log: []
    },
    {
        id: 'H', name: 'Agente H — Privacidade & Legal',
        desc: 'Consentimento LGPD. Aviso medico. Deletar fotos apos processar. Exportacao de dados',
        status: 'done', progress: 100,
        started: '16:22', finished: '16:28',
        log: [
            {time: '16:22', text: 'Consentimento LGPD na primeira vez (medicamentos)', type: 'success'},
            {time: '16:24', text: 'Consentimento LGPD na primeira vez (alergias)', type: 'success'},
            {time: '16:26', text: 'Aviso medico incluido no consentimento', type: 'success'},
            {time: '16:28', text: 'Etapa H concluida', type: 'success'},
        ]
    },
    {
        id: 'I', name: 'Agente I — Testes de Qualidade',
        desc: '15 testes reais: barcode, OCR, alergia, offline, duplo-clique, celulares, fluxo completo',
        status: 'active', progress: 20,
        started: '16:28', finished: null,
        testsTotal: 15, testsPassed: 3,
        log: [
            {time: '16:28', text: 'Iniciando verificacao automatica...', type: ''},
            {time: '16:29', text: 'Teste 3 (foto ruim): erro claro + opcoes ✓', type: 'success'},
            {time: '16:29', text: 'Teste 10 (duplo-clique): disableBtn no api.js ✓', type: 'success'},
            {time: '16:30', text: 'Teste 15 (permissao camera): fallback manual ✓', type: 'success'},
            {time: '16:30', text: 'Testes 1,2,4-9,11-14: precisam de celular real', type: 'warn'},
        ]
    },
];

function render() {
    const grid = document.getElementById('agentsGrid');
    const done = agents.filter(a => a.status === 'done').length;
    const active = agents.filter(a => a.status === 'active').length;
    const pending = agents.filter(a => a.status === 'pending').length;
    const testing = agents.filter(a => a.status === 'testing').length;
    const totalProgress = Math.round(agents.reduce((sum, a) => sum + a.progress, 0) / agents.length);

    document.getElementById('totalPct').textContent = totalProgress + '%';
    document.getElementById('totalFill').style.width = totalProgress + '%';
    document.getElementById('statDone').textContent = done;
    document.getElementById('statActive').textContent = active + testing;
    document.getElementById('statPending').textContent = pending;

    const agentI = agents.find(a => a.id === 'I');
    document.getElementById('statTests').textContent = (agentI ? agentI.testsPassed || 0 : 0) + '/15';

    grid.innerHTML = agents.map(a => {
        const statusClass = a.status;
        const badgeText = {pending:'Aguardando', active:'Em andamento', done:'Concluido', testing:'Testando', error:'Erro'}[a.status] || a.status;

        const logHtml = a.log.length > 0
            ? a.log.slice(-8).map(l => `<div class="log-entry"><span class="log-time">${l.time}</span><span class="log-text ${l.type || ''}">${l.text}</span></div>`).join('')
            : '<div class="log-entry"><span class="log-time">--:--</span><span class="log-text">Aguardando inicio...</span></div>';

        const timeHtml = a.started
            ? `<span>Inicio: ${a.started}</span><span>${a.finished ? 'Fim: ' + a.finished : 'Em andamento...'}</span>`
            : `<span>Aguardando</span><span>—</span>`;

        return `
            <div class="agent ${statusClass}">
                <div class="agent-top">
                    <div class="agent-status ${statusClass}"></div>
                    <div class="agent-name">${a.name}</div>
                    <div class="agent-badge ${statusClass}">${badgeText}</div>
                </div>
                <div class="agent-desc">${a.desc}</div>
                <div class="agent-log">${logHtml}</div>
                <div class="agent-progress">
                    <div class="agent-pbar"><div class="agent-pfill" style="width:${a.progress}%"></div></div>
                    <div class="agent-ptext"><span class="agent-plabel">${a.id === 'I' ? (a.testsPassed || 0) + ' de 15 testes' : 'Progresso'}</span><span class="agent-ppct">${a.progress}%</span></div>
                </div>
                <div class="agent-time">${timeHtml}</div>
            </div>
        `;
    }).join('');
}

// Auto-refresh: reload page every 30 seconds to show updates
setInterval(() => { location.reload(); }, 30000);

render();
</script>
</body>
</html>
