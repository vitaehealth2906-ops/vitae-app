<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Bio Age</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#C5A55A; --green:#4AD9A4; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:var(--bg);
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:var(--bg); border-radius:0 0 20px 20px; z-index:10; }
        .header {
            position:absolute; top:58px; left:20px; right:20px;
            display:flex; align-items:center; z-index:5;
        }
        .back-btn {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5);
        }
        .header-title {
            flex:1; text-align:center;
            font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#fff;
        }
        .content {
            height:100%; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:110px 28px 100px; text-align:center;
        }
        .icon-wrap {
            width:100px; height:100px; border-radius:30px;
            background:rgba(197,165,90,0.08); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(197,165,90,0.15);
            display:flex; align-items:center; justify-content:center;
            font-size:48px; margin-bottom:28px;
        }
        .title {
            font-family:'Playfair Display',serif;
            font-size:26px; font-weight:700; color:#fff;
            margin-bottom:12px;
        }
        .desc {
            font-size:14px; color:rgba(255,255,255,0.4);
            line-height:1.6; margin-bottom:36px; max-width:300px;
        }
        .steps { display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; margin-bottom:36px; }
        .step {
            display:flex; align-items:center; gap:14px; text-align:left;
            padding:14px 16px; border-radius:14px;
            background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.06);
        }
        .step-num {
            width:28px; height:28px; border-radius:8px;
            background:rgba(197,165,90,0.15); color:var(--gold);
            display:flex; align-items:center; justify-content:center;
            font-size:12px; font-weight:700; flex-shrink:0;
        }
        .step-text { font-size:13px; color:rgba(255,255,255,0.6); }
        .btn-primary {
            width:100%; max-width:300px; padding:16px;
            background:linear-gradient(135deg, #C5A55A, #D4B96A); border:none; border-radius:16px;
            font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
            color:#0A0A0A; cursor:pointer; transition:all 0.2s;
        }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(197,165,90,0.3); }

        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:86px; padding:0 24px;
            background:linear-gradient(to top, var(--bg) 60%, transparent);
            display:flex; align-items:center; justify-content:space-around; z-index:20;
        }
        .tab { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 16px; }
        .tab svg { opacity:0.4; transition:opacity 0.2s; }
        .tab-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.3); letter-spacing:0.5px; }
        .tab.active svg { opacity:1; }
        .tab.active .tab-label { color:var(--gold); }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="header">
        <div class="back-btn" onclick="window.location.href='08-perfil.html?from=nav'">‹</div>
        <div class="header-title">Bio Age</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content">
        <div class="icon-wrap"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.527a2 2 0 01-.211.896L4.72 20.55a1 1 0 00.9 1.45h12.76a1 1 0 00.9-1.45l-5.069-10.127A2 2 0 0114 9.527V2"/><path d="M8.5 2h7"/></svg></div>
        <div class="title">Idade Biológica</div>
        <div class="desc">
            Para calcular sua idade biológica, precisamos de dados dos seus exames de sangue recentes.
        </div>

        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">Faça upload de exames de sangue recentes</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">Nossa IA analisa seus biomarcadores</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">Receba sua idade biológica estimada</div>
            </div>
        </div>

        <button class="btn-primary" onclick="window.location.href='11-exames-lista.html'">
            Adicionar Exames
        </button>
    </div>

    <div class="tab-bar">
        <div class="tab" onclick="window.location.href='08-perfil.html?from=nav'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg>
            <div class="tab-label">Meu RG</div>
        </div>
        <div class="tab" onclick="window.location.href='11-exames-lista.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div class="tab-label">Exames</div>
        </div>
        <div class="tab" onclick="window.location.href='21-qrcode.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>
            <div class="tab-label">QR Code</div>
        </div>
    </div>
</div>
</body>
</html>
