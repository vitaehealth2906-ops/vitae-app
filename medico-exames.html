<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Exames do Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        .page-back-row { display:flex; align-items:center; gap:10px; padding:var(--v-s5) var(--v-s6) var(--v-s3); }
        .page-back-title { flex:1; font-size:17px; font-weight:700; color:var(--v-ink); }
        .exam-card { background:var(--v-surface); border:var(--v-border); border-radius:var(--v-r-md); padding:10px; margin:0 var(--v-s5) var(--v-s2); box-shadow:var(--v-sh); cursor:pointer; transition:transform 0.15s var(--v-ease); }
        .exam-card:active { transform:scale(0.97); }
        .exam-card.processing { opacity:0.6; pointer-events:none; }
        .exam-inner { display:flex; gap:14px; align-items:stretch; }
        .exam-thumb { width:80px; min-height:100px; border-radius:8px; background:var(--v-bg); overflow:hidden; flex-shrink:0; }
        .exam-thumb img { width:100%; height:100%; object-fit:cover; }
        .exam-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:3px; padding:4px 0; }
        .exam-type { font-size:11px; color:var(--v-ink4); text-transform:capitalize; }
        .exam-name { font-size:15px; font-weight:700; color:var(--v-green); line-height:1.35; }
        .exam-meta { font-size:12px; color:var(--v-ink3); margin-top:2px; }
        .exam-arrow { display:flex; align-items:center; flex-shrink:0; }
        .empty-state { text-align:center; padding:60px 20px; }
        .empty-icon { width:56px; height:56px; margin:0 auto 16px; opacity:0.3; }
        .empty-title { font-size:16px; font-weight:700; color:var(--v-ink3); margin-bottom:6px; }
        .empty-sub { font-size:13px; color:var(--v-ink4); }
        .anim { opacity:0; transform:translateY(20px); animation:fadeUp 0.4s var(--v-ease) forwards; }
        .anim-d1 { animation-delay:0.05s; } .anim-d2 { animation-delay:0.1s; } .anim-d3 { animation-delay:0.15s; }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">
        <div class="page-back-row anim">
            <div class="btn-back" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
            <div class="page-back-title" id="pageTitle">Exames</div>
        </div>
        <div id="examList"></div>
        <div id="loadingState" style="text-align:center;padding:40px;color:var(--v-ink4);font-size:13px;">Carregando exames...</div>
    </div>
</div>
<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pacienteId = params.get('pacienteId');
const pacienteNome = decodeURIComponent(params.get('nome') || 'Paciente');

document.getElementById('pageTitle').textContent = 'Exames de ' + pacienteNome;

async function load() {
    if (!pacienteId) { document.getElementById('loadingState').textContent = 'Erro: ID do paciente nao fornecido'; return; }
    try {
        const data = await vitaeAPI.getPerfilPacienteMedico(pacienteId);
        const exames = (data.paciente && data.paciente.exames) || [];
        document.getElementById('loadingState').style.display = 'none';

        if (exames.length === 0) {
            document.getElementById('examList').innerHTML = '<div class="empty-state anim"><svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-title">Nenhum exame</div><div class="empty-sub">Este paciente ainda nao anexou exames.</div></div>';
            return;
        }

        var html = '';
        exames.forEach(function(e, i) {
            var isProcessing = !e.statusGeral || e.statusGeral === 'PROCESSANDO';
            var tipo = e.tipoExame || 'Exame';
            var dt = e.dataExame ? new Date(e.dataExame).toLocaleDateString('pt-BR', {month:'short', year:'numeric'}) : '';
            var meta = [dt, e.laboratorio].filter(Boolean).join(' - ') || (isProcessing ? 'Processando...' : '');
            var isImg = e.arquivoUrl && /\.(jpg|jpeg|png|webp)/i.test(e.arquivoUrl);
            var thumb = isImg
                ? '<img src="' + e.arquivoUrl + '" loading="lazy">'
                : '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--v-ink5)" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>';
            var onclick = (!isProcessing && e.id) ? 'window.location.href=\'exame-publico.html?user=' + pacienteId + '&exam=' + e.id + '\'' : '';

            html += '<div class="exam-card anim' + (isProcessing ? ' processing' : '') + '" style="animation-delay:' + (0.05 + i * 0.05) + 's;" ' + (onclick ? 'onclick="' + onclick + '"' : '') + '>';
            html += '<div class="exam-inner">';
            html += '<div class="exam-thumb">' + thumb + '</div>';
            html += '<div class="exam-info">';
            html += '<div class="exam-type">' + tipo + '</div>';
            html += '<div class="exam-name">' + tipo + '</div>';
            html += '<div class="exam-meta">' + meta + '</div>';
            html += '</div>';
            html += isProcessing ? '<div style="font-size:11px;color:var(--v-ink4);">Processando</div>' : '<div class="exam-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--v-ink4)" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>';
            html += '</div></div>';
        });
        document.getElementById('examList').innerHTML = html;
    } catch (err) {
        document.getElementById('loadingState').textContent = 'Erro: ' + err.message;
    }
}
load();
</script>
</body>
</html>
