<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Exames do Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        body { background:#F4F6FA; }
        .content { padding: 0 0 32px; }

        .patient-subheader {
            display:flex; align-items:center; gap:12px;
            padding: var(--v-s5) var(--v-s5) var(--v-s3);
            position:sticky; top:0; background:#F4F6FA; z-index:5;
        }
        .patient-avatar-sm {
            width:36px; height:36px; border-radius:50%;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            display:flex; align-items:center; justify-content:center;
            color:#0D0F14; font-weight:800; font-size:13px;
            flex-shrink:0; overflow:hidden;
        }
        .patient-avatar-sm img { width:100%; height:100%; object-fit:cover; }
        .patient-subheader-info { flex:1; min-width:0; }
        .patient-subheader-name { font-size:15px; font-weight:700; color:var(--v-ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .patient-subheader-meta { font-size:11px; color:var(--v-ink4); font-weight:500; }
        .patient-subheader-count {
            padding:5px 11px;
            background:rgba(0,229,160,0.10);
            border:1px solid rgba(0,229,160,0.20);
            border-radius:100px;
            font-size:11px; font-weight:700; color:var(--v-green2);
            white-space:nowrap;
        }

        .tab-strip {
            display:flex; gap:6px; padding: 4px var(--v-s5) var(--v-s5);
            overflow-x:auto; scrollbar-width:none;
        }
        .tab-strip::-webkit-scrollbar { display:none; }
        .tab-chip {
            padding:8px 14px; border-radius:100px;
            background:#FFFFFF; border:1px solid rgba(0,0,0,0.06);
            font-size:12px; font-weight:600; color:var(--v-ink3);
            cursor:pointer; white-space:nowrap; transition:all 0.15s;
        }
        .tab-chip:hover { background:rgba(0,0,0,0.02); }
        .tab-chip.active {
            background:rgba(0,229,160,0.10);
            border-color:rgba(0,229,160,0.30);
            color:var(--v-green2);
        }

        .filter-row {
            display:flex; gap:6px; padding: 8px var(--v-s5) var(--v-s4);
            overflow-x:auto; scrollbar-width:none;
        }
        .filter-row::-webkit-scrollbar { display:none; }
        .filter-chip {
            padding:6px 12px; border-radius:100px;
            background:transparent; border:1px solid rgba(0,0,0,0.08);
            font-size:11px; font-weight:600; color:var(--v-ink3);
            cursor:pointer; white-space:nowrap; transition:all 0.15s;
        }
        .filter-chip.active {
            background:var(--v-ink); color:#FFFFFF; border-color:var(--v-ink);
        }

        .section-label {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:1.5px; color:var(--v-ink4);
            padding: var(--v-s4) var(--v-s5) var(--v-s2);
        }
        .year-label {
            font-size:13px; font-weight:800; color:var(--v-ink);
            padding: var(--v-s5) var(--v-s5) var(--v-s2);
            letter-spacing:-0.2px;
        }

        .insight-card {
            position:relative;
            background:#FFFFFF; border-radius:14px;
            padding:14px 16px 14px 20px;
            margin: 0 var(--v-s5) 10px;
            box-shadow:0 1px 12px rgba(0,0,0,0.04);
            cursor:pointer; transition:transform 0.15s;
        }
        .insight-card:hover { transform:translateY(-1px); }
        .insight-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0;
            width:4px; background:var(--v-green); opacity:0.65;
            border-radius:4px 0 0 4px;
        }
        .insight-card.critico::before { background:var(--v-bad); opacity:1; }
        .insight-card.atencao::before { background:var(--v-warn); }
        .insight-card.processando::before { background:var(--v-ink5); }

        .exam-head {
            display:flex; align-items:center; justify-content:space-between;
            gap:10px; margin-bottom:6px;
        }
        .exam-tipo {
            font-size:14px; font-weight:800; color:var(--v-ink); flex:1; min-width:0;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        .exam-badge {
            padding:3px 9px; border-radius:100px;
            font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.4px;
            white-space:nowrap;
        }
        .exam-badge.critico { background:var(--v-bad); color:#FFFFFF; }
        .exam-badge.atencao { background:rgba(245,158,11,0.14); color:var(--v-warn); }
        .exam-badge.normal  { background:rgba(0,229,160,0.10); color:var(--v-green2); }
        .exam-badge.processando { background:rgba(0,0,0,0.04); color:var(--v-ink4); }

        .exam-meta {
            font-size:11px; color:var(--v-ink4); font-weight:500;
            margin-bottom:10px;
        }
        .params-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
        .param-chip {
            padding:4px 9px; border-radius:8px;
            background:rgba(0,0,0,0.04);
            font-size:11px; font-weight:600; color:var(--v-ink2);
            display:inline-flex; align-items:center; gap:4px;
        }
        .param-chip.alterado.up { background:rgba(239,68,68,0.10); color:var(--v-bad); }
        .param-chip.alterado.down { background:rgba(59,130,246,0.10); color:var(--v-info); }
        .param-chip.atencao { background:rgba(245,158,11,0.10); color:var(--v-warn); }
        .resumo-clinico {
            font-size:12px; color:var(--v-ink2); line-height:1.5;
            padding:10px 12px;
            background:rgba(0,0,0,0.02); border-radius:10px;
            border-left:2px solid rgba(0,0,0,0.08);
        }
        .resumo-clinico b { color:var(--v-ink); }

        .timeline-card {
            display:flex; align-items:center; gap:14px;
            padding:12px 16px;
            background:#FFFFFF;
            border-radius:14px;
            margin: 0 var(--v-s5) 8px;
            box-shadow:0 1px 12px rgba(0,0,0,0.04);
            cursor:pointer; transition:transform 0.15s;
        }
        .timeline-card:hover { transform:translateY(-1px); }
        .timeline-dot {
            width:10px; height:10px; border-radius:50%;
            background:var(--v-green); flex-shrink:0;
        }
        .timeline-dot.critico { background:var(--v-bad); }
        .timeline-dot.atencao { background:var(--v-warn); }
        .timeline-dot.processando { background:var(--v-ink5); }
        .timeline-info { flex:1; min-width:0; }
        .timeline-tipo { font-size:13px; font-weight:700; color:var(--v-ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .timeline-meta { font-size:11px; color:var(--v-ink4); margin-top:2px; }
        .timeline-data { font-size:11px; font-weight:600; color:var(--v-ink3); white-space:nowrap; }

        .footer-note {
            font-size:11px; color:var(--v-ink4); font-style:italic;
            text-align:center; padding: 18px var(--v-s6) 8px; line-height:1.5;
        }

        .empty-state { text-align:center; padding: 48px 32px 32px; }
        .empty-icon { width:56px; height:56px; margin:0 auto 14px; opacity:0.35; }
        .empty-icon svg { width:100%; height:100%; stroke:var(--v-ink4); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .empty-title { font-size:15px; font-weight:700; color:var(--v-ink3); margin-bottom:6px; }
        .empty-sub { font-size:13px; color:var(--v-ink4); line-height:1.5; }
        .empty-hint { font-size:12px; color:var(--v-ink4); font-style:italic; margin-top:10px; padding: 0 12px; line-height:1.5; }

        .skel { background:#FFFFFF; border-radius:14px; padding:14px 16px; margin:0 var(--v-s5) 10px; box-shadow:0 1px 12px rgba(0,0,0,0.04); }
        .skel-bar {
            background:linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 100%);
            background-size:200% 100%; animation:shimmer 1.5s infinite;
            border-radius:6px; height:14px; margin-bottom:8px;
        }
        .skel-bar.short { width:50%; }
        @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

        .identity-missing { text-align:center; padding: 56px 32px; }
        .identity-missing-avatar {
            width:80px; height:80px; border-radius:50%;
            background:rgba(156,163,175,0.10); border:1px solid rgba(156,163,175,0.20);
            display:flex; align-items:center; justify-content:center;
            margin: 0 auto 18px;
        }
        .identity-missing-avatar svg { width:36px; height:36px; stroke:#9CA3AF; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .identity-missing-title { font-size:17px; font-weight:800; color:var(--v-ink); margin-bottom:8px; letter-spacing:-0.3px; }
        .identity-missing-msg { font-size:13px; color:var(--v-ink3); line-height:1.6; margin-bottom:22px; }
        .identity-missing-btn {
            display:inline-block; padding:14px 24px; border-radius:14px;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            color:#0D0F14; font-weight:700; font-size:14px;
            border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
        }

        .anim { opacity:0; transform:translateY(14px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">

        <div class="patient-subheader anim">
            <div class="btn-back" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div class="patient-avatar-sm" id="avatar">--</div>
            <div class="patient-subheader-info">
                <div class="patient-subheader-name" id="nome">Carregando...</div>
                <div class="patient-subheader-meta" id="meta">&nbsp;</div>
            </div>
            <div class="patient-subheader-count" id="count" style="display:none;">0</div>
        </div>

        <div class="tab-strip anim" style="animation-delay:0.05s;">
            <div class="tab-chip active" data-target="medico-exames">Exames</div>
            <div class="tab-chip" data-target="medico-condicoes">Condições</div>
            <div class="tab-chip" data-target="medico-alergias">Alergias</div>
            <div class="tab-chip" data-target="medico-medicamentos">Medicamentos</div>
        </div>

        <div id="body"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pacienteId = params.get('pacienteId');
const pacienteNome = decodeURIComponent(params.get('nome') || 'Paciente');
let allExames = [];
let activeFilter = 'todos';

function getInitials(n){return (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();}
function calcAge(d){if(!d)return null;let x;if(String(d).includes('/')){const p=String(d).split('/');x=new Date(p[2],p[1]-1,p[0]);}else x=new Date(d);if(isNaN(x.getTime()))return null;return Math.floor((Date.now()-x.getTime())/(365.25*24*60*60*1000));}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setSubheaderLoading() {
    document.getElementById('avatar').textContent = getInitials(pacienteNome);
    document.getElementById('nome').textContent = pacienteNome;
}

function renderSkeleton() {
    document.getElementById('body').innerHTML =
        '<div class="section-label">&nbsp;</div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>';
}

function renderIdentityMissing() {
    document.getElementById('count').style.display = 'none';
    document.getElementById('body').innerHTML =
        '<div class="identity-missing anim">' +
        '<div class="identity-missing-avatar"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>' +
        '<div class="identity-missing-title">Paciente sem vínculo</div>' +
        '<div class="identity-missing-msg">Este paciente respondeu uma pré-consulta antes de criar conta no vita id. Sem cadastro, não há dados clínicos para mostrar aqui.</div>' +
        '<button class="identity-missing-btn" onclick="history.back()">Voltar ao painel</button>' +
        '</div>';
}

function renderEmpty() {
    document.getElementById('count').textContent = '0';
    document.getElementById('count').style.display = 'inline-block';
    document.getElementById('body').innerHTML =
        '<div class="empty-state anim">' +
        '<div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="11" cy="14" r="3"/><line x1="13.12" y1="16.12" x2="16" y2="19"/></svg></div>' +
        '<div class="empty-title">Nenhum exame anexado</div>' +
        '<div class="empty-sub">Este paciente ainda não compartilhou exames pelo vita id.</div>' +
        '<div class="empty-hint">Você pode pedir que ele anexe antes da consulta enviando uma nova pré-consulta.</div>' +
        '</div>';
}

function statusCard(e) {
    if (e.status === 'PROCESSANDO' || e.status === 'ENVIADO') return 'processando';
    if (e.statusGeral === 'CRITICO') return 'critico';
    if (e.statusGeral === 'ATENCAO') return 'atencao';
    return 'normal';
}
function badgeLabel(s) {
    return { critico:'Crítico', atencao:'Atenção', normal:'Normal', processando:'Em leitura' }[s];
}
function dataRelativa(dataExame, criadoEm) {
    var d = dataExame ? new Date(dataExame) : (criadoEm ? new Date(criadoEm) : null);
    if (!d || isNaN(d.getTime())) return '';
    var dias = Math.floor((Date.now() - d.getTime())/86400000);
    if (dias < 0) return d.toLocaleDateString('pt-BR');
    if (dias < 7) return 'há ' + dias + (dias === 1 ? ' dia' : ' dias');
    if (dias < 60) { var s = Math.floor(dias/7); return 'há ' + s + (s === 1 ? ' semana' : ' semanas'); }
    var m = Math.floor(dias/30);
    if (m < 24) return 'há ' + m + (m === 1 ? ' mês' : ' meses');
    var a = Math.floor(dias/365); return 'há ' + a + (a === 1 ? ' ano' : ' anos');
}
function dataCurta(d) {
    if (!d) return '';
    var x = new Date(d); if (isNaN(x.getTime())) return '';
    return ('0'+x.getDate()).slice(-2) + '/' + ('0'+(x.getMonth()+1)).slice(-2);
}
function ano(d) {
    if (!d) return null;
    var x = new Date(d); if (isNaN(x.getTime())) return null;
    return x.getFullYear();
}

function classifyParam(p) {
    var st = String(p.classificacao || p.status || '').toUpperCase();
    if (st === 'CRITICO' || st === 'CRITICA' || st.indexOf('ATENCAO') !== -1) {
        var ref = p.valorReferencia || '';
        var val = parseFloat(String(p.valor).replace(',','.'));
        var dir = '';
        var refMatch = String(ref).match(/(\d+[\.,]?\d*)\s*[-a]\s*(\d+[\.,]?\d*)/);
        if (refMatch && !isNaN(val)) {
            var rmax = parseFloat(refMatch[2].replace(',','.'));
            var rmin = parseFloat(refMatch[1].replace(',','.'));
            if (val > rmax) dir = 'up';
            else if (val < rmin) dir = 'down';
        }
        var classe = (st === 'CRITICO' || st === 'CRITICA') ? 'alterado' : 'atencao';
        return { classe: classe, dir: dir };
    }
    return null;
}

function renderExamCardCompleto(e, delay) {
    var st = statusCard(e);
    var tipo = e.tipoExame || e.nomeArquivo || 'Exame';
    var lab = e.laboratorio || '';
    var dataRel = dataRelativa(e.dataExame, e.criadoEm);
    var metaParts = [];
    if (lab) metaParts.push(lab);
    if (dataRel) metaParts.push(dataRel);

    var alterados = (e.parametros || []).map(function(p){
        var c = classifyParam(p);
        return c ? Object.assign({}, p, { __c: c }) : null;
    }).filter(Boolean);

    var paramsHtml = '';
    if (alterados.length) {
        paramsHtml = '<div class="params-row">' + alterados.slice(0,6).map(function(p){
            var arrow = p.__c.dir === 'up' ? ' \u2191' : (p.__c.dir === 'down' ? ' \u2193' : '');
            return '<span class="param-chip ' + p.__c.classe + ' ' + p.__c.dir + '">' +
                escapeHtml(p.nome) + ' ' + escapeHtml(p.valor) + (p.unidade ? ' ' + escapeHtml(p.unidade) : '') + arrow +
                '</span>';
        }).join('') + '</div>';
    }

    var resumoHtml = '';
    if (e.resumoIA) {
        var firstSentence = String(e.resumoIA).split(/(?<=[.!?])\s/)[0];
        if (firstSentence.length > 200) firstSentence = firstSentence.substring(0,200) + '...';
        resumoHtml = '<div class="resumo-clinico"><b>Resumo clínico:</b> ' + escapeHtml(firstSentence) + '</div>';
    }

    var onclick = 'window.location.href=\'exame-publico.html?user=' + encodeURIComponent(pacienteId) + '&exam=' + encodeURIComponent(e.id) + '\'';

    return '<div class="insight-card ' + st + ' anim" style="animation-delay:' + delay.toFixed(2) + 's;" onclick="' + onclick + '">' +
        '<div class="exam-head">' +
            '<div class="exam-tipo">' + escapeHtml(tipo) + '</div>' +
            '<div class="exam-badge ' + st + '">' + badgeLabel(st) + '</div>' +
        '</div>' +
        (metaParts.length ? '<div class="exam-meta">' + escapeHtml(metaParts.join(' \u00b7 ')) + '</div>' : '') +
        paramsHtml +
        resumoHtml +
        '</div>';
}

function renderTimelineCard(e, delay) {
    var st = statusCard(e);
    var tipo = e.tipoExame || e.nomeArquivo || 'Exame';
    var lab = e.laboratorio || '';
    var data = dataCurta(e.dataExame || e.criadoEm);
    var onclick = 'window.location.href=\'exame-publico.html?user=' + encodeURIComponent(pacienteId) + '&exam=' + encodeURIComponent(e.id) + '\'';

    return '<div class="timeline-card anim" style="animation-delay:' + delay.toFixed(2) + 's;" onclick="' + onclick + '">' +
        '<div class="timeline-dot ' + st + '"></div>' +
        '<div class="timeline-info">' +
            '<div class="timeline-tipo">' + escapeHtml(tipo) + '</div>' +
            (lab ? '<div class="timeline-meta">' + escapeHtml(lab) + '</div>' : '') +
        '</div>' +
        (data ? '<div class="timeline-data">' + data + '</div>' : '') +
        '</div>';
}

function aplicaFiltro(exames) {
    if (activeFilter === 'todos') return exames;
    if (activeFilter === 'alterados') return exames.filter(function(e){var s=statusCard(e); return s==='critico'||s==='atencao';});
    if (activeFilter === 'normais') return exames.filter(function(e){return statusCard(e)==='normal';});
    if (activeFilter === 'processando') return exames.filter(function(e){return statusCard(e)==='processando';});
    return exames;
}

function renderConteudo() {
    if (!allExames || allExames.length === 0) { renderEmpty(); return; }
    document.getElementById('count').textContent = allExames.length + ' ' + (allExames.length === 1 ? 'exame' : 'exames');
    document.getElementById('count').style.display = 'inline-block';

    var html = '';

    // Pontos de atenção (no topo, somente se existir)
    var alertas = allExames.filter(function(e){var s=statusCard(e); return s==='critico'||s==='atencao';});
    if (alertas.length > 0 && activeFilter === 'todos') {
        html += '<div class="section-label">Pontos de atenção</div>';
        var d = 0.05;
        alertas.forEach(function(e) {
            html += renderExamCardCompleto(e, d);
            d += 0.05;
        });
    }

    // Filter row
    html += '<div class="filter-row">' +
        ['todos','alterados','normais','processando'].map(function(f){
            var label = { todos:'Todos', alterados:'Alterados', normais:'Normais', processando:'Em leitura' }[f];
            return '<div class="filter-chip ' + (activeFilter === f ? 'active' : '') + '" data-filter="' + f + '">' + label + '</div>';
        }).join('') +
        '</div>';

    // Linha do tempo (filtrada, agrupada por ano)
    var filtrados = aplicaFiltro(allExames);
    if (filtrados.length === 0) {
        html += '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg></div><div class="empty-title">Nenhum exame neste filtro</div></div>';
    } else {
        var grupos = {};
        filtrados.forEach(function(e){
            var y = ano(e.dataExame || e.criadoEm) || 'sem data';
            if (!grupos[y]) grupos[y] = [];
            grupos[y].push(e);
        });
        var anos = Object.keys(grupos).sort(function(a,b){return b-a;});
        var d = 0.10;
        anos.forEach(function(y){
            html += '<div class="year-label">' + y + '</div>';
            grupos[y].forEach(function(e){
                html += renderTimelineCard(e, d);
                d += 0.04;
            });
        });
    }

    html += '<div class="footer-note">Exames anexados pelo paciente. Toque para abrir o documento original.</div>';

    document.getElementById('body').innerHTML = html;

    document.querySelectorAll('.filter-chip').forEach(function(c){
        c.addEventListener('click', function(){
            activeFilter = c.getAttribute('data-filter');
            renderConteudo();
        });
    });
}

document.querySelectorAll('.tab-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
        var target = chip.getAttribute('data-target');
        if (!target || chip.classList.contains('active')) return;
        var url = target + '.html?pacienteId=' + encodeURIComponent(pacienteId || '') +
                  '&nome=' + encodeURIComponent(pacienteNome);
        window.location.href = url;
    });
});

async function init() {
    setSubheaderLoading();
    if (!pacienteId) { renderIdentityMissing(); return; }
    renderSkeleton();
    try {
        var data = await vitaeAPI.getPerfilPacienteMedico(pacienteId);
        var p = data.paciente || {};
        var perfil = p.perfilSaude || {};
        var idade = calcAge(perfil.dataNascimento);
        var sangue = perfil.tipoSanguineo || '';
        var sangueFmt = sangue ? sangue.replace('_POS','+').replace('_NEG','-') : '';
        var partes = [];
        if (idade) partes.push(idade + ' anos');
        if (sangueFmt) partes.push(sangueFmt);
        document.getElementById('meta').textContent = partes.join(' \u00b7 ') || ' ';
        if (p.fotoUrl) {
            document.getElementById('avatar').innerHTML = '<img src="' + p.fotoUrl + '" alt="">';
        }
        allExames = p.exames || [];
        renderConteudo();
    } catch (err) {
        renderIdentityMissing();
    }
}
init();
</script>
</body>
</html>
