<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Melhorias</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        /* Entrance curtain */
        .curtain-left, .curtain-right {
            position:absolute; top:0; width:50%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
        }
        .curtain-left { left:0; animation:curtainSlideLeft 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        .curtain-right { right:0; animation:curtainSlideRight 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        @keyframes curtainSlideLeft { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }
        @keyframes curtainSlideRight { 0%{transform:translateX(0)} 100%{transform:translateX(100%)} }

        .reveal-line {
            position:absolute; top:0; left:50%; width:2px; height:100%;
            background:linear-gradient(to bottom, transparent, #4AD9A4, transparent);
            z-index:31; pointer-events:none;
            transform:translateX(-50%);
            animation:revealLine 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
            opacity:0.8;
        }
        @keyframes revealLine {
            0% { opacity:0.8; transform:translateX(-50%) scaleY(0); }
            30% { opacity:1; transform:translateX(-50%) scaleY(1); }
            100% { opacity:0; transform:translateX(-50%) scaleY(1); }
        }

        /* Exit */
        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:40; pointer-events:none;
            opacity:0; transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; pointer-events:all; }

        /* Scrollable content */
        .content {
            height:calc(100% - 80px);
            overflow-y:auto; overflow-x:hidden;
            padding:60px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:12px;
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.6s ease 0.5s both;
        }
        .back-btn {
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s; flex-shrink:0;
        }
        .back-btn:hover { background:rgba(255,255,255,0.1); }
        .back-btn:active { transform:scale(0.9); }
        .page-title {
            font-size:22px; font-weight:700; color:#fff; line-height:1.2;
        }
        .page-title span {
            font-family:'Playfair Display', serif;
            color:#4AD9A4; font-style:italic;
        }

        /* Summary card */
        .summary-card {
            background: linear-gradient(135deg, rgba(197,165,90,0.08), rgba(74,217,164,0.08));
            border:1px solid rgba(74,217,164,0.15);
            border-radius:20px;
            padding:24px;
            margin-bottom:24px;
            text-align:center;
            opacity:0; animation:fadeUp 0.6s ease 0.65s both;
        }
        .summary-scores {
            display:flex; align-items:center; justify-content:center; gap:12px;
            margin-bottom:12px;
        }
        .summary-current {
            font-family:'Playfair Display', serif;
            font-size:42px; font-weight:700;
            color:#C5A55A;
        }
        .summary-arrow {
            color:rgba(255,255,255,0.3);
            font-size:20px;
        }
        .summary-target {
            font-family:'Playfair Display', serif;
            font-size:42px; font-weight:700;
            color:#4AD9A4;
        }
        .summary-gain {
            font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.5);
            margin-bottom:4px;
        }
        .summary-gain strong {
            color:#4AD9A4;
        }
        .summary-years {
            font-size:18px; font-weight:700;
            color:#4AD9A4;
        }
        .summary-years-label {
            font-size:11px; font-weight:500;
            color:rgba(255,255,255,0.3);
            margin-top:2px;
        }

        /* Bar chart */
        .bar-chart-section {
            margin-bottom:28px;
            opacity:0; animation:fadeUp 0.5s ease 0.8s both;
        }
        .bar-chart-title {
            font-size:11px; font-weight:700;
            color:rgba(255,255,255,0.25);
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:14px;
        }
        .bar-row {
            display:flex; align-items:center; gap:10px;
            margin-bottom:10px;
        }
        .bar-label {
            width:80px; flex-shrink:0;
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.4);
            text-align:right;
        }
        .bar-track {
            flex:1; height:8px;
            background:rgba(255,255,255,0.04);
            border-radius:4px;
            overflow:hidden;
        }
        .bar-fill {
            height:100%; border-radius:4px;
            width:0;
            transition:width 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .bar-value {
            width:55px; flex-shrink:0;
            font-size:11px; font-weight:700;
            color:#4AD9A4;
        }

        /* Section title */
        .section-label {
            font-size:11px; font-weight:700;
            color:rgba(255,255,255,0.25);
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:14px;
        }

        /* Category cards */
        .category-card {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:16px;
            padding:16px;
            margin-bottom:10px;
            display:flex; align-items:center; gap:14px;
            cursor:pointer; transition:all 0.25s;
            opacity:0; animation:fadeUp 0.4s ease both;
        }
        .category-card:hover { background:rgba(255,255,255,0.05); }
        .category-card:active { transform:scale(0.98); }
        .category-icon {
            width:44px; height:44px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; flex-shrink:0;
        }
        .category-info { flex:1; }
        .category-name {
            font-size:14px; font-weight:600; color:#fff;
            margin-bottom:3px;
        }
        .category-gain {
            display:inline-block;
            font-size:12px; font-weight:700;
            padding:2px 8px; border-radius:6px;
            background:rgba(74,217,164,0.1);
            color:#4AD9A4;
        }
        .category-arrow {
            flex-shrink:0;
            color:rgba(255,255,255,0.15);
        }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:80px;
            background:linear-gradient(to top, #0A0A0A 60%, transparent);
            display:flex; align-items:flex-end; justify-content:center;
            padding-bottom:28px; gap:32px;
            z-index:5;
        }
        .tab {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; transition:all 0.25s;
        }
        .tab svg { transition:all 0.25s; }
        .tab-label {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:0.3px;
        }
        .tab.active .tab-label { color:#C5A55A; }
        .tab:active { transform:scale(0.9); }

        /* Modal overlay */
        .modal-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.6); z-index:20;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .modal-overlay.show { opacity:1; pointer-events:all; }

        .modal-sheet {
            position:absolute; bottom:0; left:0; width:100%;
            background:#1A1A1A;
            border-radius:24px 24px 0 0;
            padding:12px 24px 36px;
            max-height:80%;
            overflow-y:auto;
            transform:translateY(100%);
            transition:transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .modal-overlay.show .modal-sheet {
            transform:translateY(0);
        }
        .modal-sheet::-webkit-scrollbar { display:none; }
        .modal-handle {
            width:36px; height:4px;
            background:rgba(255,255,255,0.15);
            border-radius:2px;
            margin:0 auto 20px;
        }
        .modal-title {
            font-size:18px; font-weight:700; color:#fff;
            margin-bottom:4px;
        }
        .modal-subtitle {
            font-size:14px; font-weight:600;
            color:#4AD9A4;
            margin-bottom:20px;
        }
        .modal-section-label {
            font-size:10px; font-weight:700;
            color:rgba(255,255,255,0.2);
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:8px;
            margin-top:20px;
        }
        .modal-section-label:first-of-type { margin-top:0; }
        .modal-text {
            font-size:13px; line-height:1.6;
            color:rgba(255,255,255,0.55);
        }
        .modal-checklist {
            list-style:none;
        }
        .modal-checklist li {
            font-size:13px; color:rgba(255,255,255,0.6);
            padding:8px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
            display:flex; align-items:center; gap:8px;
        }
        .modal-checklist li:last-child { border-bottom:none; }
        .check-icon {
            width:18px; height:18px; border-radius:5px;
            background:rgba(74,217,164,0.1);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .modal-quote {
            background:rgba(255,255,255,0.03);
            border-left:3px solid rgba(74,217,164,0.3);
            padding:12px 16px;
            border-radius:0 10px 10px 0;
            margin-top:8px;
        }
        .modal-quote-text {
            font-size:13px; font-style:italic;
            color:rgba(255,255,255,0.5);
            line-height:1.5;
        }
        .modal-quote-source {
            font-size:11px; font-weight:600;
            color:rgba(74,217,164,0.5);
            margin-top:6px;
        }
        .modal-status-box {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:12px;
            padding:14px 16px;
            margin-top:8px;
        }
        .modal-status-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:8px;
        }
        .modal-status-label {
            font-size:12px; font-weight:600; color:rgba(255,255,255,0.5);
        }
        .modal-status-value {
            font-size:12px; font-weight:700;
        }
        .modal-progress-track {
            height:6px; background:rgba(255,255,255,0.06);
            border-radius:3px; overflow:hidden;
        }
        .modal-progress-fill {
            height:100%; border-radius:3px;
            transition:width 0.8s ease;
        }
        .modal-status-meta {
            font-size:11px; color:rgba(255,255,255,0.25);
            margin-top:6px;
        }
        .modal-cta {
            width:100%; padding:14px;
            background:linear-gradient(135deg, rgba(74,217,164,0.15), rgba(74,217,164,0.08));
            border:1px solid rgba(74,217,164,0.25);
            border-radius:14px;
            color:#4AD9A4;
            font-size:14px; font-weight:700;
            font-family:'Inter',sans-serif;
            cursor:pointer;
            margin-top:24px;
            transition:all 0.2s;
        }
        .modal-cta:hover { background:rgba(74,217,164,0.2); }
        .modal-cta:active { transform:scale(0.98); }

        /* Toast */
        .toast {
            position:absolute; top:56px; left:50%; transform:translateX(-50%) translateY(-20px);
            background:rgba(26,26,26,0.95);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            padding:10px 16px;
            display:flex; align-items:center; gap:8px;
            z-index:50;
            opacity:0; pointer-events:none;
            transition:all 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            backdrop-filter:blur(20px);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:all; }
        .toast-text {
            font-size:13px; font-weight:500;
            color:rgba(255,255,255,0.8);
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
    </style>
</head>

</div>

            score: 75,
            scoreMax: 90,
            scoreLabel: 'Social',
            why: 'O isolamento social aumenta a mortalidade tanto quanto fumar 15 cigarros por dia. Relacoes fortes protegem o coracao e o cerebro.',
            actions: [
                'Manter contato regular com amigos e familia',
                'Participar de grupos ou comunidades',
                'Voluntariado — beneficia voce e os outros',
                'Ter pelo menos 3 relacoes proximas e confiaveis'
            ],
            quoteText: 'Relacoes sociais fortes aumentam a chance de sobrevivencia em 50%.',
            quoteSource: 'PLOS Medicine, 2010'
        }
    ];

    const totalYears = categories.reduce((sum, c) => sum + c.gain, 0);
    const displayYears = 4.8; // Weighted/adjusted total

    // ============ RENDER BAR CHART ============
    function renderBarChart() {
        const container = document.getElementById('barChart');
        const maxGain = Math.max(...categories.map(c => c.gain));
        container.innerHTML = categories.map((c, i) => `
            <div class="bar-row">
                <div class="bar-label">${c.name.split(' ')[0]}</div>
                <div class="bar-track">
                    <div class="bar-fill" id="bar${i}" style="background:${c.color};"></div>
                </div>
                <div class="bar-value">+${c.gain.toFixed(1)} anos</div>
            </div>
        `).join('');

        // Animate bars with stagger
        setTimeout(() => {
            categories.forEach((c, i) => {
                setTimeout(() => {
                    const bar = document.getElementById('bar' + i);
                    bar.style.width = ((c.gain / maxGain) * 100) + '%';
                }, i * 80);
            });
        }, 800);
    }

    // ============ RENDER CATEGORY CARDS ============
    function renderCategories() {
        const container = document.getElementById('categoryCards');
        container.innerHTML = categories.map((c, i) => `
            <div class="category-card" onclick="openDetail(${i})" style="animation-delay:${0.9 + i * 0.08}s">
                <div class="category-icon" style="background:${c.color}15;">${c.icon}</div>
                <div class="category-info">
                    <div class="category-name">${c.name}</div>
                    <div class="category-gain">+${c.gain.toFixed(1)} anos</div>
                </div>
                <div class="category-arrow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </div>
        `).join('');
    }

    // ============ COUNT-UP ANIMATION ============
    function countUp(el, target, duration, suffix) {
        const start = performance.now();
        const isFloat = !Number.isInteger(target);
        function tick(now) {
            const progress = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            const val = target * ease;
            el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
            if (suffix && progress >= 1) el.textContent += suffix;
            if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    }

    // ============ OPEN DETAIL MODAL ============
    function openDetail(index) {
        const c = categories[index];
        const pct = Math.round((c.score / 100) * 100);
        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
                <span style="font-size:28px;">${c.icon}</span>
                <div class="modal-title">${c.name}</div>
            </div>
            <div class="modal-subtitle">Ganho estimado: +${c.gain.toFixed(1)} anos</div>

            <div class="modal-section-label">Por que importa</div>
            <p class="modal-text">${c.why}</p>

            <div class="modal-section-label">O que fazer</div>
            <ul class="modal-checklist">
                ${c.actions.map(a => `
                    <li>
                        <span class="check-icon">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#4AD9A4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </span>
                        ${a}
                    </li>
                `).join('')}
            </ul>

            <div class="modal-section-label">Estudos</div>
            <div class="modal-quote">
                <div class="modal-quote-text">"${c.quoteText}"</div>
                <div class="modal-quote-source">— ${c.quoteSource}</div>
            </div>

            <div class="modal-section-label">Seu status atual</div>
            <div class="modal-status-box">
                <div class="modal-status-header">
                    <span class="modal-status-label">${c.scoreLabel}</span>
                    <span class="modal-status-value" style="color:${c.color};">${c.score}/100</span>
                </div>
                <div class="modal-progress-track">
                    <div class="modal-progress-fill" id="modalProgress" style="width:0;background:${c.color};"></div>
                </div>
                <div class="modal-status-meta">Meta: chegar a ${c.scoreMax}</div>
            </div>

            <button class="modal-cta" onclick="startImprovement('${c.name}')">Comecar agora →</button>
        `;

        document.getElementById('modalOverlay').classList.add('show');

        // Animate progress bar
        setTimeout(() => {
            document.getElementById('modalProgress').style.width = pct + '%';
        }, 300);
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modalOverlay')) {
            document.getElementById('modalOverlay').classList.remove('show');
        }
    }

    function startImprovement(name) {
        document.getElementById('modalOverlay').classList.remove('show');
        showToast('Lembrete criado para ' + name + '!');
    }

    // ============ TOAST ============
    let toastTimer;
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ============ NAVIGATION ============
    function goBack() {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => { window.location.href = '08-perfil.html'; }, 500);
    }

    function navigateTo(tab) {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (tab === 'exames') window.location.href = '11-exames-lista.html';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
        }, 500);
    }

    // ============ INIT ============
    renderBarChart();
    renderCategories();

    // Count-up animations after curtain
    setTimeout(() => {
        countUp(document.getElementById('scoreFrom'), 82, 1000);
        countUp(document.getElementById('scoreTo'), 93, 1200);
        countUp(document.getElementById('yearsGain'), displayYears, 1400, ' anos');
    }, 700);
</script>
</body>
</html>
