<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — One Minute Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,153,196,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#0A0A0A; border-radius:0 0 20px 20px; z-index:10; }
        .header { position:sticky; top:0; left:0; right:0; padding:48px 28px 12px; background:#0A0A0A; z-index:5; display:flex; flex-direction:column; gap:10px; margin:-24px -24px 12px; width:calc(100% + 48px); }
        .back-btn { width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5); }
        .header-title { flex:1; text-align:center; font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:#fff; }

        .content { height:100%; overflow-y:auto; padding:24px 24px 40px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        .patient-bar {
            display:flex; align-items:center; gap:12px;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:16px; padding:14px 16px; margin-bottom:20px;
        }
        .patient-avatar { width:40px; height:40px; border-radius:50%; background:rgba(0,153,196,0.08); display:flex; align-items:center; justify-content:center; font-size:18px; }
        .patient-name { font-size:15px; font-weight:600; color:#fff; }
        .patient-date { font-size:12px; color:rgba(255,255,255,0.25); }

        /* Audio player */
        .audio-player {
            width:100%; padding:12px 16px; margin-bottom:20px;
            background:rgba(0,153,196,0.04); border:1px solid rgba(0,153,196,0.12);
            border-radius:16px;
            display:flex; align-items:center; gap:12px;
        }
        .audio-play-btn {
            width:42px; height:42px; border-radius:50%; flex-shrink:0;
            background:linear-gradient(135deg, #00B4D8, #007A9E);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; border:none; box-shadow:0 4px 16px rgba(0,153,196,0.25);
        }
        .audio-play-btn svg { width:18px; height:18px; stroke:#fff; fill:none; }
        .audio-info { flex:1; min-width:0; }
        .audio-info-name { font-size:13px; font-weight:600; color:#111827; }
        .audio-info-meta { font-size:11px; color:rgba(17,24,39,0.40); margin-top:2px; }
        .audio-wave {
            width:80px; height:28px; flex-shrink:0;
            display:flex; align-items:center; gap:2px;
        }
        .audio-wave-bar {
            width:3px; border-radius:2px;
            background:rgba(0,153,196,0.3);
        }
        /* TTS fallback button */
        .tts-btn {
            width:100%; padding:14px; margin-bottom:20px;
            background:rgba(74,144,226,0.08); border:1px solid rgba(74,144,226,0.2);
            border-radius:16px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:10px;
            font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
            color:#4A90E2; transition:all 0.2s;
        }
        .tts-btn:hover { background:rgba(74,144,226,0.12); }
        .tts-btn.playing { border-color:#0099C4; color:#0099C4; background:rgba(0,153,196,0.08); }

        /* Summary text */
        .summary-box {
            background:rgba(0,153,196,0.04);
            border:1px solid rgba(0,153,196,0.12);
            border-radius:18px; padding:18px;
            margin-bottom:20px;
        }
        .summary-label { font-size:11px; font-weight:700; color:#0099C4; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
        .summary-text { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; }

        /* Blocks */
        .block {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:18px; padding:16px; margin-bottom:12px;
        }
        .block-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .block-priority { width:8px; height:8px; border-radius:50%; }
        .block-priority.alta { background:#D94452; }
        .block-priority.media { background:#0099C4; }
        .block-priority.baixa { background:#4AD9A4; }
        .block-title { font-size:14px; font-weight:600; color:#fff; }
        .block-content { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.5; }

        /* Alerts */
        .alert {
            display:flex; align-items:flex-start; gap:10px;
            padding:14px; border-radius:14px; margin-bottom:10px;
        }
        .alert.URGENTE { background:rgba(217,68,82,0.08); border:1px solid rgba(217,68,82,0.2); }
        .alert.ATENCAO { background:rgba(0,153,196,0.08); border:1px solid rgba(0,153,196,0.2); }
        .alert.INFO { background:rgba(74,144,226,0.08); border:1px solid rgba(74,144,226,0.2); }
        .alert-icon { font-size:16px; flex-shrink:0; margin-top:2px; }
        .alert-text { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.4; }

        /* Questions */
        .questions-title { font-size:14px; font-weight:600; color:#fff; margin:16px 0 10px; }
        .question {
            padding:10px 14px;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:12px; margin-bottom:8px;
            font-size:13px; color:rgba(255,255,255,0.5);
        }

        .loading { text-align:center; padding:40px; color:rgba(255,255,255,0.3); }
    @media(max-width:480px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="content" id="mainContent">
        <!-- Top bar -->
        <div style="display:flex;align-items:center;margin-bottom:16px;padding-top:48px;">
            <div class="back-btn" onclick="window.location.href='20-medico-dashboard.html'">‹</div>
            <div class="header-title">One Minute Summary</div>
            <div style="width:40px;"></div>
        </div>
        <!-- Patient info -->
        <div class="patient-bar" id="headerPatient" style="display:none;">
            <div class="patient-avatar" id="headerAvatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(0,153,196,0.6)" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <div><div class="patient-name" id="headerPatientName"></div></div>
        </div>
        <!-- Audio + summary injected here by JS -->
        <div id="loadingState" class="loading">Carregando resumo...</div>
        <div id="dynamicContent"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pcId = urlParams.get('id');
    let summaryText = '';
    let isSpeaking = false;

    async function init() {
        if (!pcId) return;

        try {
            const data = await vitaeAPI.getPreConsulta(pcId);
            const pc = data.preConsulta;
            const summary = pc.summaryJson || {};
            summaryText = pc.summaryIA || summary.summaryTexto || 'Resumo não disponível';

            const respondidaEm = pc.respondidaEm ? new Date(pc.respondidaEm).toLocaleDateString('pt-BR') : '';

            // Show patient name + photo in fixed header
            document.getElementById('headerPatientName').textContent = pc.pacienteNome;
            document.getElementById('headerPatient').style.display = 'flex';
            if (pc.pacienteFotoUrl) {
                document.getElementById('headerAvatar').innerHTML = `<img src="${pc.pacienteFotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            }

            // Generate waveform bars
            const waveBars = Array.from({length:18}, () => {
                const h = Math.floor(Math.random() * 18) + 6;
                return `<div class="audio-wave-bar" style="height:${h}px"></div>`;
            }).join('');

            // Audio player or TTS fallback
            let audioSection = '';
            const realAudioUrl = pc.audioUrl || (pc.respostas && pc.respostas.audioUrl) || null;
            const realFotoUrl = pc.pacienteFotoUrl || (pc.respostas && pc.respostas.fotoUrl) || null;
            if (realFotoUrl) {
                document.getElementById('headerAvatar').innerHTML = `<img src="${realFotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            }
            if (realAudioUrl) {
                audioSection = `
                <div class="audio-player" id="audioPlayer">
                    <button class="audio-play-btn" onclick="toggleAudio()">
                        <svg id="audioPlayIcon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <div class="audio-info">
                        <div class="audio-info-name">${pc.pacienteNome}</div>
                        <div class="audio-info-meta">${respondidaEm} · <span id="audioDuration">--:--</span></div>
                    </div>
                    <div class="audio-wave">${waveBars}</div>
                    <audio id="patientAudio" src="${realAudioUrl}" preload="metadata" onloadedmetadata="showDuration()"></audio>
                </div>`;
            } else {
                audioSection = `
                <button class="tts-btn" id="ttsBtn" onclick="toggleTTS()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg> Ouvir resumo
                </button>`;
            }

            let html = audioSection + `
                <div class="summary-box">
                    <div class="summary-label">Resumo</div>
                    <div class="summary-text">${summaryText}</div>
                </div>
            `;

            // Blocks
            if (summary.blocos && summary.blocos.length > 0) {
                html += summary.blocos.map(b => `
                    <div class="block">
                        <div class="block-header">
                            <div class="block-priority ${b.prioridade || 'media'}"></div>
                            <div class="block-title">${b.titulo}</div>
                        </div>
                        <div class="block-content">${b.conteudo}</div>
                    </div>
                `).join('');
            }

            // Alerts
            if (summary.alertas && summary.alertas.length > 0) {
                html += summary.alertas.map(a => {
                    const icons = { URGENTE:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>', ATENCAO:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>', INFO:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' };
                    return `
                        <div class="alert ${a.tipo}">
                            <div class="alert-icon">${icons[a.tipo] || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'}</div>
                            <div class="alert-text">${a.mensagem}</div>
                        </div>
                    `;
                }).join('');
            }

            // Suggested questions
            if (summary.perguntasSugeridas && summary.perguntasSugeridas.length > 0) {
                html += '<div class="questions-title">Perguntas sugeridas</div>';
                html += summary.perguntasSugeridas.map(q => `
                    <div class="question">❓ ${q}</div>
                `).join('');
            }

            // Raw responses if no AI summary
            if (!summary.blocos && pc.respostas) {
                const LABELS = {
                    nomeCompleto:'Nome completo', dataNascimento:'Data de nascimento',
                    cpf:'CPF', telefone:'Telefone', email:'E-mail', sexo:'Sexo biológico',
                    queixaPrincipal:'Queixa principal', duracaoSintomas:'Duração dos sintomas',
                    medicamentosEmUso:'Medicamentos em uso', alergias:'Alergias',
                    reacoesAdversas:'Reações adversas', doencasAtuais:'Doenças atuais',
                    historicoInternacoes:'Histórico de internações', cirurgias:'Cirurgias',
                    historiaFamiliar:'História familiar', tabagismo:'Tabagismo',
                    tabagismoDetalhe:'Detalhe tabagismo', alcool:'Álcool',
                    exercicio:'Exercício físico', exercicioTipo:'Tipo de exercício',
                    cafeina:'Cafeína', sono:'Sono', mudancasRotina:'Mudanças na rotina',
                    examesAnteriores:'Exames anteriores', observacoes:'Observações',
                };
                html += '<div class="questions-title">Respostas do paciente</div>';
                const r = pc.respostas;
                for (const [key, val] of Object.entries(r)) {
                    if (!val || typeof val === 'object') continue;
                    const label = LABELS[key] || key;
                    html += `<div class="block">
                        <div class="block-title">${label}</div>
                        <div class="block-content">${val}</div>
                    </div>`;
                }
            }

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('dynamicContent').innerHTML = html;
        } catch (e) {
            document.getElementById('loadingState').textContent = 'Erro: ' + e.message;
        }
    }

    function toggleTTS() {
        const btn = document.getElementById('ttsBtn');
        if (isSpeaking) {
            speechSynthesis.cancel();
            isSpeaking = false;
            btn.classList.remove('playing');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg> Ouvir resumo';
            return;
        }

        const utterance = new SpeechSynthesisUtterance(summaryText);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.95;

        utterance.onstart = () => {
            isSpeaking = true;
            btn.classList.add('playing');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Parar';
        };

        utterance.onend = () => {
            isSpeaking = false;
            btn.classList.remove('playing');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg> Ouvir resumo';
        };

        speechSynthesis.speak(utterance);
    }

    // Audio player functions
    let audioPlaying = false;
    function showDuration() {
        const audio = document.getElementById('patientAudio');
        if (audio && audio.duration && isFinite(audio.duration)) {
            const m = Math.floor(audio.duration / 60);
            const s = Math.floor(audio.duration % 60);
            document.getElementById('audioDuration').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
    }
    function toggleAudio() {
        const audio = document.getElementById('patientAudio');
        const icon = document.getElementById('audioPlayIcon');
        if (!audio) return;
        if (audioPlaying) {
            audio.pause();
            audioPlaying = false;
            icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
        } else {
            audio.play();
            audioPlaying = true;
            icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        }
        audio.onended = () => {
            audioPlaying = false;
            icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
        };
    }

    init();
</script>
</body>
</html>
