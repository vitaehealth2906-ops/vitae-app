async function init() {
    if (!pcId) { document.getElementById('loadingState').textContent = 'ID nao fornecido.'; return; }

    try {
        var data = await vitaeAPI.getPreConsulta(pcId);
        var pc = data.preConsulta;
        var summary = pc.summaryJson || {};
        var r = pc.respostas || {};
        var summaryText = summary.textoVoz || summary.summaryTexto || pc.summaryIA || '';
        var descBreve = summary.descricaoBreve || (summaryText ? summaryText.split('. ')[0] + '.' : '');
        // FASE 8 — Timestamp completo (DD/MM HH:MM) em vez de so data
        var respondidaEm = '';
        if (pc.respondidaEm) {
            var dt = new Date(pc.respondidaEm);
            respondidaEm = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        var days = daysSince(pc.respondidaEm);
        var foto = (pc.paciente && pc.paciente.fotoUrl) || pc.pacienteFotoUrl || r.fotoUrl || null;
        var age = calcAge(r.dataNascimento || r.nascimento);
        var initials = getInitials(pc.pacienteNome);
        var audioUrl = pc.audioSummaryUrl || null;

        // ── FASE 4 — Nivel de briefing (0-5) ──
        // Fonte de verdade: campo nivelBriefing do backend (Fase 3).
        // Pre-consultas antigas nao tem → derivamos na hora com base no que chegou.
        // forceNivel=N no querystring permite Lucas testar os 6 niveis visualmente.
        var forceNivel = urlParams.get('forceNivel');
        var nivel;
        if (forceNivel !== null && forceNivel !== '') {
            nivel = Math.max(0, Math.min(5, parseInt(forceNivel, 10) || 0));
        } else if (typeof pc.nivelBriefing === 'number') {
            nivel = pc.nivelBriefing;
        } else {
            // Fallback pra briefings antigos sem o campo — estimativa local
            var temAudio = !!pc.audioUrl;
            var temTransc = !!(pc.transcricao && pc.transcricao.trim().length >= 15);
            var temResumo = !!(pc.summaryIA || (summary && (summary.textoVoz || summary.summaryTexto)));
            var temTTS = !!pc.audioSummaryUrl;
            var temTexto = !!(r && Object.keys(r).length > 1);
            if (pc.status !== 'RESPONDIDA') nivel = 0;
            else if (temAudio && temTransc && temResumo && temTTS) nivel = 5;
            else if (temAudio && temTransc && temResumo) nivel = 4;
            else if (temAudio && temTransc) nivel = 3;
            else if (temAudio) nivel = 2;
            else if (temTexto) nivel = 1;
            else nivel = 0;
        }
        var statusAudioResumo = pc.statusAudioResumo || (audioUrl ? 'ok' : 'falhou');
        var statusResumoIa = pc.statusResumoIa || (summaryText ? 'ok' : 'falhou');
        var statusTranscricao = pc.statusTranscricao || (pc.transcricao ? 'ok' : 'sem_audio');

        var fromParam = urlParams.get('from');
        var backUrl = '20-medico-dashboard.html';
        if (fromParam === 'pacientes' && pc.pacienteNome) {
            var pacKey = (pc.pacienteNome || 'Sem nome') + '|' + (pc.pacienteTel || '');
            backUrl = '20-medico-dashboard.html?view=pacientes&openPaciente=' + encodeURIComponent(pacKey);
        }

        var html = '';

        // Header (botao voltar + selo de nivel — cor+icone+padrao)
        var nivelRotulos = {
            5: 'Briefing completo',
            4: 'Sem voz',
            3: 'Sem resumo',
            2: 'Audio bruto',
            1: 'So texto',
            0: 'Nao respondeu',
        };
        var nivelTitulos = {
            5: 'Todas as pecas geradas. Briefing 100% disponivel.',
            4: 'Audio-resumo nao pode ser gerado. Leia o texto abaixo.',
            3: 'Resumo automatico nao disponivel. Consulte a transcricao do paciente.',
            2: 'Transcricao falhou. Disponivel so o audio original.',
            1: 'Paciente respondeu por texto, sem audio.',
            0: 'Paciente ainda nao respondeu.',
        };
        html += '<div class="summary-header anim" style="justify-content:flex-start;gap:8px">';
        html += '<div class="btn-back" onclick="window.location.href=\'' + backUrl + '\'" aria-label="Voltar"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>';
        // Removidos (22/04/2026): badge "Briefing completo" (nivel-badge), botao olhinho privacy, botao lua theme
        html += '</div>';

        // Patient hero
        html += '<div class="patient-hero anim anim-d1">';
        html += '<div class="patient-photo"><div class="patient-photo-inner">';
        if (foto) {
            // foto e URL do backend — encoding pra url context (src attribute)
            html += '<img src="' + encodeURI(foto) + '" onerror="this.parentElement.textContent=\'' + sanitize(initials) + '\'">';
        } else {
            html += sanitize(initials);
        }
        html += '</div></div>';
        html += '<div class="patient-name">' + sanitize(pc.pacienteNome || 'Paciente') + '</div>';
        if (age) html += '<div class="patient-age">' + sanitize(String(age)) + ' anos</div>';
        if (respondidaEm) {
            html += '<div class="date-badge"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Respondida em ' + sanitize(respondidaEm) + '</div>';
        }
        if (descBreve) html += '<div class="patient-desc">"' + sanitize(descBreve) + '"</div>';
        html += '</div>';

        // FASE 4 — Nivel 0: paciente ainda nao respondeu. Nao mostra o resto, mostra CTA.
        if (nivel === 0) {
            html += '<div class="honest-empty anim anim-d2" style="margin-top:20px;text-align:center;padding:24px 20px">';
            html += '<strong style="display:block;font-size:15px;margin-bottom:6px">Paciente ainda nao respondeu</strong>';
            html += 'O link foi enviado mas o paciente nao abriu ou nao enviou a resposta. ';
            html += 'Reenvie pelo WhatsApp ou entre em contato.';
            html += '</div>';
            var dc = document.getElementById('dynamicContent');
            dc.innerHTML = html;
            dc.style.display = '';
            document.getElementById('loadingState').style.display = 'none';
            return;
        }

        // Stale warning
        if (days > 7) {
            html += '<div class="stale-warning anim anim-d1"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Pre-consulta com mais de 7 dias. Dados podem estar desatualizados.</div>';
        }

        // Bloco "O que o paciente disse" removido em 22/04/2026.
        // Motivo: queixa agora aparece como componente limpo logo abaixo do player.

        // ── Chip identificador (nome · idade · motivo) ──
        // Extrai motivo curto do descricaoBreve ou summaryTexto
        var motivoShort = '';
        if (descBreve) {
            // Pega depois de "com", "por", ou usa primeira frase curta
            var matchCom = descBreve.match(/(?:com|por)\s+([^.,;]{3,60})/i);
            if (matchCom) motivoShort = matchCom[1].trim();
            else motivoShort = descBreve.replace(/^[Pp]aciente[^,]*,?\s*/,'').split(/[.,;]/)[0].trim().substring(0, 50);
        }
        var chipParts = [];
        if (pc.pacienteNome) chipParts.push(pc.pacienteNome.split(' ')[0]);
        if (age) chipParts.push(age + 'a');
        if (motivoShort) chipParts.push(motivoShort);
        if (chipParts.length >= 2) {
            html += '<div class="patient-chip anim anim-d2">';
            html += '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
            html += '<span>' + chipParts.join(' \u00b7 ') + '</span>';
            html += '</div>';
        }

        // ── Premium Audio Player ──
        // (debug console.log removido — exposicao de dados clinicos em F12 = LGPD)

        // FASE 4 — Fallback honesto: se audio-resumo nao existe ou falhou, substitui por bloco de texto
        // com aviso claro. Medico nao clica num player invisivel esperando audio que nunca vem.
        var audioDisponivel = audioUrl && statusAudioResumo === 'ok';
        var audioProcessando = !audioUrl && statusAudioResumo === 'processando';
        var audioFalhou = !audioUrl && (statusAudioResumo === 'falhou' || statusAudioResumo === 'suspeito');

        if (summaryText && !audioDisponivel) {
            // Fallback visual: bloco com aviso + texto do resumo destacado
            var classFb = audioFalhou ? 'audio-fallback falhou' : 'audio-fallback';
            var svgFb = audioProcessando
                ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>';
            var tituloFb = audioProcessando ? 'Audio em processamento' : 'Leia o resumo abaixo';
            var subtituloFb = audioProcessando
                ? 'Aguarde alguns minutos e atualize a tela. Se persistir, use o texto.'
                : 'A voz do briefing nao pode ser gerada. O resumo em texto esta disponivel.';
            html += '<div class="' + classFb + ' anim anim-d2">';
            html += '<div class="audio-fallback-title">' + svgFb + '<span>' + tituloFb + '</span></div>';
            html += '<div style="font-size:12px;color:var(--v-ink3);margin-bottom:10px">' + sanitize(subtituloFb) + '</div>';
            html += '<div class="audio-fallback-text">' + sanitize(summaryText) + '</div>';
            html += '</div>';
        } else if (summaryText) {
            html += '<div class="audio-player idle" id="audioPlayer" data-summary-text="' + summaryText.replace(/"/g, '&quot;') + '"' + (audioUrl ? ' data-audio-url="' + audioUrl + '"' : '') + '>';
            html += '<div class="audio-player-top">';
            html += '<button class="audio-skip-btn" id="skipBack5" onclick="skipAudio(-5)" title="Voltar 5s">';
            html += '<svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"/><path d="M5 10h9a6 6 0 010 12H11"/></svg>';
            html += '</button>';
            html += '<div class="audio-play-btn" onclick="toggleAudio()">';
            html += '<svg class="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';
            html += '<svg class="icon-pause" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
            html += '</div>';
            html += '<button class="audio-skip-btn" id="skipFwd5" onclick="skipAudio(5)" title="Avancar 5s">';
            html += '<svg viewBox="0 0 24 24"><path d="M15 14l4-4-4-4"/><path d="M19 10h-9a6 6 0 000 12h3"/></svg>';
            html += '</button>';
            html += '</div>';
            html += '<canvas class="audio-waveform" id="waveformCanvas"></canvas>';
            html += '<div class="audio-progress-wrap" onclick="seekAudio(event)"><div class="audio-progress-fill" id="progressFill"></div></div>';
            html += '<div class="audio-timer-row"><span id="audioTimerCurrent">0:00</span><span id="audioTimerTotal">0:00</span></div>';
            // Chip único que cicla velocidade
            html += '<div class="speed-row">';
            html += '<button class="speed-cycle" id="speedCycle" onclick="cicloVelocidade()">1x</button>';
            html += '</div>';
            html += '</div>';

            // ── Toggle + Caixa da transcricao karaoke ──
            // Mostra o TEXTO que o TTS fala (textoVoz do Gemini) com estimativa de timing.
            // Por que nao usa o audio do paciente? Porque o medico ouve o briefing clinico,
            // nao o audio bruto do paciente. O texto precisa bater com o audio ouvido.
            // Como nao temos timestamps exatos do TTS ElevenLabs, estimamos: duracao total ÷ palavras.
            // Precisao nao e 100%, mas suficiente pra leitura confortavel.
            if (summaryText) {
                var palavrasArr = summaryText.trim().split(/\s+/).filter(Boolean);
                // Guarda array GLOBAL imediatamente (nao dentro de <script> no innerHTML —
                // browsers ignoram scripts injetados via innerHTML por seguranca)
                window._transcricaoPalavras = palavrasArr;
                console.log('[KARAOKE] palavras armazenadas:', palavrasArr.length);

                html += '<div class="transcricao-toggle" id="transcricaoToggle" onclick="toggleTranscricao()">';
                html += '<span id="transcricaoToggleLabel">Ver transcri\u00e7\u00e3o</span>';
                html += '<svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>';
                html += '</div>';

                html += '<div class="transcricao-box" id="transcricaoBox">';
                html += '<div class="transcricao-inner" id="transcricaoInner">';
                palavrasArr.forEach(function(w, idx) {
                    var safeWord = String(w).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html += '<span class="transcricao-word clickable" data-idx="' + idx + '" onclick="seekToWordByIndex(' + idx + ')">' + safeWord + '</span> ';
                });
                html += '</div>';
                html += '</div>';
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        //  3 NOVOS COMPONENTES (22/04/2026) — abaixo do player+transcricao
        //  Substituem: "O que o paciente disse", "Pontos de atencao" antigo, "Referencia" (Queixa+Historico).
        //  Todos aparecem SEMPRE (estado vazio quando IA nao tem dados).
        // ═══════════════════════════════════════════════════════════════════════════

        // ═══════════════════════════════════════════════════════════════════
        //  ANAMNESE ESTRUTURADA (NOVO 27/04/2026)
        //  Substitui os antigos componentes "Queixa Principal" + "Pontos de Atencao"
        //  Mostra 11 campos clinicos extraidos pela IA, cada um com fonte rastreavel
        //  Fallback: pre-consultas antigas sem summary.anamneseEstruturada
        //           caem na queixaPrincipal velha + descricaoBreve + r.queixaPrincipal
        // ═══════════════════════════════════════════════════════════════════
        var anamnese = summary.anamneseEstruturada || null;
        var temAnamneseEstruturada = anamnese && typeof anamnese === 'object' && Object.keys(anamnese).length > 0;

        // Helper: deriva valor + fonte de um campo da anamnese, com fallback
        // V2: fontes possiveis sao audio | formulario | pulado | desconhecer
        function getAnamneseField(campo) {
            if (!anamnese || !anamnese[campo]) return { valor: null, fonte: null };
            var f = anamnese[campo];
            if (typeof f === 'string') return { valor: f.trim() || null, fonte: 'formulario' };
            if (typeof f === 'object') {
                var v = (f.valor != null && f.valor !== '') ? String(f.valor).trim() : null;
                var fontesValidas = ['audio', 'formulario', 'pulado', 'desconhecer'];
                var s = fontesValidas.indexOf(f.fonte) >= 0 ? f.fonte : null;
                // Pulado/desconhecer mantém fonte mesmo sem valor
                if (s === 'pulado' || s === 'desconhecer') {
                    return { valor: v, fonte: s };
                }
                return { valor: v || null, fonte: v ? (s || 'formulario') : null };
            }
            return { valor: null, fonte: null };
        }
        // Helper: label do badge de fonte
        function fonteLabel(fonte) {
            if (fonte === 'audio') return 'áudio';
            if (fonte === 'formulario') return 'formulário';
            if (fonte === 'pulado') return 'pulado';
            if (fonte === 'desconhecer') return 'não soube';
            return '';
        }

        // Definicao dos 11 campos: chave, label, layout (full = ocupa linha inteira)
        var ANAMNESE_FIELDS = [
            { key: 'queixaPrincipal',        label: 'Queixa Principal',        full: true  },
            { key: 'tempoEvolucao',          label: 'Tempo de Evolução',       full: false },
            { key: 'intensidade',            label: 'Intensidade',             full: false },
            { key: 'fatoresAgravantes',      label: 'Fatores Agravantes',      full: false },
            { key: 'fatoresAtenuantes',      label: 'Fatores Atenuantes',      full: false },
            { key: 'sintomasAssociados',     label: 'Sintomas Associados',     full: false },
            { key: 'tratamentoPrevio',       label: 'Tratamento Prévio',       full: false },
            { key: 'antecedentesPessoais',   label: 'Antecedentes Pessoais',   full: false },
            { key: 'antecedentesFamiliares', label: 'Antecedentes Familiares', full: false },
            { key: 'habitos',                label: 'Hábitos',                 full: false },
            { key: 'sono',                   label: 'Sono',                    full: false }
        ];

        // FALLBACK pra pre-consultas antigas: deriva queixa principal dos campos legados
        if (!temAnamneseEstruturada) {
            var queixaFallback = null;
            if (summary.queixaPrincipal && summary.queixaPrincipal.trim().length >= 20) {
                queixaFallback = summary.queixaPrincipal.trim();
            } else if (summary.descricaoBreve && summary.descricaoBreve.trim().length >= 20) {
                queixaFallback = summary.descricaoBreve.trim();
            } else if (r.queixaPrincipal && r.queixaPrincipal.trim()) {
                queixaFallback = r.queixaPrincipal.trim();
            }
            anamnese = {
                queixaPrincipal: queixaFallback ? { valor: queixaFallback, fonte: 'formulario' } : null
            };
            // Tenta tambem mapear campos do formulario diretamente, se respostas disponiveis
            if (r.duracao)            anamnese.tempoEvolucao         = { valor: String(r.duracao).trim(), fonte: 'formulario' };
            if (r.intensidade)        anamnese.intensidade           = { valor: String(r.intensidade).trim(), fonte: 'formulario' };
            if (r.fatoresAgravantes)  anamnese.fatoresAgravantes     = { valor: String(r.fatoresAgravantes).trim(), fonte: 'formulario' };
            if (r.fatoresAtenuantes)  anamnese.fatoresAtenuantes     = { valor: String(r.fatoresAtenuantes).trim(), fonte: 'formulario' };
            if (r.sintomas)           anamnese.sintomasAssociados    = { valor: String(r.sintomas).trim(), fonte: 'formulario' };
            if (r.tratamentoPrevio)   anamnese.tratamentoPrevio      = { valor: String(r.tratamentoPrevio).trim(), fonte: 'formulario' };
            if (r.condicoes || r.antecedentesPessoais) anamnese.antecedentesPessoais = { valor: String(r.condicoes || r.antecedentesPessoais).trim(), fonte: 'formulario' };
            if (r.historicoFamiliar)  anamnese.antecedentesFamiliares = { valor: String(r.historicoFamiliar).trim(), fonte: 'formulario' };
            if (r.habitos)            anamnese.habitos               = { valor: String(r.habitos).trim(), fonte: 'formulario' };
            if (r.sono)               anamnese.sono                  = { valor: String(r.sono).trim(), fonte: 'formulario' };
        }

        // Conta quantos campos foram efetivamente preenchidos
        var camposPreenchidos = 0;
        ANAMNESE_FIELDS.forEach(function(f) {
            var d = getAnamneseField(f.key);
            if (d.valor) camposPreenchidos++;
        });

        // Renderiza o card de Anamnese Estruturada
        html += '<div class="anamnese-card anim anim-d3">';
        html += '<div class="anamnese-head">';
        html += '<div class="anamnese-head-icon"><svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z"/></svg></div>';
        html += '<div class="anamnese-head-title">';
        html += '<h3>Anamnese estruturada</h3>';
        html += '<p>Extraída do áudio e formulário · cada campo tem fonte rastreável</p>';
        html += '</div>';
        html += '<div class="anamnese-head-pill">' + camposPreenchidos + '/11 campos</div>';
        html += '</div>';

        if (camposPreenchidos === 0) {
            html += '<div class="anamnese-empty-block"><strong>Anamnese ainda não estruturada</strong> — pré-consulta antiga ou sem dados suficientes. Colher em consulta.</div>';
        } else {
            // Queixa Principal sempre full width (primeiro item)
            var qp = getAnamneseField('queixaPrincipal');
            html += '<div class="anamnese-grid full">';
            html += '<div class="anamnese-field">';
            html += '<div class="anamnese-field-lbl"><span class="anamnese-field-lbl-text">Queixa Principal</span>';
            if (qp.fonte) html += '<span class="anamnese-field-src ' + qp.fonte + '">' + fonteLabel(qp.fonte) + '</span>';
            html += '</div>';
            if (qp.valor) {
                html += '<div class="anamnese-field-val">' + sanitize(qp.valor) + '</div>';
            } else {
                html += '<div class="anamnese-field-val empty">Não relatado</div>';
            }
            html += '</div>';
            html += '</div>';

            // Demais 10 campos em grid 2 colunas
            html += '<div class="anamnese-grid" style="margin-top:10px">';
            ANAMNESE_FIELDS.forEach(function(f) {
                if (f.key === 'queixaPrincipal') return; // ja renderizada
                var d = getAnamneseField(f.key);
                html += '<div class="anamnese-field">';
                html += '<div class="anamnese-field-lbl"><span class="anamnese-field-lbl-text">' + sanitize(f.label) + '</span>';
                if (d.fonte) html += '<span class="anamnese-field-src ' + d.fonte + '">' + fonteLabel(d.fonte) + '</span>';
                html += '</div>';
                if (d.valor) {
                    html += '<div class="anamnese-field-val">' + sanitize(d.valor) + '</div>';
                } else {
                    html += '<div class="anamnese-field-val empty">Não relatado</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }

        html += '</div>';

        // Variaveis legadas mantidas pra compat com o "raw fallback" que vem depois
        var queixaLimpa = (anamnese && anamnese.queixaPrincipal && anamnese.queixaPrincipal.valor) ? anamnese.queixaPrincipal.valor : '';
        var pontosAt = []; // Pontos de Atencao foi removido nessa versao

        // ─── COMPONENTE 3: PADROES OBSERVADOS (novo — sugestoes SEM diagnosticar) ───
        var padroes = summary.identificaPadroes || [];
        html += '<div class="section-label padroes-section-label anim anim-d5">';
        html += '<span>Padroes observados</span>';
        html += '<span class="padroes-section-sub">Sugestoes para apoio ao raciocinio clinico</span>';
        html += '</div>';
        if (padroes.length === 0) {
            html += '<div class="honest-empty anim anim-d5"><strong>Sem padroes suficientes</strong> para sugerir hipoteses neste relato.</div>';
        } else {
            padroes.slice(0, 3).forEach(function(p) {
                var hip = (p.hipotese || '').trim();
                var evid = (p.evidencia || '').trim();
                if (!hip) return;
                html += '<div class="padroes-card anim anim-d5">';
                html += '<div class="padroes-card-icon"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 00-4 12.74V17h8v-2.26A7 7 0 0012 2z"/></svg></div>';
                html += '<div class="padroes-card-content">';
                html += '<div class="padroes-card-hipotese">' + sanitize(hip) + '</div>';
                if (evid) html += '<div class="padroes-card-evidencia">' + sanitize(evid) + '</div>';
                html += '</div>';
                html += '</div>';
            });
        }
        // Disclaimer permanente (sempre aparece, mesmo quando vazio)
        html += '<div class="padroes-disclaimer anim anim-d5">Sugestoes geradas a partir do relato do paciente. Nao substituem avaliacao clinica. Decisao diagnostica e sempre do medico.</div>';

        // Raw fallback (so se nenhum dos 3 componentes novos renderizou e nao tem alertas legacy)
        var temAlgumNovo = queixaLimpa || pontosAt.length > 0 || padroes.length > 0;
        var blocosLegacy = summary.blocos || [];
        if (!temAlgumNovo && !blocosLegacy.length && (!summary.alertas || !summary.alertas.length) && pc.respostas) {
            html += '<div class="section-label anim anim-d3">Respostas do paciente</div>';
            var entries = Object.entries(pc.respostas);
            entries.forEach(function(pair) {
                var key = pair[0];
                var val = pair[1];
                if (!val || typeof val === 'object') return;
                if (HIDE_FIELDS.indexOf(key) !== -1) return;
                if (typeof val === 'string' && val.startsWith('http')) return;
                var label = LABELS[key] || key;
                html += '<div class="insight-card info anim anim-d4"><div class="insight-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div><div class="insight-content"><div class="insight-title">' + sanitize(label) + '</div><div class="insight-msg">' + sanitize(val) + '</div></div></div>';
            });
        }

        // FASE 8 — Anotacoes efemeras do medico (sticky notes)
        html += '<div class="section-label anim anim-d5">Minhas anotacoes</div>';
        html += '<div class="sticky-wrap anim anim-d5">';
        html += '<div class="sticky-input-wrap">';
        html += '<textarea id="stickyInput" placeholder="Anotacao rapida (so voce ve, fica no navegador)..."></textarea>';
        html += '<button onclick="saveSticky()">Salvar</button>';
        html += '</div>';
        html += '<div id="stickyList"></div>';
        html += '</div>';

        // FASE 7 — Disclaimer CFM/LGPD
        html += '<div class="cfm-disclaimer anim anim-d5">' +
            '<strong>Suporte a decisao clinica.</strong> Este briefing e gerado automaticamente a partir das respostas do paciente e serve como referencia. ' +
            'Nao substitui a avaliacao medica. Diagnostico, prescricao e conduta sao de responsabilidade exclusiva do medico. ' +
            'Acesso auditado conforme LGPD e CFM.' +
        '</div>';
        html += '<div style="height:40px"></div>';

        document.getElementById('loadingState').style.display = 'none';
        var dc = document.getElementById('dynamicContent');
        dc.innerHTML = html;
        dc.style.display = '';

        // FASE 5 — marcar botoes header como active se tema/privado ja estao ligados
        var btnTheme = document.getElementById('btnTheme');
        if (btnTheme && document.body.classList.contains('dark-mode')) btnTheme.classList.add('active');
        var btnPrivacy = document.getElementById('btnPrivacy');
        if (btnPrivacy && document.body.classList.contains('privacy-mode')) btnPrivacy.classList.add('active');

        // FASE 8 — Renderiza sticky notes e aplica dismissed state em alertas
        renderStickies();
        aplicarDismissed();

        // Wait for layout before initializing canvas
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                canvasEl = document.getElementById('waveformCanvas');
                if (canvasEl) {
                    var dpr = window.devicePixelRatio || 1;
                    var rect = canvasEl.getBoundingClientRect();
                    var cssW = rect.width || 300;
                    var cssH = rect.height || 48;
                    canvasEl.width = cssW * dpr;
                    canvasEl.height = cssH * dpr;
                    canvasCtx = canvasEl.getContext('2d');
                    canvasCtx.scale(dpr, dpr);
                    drawIdleWaveform();
                }
            });
        });

    } catch (e) {
        document.getElementById('loadingState').textContent = 'Erro ao carregar: ' + e.message;
    }
}

function buildHabitos(r) {
    var parts = [];
    if (r.tabagismo) parts.push(r.tabagismo === 'nao' || r.tabagismo === 'Não' ? 'Nao fuma' : 'Fuma, ' + r.tabagismo);
    if (r.alcool) parts.push('Alcool: ' + r.alcool);
    if (r.horasSono || r.sono) parts.push('Sono: ' + (r.horasSono || r.sono) + 'h');
    if (r.exercicio) parts.push('Exercicio: ' + r.exercicio);
    if (r.cafe) parts.push('Cafe: ' + r.cafe + ' xic/dia');
    return parts.join(' | ');
}

init();
</script>
</body>
</html>
