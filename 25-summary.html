<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — One Minute Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        /* ── Summary-specific styles (using design tokens) ── */

        .summary-header {
            display: flex; align-items: center; gap: 10px;
            padding: var(--v-s5) var(--v-s6) var(--v-s3);
        }
        .summary-header-title {
            flex: 1; text-align: center;
            font-size: 17px; font-weight: 700; color: var(--v-ink);
            margin-right: 40px;
        }

        /* Patient hero */
        .patient-hero {
            display: flex; flex-direction: column; align-items: center;
            padding: var(--v-s2) var(--v-s6) var(--v-s6);
            gap: 6px;
        }
        .patient-photo {
            width: 88px; height: 88px; border-radius: 50%;
            background: var(--v-grad); padding: 3px; margin-bottom: var(--v-s1);
        }
        .patient-photo-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--v-surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: var(--v-green);
            overflow: hidden;
        }
        .patient-photo-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .patient-name { font-size: 22px; font-weight: 800; color: var(--v-ink); letter-spacing: -0.5px; }
        .patient-age { font-size: 14px; font-weight: 500; color: var(--v-ink3); }
        .patient-desc {
            font-size: 14px; color: var(--v-ink2); text-align: center;
            line-height: 1.5; max-width: 300px; margin-top: var(--v-s1);
            font-style: italic;
        }
        .date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: var(--v-r-pill);
            background: rgba(0,229,160,0.08);
            font-size: 11px; font-weight: 600; color: var(--v-green2);
        }
        .date-badge svg { width: 12px; height: 12px; stroke: var(--v-green2); fill: none; stroke-width: 2; stroke-linecap: round; }

        /* Stale warning */
        .stale-warning {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; border-radius: var(--v-r-md);
            background: rgba(245,158,11,0.06); border: var(--v-border-warn);
            font-size: 12px; color: var(--v-warn); font-weight: 600;
            margin: 0 var(--v-s5) var(--v-s4);
        }
        .stale-warning svg { width: 16px; height: 16px; stroke: var(--v-warn); fill: none; stroke-width: 2; flex-shrink: 0; }

        /* Audio button (collapsed) */
        .audio-btn {
            display: flex; align-items: center; gap: 12px;
            margin: 0 var(--v-s5) var(--v-s4);
            padding: 14px 18px;
            background: var(--v-surface); border: var(--v-border);
            border-radius: var(--v-r-lg);
            box-shadow: var(--v-sh);
            cursor: pointer; transition: all 0.2s var(--v-ease);
        }
        .audio-btn:active { transform: scale(0.98); }
        .audio-btn-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--v-grad);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: var(--v-sh-green);
        }
        .audio-btn-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .audio-btn-text { flex: 1; }
        .audio-btn-label { font-size: 14px; font-weight: 700; color: var(--v-ink); }
        .audio-btn-sub { font-size: 12px; color: var(--v-ink4); margin-top: 2px; }
        .audio-btn-bars {
            display: flex; align-items: center; gap: 2px; height: 24px;
        }
        .audio-btn-bar {
            width: 3px; border-radius: 3px;
            background: var(--v-green);
            opacity: 0.3;
        }
        .audio-btn.playing .audio-btn-bar {
            animation: barPulse 0.6s ease-in-out infinite alternate;
            opacity: 1;
        }
        @keyframes barPulse {
            from { transform: scaleY(0.3); }
            to { transform: scaleY(1); }
        }
        .audio-btn-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .audio-btn-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
        .audio-btn-bar:nth-child(3) { height: 12px; animation-delay: 0.05s; }
        .audio-btn-bar:nth-child(4) { height: 20px; animation-delay: 0.15s; }
        .audio-btn-bar:nth-child(5) { height: 10px; animation-delay: 0.08s; }
        .audio-btn-bar:nth-child(6) { height: 14px; animation-delay: 0.12s; }
        .audio-btn-bar:nth-child(7) { height: 8px; animation-delay: 0.02s; }

        /* Alert cards */
        .alert-card {
            padding: 14px 16px;
            border-radius: var(--v-r-md);
            margin: 0 var(--v-s5) var(--v-s2);
            display: flex; align-items: flex-start; gap: 12px;
        }
        .alert-card.urgente { background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.15); }
        .alert-card.atencao { background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.15); }
        .alert-card.info { background: rgba(59,130,246,0.05); border: 1px solid rgba(59,130,246,0.15); }
        .alert-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0; margin-top: 4px;
        }
        .urgente .alert-dot { background: var(--v-bad); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
        .atencao .alert-dot { background: var(--v-warn); box-shadow: 0 0 8px rgba(245,158,11,0.4); }
        .info .alert-dot { background: var(--v-info); box-shadow: 0 0 8px rgba(59,130,246,0.4); }
        .alert-content { flex: 1; }
        .alert-type { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
        .urgente .alert-type { color: var(--v-bad); }
        .atencao .alert-type { color: var(--v-warn); }
        .info .alert-type { color: var(--v-info); }
        .alert-msg { font-size: 13px; color: var(--v-ink2); line-height: 1.5; }

        /* Context grid */
        .context-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; padding: 0 var(--v-s5); margin-bottom: var(--v-s4);
        }
        .ctx-card {
            background: var(--v-surface); border: var(--v-border);
            border-radius: var(--v-r-md); padding: 14px;
            box-shadow: var(--v-sh); position: relative; overflow: hidden;
        }
        .ctx-card.priority-high::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; background: var(--v-bad); border-radius: 4px 0 0 4px;
        }
        .ctx-card.priority-high { padding-left: 18px; }
        .ctx-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }
        .ctx-icon svg { width: 18px; height: 18px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .ctx-icon.queixa { background: rgba(239,68,68,0.08); }
        .ctx-icon.queixa svg { stroke: var(--v-bad); }
        .ctx-icon.meds { background: rgba(0,229,160,0.08); }
        .ctx-icon.meds svg { stroke: var(--v-green); }
        .ctx-icon.alergias { background: rgba(245,158,11,0.08); }
        .ctx-icon.alergias svg { stroke: var(--v-warn); }
        .ctx-icon.habitos { background: rgba(59,130,246,0.08); }
        .ctx-icon.habitos svg { stroke: var(--v-info); }
        .ctx-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--v-ink4); margin-bottom: 6px; }
        .ctx-value { font-size: 13px; font-weight: 500; color: var(--v-ink); line-height: 1.5; }
        .ctx-value span { display: block; color: var(--v-ink3); font-size: 12px; }

        /* Raw response cards */
        .raw-card {
            background: var(--v-surface); border: var(--v-border);
            border-radius: var(--v-r-md); padding: var(--v-s4);
            margin: 0 var(--v-s5) var(--v-s2); box-shadow: var(--v-sh);
        }
        .raw-label { font-size: 12px; font-weight: 700; color: var(--v-ink4); margin-bottom: 4px; }
        .raw-value { font-size: 14px; color: var(--v-ink2); line-height: 1.5; }

        /* Animations */
        .anim { opacity: 0; transform: translateY(20px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        .anim-d1 { animation-delay: 0.05s; }
        .anim-d2 { animation-delay: 0.1s; }
        .anim-d3 { animation-delay: 0.15s; }
        .anim-d4 { animation-delay: 0.2s; }
        .anim-d5 { animation-delay: 0.25s; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .loading-state { text-align: center; padding: 80px 20px; color: var(--v-ink4); font-size: 13px; }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content" id="mainContent">
        <div id="loadingState" class="loading-state">Carregando resumo...</div>
        <div id="dynamicContent" style="display:none;"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const pcId = urlParams.get('id');

// Fields to hide in raw fallback
const HIDE_FIELDS = ['metodo','audioUrl','fotoUrl','linkToken','pacienteId','consentimento','lgpdAceito','audio','foto','audioBase64','fotoBase64'];

const LABELS = {
    nomeCompleto:'Nome completo', dataNascimento:'Data de nascimento',
    cpf:'CPF', telefone:'Telefone', email:'E-mail', sexo:'Sexo',
    queixaPrincipal:'Queixa principal', duracaoSintomas:'Duracao dos sintomas',
    medicamentosEmUso:'Medicamentos em uso', alergias:'Alergias',
    reacoesAdversas:'Reacoes adversas', doencasAtuais:'Doencas atuais',
    historicoInternacoes:'Historico de internacoes', cirurgias:'Cirurgias',
    historiaFamiliar:'Historia familiar', tabagismo:'Tabagismo',
    alcool:'Alcool', exercicio:'Exercicio fisico', sono:'Sono',
    cafeina:'Cafeina', mudancasRotina:'Mudancas na rotina',
    examesAnteriores:'Exames anteriores', observacoes:'Observacoes',
    queixa:'Queixa principal', motivoConsulta:'Motivo da consulta',
    genero:'Genero', estadoCivil:'Estado civil',
    q_queixa:'Queixa principal', q_medicamentos:'Medicamentos', q_alergias:'Alergias',
};

function calcAge(dateStr) {
    if (!dateStr) return null;
    let d;
    if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        d = new Date(parts[2], parts[1] - 1, parts[0]);
    } else {
        d = new Date(dateStr);
    }
    if (isNaN(d.getTime())) return null;
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 60 * 60 * 1000));
}

function getInitials(name) {
    return (name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}

function daysSince(dateStr) {
    if (!dateStr) return 999;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / (86400000));
}

// TTS state
let ttsAudio = null;
let ttsPlaying = false;

function toggleTTS() {
    const btn = document.getElementById('audioBtn');
    if (!btn) return;

    if (ttsPlaying) {
        if (ttsAudio) ttsAudio.pause();
        speechSynthesis.cancel();
        ttsPlaying = false;
        btn.classList.remove('playing');
        btn.querySelector('.audio-btn-label').textContent = 'Ouvir resumo';
        return;
    }

    // Try cached ElevenLabs audio first
    const cachedUrl = btn.dataset.audioUrl;
    if (cachedUrl) {
        if (!ttsAudio) ttsAudio = new Audio(cachedUrl);
        ttsAudio.play().then(() => {
            ttsPlaying = true;
            btn.classList.add('playing');
            btn.querySelector('.audio-btn-label').textContent = 'Pausar';
        }).catch(() => fallbackBrowserTTS());
        ttsAudio.onended = () => {
            ttsPlaying = false;
            btn.classList.remove('playing');
            btn.querySelector('.audio-btn-label').textContent = 'Ouvir resumo';
        };
        return;
    }

    // Try generate via ElevenLabs endpoint
    const pcIdLocal = urlParams.get('id');
    if (pcIdLocal && getToken()) {
        btn.querySelector('.audio-btn-sub').textContent = 'Gerando audio...';
        fetch(API_URL + '/pre-consulta/' + pcIdLocal + '/tts', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(r => {
            if (!r.ok) throw new Error('TTS failed');
            return r.blob();
        }).then(blob => {
            const url = URL.createObjectURL(blob);
            ttsAudio = new Audio(url);
            btn.dataset.audioUrl = url;
            ttsAudio.play();
            ttsPlaying = true;
            btn.classList.add('playing');
            btn.querySelector('.audio-btn-label').textContent = 'Pausar';
            btn.querySelector('.audio-btn-sub').textContent = '~1 minuto';
            ttsAudio.onended = () => {
                ttsPlaying = false;
                btn.classList.remove('playing');
                btn.querySelector('.audio-btn-label').textContent = 'Ouvir resumo';
            };
        }).catch(() => {
            btn.querySelector('.audio-btn-sub').textContent = '~1 minuto';
            fallbackBrowserTTS();
        });
        return;
    }

    fallbackBrowserTTS();
}

function fallbackBrowserTTS() {
    const btn = document.getElementById('audioBtn');
    const text = btn ? btn.dataset.summaryText : '';
    if (!text || !window.speechSynthesis) return;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.95;
    utterance.onstart = () => {
        ttsPlaying = true;
        if (btn) { btn.classList.add('playing'); btn.querySelector('.audio-btn-label').textContent = 'Pausar'; }
    };
    utterance.onend = () => {
        ttsPlaying = false;
        if (btn) { btn.classList.remove('playing'); btn.querySelector('.audio-btn-label').textContent = 'Ouvir resumo'; }
    };
    speechSynthesis.speak(utterance);
}

async function init() {
    if (!pcId) { document.getElementById('loadingState').textContent = 'ID nao fornecido.'; return; }

    try {
        const data = await vitaeAPI.getPreConsulta(pcId);
        const pc = data.preConsulta;
        const summary = pc.summaryJson || {};
        const r = pc.respostas || {};
        const summaryText = summary.summaryTexto || pc.summaryIA || '';
        const descBreve = summary.descricaoBreve || (summaryText ? summaryText.split('. ')[0] + '.' : '');
        const respondidaEm = pc.respondidaEm ? new Date(pc.respondidaEm).toLocaleDateString('pt-BR') : '';
        const days = daysSince(pc.respondidaEm);
        const foto = pc.pacienteFotoUrl || r.fotoUrl || null;
        const age = calcAge(r.dataNascimento || (r.nascimento));
        const initials = getInitials(pc.pacienteNome);
        const audioUrl = pc.audioSummaryUrl || null;

        // Back URL
        const fromParam = urlParams.get('from');
        const backUrl = fromParam === 'pacientes' ? '20-medico-dashboard.html?view=pacientes' : '20-medico-dashboard.html';

        let html = '';

        // Header
        html += '<div class="summary-header anim">';
        html += '<div class="btn-back" onclick="window.location.href=\'' + backUrl + '\'"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>';
        html += '<div class="summary-header-title">One Minute Summary</div>';
        html += '</div>';

        // Patient hero
        html += '<div class="patient-hero anim anim-d1">';
        html += '<div class="patient-photo"><div class="patient-photo-inner">';
        if (foto) {
            html += '<img src="' + foto + '" onerror="this.parentElement.textContent=\'' + initials + '\'">';
        } else {
            html += initials;
        }
        html += '</div></div>';
        html += '<div class="patient-name">' + (pc.pacienteNome || 'Paciente') + '</div>';
        if (age) html += '<div class="patient-age">' + age + ' anos</div>';
        if (respondidaEm) {
            html += '<div class="date-badge"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Respondida em ' + respondidaEm + '</div>';
        }
        if (descBreve) html += '<div class="patient-desc">"' + descBreve + '"</div>';
        html += '</div>';

        // Stale warning
        if (days > 7) {
            html += '<div class="stale-warning anim anim-d1"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Pre-consulta com mais de 7 dias. Dados podem estar desatualizados.</div>';
        }

        // Audio button (collapsed)
        if (summaryText) {
            html += '<div class="audio-btn anim anim-d2" id="audioBtn" onclick="toggleTTS()" data-summary-text="' + summaryText.replace(/"/g, '&quot;') + '"' + (audioUrl ? ' data-audio-url="' + audioUrl + '"' : '') + '>';
            html += '<div class="audio-btn-icon"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="#fff" fill="none"/><path d="M15.54 8.46a5 5 0 010 7.07" stroke="#fff"/></svg></div>';
            html += '<div class="audio-btn-text"><div class="audio-btn-label">Ouvir resumo</div><div class="audio-btn-sub">~1 minuto</div></div>';
            html += '<div class="audio-btn-bars">';
            for (let i = 0; i < 7; i++) html += '<div class="audio-btn-bar"></div>';
            html += '</div></div>';
        }

        // Alerts
        const alertas = summary.alertas || [];
        if (alertas.length > 0) {
            html += '<div class="section-label anim anim-d2">Alertas clinicos</div>';
            alertas.forEach(function(a) {
                const tipo = (a.tipo || 'INFO').toLowerCase();
                const tipoLabel = { urgente: 'Urgente', atencao: 'Atencao', info: 'Informacao' }[tipo] || a.tipo;
                html += '<div class="alert-card ' + tipo + ' anim anim-d3">';
                html += '<div class="alert-dot"></div>';
                html += '<div class="alert-content"><div class="alert-type">' + tipoLabel + '</div>';
                html += '<div class="alert-msg">' + a.mensagem + '</div></div></div>';
            });
        }

        // Context grid
        const blocos = summary.blocos || [];
        const queixa = findBloco(blocos, 'queixa') || r.queixaPrincipal || r.queixa || r.q_queixa || '';
        const meds = findBloco(blocos, 'medicament') || r.medicamentosEmUso || r.q_medicamentos || '';
        const alergias = findBloco(blocos, 'alergia') || r.alergias || r.q_alergias || '';
        const habitos = findBloco(blocos, 'habit') || buildHabitos(r) || '';

        const hasContext = queixa || meds || alergias || habitos;
        if (hasContext) {
            html += '<div class="section-label anim anim-d3">Contexto rapido</div>';
            html += '<div class="context-grid anim anim-d4">';

            if (queixa) {
                const queixaPrio = findBlocoPrio(blocos, 'queixa') === 'alta';
                html += '<div class="ctx-card' + (queixaPrio ? ' priority-high' : '') + '">';
                html += '<div class="ctx-icon queixa"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>';
                html += '<div class="ctx-title">Queixa</div>';
                html += '<div class="ctx-value">' + truncate(queixa, 60) + '</div></div>';
            }
            if (meds) {
                html += '<div class="ctx-card">';
                html += '<div class="ctx-icon meds"><svg viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>';
                html += '<div class="ctx-title">Medicamentos</div>';
                html += '<div class="ctx-value">' + truncate(meds, 60) + '</div></div>';
            }
            if (alergias) {
                html += '<div class="ctx-card priority-high">';
                html += '<div class="ctx-icon alergias"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>';
                html += '<div class="ctx-title">Alergias</div>';
                html += '<div class="ctx-value">' + truncate(alergias, 60) + '</div></div>';
            }
            if (habitos) {
                html += '<div class="ctx-card">';
                html += '<div class="ctx-icon habitos"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></div>';
                html += '<div class="ctx-title">Habitos</div>';
                html += '<div class="ctx-value">' + truncate(habitos, 60) + '</div></div>';
            }

            html += '</div>';
        }

        // Suggested questions
        const perguntas = summary.perguntasSugeridas || [];
        if (perguntas.length > 0) {
            html += '<div class="section-label anim anim-d4">Perguntas para a consulta</div>';
            perguntas.forEach(function(q) {
                html += '<div class="raw-card anim anim-d5"><div class="raw-value">' + q + '</div></div>';
            });
        }

        // Raw fallback (if no blocos AND no context)
        if (!hasContext && !blocos.length && pc.respostas) {
            html += '<div class="section-label anim anim-d3">Respostas do paciente</div>';
            const entries = Object.entries(pc.respostas);
            entries.forEach(function(pair) {
                const key = pair[0];
                const val = pair[1];
                if (!val || typeof val === 'object') return;
                if (HIDE_FIELDS.indexOf(key) !== -1) return;
                if (typeof val === 'string' && val.startsWith('http')) return;
                const label = LABELS[key] || key;
                html += '<div class="raw-card anim anim-d4"><div class="raw-label">' + label + '</div><div class="raw-value">' + val + '</div></div>';
            });
        }

        html += '<div style="height:40px"></div>';

        document.getElementById('loadingState').style.display = 'none';
        const dc = document.getElementById('dynamicContent');
        dc.style.display = '';
        dc.innerHTML = html;

    } catch (e) {
        document.getElementById('loadingState').textContent = 'Erro ao carregar: ' + e.message;
    }
}

function findBloco(blocos, keyword) {
    const b = blocos.find(function(bl) { return bl.titulo && bl.titulo.toLowerCase().indexOf(keyword) !== -1; });
    return b ? b.conteudo : '';
}

function findBlocoPrio(blocos, keyword) {
    const b = blocos.find(function(bl) { return bl.titulo && bl.titulo.toLowerCase().indexOf(keyword) !== -1; });
    return b ? b.prioridade : '';
}

function buildHabitos(r) {
    const parts = [];
    if (r.tabagismo) parts.push(r.tabagismo === 'nao' || r.tabagismo === 'Não' ? 'Nao fuma' : 'Fuma');
    if (r.alcool) parts.push(r.alcool);
    if (r.sono) parts.push(r.sono + ' sono');
    if (r.exercicio) parts.push(r.exercicio);
    return parts.join(', ');
}

function truncate(text, max) {
    if (!text) return '';
    return text.length > max ? text.substring(0, max) + '...' : text;
}

init();
</script>
