<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — One Minute Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        /* ── Summary-specific styles ── */

        .summary-header {
            display: flex; align-items: center; gap: 10px;
            padding: var(--v-s5) var(--v-s6) var(--v-s3);
        }
        .summary-header-title {
            flex: 1; text-align: center;
            font-size: 17px; font-weight: 700; color: var(--v-ink);
            margin-right: 40px;
        }

        /* Patient hero */
        .patient-hero {
            display: flex; flex-direction: column; align-items: center;
            padding: var(--v-s2) var(--v-s6) var(--v-s6);
            gap: 6px;
        }
        .patient-photo {
            width: 88px; height: 88px; border-radius: 50%;
            background: var(--v-grad); padding: 3px; margin-bottom: var(--v-s1);
        }
        .patient-photo-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--v-surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: var(--v-green);
            overflow: hidden;
        }
        .patient-photo-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .patient-name { font-size: 22px; font-weight: 800; color: var(--v-ink); letter-spacing: -0.5px; }
        .patient-age { font-size: 14px; font-weight: 500; color: var(--v-ink3); }
        .patient-desc {
            font-size: 14px; color: var(--v-ink2); text-align: center;
            line-height: 1.5; max-width: 300px; margin-top: var(--v-s1);
            font-style: italic;
        }
        .date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: var(--v-r-pill);
            background: rgba(0,229,160,0.08);
            font-size: 11px; font-weight: 600; color: var(--v-green2);
        }
        .date-badge svg { width: 12px; height: 12px; stroke: var(--v-green2); fill: none; stroke-width: 2; stroke-linecap: round; }

        /* Stale warning */
        .stale-warning {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; border-radius: var(--v-r-md);
            background: rgba(245,158,11,0.06); border: var(--v-border-warn);
            font-size: 12px; color: var(--v-warn); font-weight: 600;
            margin: 0 var(--v-s5) var(--v-s4);
        }
        .stale-warning svg { width: 16px; height: 16px; stroke: var(--v-warn); fill: none; stroke-width: 2; flex-shrink: 0; }

        /* ── Premium Audio Player (dark, real waveform) ── */
        .audio-player {
            margin: 0 var(--v-s5) var(--v-s5);
            background: #0D0F14;
            border-radius: 18px;
            padding: 18px 20px 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 40px rgba(0,229,160,0.06);
            transition: box-shadow 0.6s ease;
        }
        .audio-player.playing {
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 40px rgba(0,229,160,0.1);
        }
        .audio-player-top {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 14px;
        }
        .audio-play-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--v-grad);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,229,160,0.3);
            transition: transform 0.2s var(--v-ease), box-shadow 0.2s;
            border: none; outline: none;
        }
        .audio-play-btn:active { transform: scale(0.92); }
        .audio-play-btn svg { width: 18px; height: 18px; fill: #fff; stroke: none; }
        .audio-play-btn .icon-pause { display: none; }
        .audio-player.playing .audio-play-btn .icon-play { display: none; }
        .audio-player.playing .audio-play-btn .icon-pause { display: block; }
        .audio-info { flex: 1; }
        .audio-label {
            font-size: 14px; font-weight: 700; color: #fff;
            letter-spacing: -0.2px;
        }
        .audio-sub {
            font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
        .audio-timer {
            font-family: 'Plus Jakarta Sans', monospace;
            font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.35);
            letter-spacing: 0.5px; flex-shrink: 0;
        }

        /* Waveform canvas */
        .audio-waveform {
            width: 100%; height: 48px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* Progress bar */
        .audio-progress-wrap {
            width: 100%; height: 3px; background: rgba(255,255,255,0.08);
            border-radius: 3px; cursor: pointer; position: relative;
        }
        .audio-progress-fill {
            height: 100%; background: var(--v-grad);
            border-radius: 3px; width: 0%; transition: width 0.1s linear;
        }

        /* Glow pulse when idle */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 30px rgba(0,229,160,0.05); }
            50% { box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 50px rgba(0,229,160,0.1); }
        }
        .audio-player.idle { animation: glowPulse 3s ease-in-out infinite; }
        .audio-player.playing { animation: none; }

        /* ── Pontos de Atencao (redesigned alerts) ── */
        .insight-card {
            display: flex; gap: 12px;
            padding: 14px 16px;
            margin: 0 var(--v-s5) var(--v-s2);
            background: var(--v-surface);
            border-radius: var(--v-r-md);
            border: var(--v-border);
            position: relative; overflow: hidden;
        }
        .insight-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; border-radius: 4px 0 0 4px;
        }
        .insight-card.urgente::before { background: var(--v-bad); }
        .insight-card.atencao::before { background: var(--v-warn); }
        .insight-card.info::before { background: var(--v-info); }
        .insight-card { padding-left: 20px; }

        .insight-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .insight-icon svg { width: 16px; height: 16px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .urgente .insight-icon { background: rgba(239,68,68,0.08); }
        .urgente .insight-icon svg { stroke: var(--v-bad); }
        .atencao .insight-icon { background: rgba(245,158,11,0.08); }
        .atencao .insight-icon svg { stroke: var(--v-warn); }
        .info .insight-icon { background: rgba(59,130,246,0.08); }
        .info .insight-icon svg { stroke: var(--v-info); }

        .insight-content { flex: 1; min-width: 0; }
        .insight-title {
            font-size: 13px; font-weight: 700; color: var(--v-ink);
            margin-bottom: 3px; line-height: 1.3;
        }
        .insight-msg { font-size: 12px; color: var(--v-ink3); line-height: 1.5; }

        /* ── Ficha do Paciente (collapsible accordion) ── */
        .ficha-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            margin: 0 var(--v-s5) var(--v-s2);
            background: var(--v-surface);
            border: var(--v-border); border-radius: var(--v-r-md);
            cursor: pointer; transition: all 0.2s var(--v-ease);
        }
        .ficha-toggle:active { transform: scale(0.98); }
        .ficha-toggle-left {
            display: flex; align-items: center; gap: 10px;
        }
        .ficha-toggle-icon {
            width: 32px; height: 32px; border-radius: 10px;
            background: rgba(0,229,160,0.08);
            display: flex; align-items: center; justify-content: center;
        }
        .ficha-toggle-icon svg { width: 16px; height: 16px; stroke: var(--v-green); fill: none; stroke-width: 2; stroke-linecap: round; }
        .ficha-toggle-text { font-size: 14px; font-weight: 600; color: var(--v-ink); }
        .ficha-chevron {
            width: 20px; height: 20px; stroke: var(--v-ink4); fill: none; stroke-width: 2;
            transition: transform 0.3s var(--v-ease);
        }
        .ficha-toggle.open .ficha-chevron { transform: rotate(180deg); }

        .ficha-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s var(--v-ease);
            margin: 0 var(--v-s5);
        }
        .ficha-body.open { max-height: 2000px; }
        .ficha-body-inner {
            background: var(--v-surface); border: var(--v-border);
            border-radius: 0 0 var(--v-r-md) var(--v-r-md);
            border-top: none;
            padding: 4px 16px 12px;
        }
        .ficha-row {
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .ficha-row:last-child { border-bottom: none; }
        .ficha-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--v-ink4); margin-bottom: 3px;
        }
        .ficha-value { font-size: 13px; font-weight: 500; color: var(--v-ink); line-height: 1.5; }

        /* Raw fallback */
        .raw-card {
            background: var(--v-surface); border: var(--v-border);
            border-radius: var(--v-r-md); padding: var(--v-s4);
            margin: 0 var(--v-s5) var(--v-s2); box-shadow: var(--v-sh);
        }
        .raw-label { font-size: 12px; font-weight: 700; color: var(--v-ink4); margin-bottom: 4px; }
        .raw-value { font-size: 14px; color: var(--v-ink2); line-height: 1.5; }

        /* Animations */
        .anim { opacity: 0; transform: translateY(20px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        .anim-d1 { animation-delay: 0.05s; }
        .anim-d2 { animation-delay: 0.1s; }
        .anim-d3 { animation-delay: 0.15s; }
        .anim-d4 { animation-delay: 0.2s; }
        .anim-d5 { animation-delay: 0.25s; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .loading-state { text-align: center; padding: 80px 20px; color: var(--v-ink4); font-size: 13px; }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content" id="mainContent">
        <div id="loadingState" class="loading-state">Carregando resumo...</div>
        <div id="dynamicContent" style="display:none;"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const pcId = urlParams.get('id');

const HIDE_FIELDS = ['metodo','audioUrl','fotoUrl','linkToken','pacienteId','consentimento','lgpdAceito','audio','foto','audioBase64','fotoBase64'];

const LABELS = {
    nomeCompleto:'Nome completo', dataNascimento:'Data de nascimento',
    cpf:'CPF', telefone:'Telefone', email:'E-mail', sexo:'Sexo',
    queixaPrincipal:'Queixa principal', duracaoSintomas:'Duracao dos sintomas',
    medicamentosEmUso:'Medicamentos em uso', alergias:'Alergias',
    reacoesAdversas:'Reacoes adversas', doencasAtuais:'Doencas atuais',
    historicoInternacoes:'Historico de internacoes', cirurgias:'Cirurgias',
    historiaFamiliar:'Historia familiar', tabagismo:'Tabagismo',
    alcool:'Alcool', exercicio:'Exercicio fisico', sono:'Sono',
    cafeina:'Cafeina', mudancasRotina:'Mudancas na rotina',
    examesAnteriores:'Exames anteriores', observacoes:'Observacoes',
    queixa:'Queixa principal', motivoConsulta:'Motivo da consulta',
    genero:'Genero', estadoCivil:'Estado civil',
    q_queixa:'Queixa principal', q_medicamentos:'Medicamentos', q_alergias:'Alergias',
};

function calcAge(dateStr) {
    if (!dateStr) return null;
    let d;
    if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        d = new Date(parts[2], parts[1] - 1, parts[0]);
    } else {
        d = new Date(dateStr);
    }
    if (isNaN(d.getTime())) return null;
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 60 * 60 * 1000));
}

function getInitials(name) {
    return (name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}

function daysSince(dateStr) {
    if (!dateStr) return 999;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

// ── Audio Player State ──
let audioCtx = null;
let analyser = null;
let audioSource = null;
let ttsAudio = null;
let ttsPlaying = false;
let animFrameId = null;
let canvasEl = null;
let canvasCtx = null;

function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.8;
}

function connectAudioToAnalyser(audioElement) {
    if (audioSource) { try { audioSource.disconnect(); } catch(e){} }
    audioSource = audioCtx.createMediaElementSource(audioElement);
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function drawWaveform() {
    if (!canvasEl || !canvasCtx || !analyser) return;
    const W = canvasEl.width;
    const H = canvasEl.height;
    const bufLen = analyser.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);

    function draw() {
        animFrameId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArr);

        canvasCtx.clearRect(0, 0, W, H);

        const barCount = 40;
        const gap = 3;
        const barW = (W - (barCount - 1) * gap) / barCount;
        const step = Math.floor(bufLen / barCount);

        for (let i = 0; i < barCount; i++) {
            const val = dataArr[i * step] / 255;
            const barH = Math.max(3, val * H * 0.9);
            const x = i * (barW + gap);
            const y = (H - barH) / 2;

            // Gradient from green to cyan
            const ratio = i / barCount;
            const r = 0;
            const g = Math.round(229 - ratio * 40);
            const b = Math.round(160 + ratio * 56);
            const alpha = 0.5 + val * 0.5;

            canvasCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            canvasCtx.beginPath();
            canvasCtx.roundRect(x, y, barW, barH, barW / 2);
            canvasCtx.fill();
        }
    }
    draw();
}

function drawIdleWaveform() {
    if (!canvasEl || !canvasCtx) return;
    const W = canvasEl.width;
    const H = canvasEl.height;
    canvasCtx.clearRect(0, 0, W, H);

    const barCount = 40;
    const gap = 3;
    const barW = (W - (barCount - 1) * gap) / barCount;

    for (let i = 0; i < barCount; i++) {
        const val = 0.15 + 0.12 * Math.sin(i * 0.3);
        const barH = Math.max(3, val * H);
        const x = i * (barW + gap);
        const y = (H - barH) / 2;

        const ratio = i / barCount;
        const g = Math.round(229 - ratio * 40);
        const b = Math.round(160 + ratio * 56);

        canvasCtx.fillStyle = `rgba(0,${g},${b},0.2)`;
        canvasCtx.beginPath();
        canvasCtx.roundRect(x, y, barW, barH, barW / 2);
        canvasCtx.fill();
    }
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function toggleAudio() {
    const player = document.getElementById('audioPlayer');
    if (!player) return;

    if (ttsPlaying) {
        if (ttsAudio) ttsAudio.pause();
        ttsPlaying = false;
        player.classList.remove('playing');
        player.classList.add('idle');
        document.querySelector('.audio-label').textContent = 'Ouvir briefing';
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        drawIdleWaveform();
        return;
    }

    const cachedUrl = player.dataset.audioUrl;
    if (cachedUrl) {
        playAudioUrl(cachedUrl);
        return;
    }

    // Generate via backend
    const id = urlParams.get('id');
    if (id && getToken()) {
        document.querySelector('.audio-sub').textContent = 'Gerando audio...';
        fetch(API_URL + '/pre-consulta/' + id + '/tts', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(function(r) {
            if (!r.ok) throw new Error('TTS failed');
            return r.blob();
        }).then(function(blob) {
            const url = URL.createObjectURL(blob);
            player.dataset.audioUrl = url;
            document.querySelector('.audio-sub').textContent = '~1 minuto';
            playAudioUrl(url);
        }).catch(function() {
            document.querySelector('.audio-sub').textContent = '~1 minuto';
            fallbackBrowserTTS();
        });
        return;
    }

    fallbackBrowserTTS();
}

function playAudioUrl(url) {
    const player = document.getElementById('audioPlayer');
    initAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!ttsAudio || ttsAudio.src !== url) {
        ttsAudio = new Audio(url);
        ttsAudio.crossOrigin = 'anonymous';
        try { connectAudioToAnalyser(ttsAudio); } catch(e) {}
    }

    ttsAudio.play().then(function() {
        ttsPlaying = true;
        player.classList.add('playing');
        player.classList.remove('idle');
        document.querySelector('.audio-label').textContent = 'Pausar';
        drawWaveform();
    }).catch(function() { fallbackBrowserTTS(); });

    ttsAudio.ontimeupdate = function() {
        const pct = ttsAudio.duration ? (ttsAudio.currentTime / ttsAudio.duration * 100) : 0;
        const fill = document.getElementById('progressFill');
        if (fill) fill.style.width = pct + '%';
        const timer = document.getElementById('audioTimer');
        if (timer && ttsAudio.duration) {
            timer.textContent = formatTime(ttsAudio.currentTime) + ' / ' + formatTime(ttsAudio.duration);
        }
    };

    ttsAudio.onended = function() {
        ttsPlaying = false;
        player.classList.remove('playing');
        player.classList.add('idle');
        document.querySelector('.audio-label').textContent = 'Ouvir novamente';
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        drawIdleWaveform();
        var fill = document.getElementById('progressFill');
        if (fill) fill.style.width = '0%';
    };
}

function seekAudio(e) {
    if (!ttsAudio || !ttsAudio.duration) return;
    var wrap = e.currentTarget;
    var rect = wrap.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    ttsAudio.currentTime = pct * ttsAudio.duration;
}

function fallbackBrowserTTS() {
    var player = document.getElementById('audioPlayer');
    var text = player ? player.dataset.summaryText : '';
    if (!text || !window.speechSynthesis) return;

    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.95;
    utterance.onstart = function() {
        ttsPlaying = true;
        if (player) {
            player.classList.add('playing');
            player.classList.remove('idle');
            document.querySelector('.audio-label').textContent = 'Pausar';
        }
    };
    utterance.onend = function() {
        ttsPlaying = false;
        if (player) {
            player.classList.remove('playing');
            player.classList.add('idle');
            document.querySelector('.audio-label').textContent = 'Ouvir briefing';
        }
    };
    speechSynthesis.speak(utterance);
}

function toggleFicha() {
    var toggle = document.getElementById('fichaToggle');
    var body = document.getElementById('fichaBody');
    if (!toggle || !body) return;
    toggle.classList.toggle('open');
    body.classList.toggle('open');
}

async function init() {
    if (!pcId) { document.getElementById('loadingState').textContent = 'ID nao fornecido.'; return; }

    try {
        var data = await vitaeAPI.getPreConsulta(pcId);
        var pc = data.preConsulta;
        var summary = pc.summaryJson || {};
        var r = pc.respostas || {};
        var summaryText = summary.textoVoz || summary.summaryTexto || pc.summaryIA || '';
        var descBreve = summary.descricaoBreve || (summaryText ? summaryText.split('. ')[0] + '.' : '');
        var respondidaEm = pc.respondidaEm ? new Date(pc.respondidaEm).toLocaleDateString('pt-BR') : '';
        var days = daysSince(pc.respondidaEm);
        var foto = pc.pacienteFotoUrl || r.fotoUrl || null;
        var age = calcAge(r.dataNascimento || r.nascimento);
        var initials = getInitials(pc.pacienteNome);
        var audioUrl = pc.audioSummaryUrl || null;

        var fromParam = urlParams.get('from');
        var backUrl = fromParam === 'pacientes' ? '20-medico-dashboard.html?view=pacientes' : '20-medico-dashboard.html';

        var html = '';

        // Header
        html += '<div class="summary-header anim">';
        html += '<div class="btn-back" onclick="window.location.href=\'' + backUrl + '\'"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>';
        html += '<div class="summary-header-title">One Minute Summary</div>';
        html += '</div>';

        // Patient hero
        html += '<div class="patient-hero anim anim-d1">';
        html += '<div class="patient-photo"><div class="patient-photo-inner">';
        if (foto) {
            html += '<img src="' + foto + '" onerror="this.parentElement.textContent=\'' + initials + '\'">';
        } else {
            html += initials;
        }
        html += '</div></div>';
        html += '<div class="patient-name">' + (pc.pacienteNome || 'Paciente') + '</div>';
        if (age) html += '<div class="patient-age">' + age + ' anos</div>';
        if (respondidaEm) {
            html += '<div class="date-badge"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Respondida em ' + respondidaEm + '</div>';
        }
        if (descBreve) html += '<div class="patient-desc">"' + descBreve + '"</div>';
        html += '</div>';

        // Stale warning
        if (days > 7) {
            html += '<div class="stale-warning anim anim-d1"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Pre-consulta com mais de 7 dias. Dados podem estar desatualizados.</div>';
        }

        // ── Premium Audio Player ──
        if (summaryText) {
            html += '<div class="audio-player idle anim anim-d2" id="audioPlayer" data-summary-text="' + summaryText.replace(/"/g, '&quot;') + '"' + (audioUrl ? ' data-audio-url="' + audioUrl + '"' : '') + '>';
            html += '<div class="audio-player-top">';
            html += '<div class="audio-play-btn" onclick="toggleAudio()">';
            html += '<svg class="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';
            html += '<svg class="icon-pause" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
            html += '</div>';
            html += '<div class="audio-info"><div class="audio-label">Ouvir briefing</div><div class="audio-sub">~1 minuto</div></div>';
            html += '<div class="audio-timer" id="audioTimer">0:00</div>';
            html += '</div>';
            html += '<canvas class="audio-waveform" id="waveformCanvas"></canvas>';
            html += '<div class="audio-progress-wrap" onclick="seekAudio(event)"><div class="audio-progress-fill" id="progressFill"></div></div>';
            html += '</div>';
        }

        // ── Pontos de Atencao (insights clinicos) ──
        var alertas = summary.alertas || [];
        if (alertas.length > 0) {
            html += '<div class="section-label anim anim-d3">Pontos de atencao</div>';
            alertas.forEach(function(a) {
                var tipo = (a.tipo || 'INFO').toLowerCase();
                var titulo = a.titulo || a.mensagem.substring(0, 40);
                var msg = a.titulo ? a.mensagem : '';
                var iconSvg = {
                    urgente: '<svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M3.6 15.4L8.2 5.2a4 4 0 017.6 0l4.6 10.2a2 2 0 01-1.8 2.8H5.4a2 2 0 01-1.8-2.8z"/></svg>',
                    atencao: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>',
                    info: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
                }[tipo] || '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';

                html += '<div class="insight-card ' + tipo + ' anim anim-d3">';
                html += '<div class="insight-icon">' + iconSvg + '</div>';
                html += '<div class="insight-content">';
                html += '<div class="insight-title">' + titulo + '</div>';
                if (msg) html += '<div class="insight-msg">' + msg + '</div>';
                html += '</div></div>';
            });
        }

        // ── Ficha do Paciente (collapsible) ──
        var blocos = summary.blocos || [];
        var fichaRows = [];

        // Build from blocos first
        blocos.forEach(function(b) {
            if (b.conteudo && b.conteudo.trim()) {
                fichaRows.push({ label: b.titulo, value: b.conteudo });
            }
        });

        // Fallback from raw responses if no blocos
        if (fichaRows.length === 0) {
            if (r.queixaPrincipal || r.queixa) fichaRows.push({ label: 'Queixa Principal', value: r.queixaPrincipal || r.queixa });
            if (r.duracaoSintomas) fichaRows.push({ label: 'Duracao', value: r.duracaoSintomas });
            if (r.medicamentosEmUso) fichaRows.push({ label: 'Medicamentos', value: r.medicamentosEmUso });
            if (r.alergias) fichaRows.push({ label: 'Alergias', value: r.alergias });
            if (r.reacoesAdversas) fichaRows.push({ label: 'Reacoes Adversas', value: r.reacoesAdversas });
            if (r.doencasAtuais) fichaRows.push({ label: 'Doencas Atuais', value: r.doencasAtuais });
            if (r.cirurgias) fichaRows.push({ label: 'Cirurgias', value: r.cirurgias });
            if (r.historicoFamiliar) fichaRows.push({ label: 'Historico Familiar', value: r.historicoFamiliar });
            var habStr = buildHabitos(r);
            if (habStr) fichaRows.push({ label: 'Habitos', value: habStr });
            if (r.examesRecentes) fichaRows.push({ label: 'Exames Recentes', value: r.examesRecentes });
            if (r.observacoes) fichaRows.push({ label: 'Observacoes', value: r.observacoes });
        }

        if (fichaRows.length > 0) {
            html += '<div class="section-label anim anim-d4">Referencia</div>';
            html += '<div class="ficha-toggle anim anim-d4" id="fichaToggle" onclick="toggleFicha()">';
            html += '<div class="ficha-toggle-left">';
            html += '<div class="ficha-toggle-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>';
            html += '<div class="ficha-toggle-text">Dados do paciente</div>';
            html += '</div>';
            html += '<svg class="ficha-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
            html += '</div>';

            html += '<div class="ficha-body" id="fichaBody"><div class="ficha-body-inner">';
            fichaRows.forEach(function(row) {
                html += '<div class="ficha-row">';
                html += '<div class="ficha-label">' + row.label + '</div>';
                html += '<div class="ficha-value">' + row.value + '</div>';
                html += '</div>';
            });
            html += '</div></div>';
        }

        // Raw fallback (if absolutely no summary AND no ficha data)
        if (!fichaRows.length && !blocos.length && !alertas.length && pc.respostas) {
            html += '<div class="section-label anim anim-d3">Respostas do paciente</div>';
            var entries = Object.entries(pc.respostas);
            entries.forEach(function(pair) {
                var key = pair[0];
                var val = pair[1];
                if (!val || typeof val === 'object') return;
                if (HIDE_FIELDS.indexOf(key) !== -1) return;
                if (typeof val === 'string' && val.startsWith('http')) return;
                var label = LABELS[key] || key;
                html += '<div class="raw-card anim anim-d4"><div class="raw-label">' + label + '</div><div class="raw-value">' + val + '</div></div>';
            });
        }

        html += '<div style="height:40px"></div>';

        document.getElementById('loadingState').style.display = 'none';
        var dc = document.getElementById('dynamicContent');
        dc.style.display = '';
        dc.innerHTML = html;

        // Initialize waveform canvas
        canvasEl = document.getElementById('waveformCanvas');
        if (canvasEl) {
            var dpr = window.devicePixelRatio || 1;
            var rect = canvasEl.getBoundingClientRect();
            canvasEl.width = rect.width * dpr;
            canvasEl.height = rect.height * dpr;
            canvasCtx = canvasEl.getContext('2d');
            canvasCtx.scale(dpr, dpr);
            canvasEl.style.width = rect.width + 'px';
            canvasEl.style.height = rect.height + 'px';
            drawIdleWaveform();
        }

    } catch (e) {
        document.getElementById('loadingState').textContent = 'Erro ao carregar: ' + e.message;
    }
}

function buildHabitos(r) {
    var parts = [];
    if (r.tabagismo) parts.push(r.tabagismo === 'nao' || r.tabagismo === 'Não' ? 'Nao fuma' : 'Fuma, ' + r.tabagismo);
    if (r.alcool) parts.push('Alcool: ' + r.alcool);
    if (r.horasSono || r.sono) parts.push('Sono: ' + (r.horasSono || r.sono) + 'h');
    if (r.exercicio) parts.push('Exercicio: ' + r.exercicio);
    if (r.cafe) parts.push('Cafe: ' + r.cafe + ' xic/dia');
    return parts.join(' | ');
}

init();
</script>
</body>
</html>
