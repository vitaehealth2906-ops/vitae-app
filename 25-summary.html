<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — One Minute Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        /* ── Summary-specific styles ── */

        .summary-header {
            display: flex; align-items: center; gap: 10px;
            padding: var(--v-s5) var(--v-s6) var(--v-s3);
        }
        .summary-header-title {
            flex: 1; text-align: center;
            font-size: 17px; font-weight: 700; color: var(--v-ink);
            margin-right: 40px;
        }

        /* Patient hero */
        .patient-hero {
            display: flex; flex-direction: column; align-items: center;
            padding: var(--v-s2) var(--v-s6) var(--v-s6);
            gap: 6px;
        }
        .patient-photo {
            width: 88px; height: 88px; border-radius: 50%;
            background: var(--v-grad); padding: 3px; margin-bottom: var(--v-s1);
        }
        .patient-photo-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--v-surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: var(--v-green);
            overflow: hidden;
        }
        .patient-photo-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .patient-name { font-size: 22px; font-weight: 800; color: var(--v-ink); letter-spacing: -0.5px; }
        .patient-age { font-size: 14px; font-weight: 500; color: var(--v-ink3); }
        .patient-desc {
            font-size: 14px; color: var(--v-ink2); text-align: center;
            line-height: 1.5; max-width: 300px; margin-top: var(--v-s1);
            font-style: italic;
        }
        .date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: var(--v-r-pill);
            background: rgba(0,229,160,0.08);
            font-size: 11px; font-weight: 600; color: var(--v-green2);
        }
        .date-badge svg { width: 12px; height: 12px; stroke: var(--v-green2); fill: none; stroke-width: 2; stroke-linecap: round; }

        /* ── FASE 4 — Selo de nivel de briefing ──
           Cor + icone + padrao sao REDUNDANTES (cada selo tem os 3).
           Isso garante que medicos daltonicos distinguem mesmo sem ver cor.        */
        .nivel-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 10px 5px 8px;
            border-radius: var(--v-r-pill);
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.2px;
            white-space: nowrap;
            border: 1.5px solid transparent;
        }
        .nivel-badge .nivel-badge-mark {
            width: 14px; height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            display: inline-block;
            border: 1.5px solid currentColor;
            position: relative;
        }
        .nivel-badge svg { width: 11px; height: 11px; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        /* NIVEL 5 — completo (verde, sol do, check) */
        .nivel-badge.nivel-5 { background: rgba(0,196,122,0.1); color: #00764A; border-color: rgba(0,196,122,0.3); }
        .nivel-badge.nivel-5 .nivel-badge-mark { background: #00C47A; border-color: #00764A; }
        /* NIVEL 4 — sem voz (azul, pontilhado, info) */
        .nivel-badge.nivel-4 { background: rgba(59,130,246,0.09); color: #1E40AF; border-color: rgba(59,130,246,0.3); }
        .nivel-badge.nivel-4 .nivel-badge-mark { background: #3B82F6; border-style: dashed; border-color: #1E40AF; }
        /* NIVEL 3 — sem resumo IA (amarelo, listras) */
        .nivel-badge.nivel-3 {
            background: rgba(245,158,11,0.1); color: #92400E; border-color: rgba(245,158,11,0.35);
        }
        .nivel-badge.nivel-3 .nivel-badge-mark {
            background-image: repeating-linear-gradient(45deg, #F59E0B 0 2px, #FCD34D 2px 4px);
            border-color: #92400E;
        }
        /* NIVEL 2 — audio bruto (laranja, grade) */
        .nivel-badge.nivel-2 {
            background: rgba(249,115,22,0.1); color: #9A3412; border-color: rgba(249,115,22,0.35);
        }
        .nivel-badge.nivel-2 .nivel-badge-mark {
            background-image: linear-gradient(#F97316 1px, transparent 1px), linear-gradient(90deg, #F97316 1px, #FDBA74 1px);
            background-size: 4px 4px;
            border-color: #9A3412;
        }
        /* NIVEL 1 — so texto (laranja, grade — parecido com 2 mas com icone diferente) */
        .nivel-badge.nivel-1 {
            background: rgba(249,115,22,0.08); color: #9A3412; border-color: rgba(249,115,22,0.3);
        }
        .nivel-badge.nivel-1 .nivel-badge-mark {
            background-image: linear-gradient(#F97316 1px, #FDBA74 1px), linear-gradient(90deg, #F97316 1px, #FDBA74 1px);
            background-size: 3px 3px;
            border-color: #9A3412;
        }
        /* NIVEL 0 — nao respondeu (cinza vazio) */
        .nivel-badge.nivel-0 {
            background: rgba(156,163,175,0.12); color: #4B5563; border-color: rgba(156,163,175,0.35);
        }
        .nivel-badge.nivel-0 .nivel-badge-mark { background: transparent; border-style: dotted; border-color: #6B7280; }

        /* ── FASE 4 — Bloco substituto quando player de audio falha (nivel <= 4) ── */
        .audio-fallback {
            background: #FFFFFF; border-radius: var(--v-r-md);
            padding: 16px 18px; margin: 0 var(--v-s5) var(--v-s3);
            border-left: 4px solid #3B82F6;
            box-shadow: 0 1px 12px rgba(0,0,0,0.05);
        }
        .audio-fallback.falhou { border-left-color: #F59E0B; }
        .audio-fallback-title {
            font-size: 12px; font-weight: 700; color: #1E40AF;
            text-transform: uppercase; letter-spacing: 0.8px;
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 8px;
        }
        .audio-fallback.falhou .audio-fallback-title { color: #92400E; }
        .audio-fallback-title svg { width: 14px; height: 14px; stroke-width: 2; fill: none; stroke: currentColor; }
        .audio-fallback-text {
            font-size: 14px; color: var(--v-ink); line-height: 1.55;
            font-weight: 500; max-height: 240px; overflow-y: auto;
        }

        /* ── FASE 4 — Card vazio honesto (quando IA nao gerou X) ── */
        .honest-empty {
            background: rgba(0,0,0,0.02); border: 1.5px dashed rgba(0,0,0,0.1);
            border-radius: var(--v-r-md);
            padding: 14px 16px; margin: 0 var(--v-s5) var(--v-s2);
            font-size: 13px; color: var(--v-ink3); font-style: italic;
            line-height: 1.5;
        }
        .honest-empty strong { color: var(--v-ink2); font-style: normal; font-weight: 700; }

        /* ── FASE 5 — Bloco "O que o paciente disse" (fidelidade acima de resumo) ──
           Destaque maior que os cards normais. Texto LITERAL do paciente.
           S1 da tela: apos o selo, a SEGUNDA coisa que o medico ve.                  */
        .fala-paciente {
            background: linear-gradient(180deg, rgba(0,180,216,0.04), rgba(0,180,216,0.01));
            border-left: 4px solid #00B4D8;
            border-radius: var(--v-r-md);
            margin: 0 var(--v-s5) var(--v-s4);
            padding: 16px 18px;
            position: relative;
            box-shadow: 0 1px 12px rgba(0,0,0,0.04);
        }
        .fala-paciente-label {
            font-size: 11px; font-weight: 800;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: #0077A0; margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .fala-paciente-label svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
        .fala-paciente-texto {
            font-size: 15px; line-height: 1.6; color: var(--v-ink);
            font-weight: 500;
            quotes: "\201C" "\201D";
        }
        .fala-paciente-texto::before { content: open-quote; color: #00B4D8; font-weight: 800; font-size: 18px; margin-right: 3px; }
        .fala-paciente-texto::after { content: close-quote; color: #00B4D8; font-weight: 800; font-size: 18px; margin-left: 3px; }
        .fala-paciente-meta {
            font-size: 11px; color: #6B7280; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .fala-paciente-fonte { font-style: italic; }

        /* ── FASE 5 — Header com 2 botoes auxiliares (privado + tema) ──
           Ficam do lado do selo de nivel. Discretos, so icones.             */
        .header-actions { display: flex; align-items: center; gap: 6px; }
        .header-icon-btn {
            width: 36px; height: 36px; min-width: 36px;
            border-radius: 10px;
            background: #FFFFFF; border: 1.5px solid rgba(0,0,0,0.06);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 0;
            transition: background 0.15s, border-color 0.15s;
        }
        .header-icon-btn:hover { background: #F4F6FA; }
        .header-icon-btn.active { background: #0D0F14; border-color: #0D0F14; }
        .header-icon-btn.active svg { stroke: #FFFFFF; }
        .header-icon-btn svg { width: 18px; height: 18px; stroke: var(--v-ink2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ── FASE 5 — Modo privado (paciente ve a tela junto com medico) ──
           Borra foto, nome vira iniciais, alergias/meds sao rotuladas mas nao detalhadas. */
        body.privacy-mode .patient-photo-inner img { filter: blur(18px) saturate(0.7); }
        body.privacy-mode .patient-name { filter: blur(8px); user-select: none; }
        body.privacy-mode .patient-desc { filter: blur(6px); user-select: none; }
        body.privacy-mode .fala-paciente-texto { filter: blur(7px); user-select: none; }
        body.privacy-mode .insight-msg { filter: blur(6px); user-select: none; }
        body.privacy-mode .transcricao-box { filter: blur(7px); user-select: none; }
        body.privacy-mode .audio-fallback-text { filter: blur(6px); user-select: none; }
        body.privacy-mode .ref-item { filter: blur(5px); user-select: none; }
        body.privacy-mode::before {
            content: 'MODO PRIVADO ATIVO — dados sensiveis ocultos'; position: fixed;
            top: 0; left: 0; right: 0; z-index: 1000;
            background: #0D0F14; color: #FFF; font-size: 11px; font-weight: 700;
            text-align: center; padding: 6px; letter-spacing: 1px; text-transform: uppercase;
        }
        body.privacy-mode { padding-top: 28px; }

        /* ── FASE 5 — Modo escuro (plantao noturno, prefers-color-scheme ou toggle) ──
           Override das cores principais. Respeita prefers-color-scheme SE usuario nao trocou. */
        body.dark-mode {
            background: #0D0F14 !important;
        }
        body.dark-mode .phone, body.dark-mode .content { background: #0D0F14; }
        body.dark-mode .patient-name { color: #F4F6FA; }
        body.dark-mode .patient-age { color: #9CA3AF; }
        body.dark-mode .patient-desc { color: #C4C9D4; }
        body.dark-mode .insight-card,
        body.dark-mode .audio-fallback,
        body.dark-mode .audio-player,
        body.dark-mode .fala-paciente {
            background: #1A1E26 !important; color: #F4F6FA;
        }
        body.dark-mode .insight-title { color: #F4F6FA; }
        body.dark-mode .insight-msg,
        body.dark-mode .audio-fallback-text,
        body.dark-mode .fala-paciente-texto { color: #E5E7EB; }
        body.dark-mode .section-label { color: #9CA3AF; }
        body.dark-mode .honest-empty { background: rgba(255,255,255,0.03); color: #9CA3AF; border-color: rgba(255,255,255,0.08); }
        body.dark-mode .honest-empty strong { color: #E5E7EB; }
        body.dark-mode .btn-back,
        body.dark-mode .header-icon-btn { background: #1A1E26; border-color: rgba(255,255,255,0.08); }
        body.dark-mode .btn-back svg,
        body.dark-mode .header-icon-btn svg { stroke: #E5E7EB; }
        body.dark-mode .transcricao-box { background: #1A1E26; }
        body.dark-mode .ref-item { background: rgba(255,255,255,0.04); color: #E5E7EB; }

        /* Auto-dark (so se nao tiver escolha manual salva) */
        @media (prefers-color-scheme: dark) {
            body:not(.light-mode):not(.dark-mode) { background: #0D0F14; }
            body:not(.light-mode):not(.dark-mode) .patient-name { color: #F4F6FA; }
            body:not(.light-mode):not(.dark-mode) .insight-card,
            body:not(.light-mode):not(.dark-mode) .audio-fallback,
            body:not(.light-mode):not(.dark-mode) .audio-player,
            body:not(.light-mode):not(.dark-mode) .fala-paciente { background: #1A1E26; color: #F4F6FA; }
        }

        /* ── FASE 5 — Daltonismo em alertas: cor + padrao visual na borda lateral ──
           Ja tem cor. Adicionamos textura pra quem nao diferencia. */
        .insight-card.urgente::before {
            background: repeating-linear-gradient(45deg, #EF4444 0 3px, #B91C1C 3px 6px);
        }
        .insight-card.atencao::before {
            background: repeating-linear-gradient(-45deg, #F59E0B 0 2px, #FCD34D 2px 5px);
        }
        .insight-card.info::before {
            background: #3B82F6;
        }
        .insight-card.queixa::before { background: #00B4D8; }
        .insight-card.historico::before {
            background: repeating-linear-gradient(90deg, #8B5CF6 0 2px, #7C3AED 2px 6px);
        }

        /* ── FASE 5 — Contraste WCAG AA em textos secundarios ──
           --v-ink3 antes: #6B7280 = 4.5:1 limite. Deixamos 4B5563 = 7.2:1 (margem confortavel). */
        .patient-age { color: #4B5563; }
        .insight-msg { color: #4B5563; }
        .fala-paciente-meta { color: #4B5563; }

        /* ── FASE 5 — Mobile: hit targets maiores, fontes ajustadas ── */
        @media (max-width: 480px) {
            .header-icon-btn { width: 44px; height: 44px; }
            .btn-back { width: 44px; height: 44px; }
            .nivel-badge { font-size: 12px; padding: 7px 12px 7px 10px; }
            .audio-play-btn { width: 64px; height: 64px; }
            .audio-skip-btn { width: 44px; height: 44px; }
            .speed-cycle { min-height: 44px; padding: 10px 18px; }
            .transcricao-word.clickable { padding: 2px 4px; min-height: 32px; display: inline-block; }
            .insight-card { padding-left: 20px; padding-right: 16px; padding-top: 14px; padding-bottom: 14px; }
            .fala-paciente-texto { font-size: 16px; }
            .honest-empty { padding: 16px; font-size: 14px; }
        }

        /* ── FASE 5 — Desktop grande: escala discreta ── */
        @media (min-width: 1200px) {
            .patient-name { font-size: 26px; }
            .fala-paciente-texto { font-size: 16px; }
            .insight-msg { font-size: 14px; }
        }

        /* ── FASE 8 — Anotacoes efemeras do medico (sticky notes) ──
           Salvas em localStorage por pc id. Desaparecem ao limpar dados do navegador.
           Nao vao pro servidor = nenhum dado persistido que vire obrigacao LGPD. */
        .sticky-wrap { margin: 0 var(--v-s5) var(--v-s3); }
        .sticky-note {
            background: #FFF9C4;
            border-left: 4px solid #F59E0B;
            padding: 10px 14px; border-radius: var(--v-r-sm);
            font-size: 13px; color: #422006;
            line-height: 1.5;
            margin-bottom: 8px;
            position: relative;
            box-shadow: 0 1px 6px rgba(245,158,11,0.15);
        }
        .sticky-note-meta {
            font-size: 10px; color: #78350F; margin-top: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sticky-note-del {
            background: transparent; border: 0; color: #92400E; cursor: pointer;
            padding: 2px 6px; font-size: 11px; font-weight: 600;
            border-radius: 4px;
        }
        .sticky-note-del:hover { background: rgba(146,64,14,0.1); }
        body.dark-mode .sticky-note { background: #2D2410; color: #FDE68A; border-left-color: #F59E0B; }
        body.dark-mode .sticky-note-meta { color: #D97706; }
        body.dark-mode .sticky-note-del { color: #FDE68A; }

        .sticky-input-wrap {
            display: flex; gap: 8px; align-items: flex-start;
            background: #FFFFFF; border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: var(--v-r-md); padding: 10px;
            margin-bottom: 8px;
        }
        .sticky-input-wrap textarea {
            flex: 1; border: 0; outline: 0; resize: none; min-height: 48px;
            font-size: 13px; font-family: inherit; color: var(--v-ink);
            background: transparent;
        }
        .sticky-input-wrap button {
            background: #F59E0B; color: #FFFFFF; border: 0;
            padding: 8px 14px; border-radius: 10px;
            font-size: 12px; font-weight: 700; cursor: pointer;
            white-space: nowrap;
        }
        body.dark-mode .sticky-input-wrap { background: #1A1E26; border-color: rgba(255,255,255,0.1); }
        body.dark-mode .sticky-input-wrap textarea { color: #F4F6FA; }

        /* ── FASE 8 — Checkbox em alertas (descartei essa hipotese) ── */
        .insight-card { position: relative; }
        .alert-dismiss-btn {
            position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; border-radius: 6px;
            background: transparent; border: 1.5px solid rgba(0,0,0,0.2);
            cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .alert-dismiss-btn:hover { background: rgba(0,0,0,0.05); }
        .alert-dismiss-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 3; stroke-linecap: round; opacity: 0; }
        .insight-card[data-dismissed="true"] { opacity: 0.5; background: rgba(0,0,0,0.02); }
        .insight-card[data-dismissed="true"] .insight-title { text-decoration: line-through; color: var(--v-ink3); }
        .insight-card[data-dismissed="true"] .alert-dismiss-btn svg { opacity: 1; }
        .insight-card[data-dismissed="true"] .alert-dismiss-btn { background: var(--v-green); border-color: var(--v-green); color: #FFFFFF; }

        /* ── FASE 7 — Disclaimer CFM/LGPD permanente (rodape do briefing) ──
           Obrigatorio legal: medico precisa saber que IA e suporte, nao substitui avaliacao. */
        .cfm-disclaimer {
            margin: 24px var(--v-s5) var(--v-s6);
            padding: 14px 16px;
            background: rgba(59,130,246,0.04);
            border-left: 3px solid #3B82F6;
            border-radius: var(--v-r-sm);
            font-size: 12px; line-height: 1.55;
            color: var(--v-ink2);
        }
        .cfm-disclaimer strong { color: #1E40AF; font-weight: 700; }
        body.dark-mode .cfm-disclaimer { background: rgba(59,130,246,0.08); color: #C4C9D4; }
        body.dark-mode .cfm-disclaimer strong { color: #93C5FD; }

        /* Stale warning */
        .stale-warning {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; border-radius: var(--v-r-md);
            background: rgba(245,158,11,0.06); border: var(--v-border-warn);
            font-size: 12px; color: var(--v-warn); font-weight: 600;
            margin: 0 var(--v-s5) var(--v-s4);
        }
        .stale-warning svg { width: 16px; height: 16px; stroke: var(--v-warn); fill: none; stroke-width: 2; flex-shrink: 0; }

        /* ── Premium Audio Player (dark, real waveform) ── */
        .audio-player {
            margin: 0 20px 20px !important;
            background: #0D0F14 !important;
            border-radius: 18px !important;
            padding: 18px 20px 14px !important;
            position: relative !important;
            overflow: hidden !important;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 40px rgba(0,229,160,0.06) !important;
            transition: box-shadow 0.6s ease;
            opacity: 1 !important;
            transform: none !important;
            display: block !important;
        }
        .audio-player.playing {
            box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 40px rgba(0,229,160,0.1);
        }
        .audio-player-top {
            display: flex; align-items: center; justify-content: center; gap: 28px;
            margin-bottom: 16px;
        }
        .audio-play-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--v-grad);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer;
            box-shadow: 0 2px 16px rgba(0,229,160,0.35);
            transition: transform 0.2s var(--v-ease), box-shadow 0.2s;
            border: none; outline: none;
        }
        .audio-play-btn:active { transform: scale(0.92); }
        .audio-play-btn svg { width: 22px; height: 22px; fill: #fff; stroke: none; }
        .audio-play-btn .icon-pause { display: none; }
        .audio-player.playing .audio-play-btn .icon-play { display: none; }
        .audio-player.playing .audio-play-btn .icon-pause { display: block; }
        /* Timer split: atual à esquerda, duração à direita, abaixo da barra */
        .audio-timer-row {
            display: flex; justify-content: space-between;
            font-family: 'Plus Jakarta Sans', monospace;
            font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.45);
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        /* Waveform canvas */
        .audio-waveform {
            width: 100%; height: 48px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* Progress bar */
        .audio-progress-wrap {
            width: 100%; height: 3px; background: rgba(255,255,255,0.08);
            border-radius: 3px; cursor: pointer; position: relative;
        }
        .audio-progress-fill {
            height: 100%; background: var(--v-grad);
            border-radius: 3px; width: 0%; transition: width 0.1s linear;
        }

        /* Glow pulse when idle */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 30px rgba(0,229,160,0.05); }
            50% { box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 50px rgba(0,229,160,0.1); }
        }
        .audio-player.idle { animation: glowPulse 3s ease-in-out infinite; }
        .audio-player.playing { animation: none; }

        /* Chip identificador acima do player — aparece antes de tocar */
        .patient-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            margin: 0 20px 10px;
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.18);
            border-radius: 100px;
            font-size: 12px; font-weight: 600;
            color: var(--v-green2);
            width: fit-content;
            max-width: calc(100% - 40px);
            letter-spacing: 0.1px;
        }
        .patient-chip svg { width: 12px; height: 12px; stroke: var(--v-green2); fill: none; stroke-width: 2.5; flex-shrink: 0; }
        .patient-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Chip único que cicla velocidade (1x → 1.5x → 2x → 1x) */
        .speed-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .speed-cycle {
            padding: 3px 9px;
            border-radius: 100px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.10);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .speed-cycle:hover {
            border-color: rgba(0,229,160,0.35);
            color: rgba(255,255,255,0.8);
        }
        .speed-cycle.boosted {
            background: rgba(0,229,160,0.12);
            border-color: rgba(0,229,160,0.4);
            color: #5AFFBA;
        }

        /* Skip buttons +/-5s */
        .audio-skip-btn {
            width: 34px; height: 34px; border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
            position: relative;
        }
        .audio-skip-btn:hover { border-color: rgba(0,229,160,0.4); background: rgba(0,229,160,0.06); }
        .audio-skip-btn:active { transform: scale(0.9); }
        .audio-skip-btn svg { width: 16px; height: 16px; fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .audio-skip-btn.flash svg { stroke: var(--v-green); }
        .audio-skip-btn.flash { border-color: rgba(0,229,160,0.6); }

        /* Transcricao toggle (link discreto) */
        /* Titulos de secao (Pontos de atencao / Referencia etc) — preto, negrito, maior que titulos dos cards */
        .section-label {
            color: var(--v-ink) !important;
            font-size: 15px !important;
            font-weight: 800 !important;
            text-transform: none !important;
            letter-spacing: -0.3px !important;
        }

        .transcricao-toggle {
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            margin: -8px 20px 12px;
            padding: 8px 14px;
            font-size: 12px; font-weight: 700;
            color: var(--v-green2);
            cursor: pointer;
            transition: color 0.15s, text-shadow 0.15s;
            user-select: none;
        }
        .transcricao-toggle:hover { color: var(--v-green); text-shadow: 0 0 8px rgba(0,229,160,0.3); }
        .transcricao-toggle svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; transition: transform 0.2s; }
        .transcricao-toggle.open svg { transform: rotate(180deg); }

        /* Caixa da transcricao karaoke — simétrica ao player (220px) */
        .transcricao-box {
            max-height: 0;
            overflow: hidden;
            margin: 0 20px 20px;
            background: #0D0F14;
            border-radius: 14px;
            border-top: 1px solid rgba(0,229,160,0.08);
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .transcricao-box.open {
            max-height: 220px;
            overflow-y: auto;
        }
        /* Fades topo/base — sugerem "há mais texto" */
        .transcricao-box.open::before,
        .transcricao-box.open::after {
            content: ''; position: sticky; left: 0; right: 0;
            display: block; height: 24px; pointer-events: none;
            z-index: 2;
        }
        .transcricao-box.open::before {
            top: 0;
            background: linear-gradient(to bottom, #0D0F14 0%, rgba(13,15,20,0) 100%);
            margin-bottom: -24px;
        }
        .transcricao-box.open::after {
            bottom: 0;
            background: linear-gradient(to top, #0D0F14 0%, rgba(13,15,20,0) 100%);
            margin-top: -24px;
        }
        .transcricao-inner {
            padding: 16px 18px;
            font-size: 14px; line-height: 1.7;
            color: rgba(255,255,255,0.3);
            font-weight: 500;
        }
        /* Pulso verde ao clicar numa palavra */
        @keyframes wordPulse {
            0% { background: rgba(0,229,160,0.3); }
            100% { background: transparent; }
        }
        .transcricao-word.pulse { animation: wordPulse 0.2s ease; border-radius: 3px; padding: 0 2px; margin: 0 -2px; }
        /* Palavras futuras (ainda nao faladas): cinza escuro, quase invisiveis */
        .transcricao-word {
            transition: color 0.15s ease;
            color: rgba(255,255,255,0.22);
        }
        /* Palavras ja faladas: verde vita id */
        .transcricao-word.spoken {
            color: #00E5A0;
        }
        /* Palavra atual: verde brilhante + peso maior + glow */
        .transcricao-word.current {
            color: #5AFFBA;
            font-weight: 700;
            text-shadow: 0 0 14px rgba(0,229,160,0.55);
        }
        .transcricao-word.clickable { cursor: pointer; }
        .transcricao-word.clickable:hover { color: rgba(0,229,160,0.7); }
        /* Scroll bonito no dark mode */
        .transcricao-box::-webkit-scrollbar { width: 2px; }
        .transcricao-box::-webkit-scrollbar-track { background: transparent; }
        .transcricao-box::-webkit-scrollbar-thumb { background: rgba(0,229,160,0.25); border-radius: 3px; }

        /* ── Pontos de Atencao (redesigned alerts) ── */
        .insight-card {
            display: flex; gap: 12px;
            padding: 14px 16px;
            margin: 0 var(--v-s5) var(--v-s2);

        }
        .insight-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; border-radius: 4px 0 0 4px;
        }
        .insight-card.urgente::before { background: var(--v-bad); }
        .insight-card.atencao::before { background: var(--v-warn); }
        .insight-card.info::before { background: var(--v-info); }
        .insight-card { padding-left: 20px; }

        .insight-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .insight-icon svg { width: 16px; height: 16px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .urgente .insight-icon { background: rgba(239,68,68,0.08); }
        .urgente .insight-icon svg { stroke: var(--v-bad); }
        .atencao .insight-icon { background: rgba(245,158,11,0.08); }

        .insight-content { flex: 1; min-width: 0; }

            font-size: 14px; font-weight: 800; color: var(--v-ink);

        .insight-msg { font-size: 13px; color: var(--v-ink2); line-height: 1.55; font-weight: 500; }

        /* ── Referência: variantes de insight-card para dados clínicos ── */

        .alergia .insight-icon { background: rgba(239,68,68,0.08); }

        .insight-card.familiar::before { background: var(--v-ink4); }

        .familiar .insight-icon svg { stroke: var(--v-ink4); }
        .insight-card.exames::before { background: var(--v-ink4); }
        .exames .insight-icon { background: rgba(156,163,175,0.1); }

        .insight-card .ref-items { margin-top: 6px; }

        .insight-card .ref-more {
            font-size: 11px; font-weight: 600;

        }
        .insight-card .ref-more:hover { text-decoration: underline; }

        /* ═══ 3 NOVOS COMPONENTES (22/04/2026) ═══ */

        /* Componente 1: Queixa principal (limpa, completa, nunca cortada) */
        .queixa-card {
            display: flex; gap: 14px;

            display: flex; gap: 12px; align-items: flex-start;

            border-radius: 14px;

        .padroes-card-icon {
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(139,92,246,0.12);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 2px;

        .padroes-card-icon svg {
            width: 14px; height: 14px; fill: none;
            stroke: #8B5CF6; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .padroes-card-content { flex: 1; min-width: 0; }
        .padroes-card-hipotese {
            font-size: 14px; font-weight: 700; color: var(--v-ink);

        }
        .padroes-card-evidencia {
            font-size: 12.5px; color: var(--v-ink3);
            line-height: 1.55; font-weight: 400;

        .padroes-disclaimer {

        body.dark-mode .queixa-card-text { color: #F4F6FA; }

        body.dark-mode .padroes-card-hipotese { color: #F4F6FA; }
        body.dark-mode .padroes-card-evidencia { color: #C4C9D4; }

        /* ═══ ANAMNESE ESTRUTURADA (NOVO 27/04/2026) ═══ */
        .anamnese-card {
            background: var(--v-surface);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 14px;

        }
        .anamnese-head {
            display: flex; align-items: center; gap: 12px;

        }
        .anamnese-head-icon {
            width: 32px; height: 32px; border-radius: 10px;
            background: rgba(0,196,122,0.10);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .anamnese-head-icon svg {

        .anamnese-head-title { flex: 1; min-width: 0; }
        .anamnese-head-title h3 {

        .anamnese-field {

        .anamnese-field-src {

        .anamnese-field-src.audio {

        .anamnese-field-src.formulario {

        .anamnese-field-val {

        .anamnese-empty-block {

        /* Mobile: empilha em 1 coluna */
        @media (max-width: 480px) {

        }
        /* Dark mode anamnese */
        body.dark-mode .anamnese-card { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); }
        body.dark-mode .anamnese-head-title h3 { color: #F4F6FA; }
        body.dark-mode .anamnese-head-pill { background: rgba(255,255,255,0.06); color: #C4C9D4; }

        body.dark-mode .anamnese-field:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.10); }
        body.dark-mode .anamnese-field-val { color: #F4F6FA; }

        body.dark-mode .padroes-disclaimer { background: rgba(255,255,255,0.03); border-left-color: rgba(255,255,255,0.1); color: #9CA3AF; }

        /* Animations */
        .anim { opacity: 0; transform: translateY(20px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        .anim-d1 { animation-delay: 0.05s; }
        .anim-d2 { animation-delay: 0.1s; }
        .anim-d3 { animation-delay: 0.15s; }

        .loading-state { text-align: center; padding: 80px 20px; color: var(--v-ink4); font-size: 13px; }
    </style>
</head>

const urlParams = new URLSearchParams(window.location.search);
const pcId = urlParams.get('id');

};

function calcAge(dateStr) {
    if (!dateStr) return null;
    let d;
    if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        d = new Date(parts[2], parts[1] - 1, parts[0]);
    } else {
        d = new Date(dateStr);
    }
    if (isNaN(d.getTime())) return null;
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 60 * 60 * 1000));
}

function getInitials(name) {
    return (name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}

function daysSince(dateStr) {
    if (!dateStr) return 999;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

// ── roundRect polyfill for older browsers ──
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r,r,r,r];
        var rad = r[0] || 0;
        this.moveTo(x + rad, y);
        this.lineTo(x + w - rad, y);
        this.quadraticCurveTo(x + w, y, x + w, y + rad);
        this.lineTo(x + w, y + h - rad);
        this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
        this.lineTo(x + rad, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - rad);
        this.lineTo(x, y + rad);
        this.quadraticCurveTo(x, y, x + rad, y);
        this.closePath();
    };
}

// ── Audio Player State ──
let audioCtx = null;
let analyser = null;
let audioSource = null;
let ttsAudio = null;
let ttsPlaying = false;
let animFrameId = null;
let canvasEl = null;
let canvasCtx = null;

function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.8;
}

function connectAudioToAnalyser(audioElement) {
    if (audioSource) { try { audioSource.disconnect(); } catch(e){} }
    audioSource = audioCtx.createMediaElementSource(audioElement);
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function drawWaveform() {
    if (!canvasEl || !canvasCtx || !analyser) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvasEl.width / dpr;
    const H = canvasEl.height / dpr;
    const bufLen = analyser.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);

    function draw() {
        animFrameId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArr);

        canvasCtx.clearRect(0, 0, W, H);

        const barCount = 40;
        const gap = 3;
        const barW = (W - (barCount - 1) * gap) / barCount;
        const step = Math.floor(bufLen / barCount);

        for (let i = 0; i < barCount; i++) {
            const val = dataArr[i * step] / 255;
            const barH = Math.max(3, val * H * 0.9);
            const x = i * (barW + gap);
            const y = (H - barH) / 2;

            // Gradient from green to cyan
            const ratio = i / barCount;
            const r = 0;
            const g = Math.round(229 - ratio * 40);
            const b = Math.round(160 + ratio * 56);
            const alpha = 0.5 + val * 0.5;

            canvasCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            canvasCtx.beginPath();
            canvasCtx.roundRect(x, y, barW, barH, barW / 2);
            canvasCtx.fill();
        }
    }
    draw();
}

function drawIdleWaveform() {
    if (!canvasEl || !canvasCtx) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvasEl.width / dpr;
    const H = canvasEl.height / dpr;
    canvasCtx.clearRect(0, 0, W, H);

    const barCount = 40;
    const gap = 3;
    const barW = (W - (barCount - 1) * gap) / barCount;

    for (let i = 0; i < barCount; i++) {
        const val = 0.15 + 0.12 * Math.sin(i * 0.3);
        const barH = Math.max(3, val * H);
        const x = i * (barW + gap);
        const y = (H - barH) / 2;

        const ratio = i / barCount;
        const g = Math.round(229 - ratio * 40);
        const b = Math.round(160 + ratio * 56);

        canvasCtx.fillStyle = `rgba(0,${g},${b},0.2)`;
        canvasCtx.beginPath();
        canvasCtx.roundRect(x, y, barW, barH, barW / 2);
        canvasCtx.fill();
    }
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function toggleAudio() {
    const player = document.getElementById('audioPlayer');
    if (!player) return;

    if (ttsPlaying) {
        if (ttsAudio) ttsAudio.pause();
        ttsPlaying = false;
        player.classList.remove('playing');
        player.classList.add('idle');
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        drawIdleWaveform();
        return;
    }

    const cachedUrl = player.dataset.audioUrl;
    if (cachedUrl) {
        playAudioUrl(cachedUrl);
        return;
    }

    // Generate via backend
    const id = urlParams.get('id');
    if (id && getToken()) {
        fetch(API_URL + '/pre-consulta/' + id + '/tts', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(function(r) {
            if (!r.ok) return r.json().then(function(j) { throw new Error(j.erro || 'TTS ' + r.status); });
            return r.blob();
        }).then(function(blob) {
            const url = URL.createObjectURL(blob);
            player.dataset.audioUrl = url;
            playAudioUrl(url);
        }).catch(function(err) {
            console.error('[TTS] Erro ao gerar:', err);
            fallbackBrowserTTS();
        });
        return;
    }

    fallbackBrowserTTS();
}

function playAudioUrl(url) {
    const player = document.getElementById('audioPlayer');
    initAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!ttsAudio || ttsAudio.src !== url) {
        ttsAudio = new Audio(url);
        ttsAudio.crossOrigin = 'anonymous';
        try { connectAudioToAnalyser(ttsAudio); } catch(e) {}
    }
    // Aplica velocidade se foi selecionada antes do audio existir
    if (window._audioPlaybackRate) ttsAudio.playbackRate = window._audioPlaybackRate;

    ttsAudio.play().then(function() {
        ttsPlaying = true;
        player.classList.add('playing');
        player.classList.remove('idle');
        drawWaveform();
    }).catch(function() { fallbackBrowserTTS(); });

    ttsAudio.onloadedmetadata = function() {
        var tot = document.getElementById('audioTimerTotal');
        if (tot && ttsAudio.duration) tot.textContent = formatTime(ttsAudio.duration);
    };

    ttsAudio.ontimeupdate = function() {
        const pct = ttsAudio.duration ? (ttsAudio.currentTime / ttsAudio.duration * 100) : 0;
        const fill = document.getElementById('progressFill');
        if (fill) fill.style.width = pct + '%';
        const cur = document.getElementById('audioTimerCurrent');
        const tot = document.getElementById('audioTimerTotal');
        if (cur) cur.textContent = formatTime(ttsAudio.currentTime);
        if (tot && ttsAudio.duration) tot.textContent = formatTime(ttsAudio.duration);
        // Karaoke sync — atualiza palavra destacada
        atualizarKaraoke(ttsAudio.currentTime);
    };

    ttsAudio.onended = function() {
        ttsPlaying = false;
        player.classList.remove('playing');
        player.classList.add('idle');
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        drawIdleWaveform();
        var fill = document.getElementById('progressFill');
        if (fill) fill.style.width = '0%';
        // Reset karaoke: marca tudo como spoken
        window._lastKaraokeIdx = null;
        var spans = document.querySelectorAll('.transcricao-word');
        spans.forEach(function(s) { s.classList.remove('current'); s.classList.add('spoken'); });
    };
}

function seekAudio(e) {
    if (!ttsAudio || !ttsAudio.duration) return;
    var wrap = e.currentTarget;
    var rect = wrap.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    ttsAudio.currentTime = pct * ttsAudio.duration;
}

// Ciclo de velocidade: 1x → 1.5x → 2x → 1x
var SPEED_CYCLE = [1, 1.5, 2];
function cicloVelocidade() {
    var atual = window._audioPlaybackRate || 1;
    var idx = SPEED_CYCLE.indexOf(atual);
    var prox = SPEED_CYCLE[(idx + 1) % SPEED_CYCLE.length];
    if (ttsAudio) ttsAudio.playbackRate = prox;
    window._audioPlaybackRate = prox;
    var btn = document.getElementById('speedCycle');
    if (btn) {
        btn.textContent = (prox === Math.floor(prox) ? prox : prox) + 'x';
        btn.classList.toggle('boosted', prox !== 1);
    }
}

// +5s / -5s com flash visual
function skipAudio(delta) {
    if (!ttsAudio) return;
    var novo = Math.max(0, Math.min((ttsAudio.duration || 0), (ttsAudio.currentTime || 0) + delta));
    ttsAudio.currentTime = novo;
    // Flash visual no botao clicado
    var btn = delta > 0 ? document.getElementById('skipFwd5') : document.getElementById('skipBack5');
    if (btn) {
        btn.classList.add('flash');
        setTimeout(function() { btn.classList.remove('flash'); }, 200);
    }
}

// Toggle da caixa de transcricao
function toggleTranscricao() {
    var t = document.getElementById('transcricaoToggle');
    var box = document.getElementById('transcricaoBox');
    var lbl = document.getElementById('transcricaoToggleLabel');
    if (!t || !box) return;
    var aberto = box.classList.toggle('open');
    t.classList.toggle('open', aberto);
    if (lbl) lbl.textContent = aberto ? 'Ocultar transcri\u00e7\u00e3o' : 'Ver transcri\u00e7\u00e3o';
    if (aberto) setupTranscricaoScrollListener();
}

// Clicar em palavra da transcricao pelo indice — pulso verde + seek
function seekToWordByIndex(idx) {
    var palavras = window._transcricaoPalavras;
    if (!palavras || !palavras.length) return;

    // Pulso visual instantâneo
    var inner = document.getElementById('transcricaoInner');
    if (inner) {
        var spans = inner.querySelectorAll('.transcricao-word');
        if (spans[idx]) {
            spans[idx].classList.remove('pulse');
            void spans[idx].offsetWidth;
            spans[idx].classList.add('pulse');
        }
    }

    var player = document.getElementById('audioPlayer');
    var cachedUrl = player && player.dataset.audioUrl;

    // Se audio ainda nao iniciou, inicia primeiro
    if (!ttsAudio && cachedUrl) {
        playAudioUrl(cachedUrl);
        var tryNavigate = function() {
            if (ttsAudio && ttsAudio.duration) {
                var tempoPorPalavra = ttsAudio.duration / palavras.length;
                ttsAudio.currentTime = idx * tempoPorPalavra;
            } else {
                setTimeout(tryNavigate, 100);
            }
        };
        tryNavigate();
        return;
    }
    if (ttsAudio && ttsAudio.duration) {
        var tempoPorPalavra = ttsAudio.duration / palavras.length;
        ttsAudio.currentTime = idx * tempoPorPalavra;
    }
}

// Scroll manual pausa auto-follow por 4s
window._autoFollowPausedUntil = 0;
function setupTranscricaoScrollListener() {
    var box = document.getElementById('transcricaoBox');
    if (!box || box._scrollBound) return;
    box._scrollBound = true;
    box.addEventListener('scroll', function() {
        if (window._programmaticScroll) return;
        window._autoFollowPausedUntil = Date.now() + 4000;
    });
}

// Atualiza palavra destacada conforme audio avanca (estimativa linear)
// Nao perfeito, mas suficiente — e a unica opcao sem endpoint pago de alinhamento.
function atualizarKaraoke(currentTime) {
    var palavras = window._transcricaoPalavras;
    if (!palavras || !palavras.length) {
        if (!window._karaokeWarnedNoWords) {
            console.warn('[KARAOKE] _transcricaoPalavras vazio/indefinido. Palavras:', palavras);
            window._karaokeWarnedNoWords = true;
        }
        return;
    }
    if (!ttsAudio || !ttsAudio.duration) return;
    var inner = document.getElementById('transcricaoInner');
    if (!inner) return;

    // Estimativa linear: cada palavra ocupa duracao/N segundos
    // Offset de 0.3s pra compensar latencia de percepcao humana (som chega antes da leitura)
    var tempoPorPalavra = ttsAudio.duration / palavras.length;
    var idxAtual = Math.floor((currentTime + 0.2) / tempoPorPalavra);
    if (idxAtual >= palavras.length) idxAtual = palavras.length - 1;
    if (idxAtual < 0) idxAtual = -1;

    // So atualiza DOM se mudou (evita reflow)
    if (window._lastKaraokeIdx === idxAtual) return;
    window._lastKaraokeIdx = idxAtual;

    var spans = inner.querySelectorAll('.transcricao-word');
    spans.forEach(function(s, i) {
        s.classList.remove('current', 'spoken');
        if (i < idxAtual) s.classList.add('spoken');
        else if (i === idxAtual) s.classList.add('current');
    });

    // Auto-scroll — mantém palavra atual na 3ª linha (~terço superior)
    // Pausa por 4s se usuário fez scroll manual
    if (Date.now() < window._autoFollowPausedUntil) return;
    var box = document.getElementById('transcricaoBox');
    if (box && box.classList.contains('open') && idxAtual >= 0 && spans[idxAtual]) {
        var cur = spans[idxAtual];
        var boxRect = box.getBoundingClientRect();
        var curRect = cur.getBoundingClientRect();
        // 3ª linha visível: line-height ~24px × 3 = 72px abaixo do topo
        var targetY = boxRect.top + 72;
        if (curRect.top < boxRect.top + 10 || curRect.top > targetY + 30) {
            window._programmaticScroll = true;
            box.scrollTop += (curRect.top - targetY);
            setTimeout(function() { window._programmaticScroll = false; }, 50);
        }
    }
}

function fallbackBrowserTTS() {
    var player = document.getElementById('audioPlayer');
    var text = player ? player.dataset.summaryText : '';
    if (!text || !window.speechSynthesis) return;

    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.95;
    utterance.onstart = function() {
        ttsPlaying = true;
        if (player) {
            player.classList.add('playing');
            player.classList.remove('idle');
        }
    };
    utterance.onend = function() {
        ttsPlaying = false;
        if (player) {
            player.classList.remove('playing');
            player.classList.add('idle');
        }
    };
    speechSynthesis.speak(utterance);
}

// ── FASE 8 — Anotacoes efemeras (sticky notes) ──
function stickyKey() { return 'vitae_sticky_' + pcId; }
function getStickies() {
    try { return JSON.parse(localStorage.getItem(stickyKey()) || '[]'); } catch (_e) { return []; }
}
function setStickies(arr) {
    try { localStorage.setItem(stickyKey(), JSON.stringify(arr)); } catch (_e) {}
}
function saveSticky() {
    var txt = document.getElementById('stickyInput').value.trim();
    if (!txt) return;
    var all = getStickies();
    all.push({ id: Date.now(), text: txt, when: new Date().toISOString() });
    setStickies(all);
    document.getElementById('stickyInput').value = '';
    renderStickies();
}
function delSticky(id) {
    var all = getStickies().filter(function(s){ return s.id !== id; });
    setStickies(all);
    renderStickies();
}
function renderStickies() {
    var list = document.getElementById('stickyList');
    if (!list) return;
    var all = getStickies().slice().reverse();
    if (all.length === 0) { list.innerHTML = ''; return; }
    var safe = function(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
    list.innerHTML = all.map(function(n){
        var dt = new Date(n.when);
        var quando = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        return '<div class="sticky-note"><div>' + safe(n.text) + '</div>' +
            '<div class="sticky-note-meta"><span>' + quando + '</span>' +
            '<button class="sticky-note-del" onclick="delSticky(' + n.id + ')">Apagar</button></div></div>';
    }).join('');
}

// ── FASE 8 — Descarte de alerta (persiste em localStorage) ──
function dismissKey() { return 'vitae_dismissed_' + pcId; }
function getDismissed() {
    try { return JSON.parse(localStorage.getItem(dismissKey()) || '[]'); } catch (_e) { return []; }
}
function setDismissed(arr) {
    try { localStorage.setItem(dismissKey(), JSON.stringify(arr)); } catch (_e) {}
}
function toggleDismissAlert(btn) {
    var card = btn.closest('.insight-card');
    if (!card) return;
    var key = card.getAttribute('data-alert-key');
    var all = getDismissed();
    var novo;
    if (card.getAttribute('data-dismissed') === 'true') {
        card.setAttribute('data-dismissed', 'false');
        novo = all.filter(function(k){ return k !== key; });
    } else {
        card.setAttribute('data-dismissed', 'true');
        novo = all.concat([key]);
    }
    setDismissed(novo);
}
function aplicarDismissed() {
    var all = getDismissed();
    document.querySelectorAll('.insight-card[data-alert-key]').forEach(function(card){
        if (all.indexOf(card.getAttribute('data-alert-key')) !== -1) {
            card.setAttribute('data-dismissed', 'true');
        }
    });
}
