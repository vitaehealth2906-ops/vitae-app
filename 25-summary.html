<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — One Minute Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#0A0A0A; border-radius:0 0 20px 20px; z-index:10; }
        .header { position:absolute; top:58px; left:28px; right:28px; display:flex; align-items:center; z-index:5; }
        .back-btn { width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:rgba(255,255,255,0.5); }
        .header-title { flex:1; text-align:center; font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#fff; }

        .content { height:100%; overflow-y:auto; padding:110px 24px 40px; scrollbar-width:none; }
        .content::-webkit-scrollbar { display:none; }

        .patient-bar {
            display:flex; align-items:center; gap:12px;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:16px; padding:14px 16px; margin-bottom:20px;
        }
        .patient-avatar { width:40px; height:40px; border-radius:50%; background:rgba(74,217,164,0.08); display:flex; align-items:center; justify-content:center; font-size:18px; }
        .patient-name { font-size:15px; font-weight:600; color:#fff; }
        .patient-date { font-size:12px; color:rgba(255,255,255,0.25); }

        /* TTS button */
        .tts-btn {
            width:100%; padding:14px; margin-bottom:20px;
            background:rgba(74,144,226,0.08); border:1px solid rgba(74,144,226,0.2);
            border-radius:16px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:10px;
            font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
            color:#4A90E2; transition:all 0.2s;
        }
        .tts-btn:hover { background:rgba(74,144,226,0.12); }
        .tts-btn.playing { border-color:#4AD9A4; color:#4AD9A4; background:rgba(74,217,164,0.08); }

        /* Summary text */
        .summary-box {
            background:rgba(197,165,90,0.04);
            border:1px solid rgba(197,165,90,0.12);
            border-radius:18px; padding:18px;
            margin-bottom:20px;
        }
        .summary-label { font-size:11px; font-weight:700; color:#C5A55A; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
        .summary-text { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; }

        /* Blocks */
        .block {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:18px; padding:16px; margin-bottom:12px;
        }
        .block-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .block-priority { width:8px; height:8px; border-radius:50%; }
        .block-priority.alta { background:#D94452; }
        .block-priority.media { background:#C5A55A; }
        .block-priority.baixa { background:#4AD9A4; }
        .block-title { font-size:14px; font-weight:600; color:#fff; }
        .block-content { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.5; }

        /* Alerts */
        .alert {
            display:flex; align-items:flex-start; gap:10px;
            padding:14px; border-radius:14px; margin-bottom:10px;
        }
        .alert.URGENTE { background:rgba(217,68,82,0.08); border:1px solid rgba(217,68,82,0.2); }
        .alert.ATENCAO { background:rgba(197,165,90,0.08); border:1px solid rgba(197,165,90,0.2); }
        .alert.INFO { background:rgba(74,144,226,0.08); border:1px solid rgba(74,144,226,0.2); }
        .alert-icon { font-size:16px; flex-shrink:0; margin-top:2px; }
        .alert-text { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.4; }

        /* Questions */
        .questions-title { font-size:14px; font-weight:600; color:#fff; margin:16px 0 10px; }
        .question {
            padding:10px 14px;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:12px; margin-bottom:8px;
            font-size:13px; color:rgba(255,255,255,0.5);
        }

        .loading { text-align:center; padding:40px; color:rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="header">
        <div class="back-btn" onclick="window.location.href='20-medico-dashboard.html'">‹</div>
        <div class="header-title">One Minute Summary</div>
        <div style="width:40px;"></div>
    </div>

    <div class="content" id="mainContent">
        <div class="loading" id="loadingState">Carregando resumo...</div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pcId = urlParams.get('id');
    let summaryText = '';
    let isSpeaking = false;

    async function init() {
        if (!pcId) return;

        try {
            const data = await vitaeAPI.getPreConsulta(pcId);
            const pc = data.preConsulta;
            const summary = pc.summaryJson || {};
            summaryText = pc.summaryIA || summary.summaryTexto || 'Resumo não disponível';

            const respondidaEm = pc.respondidaEm ? new Date(pc.respondidaEm).toLocaleDateString('pt-BR') : '';

            let html = `
                <div class="patient-bar">
                    <div class="patient-avatar">👤</div>
                    <div>
                        <div class="patient-name">${pc.pacienteNome}</div>
                        <div class="patient-date">Respondida em ${respondidaEm}</div>
                    </div>
                </div>

                <button class="tts-btn" id="ttsBtn" onclick="toggleTTS()">
                    🔊 Ouvir resumo
                </button>

                <div class="summary-box">
                    <div class="summary-label">Resumo</div>
                    <div class="summary-text">${summaryText}</div>
                </div>
            `;

            // Blocks
            if (summary.blocos && summary.blocos.length > 0) {
                html += summary.blocos.map(b => `
                    <div class="block">
                        <div class="block-header">
                            <div class="block-priority ${b.prioridade || 'media'}"></div>
                            <div class="block-title">${b.titulo}</div>
                        </div>
                        <div class="block-content">${b.conteudo}</div>
                    </div>
                `).join('');
            }

            // Alerts
            if (summary.alertas && summary.alertas.length > 0) {
                html += summary.alertas.map(a => {
                    const icons = { URGENTE:'🚨', ATENCAO:'⚠️', INFO:'ℹ️' };
                    return `
                        <div class="alert ${a.tipo}">
                            <div class="alert-icon">${icons[a.tipo] || 'ℹ️'}</div>
                            <div class="alert-text">${a.mensagem}</div>
                        </div>
                    `;
                }).join('');
            }

            // Suggested questions
            if (summary.perguntasSugeridas && summary.perguntasSugeridas.length > 0) {
                html += '<div class="questions-title">Perguntas sugeridas</div>';
                html += summary.perguntasSugeridas.map(q => `
                    <div class="question">❓ ${q}</div>
                `).join('');
            }

            // Raw responses if no AI summary
            if (!summary.blocos && pc.respostas) {
                html += '<div class="questions-title">Respostas do paciente</div>';
                const r = pc.respostas;
                for (const [key, val] of Object.entries(r)) {
                    if (val) {
                        html += `<div class="block">
                            <div class="block-title">${key}</div>
                            <div class="block-content">${val}</div>
                        </div>`;
                    }
                }
            }

            document.getElementById('mainContent').innerHTML = html;
        } catch (e) {
            document.getElementById('loadingState').textContent = 'Erro: ' + e.message;
        }
    }

    function toggleTTS() {
        const btn = document.getElementById('ttsBtn');
        if (isSpeaking) {
            speechSynthesis.cancel();
            isSpeaking = false;
            btn.classList.remove('playing');
            btn.innerHTML = '🔊 Ouvir resumo';
            return;
        }

        const utterance = new SpeechSynthesisUtterance(summaryText);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.95;

        utterance.onstart = () => {
            isSpeaking = true;
            btn.classList.add('playing');
            btn.innerHTML = '⏸️ Pausar';
        };

        utterance.onend = () => {
            isSpeaking = false;
            btn.classList.remove('playing');
            btn.innerHTML = '🔊 Ouvir resumo';
        };

        speechSynthesis.speak(utterance);
    }

    init();
</script>
</body>
</html>
