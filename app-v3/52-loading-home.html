<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Carregando</title>
<link rel="stylesheet" href="_core.css">
<style>
  body { background: #F4F6FA; }
  .phone { background: #F4F6FA; }

  /* Skeleton loading da home */
  @keyframes shimmer {
    0% { background-position: -300px 0; }
    100% { background-position: 300px 0; }
  }
  .skel {
    background: linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 100%);
    background-size: 300px 100%;
    animation: shimmer 1.4s linear infinite;
    border-radius: 6px;
  }

  .header-skel {
    padding: 14px var(--s5);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-skel-text { flex: 1; }
  .skel-line { height: 12px; margin-bottom: 6px; }
  .skel-circle { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }

  .rgcard-skel {
    height: 215px;
    margin: var(--s2) var(--s5) var(--s5);
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(13,15,20,0.85), rgba(26,46,44,0.85));
    position: relative;
    overflow: hidden;
  }
  .rgcard-skel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--green), var(--cyan), transparent);
  }
  .rgcard-skel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    background-size: 300px 100%;
    animation: shimmer 1.4s linear infinite;
  }

  .section-skel {
    padding: 0 var(--s5);
    margin-bottom: var(--s3);
  }
  .skel-section-lbl { width: 120px; height: 11px; }

  .card-skel {
    margin: 0 var(--s5) var(--s3);
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .card-skel-content { flex: 1; }
  .card-skel .skel-circle { width: 36px; height: 36px; }
  .card-skel .skel-name { width: 60%; height: 14px; margin-bottom: 6px; }
  .card-skel .skel-meta { width: 80%; height: 11px; }

  .loading-hint {
    position: absolute;
    bottom: 110px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: var(--ink4);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="phone">
