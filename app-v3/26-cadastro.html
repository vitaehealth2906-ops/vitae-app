<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vita id — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root{
        --green:#2563EB; --cyan:#3B82F6; --grad:linear-gradient(120deg, #3B82F6, #2563EB);
        --bg:#F4F6FA; --ink:#0D0F14; --muted:#9CA3AF; --line:#E6E9F0;
      }
      *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
      body{background:#E9ECF3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

      .phone{width:390px;max-width:100vw;background:var(--bg);border-radius:42px;box-shadow:0 30px 80px rgba(13,15,20,.18);overflow:hidden;position:relative}
      .status{display:flex;justify-content:space-between;align-items:center;padding:16px 26px 4px;font-size:14px;font-weight:700;color:var(--ink)}
      .status svg{vertical-align:middle}

      .content{padding:18px 30px 36px}

      /* Back button */
      .back-btn{
        width:40px;height:40px;border-radius:12px;
        background:#fff;border:1.5px solid var(--line);
        display:flex;align-items:center;justify-content:center;
        cursor:pointer;font-size:20px;color:var(--ink);
        line-height:1;transition:.15s;
      }
      .back-btn:hover{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(59,130,246,.10)}

      /* logo */
      .logo{display:flex;align-items:center;gap:0;font-size:30px;font-weight:800;color:var(--ink);justify-content:center;margin:22px 0 6px}
      .logo .id{background:var(--grad);color:#fff;border-radius:11px;padding:2px 11px;margin-left:7px;letter-spacing:.5px}
      .sub{text-align:center;color:var(--muted);font-weight:500;font-size:14px;margin-bottom:30px}

      /* Title */
      .page-header{margin-bottom:26px;text-align:center}
      .page-title{font-size:26px;font-weight:800;color:var(--ink);margin-bottom:6px}
      .page-title span{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:.08em}
      .page-subtitle{color:var(--muted);font-size:14.5px;font-weight:500}

      /* Social */
      #socialButtons{display:flex;flex-direction:column;gap:0}
      .social-btn{
        display:flex;align-items:center;justify-content:center;gap:10px;
        width:100%;height:56px;border:1.5px solid var(--line);border-radius:16px;
        background:#fff;font-size:14.5px;font-weight:700;color:var(--ink);cursor:pointer;
        transition:.15s;
      }
      .social-btn:hover{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(59,130,246,.10)}
      .or{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:13px;font-weight:600;margin:22px 0}
      .or::before,.or::after{content:"";flex:1;height:1.5px;background:var(--line)}

      /* Form */
      .form{display:flex;flex-direction:column;}

      .field-block{margin-bottom:18px}
      label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin:0 0 9px 4px}

      .field-shell{
        display:flex;align-items:center;gap:12px;
        background:#fff;border:1.5px solid var(--line);border-radius:16px;
        padding:0 16px;height:58px;transition:.15s;
      }
      .field-shell:focus-within{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(59,130,246,.12)}
      .field-shell svg{flex:none;color:var(--muted)}
      .field-input{
        border:0;outline:0;flex:1;width:100%;height:100%;
        font-size:15.5px;font-weight:500;color:var(--ink);background:transparent;
      }
      .field-input::placeholder{color:#B9C0CC}

      /* Phone with prefix */
      .phone-input-wrap{display:flex;gap:10px}
      .phone-prefix{
        display:flex;align-items:center;gap:6px;flex-shrink:0;
        background:#fff;border:1.5px solid var(--line);border-radius:16px;
        height:58px;padding:0 14px;font-size:14.5px;font-weight:700;color:var(--ink);
      }
      .phone-prefix svg{flex:none}
      .phone-input-wrap .field-shell{flex:1}

      /* Password toggle */
      .password-toggle{
        background:none;border:none;cursor:pointer;
        color:var(--muted);display:flex;align-items:center;padding:0;flex:none;
      }

      /* Terms */
      .terms{
        display:flex;align-items:flex-start;gap:11px;
        margin:2px 4px 6px;
      }
      .terms-check{
        width:21px;height:21px;border-radius:6px;
        border:2px solid #CBD2DD;background:#fff;
        cursor:pointer;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;
        transition:all .2s ease;margin-top:1px;
      }
      .terms-check.checked{background:var(--green);border-color:var(--green)}
      .terms-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:800}
      .terms-text{font-size:13px;color:#6B7280;line-height:1.5;font-weight:500}
      .terms-text a{color:var(--cyan);font-weight:700;text-decoration:none}

      /* CTA */
      .btn-primary{
        width:100%;height:58px;border:0;border-radius:16px;
        background:var(--grad);color:#fff;
        font-size:16.5px;font-weight:800;letter-spacing:.3px;
        cursor:pointer;box-shadow:0 12px 26px rgba(59,130,246,.30);
        transition:all .2s ease;margin-top:10px;opacity:.5;
      }
      .btn-primary.enabled{opacity:1}
      .btn-primary.enabled:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(59,130,246,.38)}

      .login-link{text-align:center;margin-top:24px;font-size:14px;font-weight:600;color:#6B7280}
      .login-link a{color:var(--cyan);font-weight:800;text-decoration:none}

      @media(max-width:480px){
        body{padding:0!important;background:var(--bg)!important}
        .phone{width:100vw!important;min-height:100vh!important;min-height:100svh!important;max-width:100vw!important;border-radius:0!important;box-shadow:none!important}
        .status{display:none!important}
        .content{padding-top:28px}
      }
    </style>
</head>
<body>
<div class="phone">
    <div class="status">
      <span>9:41</span>
      <span>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        &nbsp;
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 4.2C3.2 2.2 5.7 1.2 8.5 1.2S13.8 2.2 16 4.2"/><path d="M3.6 6.8C5.1 5.5 6.7 4.9 8.5 4.9s3.4.6 4.9 1.9"/><circle cx="8.5" cy="9.6" r="1.1" fill="currentColor" stroke="none"/></svg>
        &nbsp;
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="22" height="11" rx="3"/><rect x="3" y="3" width="17" height="7" rx="1.5" fill="currentColor"/><rect x="24" y="4.5" width="1.6" height="4" rx="1" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="content">
        <div style="padding-top:6px;">
            <div class="back-btn" onclick="window.location.href='21-boas-vindas.html'">‹</div>
        </div>

        <div class="logo">vita<span class="id">id</span></div>
        <div class="sub">seu RG de saúde</div>

        <div class="page-header">
            <div class="page-title">Criar <span>conta</span></div>
            <div class="page-subtitle">Comece sua jornada de saúde</div>
        </div>

        <!-- Social login buttons -->
        <div id="socialButtons">
            <button class="social-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 7.1 29.6 5 24 5 16.3 5 9.7 9.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.2 35.9 26.7 37 24 37c-5.3 0-9.6-3.4-11.3-8.1l-6.5 5C9.5 40.6 16.2 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4 5.5l6.2 5.3C41.9 36 45 30.6 45 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
                Continuar com Google
            </button>
            <div class="or">ou continue com</div>
        </div>

        <div class="form">
            <div class="field field-block">
                <label>Nome completo</label>
                <div class="field-shell">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>
                    <input class="field-input" type="text" placeholder="Seu nome" oninput="checkForm()">
                </div>
            </div>

            <div class="field field-block">
                <label>Celular</label>
                <div class="phone-input-wrap">
                    <div class="phone-prefix">🇧🇷 +55</div>
                    <div class="field-shell">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>
                        <input class="field-input" type="tel" inputmode="numeric" maxlength="15" placeholder="(11) 99999-9999" oninput="maskCelular(this); checkForm()">
                    </div>
                </div>
            </div>

            <div class="field field-block">
                <label>Email</label>
                <div class="field-shell">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2.5" y="4.5" width="19" height="15" rx="3"/><path d="M3 6l9 6 9-6"/></svg>
                    <input class="field-input" type="email" placeholder="seu@email.com" oninput="checkForm()">
                </div>
            </div>

            <div class="field field-block">
                <label>Senha</label>
                <div class="field-shell">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10.5" width="16" height="10" rx="3"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
                    <input class="field-input" type="password" id="passInput" placeholder="Mínimo 8 caracteres" oninput="checkForm()">
                    <button class="password-toggle" onclick="togglePass()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>

            <!-- Aceite movido para a tela 27-consentimento.html (aparece depois de criar conta) -->
            <div style="height:6px"></div>

            <div id="errorMsg" style="display:none; background:rgba(217,68,82,0.10); border:1.5px solid rgba(217,68,82,0.3); border-radius:14px; padding:13px 16px; font-size:13.5px; font-weight:600; color:#EF4444; text-align:center; margin-bottom:6px;"></div>

            <button class="btn-primary" id="btnCreate" onclick="goToVerification()">Criar conta</button>

            <div id="forgotLink" style="display:none; text-align:center; margin-top:14px;">
                <a href="24-esqueci-senha.html" style="font-size:13.5px; font-weight:700; color:#9CA3AF; text-decoration:none;">Esqueci minha senha</a>
            </div>

            <div class="login-link">
                Já tem conta? <a href="#">Entrar</a>
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    let termsAccepted = false;
    let isLogin = false;
    // Fluxo de termos v2: tela 27-consentimento entre "criar conta" e onboarding.
    // Rollback rapido: trocar para false (volta ao fluxo antigo direto pro quiz).
    const FLUXO_TERMOS_V2 = true;
    const _preferLogin = sessionStorage.getItem('vitae_prefer_login') === '1';
    sessionStorage.removeItem('vitae_prefer_login');
    localStorage.setItem('vitae_tipo_escolhido', 'PACIENTE');

    // ===== Fluxo de volta pra pre-consulta =====
    // Se o usuario veio do link de uma pre-consulta, guardamos o token
    // para depois do cadastro/login voltar direto pro fluxo correto.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const retornoToken = params.get('retorno') || params.get('token');
      if (retornoToken) localStorage.setItem('vitae_quiz_retorno', retornoToken);
      // Convite de empresa (Fundacao B2B): guarda o token pra colar a etiqueta no fim do quiz.
      const c = params.get('c');
      if (c) localStorage.setItem('vitae_convite_empresa', c);
    })();

    // Helpers de redirecionamento: respeitam o token de retorno se existir.
    function _redirectAfterAuth_quizVazio() {
      const t = localStorage.getItem('vitae_quiz_retorno') || '';
      if (t) return '30-quiz.html?retorno=' + encodeURIComponent(t);
      // Funcionario de empresa (veio por convite): PULA os slides educativos, vai direto pro quiz.
      if (localStorage.getItem('vitae_convite_empresa')) return '30-quiz.html';
      // Cadastro normal: paciente precisa ver onboarding antes do quiz (uma vez só).
      const jaViuOnb = localStorage.getItem('vitae_onb_quiz_visto') === '1';
      return jaViuOnb ? '30-quiz.html' : '28-onboarding.html';
    }
    function _redirectAfterAuth_perfilOk() {
      const t = localStorage.getItem('vitae_quiz_retorno') || '';
      if (t) {
        localStorage.removeItem('vitae_quiz_retorno');
        return 'pre-consulta.html?token=' + encodeURIComponent(t);
      }
      // PORTEIRO v4: se veio do banner "Sessão expirada", volta direto pra tela onde estava
      try {
        const back = sessionStorage.getItem('vitae_return_to');
        if (back && !back.includes('23-login') && !back.includes('26-cadastro') && !back.includes('20-splash')) {
          sessionStorage.removeItem('vitae_return_to');
          return back.replace(/^\/(app-v3\/)?/, '');
        }
      } catch (_) {}
      return '01-saude.html';
    }

    const inputs = document.querySelectorAll('.field-input');
    const nomeInput = inputs[0];
    const celularInput = inputs[1];
    const emailInput = inputs[2];
    const senhaInput = document.getElementById('passInput');
    const btn = document.getElementById('btnCreate');

    function toggleTerms() {
        termsAccepted = !termsAccepted;
        document.getElementById('termsCheck').classList.toggle('checked', termsAccepted);
        checkForm();
    }

    function togglePass() {
        const input = document.getElementById('passInput');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function checkForm() {
        let allFilled = true;
        if (isLogin) {
            if (!emailInput.value.trim() || !senhaInput.value.trim()) allFilled = false;
        } else {
            inputs.forEach(i => { if (!i.value.trim()) allFilled = false; });
            if (!senhaInput.value.trim()) allFilled = false;
        }

        if (allFilled) {
            btn.classList.add('enabled');
        } else {
            btn.classList.remove('enabled');
        }
    }

    function maskCelular(el) {
        let d = el.value.replace(/\D/g, '');
        if (d.startsWith('55') && d.length > 11) d = d.slice(2);
        d = d.slice(0, 11);
        let out = '';
        if (d.length === 0) { el.value = ''; return; }
        out = '(' + d.slice(0, 2);
        if (d.length >= 3) {
            out += ') ';
            if (d.length <= 10) {
                out += d.slice(2, 6);
                if (d.length >= 7) out += '-' + d.slice(6, 10);
            } else {
                out += d.slice(2, 7) + '-' + d.slice(7, 11);
            }
        }
        el.value = out;
    }

    function formatCelular(raw) {
        const digits = raw.replace(/\D/g, '');
        // Remove leading 55 if user typed it
        const num = digits.startsWith('55') ? digits.slice(2) : digits;
        return '+55' + num;
    }

    async function goToVerification() {
        if (!btn.classList.contains('enabled')) {
            const errorMsg = document.getElementById('errorMsg');
            if (isLogin) {
                errorMsg.textContent = 'Preencha email e senha.';
            } else {
                errorMsg.textContent = 'Preencha todos os campos.';
            }
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            return;
        }
        btn.textContent = isLogin ? 'Entrando...' : 'Criando conta...';
        btn.style.pointerEvents = 'none';

        try {
            if (isLogin) {
                const loginResult = await vitaeAPI.login(emailInput.value.trim(), senhaInput.value);
                const u = loginResult.usuario || {};
                if (u.tipo === 'EMPRESA') {
                    window.location.href = 'empresa-painel.html';
                } else if (u.tipo === 'MEDICO') {
                    window.location.href = '20-medico-dashboard.html';
                } else {
                    // Verificar se perfil tem dados — se vazio, vai pro quiz
                    try {
                        const perfilData = await vitaeAPI.getPerfil();
                        const p = perfilData.perfil || {};
                        const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                        window.location.href = vazio ? (FLUXO_TERMOS_V2 ? '27-consentimento.html' : _redirectAfterAuth_quizVazio()) : _redirectAfterAuth_perfilOk();
                    } catch(e) {
                        window.location.href = _redirectAfterAuth_perfilOk();
                    }
                }
            } else {
                // Cadastro novo: paciente AINDA não tem RG nem viu onboarding.
                // Limpa flags pra forçar onboarding + quiz.
                localStorage.removeItem('vitae_quiz_completo');
                localStorage.removeItem('vitae_onb_quiz_visto');
                const celFormatado = formatCelular(celularInput.value);
                const tipoEscolhido = localStorage.getItem('vitae_tipo_escolhido') || 'PACIENTE';
                const result = await vitaeAPI.cadastro(
                    nomeInput.value.trim(),
                    emailInput.value.trim(),
                    celFormatado,
                    senhaInput.value,
                    tipoEscolhido
                );
                // Cadastro ja retorna tokens — login automatico
                if (result.token) {
                    localStorage.setItem('vitae_token', result.token);
                    if (result.refreshToken) localStorage.setItem('vitae_refresh_token', result.refreshToken);
                    if (result.usuario) localStorage.setItem('vitae_usuario', JSON.stringify(result.usuario));
                }
                if (tipoEscolhido === 'EMPRESA') {
                    window.location.href = 'empresa-painel.html';
                } else if (tipoEscolhido === 'MEDICO') {
                    window.location.href = '20-medico-cadastro.html';
                } else {
                    window.location.href = FLUXO_TERMOS_V2 ? '27-consentimento.html' : _redirectAfterAuth_quizVazio();
                }
            }
        } catch (err) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = err.message || 'Erro ao processar. Tente novamente.';
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
            btn.textContent = isLogin ? 'Entrar' : 'Criar conta';
            btn.style.pointerEvents = 'auto';
        }
    }

    // Toggle entre cadastro e login
    function toggleLogin() {
        isLogin = !isLogin;
        const header = document.querySelector('.page-title');
        const subtitle = document.querySelector('.page-subtitle');
        const loginLink = document.querySelector('.login-link');

        if (isLogin) {
            header.innerHTML = 'Bem-vindo <span>de volta</span>';
            subtitle.textContent = 'Entre na sua conta';
            btn.textContent = 'Entrar';
            loginLink.innerHTML = 'Nao tem conta? <a href="#" onclick="toggleLogin(); return false;">Criar conta</a>';
            nomeInput.closest('.field').style.display = 'none';
            celularInput.closest('.field').style.display = 'none';
            document.getElementById('forgotLink').style.display = 'block';
        } else {
            header.innerHTML = 'Criar <span>conta</span>';
            subtitle.textContent = 'Comece sua jornada de saude';
            btn.textContent = 'Criar conta';
            loginLink.innerHTML = 'Ja tem conta? <a href="#" onclick="toggleLogin(); return false;">Entrar</a>';
            nomeInput.closest('.field').style.display = 'flex';
            celularInput.closest('.field').style.display = 'flex';
            document.getElementById('forgotLink').style.display = 'none';
        }
        checkForm();
    }

    // Link "Ja tem conta?" -> toggle
    document.querySelector('.login-link a').addEventListener('click', function(e) {
        e.preventDefault();
        toggleLogin();
    });

    // ===== Google Sign-In =====
    const GOOGLE_CLIENT_ID = '797358115254-rdlqi8dta9n7jvcvajeq4ubu20976te5.apps.googleusercontent.com';

    // Load Google Identity Services
    const gsiScript = document.createElement('script');
    gsiScript.src = 'https://accounts.google.com/gsi/client';
    gsiScript.async = true;
    gsiScript.defer = true;
    document.head.appendChild(gsiScript);

    function showGoogleError(msg, detail) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerHTML = '<strong>' + msg + '</strong>'
          + (detail ? '<div style="margin-top:8px; font-size:11px; color:#9CA3AF; word-break:break-all;">' + detail + '</div>' : '')
          + '<div style="margin-top:10px;"><button onclick="document.getElementById(\'errorMsg\').style.display=\'none\'" style="background:transparent; border:1px solid #EF4444; color:#EF4444; padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer;">Fechar</button></div>';
        errorMsg.style.display = 'block';
        console.error('[GoogleAuth]', msg, detail);
    }

    function loginWithGoogle() {
        console.log('[GoogleAuth] Iniciando login Google...');
        if (typeof google === 'undefined' || !google.accounts) {
            showGoogleError('Google Sign-In ainda carregando.', 'Aguarde 3 segundos e tente novamente. Se persistir, verifique sua conexão.');
            return;
        }
        try {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'openid email profile',
                callback: async (response) => {
                    console.log('[GoogleAuth] Resposta Google:', response);
                    if (response.error) {
                        showGoogleError('Google rejeitou o login.', 'Código: ' + response.error + (response.error_description ? ' — ' + response.error_description : ''));
                        return;
                    }
                    if (!response.access_token) {
                        showGoogleError('Google não retornou token de acesso.', JSON.stringify(response));
                        return;
                    }
                    try {
                        const userInfoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${response.access_token}` }
                        });
                        if (!userInfoRes.ok) {
                            const txt = await userInfoRes.text();
                            showGoogleError('Falha ao buscar dados do Google.', 'HTTP ' + userInfoRes.status + ' — ' + txt.slice(0, 200));
                            return;
                        }
                        const userInfo = await userInfoRes.json();
                        console.log('[GoogleAuth] UserInfo:', userInfo);
                        if (!userInfo.sub || !userInfo.email) {
                            showGoogleError('Google não retornou email ou ID.', 'Recebido: ' + JSON.stringify(userInfo).slice(0, 200));
                            return;
                        }

                        const tipoEscolhido = localStorage.getItem('vitae_tipo_escolhido') || 'PACIENTE';
                        console.log('[GoogleAuth] Chamando backend loginSocial...');
                        let result;
                        try {
                            result = await vitaeAPI.loginSocial('google', userInfo.sub, userInfo.name, userInfo.email);
                        } catch (apiErr) {
                            console.error('[GoogleAuth] Backend erro:', apiErr);
                            showGoogleError('Servidor recusou login.', (apiErr && apiErr.message) ? apiErr.message : String(apiErr));
                            return;
                        }
                        console.log('[GoogleAuth] Backend OK:', result);

                        if (tipoEscolhido === 'EMPRESA' || (result.usuario && result.usuario.tipo === 'EMPRESA')) {
                            window.location.href = 'empresa-painel.html';
                        } else if (tipoEscolhido === 'MEDICO' || (result.usuario && result.usuario.tipo === 'MEDICO')) {
                            window.location.href = '20-medico-dashboard.html';
                        } else {
                            try {
                                const perfilData = await vitaeAPI.getPerfil();
                                const p = perfilData.perfil || {};
                                const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                                window.location.href = vazio ? (FLUXO_TERMOS_V2 ? '27-consentimento.html' : _redirectAfterAuth_quizVazio()) : _redirectAfterAuth_perfilOk();
                            } catch(e) {
                                window.location.href = FLUXO_TERMOS_V2 ? '27-consentimento.html' : _redirectAfterAuth_quizVazio();
                            }
                        }
                    } catch (err) {
                        showGoogleError('Erro inesperado.', (err && err.message) ? err.message : String(err));
                    }
                }
            });
            client.requestAccessToken();
        } catch (initErr) {
            showGoogleError('Falha ao inicializar Google Sign-In.', (initErr && initErr.message) ? initErr.message : String(initErr));
        }
    }

    function loginWithApple() {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = 'Login com Apple estará disponível em breve.';
        errorMsg.style.display = 'block';
        setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
    }

    // Se veio de 23-login pedindo modo login, troca a UI
    if (_preferLogin) toggleLogin();

    // Se ja esta logado, redirecionar (mock api.js sempre simula sucesso)
    if (vitaeAPI.isLoggedIn()) {
        const u = vitaeAPI.getUsuario();
        (async () => {
            try {
                const perfilData = await vitaeAPI.getPerfil();
                const p = perfilData.perfil || {};
                const vazio = !p.dataNascimento && !p.tipoSanguineo && !p.genero && !p.cpf;
                window.location.href = vazio ? (FLUXO_TERMOS_V2 ? '27-consentimento.html' : _redirectAfterAuth_quizVazio()) : _redirectAfterAuth_perfilOk();
            } catch(e) {
                window.location.href = _redirectAfterAuth_perfilOk();
            }
        })();
    }
</script>
