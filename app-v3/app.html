<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>vita id — app paciente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #0F1216;
    color: #fff;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
  }

  /* ═══════════════════════════════════════════════════════════════════
     STACK — palco central onde cada tela vira visível
     ═══════════════════════════════════════════════════════════════════ */
  .stack {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .screen {
    display: none;
    width: 393px;
    height: 852px;
    max-width: 100vw;
    max-height: 100vh;
  }
  .screen.active { display: block; }

  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 52px;
    background: #F4F6FA;
    box-shadow:
      0 0 0 1px rgba(0,229,160,0.15),
      0 0 0 3px #1A1E26,
      0 40px 120px rgba(0,0,0,0.4);
  }

  @media (max-width: 480px) {
    .screen { width: 100vw; height: 100vh; height: 100dvh; max-height: none; }
    .screen iframe { border-radius: 0; box-shadow: none; }
  }

  /* ═══════════════════════════════════════════════════════════════════
     DEV BUTTON + PANEL — atalho pra pular pra qualquer tela
     ═══════════════════════════════════════════════════════════════════ */
  .dev-btn {
    position: fixed;
    bottom: 22px; right: 22px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #0D0F14;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    cursor: pointer;
    z-index: 1000;
    transition: all 0.2s;
  }
  .dev-btn:hover { background: #00C47A; border-color: rgba(0,229,160,0.4); }

  .dev-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 360px; max-width: 92vw;
    background: #0F1216;
    border-left: 1px solid rgba(255,255,255,0.1);
    box-shadow: -20px 0 80px rgba(0,0,0,0.5);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 999;
    display: flex; flex-direction: column;
    color: #fff;
  }
  .dev-panel.open { transform: translateX(0); }

  .dev-head {
    padding: 22px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
  }
  .dev-head h2 {
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .dev-head p {
    font-size: 12px;
    color: rgba(255,255,255,0.50);
    line-height: 1.45;
  }
  .dev-close {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .dev-close:hover { background: rgba(255,255,255,0.10); }

  .dev-list { flex: 1; overflow-y: auto; padding: 12px 12px 24px; }

  .dev-group {
    font-size: 10px; font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    padding: 14px 10px 6px;
  }

  .dev-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    background: none; border: none;
    width: 100%; text-align: left;
    font-family: inherit;
  }
  .dev-item:hover { background: rgba(255,255,255,0.06); }
  .dev-item.active { background: rgba(0,229,160,0.12); color: #00E5A0; }

  .dev-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.06);
    padding: 3px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    min-width: 28px; text-align: center;
  }
  .dev-item.active .dev-item-num {
    background: rgba(0,229,160,0.18);
    color: #00E5A0;
  }

  .dev-foot {
    padding: 14px 20px 22px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: rgba(255,255,255,0.40);
    line-height: 1.5;
  }
  .dev-foot b { color: rgba(255,255,255,0.75); }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     STACK — 32 telas como sections com iframes
     Cada section carrega o arquivo correspondente quando ativada (lazy)
     ═══════════════════════════════════════════════════════════════════ -->
<div class="stack" id="stack">

  <!-- ─── LOTE 1: ONBOARDING + AUTH (10 telas) ─── -->

    <iframe data-src="27-sms.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="onboarding-quiz" data-group="onboarding" data-num="28" data-title="Onboarding (3 slides)" data-auth="onb">
    <iframe data-src="28-onboarding.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="quiz" data-group="onboarding" data-num="30" data-title="Quiz vita id (7 passos)" data-auth="onb">
    <iframe data-src="30-quiz.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="pronto" data-group="onboarding" data-num="31" data-title="Pronto!" data-auth="onb">

  <!-- ─── LOTE 2: 4 ABAS PRINCIPAIS ─── -->

  <section class="screen" data-screen="qr" data-group="abas" data-num="12" data-title="Meu QR Code" data-auth="auth">

  </section>

  <section class="screen" data-screen="consultas" data-group="abas" data-num="15" data-title="Consultas" data-auth="auth">
    <iframe data-src="15-consultas.html" loading="lazy"></iframe>

  <!-- ─── LOTE 3: FILHAS (10 telas) ─── -->
  <section class="screen" data-screen="perfil" data-group="filhas" data-num="18" data-title="Meu Perfil" data-auth="auth">

  <section class="screen" data-screen="privacidade" data-group="filhas" data-num="71" data-title="Privacidade / Autorizações" data-auth="auth">

  <section class="screen" data-screen="medicamentos" data-group="filhas" data-num="03" data-title="Medicamentos" data-auth="auth">
    <iframe data-src="03-medicamentos.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="med-detalhe" data-group="filhas" data-num="04" data-title="Detalhe do medicamento" data-auth="auth">
    <iframe data-src="04-med-detalhe.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="add-medicamento" data-group="filhas" data-num="05" data-title="Novo medicamento" data-auth="auth">

  <section class="screen" data-screen="alergias" data-group="filhas" data-num="06" data-title="Alergias" data-auth="auth">

  <section class="screen" data-screen="add-alergia" data-group="filhas" data-num="08" data-title="Nova alergia" data-auth="auth">

  <section class="screen" data-screen="exame-detalhe" data-group="filhas" data-num="10" data-title="Detalhe do exame" data-auth="auth">

  <section class="screen" data-screen="consulta-detalhe" data-group="filhas" data-num="16" data-title="Detalhe da consulta" data-auth="auth">

  <!-- ─── LOTE 4: ESTADOS + RG PÚBLICO (7 telas) ─── -->
  <section class="screen" data-screen="rg-publico" data-group="publico" data-num="14" data-title="RG público (visão do médico)" data-auth="public">

  <section class="screen" data-screen="saude-vazia" data-group="vazios" data-num="40" data-title="Saúde · vazia" data-auth="auth">

  <section class="screen" data-screen="medicamentos-vazia" data-group="vazios" data-num="41" data-title="Medicamentos · vazia" data-auth="auth">

  </section>

  <section class="screen" data-screen="alergias-vazia" data-group="vazios" data-num="42" data-title="Alergias · vazia" data-auth="auth">

  <section class="screen" data-screen="consultas-vazia" data-group="vazios" data-num="44" data-title="Consultas · vazia" data-auth="auth">

  </section>

  <section class="screen" data-screen="loading-home" data-group="estados" data-num="52" data-title="Carregando home" data-auth="auth">
    <iframe data-src="52-loading-home.html" loading="lazy"></iframe>
  </section>

  <section class="screen" data-screen="erro-offline" data-group="estados" data-num="60" data-title="Sem internet" data-auth="auth">
    <iframe data-src="60-erro-offline.html" loading="lazy"></iframe>
  </section>

</div>


<aside class="dev-panel" id="devPanel">
  <div class="dev-head">
    <div>
      <h2>Mapa do app paciente</h2>
      <p>32 telas num arquivo único. Clique pra pular.</p>
    </div>
    <button class="dev-close" onclick="toggleDev()">×</button>
  </div>
  <div class="dev-list" id="devList"></div>
  <div class="dev-foot">
    <p><b>Atalhos:</b> tecla <b>D</b> abre/fecha este painel · URL <b>#nome-da-tela</b> abre direto</p>
    <p style="margin-top:6px"><b>Resetar:</b> abra <a href="mapa-v3.html" style="color:#00E5A0">mapa-v3.html</a> e clique "Resetar protótipo"</p>
  </div>
</aside>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ESTADO + NAVEGAÇÃO
   ═══════════════════════════════════════════════════════════════════ */

const APP = {
  tela: null,
};

const TELA_INICIAL = 'splash';

const GRUPOS = [
  { id: 'onboarding', nome: 'Entrada + cadastro/login' },
  { id: 'abas',       nome: 'Abas principais (Saúde · Exames · QR · Consultas)' },
  { id: 'filhas',     nome: 'Telas filhas (perfil, meds, alergias, detalhes)' },
  { id: 'publico',    nome: 'RG público (visão do médico ao escanear)' },
  { id: 'vazios',     nome: 'Estados vazios' },
  { id: 'estados',    nome: 'Loading + Erro' },
];

function irPara(nome) {
  const alvo = document.querySelector(`.screen[data-screen="${nome}"]`);
  if (!alvo) { console.warn('Tela não existe:', nome); return; }

  // Esconde a atual, mostra a alvo
  document.querySelectorAll('.screen.active').forEach(s => s.classList.remove('active'));
  alvo.classList.add('active');

  // Lazy load do iframe — só carrega quando a tela é mostrada pela primeira vez
  const iframe = alvo.querySelector('iframe');
  if (iframe && !iframe.src && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
  }

  APP.tela = nome;

  // Atualiza hash sem disparar o listener
  if (location.hash.slice(1) !== nome) {
    history.replaceState(null, '', '#' + nome);
  }

  // Marca item ativo no painel de dev
  document.querySelectorAll('.dev-item').forEach(it => {
    it.classList.toggle('active', it.getAttribute('data-go') === nome);
  });
}

/* ═══════════════════════════════════════════════════════════════════
   DEV PANEL
   ═══════════════════════════════════════════════════════════════════ */

function montarDevPanel() {
  const list = document.getElementById('devList');
  let html = '';
  GRUPOS.forEach(g => {
    const telas = Array.from(document.querySelectorAll(`.screen[data-group="${g.id}"]`));
    if (!telas.length) return;
    html += `<div class="dev-group">${g.nome} · ${telas.length}</div>`;
    telas.forEach(t => {
      const nome = t.getAttribute('data-screen');
      const titulo = t.getAttribute('data-title') || nome;
      const num = t.getAttribute('data-num') || '··';
      html += `<button class="dev-item" data-go="${nome}" onclick="irPara('${nome}'); toggleDev();">
        <span class="dev-item-num">${num}</span>
        <span>${titulo}</span>
      </button>`;
    });
  });
  list.innerHTML = html;
}

function toggleDev() {
  document.getElementById('devPanel').classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════════════════
   INIT + HASH ROUTING + ATALHOS
   ═══════════════════════════════════════════════════════════════════ */

window.addEventListener('hashchange', () => {
  const alvo = location.hash.slice(1);
  if (alvo && document.querySelector(`.screen[data-screen="${alvo}"]`)) {
    irPara(alvo);
  }
});

window.addEventListener('keydown', (e) => {
  const ativo = document.activeElement;
  const dentroDeInput = ativo && ['INPUT','TEXTAREA','SELECT'].includes(ativo.tagName);
  if (dentroDeInput) return;
  if (e.key.toLowerCase() === 'd') toggleDev();
});

document.addEventListener('DOMContentLoaded', () => {
  montarDevPanel();
  const inicial = location.hash.slice(1) || TELA_INICIAL;
  irPara(inicial);
});
</script>
</body>
</html>
