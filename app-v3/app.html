  }

<script>
/* ═══════════════════════════════════════════════════════════════════
   ESTADO + NAVEGAÇÃO
   ═══════════════════════════════════════════════════════════════════ */

const APP = {
  tela: null,
};

const TELA_INICIAL = 'splash';

const GRUPOS = [
  { id: 'onboarding', nome: 'Entrada + cadastro/login' },
  { id: 'abas',       nome: 'Abas principais (Saúde · Exames · QR · Consultas)' },
  { id: 'filhas',     nome: 'Telas filhas (perfil, meds, alergias, detalhes)' },
  { id: 'publico',    nome: 'RG público (visão do médico ao escanear)' },
  { id: 'vazios',     nome: 'Estados vazios' },
  { id: 'estados',    nome: 'Loading + Erro' },
];

function irPara(nome) {
  const alvo = document.querySelector(`.screen[data-screen="${nome}"]`);
  if (!alvo) { console.warn('Tela não existe:', nome); return; }

  // Esconde a atual, mostra a alvo
  document.querySelectorAll('.screen.active').forEach(s => s.classList.remove('active'));
  alvo.classList.add('active');

  // Lazy load do iframe — só carrega quando a tela é mostrada pela primeira vez
  const iframe = alvo.querySelector('iframe');
  if (iframe && !iframe.src && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
  }

  APP.tela = nome;

  // Atualiza hash sem disparar o listener
  if (location.hash.slice(1) !== nome) {
    history.replaceState(null, '', '#' + nome);
  }

}

/* ═══════════════════════════════════════════════════════════════════
   INIT + HASH ROUTING
   ═══════════════════════════════════════════════════════════════════ */

window.addEventListener('hashchange', () => {
  const alvo = location.hash.slice(1);
  if (alvo && document.querySelector(`.screen[data-screen="${alvo}"]`)) {
    irPara(alvo);
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const inicial = location.hash.slice(1) || TELA_INICIAL;
  irPara(inicial);
});
</script>
