<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Detalhe da alergia</title>
<script src="api.js"></script>
<link rel="stylesheet" href="_core.css">
<style>
  .alergia-hero {
    margin: var(--s2) var(--s5) var(--s5);
    background: var(--surface);
    border: var(--border);
    border-left: 4px solid var(--bad);
    border-radius: var(--r-md);
    padding: var(--s5);
    box-shadow: var(--sh);
  }
  .alergia-hero-top {
    display: flex;
    align-items: center;
    gap: var(--s3);
    margin-bottom: var(--s3);
  }
  .alergia-hero-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--bad-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .alergia-hero-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--bad); stroke-width: 2; }
  .alergia-hero-info { flex: 1; }
  .alergia-hero-name { font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 2px; }
  .alergia-hero-sev { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: var(--bad-bg); color: var(--bad); border-radius: 100px; font-size: 11px; font-weight: 700; }
  .alergia-hero-sev .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .alergia-hero-desc { font-size: 13px; color: var(--ink2); line-height: 1.5; padding-top: var(--s3); border-top: 1px solid rgba(0,0,0,0.05); }

  .info-block { background: var(--surface); border: var(--border); border-radius: var(--r-md); margin: 0 var(--s5) var(--s3); box-shadow: var(--sh); overflow: hidden; }
  .info-row-detail { display: flex; align-items: center; padding: var(--s3) var(--s4); border-bottom: 1px solid rgba(0,0,0,0.05); }
  .info-row-detail:last-child { border-bottom: none; }
  .info-row-label { font-size: 11px; color: var(--ink3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; width: 110px; }
  .info-row-value { font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; }

  .related-list {
    padding: var(--s3) var(--s4);
    display: flex;
    flex-direction: column;
    gap: var(--s2);
  }
  .related-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg-alt);
    border-radius: 10px;
    font-size: 12px;
  }
  .related-item-name { font-weight: 700; color: var(--ink); }
  .related-item-warn { font-size: 10px; color: var(--bad); font-weight: 700; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><span>9:41</span><span class="right"><svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="1" y="1" width="20" height="9" rx="2" stroke="currentColor" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="17" height="6" rx="1" fill="currentColor"/></svg></span></div>
  <div class="header">
    <a href="06-alergias.html" class="header-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-title">Detalhes</div>
    <div class="header-actions">
      <button class="header-icon-btn" id="btnRemover" onclick="removerAlergia()" aria-label="Remover" style="display:none">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </div>
  </div>

  <div class="content no-tab" id="conteudo">
    <div class="alergia-hero anim anim-d1" id="heroBox">
      <div class="alergia-hero-top">
        <div class="alergia-hero-icon" id="heroIcon">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="alergia-hero-info">
          <div class="alergia-hero-name" id="alNome">&nbsp;</div>
          <span class="alergia-hero-sev" id="alGravidade"><span class="dot"></span>&nbsp;</span>
        </div>
      </div>
      <div class="alergia-hero-desc" id="alDesc" style="display:none"></div>
    </div>

    <div id="quandoDescobri" style="display:none">
      <div class="section-label anim anim-d2">Quando descobri</div>
      <div class="info-block anim anim-d2" id="quandoBlock"></div>
    </div>

    <div id="evitarTambem" style="display:none">
      <div class="section-label anim anim-d3" style="color: var(--bad)">Evitar também (reação cruzada)</div>
      <div class="info-block anim anim-d3">
        <div class="related-list" id="relatedList"></div>
      </div>
    </div>

    <div class="card tight anim anim-d4" style="background: var(--ok-bg); border: var(--border-green);">
      <div style="display: flex; gap: var(--s3); align-items: flex-start;">
        <div style="color: var(--green2); flex-shrink: 0; padding-top: 2px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div>
          <div style="font-size: 12px; font-weight: 800; color: var(--green2); margin-bottom: 2px;">Visível no QR de emergência</div>
          <div style="font-size: 11px; color: var(--ink2); line-height: 1.4;">
            Qualquer médico que escanear seu QR vai ver essa alergia destacada.
          </div>
        </div>
      </div>
    </div>

    <div style="height: 40px"></div>
  </div>
</div>

<script>
  function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function fmtData(d){if(!d)return null;const x=new Date(d);if(isNaN(x.getTime()))return null;const M=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];return `${x.getDate()} de ${M[x.getMonth()]} de ${x.getFullYear()}`;}

  let ALERGIA_ATUAL = null;
  const ID = new URLSearchParams(location.search).get('id');

  function infoRow(label, value){
    return `<div class="info-row-detail"><div class="info-row-label">${escapeHtml(label)}</div><div class="info-row-value">${escapeHtml(value)}</div></div>`;
  }

  function render(a){
    ALERGIA_ATUAL = a;
    document.getElementById('btnRemover').style.display = '';
    document.getElementById('alNome').textContent = a.nome || '—';

    // Reação em destaque (onde antes ficava a gravidade). Cor de alerta vermelha fixa (CSS).
    const sev = document.getElementById('alGravidade');
    if (a.reacao) {
      sev.innerHTML = `<span class="dot"></span>Reação: ${escapeHtml(a.reacao)}`;
    } else {
      sev.style.display = 'none';
    }

    if (a.observacao || a.descricao) {
      document.getElementById('alDesc').style.display = '';
      document.getElementById('alDesc').textContent = a.observacao || a.descricao;
    }

    // Bloco "Quando descobri"
    const linhas = [];
    const dataDx = fmtData(a.dataDiagnostico);
    if (dataDx) linhas.push(infoRow('Data', dataDx));
    if (a.medicoDiagnostico) linhas.push(infoRow('Diagnosticada por', a.medicoDiagnostico));
    if (a.tipo) {
      const tipos = { 'MEDICAMENTO':'Medicamento', 'ALIMENTO':'Alimento', 'CONTATO':'Contato', 'AMBIENTAL':'Ambiental', 'OUTRO':'Outro' };
      linhas.push(infoRow('Tipo', tipos[a.tipo] || a.tipo));
    }
    if (linhas.length) {
      document.getElementById('quandoDescobri').style.display = '';
      document.getElementById('quandoBlock').innerHTML = linhas.join('');
    }
  }

  async function carregarRelacionados(nome){
    if (!nome) return;
    try {
      const r = await vitaeAPI.infoAlergia(nome);
      const sinonimos = r.sinonimos || r.relacionados || r.evitar || [];
      if (Array.isArray(sinonimos) && sinonimos.length > 0) {
        document.getElementById('evitarTambem').style.display = '';
        document.getElementById('relatedList').innerHTML = sinonimos.slice(0,8).map(s => {
          const sNome = typeof s === 'string' ? s : (s.nome || s.label || '');
          const motivo = typeof s === 'string' ? 'MESMA CLASSE' : (s.motivo || s.razao || 'MESMA CLASSE');
          return `<div class="related-item">
            <span class="related-item-name">${escapeHtml(sNome)}</span>
            <span class="related-item-warn">${escapeHtml(motivo).toUpperCase()}</span>
          </div>`;
        }).join('');
      }
    } catch (e) {
      // info CMED nao retornou nada — nao mostra bloco
      console.warn('[07-alergia-detalhe] info CMED indisponivel', e.message);
    }
  }

  async function iniciar(){
    if (!ID) {
      document.getElementById('conteudo').innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink3)">Alergia não encontrada. <a href="06-alergias.html" style="color:var(--green2);font-weight:700">Voltar</a></div>';
      return;
    }
    try {
      const r = await vitaeAPI.listarAlergias();
      const lista = r.alergias || r || [];
      const a = lista.find(x => x.id === ID);
      if (!a) {
        document.getElementById('conteudo').innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink3)">Alergia não encontrada. <a href="06-alergias.html" style="color:var(--green2);font-weight:700">Voltar</a></div>';
        return;
      }
      render(a);
      carregarRelacionados(a.nome);
    } catch (e) {
      console.error('[07-alergia-detalhe] erro', e);
      document.getElementById('conteudo').innerHTML = '<div style="padding:40px;text-align:center;color:var(--bad)">Sem conexão. <a href="javascript:location.reload()" style="color:var(--green2);font-weight:700">Tentar de novo</a></div>';
    }
  }

  async function removerAlergia(){
    if (!ALERGIA_ATUAL) return;
    if (!confirm(`Remover ${ALERGIA_ATUAL.nome} das suas alergias?`)) return;
    try {
      await vitaeAPI.removerAlergia(ALERGIA_ATUAL.id);
      window.location = '06-alergias.html';
    } catch (e) { alert('Erro: ' + (e.message || 'tente de novo')); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciar);
  else iniciar();
</script>
  <!-- Tab bar removida — tela de detalhe usa botão voltar do header -->

</body>
</html>
