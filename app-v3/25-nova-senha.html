<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Nova senha</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00E5A0;
    --green2: #00C47A;
    --cyan: #00B4D8;
    --ink: #0D0F14;
    --ink2: #4B5563;
    --ink3: #6B7280;
    --ink4: #9CA3AF;
    --ink5: #C4C9D4;
    --bg: #F4F6FA;
    --surface: #FFFFFF;
    --warn: #F59E0B;
    --bad: #EF4444;
    --grad: linear-gradient(120deg, #00E5A0, #00B4D8);
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #0D0F14;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--ink);
  }
  .phone {
    width: 393px;
    max-width: 100vw;
    height: 852px;
    max-height: 100vh;
    background: var(--bg);
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1a1d24, 0 40px 120px rgba(0,0,0,0.4);
  }
  .notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 30;
  }
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    z-index: 20;
  }

  .header {
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.07);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
  }
  .back-btn svg { width: 18px; height: 18px; stroke: var(--ink); fill: none; stroke-width: 2; }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.2px;
  }

  .content {
    position: absolute;
    top: 110px;
    left: 0; right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 4px 22px 30px;
  }

  .icon-block {
    width: 76px; height: 76px;
    margin: 14px auto 18px;
    border-radius: 22px;
    background: linear-gradient(135deg, #0D0F14, #1A2E2C);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 30px rgba(13,15,20,0.18);
    position: relative;
  }
  .icon-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--green), var(--cyan), transparent);
    border-radius: 22px 22px 0 0;
  }
  .icon-block svg {
    width: 30px; height: 30px;
    stroke: var(--green);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.6px;
    line-height: 1.15;
    color: var(--ink);
    text-align: center;
    margin-bottom: 6px;
  }
  .title em {
    font-style: italic;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub {
    font-size: 13px;
    color: var(--ink3);
    line-height: 1.5;
    text-align: center;
    max-width: 280px;
    margin: 0 auto 22px;
  }

  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink4);
    pointer-events: none;
  }
  .field-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .field input {
    width: 100%;
    padding: 13px 44px 13px 44px;
    background: var(--surface);
    border: 1.5px solid rgba(0,0,0,0.08);
    border-radius: 13px;
    font-size: 14.5px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: all 0.15s;
  }
  .field input::placeholder { color: var(--ink4); }
  .field input:focus {
    border-color: rgba(0,229,160,0.45);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.10);
  }
  .field-wrap:focus-within .field-icon { color: var(--green); }

  .toggle-eye {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--ink4);
    cursor: pointer;
    padding: 4px;
    display: flex;
  }
  .toggle-eye svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; }

  .strength {
    margin-top: 9px;
    display: flex;
    gap: 4px;
  }
  .bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(0,0,0,0.08);
    transition: background 0.25s;
  }
  .bar.on-low { background: var(--bad); }
  .bar.on-mid { background: var(--warn); }
  .bar.on-high { background: var(--green2); }
  .strength-row {
    margin-top: 7px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--ink3);
    font-weight: 600;
  }
  .strength-status { font-weight: 800; }
  .strength-status.low { color: var(--bad); }
  .strength-status.mid { color: var(--warn); }
  .strength-status.high { color: var(--green2); }

  .rules {
    margin-top: 16px;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
  }
  .rule {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--ink3);
    transition: color 0.15s;
  }
  .rule.ok { color: var(--green2); }
  .rule-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--ink5);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .rule.ok .rule-check {
    background: var(--green2);
    border-color: var(--green2);
  }
  .rule-check svg {
    width: 11px; height: 11px;
    stroke: #fff;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .rule.ok .rule-check svg { opacity: 1; }

  .btn-primary {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    background: var(--grad);
    border: none;
    border-radius: 14px;
    font-size: 14.5px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 8px 24px rgba(0,229,160,0.32);
    transition: all 0.15s;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }

  @media(max-width:480px) {
    body { padding: 0; background: var(--bg); }
    .phone {
      width: 100vw;
      max-width: 100vw;
      height: 100vh;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
    }
    .notch, .status-bar { display: none; }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><span>9:41</span><span></span></div>

  <div class="header">
    <a href="24-esqueci-senha.html" class="back-btn">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-title">Nova senha</div>
  </div>

  <div class="content">
    <div class="icon-block">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h1 class="title">Crie uma senha <em>forte</em></h1>
    <p class="sub">Use letras, números e um símbolo. Mínimo 8 caracteres.</p>

    <div class="field">
      <label class="field-label">Nova senha</label>
      <div class="field-wrap">
        <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="updateStrength()">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <button class="toggle-eye" type="button" onclick="toggle('pw1')">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength">
        <div class="bar" id="b1"></div>
        <div class="bar" id="b2"></div>
        <div class="bar" id="b3"></div>
        <div class="bar" id="b4"></div>
      </div>
      <div class="strength-row">
        <span>Força da senha</span>
        <span class="strength-status" id="status">—</span>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Confirmar senha</label>
      <div class="field-wrap">
        <input type="password" id="pw2" placeholder="Repita a senha" autocomplete="new-password">
        <span class="field-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <button class="toggle-eye" type="button" onclick="toggle('pw2')">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="rules">
      <div class="rule" id="r1"><div class="rule-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>Mínimo 8 caracteres</div>
      <div class="rule" id="r2"><div class="rule-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>Letra maiúscula e minúscula</div>
      <div class="rule" id="r3"><div class="rule-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>Pelo menos um número</div>
      <div class="rule" id="r4"><div class="rule-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>Um símbolo (! @ # $ &)</div>
    </div>

    <button class="btn-primary" onclick="window.location='23-login.html'">Salvar nova senha</button>
  </div>
</div>

<script>
  function toggle(id) {
    const i = document.getElementById(id);
    i.type = i.type === 'password' ? 'text' : 'password';
  }
  function updateStrength() {
    const v = document.getElementById('pw1').value;
    const r1 = v.length >= 8;
    const r2 = /[a-z]/.test(v) && /[A-Z]/.test(v);
    const r3 = /\d/.test(v);
    const r4 = /[!@#$&%*+\-_=?]/.test(v);

    document.getElementById('r1').classList.toggle('ok', r1);
    document.getElementById('r2').classList.toggle('ok', r2);
    document.getElementById('r3').classList.toggle('ok', r3);
    document.getElementById('r4').classList.toggle('ok', r4);

    const score = [r1, r2, r3, r4].filter(Boolean).length;
    const bars = ['b1', 'b2', 'b3', 'b4'].map(id => document.getElementById(id));
    bars.forEach((b, i) => {
      b.className = 'bar';
      if (i < score) {
        if (score === 1) b.classList.add('on-low');
        else if (score <= 2) b.classList.add('on-mid');
        else b.classList.add('on-high');
      }
    });

    const status = document.getElementById('status');
    if (score === 0) { status.textContent = '—'; status.className = 'strength-status'; }
    else if (score === 1) { status.textContent = 'Fraca'; status.className = 'strength-status low'; }
    else if (score <= 2) { status.textContent = 'Média'; status.className = 'strength-status mid'; }
    else { status.textContent = 'Forte'; status.className = 'strength-status high'; }
  }
</script>
</body>
</html>
