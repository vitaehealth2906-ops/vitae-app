<style>
  .empty-state-full {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px var(--s5) 32px;
    text-align: center;
  }
  .empty-illus {
    width: 140px; height: 140px;
    margin-bottom: 22px;
    position: relative;
  }
  .empty-illus::before {
    content: '';
    position: absolute;
    inset: 20px;
    background: var(--grad);
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.15;
  }
  .empty-illus svg { width: 100%; height: 100%; position: relative; z-index: 2; }
  .empty-h-title {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 10px;
    max-width: 290px;
  }
  .empty-h-title em { font-style: italic; color: var(--green); }
  .empty-h-text {
    font-size: 13.5px;
    color: var(--ink3);
    line-height: 1.5;
    max-width: 280px;
    margin-bottom: 24px;
  }
  .empty-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 300px;
  }
  .btn-primary-empty {
    padding: 14px 28px;
    background: var(--grad);
    border: none;
    border-radius: 14px;
    font-size: 14.5px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,229,160,0.32);
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary-empty svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .btn-secondary-empty {
    padding: 13px 28px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.10);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-secondary-empty svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

  .info-strip {
    margin: 32px var(--s5) 20px;
    padding: 14px 16px;
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.18);
    border-radius: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .info-strip svg { width: 16px; height: 16px; stroke: #1E40AF; fill: none; stroke-width: 2; flex-shrink: 0; margin-top: 2px; }
  .info-strip-text {
    font-size: 12px;
    color: var(--ink2);
    line-height: 1.5;
  }
  .info-strip-text strong { color: var(--ink); font-weight: 700; }
</style>
