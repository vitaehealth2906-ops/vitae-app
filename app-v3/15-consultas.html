<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Consultas</title>
<script src="api.js"></script>
<link rel="stylesheet" href="_core.css">
<style>
  /* ============================================
     CONSULTAS — linguagem visual app médico vita id
     Linhas gradient verde→ciano, avatares gradiente,
     insight-cards border-left, section labels uppercase
     ============================================ */

  body { background: #F4F6FA; }
  .phone { background: #F4F6FA; }

  /* Header */
  .ph {
    padding: 22px var(--s5) 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .ph-greeting { font-size: 12px; color: var(--ink3); font-weight: 500; margin-bottom: 2px; }
  .ph-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.6px;
    line-height: 1.1;
  }
  .ph-title em { font-style: italic; color: var(--green); font-weight: 900; }
  .ph-action {
    width: 38px; height: 38px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .ph-action svg { width: 15px; height: 15px; stroke: var(--ink2); fill: none; stroke-width: 2; }

  /* Section label — padrão app médico */
  .section-lbl {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink3);
    margin: 0 var(--s5) 12px;
  }

  /* === Pendente — insight-card style com border-left === */
  .insight {
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-left: 4px solid var(--warn);
    border-radius: 10px;
    margin: 0 var(--s5) 28px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    cursor: pointer;
    box-shadow: 0 1px 12px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
  }
  .insight::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--warn), rgba(245,158,11,0.3), transparent);
  }
  .insight-ic {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(245,158,11,0.10);
    color: var(--warn);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .insight-ic svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; }
  .insight-body { flex: 1; min-width: 0; }
  .insight-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 3px; letter-spacing: -0.1px; }
  .insight-msg { font-size: 12.5px; color: var(--ink3); line-height: 1.45; }
  .insight-action {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 700;
    color: var(--warn);
  }
  .insight-action svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* === Próxima consulta — premium card com gradient strip top + dark header === */
  .next {
    margin: 0 var(--s5) 32px;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 12px rgba(0,0,0,0.07);
    cursor: pointer;
    position: relative;
  }
  .next::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--green), var(--cyan), transparent);
    z-index: 5;
  }
  .next-top {
    padding: 20px 20px 16px;
    background: linear-gradient(180deg, rgba(0,229,160,0.04), transparent);
  }
  .next-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(0,196,122,0.1);
    color: #00764A;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .next-status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green2);
    box-shadow: 0 0 0 2px rgba(0,196,122,0.2);
    animation: pulse 2s infinite;
  }
  .next-doctor-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .next-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--grad);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: -0.3px;
    box-shadow: 0 4px 16px rgba(0,229,160,0.28);
  }
  .next-doctor { flex: 1; min-width: 0; }
  .next-doctor-name {
    font-size: 17px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .next-doctor-spec { font-size: 12.5px; color: var(--ink3); font-weight: 500; }
  .next-datebadge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    background: rgba(0,196,122,0.1);
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 700;
    color: #00764A;
  }
  .next-datebadge svg { width: 14px; height: 14px; stroke: var(--green2); fill: none; stroke-width: 2; }

  .next-bot {
    padding: 13px 20px;
    background: #FAFBFC;
    border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: space-between;
  }
  .next-loc {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--ink2);
  }
  .next-loc svg { width: 13px; height: 13px; stroke: var(--ink3); fill: none; stroke-width: 2; flex-shrink: 0; }
  .next-cd {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.04em;
  }

  /* === Histórico — cards com avatar gradiente + ações inline === */
  .h-card {
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 12px;
    margin: 0 var(--s5) 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 1px 12px rgba(0,0,0,0.05);
    position: relative;
    transition: all 0.2s var(--ease);
  }
  .h-card:active { transform: scale(0.99); }
  .h-card.has-retorno::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--green), var(--cyan), transparent);
    border-radius: 12px 12px 0 0;
  }
  .h-av {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--grad);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: -0.3px;
  }
  .h-body { flex: 1; min-width: 0; }
  .h-name {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.1px;
    margin-bottom: 3px;
  }
  .h-meta {
    font-size: 11.5px;
    color: var(--ink3);
    font-weight: 500;
  }
  .h-tags { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .h-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
  }
  .h-chip.ok {
    background: rgba(0,196,122,0.10);
    color: #00764A;
  }
  .h-chip.ok .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green2); }
  .h-chip.attach {
    background: rgba(59,130,246,0.08);
    color: #1E40AF;
  }
  .h-chip.attach svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }
  .h-chip.retorno {
    background: rgba(245,158,11,0.10);
    color: var(--warn);
  }
  .h-chip.retorno .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--warn); animation: pulse 2s infinite; }

  .h-chev { color: var(--ink5); flex-shrink: 0; align-self: center; }
  .h-chev svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><span>9:41</span><span class="right"><svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="1" y="1" width="20" height="9" rx="2" stroke="currentColor" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="17" height="6" rx="1" fill="currentColor"/></svg></span></div>

  <div class="content" style="top: 50px; background: #F4F6FA;">

    <!-- Header -->
    <div class="ph anim anim-d1">
      <div>
        <div class="ph-greeting" id="consultasGreeting">&nbsp;</div>
        <div class="ph-title">Suas <em>consultas</em></div>
      </div>
    </div>

    <div id="proximaSection" style="display:none">
      <div class="section-lbl anim anim-d3">Próxima consulta</div>
      <div id="proximaContainer" class="anim anim-d3"></div>
    </div>

    <div id="historicoSection" style="display:none">
      <div class="section-lbl anim anim-d4">Histórico clínico</div>
      <div id="historicoContainer"></div>
    </div>

    <div id="vazioSection" style="display:none">
      <div style="margin:40px var(--s5); padding:32px var(--s4); text-align:center; background:var(--surface); border:var(--border); border-radius:var(--r-md);">
        <div style="font-size:15px;font-weight:800;color:var(--ink);margin-bottom:8px">Nenhuma consulta ainda</div>
        <div style="font-size:13px;color:var(--ink3);line-height:1.5">Quando você for atendido por um médico que usa vita id, sua consulta aparece aqui.</div>
      </div>
    </div>

    <div style="height: 100px"></div>
  </div>

<script>
  function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

  const DIAS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  function iniciais(nome){
    if (!nome) return '?';
    return nome.trim().split(/\s+/).slice(0,2).map(s => s[0]).join('').toUpperCase();
  }

  function formatDataHora(dataIso){
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '—';
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    return `${DIAS[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} · ${hh}h${mm !== '00' ? mm : ''}`;
  }

  function formatDataCurta(dataIso){
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '—';
    return `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
  }

  function diasAte(dataIso){
    const d = new Date(dataIso);
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diff = Math.round((d - hoje) / (1000*60*60*24));
    if (diff < 0) return 'PASSOU';
    if (diff === 0) return 'HOJE';
    if (diff === 1) return 'AMANHÃ';
    if (diff < 7) return `EM ${diff} DIAS`;
    if (diff < 30) return `EM ${Math.round(diff/7)} SEMANAS`;
    return `EM ${Math.round(diff/30)} ${Math.round(diff/30)===1?'MÊS':'MESES'}`;
  }

  function renderProxima(ag){
    const medicoNome = ag.medico || ag.titulo || 'Médico';
    const spec = ag.especialidade || ag.tipo || '';
    const local = ag.local || '';
    const cd = ag.dataHora ? diasAte(ag.dataHora) : '';
    return `<div class="next" onclick="window.location='16-consulta-detalhe.html?id=${encodeURIComponent(ag.id)}'">
      <div class="next-top">
        <div class="next-doctor-row" style="margin-top: 4px;">
          <div class="next-avatar">${iniciais(medicoNome)}</div>
          <div class="next-doctor">
            <div class="next-doctor-name">${escapeHtml(medicoNome)}</div>
            ${spec ? `<div class="next-doctor-spec">${escapeHtml(spec)}</div>` : ''}
          </div>
        </div>
        ${ag.dataHora ? `<div class="next-datebadge">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDataHora(ag.dataHora)}
        </div>` : ''}
      </div>
      ${(local || cd) ? `<div class="next-bot">
        ${local ? `<div class="next-loc">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${escapeHtml(local)}
        </div>` : '<span></span>'}
        ${cd ? `<span class="next-cd">${cd}</span>` : ''}
      </div>` : ''}
    </div>`;
  }

  function renderHistoricoCard(ag, i){
    const medicoNome = ag.medico || ag.titulo || 'Consulta';
    const spec = ag.especialidade || ag.tipo || '';
    const dataStr = ag.dataHora ? formatDataCurta(ag.dataHora) : '';
    const meta = [spec, dataStr].filter(Boolean).join(' · ');
    return `<div class="h-card anim anim-d${Math.min(6, 4+i)}" onclick="window.location='16-consulta-detalhe.html?id=${encodeURIComponent(ag.id)}'">
      <div class="h-av">${iniciais(medicoNome)}</div>
      <div class="h-body">
        <div class="h-name">${escapeHtml(medicoNome)}</div>
        ${meta ? `<div class="h-meta">${escapeHtml(meta)}</div>` : ''}
      </div>
      <div class="h-chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  }

  async function iniciar(){
    // greeting com nome real do localStorage
    try {
      const u = JSON.parse(localStorage.getItem('vitae_usuario')||'{}');
      const primeiro = (u.nome||'').split(' ')[0];
      document.getElementById('consultasGreeting').textContent = primeiro ? `Olá, ${primeiro}` : 'Olá';
    } catch(_){}

    try {
      const r = await vitaeAPI.listarAgendamentos();
      const lista = r.agendamentos || r || [];
      if (!Array.isArray(lista) || lista.length === 0) {
        document.getElementById('vazioSection').style.display = '';
        return;
      }

      const agora = new Date();
      const futuros = lista.filter(a => a.dataHora && new Date(a.dataHora) >= agora).sort((a,b) => new Date(a.dataHora) - new Date(b.dataHora));
      const passados = lista.filter(a => !a.dataHora || new Date(a.dataHora) < agora).sort((a,b) => new Date(b.dataHora||0) - new Date(a.dataHora||0));

      if (futuros.length) {
        document.getElementById('proximaSection').style.display = '';
        document.getElementById('proximaContainer').innerHTML = renderProxima(futuros[0]);
      }

      if (passados.length) {
        document.getElementById('historicoSection').style.display = '';
        document.getElementById('historicoContainer').innerHTML = passados.map(renderHistoricoCard).join('');
      }

      if (futuros.length === 0 && passados.length === 0) {
        document.getElementById('vazioSection').style.display = '';
      }
    } catch (e) {
      console.error('[15-consultas] erro', e);
      document.getElementById('vazioSection').style.display = '';
      document.querySelector('#vazioSection div div').textContent = 'Sem conexão';
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciar);
  else iniciar();
</script>

    <div class="tab" onclick="window.location.href='01-saude.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg>
      <span style="font-size:10px;font-weight:600;color:#9CA3AF;">Meu RG</span>
    </div>
    <div class="tab" onclick="window.location.href='09-exames-lista.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span style="font-size:10px;font-weight:600;color:#9CA3AF;">Exames</span>
    </div>
    <div class="tab" onclick="window.location.href='12-qr-code.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>
      <span style="font-size:10px;font-weight:600;color:#9CA3AF;">QR Code</span>
    </div>
    <div class="tab active" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span style="font-size:10px;font-weight:700;color:#00E5A0;">Consultas</span>
    </div>
  </div>
</div>
