<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RG da Saúde — 9 variações · vita id</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800;900&family=Fraunces:opsz,wght,ital@9..144,200..900,0..1&family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   TOKENS
   =========================================================== */
:root{
  --green:#00E5A0;
  --cyan:#00B4D8;
  --grad:linear-gradient(120deg,#00E5A0 0%,#00B4D8 100%);
  --ink:#0A0A0B;
  --paper:#FAFAF8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0B0B0C;color:#E8E5DF;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
img,svg{display:block}
.page{max-width:1280px;margin:0 auto;padding:80px 32px 120px;position:relative;z-index:1}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(circle at 20% 10%, rgba(0,229,160,0.035), transparent 40%),
  radial-gradient(circle at 80% 90%, rgba(0,180,216,0.035), transparent 40%);
  pointer-events:none;z-index:0}

/* ===========================================================
   HERO
   =========================================================== */
.hero{padding:32px 0 96px;max-width:880px}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.4em;text-transform:uppercase;color:#6c6862;margin-bottom:28px}
.hero-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:200;font-size:clamp(44px,7vw,88px);line-height:0.98;letter-spacing:-0.045em;color:#F4F1EB}
.hero-title strong{font-weight:800}
.hero-title em{font-style:italic;font-weight:300;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:0.08em}
.hero-sub{margin-top:32px;font-size:17px;line-height:1.6;color:#9c9588;max-width:540px;font-weight:300}
.hero-grad-rule{width:80px;height:2px;background:var(--grad);margin-top:48px;border-radius:2px}

/* ===========================================================
   SECTION
   =========================================================== */
.section{padding:72px 0;border-top:1px solid #1a1a1c}
.section:first-of-type{border-top:none}
.section-head{display:grid;grid-template-columns:auto 1fr auto;align-items:end;gap:32px;margin-bottom:56px;padding:0 4px}
.sec-no{font-family:'Plus Jakarta Sans',sans-serif;font-weight:200;font-size:84px;line-height:0.85;color:#2a2a2c;letter-spacing:-0.04em}
.sec-mid{display:flex;flex-direction:column;gap:8px;padding-bottom:4px}
.sec-tag{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;font-weight:700;color:#6c6862}
.sec-concept{font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:30px;color:#F4F1EB;letter-spacing:-0.02em;line-height:1.05}
.sec-concept em{font-style:italic;font-weight:300;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:0.08em}
.sec-meta{align-self:end;padding-bottom:8px;text-align:right;font-size:11px;color:#7a7569;line-height:1.6;max-width:220px;font-weight:400}
.card-stage{display:flex;justify-content:center;align-items:center;min-height:360px}

/* ===========================================================
   COMMON CARD
   =========================================================== */
.card{width:520px;height:325px;border-radius:20px;position:relative;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;box-shadow:0 50px 80px -30px rgba(0,0,0,0.6),0 20px 40px -20px rgba(0,0,0,0.4)}
.card *{position:relative}
@media (max-width:600px){.card{width:340px;height:213px;border-radius:14px}}

/* ===========================================================
   QR — universal styles (small, discrete)
   =========================================================== */
.qr{display:block;shape-rendering:crispEdges;image-rendering:pixelated;background:transparent}
.qr rect{shape-rendering:crispEdges}

/* QR container default */
.qr-frame{display:flex;align-items:center;justify-content:center;padding:6px;border-radius:8px}
.qr-frame .qr{width:64px;height:64px}
.qr-frame.qr-on-black{background:#fff;color:#0A0A0B}
.qr-frame.qr-on-black .qr{--card-bg:#fff}
.qr-frame.qr-on-white{background:#0A0A0B;color:#fff}
.qr-frame.qr-on-white .qr{--card-bg:#0A0A0B}

/* ===========================================================
   BRAND wordmark (consistent across cards)
   =========================================================== */
.brand{font-size:14px;font-weight:300;letter-spacing:0.04em;line-height:1;display:inline-flex;align-items:baseline;gap:1px}
.brand strong{font-weight:700;letter-spacing:-0.01em}
.brand em{font-style:italic;font-weight:300;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:0.14em;display:inline-block}
.brand-l{color:#0A0A0B}
.brand-d{color:#fff}

/* ===========================================================
   01 — ÔNIX (preto monolítico)
   =========================================================== */
.c-onix{background:#0A0A0B;color:#fff}
.c-onix::after{content:'';position:absolute;left:36px;width:48px;height:1.5px;bottom:36px;background:var(--grad);border-radius:2px}
.onix-brand{position:absolute;top:34px;left:36px}
.onix-name-block{position:absolute;left:36px;bottom:62px;max-width:62%}
.onix-l{font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#5a5a5e;font-weight:600;margin-bottom:10px}
.onix-name{font-size:36px;font-weight:300;letter-spacing:-0.028em;color:#fff;line-height:0.95}
.onix-name em{font-style:normal;font-weight:700}
.onix-id{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#7a7a7e;font-weight:400}

/* ===========================================================
   02 — MARFIM (branco monolítico)
   =========================================================== */

.marfim-name-block{position:absolute;left:36px;bottom:62px;max-width:62%}
.marfim-l{font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#8e8d88;font-weight:600;margin-bottom:10px}

/* ===========================================================
   03 — TIPOGRAFIA (branco, nome arquitetura)

.tipo-brand{position:absolute;top:26px;left:32px;z-index:2}

/* ===========================================================

/* ===========================================================
   05 — MANUSCRITO (preto, Fraunces, QR direita)

.manu-wrap{padding:34px 36px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.manu-top{display:flex;justify-content:space-between;align-items:flex-start}
.manu-bottom-grad{position:absolute;bottom:0;left:36px;width:48px;height:1.5px;background:var(--grad);border-radius:2px}
.manu-name-block{margin-top:auto;padding-top:24px;padding-bottom:34px;max-width:62%}
.manu-l{font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#5a5a5e;font-weight:600;margin-bottom:10px}
.manu-name{font-family:'Fraunces',serif;font-weight:300;font-size:50px;letter-spacing:-0.025em;line-height:0.95;color:#fff}

.raio-meta-v{font-family:'Fraunces',serif;font-weight:400;font-size:22px;color:#0A0A0B;letter-spacing:-0.015em;margin-top:2px}
.raio-name-block{position:absolute;bottom:30px;left:32px;z-index:2;max-width:62%}
.raio-l{font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#8e8d88;font-weight:600;margin-bottom:8px}

.raio-name em{font-style:normal;font-weight:700}
.raio-id{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#8e8d88;font-weight:500}
.raio-qr{position:absolute;bottom:30px;right:32px;z-index:2}

/* ===========================================================
   08 — CONCHA (preto, radial sutil, QR com anel gradiente)
   =========================================================== */
.c-concha{background:#0A0A0B;color:#fff}
.c-concha::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, rgba(0,229,160,0.08) 0%, transparent 55%);pointer-events:none}
.concha-brand{position:absolute;top:30px;left:34px;z-index:2}
.concha-id{position:absolute;top:30px;right:34px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#7a7a7e;font-weight:500;text-align:right;z-index:2}
.concha-center{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:20px;z-index:2}
.concha-qr-shell{position:relative;padding:2px;border-radius:14px;background:var(--grad)}

.concha-qr svg{color:#fff;--card-bg:#0A0A0B;width:74px;height:74px}
.concha-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:300;letter-spacing:-0.02em;color:#fff;text-align:center;line-height:1}
.concha-name em{font-style:normal;font-weight:700}

/* ===========================================================
   09 — AURORA (branco hyper-minimal)
   =========================================================== */
.c-aurora{background:#FAFAF8;color:#0A0A0B}
.c-aurora::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse at 80% 0%, rgba(0,229,160,0.16), transparent 38%),
  radial-gradient(ellipse at 100% 100%, rgba(0,180,216,0.18), transparent 40%);
  pointer-events:none}
.aurora-brand{position:absolute;top:34px;left:36px;z-index:2}
.aurora-name-block{position:absolute;left:36px;bottom:36px;max-width:62%;z-index:2}
.aurora-l{font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#8e8d88;font-weight:600;margin-bottom:10px}
.aurora-name{font-size:38px;font-weight:200;letter-spacing:-0.03em;color:#0A0A0B;line-height:0.95}
.aurora-name em{font-style:italic;font-weight:400;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:0.08em;display:inline-block}
.aurora-id{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#8e8d88;font-weight:500}
.aurora-qr{position:absolute;top:30px;right:30px;z-index:2}

/* ===========================================================
   FOOTER
   =========================================================== */
.foot{margin-top:96px;padding:48px 0 0;border-top:1px solid #1a1a1c;text-align:center}
.foot-mark{font-weight:200;font-size:22px;color:#5a5a5e;letter-spacing:-0.01em}
.foot-mark em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:0.08em;font-weight:300}
.foot-line{font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:#5a5a5e;margin-top:14px;font-weight:600}

/* ===========================================================
   RESPONSIVE
   =========================================================== */
@media (max-width:760px){
  .page{padding:48px 16px 80px}
  .section-head{grid-template-columns:1fr;align-items:flex-start}
  .sec-no{font-size:56px}
  .sec-concept{font-size:22px}
  .sec-meta{text-align:left;max-width:none;padding-bottom:0}
  .tipo-name{font-size:60px}

</div>

<script>
// ---- QR-LIKE SVG generator (small, discrete) ----------------------------
function genQR(seed){
  const size = 25;
  let s = seed || 12345;
  function rand(){ s = (s*9301 + 49297) % 233280; return s/233280; }
  const cells = [];
  function inFinder(x,y){
    return (x<8&&y<8) || (x>16&&y<8) || (x<8&&y>16);
  }
  function inAlign(x,y){
    return x>=16 && x<=20 && y>=16 && y<=20;
  }
  for (let y=0;y<size;y++){
    for (let x=0;x<size;x++){
      if (inFinder(x,y)) continue;
      if (inAlign(x,y)) continue;
      if (x===6 || y===6) continue;
      if (rand() > 0.48) cells.push({x,y});
    }
  }
  // timing patterns
  for (let i=8;i<17;i++){
    if (i%2===0){ cells.push({x:i,y:6}); cells.push({x:6,y:i}); }
  }

  let parts = [];
  parts.push('<svg class="qr" viewBox="0 0 25 25" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">');
  parts.push('<g fill="currentColor">');
  const finders = [[0,0],[18,0],[0,18]];
  finders.forEach(([fx,fy])=>{
    parts.push(`<rect x="${fx}" y="${fy}" width="7" height="7"/>`);
  });
  parts.push('<rect x="16" y="16" width="5" height="5"/>');
  for (const c of cells){
    parts.push(`<rect x="${c.x}" y="${c.y}" width="1" height="1"/>`);
  }
  parts.push('</g>');
  parts.push('<g fill="var(--card-bg, #fff)">');
  finders.forEach(([fx,fy])=>{
    parts.push(`<rect x="${fx+1}" y="${fy+1}" width="5" height="5"/>`);
  });
  parts.push('<rect x="17" y="17" width="3" height="3"/>');
  parts.push('</g>');
  parts.push('<g fill="currentColor">');
  finders.forEach(([fx,fy])=>{
    parts.push(`<rect x="${fx+2}" y="${fy+2}" width="3" height="3"/>`);
  });
  parts.push('<rect x="18" y="18" width="1" height="1"/>');
  parts.push('</g>');
  parts.push('</svg>');
  return parts.join('');
}

const ID = 'VTA · 2026 · 04891';
const NAME_FIRST = 'Lucas';
const NAME_LAST = 'Borelli';

// QR frame for embedding (black bg or white bg)
function qrBox(seed, mode){
  // mode: 'on-black' = QR placed on black card → white box with black QR
  //       'on-white' = QR placed on white card → black box with white QR
  return `<div class="qr-frame qr-${mode}">${genQR(seed)}</div>`;
}

const sections = [
  { n:'01', tag:'ônix', concept:'preto monolítico', meta:'monolito · nome em hierarquia · QR pequeno',
    html: `<div class="card c-onix">
      <div class="onix-brand brand brand-d"><strong>vita</strong> <em>id</em></div>
      <div class="onix-qr">${qrBox(101,'on-black')}</div>
      <div class="onix-name-block">
        <div class="onix-l">titular</div>
        <div class="onix-name">${NAME_FIRST} <em>${NAME_LAST}</em></div>
        <div class="onix-id">${ID}</div>
      </div>
    </div>` },

  { n:'02', tag:'marfim', concept:'branco monolítico', meta:'irmã clara do ônix · contraste invertido',
    html: `<div class="card c-marfim">
      <div class="marfim-brand brand brand-l"><strong>vita</strong> <em>id</em></div>
      <div class="marfim-qr">${qrBox(202,'on-white')}</div>
