<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Medicamentos</title>
<script src="api.js"></script>
<link rel="stylesheet" href="_core.css">
<style>
  /* Calendário semanal */
  .week-calendar {
    display: flex;
    justify-content: space-between;
    padding: var(--s2) var(--s5) var(--s4);
    gap: 6px;
  }
  .day {
    flex: 1;
    aspect-ratio: 1 / 1.3;
    background: var(--surface);
    border: var(--border);
    border-radius: var(--r-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--s2) 0;
    cursor: pointer;
    transition: all var(--dur) var(--ease);
    position: relative;
  }
  .day-letter {
    font-size: 10px;
    font-weight: 700;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .day-num {
    font-size: 17px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
  }
  .day-status {
    margin-top: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink5);
  }
  .day.today {
    background: var(--ink);
    border-color: var(--ink);
  }
  .day.today .day-letter { color: rgba(255,255,255,0.6); }
  .day.today .day-num { color: #fff; }
  .day.complete .day-status { background: var(--green2); }
  .day.partial .day-status { background: var(--warn); }
  .day.missed .day-status { background: var(--bad); }
  .day.future { opacity: 0.5; }

  /* Med card detalhado */
  .med-card-detail {
    background: var(--surface);
    border: var(--border);
    border-radius: var(--r-md);
    padding: var(--s4);
    margin: 0 var(--s5) var(--s3);
    box-shadow: var(--sh);
    display: flex;
    gap: var(--s3);
    align-items: flex-start;
    cursor: pointer;
    transition: all var(--dur) var(--ease);
  }
  .med-card-detail:active { transform: scale(0.98); }
  .med-detail-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--ok-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .med-detail-icon svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: var(--green2);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .med-card-detail.warn .med-detail-icon { background: var(--warn-bg); }
  .med-card-detail.warn .med-detail-icon svg { stroke: var(--warn); }
  .med-detail-info { flex: 1; min-width: 0; }
  .med-detail-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .med-detail-meta {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: var(--s2);
  }
  .med-detail-time-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink2);
    font-weight: 600;
  }
  .med-detail-time-row .badge { padding: 2px 8px; font-size: 9px; }
  .med-detail-check {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--warn);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--dur) var(--ease);
    background: transparent;
    flex-shrink: 0;
  }
  .med-detail-check svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: transparent;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .med-detail-check.taken {
    background: var(--green2);
    border-color: var(--green2);
  }
  .med-detail-check.taken svg {
    stroke: #fff;
  }
  .med-detail-check.late {
    border-color: var(--warn);
    animation: pulse 2s infinite;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <span>9:41</span>
    <span class="right">
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="1" y="1" width="20" height="9" rx="2" stroke="currentColor" stroke-opacity=".35"/><rect x="2.5" y="2.5" width="17" height="6" rx="1" fill="currentColor"/></svg>
    </span>
  </div>

  <div class="header">
    <a href="01-saude.html" class="header-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-title">Medicamentos</div>
    <div class="header-actions">
      <button class="header-icon-btn" onclick="window.location='05-add-medicamento.html'" aria-label="Adicionar medicamento">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="content">
    <h1 class="page-title anim anim-d1">Seus <em>medicamentos</em></h1>
    <div class="page-subtitle anim anim-d1" id="medsSubtitle">&nbsp;</div>

    <!-- BUSCA -->
    <div class="search-wrap anim anim-d2">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="input" id="medsSearch" placeholder="Buscar medicamento..." oninput="filtrarMeds(this.value)">
    </div>

    <!-- CALENDÁRIO SEMANAL (semana atual, dinâmico) -->
    <div class="week-calendar anim anim-d2" id="weekCalendar"></div>

    <!-- LISTA DO DIA -->
    <div class="section-label anim anim-d3" id="day-label">&nbsp;</div>

    <div id="medsList"></div>

    <div style="height: 80px"></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="window.location.href='01-saude.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg>
      <span>Meu RG</span>
    </div>
    <div class="tab" onclick="window.location.href='09-exames-lista.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Exames</span>
    </div>
    <div class="tab" onclick="window.location.href='12-qr-code.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>
      <span>QR Code</span>
    </div>
    <div class="tab" onclick="window.location.href='15-consultas.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Consultas</span>
    </div>
  </div>
</div>
<script>
  // ===== Lote 2: lista de medicamentos conectada =====
  let MEDS = [];
  let DIA_ATIVO = new Date();

  const DIAS_SEM_NOMES = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const DIAS_SEM_ABREV = ['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
  const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  function escapeHtml(s){
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function mesmaData(a, b) {
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function renderCalendario() {
    const hoje = new Date();
    const cal = document.getElementById('weekCalendar');
    cal.innerHTML = '';
    // Pega segunda-feira da semana atual (ou domingo? usar domingo como inicio é mais brasileiro? Vamos domingo→sabado)
    const inicio = new Date(hoje);
    inicio.setDate(hoje.getDate() - hoje.getDay()); // volta pro domingo
    for (let i = 0; i < 7; i++) {
      const d = new Date(inicio);
      d.setDate(inicio.getDate() + i);
      const ehHoje = mesmaData(d, hoje);
      const ehFuturo = d > hoje && !ehHoje;
      const ehAtivo = mesmaData(d, DIA_ATIVO);
      const classes = ['day'];
      if (ehAtivo) classes.push('today');
      if (ehFuturo) classes.push('future');
      const div = document.createElement('div');
      div.className = classes.join(' ');
      div.innerHTML = `
        <div class="day-letter">${DIAS_SEM_ABREV[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
        <div class="day-status"></div>
      `;
      div.dataset.date = d.toISOString();
      div.addEventListener('click', () => {
        DIA_ATIVO = new Date(div.dataset.date);
        renderCalendario();
        renderDia();
      });
      cal.appendChild(div);
    }
  }

  function rotuloDia() {
    const hoje = new Date();
    const ehHoje = mesmaData(DIA_ATIVO, hoje);
    const dia = DIAS_SEM_NOMES[DIA_ATIVO.getDay()].toLowerCase();
    const data = `${DIA_ATIVO.getDate()} de ${MESES[DIA_ATIVO.getMonth()]}`;
    return (ehHoje ? 'Hoje, ' : '') + dia + ' · ' + data;
  }

  function extrairHorario(med) {
    if (!med.horario) return null;
    if (typeof med.horario === 'string') {
      const m = med.horario.match(/(\d{1,2})[h:](\d{0,2})/);
      if (m) return `${m[1].padStart(2,'0')}:${(m[2]||'00').padStart(2,'0')}`;
      return med.horario;
    }
    if (Array.isArray(med.horario) && med.horario.length) return String(med.horario[0]);
    return null;
  }

  function medAtivoEm(med, data) {
    if (med.ativo === false) return false;
    const inicio = med.dataInicio ? new Date(med.dataInicio) : null;
    const fim = med.dataFim ? new Date(med.dataFim) : null;
    if (inicio && data < inicio) return false;
    if (fim && data > fim) return false;
    return true;
  }

  function badgeCategoria(motivo) {
    if (!motivo) return '';
    const m = String(motivo).toLowerCase();
    if (/press/i.test(m)) return '<span class="badge green" style="margin-left:6px">Pressão</span>';
    if (/reflux|gastr/i.test(m)) return '<span class="badge blue" style="margin-left:6px">Estômago</span>';
    if (/diab|insulin/i.test(m)) return '<span class="badge warn" style="margin-left:6px">Diabetes</span>';
    if (/dor|cefal|enxa/i.test(m)) return '<span class="badge warn" style="margin-left:6px">Dor</span>';
    return `<span class="badge" style="margin-left:6px">${escapeHtml(motivo).slice(0,20)}</span>`;
  }

  function renderDia() {
    document.getElementById('day-label').textContent = rotuloDia();
    const lista = document.getElementById('medsList');
    const busca = (document.getElementById('medsSearch').value || '').toLowerCase();

    const ativos = MEDS.filter(m => medAtivoEm(m, DIA_ATIVO))
      .filter(m => !busca || (m.nome||'').toLowerCase().includes(busca))
      .map(m => ({...m, _hr: extrairHorario(m)}))
      .sort((a,b) => (a._hr||'99:99').localeCompare(b._hr||'99:99'));

    if (MEDS.length === 0) {
      lista.innerHTML = `
        <div style="margin:0 var(--s5); padding:32px var(--s4); text-align:center; background:var(--surface); border:var(--border); border-radius:var(--r-md);">
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px">Nenhum medicamento cadastrado</div>
          <div style="font-size:12.5px;color:var(--ink3);line-height:1.5;margin-bottom:18px">Adicione seu primeiro medicamento pra começar a receber lembretes.</div>
          <button class="btn btn-primary" style="display:inline-block;padding:12px 24px" onclick="window.location='05-add-medicamento.html'">Adicionar medicamento</button>
        </div>`;
      return;
    }

    if (ativos.length === 0) {
      lista.innerHTML = `<div style="margin:0 var(--s5); padding:24px var(--s4); text-align:center; color:var(--ink3); font-size:13px">Nenhum medicamento ${busca?'encontrado pra "'+escapeHtml(busca)+'"':'pra este dia'}</div>`;
      return;
    }

    lista.innerHTML = ativos.map((m, i) => {
      const meta = [m.dosagem, m.via || m.frequencia].filter(Boolean).join(' · ');
      const horarioStr = m._hr || (m.frequencia || '—');
      return `<div class="med-card-detail anim anim-d${Math.min(5, 3+i)}" onclick="window.location='04-med-detalhe.html?id=${encodeURIComponent(m.id)}'">
        <div class="med-detail-icon">
          <svg viewBox="0 0 24 24"><path d="M10.5 20.5 3.5 13.5a4.95 4.95 0 0 1 7-7l7 7a4.95 4.95 0 0 1-7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
        </div>
        <div class="med-detail-info">
          <div class="med-detail-name">${escapeHtml(m.nome||'—')}${m.dosagem?' '+escapeHtml(m.dosagem):''}</div>
          <div class="med-detail-meta">${escapeHtml(meta)||'—'}</div>
          <div class="med-detail-time-row">
            <span>${escapeHtml(horarioStr)}</span>${m.frequencia?' · <span>'+escapeHtml(m.frequencia)+'</span>':''}
            ${badgeCategoria(m.motivo)}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function filtrarMeds() { renderDia(); }

  async function iniciarMeds() {
    try {
      const r = await vitaeAPI.listarMedicamentos();
      MEDS = r.medicamentos || r || [];
      const ativos = MEDS.filter(m => m.ativo !== false).length;
      const total = MEDS.length;
      const sub = document.getElementById('medsSubtitle');
      if (total === 0) sub.textContent = 'Nenhum medicamento cadastrado';
      else if (ativos === total) sub.textContent = `${total} medicamento${total===1?'':'s'} ativo${total===1?'':'s'}`;
      else sub.textContent = `${ativos} ativo${ativos===1?'':'s'} · ${total-ativos} pausado${(total-ativos)===1?'':'s'}`;
      renderCalendario();
      renderDia();
    } catch (e) {
      console.error('[03-medicamentos] erro init', e);
      document.getElementById('medsSubtitle').textContent = 'Sem conexão. Tente novamente.';
      document.getElementById('medsList').innerHTML = `<div style="margin:0 var(--s5); padding:24px; text-align:center; color:var(--bad); font-size:13px">Não consegui buscar seus medicamentos. <a href="javascript:location.reload()" style="color:var(--green2);font-weight:700">Tentar de novo</a></div>`;
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciarMeds);
  else iniciarMeds();
</script>
</body>
</html>
