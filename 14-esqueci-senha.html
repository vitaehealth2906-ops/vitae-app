<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Esqueci minha senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0D0F14;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0D0F14;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }
        .content {
            height:100%; overflow-y:auto;
            padding:80px 28px 40px;
            display:flex; flex-direction:column;
        }
        .back-btn {
            display:flex; align-items:center; gap:8px;
            color:rgba(255,255,255,0.4); font-size:14px;
            cursor:pointer; margin-bottom:32px;
            background:none; border:none;
            font-family:'Plus Jakarta Sans',sans-serif;
        }
        .back-btn:hover { color:rgba(255,255,255,0.7); }
        .page-header { margin-bottom:36px; }
        .page-title {
            font-family:'Plus Jakarta Sans', sans-serif;
            font-size:32px; font-weight:700;
            color:#fff; margin-bottom:8px;
        }
        .page-title span { color:#00E5A0; }
        .page-subtitle { font-size:14px; color:rgba(255,255,255,0.35); line-height:1.5; }

        .icon-wrap {
            width:72px; height:72px; border-radius:20px;
            background:rgba(0,229,160,0.08);
            border:1px solid rgba(0,229,160,0.15);
            display:flex; align-items:center; justify-content:center;
            font-size:32px; margin-bottom:28px;
        }

        .form { display:flex; flex-direction:column; gap:16px; flex:1; }
        .field { display:flex; flex-direction:column; gap:6px; }
        .field-label {
            font-size:12px; font-weight:600;
            color:rgba(255,255,255,0.4);
            letter-spacing:0.5px; text-transform:uppercase;
        }
        .field-input {
            width:100%; padding:16px 18px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:14px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:15px; font-weight:500; color:#fff;
            outline:none; transition:all 0.3s ease;
        }
        .field-input::placeholder { color:rgba(255,255,255,0.2); }
        .field-input:focus {
            border-color:rgba(0,229,160,0.4);
            background:rgba(0,229,160,0.04);
            box-shadow:0 0 0 3px rgba(0,229,160,0.08);
        }

        .btn-primary {
            width:100%; padding:18px;
            background:linear-gradient(120deg,#00B4D8,#00B4D8);
            border:none; border-radius:16px;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:16px; font-weight:700;
            color:#fff; cursor:pointer;
            letter-spacing:0.5px;
            transition:all 0.2s ease;
            margin-top:8px;
            opacity:0.5;
        }
        .btn-primary.enabled { opacity:1; }
        .btn-primary.enabled:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 32px rgba(0,229,160,0.3);
        }

        #errorMsg {
            display:none;
            background:rgba(217,68,82,0.12);
            border:1px solid rgba(217,68,82,0.3);
            border-radius:12px; padding:12px 16px;
            font-size:13px; color:#EF4444; text-align:center;
        }
        #successMsg {
            display:none;
            background:rgba(0,229,160,0.1);
            border:1px solid rgba(0,229,160,0.25);
            border-radius:16px; padding:24px;
            text-align:center;
        }
        #successMsg .success-icon { font-size:40px; margin-bottom:12px; }
        #successMsg h3 { color:#00E5A0; font-size:18px; margin-bottom:8px; }
        #successMsg p { color:rgba(255,255,255,0.5); font-size:13px; line-height:1.6; }
    @media(max-width:480px){body{padding:0!important;background:inherit!important}.phone{width:100vw!important;height:100vh!important;height:100svh!important;max-width:100vw!important;max-height:none!important;border-radius:0!important;box-shadow:none!important}.notch,.status{display:none!important}}</style>
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>●●● 🔋</span></div>

    <div class="content">
        <button class="back-btn" onclick="history.back()">← Voltar</button>

        <div style="margin-bottom:24px;">
            <svg viewBox="0 0 400 200" style="width:140px;height:auto;"><defs><linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00E5A0"/><stop offset="100%" stop-color="#00B4D8"/></linearGradient></defs><text x="115" y="50%" dominant-baseline="central" text-anchor="middle" font-family="'Plus Jakarta Sans','Arial Black',sans-serif" font-weight="800" font-size="96" letter-spacing="-5" fill="#0D0F14">vita</text><rect x="225" y="28" width="165" height="144" rx="24" fill="url(#vGrad)"/><text x="307" y="50%" dominant-baseline="central" text-anchor="middle" font-family="'Plus Jakarta Sans','Arial Black',sans-serif" font-weight="800" font-size="96" letter-spacing="-5" fill="#0D0F14">id</text></svg>
        </div>

        <div class="icon-wrap">🔑</div>

        <div class="page-header">
            <div class="page-title">Esqueci <span>minha senha</span></div>
            <div class="page-subtitle">Digite seu email e enviaremos um link para redefinir sua senha.</div>
        </div>

        <div class="form" id="formSection">
            <div class="field">
                <div class="field-label">Email</div>
                <input class="field-input" type="email" id="emailInput" placeholder="seu@email.com" oninput="checkForm()">
            </div>

            <div id="errorMsg"></div>

            <button class="btn-primary" id="btnEnviar" onclick="enviarLink()">Enviar link</button>
        </div>

        <div id="successMsg">
            <div class="success-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <h3>Email enviado!</h3>
            <p>Verifique sua caixa de entrada. O link expira em <strong style="color:#00E5A0;">30 minutos</strong>.</p>
            <br>
            <p style="color:rgba(255,255,255,0.3);font-size:12px;">Não recebeu? Verifique a pasta de spam ou tente novamente.</p>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    const emailInput = document.getElementById('emailInput');
    const btn = document.getElementById('btnEnviar');

    function checkForm() {
        const filled = emailInput.value.trim().includes('@');
        btn.classList.toggle('enabled', filled);
    }

    async function enviarLink() {
        if (!btn.classList.contains('enabled')) return;
        btn.textContent = 'Enviando...';
        btn.style.pointerEvents = 'none';

        try {
            const isLocal = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:';
            const API_BASE = isLocal ? 'http://localhost:3001' : 'https://vitae-app-production.up.railway.app';
            await fetch(API_BASE + '/auth/esqueci-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.value.trim() }),
            });

            // Sempre mostrar sucesso (nao revelar se email existe)
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        } catch (err) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Erro ao enviar. Tente novamente.';
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
            btn.textContent = 'Enviar link';
            btn.style.pointerEvents = 'auto';
        }
    }
</script>
</body>
</html>
