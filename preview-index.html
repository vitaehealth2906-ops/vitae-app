<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vita id — Preview dos 3 Sistemas</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{brand:{50:'#eff4ff',100:'#dbe6fe',600:'#2563EB',700:'#1d4fd7',900:'#1e3a8a'}}}}}</script>
<style>body{font-family:'Inter',sans-serif}.tab.active{background:#2563EB;color:#fff}</style>
</head>
<body class="bg-zinc-900 h-screen flex flex-col overflow-hidden">
  <header class="shrink-0 px-5 py-3 flex items-center gap-4 border-b border-zinc-700">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-white font-extrabold">V</div>
      <div class="text-white font-bold leading-none">vita id <span class="text-brand-100 font-normal text-sm">· preview dos 3 sistemas</span></div>
    </div>
    <div class="ml-6 flex gap-1.5 bg-zinc-800 p-1 rounded-xl">
      <button onclick="go('paciente',this)" class="tab active px-4 py-1.5 rounded-lg text-sm font-semibold text-zinc-300 transition">📱 Paciente (Termo + RG)</button>
      <button onclick="go('second-v',this)" class="tab px-4 py-1.5 rounded-lg text-sm font-semibold text-zinc-300 transition">🖥️ Second V (nosso painel)</button>
      <button onclick="go('dpo',this)" class="tab px-4 py-1.5 rounded-lg text-sm font-semibold text-zinc-300 transition">🏥 Portal do DPO</button>
    </div>
    <a id="open" href="preview-paciente.html" target="_blank" class="ml-auto text-xs text-zinc-400 hover:text-white underline">abrir em nova aba ↗</a>
  </header>
  <iframe id="frame" src="preview-paciente.html" class="flex-1 w-full bg-white border-0"></iframe>
<script>
function go(name,btn){
  document.getElementById('frame').src='preview-'+name+'.html';
  document.getElementById('open').href='preview-'+name+'.html';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
