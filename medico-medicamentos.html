<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Medicamentos do Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        body { background:#F4F6FA; }
        .content { padding: 0 0 32px; }

        .patient-subheader {
            display:flex; align-items:center; gap:12px;
            padding: var(--v-s5) var(--v-s5) var(--v-s3);
            position:sticky; top:0; background:#F4F6FA; z-index:5;
        }
        .patient-avatar-sm {
            width:36px; height:36px; border-radius:50%;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            display:flex; align-items:center; justify-content:center;
            color:#0D0F14; font-weight:800; font-size:13px;
            flex-shrink:0; overflow:hidden;
        }
        .patient-avatar-sm img { width:100%; height:100%; object-fit:cover; }
        .patient-subheader-info { flex:1; min-width:0; }
        .patient-subheader-name { font-size:15px; font-weight:700; color:var(--v-ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .patient-subheader-meta { font-size:11px; color:var(--v-ink4); font-weight:500; }
        .patient-subheader-count {
            padding:5px 11px;
            background:rgba(0,229,160,0.10);
            border:1px solid rgba(0,229,160,0.20);
            border-radius:100px;
            font-size:11px; font-weight:700; color:var(--v-green2);
            white-space:nowrap;
        }

        .tab-strip {
            display:flex; gap:6px; padding: 4px var(--v-s5) var(--v-s5);
            overflow-x:auto; scrollbar-width:none;
        }
        .tab-strip::-webkit-scrollbar { display:none; }
        .tab-chip {
            padding:8px 14px; border-radius:100px;
            background:#FFFFFF; border:1px solid rgba(0,0,0,0.06);
            font-size:12px; font-weight:600; color:var(--v-ink3);
            cursor:pointer; white-space:nowrap; transition:all 0.15s;
        }
        .tab-chip:hover { background:rgba(0,0,0,0.02); }
        .tab-chip.active {
            background:rgba(0,229,160,0.10);
            border-color:rgba(0,229,160,0.30);
            color:var(--v-green2);
        }

        .section-label {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:1.5px; color:var(--v-ink4);
            padding: var(--v-s4) var(--v-s5) var(--v-s2);
        }

        .insight-card {
            position:relative;
            background:#FFFFFF; border-radius:14px;
            padding:14px 16px 14px 20px;
            margin: 0 var(--v-s5) 10px;
            box-shadow:0 1px 12px rgba(0,0,0,0.04);
        }
        .insight-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0;
            width:4px; background:var(--v-green); opacity:0.65;
            border-radius:4px 0 0 4px;
        }
        .insight-card.discontinued { opacity:0.55; }
        .insight-card.discontinued::before { background:var(--v-ink5); }
        .insight-card.alert::before { background:var(--v-bad); opacity:1; }

        .med-head { display:flex; align-items:center; gap:14px; }
        .med-icon {
            width:42px; height:42px; border-radius:12px;
            background:linear-gradient(120deg, rgba(0,229,160,0.18), rgba(0,180,216,0.18));
            border:1px solid rgba(0,229,160,0.22);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .med-icon svg { width:20px; height:20px; stroke:var(--v-green2); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .med-info { flex:1; min-width:0; }
        .med-nome { font-size:15px; font-weight:800; color:var(--v-ink); line-height:1.2; }
        .med-dosagem { font-size:13px; color:var(--v-ink2); font-weight:600; margin-top:3px; }
        .med-extras { padding-top:10px; margin-top:10px; border-top:1px solid rgba(0,0,0,0.04); }
        .med-row {
            display:flex; align-items:center; gap:8px;
            font-size:12px; color:var(--v-ink3); margin-top:6px;
        }
        .med-row:first-child { margin-top:0; }
        .med-row svg { width:13px; height:13px; stroke:var(--v-ink4); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
        .med-row b { color:var(--v-ink2); font-weight:600; }
        .horario-chips { display:flex; flex-wrap:wrap; gap:5px; }
        .horario-chip {
            padding:3px 9px; border-radius:100px;
            background:rgba(0,229,160,0.10);
            font-size:11px; font-weight:700; color:var(--v-green2);
        }
        .tag-pill {
            font-size:10px; font-weight:700; text-transform:uppercase;
            letter-spacing:0.4px; padding:3px 9px; border-radius:100px;
            background:rgba(0,0,0,0.04); color:var(--v-ink3);
        }
        .tag-pill.warn {
            background:rgba(245,158,11,0.10); color:var(--v-warn);
        }
        .tag-pill.scan {
            background:rgba(0,180,216,0.10); color:var(--v-cyan);
        }
        .conflict-box {
            margin-top:10px; padding:9px 11px; border-radius:10px;
            background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.16);
            display:flex; align-items:center; gap:8px;
            font-size:12px; font-weight:700; color:var(--v-bad);
        }
        .conflict-box svg { width:14px; height:14px; stroke:var(--v-bad); fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0; }
        .med-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }

        .footer-note {
            font-size:11px; color:var(--v-ink4); font-style:italic;
            text-align:center; padding: 18px var(--v-s6) 8px; line-height:1.5;
        }

        .empty-state { text-align:center; padding: 48px 32px 32px; }
        .empty-icon { width:56px; height:56px; margin:0 auto 14px; opacity:0.35; }
        .empty-icon svg { width:100%; height:100%; stroke:var(--v-ink4); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .empty-title { font-size:15px; font-weight:700; color:var(--v-ink3); margin-bottom:6px; }
        .empty-sub { font-size:13px; color:var(--v-ink4); line-height:1.5; }
        .empty-hint { font-size:12px; color:var(--v-ink4); font-style:italic; margin-top:10px; padding: 0 12px; line-height:1.5; }

        .skel { background:#FFFFFF; border-radius:14px; padding:14px 16px; margin:0 var(--v-s5) 10px; box-shadow:0 1px 12px rgba(0,0,0,0.04); }
        .skel-bar {
            background:linear-gradient(90deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 100%);
            background-size:200% 100%; animation:shimmer 1.5s infinite;
            border-radius:6px; height:14px; margin-bottom:8px;
        }
        .skel-bar.short { width:50%; }
        @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

        .identity-missing { text-align:center; padding: 56px 32px; }
        .identity-missing-avatar {
            width:80px; height:80px; border-radius:50%;
            background:rgba(156,163,175,0.10); border:1px solid rgba(156,163,175,0.20);
            display:flex; align-items:center; justify-content:center;
            margin: 0 auto 18px;
        }
        .identity-missing-avatar svg { width:36px; height:36px; stroke:#9CA3AF; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
        .identity-missing-title { font-size:17px; font-weight:800; color:var(--v-ink); margin-bottom:8px; letter-spacing:-0.3px; }
        .identity-missing-msg { font-size:13px; color:var(--v-ink3); line-height:1.6; margin-bottom:22px; }
        .identity-missing-btn {
            display:inline-block; padding:14px 24px; border-radius:14px;
            background:linear-gradient(120deg, var(--v-green), var(--v-cyan));
            color:#0D0F14; font-weight:700; font-size:14px;
            border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
        }

        .anim { opacity:0; transform:translateY(14px); animation: fadeUp 0.4s var(--v-ease) forwards; }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="phone">
    <div class="notch"></div>
    <div class="content">

        <div class="patient-subheader anim">
            <div class="btn-back" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div class="patient-avatar-sm" id="avatar">--</div>
            <div class="patient-subheader-info">
                <div class="patient-subheader-name" id="nome">Carregando...</div>
                <div class="patient-subheader-meta" id="meta">&nbsp;</div>
            </div>
            <div class="patient-subheader-count" id="count" style="display:none;">0</div>
        </div>

        <div class="tab-strip anim" style="animation-delay:0.05s;">
            <div class="tab-chip" data-target="medico-exames">Exames</div>
            <div class="tab-chip" data-target="medico-condicoes">Condições</div>
            <div class="tab-chip" data-target="medico-alergias">Alergias</div>
            <div class="tab-chip active" data-target="medico-medicamentos">Medicamentos</div>
        </div>

        <div id="body"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pacienteId = params.get('pacienteId');
const pacienteNome = decodeURIComponent(params.get('nome') || 'Paciente');

function getInitials(n){return (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();}
function calcAge(d){if(!d)return null;let x;if(String(d).includes('/')){const p=String(d).split('/');x=new Date(p[2],p[1]-1,p[0]);}else x=new Date(d);if(isNaN(x.getTime()))return null;return Math.floor((Date.now()-x.getTime())/(365.25*24*60*60*1000));}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setSubheaderLoading() {
    document.getElementById('avatar').textContent = getInitials(pacienteNome);
    document.getElementById('nome').textContent = pacienteNome;
}

function renderSkeleton() {
    document.getElementById('body').innerHTML =
        '<div class="section-label">&nbsp;</div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>' +
        '<div class="skel"><div class="skel-bar"></div><div class="skel-bar short"></div></div>';
}

function renderIdentityMissing() {
    document.getElementById('count').style.display = 'none';
    document.getElementById('body').innerHTML =
        '<div class="identity-missing anim">' +
        '<div class="identity-missing-avatar"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>' +
        '<div class="identity-missing-title">Paciente sem vínculo</div>' +
        '<div class="identity-missing-msg">Este paciente respondeu uma pré-consulta antes de criar conta no vita id. Sem cadastro, não há dados clínicos para mostrar aqui.</div>' +
        '<button class="identity-missing-btn" onclick="history.back()">Voltar ao painel</button>' +
        '</div>';
}

function renderEmpty() {
    document.getElementById('count').textContent = '0';
    document.getElementById('count').style.display = 'inline-block';
    document.getElementById('body').innerHTML =
        '<div class="empty-state anim">' +
        '<div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M10.5 20.5l10-10a4.95 4.95 0 10-7-7l-10 10a4.95 4.95 0 107 7z"/><line x1="8.12" y1="6.71" x2="17.29" y2="15.88"/></svg></div>' +
        '<div class="empty-title">Nenhum medicamento registrado</div>' +
        '<div class="empty-sub">Este paciente não declarou uso contínuo.</div>' +
        '<div class="empty-hint">Pergunte sobre polifarmácia durante a anamnese — idosos podem omitir medicamentos do dia a dia.</div>' +
        '</div>';
}

function parseHorarios(h) {
    if (!h) return [];
    return String(h).split(/[,;\/]/).map(s => s.trim()).filter(Boolean);
}

function tempoUso(dataInicio) {
    if (!dataInicio) return null;
    var d = new Date(dataInicio);
    if (isNaN(d.getTime())) return null;
    var dias = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (dias < 7) return 'há ' + dias + (dias === 1 ? ' dia' : ' dias');
    if (dias < 60) {
        var sem = Math.floor(dias/7);
        return 'há ' + sem + (sem === 1 ? ' semana' : ' semanas');
    }
    var meses = Math.floor(dias/30);
    if (meses < 24) return 'há ' + meses + (meses === 1 ? ' mês' : ' meses');
    var anos = Math.floor(dias/365);
    return 'há ' + anos + (anos === 1 ? ' ano' : ' anos');
}

function diasRestantesDose(m) {
    if (!m.quantidadeEstoque || !m.frequencia) return null;
    var freq = String(m.frequencia).toLowerCase();
    var dosesPorDia = 1;
    if (freq.indexOf('2x') !== -1 || freq.indexOf('12') !== -1 || freq.indexOf('duas') !== -1) dosesPorDia = 2;
    else if (freq.indexOf('3x') !== -1 || freq.indexOf('8') !== -1 || freq.indexOf('tres') !== -1 || freq.indexOf('tr\u00eas') !== -1) dosesPorDia = 3;
    else if (freq.indexOf('4x') !== -1 || freq.indexOf('6') !== -1) dosesPorDia = 4;
    var qtdPorDose = m.quantidadePorDose || 1;
    var diaRest = Math.floor(m.quantidadeEstoque / (dosesPorDia * qtdPorDose));
    return diaRest > 0 ? diaRest : null;
}

function findAlergiasConflict(medNome, alergias) {
    var lower = (medNome||'').toLowerCase().trim();
    if (!lower) return [];
    return (alergias||[]).filter(function(a) {
        var n = (a.nome||'').toLowerCase();
        if (!n) return false;
        return n.indexOf(lower) !== -1 || lower.indexOf(n) !== -1;
    }).map(function(a){ return a.nome; });
}

function renderMed(m, alergias, isDiscontinued, delay) {
    var conflitos = !isDiscontinued ? findAlergiasConflict(m.nome, alergias) : [];
    var horarios = parseHorarios(m.horario);
    var tempo = tempoUso(m.dataInicio);
    var diasRest = diasRestantesDose(m);
    var dosagemTxt = [m.dosagem, m.frequencia].filter(Boolean).join(' · ');

    var hasExtras = horarios.length || m.motivo || m.medicoPrescritor || tempo;

    var html = '<div class="insight-card ' + (isDiscontinued ? 'discontinued' : (conflitos.length ? 'alert' : '')) + ' anim" style="animation-delay:' + delay.toFixed(2) + 's;">';
    html += '<div class="med-head">' +
        '<div class="med-icon"><svg viewBox="0 0 24 24"><path d="M10.5 20.5l10-10a4.95 4.95 0 10-7-7l-10 10a4.95 4.95 0 107 7z"/><line x1="8.12" y1="6.71" x2="17.29" y2="15.88"/></svg></div>' +
        '<div class="med-info">' +
            '<div class="med-nome">' + escapeHtml(m.nome) + '</div>' +
            (dosagemTxt ? '<div class="med-dosagem">' + escapeHtml(dosagemTxt) + '</div>' : '') +
        '</div>' +
        '</div>';

    if (hasExtras) {
        html += '<div class="med-extras">';
        if (horarios.length) {
            html += '<div class="med-row">' +
                '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                '<div class="horario-chips">' + horarios.map(function(h){return '<span class="horario-chip">' + escapeHtml(h) + '</span>';}).join('') + '</div>' +
                '</div>';
        }
        if (m.motivo) {
            html += '<div class="med-row">' +
                '<svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>' +
                '<span>Para <b>' + escapeHtml(m.motivo) + '</b></span></div>';
        }
        if (m.medicoPrescritor) {
            html += '<div class="med-row">' +
                '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' +
                '<span>Prescrito por <b>' + escapeHtml(m.medicoPrescritor) + '</b></span></div>';
        }
        if (tempo) {
            html += '<div class="med-row">' +
                '<svg viewBox="0 0 24 24"><polyline points="12 6 12 12 16 14"/><circle cx="12" cy="12" r="10"/></svg>' +
                '<span>Tomando ' + tempo + '</span></div>';
        }
        html += '</div>';
    }

    var tags = [];
    if (diasRest !== null && diasRest <= 7 && !isDiscontinued) tags.push('<span class="tag-pill warn">Acaba em ' + diasRest + (diasRest === 1 ? ' dia' : ' dias') + '</span>');
    if (m.fonte === 'scan') tags.push('<span class="tag-pill scan">Escaneado</span>');
    if (isDiscontinued) tags.push('<span class="tag-pill">Descontinuado</span>');
    if (tags.length) html += '<div class="med-tags">' + tags.join('') + '</div>';

    if (conflitos.length) {
        html += '<div class="conflict-box"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Paciente tem alergia a ' + escapeHtml(conflitos.join(', ')) + '</span></div>';
    }

    html += '</div>';
    return html;
}

function renderConteudo(medicamentos, alergias) {
    if (!medicamentos || medicamentos.length === 0) { renderEmpty(); return; }

    var ativos = medicamentos.filter(function(m){return m.ativo !== false;});
    var descontinuados = medicamentos.filter(function(m){return m.ativo === false;});

    document.getElementById('count').textContent = ativos.length + ' em uso';
    document.getElementById('count').style.display = 'inline-block';

    var html = '';
    var delay = 0.05;

    if (ativos.length > 0) {
        html += '<div class="section-label">Em uso agora</div>';
        ativos.forEach(function(m){
            html += renderMed(m, alergias, false, delay);
            delay += 0.05;
        });
    } else {
        html += '<div class="empty-state anim"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">Nenhum medicamento em uso</div><div class="empty-sub">Apenas histórico de uso anterior.</div></div>';
    }

    if (descontinuados.length > 0) {
        html += '<div class="section-label">Descontinuados</div>';
        descontinuados.forEach(function(m){
            html += renderMed(m, alergias, true, delay);
            delay += 0.04;
        });
    }

    html += '<div class="footer-note">Exibindo apenas o que o paciente registrou. Peça confirmação durante a consulta.</div>';

    document.getElementById('body').innerHTML = html;
}

document.querySelectorAll('.tab-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
        var target = chip.getAttribute('data-target');
        if (!target || chip.classList.contains('active')) return;
        var url = target + '.html?pacienteId=' + encodeURIComponent(pacienteId || '') +
                  '&nome=' + encodeURIComponent(pacienteNome);
        window.location.href = url;
    });
});

async function init() {
    setSubheaderLoading();
    if (!pacienteId) { renderIdentityMissing(); return; }
    renderSkeleton();
    try {
        var data = await vitaeAPI.getPerfilPacienteMedico(pacienteId);
        var p = data.paciente || {};
        var perfil = p.perfilSaude || {};
        var idade = calcAge(perfil.dataNascimento);
        var sangue = perfil.tipoSanguineo || '';
        var sangueFmt = sangue ? sangue.replace('_POS','+').replace('_NEG','-') : '';
        var partes = [];
        if (idade) partes.push(idade + ' anos');
        if (sangueFmt) partes.push(sangueFmt);
        document.getElementById('meta').textContent = partes.join(' · ') || ' ';
        if (p.fotoUrl) {
            document.getElementById('avatar').innerHTML = '<img src="' + p.fotoUrl + '" alt="">';
        }
        renderConteudo(p.medicamentos || [], p.alergias || []);
    } catch (err) {
        renderIdentityMissing();
    }
}
init();
</script>
</body>
</html>
