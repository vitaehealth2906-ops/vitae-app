<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — RG da Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#C5A55A; --green:#4AD9A4; --red:#D94452; --blue:#4A90E2; --orange:#F0A050; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; min-height:100vh; background:var(--bg);
            overflow:hidden; position:relative;
        }
        @media (min-width:394px) {
            .phone { height:852px; max-height:100vh; border-radius:52px;
                box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
                overflow-y:auto;
            }
        }
        .content { padding:40px 20px 48px; overflow-y:auto; height:100%; }

        /* Header */
        .pub-header { text-align:center; margin-bottom:24px; }
        .pub-logo { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
        .pub-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#fff; }
        .pub-sub { font-size:13px; color:rgba(255,255,255,0.35); margin-top:4px; }
        .pub-badge {
            display:inline-flex; align-items:center; gap:6px; margin-top:10px;
            padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600;
            background:rgba(74,217,164,0.1); border:1px solid rgba(74,217,164,0.2); color:var(--green);
        }
        .pub-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }

        /* RG Card */
        .rg-card {
            background:linear-gradient(145deg, rgba(30,25,18,0.98), rgba(20,16,10,0.98));
            border:1.5px solid rgba(197,165,90,0.3); border-radius:20px;
            padding:24px; margin-bottom:20px; position:relative; overflow:hidden;
            box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(197,165,90,0.12);
        }
        .rg-card::before {
            content:''; position:absolute; top:-40px; right:-40px; width:220px; height:220px;
            background:radial-gradient(circle, rgba(197,165,90,0.07) 0%, transparent 70%); pointer-events:none;
        }
        .rg-brand { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; color:rgba(197,165,90,0.5); text-transform:uppercase; margin-bottom:12px; }
        .rg-name { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#fff; margin-bottom:2px; }
        .rg-social { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:14px; }
        .rg-cpf { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:0.05em; margin-bottom:18px; }
        .rg-fields { display:flex; gap:20px; flex-wrap:wrap; }
        .rg-field { min-width:60px; }
        .rg-field-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.28); margin-bottom:3px; }
        .rg-field-value { font-size:13px; font-weight:600; color:rgba(255,255,255,0.75); }

        /* Sections */
        .section-title {
            font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:#fff;
            margin:22px 0 10px; display:flex; align-items:center; gap:8px;
        }
        .section-title svg { opacity:0.5; }

        .glass-card {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:16px; padding:16px; margin-bottom:10px;
        }

        /* Info rows */
        .info-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .info-row:last-child { border-bottom:none; padding-bottom:0; }
        .info-row:first-child { padding-top:0; }
        .info-row-icon { width:28px; flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:2px; }
        .info-col { flex:1; }
        .info-label { font-size:10px; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; }
        .info-value { font-size:13px; color:rgba(255,255,255,0.65); font-weight:500; }

        /* Tags */
        .tags-wrap { display:flex; flex-wrap:wrap; gap:6px; }
        .tag { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:12px; font-weight:500; }
        .tag.allergy { background:rgba(217,68,82,0.1); color:var(--red); border:1px solid rgba(217,68,82,0.18); }
        .tag.allergy-grave { background:rgba(217,68,82,0.18); color:#ff6b6b; border:1px solid rgba(217,68,82,0.35); }
        .tag.med { background:rgba(74,144,226,0.1); color:var(--blue); border:1px solid rgba(74,144,226,0.15); }
        .tag.cond { background:rgba(197,165,90,0.08); color:var(--gold); border:1px solid rgba(197,165,90,0.15); }
        .tag.surgery { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.08); }
        .tag.access { background:rgba(74,217,164,0.07); color:var(--green); border:1px solid rgba(74,217,164,0.15); }

        /* Warning box */
        .warning-box {
            background:rgba(240,160,80,0.07); border:1px solid rgba(240,160,80,0.2);
            border-radius:12px; padding:12px 14px; margin-top:10px;
            display:flex; align-items:flex-start; gap:10px;
        }
        .warning-box svg { flex-shrink:0; margin-top:1px; }
        .warning-text { font-size:12px; color:rgba(240,160,80,0.9); line-height:1.5; }
        .warning-text strong { display:block; margin-bottom:3px; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; }

        /* Emergency */
        .emergency-card {
            background:rgba(217,68,82,0.06); border:1px solid rgba(217,68,82,0.2);
            border-radius:16px; padding:16px; margin-bottom:10px;
        }
        .emergency-label { font-size:10px; color:var(--red); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
        .emerg-row { display:flex; flex-direction:column; gap:6px; }
        .emerg-contact { display:flex; align-items:center; gap:10px; }
        .emerg-info { flex:1; }
        .emerg-name { font-size:14px; font-weight:600; color:#fff; }
        .emerg-tel { font-size:13px; color:rgba(255,255,255,0.4); }
        .emerg-badge { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.25); }
        .divider { height:1px; background:rgba(217,68,82,0.1); margin:10px 0; }

        /* Access card */
        .access-grid { display:flex; flex-wrap:wrap; gap:6px; }

        /* Footer */
        .footer-note { text-align:center; padding:24px 12px 8px; font-size:11px; color:rgba(255,255,255,0.18); line-height:1.6; }
        .footer-note a { color:var(--gold); text-decoration:none; }

        /* States */
        .loading { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.3); font-size:14px; }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(197,165,90,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error-state { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.4); font-size:14px; line-height:1.8; }
        .error-icon { margin-bottom:20px; opacity:0.3; }
    </style>
</head>
<body>
<div class="phone">
    <div class="content" id="mainContent">
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            Carregando RG da Saúde...
        </div>
    </div>
</div>

<script>
    const API_URL = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:'
        ? 'http://localhost:3002'
        : 'https://vitae-app-production.up.railway.app';

    const bloodMap = { A_POS:'A+',A_NEG:'A-',B_POS:'B+',B_NEG:'B-',AB_POS:'AB+',AB_NEG:'AB-',O_POS:'O+',O_NEG:'O-' };
    const generoMap = { MASCULINO:'Masculino', FEMININO:'Feminino', NAO_BINARIO:'Não-binário', PREFIRO_NAO_INFORMAR:'Prefiro não informar' };
    const estadoCivilMap = { SOLTEIRO:'Solteiro(a)', CASADO:'Casado(a)', DIVORCIADO:'Divorciado(a)', VIUVO:'Viúvo(a)', UNIAO_ESTAVEL:'União estável', OUTRO:'Outro' };
    const acessMap = { cadeirante:'Cadeirante', deficienciaVisual:'Def. Visual', deficienciaAuditiva:'Def. Auditiva', deficienciaCognitiva:'Def. Cognitiva', autismo:'Autismo', limitacaoPosCircurgia:'Limitação pós-cirurgia' };
    const glp1Nomes = ['ozempic','mounjaro','wegovy','saxenda','victoza','trulicity','ozempik','semaglutida','tirzepatida','liraglutida','dulaglutida'];

    function calcAge(dateStr) {
        if (!dateStr) return null;
        const birth = new Date(dateStr);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const m = now.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
        return age + ' anos';
    }

    async function loadPublicRG() {
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        if (!userId) { showError('Link inválido — ID não encontrado.'); return; }

        try {
            const res = await fetch(`${API_URL}/autorizacao/rg-publico/${userId}`);
            if (!res.ok) throw new Error('Não foi possível carregar os dados');
            const data = await res.json();
            renderRG(data);
        } catch (e) {
            showError(e.message || 'Erro ao carregar dados');
        }
    }

    function showError(msg) {
        document.getElementById('mainContent').innerHTML = `
            <div class="error-state">
                <div class="error-icon"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#D94452" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                ${msg}<br><br>
                <a href="https://vitaehealth2906-ops.github.io/vitae-app/" style="color:var(--gold);font-weight:600;text-decoration:none;">Baixar VITAE</a>
            </div>`;
    }

    function renderRG(data) {
        const { usuario, perfil, alergias, medicamentos } = data;
        const p = perfil || {};
        const nome = p.nomeSocial || usuario.nome || 'Paciente';
        const blood = bloodMap[p.tipoSanguineo] || '—';
        const age = calcAge(p.dataNascimento);
        const hasGLP1 = (medicamentos || []).some(m => glp1Nomes.some(g => m.nome.toLowerCase().includes(g)));

        // Build HTML
        let html = `
            <div class="pub-header">
                <div class="pub-logo">VITAE · RG DA SAÚDE</div>
                <div class="pub-title">${nome}</div>
                ${p.apelido ? `<div class="pub-sub">"${p.apelido}"</div>` : ''}
                <div class="pub-badge">Verificado</div>
            </div>

            <!-- RG Card -->
            <div class="rg-card">
                <div class="rg-brand">VITAE · RG DA SAÚDE</div>
                <div class="rg-name">${nome}</div>
                ${p.nomeSocial && p.nomeSocial !== usuario.nome ? `<div class="rg-social">Nome civil: ${usuario.nome}</div>` : ''}
                ${p.cpf ? `<div class="rg-cpf">CPF ${p.cpf}</div>` : ''}
                <div class="rg-fields">
                    <div class="rg-field">
                        <div class="rg-field-label">Tipo Sang.</div>
                        <div class="rg-field-value">${blood}</div>
                    </div>
                    ${age ? `<div class="rg-field"><div class="rg-field-label">Idade</div><div class="rg-field-value">${age}</div></div>` : ''}
                    ${p.genero ? `<div class="rg-field"><div class="rg-field-label">Gênero</div><div class="rg-field-value">${generoMap[p.genero] || p.genero}</div></div>` : ''}
                    ${p.estadoCivil ? `<div class="rg-field"><div class="rg-field-label">Est. Civil</div><div class="rg-field-value">${estadoCivilMap[p.estadoCivil] || p.estadoCivil}</div></div>` : ''}
                    ${p.planoSaude ? `<div class="rg-field"><div class="rg-field-label">Plano</div><div class="rg-field-value">${p.planoSaude}</div></div>` : ''}
                </div>
            </div>`;

        // Alergias
        if (alergias && alergias.length > 0) {
            html += `
                <div class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D94452" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Alergias
                </div>
                <div class="glass-card">
                    <div class="tags-wrap">
                        ${alergias.map(a => {
                            const grave = a.gravidade && ['GRAVE','SEVERA','ANAFILAXIA'].includes(a.gravidade.toUpperCase());
                            return `<span class="tag ${grave ? 'allergy-grave' : 'allergy'}">
                                ${grave ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>' : ''}
                                ${a.nome}${a.gravidade ? ` · ${a.gravidade}` : ''}
                            </span>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        // Medicamentos
        if (medicamentos && medicamentos.length > 0) {
            html += `
                <div class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 1.5H8C4.68 1.5 2 4.18 2 7.5S4.68 13.5 8 13.5h8c3.32 0 6-2.68 6-6s-2.68-6-6-6h-2.5"/><line x1="12" y1="1.5" x2="12" y2="13.5"/></svg>
                    Medicamentos em Uso
                </div>
                <div class="glass-card">
                    <div class="tags-wrap">
                        ${medicamentos.map(m => `<span class="tag med">${m.nome}${m.dosagem ? ` ${m.dosagem}` : ''}</span>`).join('')}
                    </div>
                    ${hasGLP1 ? `<div class="warning-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        <div class="warning-text"><strong>Agonista GLP-1 (Ozempic/Mounjaro)</strong>Paciente em uso de medicamento GLP-1. Em procedimentos de anestesia, jejum deve ser estendido para 24-48h.</div>
                    </div>` : ''}
                </div>`;
        }

        // Condições
        if (p.condicoes) {
            const conds = p.condicoes.split(',').map(c => c.trim()).filter(Boolean);
            if (conds.length > 0) {
                html += `
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C5A55A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        Condições de Saúde
                    </div>
                    <div class="glass-card">
                        <div class="tags-wrap">
                            ${conds.map(c => `<span class="tag cond">${c}</span>`).join('')}
                        </div>
                    </div>`;
            }
        }

        // Cirurgias
        if (p.cirurgias && p.cirurgias.length > 0) {
            html += `
                <div class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l4 4-10 10H8v-4L18 2z"/><line x1="2" y1="22" x2="8" y2="16"/></svg>
                    Cirurgias
                </div>
                <div class="glass-card">
                    <div class="tags-wrap">
                        ${p.cirurgias.map(c => `<span class="tag surgery">${c}</span>`).join('')}
                    </div>
                </div>`;
        }

        // Limitações de acessibilidade
        if (p.limitacoesAcessibilidade) {
            const lim = p.limitacoesAcessibilidade;
            const ativas = Object.keys(acessMap).filter(k => lim[k]);
            if (ativas.length > 0 || lim.descricao) {
                html += `
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4AD9A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                        Acessibilidade
                    </div>
                    <div class="glass-card">
                        <div class="access-grid">
                            ${ativas.map(k => `<span class="tag access">${acessMap[k]}</span>`).join('')}
                        </div>
                        ${lim.descricao ? `<div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5;">${lim.descricao}</div>` : ''}
                    </div>`;
            }
        }

        // Contato de emergência
        const hasEmerg = p.contatoEmergenciaNome || p.nomeMae || p.nomePai;
        if (hasEmerg) {
            html += `
                <div class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D94452" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                    Contatos de Emergência
                </div>
                <div class="emergency-card">
                    <div class="emergency-label">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                        Emergência
                    </div>
                    <div class="emerg-row">`;

            if (p.contatoEmergenciaNome) {
                html += `<div class="emerg-contact">
                    <div class="emerg-info">
                        <div class="emerg-badge">Contato principal</div>
                        <div class="emerg-name">${p.contatoEmergenciaNome}</div>
                        ${p.contatoEmergenciaTel ? `<div class="emerg-tel">${p.contatoEmergenciaTel}</div>` : ''}
                    </div>
                </div>`;
            }

            if (p.nomeMae) {
                if (p.contatoEmergenciaNome) html += `<div class="divider"></div>`;
                html += `<div class="emerg-contact">
                    <div class="emerg-info">
                        <div class="emerg-badge">Mãe</div>
                        <div class="emerg-name">${p.nomeMae}</div>
                        ${p.telMae ? `<div class="emerg-tel">${p.telMae}</div>` : ''}
                    </div>
                </div>`;
            }

            if (p.nomePai) {
                html += `<div class="divider"></div>
                <div class="emerg-contact">
                    <div class="emerg-info">
                        <div class="emerg-badge">Pai</div>
                        <div class="emerg-name">${p.nomePai}</div>
                        ${p.telPai ? `<div class="emerg-tel">${p.telPai}</div>` : ''}
                    </div>
                </div>`;
            }

            html += `</div></div>`;
        }

        html += `
            <div class="footer-note">
                Dados compartilhados via <a href="https://vitaehealth2906-ops.github.io/vitae-app/">VITAE</a><br>
                RG da Saúde Digital — Plataforma de saúde pessoal
            </div>`;

        document.getElementById('mainContent').innerHTML = html;
    }

    loadPublicRG();
</script>
</body>
</html>
