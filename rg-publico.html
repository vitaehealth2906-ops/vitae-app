<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — RG da Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#C5A55A; --green:#4AD9A4; --red:#D94452; --blue:#4A90E2; --orange:#F0A050; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; min-height:100vh; background:var(--bg);
            overflow-y:auto; position:relative;
        }
        @media (min-width:394px) {
            .phone { height:852px; max-height:100vh; border-radius:52px; overflow:hidden;
                box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
                overflow-y:auto;
            }
        }
        .content { padding:36px 20px 52px; }

        /* Header */
        .pub-header { text-align:center; margin-bottom:22px; }
        .pub-logo { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
        .pub-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#fff; line-height:1.2; }
        .pub-badge { display:inline-flex; align-items:center; gap:6px; margin-top:10px; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(74,217,164,0.1); border:1px solid rgba(74,217,164,0.2); color:var(--green); }
        .pub-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }

        /* RG Card (premium) */
        .rg-card {
            background:linear-gradient(145deg, rgba(30,25,18,0.98), rgba(16,13,8,0.98));
            border:1.5px solid rgba(197,165,90,0.3); border-radius:20px;
            padding:22px; margin-bottom:20px; position:relative; overflow:hidden;
            box-shadow:0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(197,165,90,0.12);
        }
        .rg-card::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; background:radial-gradient(circle, rgba(197,165,90,0.07) 0%, transparent 70%); pointer-events:none; }
        .rg-brand { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.18em; color:rgba(197,165,90,0.45); text-transform:uppercase; margin-bottom:10px; }
        .rg-name { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:#fff; margin-bottom:14px; line-height:1.2; }
        .rg-cpf { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,0.28); letter-spacing:0.05em; margin-bottom:16px; }
        .rg-fields { display:flex; gap:20px; flex-wrap:wrap; }
        .rg-field { min-width:56px; }
        .rg-field-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.25); margin-bottom:3px; }
        .rg-field-value { font-size:14px; font-weight:700; color:rgba(255,255,255,0.8); }
        .rg-field-value.blood { font-size:20px; color:var(--gold); }
        .rg-plan { margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:8px; }
        .rg-plan-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.22); }
        .rg-plan-value { font-size:12px; font-weight:600; color:rgba(255,255,255,0.6); }
        .rg-plan-card { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.3); margin-left:auto; }

        /* Sections */
        .section-title {
            font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#fff;
            margin:20px 0 10px; display:flex; align-items:center; gap:8px;
        }

        .glass-card {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:16px; padding:14px; margin-bottom:10px;
        }

        /* Tags */
        .tags-wrap { display:flex; flex-wrap:wrap; gap:6px; }
        .tag { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:12px; font-weight:500; line-height:1; }
        .tag.allergy { background:rgba(217,68,82,0.1); color:#e55; border:1px solid rgba(217,68,82,0.2); }
        .tag.allergy-grave { background:rgba(217,68,82,0.18); color:#ff7070; border:1px solid rgba(217,68,82,0.4); font-weight:700; }
        .tag.med { background:rgba(74,144,226,0.1); color:var(--blue); border:1px solid rgba(74,144,226,0.18); }
        .tag.cond { background:rgba(197,165,90,0.08); color:var(--gold); border:1px solid rgba(197,165,90,0.18); }
        .tag.surgery { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.09); }
        .tag.access { background:rgba(74,217,164,0.07); color:var(--green); border:1px solid rgba(74,217,164,0.15); }
        .tag.family { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.07); }
        .tag.exam-ok { background:rgba(74,217,164,0.07); color:var(--green); border:1px solid rgba(74,217,164,0.15); }
        .tag.exam-warn { background:rgba(240,160,80,0.1); color:var(--orange); border:1px solid rgba(240,160,80,0.2); }
        .tag.exam-crit { background:rgba(217,68,82,0.1); color:#e55; border:1px solid rgba(217,68,82,0.2); }

        /* Warning box */
        .warn-box { background:rgba(240,160,80,0.07); border:1px solid rgba(240,160,80,0.2); border-radius:12px; padding:12px 14px; margin-top:10px; display:flex; align-items:flex-start; gap:10px; }
        .warn-box svg { flex-shrink:0; margin-top:1px; }
        .warn-text { font-size:12px; color:rgba(240,160,80,0.9); line-height:1.5; }
        .warn-text strong { display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:3px; }

        /* Exame card */
        .exam-card { padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); text-decoration:none; display:block; }
        .exam-card:last-child { border-bottom:none; padding-bottom:0; }
        .exam-card:first-child { padding-top:0; }
        .exam-card.clickable { cursor:pointer; transition:opacity .2s; }
        .exam-card.clickable:hover { opacity:0.8; }
        .exam-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .exam-name { font-size:13px; font-weight:600; color:rgba(255,255,255,0.75); flex:1; }
        .exam-date { font-size:11px; color:rgba(255,255,255,0.25); }
        .exam-arrow { font-size:14px; color:rgba(197,165,90,0.5); flex-shrink:0; }
        .exam-markers { display:flex; flex-wrap:wrap; gap:5px; }

        /* Emergency */
        .emergency-card { background:rgba(217,68,82,0.06); border:1px solid rgba(217,68,82,0.2); border-radius:16px; padding:14px; margin-bottom:10px; }
        .emergency-label { font-size:10px; color:var(--red); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
        .emerg-contact { display:flex; flex-direction:column; }
        .emerg-badge { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.22); margin-bottom:2px; }
        .emerg-name { font-size:14px; font-weight:600; color:#fff; }
        .emerg-tel { font-size:13px; color:rgba(255,255,255,0.4); margin-top:1px; }
        .emerg-divider { height:1px; background:rgba(217,68,82,0.12); margin:10px 0; }

        /* Footer */
        .footer-note { text-align:center; padding:20px 12px 4px; font-size:11px; color:rgba(255,255,255,0.15); line-height:1.6; }
        .footer-note a { color:var(--gold); text-decoration:none; }

        /* States */
        .loading { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.3); font-size:14px; }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(197,165,90,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error-state { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.35); font-size:14px; line-height:1.8; }
    </style>
</head>
<body>
<div class="phone">
    <div class="content" id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            Carregando RG da Saúde...
        </div>
    </div>
</div>

<script>
    const API_URL = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:'
        ? 'http://localhost:3002'
        : 'https://vitae-app-production.up.railway.app';

    const bloodMap = { A_POS:'A+', A_NEG:'A-', B_POS:'B+', B_NEG:'B-', AB_POS:'AB+', AB_NEG:'AB-', O_POS:'O+', O_NEG:'O-' };
    const generoMap = { MASCULINO:'Masculino', FEMININO:'Feminino', NAO_BINARIO:'Não-binário', PREFIRO_NAO_INFORMAR:'Pref. não informar' };
    const accessMap = { cadeirante:'Cadeirante', deficienciaVisual:'Def. Visual', deficienciaAuditiva:'Def. Auditiva', deficienciaCognitiva:'Def. Cognitiva', autismo:'Autismo', limitacaoPosCircurgia:'Limitação pós-cirurgia' };
    const glp1 = ['ozempic','mounjaro','wegovy','saxenda','victoza','trulicity','semaglutida','tirzepatida','liraglutida','dulaglutida'];

    function calcAge(d) {
        if (!d) return null;
        const birth = new Date(d), now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const m = now.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
        return age + ' anos';
    }

    function svgIcon(color, path) {
        return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
    }

    async function load() {
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        if (!userId) { showError('Link inválido — ID não encontrado.'); return; }

        try {
            const res = await fetch(`${API_URL}/autorizacao/rg-publico/${userId}`);
            if (!res.ok) throw new Error('Não foi possível carregar os dados');
            render(await res.json());
        } catch (e) {
            showError(e.message || 'Erro ao carregar dados');
        }
    }

    function showError(msg) {
        document.getElementById('mainContent').innerHTML = `
            <div class="error-state">
                <div style="margin-bottom:20px;opacity:0.3;">${svgIcon('#D94452','<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>')}</div>
                ${msg}<br><br>
                <a href="https://vitaehealth2906-ops.github.io/vitae-app/" style="color:#C5A55A;font-weight:600;text-decoration:none;">Baixar VITAE</a>
            </div>`;
    }

    function render({ usuario, perfil: p, alergias, medicamentos, examesRecentes }) {
        p = p || {};
        const nome = p.nomeSocial || usuario.nome || 'Paciente';
        const blood = bloodMap[p.tipoSanguineo] || null;
        const age = calcAge(p.dataNascimento);
        const hasGLP1 = (medicamentos || []).some(m => glp1.some(g => m.nome.toLowerCase().includes(g)));

        let html = `
            <!-- HEADER -->
            <div class="pub-header">
                <div class="pub-logo">VITAE · RG DA SAÚDE</div>
                <div class="pub-title">${nome}</div>
                <div class="pub-badge">Verificado</div>
            </div>

            <!-- BLOCO 1 — IDENTIFICAÇÃO -->
            <div class="rg-card">
                <div class="rg-brand">VITAE · RG DA SAÚDE</div>
                <div class="rg-name">${nome}</div>
                ${p.cpf ? `<div class="rg-cpf">CPF ${p.cpf}</div>` : ''}
                <div class="rg-fields">
                    ${blood ? `<div class="rg-field"><div class="rg-field-label">Tipo Sang.</div><div class="rg-field-value blood">${blood}</div></div>` : ''}
                    ${age ? `<div class="rg-field"><div class="rg-field-label">Idade</div><div class="rg-field-value">${age}</div></div>` : ''}
                    ${p.genero ? `<div class="rg-field"><div class="rg-field-label">Gênero</div><div class="rg-field-value">${generoMap[p.genero] || p.genero}</div></div>` : ''}
                </div>
                ${p.planoSaude ? `<div class="rg-plan">
                    <div class="rg-plan-label">Plano</div>
                    <div class="rg-plan-value">${p.planoSaude}</div>
                    ${p.carteirinhaPlano ? `<div class="rg-plan-card">${p.carteirinhaPlano}</div>` : ''}
                </div>` : ''}
            </div>`;

        // BLOCO 2 — ALERGIAS
        if (alergias && alergias.length > 0) {
            html += `
                <div class="section-title">${svgIcon('#D94452','<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>')} Alergias</div>
                <div class="glass-card">
                    <div class="tags-wrap">
                        ${alergias.map(a => {
                            const grave = a.gravidade && ['GRAVE','SEVERA','ANAFILAXIA'].includes((a.gravidade||'').toUpperCase());
                            return `<span class="tag ${grave ? 'allergy-grave' : 'allergy'}">${grave ? '⚠ ' : ''}${a.nome}${a.gravidade ? ` · ${a.gravidade}` : ''}</span>`;
                        }).join('')}
                    </div>
                </div>`;
        } else {
            html += `
                <div class="section-title">${svgIcon('#D94452','<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>')} Alergias</div>
                <div class="glass-card" style="font-size:13px;color:rgba(255,255,255,0.3);">Nenhuma alergia conhecida cadastrada</div>`;
        }

        // BLOCO 3 — MEDICAMENTOS
        if (medicamentos && medicamentos.length > 0) {
            html += `
                <div class="section-title">${svgIcon('#4A90E2','<path d="M10.5 1.5H8C4.68 1.5 2 4.18 2 7.5S4.68 13.5 8 13.5h8c3.32 0 6-2.68 6-6s-2.68-6-6-6h-2.5"/><line x1="12" y1="1.5" x2="12" y2="13.5"/>')} Medicamentos em Uso</div>
                <div class="glass-card">
                    <div class="tags-wrap">
                        ${medicamentos.map(m => `<span class="tag med">${m.nome}${m.dosagem ? ` ${m.dosagem}` : ''}${m.frequencia ? ` · ${m.frequencia}` : ''}</span>`).join('')}
                    </div>
                    ${hasGLP1 ? `<div class="warn-box">
                        ${svgIcon('#F0A050','<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>')}
                        <div class="warn-text"><strong>Agonista GLP-1 (Ozempic / Mounjaro)</strong>Paciente usa GLP-1. Para anestesia, jejum deve ser estendido para 24-48h.</div>
                    </div>` : ''}
                </div>`;
        }

        // BLOCO 4 — CONDIÇÕES DE SAÚDE
        if (p.condicoes) {
            const conds = p.condicoes.split(/[,;]/).map(c => c.trim()).filter(Boolean);
            if (conds.length > 0) {
                html += `
                    <div class="section-title">${svgIcon('#C5A55A','<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>')} Condições de Saúde</div>
                    <div class="glass-card"><div class="tags-wrap">${conds.map(c => `<span class="tag cond">${c}</span>`).join('')}</div></div>`;
            }
        }

        // BLOCO 5 — CIRURGIAS
        if (p.cirurgias && p.cirurgias.length > 0) {
            html += `
                <div class="section-title">${svgIcon('rgba(255,255,255,0.35)','<path d="M18 2l4 4-10 10H8v-4L18 2z"/><line x1="2" y1="22" x2="8" y2="16"/>')} Cirurgias Anteriores</div>
                <div class="glass-card"><div class="tags-wrap">${p.cirurgias.map(c => `<span class="tag surgery">${c}</span>`).join('')}</div></div>`;
        }

        // BLOCO 6 — EXAMES RECENTES
        if (examesRecentes && examesRecentes.length > 0) {
            const examHtml = examesRecentes.map(e => {
                const dt = e.dataExame ? new Date(e.dataExame).toLocaleDateString('pt-BR') : '—';
                const statusMap = { NORMAL:'exam-ok', ATENCAO:'exam-warn', CRITICO:'exam-crit', PENDENTE:'exam-warn' };
                const markerHtml = (e.parametros || []).map(mp =>
                    `<span class="tag ${mp.classificacao === 'CRITICO' ? 'exam-crit' : 'exam-warn'}">${mp.nome}: ${mp.valor}${mp.unidade ? ' '+mp.unidade : ''}</span>`
                ).join('');
                const isClickable = e.id && e.status === 'PROCESSADO';
                const tag = isClickable ? `<a class="exam-card clickable" href="exame-publico.html?user=${usuario.id}&exam=${e.id}">` : '<div class="exam-card">';
                const closeTag = isClickable ? '</a>' : '</div>';
                return `${tag}
                    <div class="exam-top">
                        <div class="exam-name">${e.tipoExame || e.nomeArquivo || 'Exame'}</div>
                        <div class="exam-date">${dt}</div>
                        ${e.statusGeral ? `<span class="tag ${statusMap[e.statusGeral] || 'exam-ok'}" style="font-size:10px;padding:3px 8px;">${e.statusGeral}</span>` : (e.status === 'PROCESSANDO' ? `<span class="tag exam-warn" style="font-size:10px;padding:3px 8px;">Processando</span>` : '')}
                        ${isClickable ? '<span class="exam-arrow">›</span>' : ''}
                    </div>
                    ${markerHtml ? `<div class="exam-markers">${markerHtml}</div>` : ''}
                ${closeTag}`;
            }).join('');
            html += `
                <div class="section-title">${svgIcon('#4AD9A4','<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>')} Últimos Exames</div>
                <div class="glass-card">${examHtml}</div>`;
        }

        // BLOCO 7 — HISTÓRICO FAMILIAR
        if (p.historicoFamiliar && p.historicoFamiliar.length > 0) {
            html += `
                <div class="section-title">${svgIcon('rgba(255,255,255,0.3)','<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>')} Histórico Familiar</div>
                <div class="glass-card"><div class="tags-wrap">${p.historicoFamiliar.map(h => `<span class="tag family">${h}</span>`).join('')}</div></div>`;
        }

        // BLOCO 8 — ACESSIBILIDADE
        if (p.limitacoesAcessibilidade) {
            const lim = p.limitacoesAcessibilidade;
            const ativas = Object.keys(accessMap).filter(k => lim[k]);
            if (ativas.length > 0 || lim.descricao) {
                html += `
                    <div class="section-title">${svgIcon('#4AD9A4','<circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>')} Acessibilidade</div>
                    <div class="glass-card">
                        <div class="tags-wrap">${ativas.map(k => `<span class="tag access">${accessMap[k]}</span>`).join('')}</div>
                        ${lim.descricao ? `<div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,0.35);line-height:1.5;">${lim.descricao}</div>` : ''}
                    </div>`;
            }
        }

        // BLOCO 9 — CONTATOS DE EMERGÊNCIA
        const hasEmerg = p.contatoEmergenciaNome || p.nomeMae || p.nomePai;
        if (hasEmerg) {
            html += `
                <div class="section-title">${svgIcon('#D94452','<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>')} Contatos de Emergência</div>
                <div class="emergency-card">
                    <div class="emergency-label">${svgIcon('currentColor','<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>')} EMERGÊNCIA</div>`;

            const contacts = [];
            if (p.contatoEmergenciaNome) contacts.push({ badge:'Contato Principal', name:p.contatoEmergenciaNome, tel:p.contatoEmergenciaTel });
            if (p.nomeMae) contacts.push({ badge:'Mãe', name:p.nomeMae, tel:p.telMae });
            if (p.nomePai) contacts.push({ badge:'Pai', name:p.nomePai, tel:p.telPai });

            html += contacts.map((c, i) => `
                ${i > 0 ? '<div class="emerg-divider"></div>' : ''}
                <div class="emerg-contact">
                    <div class="emerg-badge">${c.badge}</div>
                    <div class="emerg-name">${c.name}</div>
                    ${c.tel ? `<a href="tel:${c.tel.replace(/\D/g,'')}" class="emerg-tel" style="text-decoration:none;">${c.tel}</a>` : ''}
                </div>`).join('');

            html += `</div>`;
        }

        html += `
            <div class="footer-note">
                Dados compartilhados via <a href="https://vitaehealth2906-ops.github.io/vitae-app/">VITAE</a><br>
                RG da Saúde Digital
            </div>`;

        document.getElementById('mainContent').innerHTML = html;
    }

    load();
</script>
</body>
</html>
