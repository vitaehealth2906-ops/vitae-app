<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — RG da Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0A0A0A; --gold:#C5A55A; --green:#4AD9A4; --red:#D94452; --blue:#4A90E2; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',sans-serif; }
        .phone {
            width:393px; max-width:100vw; min-height:100vh; background:var(--bg);
            overflow:hidden; position:relative;
        }
        @media (min-width:394px) {
            .phone { height:852px; max-height:100vh; border-radius:52px;
                box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
            }
        }
        .content { padding:40px 20px 40px; overflow-y:auto; }

        /* Header */
        .pub-header { text-align:center; margin-bottom:28px; }
        .pub-logo {
            font-family:'DM Mono',monospace; font-size:11px;
            letter-spacing:0.2em; color:var(--gold); text-transform:uppercase;
            margin-bottom:8px;
        }
        .pub-title {
            font-family:'Playfair Display',serif;
            font-size:24px; font-weight:700; color:#fff;
        }
        .pub-badge {
            display:inline-flex; align-items:center; gap:6px;
            margin-top:8px; padding:4px 12px; border-radius:20px;
            font-size:11px; font-weight:600;
            background:rgba(74,217,164,0.1); border:1px solid rgba(74,217,164,0.2);
            color:var(--green);
        }
        .pub-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }

        /* RG Card */
        .rg-card {
            background:linear-gradient(145deg, rgba(30,25,18,0.95), rgba(20,16,10,0.95));
            border:1.5px solid rgba(197,165,90,0.3); border-radius:20px;
            padding:24px; margin-bottom:20px; position:relative; overflow:hidden;
            box-shadow:0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(197,165,90,0.1);
        }
        .rg-card::before {
            content:''; position:absolute; top:0; right:0; width:200px; height:200px;
            background:radial-gradient(circle, rgba(197,165,90,0.06) 0%, transparent 70%);
        }
        .rg-name {
            font-family:'Playfair Display',serif;
            font-size:28px; font-weight:700; color:#fff; margin-bottom:4px;
            text-transform:capitalize;
        }
        .rg-cpf {
            font-family:'DM Mono',monospace; font-size:12px;
            color:rgba(255,255,255,0.35); letter-spacing:0.05em; margin-bottom:18px;
        }
        .rg-fields { display:flex; gap:24px; }
        .rg-field-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.3); margin-bottom:3px; }
        .rg-field-value { font-size:13px; font-weight:600; color:rgba(255,255,255,0.7); }

        /* Info sections */
        .section-title {
            font-family:'Playfair Display',serif;
            font-size:18px; font-weight:700; color:#fff;
            margin:24px 0 12px;
        }
        .glass-card {
            background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.06); border-radius:16px;
            padding:16px; margin-bottom:12px;
        }
        .info-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .info-row:last-child { border-bottom:none; }
        .info-row-icon { font-size:18px; width:32px; text-align:center; flex-shrink:0; }
        .info-row-text { font-size:14px; color:rgba(255,255,255,0.6); }
        .info-row-label { font-size:10px; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:0.05em; }

        .tag { display:inline-block; padding:4px 10px; border-radius:8px; font-size:12px; font-weight:500; margin:3px 4px 3px 0; }
        .tag.med { background:rgba(74,144,226,0.1); color:var(--blue); border:1px solid rgba(74,144,226,0.15); }
        .tag.allergy { background:rgba(217,68,82,0.1); color:var(--red); border:1px solid rgba(217,68,82,0.15); }

        .emergency-card {
            background:rgba(217,68,82,0.06); border:1px solid rgba(217,68,82,0.15);
            border-radius:16px; padding:16px; margin-bottom:12px;
        }
        .emergency-label { font-size:10px; color:var(--red); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; margin-bottom:8px; }
        .emergency-name { font-size:16px; font-weight:600; color:#fff; }
        .emergency-tel { font-size:14px; color:rgba(255,255,255,0.4); margin-top:2px; }

        .footer-note {
            text-align:center; padding:20px; font-size:11px;
            color:rgba(255,255,255,0.2); line-height:1.5;
        }
        .footer-note a { color:var(--gold); text-decoration:none; }

        .loading { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.3); font-size:14px; }
        .loading-spinner {
            width:40px; height:40px; border:3px solid rgba(197,165,90,0.15);
            border-top-color:var(--gold); border-radius:50%;
            animation:spin 0.8s linear infinite; margin:0 auto 16px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error { text-align:center; padding:80px 20px; color:var(--red); font-size:14px; }
    </style>
    <link rel="stylesheet" href="vitae-glass.css">
</head>
<body>
<div class="phone">
    <div class="content" id="mainContent">
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            Carregando RG da Saúde...
        </div>
    </div>
</div>

<script>
    const API_URL = ['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:'
        ? 'http://localhost:3002'
        : 'https://vitae-app-production.up.railway.app';

    function formatCPF(cpf) {
        if (!cpf || cpf.length !== 11) return null;
        return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    function calcAge(dateStr) {
        if (!dateStr) return null;
        const birth = new Date(dateStr);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const m = now.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
        return age + ' anos';
    }

    const bloodMap = {
        'A_POS':'A+','A_NEG':'A-','B_POS':'B+','B_NEG':'B-',
        'AB_POS':'AB+','AB_NEG':'AB-','O_POS':'O+','O_NEG':'O-',
    };

    async function loadPublicRG() {
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        if (!userId) {
            showError('Link inválido — ID não encontrado.');
            return;
        }

        try {
            const res = await fetch(`${API_URL}/autorizacao/rg-publico/${userId}`);
            if (!res.ok) throw new Error('Não foi possível carregar os dados');
            const data = await res.json();
            renderRG(data);
        } catch (e) {
            showError(e.message || 'Erro ao carregar dados');
        }
    }

    function showError(msg) {
        document.getElementById('mainContent').innerHTML = `
            <div class="error">
                <div style="margin-bottom:16px;opacity:0.3;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                ${msg}<br><br>
                <a href="https://vitaehealth2906-ops.github.io/vitae-app/" style="color:var(--gold);text-decoration:none;font-weight:600;">
                    Baixar VITAE
                </a>
            </div>`;
    }

    function renderRG(data) {
        const { usuario, perfil, alergias, medicamentos } = data;
        const nome = usuario.nome || 'Paciente';
        const cpf = formatCPF(perfil.cpf);
        const blood = bloodMap[perfil.tipoSanguineo] || '—';
        const age = calcAge(perfil.dataNascimento);
        const allergyList = (alergias || []).map(a => a.nome);
        const medList = (medicamentos || []).map(m => m.nome);

        let html = `
            <div class="pub-header">
                <div class="pub-logo">VITAE · RG DA SAÚDE</div>
                <div class="pub-title">${nome}</div>
                <div class="pub-badge">Verificado</div>
            </div>

            <div class="rg-card">
                <div class="rg-name">${nome}</div>
                ${cpf ? `<div class="rg-cpf">RG-BR · ${cpf}</div>` : ''}
                <div class="rg-fields">
                    <div>
                        <div class="rg-field-label">Tipo sanguíneo</div>
                        <div class="rg-field-value">${blood}</div>
                    </div>
                    ${age ? `<div>
                        <div class="rg-field-label">Idade</div>
                        <div class="rg-field-value">${age}</div>
                    </div>` : ''}
                    <div>
                        <div class="rg-field-label">Alergias</div>
                        <div class="rg-field-value">${allergyList.length > 0 ? allergyList.slice(0,2).join(', ') : 'Nenhuma'}</div>
                    </div>
                </div>
            </div>`;

        if (allergyList.length > 0) {
            html += `
                <div class="section-title">Alergias</div>
                <div class="glass-card">
                    ${allergyList.map(a => `<span class="tag allergy">${a}</span>`).join('')}
                </div>`;
        }

        if (medList.length > 0) {
            html += `
                <div class="section-title">Medicamentos em uso</div>
                <div class="glass-card">
                    ${medList.map(m => `<span class="tag med">${m}</span>`).join('')}
                </div>`;
        }

        if (perfil.contatoEmergenciaNome) {
            html += `
                <div class="section-title">Contato de Emergência</div>
                <div class="emergency-card">
                    <div class="emergency-label">Emergência</div>
                    <div class="emergency-name">${perfil.contatoEmergenciaNome}</div>
                    <div class="emergency-tel">${perfil.contatoEmergenciaTel || '—'}</div>
                </div>`;
        }

        html += `
            <div class="footer-note">
                Dados compartilhados via <a href="https://vitaehealth2906-ops.github.io/vitae-app/">VITAE</a><br>
                RG da Saúde Digital
            </div>`;

        document.getElementById('mainContent').innerHTML = html;
    }

    loadPublicRG();
</script>
</body>
</html>
