<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vitaid — Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vitae-core.css">
    <link rel="stylesheet" href="vitae-glass.css">
    <link rel="stylesheet" href="vitae-light.css">
    <style>
        body{background:#F4F6FA;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;}
        .redir{text-align:center;color:#9CA3AF;font-size:14px;}
        @media(max-width:480px){html,body{padding:0!important;overflow-x:hidden;}}
    </style>
</head>
<body>
    <div class="redir">Redirecionando para o login...</div>
    <script src="api.js"></script>
    <script>
        // Se ja esta logado, vai para a home certa
        if (typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
            const u = vitaeAPI.getUsuario();
            window.location.replace((u && u.tipo === 'MEDICO') ? '20-medico-dashboard.html' : '08-perfil.html');
        } else {
            // Vai para a tela de cadastro/login unificada em modo "login"
            sessionStorage.setItem('vitae_prefer_login', '1');
            window.location.replace('03-cadastro.html');
        }
    </script>
</body>
</html>
