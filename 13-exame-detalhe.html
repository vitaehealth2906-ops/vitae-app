<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Detalhe do Exame</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        /* Entrance curtain */
        .curtain-left, .curtain-right {
            position:absolute; top:0; width:50%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
        }
        .curtain-left { left:0; animation:curtainSlideLeft 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        .curtain-right { right:0; animation:curtainSlideRight 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        @keyframes curtainSlideLeft { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }
        @keyframes curtainSlideRight { 0%{transform:translateX(0)} 100%{transform:translateX(100%)} }

        .reveal-line {
            position:absolute; top:0; left:50%; width:2px; height:100%;
            background:linear-gradient(to bottom, transparent, #C5A55A, transparent);
            z-index:31; pointer-events:none;
            transform:translateX(-50%);
            animation:revealLine 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
            opacity:0.8;
        }
        @keyframes revealLine {
            0% { opacity:0.8; transform:translateX(-50%) scaleY(0); }
            30% { opacity:1; transform:translateX(-50%) scaleY(1); }
            100% { opacity:0; transform:translateX(-50%) scaleY(1); }
        }

        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:40; pointer-events:none;
            opacity:0; transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; pointer-events:all; }

        .content {
            height:calc(100% - 80px);
            overflow-y:auto; overflow-x:hidden;
            padding:60px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header row */
        .page-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.6s ease 0.5s both;
        }
        .back-btn {
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s; flex-shrink:0;
        }
        .back-btn:hover { background:rgba(255,255,255,0.1); }
        .back-btn:active { transform:scale(0.9); }
        .header-right-btn {
            padding:8px 16px; border-radius:10px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            font-family:'Inter',sans-serif;
            font-size:11px; font-weight:700; letter-spacing:1px;
            text-transform:uppercase;
            color:rgba(255,255,255,0.4);
            cursor:pointer; transition:all 0.2s; text-decoration:none;
        }
        .header-right-btn:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }

        /* ── HERO CARD (dark, horizontal) ── */
        .hero-card {
            background:linear-gradient(135deg, #1a1714 0%, #121110 100%);
            border:1px solid rgba(197,165,90,0.12);
            border-radius:18px;
            padding:20px 22px;
            margin-bottom:24px;
            display:flex; align-items:center; justify-content:space-between;
            gap:16px;
            opacity:0; animation:fadeUp 0.5s ease 0.6s both;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            overflow:hidden; position:relative;
        }
        .hero-card::before {
            content:''; position:absolute; top:-40%; right:-20%;
            width:160px; height:160px; border-radius:50%;
            background:radial-gradient(circle, rgba(197,165,90,0.06) 0%, transparent 70%);
            pointer-events:none;
        }
        .hero-left { flex:1; position:relative; z-index:1; }
        .hero-exam-label {
            font-size:9px; font-weight:700; letter-spacing:1.5px;
            text-transform:uppercase;
            color:rgba(197,165,90,0.5);
            margin-bottom:6px;
        }
        .hero-exam-name {
            font-family:'Playfair Display',serif;
            font-size:15px; font-weight:700; color:rgba(255,255,255,0.85);
            line-height:1.3; margin-bottom:4px;
        }
        .hero-exam-meta {
            font-size:11px; color:rgba(255,255,255,0.25);
            margin-bottom:14px;
        }
        .hero-btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:10px 20px; border-radius:10px;
            background:#C5A55A; color:#0A0A0A;
            font-family:'Inter',sans-serif;
            font-size:12px; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px;
            border:none; cursor:pointer;
            transition:all 0.25s;
            box-shadow:0 4px 16px rgba(197,165,90,0.3);
        }
        .hero-btn:hover { background:#d4b76a; box-shadow:0 6px 20px rgba(197,165,90,0.4); }
        .hero-btn:active { transform:scale(0.96); }

        .hero-right { position:relative; z-index:1; text-align:right; flex-shrink:0; }
        .hero-score {
            font-family:'Playfair Display',serif;
            font-size:52px; font-weight:800; line-height:1;
            color:#fff;
        }
        .hero-score-sub {
            font-size:14px; font-weight:500; color:rgba(255,255,255,0.25);
            margin-top:2px;
        }
        .hero-score-status {
            font-size:11px; font-weight:700; margin-top:4px;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .hero-score-status.normal { color:#4AD9A4; }
        .hero-score-status.attention { color:#C5A55A; }
        .hero-score-status.critical { color:#D94452; }

        /* ── EXPLANATION SECTION ── */
        .explanation-section {
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.5s ease 0.75s both;
        }
        .explanation-text {
            font-size:14px; line-height:1.8;
            color:rgba(255,255,255,0.5);
        }
        .explanation-text strong {
            color:rgba(255,255,255,0.75);
            font-weight:600;
        }

        /* ── BIOMARCADORES GRID ── */
        .bio-section {
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.5s ease 0.9s both;
        }
        .section-label {
            font-size:10px; font-weight:700;
            color:rgba(255,255,255,0.2);
            letter-spacing:1.5px;
            text-transform:uppercase;
            margin-bottom:14px;
        }
        .bio-grid {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:10px;
        }
        .bio-chip {
            background:rgba(197,165,90,0.04);
            border:1px solid rgba(197,165,90,0.15);
            border-radius:14px;
            padding:14px 10px 12px;
            text-align:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position:relative;
            overflow:hidden;
        }
        .bio-chip::before {
            content:''; position:absolute; inset:0;
            border-radius:14px;
            background:radial-gradient(circle at 50% 0%, rgba(197,165,90,0.08) 0%, transparent 70%);
            opacity:0; transition:opacity 0.3s;
        }
        .bio-chip:hover::before { opacity:1; }
        .bio-chip:hover {
            border-color:rgba(197,165,90,0.35);
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(197,165,90,0.1);
        }
        .bio-chip:active { transform:scale(0.95); }
        .bio-chip.normal { border-color:rgba(197,165,90,0.15); }
        .bio-chip.attention { border-color:rgba(197,165,90,0.35); background:rgba(197,165,90,0.06); }
        .bio-chip.critical { border-color:rgba(217,68,82,0.3); background:rgba(217,68,82,0.04); }

        .bio-chip-status {
            width:18px; height:18px; border-radius:50%;
            margin:0 auto 8px;
            display:flex; align-items:center; justify-content:center;
        }
        .bio-chip.normal .bio-chip-status { background:rgba(74,217,164,0.12); }
        .bio-chip.attention .bio-chip-status { background:rgba(197,165,90,0.15); }
        .bio-chip.critical .bio-chip-status { background:rgba(217,68,82,0.12); }

        .bio-chip-name {
            font-size:11px; font-weight:600;
            color:rgba(255,255,255,0.55);
            margin-bottom:4px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .bio-chip-value {
            font-size:15px; font-weight:800;
            color:rgba(255,255,255,0.85);
            line-height:1;
        }
        .bio-chip.attention .bio-chip-value { color:#C5A55A; }
        .bio-chip.critical .bio-chip-value { color:#D94452; }
        .bio-chip-unit {
            font-size:9px; font-weight:500;
            color:rgba(255,255,255,0.2);
            margin-top:3px;
        }

        /* Chip entrance stagger */
        .bio-chip { opacity:0; animation:chipPop 0.4s ease both; }
        @keyframes chipPop {
            0% { opacity:0; transform:scale(0.85) translateY(10px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }

        /* ── INSIGHTS SECTION ── */
        .insights-section {
            margin-bottom:24px;
            opacity:0; animation:fadeUp 0.5s ease 1.05s both;
        }
        .insight-card {
            display:flex; align-items:flex-start; gap:14px;
            padding:16px;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:16px;
            margin-bottom:10px;
            transition:all 0.2s;
        }
        .insight-card:hover { background:rgba(255,255,255,0.05); }
        .insight-icon {
            width:36px; height:36px; border-radius:10px;
            background:rgba(197,165,90,0.08);
            display:flex; align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0;
        }
        .insight-content { flex:1; }
        .insight-title {
            font-size:14px; font-weight:700;
            color:rgba(255,255,255,0.8);
            margin-bottom:3px;
        }
        .insight-text {
            font-size:12px; line-height:1.6;
            color:rgba(255,255,255,0.35);
        }

        /* ── MODAL BIOMARCADOR DETAIL ── */
        .modal-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            z-index:35; display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.3s ease;
        }
        .modal-overlay.show { opacity:1; pointer-events:all; }
        .modal-sheet {
            width:100%; background:#1A1A1A;
            border-radius:24px 24px 0 0;
            padding:20px 24px 40px;
            transform:translateY(100%);
            transition:transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height:60%;
            overflow-y:auto;
        }
        .modal-overlay.show .modal-sheet { transform:translateY(0); }
        .modal-handle {
            width:40px; height:4px; border-radius:2px;
            background:rgba(255,255,255,0.15);
            margin:0 auto 20px;
        }
        .modal-param-name {
            font-size:18px; font-weight:700; color:#fff;
            margin-bottom:4px;
        }
        .modal-param-value {
            font-size:28px; font-weight:800; margin-bottom:2px;
        }
        .modal-param-value.normal { color:#4AD9A4; }
        .modal-param-value.attention { color:#C5A55A; }
        .modal-param-value.critical { color:#D94452; }
        .modal-param-ref {
            font-size:12px; color:rgba(255,255,255,0.3);
            margin-bottom:16px;
        }
        .modal-bar-track {
            height:8px; background:rgba(255,255,255,0.06);
            border-radius:4px; overflow:hidden;
            margin-bottom:16px;
        }
        .modal-bar-fill {
            height:100%; border-radius:4px;
            transition:width 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .modal-bar-fill.normal { background:linear-gradient(90deg, rgba(74,217,164,0.4), #4AD9A4); }
        .modal-bar-fill.attention { background:linear-gradient(90deg, rgba(197,165,90,0.4), #C5A55A); }
        .modal-bar-fill.critical { background:linear-gradient(90deg, rgba(217,68,82,0.4), #D94452); }
        .modal-close {
            width:100%; padding:14px; margin-top:12px;
            background:rgba(255,255,255,0.06); border:none; border-radius:14px;
            font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
            color:rgba(255,255,255,0.5); cursor:pointer; transition:all 0.2s;
        }
        .modal-close:hover { background:rgba(255,255,255,0.1); }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:80px;
            background:linear-gradient(to top, #0A0A0A 60%, transparent);
            display:flex; align-items:flex-end; justify-content:center;
            padding-bottom:28px; gap:32px; z-index:5;
        }
        .tab {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; transition:all 0.25s;
        }
        .tab-label {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:0.3px;
        }
        .tab:active { transform:scale(0.9); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
    </style>
    <link rel="stylesheet" href="/vitae-light.css">
</head>
<body>
<div class="phone">

    <div class="status"><span>9:41</span><span>5G</span></div>

    <!-- Modal for biomarcador detail -->

    <div class="content" id="mainContent">
        <!-- Header -->
        <div class="page-header">
            <div class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <a class="header-right-btn" onclick="navigateTo('melhorias')">Ver Melhorias</a>
        </div>

        <!-- Hero card -->
        <div class="hero-card" id="heroCard"></div>

        <!-- Explanation -->
        <div class="explanation-section" id="explanationSection"></div>

        <!-- Biomarcadores -->
        <div class="bio-section" id="bioSection"></div>

        <!-- Insights -->
        <div class="insights-section" id="insightsSection"></div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
        <div class="tab" onclick="navigateTo('perfil')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="tab-label">Perfil</span>

        <div class="tab" onclick="navigateTo('exames')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C5A55A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span class="tab-label" style="color:#C5A55A;">Exames</span>
        </div>
        <div class="tab" onclick="navigateTo('bioage')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span class="tab-label">Bio Age</span>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // ============ EXAM DATABASE (fallback for demo) ============
    const examDB = {
        'Hemograma completo': {
            icon: '\ud83e\ude78', type: 'blood',
            name: 'Hemograma Completo',
            lab: 'Sabin Medicina Diagnostica',
            date: '12 Fev, 2026', score: 9.2, status: 'normal', statusLabel: 'Normal',
            explanation: 'O hemograma completo e um exame de sangue que avalia a quantidade e qualidade das celulas do seu sangue: globulos vermelhos (que carregam oxigenio), globulos brancos (que defendem seu corpo) e plaquetas (que ajudam na cicatrizacao). <strong>Neste resultado, todos os seus valores estao dentro da faixa ideal</strong>, mostrando que seu corpo esta produzindo celulas sanguineas de forma saudavel e equilibrada.',
            items: [
                { label: 'Hemoglobina', value: '14.2', unit: 'g/dL', ref: '13.5 - 17.5', pct: 75, status: 'normal' },
                { label: 'Leucocitos', value: '7.500', unit: '/mm\u00b3', ref: '4.000 - 11.000', pct: 50, status: 'normal' },
                { label: 'Plaquetas', value: '245k', unit: '/mm\u00b3', ref: '150k - 400k', pct: 38, status: 'normal' },
                { label: 'Hematocrito', value: '42', unit: '%', ref: '38 - 50', pct: 33, status: 'normal' },
                { label: 'VCM', value: '88', unit: 'fL', ref: '80 - 100', pct: 40, status: 'normal' },
                { label: 'Neutrofilos', value: '4.200', unit: '/mm\u00b3', ref: '1.800 - 7.000', pct: 46, status: 'normal' }
            ],
            insights: [
                { icon: '\ud83c\udfc6', title: '6 marcadores saudaveis', text: 'Todos os seus valores estao dentro da faixa ideal. Continue assim!' },
                { icon: '\u26a1', title: 'Boa oxigenacao', text: 'Hemoglobina forte indica que seus musculos e orgaos recebem oxigenio adequado.' }
            ]
        },
        'Glicemia em jejum': {
            icon: '\ud83e\ude78', type: 'blood',
            name: 'Glicemia em Jejum',
            lab: 'Sabin Medicina Diagnostica',
            date: '12 Fev, 2026', score: 6.5, status: 'attention', statusLabel: 'Atencao',
            explanation: 'A glicemia em jejum mede a quantidade de acucar (glicose) no seu sangue apos um periodo sem comer. Esse exame avalia como seu corpo controla o acucar, que e a principal fonte de energia das celulas. <strong>Seu resultado de 102 mg/dL esta levemente acima do ideal</strong>, indicando que seu corpo esta tendo um pouco mais de dificuldade para processar o acucar. Isso nao significa diabetes, mas e um sinal para prestar atencao na alimentacao.',
            items: [
                { label: 'Glicemia', value: '102', unit: 'mg/dL', ref: '70 - 99', pct: 85, status: 'attention' },
                { label: 'HbA1c', value: '5.9', unit: '%', ref: '< 5.7', pct: 80, status: 'attention' }
            ],
            insights: [
                { icon: '\u26a0\ufe0f', title: '2 marcadores em atencao', text: 'Glicemia e hemoglobina glicada estao levemente elevadas.' },
                { icon: '\ud83c\udf4e', title: 'Alimentacao e chave', text: 'Reduzir carboidratos simples pode trazer seus valores de volta ao normal.' }
            ]
        }
    };

    // ============ GET EXAM FROM URL ============
    const params = new URLSearchParams(window.location.search);
    const examId = params.get('id');
    const examName = params.get('exam') || 'Hemograma completo';
    let exam = examDB[examName] || examDB['Hemograma completo'];
    const referrer = params.get('from') || 'perfil';

    // ============ LOAD FROM API ============
    async function loadExamFromAPI() {
        if (!examId) return;
        try {
            const data = await vitaeAPI.getExame(examId);
            const e = data.exame || data;

            const statusMap = { 'NORMAL': 'normal', 'ATENCAO': 'attention', 'CRITICO': 'critical' };
            const statusLabelMap = { 'NORMAL': 'Normal', 'ATENCAO': 'Atencao', 'CRITICO': 'Critico' };
            const st = statusMap[e.statusGeral] || 'normal';

            // Calculate score from parameters
            const params = e.parametros || [];
            const totalP = params.length || 1;
            const normalP = params.filter(p => p.classificacao === 'NORMAL').length;
            const score = Math.round((normalP / totalP) * 10 * 10) / 10;

            // Build explanation from AI data
            let explanation = '';
            if (e.resumoIA) {
                explanation = e.resumoIA;
            } else if (e.dadosEstruturados && e.dadosEstruturados.resumo) {
                explanation = e.dadosEstruturados.resumo;
            } else {
                explanation = 'Exame processado com sucesso.';
            }

            // Build insights
            const atencaoCount = params.filter(p => p.classificacao === 'ALTO' || p.classificacao === 'BAIXO' || p.classificacao === 'ATENCAO').length;
            const criticoCount = params.filter(p => p.classificacao === 'CRITICO').length;
            const insights = [];
            if (normalP > 0) {
                insights.push({
                    icon: '\ud83c\udfc6',
                    title: normalP + ' marcador' + (normalP > 1 ? 'es' : '') + ' saudave' + (normalP > 1 ? 'is' : 'l'),
                    text: 'Seu corpo esta em equilibrio. Veja como proteger cada conquista.'
                });
            }
            if (atencaoCount > 0) {
                insights.push({
                    icon: '\u26a0\ufe0f',
                    title: atencaoCount + ' marcador' + (atencaoCount > 1 ? 'es' : '') + ' em atencao',
                    text: 'Alguns valores merecem acompanhamento. Confira as melhorias sugeridas.'
                });
            }
            if (criticoCount > 0) {
                insights.push({
                    icon: '\ud83d\udea8',
                    title: criticoCount + ' marcador' + (criticoCount > 1 ? 'es' : '') + ' critico' + (criticoCount > 1 ? 's' : ''),
                    text: 'Consulte seu medico para avaliar esses resultados.'
                });
            }

            // Build impacts from AI
            if (e.impactosIA && Array.isArray(e.impactosIA) && e.impactosIA.length > 0) {
                e.impactosIA.forEach(imp => {
                    insights.push({
                        icon: imp.icon || imp.icone || '\ud83d\udca1',
                        title: imp.titulo || imp.title || '',
                        text: imp.descricao || imp.text || imp.texto || ''
                    });
                });
            }

            const dateStr = e.dataExame
                ? new Date(e.dataExame).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' })
                : '';

            exam = {
                icon: '\ud83e\ude78', type: 'blood',
                name: e.tipoExame || 'Exame',
                lab: e.laboratorio || '',
                date: dateStr,
                score: score,
                status: st,
                statusLabel: statusLabelMap[e.statusGeral] || 'Normal',
                explanation: explanation,
                items: params.map(p => {
                    const cls = p.classificacao === 'ALTO' || p.classificacao === 'BAIXO'
                        ? 'attention'
                        : p.classificacao === 'CRITICO' ? 'critical' : 'normal';
                    // Calculate percentage in reference range
                    let pct = 50;
                    if (p.referenciaMin != null && p.referenciaMax != null && p.valorNumerico != null) {
                        const range = parseFloat(p.referenciaMax) - parseFloat(p.referenciaMin);
                        if (range > 0) {
                            pct = Math.min(100, Math.max(5, ((parseFloat(p.valorNumerico) - parseFloat(p.referenciaMin)) / range) * 100));
                        }
                    }
                    return {
                        label: p.nome, value: String(p.valor), unit: p.unidade || '',
                        ref: p.valorReferencia || (p.referenciaMin != null ? p.referenciaMin + ' - ' + p.referenciaMax : ''),
                        pct: Math.round(pct), status: cls
                    };
                }),
                insights: insights
            };

            renderAll();
        } catch (err) {
            console.log('Erro ao carregar exame:', err.message);
        }
    }

    // ============ RENDER HERO CARD ============
    function renderHero() {
        const el = document.getElementById('heroCard');
        const scoreDisplay = exam.score != null ? exam.score.toFixed(1) : '--';
        el.innerHTML = `
            <div class="hero-left">
                <div class="hero-exam-label">${exam.lab || 'Laboratorio'}</div>
                <div class="hero-exam-name">${exam.name || examName}</div>
                <div class="hero-exam-meta">${exam.date}</div>
                <button class="hero-btn" onclick="openExamFile()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Ver exame
                </button>
            </div>
            <div class="hero-right">
                <div class="hero-score">${scoreDisplay}</div>
                <div class="hero-score-sub">/10</div>
                <div class="hero-score-status ${exam.status}">${exam.statusLabel}</div>
            </div>
        `;
    }

    // ============ RENDER EXPLANATION ============
    function renderExplanation() {
        const el = document.getElementById('explanationSection');
        el.innerHTML = `<p class="explanation-text">${exam.explanation || ''}</p>`;
    }

    // ============ RENDER BIOMARCADORES ============
    function renderBiomarcadores() {
        const el = document.getElementById('bioSection');
        if (!exam.items || exam.items.length === 0) {
            el.innerHTML = '';
            return;
        }

        const chipsHtml = exam.items.map((item, i) => {
            const statusIcon = item.status === 'normal'
                ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#4AD9A4" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
                : item.status === 'critical'
                ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#D94452" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
                : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#C5A55A" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';

            // Shorten display value
            let displayVal = item.value;
            if (displayVal.length > 6) displayVal = displayVal.substring(0, 6);

            return `
                <div class="bio-chip ${item.status}" style="animation-delay:${0.95 + i * 0.06}s" onclick="openBioDetail(${i})">
                    <div class="bio-chip-status">${statusIcon}</div>
                    <div class="bio-chip-name">${item.label}</div>
                    <div class="bio-chip-value">${displayVal}</div>
                    <div class="bio-chip-unit">${item.unit}</div>
                </div>
            `;
        }).join('');

        el.innerHTML = `
            <div class="section-label">Biomarcadores</div>
            <div class="bio-grid">${chipsHtml}</div>
        `;
    }

    // ============ RENDER INSIGHTS ============
    function renderInsights() {
        const el = document.getElementById('insightsSection');
        if (!exam.insights || exam.insights.length === 0) {
            el.innerHTML = '';
            return;
        }

        const cardsHtml = exam.insights.map(ins => `
            <div class="insight-card">
                <div class="insight-icon">${ins.icon}</div>
                <div class="insight-content">
                    <div class="insight-title">${ins.title}</div>
                    <div class="insight-text">${ins.text}</div>
                </div>
            </div>
        `).join('');

        el.innerHTML = `
            <div class="section-label">Insights</div>
            ${cardsHtml}
        `;
    }

    // ============ RENDER ALL ============
    function renderAll() {
        renderHero();
        renderExplanation();
        renderBiomarcadores();
        renderInsights();
    }

    // ============ OPEN BIOMARCADOR DETAIL ============
    function openBioDetail(index) {
        const item = exam.items[index];
        if (!item) return;
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalContent').innerHTML = `
            <div class="modal-param-name">${item.label}</div>
            <div class="modal-param-value ${item.status}">${item.value} <span style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.3)">${item.unit}</span></div>
            <div class="modal-param-ref">Referencia: ${item.ref}</div>
            <div class="modal-bar-track">
                <div class="modal-bar-fill ${item.status}" id="modalBar" style="width:0%"></div>
            </div>
            <button class="modal-close" onclick="closeModalForce()">Fechar</button>
        `;
        modal.classList.add('show');
        setTimeout(() => {
            document.getElementById('modalBar').style.width = item.pct + '%';
        }, 100);
    }

    function closeModal(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').classList.remove('show');
    }
    function closeModalForce() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    // ============ OPEN EXAM FILE ============
    function openExamFile() {
        // If we have an arquivo URL from API, open it
        if (exam.arquivoUrl) {
            window.open(exam.arquivoUrl, '_blank');
        }
    }

    // ============ NAVIGATION ============
    function goBack() {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (referrer === 'lista') window.location.href = '11-exames-lista.html';
            else window.location.href = '08-perfil.html?from=nav';
        }, 500);
    }

    function navigateTo(tab) {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
            else if (tab === 'exames') window.location.href = '11-exames-lista.html';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
            else if (tab === 'melhorias') window.location.href = '12-melhorias.html';
        }, 500);
    }

    // ============ INIT ============
    renderAll();
    if (examId && typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadExamFromAPI();
    }
</script>
</body>
</html>
