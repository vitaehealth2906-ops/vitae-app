<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitaid — Detalhe do Exame</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0D0F14;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(0,229,160,0.15), 0 0 0 3px #1A1E26, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0D0F14;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        .reveal-line {
            position:absolute; top:0; left:50%; width:2px; height:100%;
            background:linear-gradient(to bottom, transparent, #00E5A0, transparent);
            z-index:31; pointer-events:none;
            transform:translateX(-50%);
            animation:revealLine 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
            opacity:0.8;
        }
        @keyframes revealLine {
            0% { opacity:0.8; transform:translateX(-50%) scaleY(0); }
            30% { opacity:1; transform:translateX(-50%) scaleY(1); }
            100% { opacity:0; transform:translateX(-50%) scaleY(1); }
        }

        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0D0F14; z-index:40; pointer-events:none;
            opacity:0; transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; pointer-events:all; }

        .content {
            height:calc(100% - 80px);
            overflow-y:auto; overflow-x:hidden;
            padding:60px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:12px;
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.6s ease 0.5s both;
        }
        .back-btn {
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s; flex-shrink:0;
        }
        .back-btn:hover { background:rgba(255,255,255,0.1); }
        .back-btn:active { transform:scale(0.9); }

        /* Exam header — compact dark horizontal card */
        .exam-header {
            opacity:0; animation:fadeUp 0.5s ease 0.6s both;
            margin-bottom:24px;
            background:linear-gradient(135deg, #1a1714 0%, #121110 100%);
            border:1px solid rgba(0,229,160,0.12);
            border-radius:18px;
            padding:14px 18px;
            display:flex; flex-direction:column;
            gap:0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            overflow:hidden; position:relative;
        }
        .exam-header::before {
            content:''; position:absolute; top:-40%; right:-20%;
            width:140px; height:140px; border-radius:50%;
            background:radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
            pointer-events:none;
        }
        .exam-header-top {
            display:flex; align-items:flex-start; justify-content:space-between;
            gap:12px; position:relative; z-index:1;
        }
        .exam-header-left { flex:1; min-width:0; }
        .exam-header-label {
            font-size:9px; font-weight:700; letter-spacing:1.5px;
            text-transform:uppercase;
            color:rgba(0,229,160,0.5);
            margin-bottom:3px;
        }
        .exam-header-name {
            font-size:13px; font-weight:700; color:rgba(255,255,255,0.85);
            line-height:1.3; margin-bottom:0;
        }
        .exam-header-right { flex-shrink:0; text-align:right; }
        .exam-header-score {
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:38px; font-weight:800; line-height:1;
            color:#fff;
        }
        .exam-header-score-sub {
            font-size:11px; font-weight:500; color:rgba(255,255,255,0.25);
        }
        .exam-header-score-status {
            font-size:9px; font-weight:700; margin-top:2px;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .exam-header-score-status.normal { color:#00C47A; }
        .exam-header-score-status.attention { color:#00E5A0; }
        .exam-header-score-status.critical { color:#EF4444; }
        .exam-header-bottom {
            position:relative; z-index:1;
            margin-top:10px;
        }
        .exam-header-btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:8px 16px; border-radius:10px;
            background:linear-gradient(135deg,#00B4D8,#007A9E); color:#ffffff;
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:10px; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px;
            border:none; cursor:pointer;
            transition:all 0.25s;
            box-shadow:0 4px 16px rgba(0,229,160,0.3);
        }
        .exam-header-btn:hover { background:#d4b76a; }
        .exam-header-btn:active { transform:scale(0.96); }

        /* Explanation text */
        .explanation-section {
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.5s ease 0.75s both;
        }
        .explanation-text {
            font-size:13px; line-height:1.8;
            color:rgba(255,255,255,0.5);
        }
        .explanation-text strong {
            color:rgba(255,255,255,0.75);
            font-weight:600;
        }

        /* Biomarcadores grid */
        .bio-grid-section {
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.5s ease 0.9s both;
        }
        .bio-grid {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:8px;
        }
        .bio-chip {
            background:rgba(0,229,160,0.04);
            border:1px solid rgba(0,229,160,0.15);
            border-radius:12px;
            padding:8px 6px 7px;
            text-align:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position:relative; overflow:hidden;
        }
        .bio-chip::before {
            content:''; position:absolute; inset:0;
            border-radius:14px;
            background:radial-gradient(circle at 50% 0%, rgba(0,229,160,0.08) 0%, transparent 70%);
            opacity:0; transition:opacity 0.3s;
        }
        .bio-chip:hover::before { opacity:1; }
        .bio-chip:hover {
            border-color:rgba(0,229,160,0.35);
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(0,229,160,0.1);
        }
        .bio-chip:active { transform:scale(0.95); }
        .bio-chip.attention { border-color:rgba(0,229,160,0.35); background:rgba(0,229,160,0.06); }
        .bio-chip.critical { border-color:rgba(217,68,82,0.3); background:rgba(217,68,82,0.04); }
        .bio-chip-icon {
            width:14px; height:14px; border-radius:50%;
            margin:0 auto 4px;
            display:flex; align-items:center; justify-content:center;
        }
        .bio-chip.normal .bio-chip-icon { background:rgba(74,217,164,0.12); }
        .bio-chip.attention .bio-chip-icon { background:rgba(0,229,160,0.15); }
        .bio-chip.critical .bio-chip-icon { background:rgba(217,68,82,0.12); }
        .bio-chip-name {
            font-size:9px; font-weight:600;
            color:rgba(255,255,255,0.5);
            margin-bottom:2px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .bio-chip-value {
            font-size:13px; font-weight:800;
            color:rgba(255,255,255,0.85); line-height:1;
        }
        .bio-chip.attention .bio-chip-value { color:#00E5A0; }
        .bio-chip.critical .bio-chip-value { color:#EF4444; }
        .bio-chip-unit {
            font-size:7.5px; font-weight:500;
            color:rgba(255,255,255,0.2);
            margin-top:1px;
        }
        .bio-chip { opacity:0; animation:chipPop 0.4s ease both; }
        @keyframes chipPop {
            0% { opacity:0; transform:scale(0.85) translateY(10px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }

        /* Section card */
        .section-card {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:18px;
            padding:20px;
            margin-bottom:16px;
        }
        .section-card.anim { opacity:0; animation:fadeUp 0.5s ease both; }
        .section-label {
            font-size:10px; font-weight:700;
            color:rgba(255,255,255,0.2);
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:14px;
        }
        .section-summary {
            font-size:13px; line-height:1.7;
            color:rgba(255,255,255,0.55);
            margin-bottom:18px;
        }

        /* Parameter rows */
        .param-row {
            padding:12px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .param-row:last-child { border-bottom:none; }
        .param-top {
            display:flex; justify-content:space-between; align-items:baseline;
            margin-bottom:6px;
        }
        .param-name {
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.7);
        }
        .param-value {
            font-size:14px; font-weight:700; color:#fff;
        }
        .param-value .unit {
            font-size:11px; font-weight:500; color:rgba(255,255,255,0.3);
            margin-left:2px;
        }
        .param-bar-track {
            height:6px; background:rgba(255,255,255,0.06);
            border-radius:3px; overflow:hidden;
            margin-bottom:4px;
        }
        .param-bar-fill {
            height:100%; border-radius:3px;
            width:0; transition:width 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .param-bar-fill.normal { background:linear-gradient(90deg, rgba(74,217,164,0.4), #00C47A); }
        .param-bar-fill.attention { background:linear-gradient(90deg, rgba(0,229,160,0.4), #00E5A0); }
        .param-bar-fill.critical { background:linear-gradient(90deg, rgba(217,68,82,0.4), #EF4444); }
        .param-ref {
            font-size:10px; color:rgba(255,255,255,0.2);
        }

        /* Impact cards */
        .impact-card {
            display:flex; gap:12px;
            padding:14px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .impact-card:last-child { border-bottom:none; }
        .impact-icon {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
        }
        .impact-info { flex:1; }
        .impact-title {
            font-size:13px; font-weight:700; color:rgba(255,255,255,0.8);
            margin-bottom:3px;
        }
        .impact-text {
            font-size:12px; line-height:1.5;
            color:rgba(255,255,255,0.4);
        }

        /* Improvement items */
        .improvement-item {
            display:flex; gap:10px; align-items:flex-start;
            padding:10px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .improvement-item:last-child { border-bottom:none; }
        .improvement-check {
            width:20px; height:20px; border-radius:6px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; margin-top:1px;
        }
        .improvement-text {
            font-size:13px; line-height:1.5;
            color:rgba(255,255,255,0.55);
        }

        /* Mini chart */
        .chart-legend {
            display:flex; align-items:center; gap:16px;
            margin-bottom:10px;
            font-size:10px; font-weight:500;
            color:rgba(255,255,255,0.3);
        }
        .chart-legend-item {
            display:flex; align-items:center; gap:5px;
        }
        .chart-legend-line { width:16px; height:2px; border-radius:1px; }
        .chart-legend-line.gold { background:#00E5A0; }
        .chart-legend-line.green { background:#00C47A; border-style:dashed; height:0; border-top:2px dashed #00C47A; }
        .chart-svg-container {
            width:100%; height:140px;
            position:relative;
        }
        .chart-tooltip {
            position:absolute;
            background:rgba(13,15,20,0.92);
            border:1px solid rgba(0,229,160,0.25);
            border-radius:8px;
            padding:5px 10px;
            font-size:11px; font-weight:700;
            color:#fff;
            pointer-events:none;
            opacity:0;
            transition:opacity 0.15s;
            z-index:10;
            white-space:nowrap;
        }
        .chart-tooltip.visible { opacity:1; }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:80px;
            background:linear-gradient(to top, #0D0F14 60%, transparent);
            display:flex; align-items:flex-end; justify-content:center;
            padding-bottom:28px; gap:32px; z-index:5;
        }
        .tab {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; transition:all 0.25s;
        }
        .tab-label {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:0.3px;
        }
        .tab:active { transform:scale(0.9); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }

    // ============ RENDER SECTION 4: PROJECAO ============
    function renderProjecao() {
        const el = document.getElementById('sectionProjecao');
        const scores = exam.chartScores;
        const proj = exam.chartProjection;
        const months = exam.chartMonths;
        const totalPts = scores.length + proj.length - 1;
        const padL = 28, padR = 16, padT = 18, padB = 28;
        const w = 320, h = 110;
        const plotW = w - padL - padR;
        const plotH = h - padT - padB;
        const stepX = plotW / (totalPts - 1);
        const allVals = [...scores, ...proj];
        const minS = Math.min(...allVals) - 5;
        const maxS = Math.max(...allVals) + 5;

        function yPos(val) { return padT + plotH - ((val - minS) / (maxS - minS)) * plotH; }

        const pts = scores.map((s, i) => ({ x: padL + i * stepX, y: yPos(s), val: s }));
        const projPts = proj.map((s, i) => ({ x: padL + (scores.length - 1 + i) * stepX, y: yPos(s), val: s }));

        function smoothPath(points) {
            if (points.length < 2) return '';
            let d = 'M' + points[0].x + ',' + points[0].y;
            for (let i = 0; i < points.length - 1; i++) {
                const p0 = points[Math.max(0, i - 1)];
                const p1 = points[i];
                const p2 = points[i + 1];
                const p3 = points[Math.min(points.length - 1, i + 2)];
                const cp1x = p1.x + (p2.x - p0.x) / 6;
                const cp1y = p1.y + (p2.y - p0.y) / 6;
                const cp2x = p2.x - (p3.x - p1.x) / 6;
                const cp2y = p2.y - (p3.y - p1.y) / 6;
                d += ' C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2.x + ',' + p2.y;
            }
            return d;
        }

        const goldPath = smoothPath(pts);
        const greenPath = smoothPath(projPts);
        const lastProj = projPts[projPts.length - 1];
        const projScore = proj[proj.length - 1];

        // Month labels
        const monthLabels = months.map((m, i) => {
            const x = padL + i * stepX;
            const isProj = i >= scores.length;
            const isCurrent = i === scores.length - 1;
            const fill = isProj ? 'rgba(74,217,164,0.4)' : isCurrent ? 'rgba(0,229,160,0.5)' : 'rgba(255,255,255,0.25)';
            const weight = (isCurrent || i === months.length - 1) ? '600' : '500';
            return `<text x="${x}" y="${h - 4}" fill="${fill}" font-size="9" font-family="Inter,sans-serif" font-weight="${weight}" text-anchor="middle">${m}</text>`;
        }).join('');

        // Value labels on dots
        const goldLabels = pts.map((p, i) => {
            return `<text x="${p.x}" y="${p.y - 10}" fill="rgba(0,229,160,0.6)" font-size="9" font-family="Inter,sans-serif" font-weight="700" text-anchor="middle">${scores[i]}</text>`;
        }).join('');

        // Gold dots
        const goldDots = pts.map((p, i) => {
            const isLast = i === pts.length - 1;
            let html = '';
            if (isLast) {
                html += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="rgba(0,229,160,0.15)" opacity="0" class="anim-dot"/>`;
            }
            html += `<circle cx="${p.x}" cy="${p.y}" r="${isLast ? 3 : 2}" fill="${isLast ? '#00E5A0' : 'rgba(0,229,160,0.5)'}" opacity="0" class="anim-dot"/>`;
            return html;
        }).join('');

        // Green dots
        const greenDots = projPts.slice(1).map((p, i) => {
            const isLast = i === projPts.length - 2;
            let html = '';
            if (isLast) {
                html += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="rgba(74,217,164,0.15)" opacity="0" class="anim-dot"/>`;
            }
            html += `<circle cx="${p.x}" cy="${p.y}" r="${isLast ? 3 : 2}" fill="${isLast ? '#00C47A' : 'rgba(74,217,164,0.5)'}" opacity="0" class="anim-dot"/>`;
            return html;
        }).join('');

        el.innerHTML = `
            <div class="section-label">Projecao de saude</div>
            <div class="chart-legend">
                <div class="chart-legend-item"><span class="chart-legend-line gold"></span> Atual</div>
                <div class="chart-legend-item"><span class="chart-legend-line green"></span> Com melhorias</div>
            </div>
            <div class="chart-svg-container" id="chartContainer">
                <svg id="miniChart" width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="mgoldGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="rgba(0,229,160,0.3)"/>
                            <stop offset="100%" stop-color="#00E5A0"/>
                        </linearGradient>
                        <linearGradient id="mgreenGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="rgba(74,217,164,0.3)"/>
                            <stop offset="100%" stop-color="#00C47A"/>
                        </linearGradient>
                        <linearGradient id="mareaGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.15"/>
                            <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <line x1="${padL}" y1="${padT + plotH*0.33}" x2="${w - padR}" y2="${padT + plotH*0.33}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
                    <line x1="${padL}" y1="${padT + plotH*0.66}" x2="${w - padR}" y2="${padT + plotH*0.66}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
                    <path id="miniArea" d="${goldPath} L${pts[pts.length-1].x},${padT + plotH} L${pts[0].x},${padT + plotH} Z" fill="url(#mareaGrad)" opacity="0"/>
                    <path id="miniGold" d="${goldPath}" fill="none" stroke="url(#mgoldGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
                    <path id="miniGreen" d="${greenPath}" fill="none" stroke="url(#mgreenGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 3" opacity="0"/>
                    ${goldDots}
                    ${greenDots}
                    ${goldLabels}
                    ${monthLabels}
                    <text id="miniProjLabel" x="${lastProj.x}" y="${lastProj.y - 10}" fill="#00C47A" font-size="11" font-family="Inter,sans-serif" font-weight="700" text-anchor="middle" opacity="0">${projScore}</text>
                </svg>
                <div class="chart-tooltip" id="chartTooltip"></div>
            </div>
        `;

        // Animate chart after section becomes visible
        setTimeout(() => {
            const goldLine = document.getElementById('miniGold');
            const area = document.getElementById('miniArea');
            const greenLine = document.getElementById('miniGreen');
            const label = document.getElementById('miniProjLabel');

            // Gold line draw
            const goldLen = goldLine.getTotalLength();
            goldLine.style.strokeDasharray = goldLen;
            goldLine.style.strokeDashoffset = goldLen;
            goldLine.style.opacity = '1';
            let s1 = null;
            function drawGold(ts) {
                if (!s1) s1 = ts;
                const p = Math.min((ts - s1) / 900, 1);
                goldLine.style.strokeDashoffset = goldLen * (1 - (1 - Math.pow(1 - p, 3)));
                if (p < 1) requestAnimationFrame(drawGold);
            }
            requestAnimationFrame(drawGold);

            // Area fade
            setTimeout(() => { area.style.transition = 'opacity 0.6s ease'; area.style.opacity = '0.5'; }, 400);

            // Green line draw (after gold)
            setTimeout(() => {
                const greenLen = greenLine.getTotalLength();
                greenLine.style.strokeDasharray = greenLen;
                greenLine.style.strokeDashoffset = greenLen;
                greenLine.style.opacity = '1';
                let s2 = null;
                function drawGreen(ts) {
                    if (!s2) s2 = ts;
                    const p = Math.min((ts - s2) / 600, 1);
                    greenLine.style.strokeDashoffset = greenLen * (1 - (1 - Math.pow(1 - p, 3)));
                    if (p < 1) {
                        requestAnimationFrame(drawGreen);
                    } else {
                        greenLine.style.strokeDasharray = '5 3';
                        greenLine.style.strokeDashoffset = '0';
                    }
                }
                requestAnimationFrame(drawGreen);

                // Label pop
                setTimeout(() => { label.style.transition = 'opacity 0.4s ease'; label.setAttribute('opacity', '1'); }, 500);
            }, 1000);

            // Dots pop
            document.querySelectorAll('#miniChart .anim-dot').forEach((d, i) => {
                setTimeout(() => { d.style.transition = 'opacity 0.3s ease'; d.setAttribute('opacity', '1'); }, 300 + i * 60);
            });

            // Touch/hover interactivity
            const container = document.getElementById('chartContainer');
            const tooltip = document.getElementById('chartTooltip');
            const allPts = [...pts.map((p,i) => ({...p, label: months[i], color: '#00E5A0'})), ...projPts.slice(1).map((p,i) => ({...p, label: months[scores.length + i], color: '#00C47A', isProj: true}))];
            function handleChartInteraction(e) {
                const rect = container.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const xRatio = (clientX - rect.left) / rect.width;
                const svgX = xRatio * ${w};
                let closest = allPts[0], closestDist = 9999;
                for (const p of allPts) {
                    const dist = Math.abs(p.x - svgX);
                    if (dist < closestDist) { closestDist = dist; closest = p; }
                }
                const tipX = (closest.x / ${w}) * rect.width;
                const tipY = (closest.y / ${h}) * rect.height;
                tooltip.innerHTML = (closest.isProj ? 'Projeção: ' : '') + '<span style="color:' + closest.color + '">' + closest.val + '</span> · ' + closest.label;
                tooltip.style.left = Math.min(tipX - 30, rect.width - 100) + 'px';
                tooltip.style.top = (tipY - 32) + 'px';
                tooltip.classList.add('visible');
            }
            container.addEventListener('mousemove', handleChartInteraction);
            container.addEventListener('touchmove', function(e) { e.preventDefault(); handleChartInteraction(e); }, {passive: false});
            container.addEventListener('mouseleave', function() { tooltip.classList.remove('visible'); });
            container.addEventListener('touchend', function() { setTimeout(() => tooltip.classList.remove('visible'), 1500); });
        }, 1500);
    }

    // ============ ANIMATE PARAM BARS ============
    function animateParamBars() {
        setTimeout(() => {
            document.querySelectorAll('.param-bar-fill').forEach((bar, i) => {
                setTimeout(() => { bar.style.width = bar.dataset.pct + '%'; }, i * 150);
            });
        }, 1200);
    }

    // ============ NAVIGATION ============
    function goBack() {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (referrer === 'lista') window.location.href = '11-exames-lista.html';
            else window.location.href = '08-perfil.html?from=nav';
        }, 500);
    }

    function navigateTo(tab) {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
            else if (tab === 'exames') window.location.href = '11-exames-lista.html';
            else if (tab === 'editar') window.location.href = '09-dados-pessoais.html';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
        }, 500);
    }

    // ============ INIT ============
    renderHeader();
    renderExplanation();
    renderBiomarcadores();
    renderMelhorias();
    renderProjecao();
    // Carregar do backend se tiver ID
    if (examId && typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadExamFromAPI();
    }
</script>
</body>
</html>
