<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAE — Detalhe do Exame</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000;
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'Inter',sans-serif;
        }
        .phone {
            width:393px; max-width:100vw; height:852px; max-height:100vh; background:#0A0A0A;
            border-radius:52px; overflow:hidden; position:relative;
            box-shadow: 0 0 0 1px rgba(197,165,90,0.15), 0 0 0 3px #1a1a1a, 0 40px 120px rgba(0,0,0,0.9);
        }
        .notch {
            position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:126px; height:34px; background:#0A0A0A;
            border-radius:0 0 20px 20px; z-index:10;
        }
        .status {
            position:absolute; top:14px; left:28px; right:28px;
            display:flex; justify-content:space-between;
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.5);
            z-index:11;
        }

        /* Entrance curtain */
        .curtain-left, .curtain-right {
            position:absolute; top:0; width:50%; height:100%;
            background:#0A0A0A; z-index:30; pointer-events:none;
        }
        .curtain-left { left:0; animation:curtainSlideLeft 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        .curtain-right { right:0; animation:curtainSlideRight 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.2s forwards; }
        @keyframes curtainSlideLeft { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }
        @keyframes curtainSlideRight { 0%{transform:translateX(0)} 100%{transform:translateX(100%)} }

        .reveal-line {
            position:absolute; top:0; left:50%; width:2px; height:100%;
            background:linear-gradient(to bottom, transparent, #C5A55A, transparent);
            z-index:31; pointer-events:none;
            transform:translateX(-50%);
            animation:revealLine 0.9s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
            opacity:0.8;
        }
        @keyframes revealLine {
            0% { opacity:0.8; transform:translateX(-50%) scaleY(0); }
            30% { opacity:1; transform:translateX(-50%) scaleY(1); }
            100% { opacity:0; transform:translateX(-50%) scaleY(1); }
        }

        .exit-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:#0A0A0A; z-index:40; pointer-events:none;
            opacity:0; transition:opacity 0.5s ease;
        }
        .exit-overlay.active { opacity:1; pointer-events:all; }

        .content {
            height:calc(100% - 80px);
            overflow-y:auto; overflow-x:hidden;
            padding:60px 24px 24px;
            scrollbar-width:none;
        }
        .content::-webkit-scrollbar { display:none; }

        /* Header */
        .page-header {
            display:flex; align-items:center; gap:12px;
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.6s ease 0.5s both;
        }
        .back-btn {
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s; flex-shrink:0;
        }
        .back-btn:hover { background:rgba(255,255,255,0.1); }
        .back-btn:active { transform:scale(0.9); }

        /* Exam header — compact dark horizontal card */
        .exam-header {
            opacity:0; animation:fadeUp 0.5s ease 0.6s both;
            margin-bottom:24px;
            background:linear-gradient(135deg, #1a1714 0%, #121110 100%);
            border:1px solid rgba(197,165,90,0.12);
            border-radius:18px;
            padding:18px 20px;
            display:flex; align-items:center; justify-content:space-between;
            gap:14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            overflow:hidden; position:relative;
        }
        .exam-header::before {
            content:''; position:absolute; top:-40%; right:-20%;
            width:140px; height:140px; border-radius:50%;
            background:radial-gradient(circle, rgba(197,165,90,0.06) 0%, transparent 70%);
            pointer-events:none;
        }
        .exam-header-left { flex:1; position:relative; z-index:1; }
        .exam-header-label {
            font-size:9px; font-weight:700; letter-spacing:1.5px;
            text-transform:uppercase;
            color:rgba(197,165,90,0.5);
            margin-bottom:4px;
        }
        .exam-header-name {
            font-size:14px; font-weight:700; color:rgba(255,255,255,0.85);
            line-height:1.3; margin-bottom:3px;
        }
        .exam-header-date {
            font-size:11px; color:rgba(255,255,255,0.25);
            margin-bottom:12px;
        }
        .exam-header-btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:9px 18px; border-radius:10px;
            background:#C5A55A; color:#0A0A0A;
            font-family:'Inter',sans-serif;
            font-size:11px; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px;
            border:none; cursor:pointer;
            transition:all 0.25s;
            box-shadow:0 4px 16px rgba(197,165,90,0.3);
        }
        .exam-header-btn:hover { background:#d4b76a; }
        .exam-header-btn:active { transform:scale(0.96); }
        .exam-header-right { position:relative; z-index:1; text-align:right; flex-shrink:0; }
        .exam-header-score {
            font-family:'Playfair Display',serif;
            font-size:48px; font-weight:800; line-height:1;
            color:#fff;
        }
        .exam-header-score-sub {
            font-size:13px; font-weight:500; color:rgba(255,255,255,0.25);
        }
        .exam-header-score-status {
            font-size:10px; font-weight:700; margin-top:3px;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .exam-header-score-status.normal { color:#4AD9A4; }
        .exam-header-score-status.attention { color:#C5A55A; }
        .exam-header-score-status.critical { color:#D94452; }

        /* Explanation text */
        .explanation-section {
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.5s ease 0.75s both;
        }
        .explanation-text {
            font-size:13px; line-height:1.8;
            color:rgba(255,255,255,0.5);
        }
        .explanation-text strong {
            color:rgba(255,255,255,0.75);
            font-weight:600;
        }

        /* Biomarcadores grid */
        .bio-grid-section {
            margin-bottom:20px;
            opacity:0; animation:fadeUp 0.5s ease 0.9s both;
        }
        .bio-grid {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:10px;
        }
        .bio-chip {
            background:rgba(197,165,90,0.04);
            border:1px solid rgba(197,165,90,0.15);
            border-radius:14px;
            padding:12px 8px 10px;
            text-align:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position:relative; overflow:hidden;
        }
        .bio-chip::before {
            content:''; position:absolute; inset:0;
            border-radius:14px;
            background:radial-gradient(circle at 50% 0%, rgba(197,165,90,0.08) 0%, transparent 70%);
            opacity:0; transition:opacity 0.3s;
        }
        .bio-chip:hover::before { opacity:1; }
        .bio-chip:hover {
            border-color:rgba(197,165,90,0.35);
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(197,165,90,0.1);
        }
        .bio-chip:active { transform:scale(0.95); }
        .bio-chip.attention { border-color:rgba(197,165,90,0.35); background:rgba(197,165,90,0.06); }
        .bio-chip.critical { border-color:rgba(217,68,82,0.3); background:rgba(217,68,82,0.04); }
        .bio-chip-icon {
            width:18px; height:18px; border-radius:50%;
            margin:0 auto 6px;
            display:flex; align-items:center; justify-content:center;
        }
        .bio-chip.normal .bio-chip-icon { background:rgba(74,217,164,0.12); }
        .bio-chip.attention .bio-chip-icon { background:rgba(197,165,90,0.15); }
        .bio-chip.critical .bio-chip-icon { background:rgba(217,68,82,0.12); }
        .bio-chip-name {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.5);
            margin-bottom:3px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .bio-chip-value {
            font-size:14px; font-weight:800;
            color:rgba(255,255,255,0.85); line-height:1;
        }
        .bio-chip.attention .bio-chip-value { color:#C5A55A; }
        .bio-chip.critical .bio-chip-value { color:#D94452; }
        .bio-chip-unit {
            font-size:8px; font-weight:500;
            color:rgba(255,255,255,0.2);
            margin-top:2px;
        }
        .bio-chip { opacity:0; animation:chipPop 0.4s ease both; }
        @keyframes chipPop {
            0% { opacity:0; transform:scale(0.85) translateY(10px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }

        /* Section card */
        .section-card {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:18px;
            padding:20px;
            margin-bottom:16px;
        }
        .section-card.anim { opacity:0; animation:fadeUp 0.5s ease both; }
        .section-label {
            font-size:10px; font-weight:700;
            color:rgba(255,255,255,0.2);
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:14px;
        }
        .section-summary {
            font-size:13px; line-height:1.7;
            color:rgba(255,255,255,0.55);
            margin-bottom:18px;
        }

        /* Parameter rows */
        .param-row {
            padding:12px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .param-row:last-child { border-bottom:none; }
        .param-top {
            display:flex; justify-content:space-between; align-items:baseline;
            margin-bottom:6px;
        }
        .param-name {
            font-size:13px; font-weight:600; color:rgba(255,255,255,0.7);
        }
        .param-value {
            font-size:14px; font-weight:700; color:#fff;
        }
        .param-value .unit {
            font-size:11px; font-weight:500; color:rgba(255,255,255,0.3);
            margin-left:2px;
        }
        .param-bar-track {
            height:6px; background:rgba(255,255,255,0.06);
            border-radius:3px; overflow:hidden;
            margin-bottom:4px;
        }
        .param-bar-fill {
            height:100%; border-radius:3px;
            width:0; transition:width 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .param-bar-fill.normal { background:linear-gradient(90deg, rgba(74,217,164,0.4), #4AD9A4); }
        .param-bar-fill.attention { background:linear-gradient(90deg, rgba(197,165,90,0.4), #C5A55A); }
        .param-bar-fill.critical { background:linear-gradient(90deg, rgba(217,68,82,0.4), #D94452); }
        .param-ref {
            font-size:10px; color:rgba(255,255,255,0.2);
        }

        /* Impact cards */
        .impact-card {
            display:flex; gap:12px;
            padding:14px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .impact-card:last-child { border-bottom:none; }
        .impact-icon {
            width:40px; height:40px; border-radius:12px;
            background:rgba(255,255,255,0.04);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
        }
        .impact-info { flex:1; }
        .impact-title {
            font-size:13px; font-weight:700; color:rgba(255,255,255,0.8);
            margin-bottom:3px;
        }
        .impact-text {
            font-size:12px; line-height:1.5;
            color:rgba(255,255,255,0.4);
        }

        /* Improvement items */
        .improvement-item {
            display:flex; gap:10px; align-items:flex-start;
            padding:10px 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .improvement-item:last-child { border-bottom:none; }
        .improvement-check {
            width:20px; height:20px; border-radius:6px;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; margin-top:1px;
        }
        .improvement-text {
            font-size:13px; line-height:1.5;
            color:rgba(255,255,255,0.55);
        }

        /* Mini chart */
        .chart-legend {
            display:flex; align-items:center; gap:16px;
            margin-bottom:10px;
            font-size:10px; font-weight:500;
            color:rgba(255,255,255,0.3);
        }
        .chart-legend-item {
            display:flex; align-items:center; gap:5px;
        }
        .chart-legend-line { width:16px; height:2px; border-radius:1px; }
        .chart-legend-line.gold { background:#C5A55A; }
        .chart-legend-line.green { background:#4AD9A4; border-style:dashed; height:0; border-top:2px dashed #4AD9A4; }
        .chart-svg-container {
            width:100%; height:100px;
        }

        /* Tab bar */
        .tab-bar {
            position:absolute; bottom:0; left:0; right:0; height:80px;
            background:linear-gradient(to top, #0A0A0A 60%, transparent);
            display:flex; align-items:flex-end; justify-content:center;
            padding-bottom:28px; gap:32px; z-index:5;
        }
        .tab {
            display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; transition:all 0.25s;
        }
        .tab-label {
            font-size:10px; font-weight:600;
            color:rgba(255,255,255,0.25);
            letter-spacing:0.3px;
        }
        .tab:active { transform:scale(0.9); }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
    </style>
    <link rel="stylesheet" href="/vitae-light.css">
</head>

</div>

            const statusLabelMap = { 'NORMAL': 'Normal', 'ATENCAO': 'Atencao', 'CRITICO': 'Critico' };
            const st = statusMap[e.statusGeral] || 'normal';
            const dateStr = e.dataExame

            exam = {

                summary: e.resumoIA || (e.dadosEstruturados && e.dadosEstruturados.resumo) || 'Exame processado com sucesso.',
                arquivoUrl: e.arquivoUrl || null,
                items: (e.parametros || []).map(p => {
                    const cls = p.classificacao === 'ALTO' || p.classificacao === 'BAIXO' ? 'attention' : p.classificacao === 'CRITICO' ? 'critical' : 'normal';
                    let pct = 50;
                    if (p.referenciaMin != null && p.referenciaMax != null && p.valorNumerico != null) {
                        const range = parseFloat(p.referenciaMax) - parseFloat(p.referenciaMin);
                        if (range > 0) pct = Math.min(100, Math.max(5, ((parseFloat(p.valorNumerico) - parseFloat(p.referenciaMin)) / range) * 100));
                    }
                    return { label: p.nome, value: String(p.valor), unit: p.unidade || '', ref: p.valorReferencia || '', pct: Math.round(pct), status: cls };
                }),
                impacts: [],
                improvements: (e.melhoriasIA && Array.isArray(e.melhoriasIA)) ? e.melhoriasIA.map(m => m.descricao || m.texto || m) : [],
                chartScores: [70,72,74,76,78,80],
                chartProjection: [80,83,86,89],

    // ============ RENDER SECTION 4: PROJECAO ============
    function renderProjecao() {
        const el = document.getElementById('sectionProjecao');
        const scores = exam.chartScores;
        const proj = exam.chartProjection;
        const months = exam.chartMonths;
        const totalPts = scores.length + proj.length - 1;
        const w = 305, h = 80;
        const stepX = w / (totalPts - 1);
        const minS = 40, maxS = 100;

        function yPos(val) { return h - ((val - minS) / (maxS - minS)) * h; }

        const pts = scores.map((s, i) => ({ x: i * stepX, y: yPos(s) }));
        const projPts = proj.map((s, i) => ({ x: (scores.length - 1 + i) * stepX, y: yPos(s) }));

        function smoothPath(points) {
            if (points.length < 2) return '';
            let d = 'M' + points[0].x + ',' + points[0].y;
            for (let i = 0; i < points.length - 1; i++) {
                const p0 = points[Math.max(0, i - 1)];
                const p1 = points[i];
                const p2 = points[i + 1];
                const p3 = points[Math.min(points.length - 1, i + 2)];
                const cp1x = p1.x + (p2.x - p0.x) / 6;
                const cp1y = p1.y + (p2.y - p0.y) / 6;
                const cp2x = p2.x - (p3.x - p1.x) / 6;
                const cp2y = p2.y - (p3.y - p1.y) / 6;
                d += ' C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2.x + ',' + p2.y;
            }
            return d;
        }

        const goldPath = smoothPath(pts);
        const greenPath = smoothPath(projPts);
        const lastProj = projPts[projPts.length - 1];
        const projScore = proj[proj.length - 1];

        // Month labels
        const monthLabels = months.map((m, i) => {
            const x = i * stepX;
            const isProj = i >= scores.length;
            const isCurrent = i === scores.length - 1;
            const fill = isProj ? 'rgba(74,217,164,0.25)' : isCurrent ? 'rgba(197,165,90,0.4)' : 'rgba(255,255,255,0.15)';
            const weight = (isCurrent || i === months.length - 1) ? '600' : '500';
            return `<text x="${x}" y="${h + 16}" fill="${fill}" font-size="8" font-family="Inter,sans-serif" font-weight="${weight}">${m}</text>`;
        }).join('');

        // Gold dots
        const goldDots = pts.map((p, i) => {
            const isLast = i === pts.length - 1;
            let html = '';
            if (isLast) {
                html += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="rgba(197,165,90,0.15)" opacity="0" class="anim-dot"/>`;
            }
            html += `<circle cx="${p.x}" cy="${p.y}" r="${isLast ? 3 : 2}" fill="${isLast ? '#C5A55A' : 'rgba(197,165,90,0.5)'}" opacity="0" class="anim-dot"/>`;
            return html;
        }).join('');

        // Green dots
        const greenDots = projPts.slice(1).map((p, i) => {
            const isLast = i === projPts.length - 2;
            let html = '';
            if (isLast) {
                html += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="rgba(74,217,164,0.15)" opacity="0" class="anim-dot"/>`;
            }
            html += `<circle cx="${p.x}" cy="${p.y}" r="${isLast ? 3 : 2}" fill="${isLast ? '#4AD9A4' : 'rgba(74,217,164,0.5)'}" opacity="0" class="anim-dot"/>`;
            return html;
        }).join('');

        el.innerHTML = `
            <div class="section-label">Projecao de saude</div>
            <div class="chart-legend">
                <div class="chart-legend-item"><span class="chart-legend-line gold"></span> Atual</div>
                <div class="chart-legend-item"><span class="chart-legend-line green"></span> Com melhorias</div>
            </div>
            <div class="chart-svg-container">
                <svg id="miniChart" width="100%" height="${h + 20}" viewBox="0 0 ${w} ${h + 20}" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="mgoldGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="rgba(197,165,90,0.3)"/>
                            <stop offset="100%" stop-color="#C5A55A"/>
                        </linearGradient>
                        <linearGradient id="mgreenGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="rgba(74,217,164,0.3)"/>
                            <stop offset="100%" stop-color="#4AD9A4"/>
                        </linearGradient>
                        <linearGradient id="mareaGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#C5A55A" stop-opacity="0.15"/>
                            <stop offset="100%" stop-color="#C5A55A" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <line x1="0" y1="${h*0.33}" x2="${w}" y2="${h*0.33}" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    <line x1="0" y1="${h*0.66}" x2="${w}" y2="${h*0.66}" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
                    <path id="miniArea" d="${goldPath} L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z" fill="url(#mareaGrad)" opacity="0"/>
                    <path id="miniGold" d="${goldPath}" fill="none" stroke="url(#mgoldGrad)" stroke-width="2" stroke-linecap="round" opacity="0"/>
                    <path id="miniGreen" d="${greenPath}" fill="none" stroke="url(#mgreenGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 3" opacity="0"/>
                    ${goldDots}
                    ${greenDots}
                    ${monthLabels}
                    <text id="miniProjLabel" x="${lastProj.x - 6}" y="${lastProj.y - 6}" fill="#4AD9A4" font-size="10" font-family="Playfair Display,serif" font-weight="700" opacity="0">${projScore}</text>
                </svg>
            </div>
        `;

        // Animate chart after section becomes visible
        setTimeout(() => {
            const goldLine = document.getElementById('miniGold');
            const area = document.getElementById('miniArea');
            const greenLine = document.getElementById('miniGreen');
            const label = document.getElementById('miniProjLabel');

            // Gold line draw
            const goldLen = goldLine.getTotalLength();
            goldLine.style.strokeDasharray = goldLen;
            goldLine.style.strokeDashoffset = goldLen;
            goldLine.style.opacity = '1';
            let s1 = null;
            function drawGold(ts) {
                if (!s1) s1 = ts;
                const p = Math.min((ts - s1) / 900, 1);
                goldLine.style.strokeDashoffset = goldLen * (1 - (1 - Math.pow(1 - p, 3)));
                if (p < 1) requestAnimationFrame(drawGold);
            }
            requestAnimationFrame(drawGold);

            // Area fade
            setTimeout(() => { area.style.transition = 'opacity 0.6s ease'; area.style.opacity = '0.5'; }, 400);

            // Green line draw (after gold)
            setTimeout(() => {
                const greenLen = greenLine.getTotalLength();
                greenLine.style.strokeDasharray = greenLen;
                greenLine.style.strokeDashoffset = greenLen;
                greenLine.style.opacity = '1';
                let s2 = null;
                function drawGreen(ts) {
                    if (!s2) s2 = ts;
                    const p = Math.min((ts - s2) / 600, 1);
                    greenLine.style.strokeDashoffset = greenLen * (1 - (1 - Math.pow(1 - p, 3)));
                    if (p < 1) {
                        requestAnimationFrame(drawGreen);
                    } else {
                        greenLine.style.strokeDasharray = '5 3';
                        greenLine.style.strokeDashoffset = '0';
                    }
                }
                requestAnimationFrame(drawGreen);

                // Label pop
                setTimeout(() => { label.style.transition = 'opacity 0.4s ease'; label.setAttribute('opacity', '1'); }, 500);
            }, 1000);

            // Dots pop
            document.querySelectorAll('#miniChart .anim-dot').forEach((d, i) => {
                setTimeout(() => { d.style.transition = 'opacity 0.3s ease'; d.setAttribute('opacity', '1'); }, 300 + i * 60);
            });
        }, 1500);
    }

    // ============ ANIMATE PARAM BARS ============
    function animateParamBars() {
        setTimeout(() => {
            document.querySelectorAll('.param-bar-fill').forEach((bar, i) => {
                setTimeout(() => { bar.style.width = bar.dataset.pct + '%'; }, i * 150);
            });
        }, 1200);
    }

    // ============ NAVIGATION ============
    function goBack() {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (referrer === 'lista') window.location.href = '11-exames-lista.html';
            else window.location.href = '08-perfil.html?from=nav';
        }, 500);
    }

    function navigateTo(tab) {
        const overlay = document.getElementById('exitOverlay');
        overlay.classList.add('active');
        setTimeout(() => {
            if (tab === 'perfil') window.location.href = '08-perfil.html?from=nav';
            else if (tab === 'exames') window.location.href = '11-exames-lista.html';
            else if (tab === 'bioage') window.location.href = '15-bioage-sem-dados.html';
        }, 500);
    }

    // ============ INIT ============
    renderHeader();
    renderExplanation();
    renderBiomarcadores();
    renderMelhorias();
    renderProjecao();
    // Carregar do backend se tiver ID
    if (examId && typeof vitaeAPI !== 'undefined' && vitaeAPI.isLoggedIn()) {
        loadExamFromAPI();
    }
</script>
</body>
</html>
